  <text x="80" y="342" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e">Coinbase Card</text>
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#e6edf3">Up to 4%</text>
  <text x="80" y="392" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Crypto cashback · Visa</text>
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Best for US beginners</text>

  <!-- Card 2: Crypto.com -->
  <rect x="330" y="310" width="250" height="110" rx="14" fill="url(#cardGlow2)" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="350" y="342" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#3b82f6">Crypto.com Card</text>
  <text x="350" y="370" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#e6edf3">Up to 8%</text>
