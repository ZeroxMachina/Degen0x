    <text x="360" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">→</text>

    <rect x="380" width="160" height="36" rx="8" fill="#6366f1" opacity="0.12" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="460" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#6366f1" text-anchor="middle">Visa / Mastercard</text>

