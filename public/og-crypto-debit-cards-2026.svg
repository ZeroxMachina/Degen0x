  <text x="620" y="370" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#e6edf3">Up to 10%</text>
  <text x="620" y="392" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">MNT cashback · Mastercard</text>
