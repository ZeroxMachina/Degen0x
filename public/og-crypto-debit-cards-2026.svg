    <rect x="175" width="90" height="24" rx="12" fill="#f59e0b" opacity="0.12"/>
    <text x="220" y="16" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f59e0b" text-anchor="middle">Cashback</text>

    <rect x="275" width="85" height="24" rx="12" fill="#8b5cf6" opacity="0.12"/>
    <text x="317" y="16" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" text-anchor="middle">No KYC?</text>

