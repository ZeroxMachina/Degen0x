<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="200" fill="#ef4444" opacity="0.04"/>
  <circle cx="950" cy="400" r="150" fill="#f59e0b" opacity="0.04"/>
  <circle cx="200" cy="500" r="120" fill="#22c55e" opacity="0.03"/>

  <!-- Logo area -->
  <text x="60" y="65" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>

  <!-- Category badge -->
  <rect x="60" y="100" width="140" height="28" rx="6" fill="#ef444420" stroke="#ef444440" stroke-width="1"/>
  <text x="130" y="119" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#f87171" text-anchor="middle">Bear Market</text>

  <rect x="210" y="100" width="120" height="28" rx="6" fill="#f59e0b20" stroke="#f59e0b40" stroke-width="1"/>
  <text x="270" y="119" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">Investing</text>

  <!-- Title -->
  <text x="60" y="190" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">Bear Market Crypto</text>
  <text x="60" y="245" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">Investing Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, Arial, sans-serif" font-size="18" fill="#8b949e">Fear &amp; Greed Index at 10 for 46+ days. DCA strategies,</text>
  <text x="60" y="315" font-family="Inter, Arial, sans-serif" font-size="18" fill="#8b949e">accumulation zones, and smart money signals.</text>

  <!-- Fear & Greed gauge -->
  <g transform="translate(780, 120)">
    <rect x="0" y="0" width="360" height="180" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="180" y="35" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#8b949e" text-anchor="middle">Fear &amp; Greed Index</text>
    <text x="180" y="95" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="#ef4444" text-anchor="middle">10</text>
    <text x="180" y="125" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#f87171" text-anchor="middle">EXTREME FEAR</text>
    <text x="180" y="155" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7681" text-anchor="middle">46+ consecutive days below 20</text>
  </g>

  <!-- Bear market chart visualization -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="500" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#8b949e">BTC Price History — Buy Zones</text>

    <!-- Chart grid lines -->
    <line x1="20" y1="55" x2="480" y2="55" stroke="#30363d" stroke-width="0.5"/>
    <line x1="20" y1="90" x2="480" y2="90" stroke="#30363d" stroke-width="0.5"/>
    <line x1="20" y1="125" x2="480" y2="125" stroke="#30363d" stroke-width="0.5"/>
    <line x1="20" y1="160" x2="480" y2="160" stroke="#30363d" stroke-width="0.5"/>

    <!-- Price chart line (bear market shape) -->
    <polyline points="30,60 80,65 130,80 180,110 220,140 260,155 300,160 340,150 380,135 420,125 460,110" fill="none" stroke="url(#chartLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Buy zone highlight -->
    <rect x="240" y="140" width="100" height="35" rx="4" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
    <text x="290" y="165" font-family="Inter, Arial, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle" opacity="0.8">BUY ZONE</text>

    <!-- Labels -->
    <text x="20" y="185" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">2024</text>
    <text x="240" y="185" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">2025</text>
    <text x="460" y="185" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">2026</text>
  </g>

  <!-- Key stats -->
  <g transform="translate(600, 360)">
    <rect x="0" y="0" width="540" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#8b949e">Strategy Highlights</text>

    <text x="20" y="65" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">DCA Multiplier:</text>
    <text x="200" y="65" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#22c55e">2-3x in Extreme Fear</text>

    <text x="20" y="100" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Historical Returns:</text>
    <text x="200" y="100" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#22c55e">+180-500% from bottoms</text>

    <text x="20" y="135" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Portfolio Split:</text>
    <text x="200" y="135" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">BTC 50% / ETH 25% / Alts 25%</text>

    <text x="20" y="170" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Time Horizon:</text>
    <text x="200" y="170" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#818cf8">12-24 months accumulation</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="624" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="624" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Updated March 2026</text>
</svg>