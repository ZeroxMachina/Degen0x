  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="150" cy="350" r="280" fill="#06b6d4" opacity="0.05"/>
  <circle cx="1000" cy="150" r="300" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="600" cy="600" r="200" fill="#f59e0b" opacity="0.03"/>

  <!-- Top accent bar -->
