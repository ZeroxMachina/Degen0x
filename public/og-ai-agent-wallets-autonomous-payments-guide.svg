  <!-- Logo -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="2">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="100" width="52" height="28" rx="14" fill="rgba(6,182,212,0.25)" stroke="rgba(6,182,212,0.5)" stroke-width="1"/>
  <text x="77" y="119" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22d3ee">AI</text>

  <rect x="122" y="100" width="85" height="28" rx="14" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <text x="139" y="119" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa">Wallets</text>

  <rect x="217" y="100" width="90" height="28" rx="14" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="233" y="119" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fbbf24">Payments</text>

  <!-- Title -->
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#e6edf3" letter-spacing="-1">AI Agent Wallets &amp;</text>
  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#e6edf3" letter-spacing="-1">Autonomous Crypto</text>
  <text x="60" y="305" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="url(#aiGrad)" letter-spacing="-1">Payments Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="350" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">x402 protocol, Alchemy, World AgentKit, Coinbase &amp; enterprise adoption</text>

