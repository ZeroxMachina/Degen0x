  <g transform="translate(740, 100)">
    <rect x="0" y="0" width="400" height="280" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">KEY PLATFORMS</text>

    <!-- x402 -->
    <rect x="24" y="55" width="352" height="44" rx="10" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
    <text x="44" y="82" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22d3ee">x402</text>
    <text x="130" y="82" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e6edf3">HTTP Micropayments Protocol</text>

    <!-- Alchemy -->
    <rect x="24" y="110" width="352" height="44" rx="10" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="44" y="137" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#818cf8">Alchemy</text>
    <text x="130" y="137" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e6edf3">Agentic Wallets on Base</text>

    <!-- World AgentKit -->
    <rect x="24" y="165" width="352" height="44" rx="10" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <text x="44" y="192" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">World</text>
    <text x="130" y="192" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e6edf3">AgentKit + Proof of Human</text>

    <!-- Coinbase -->
    <rect x="24" y="220" width="352" height="44" rx="10" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="44" y="247" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">Coinbase</text>
    <text x="130" y="247" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e6edf3">Enterprise Agent Wallets</text>
