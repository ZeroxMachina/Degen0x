<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bitcoin Mining Profitability Guide 2026">
  <defs>
    <linearGradient id="bgGradMining" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="gradAccentMining" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="55%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#52525b"/>
    </linearGradient>
    <linearGradient id="titleGradMining" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f7931a"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="hashrateGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradMining)"/>

  <!-- Top accent bar (orange → copper → graphite) -->
  <rect width="1200" height="4" fill="url(#gradAccentMining)"/>

  <!-- Right-third topical motif: ASIC chip array, hashrate sparkline, halving arc -->
  <g opacity="0.42">
    <!-- ASIC chip rack frame -->
    <rect x="780" y="135" width="380" height="280" rx="12" fill="none" stroke="#52525b" stroke-width="1.5"/>
    <text x="970" y="125" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#a8a29e" text-anchor="middle" letter-spacing="2.5">ASIC ARRAY · SHA-256</text>

    <!-- Chip grid: 5 columns x 3 rows -->
    <g fill="url(#chipGrad)" stroke="#f7931a" stroke-width="0.8" stroke-opacity="0.55">
      <rect x="800" y="155" width="60" height="48" rx="4"/>
      <rect x="870" y="155" width="60" height="48" rx="4"/>
      <rect x="940" y="155" width="60" height="48" rx="4"/>
      <rect x="1010" y="155" width="60" height="48" rx="4"/>
      <rect x="1080" y="155" width="60" height="48" rx="4"/>
      <rect x="800" y="213" width="60" height="48" rx="4"/>
      <rect x="870" y="213" width="60" height="48" rx="4"/>
      <rect x="940" y="213" width="60" height="48" rx="4"/>
      <rect x="1010" y="213" width="60" height="48" rx="4"/>
      <rect x="1080" y="213" width="60" height="48" rx="4"/>
      <rect x="800" y="271" width="60" height="48" rx="4"/>
      <rect x="870" y="271" width="60" height="48" rx="4"/>
      <rect x="940" y="271" width="60" height="48" rx="4"/>
      <rect x="1010" y="271" width="60" height="48" rx="4"/>
      <rect x="1080" y="271" width="60" height="48" rx="4"/>
    </g>

    <!-- LED indicators on the front face of each chip -->
    <g fill="#fbbf24">
      <circle cx="810" cy="195" r="2"/><circle cx="880" cy="195" r="2"/><circle cx="950" cy="195" r="2"/><circle cx="1020" cy="195" r="2"/><circle cx="1090" cy="195" r="2"/>
      <circle cx="810" cy="253" r="2"/><circle cx="880" cy="253" r="2"/><circle cx="950" cy="253" r="2"/><circle cx="1020" cy="253" r="2"/><circle cx="1090" cy="253" r="2"/>
      <circle cx="810" cy="311" r="2"/><circle cx="880" cy="311" r="2"/><circle cx="950" cy="311" r="2"/><circle cx="1020" cy="311" r="2"/><circle cx="1090" cy="311" r="2"/>
    </g>

    <!-- Hashrate sparkline (ascending — post-halving recovery framing) -->
    <g transform="translate(800, 340)">
      <polyline points="0,55 30,52 60,46 90,49 120,38 150,42 180,28 210,32 240,18 270,22 300,12 330,16 360,6"
                fill="none" stroke="#f7931a" stroke-width="2" opacity="0.85"/>
      <polygon points="0,55 30,52 60,46 90,49 120,38 150,42 180,28 210,32 240,18 270,22 300,12 330,16 360,6 360,70 0,70"
               fill="url(#hashrateGlow)"/>
    </g>

    <!-- Halving indicator: a vertical block-reward bar split (full → half) -->
    <g transform="translate(800, 425)" opacity="0.7">
      <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#a8a29e" letter-spacing="2.5">HALVING · BLOCK REWARD</text>
      <rect x="0" y="10" width="40" height="36" fill="#f7931a" opacity="0.85"/>
      <text x="20" y="34" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#0c0a09" text-anchor="middle">6.25</text>
      <line x1="48" y1="28" x2="68" y2="28" stroke="#f7931a" stroke-width="1.5"/>
      <polygon points="68,22 78,28 68,34" fill="#f7931a"/>
      <rect x="86" y="19" width="40" height="18" fill="#fbbf24"/>
      <text x="106" y="32" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0c0a09" text-anchor="middle">3.125</text>
    </g>
  </g>

  <!-- Bitcoin symbol (canonical orange) -->
  <text x="80" y="118" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="#f7931a" opacity="0.95">₿</text>

  <!-- Category badge -->
  <rect x="80" y="148" width="92" height="30" rx="15" fill="#f7931a" opacity="0.16"/>
  <text x="126" y="168" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">Mining</text>

  <rect x="180" y="148" width="120" height="30" rx="15" fill="#52525b" opacity="0.4"/>
  <text x="240" y="168" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">Intermediate</text>

  <!-- Title -->
  <text x="80" y="252" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="900" fill="url(#titleGradMining)">Bitcoin Mining</text>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="900" fill="url(#titleGradMining)">Profitability</text>

  <!-- Subtitle -->
  <text x="80" y="372" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#e7e5e4">Post-halving economics — hardware, energy, and ROI.</text>

  <!-- Detail strip (durable facts only) -->
  <text x="80" y="425" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="500" fill="#a8a29e">Block reward 3.125 BTC · ASIC efficiency · Electricity cost · Pool vs solo</text>

  <!-- Tagline -->
  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-size="15" font-style="italic" fill="#78716c">A 2026 playbook for hashrate, hardware, and energy economics.</text>

  <!-- Year badge -->
  <rect x="80" y="498" width="78" height="34" rx="6" fill="#f7931a"/>
  <text x="119" y="522" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#0c0a09" text-anchor="middle">2026</text>

  <!-- Topical badge: cluster signal -->
  <rect x="166" y="498" width="218" height="34" rx="6" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.7"/>
  <text x="275" y="522" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="2">GUIDE · MINING · PoW</text>

  <!-- Bottom bar -->
  <rect y="596" width="1200" height="34" fill="#0c0a09"/>
  <rect y="596" width="1200" height="1" fill="#27272a"/>
  <text x="80" y="618" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fbbf24" opacity="0.9">degen0x.com</text>
  <text x="1120" y="618" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#78716c" text-anchor="end">Comprehensive Crypto Education</text>
</svg>
