<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="200" r="180" fill="#22c55e" opacity="0.06" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="120" fill="#6366f1" opacity="0.05" filter="url(#glow)"/>

  <!-- Mining hashrate visualization -->
  <g opacity="0.15">
    <!-- Simplified ASIC/circuit pattern -->
    <rect x="820" y="280" width="300" height="200" rx="16" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
    <rect x="840" y="300" width="60" height="60" rx="6" fill="#22c55e" opacity="0.15"/>
    <rect x="920" y="300" width="60" height="60" rx="6" fill="#22c55e" opacity="0.1"/>
    <rect x="1000" y="300" width="60" height="60" rx="6" fill="#22c55e" opacity="0.15"/>
    <rect x="840" y="380" width="60" height="60" rx="6" fill="#22c55e" opacity="0.1"/>
    <rect x="920" y="380" width="60" height="60" rx="6" fill="#22c55e" opacity="0.2"/>
    <rect x="1000" y="380" width="60" height="60" rx="6" fill="#22c55e" opacity="0.1"/>
    <!-- Lines connecting chips -->
    <line x1="900" y1="330" x2="920" y2="330" stroke="#22c55e" stroke-width="1"/>
    <line x1="980" y1="330" x2="1000" y2="330" stroke="#22c55e" stroke-width="1"/>
    <line x1="870" y1="360" x2="870" y2="380" stroke="#22c55e" stroke-width="1"/>
    <line x1="950" y1="360" x2="950" y2="380" stroke="#22c55e" stroke-width="1"/>
    <line x1="1030" y1="360" x2="1030" y2="380" stroke="#22c55e" stroke-width="1"/>
  </g>

  <!-- Sparkline chart -->
  <g transform="translate(820, 120)">
    <polyline points="0,80 30,75 60,60 90,65 120,40 150,50 180,30 210,35 240,15 270,20 300,10"
              fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
    <polygon points="0,80 30,75 60,60 90,65 120,40 150,50 180,30 210,35 240,15 270,20 300,10 300,100 0,100"
             fill="url(#greenGrad)"/>
  </g>

  <!-- Bitcoin symbol -->
  <text x="80" y="120" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#f59e0b" opacity="0.8">₿</text>

  <!-- Category badge -->
  <rect x="80" y="170" width="90" height="30" rx="15" fill="#22c55e" opacity="0.15"/>
  <text x="125" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">Mining</text>

  <rect x="185" y="170" width="120" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
  <text x="245" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">Intermediate</text>

  <!-- Title -->
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="url(#titleGrad)">Bitcoin Mining</text>
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="url(#titleGrad)">Profitability Guide</text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#f59e0b">2026</text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Post-halving economics · ASIC hardware ROI · Electricity costs</text>
  <text x="80" y="458" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Mining strategies · DePIN compute pivots</text>

  <!-- Key stats -->
  <g transform="translate(80, 490)">
    <rect width="160" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Difficulty</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle">155.9T</text>
  </g>
  <g transform="translate(260, 490)">
    <rect width="160" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Block Reward</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="middle">3.125 BTC</text>
  </g>
  <g transform="translate(440, 490)">
    <rect width="160" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Break-even</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#06b6d4" text-anchor="middle">&lt;$0.15/kWh</text>
  </g>

  <!-- Bottom bar -->
  <rect y="596" width="1200" height="34" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="618" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1120" y="618" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Comprehensive Crypto Education</text>
</svg>