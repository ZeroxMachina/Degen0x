<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <linearGradient id="brandGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="logoGlow2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Ambient orbs -->
  <circle cx="1100" cy="80" r="220" fill="#4f46e5" opacity="0.07"/>
  <circle cx="100" cy="540" r="200" fill="#0891b2" opacity="0.07"/>
  <circle cx="600" cy="315" r="300" fill="#6366f1" opacity="0.03"/>

  <!-- Grid -->
  <pattern id="grid2" width="60" height="60" patternUnits="userSpaceOnUse" opacity="0.035">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#8b949e" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid2)"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad2)"/>

  <!-- Logo -->
  <circle cx="64" cy="50" r="22" fill="url(#logoGrad2)" filter="url(#logoGlow2)" opacity="0.95"/>
  <text x="64" y="57" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="-0.5">0x</text>
  <text x="98" y="57" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">degen0x</text>

  <!-- "Global" badge -->
  <rect x="72" y="100" width="160" height="34" rx="17" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1"/>
  <text x="152" y="122" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">🌍  Now Global</text>

  <!-- Main title -->
  <text x="72" y="215" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="900" letter-spacing="-3" fill="url(#titleGrad2)">degen0x</text>
  <text x="72" y="295" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="900" letter-spacing="-3" fill="url(#titleGrad2)">goes global.</text>

  <!-- Subtitle -->
  <text x="72" y="345" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400" fill="#8b949e">265 pages · 8 languages · No login required</text>

  <!-- Language pill grid -->
  <!-- Row 1 -->
  <rect x="72" y="385" width="136" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="140" y="412" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e6edf3">🇪🇸 Español</text>

  <rect x="222" y="385" width="136" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="290" y="412" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e6edf3">🇫🇷 Français</text>

  <rect x="372" y="385" width="136" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="440" y="412" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e6edf3">🇩🇪 Deutsch</text>

  <rect x="522" y="385" width="160" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="602" y="412" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e6edf3">🇧🇷 Português</text>

  <!-- Row 2 -->
  <rect x="72" y="443" width="136" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="140" y="470" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e6edf3">🇯🇵 日本語</text>

  <rect x="222" y="443" width="136" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="290" y="470" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e6edf3">🇰🇷 한국어</text>

  <rect x="372" y="443" width="136" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="440" y="470" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e6edf3">🇸🇦 العربية</text>

  <rect x="522" y="443" width="136" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="590" y="470" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e6edf3">🇹🇷 Türkçe</text>

  <!-- Right side — globe-like decorative element -->
  <!-- Outer ring -->
  <circle cx="980" cy="315" r="160" fill="none" stroke="rgba(99,102,241,0.15)" stroke-width="1.5"/>
  <circle cx="980" cy="315" r="115" fill="none" stroke="rgba(6,182,212,0.12)" stroke-width="1"/>
  <circle cx="980" cy="315" r="70" fill="rgba(99,102,241,0.07)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <!-- Globe meridians (simplified) -->
  <ellipse cx="980" cy="315" rx="115" ry="40" fill="none" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <line x1="980" y1="200" x2="980" y2="430" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <!-- Center glow dot -->
  <circle cx="980" cy="315" r="30" fill="rgba(99,102,241,0.15)"/>
  <text x="980" y="323" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#818cf8" font-weight="700">0x</text>
  <!-- Node dots around globe -->
  <circle cx="1080" cy="260" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="880" cy="250" r="7" fill="#06b6d4" opacity="0.8"/>
  <circle cx="1090" cy="370" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="875" cy="375" r="7" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="1000" cy="195" r="5" fill="#6366f1" opacity="0.7"/>
  <circle cx="965" cy="435" r="5" fill="#6366f1" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="980" y1="315" x2="1080" y2="260" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <line x1="980" y1="315" x2="880" y2="250" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <line x1="980" y1="315" x2="1090" y2="370" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <line x1="980" y1="315" x2="875" y2="375" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(255,255,255,0.02)"/>
  <text x="72" y="614" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#6e7681">Every tool. Every guide. No signup.</text>
  <text x="1128" y="614" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#6366f1">degen0x.com</text>
</svg>
