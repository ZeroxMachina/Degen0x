<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Accent bar -->
  <rect width="1200" height="6" fill="url(#accentGradient)"/>

  <!-- Decorative gradient circles background -->
  <circle cx="180" cy="220" r="115" fill="#4f46e5" opacity="0.08"/>
  <circle cx="1050" cy="420" r="125" fill="#0891b2" opacity="0.08"/>
  <circle cx="950" cy="120" r="95" fill="#d97706" opacity="0.06"/>

  <!-- Glass-morphism container -->
  <rect x="50" y="60" width="1100" height="520" rx="16" fill="url(#glassGradient)"
        stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- degen0x logo text -->
  <text x="80" y="115" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#8b949e" letter-spacing="2">
    degen0x
  </text>

  <!-- Title -->
  <text x="80" y="220" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    DeFi Position
  </text>
  <text x="80" y="280" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    Manager
  </text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">
    Track and manage all your DeFi positions
  </text>

  <!-- Decorative dashboard cards with protocol icons -->
  <g filter="url(#glow)">
    <!-- Card 1 - Aave -->
    <rect x="750" y="360" width="95" height="95" rx="8" fill="rgba(79, 70, 229, 0.15)" stroke="rgba(79, 70, 229, 0.4)" stroke-width="1"/>
    <circle cx="797" cy="390" r="18" fill="#4f46e5" opacity="0.6"/>
    <text x="760" y="475" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8b949e">
      Aave
    </text>

    <!-- Card 2 - Uniswap -->
    <rect x="865" y="360" width="95" height="95" rx="8" fill="rgba(8, 145, 178, 0.15)" stroke="rgba(8, 145, 178, 0.4)" stroke-width="1"/>
    <circle cx="912" cy="390" r="18" fill="#0891b2" opacity="0.6"/>
    <text x="875" y="475" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8b949e">
      Uniswap
    </text>

    <!-- Card 3 - Curve -->
    <rect x="980" y="360" width="95" height="95" rx="8" fill="rgba(217, 119, 6, 0.15)" stroke="rgba(217, 119, 6, 0.4)" stroke-width="1"/>
    <circle cx="1027" cy="390" r="18" fill="#d97706" opacity="0.6"/>
    <text x="995" y="475" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8b949e">
      Curve
    </text>

    <!-- Card 4 - Compound -->
    <rect x="750" y="475" width="95" height="65" rx="8" fill="rgba(16, 185, 129, 0.15)" stroke="rgba(16, 185, 129, 0.4)" stroke-width="1"/>
    <circle cx="797" cy="500" r="14" fill="#10b981" opacity="0.6"/>
    <text x="755" y="550" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8b949e">
      Compound
    </text>

    <!-- Card 5 - Lido -->
    <rect x="865" y="475" width="95" height="65" rx="8" fill="rgba(79, 70, 229, 0.15)" stroke="rgba(79, 70, 229, 0.4)" stroke-width="1"/>
    <circle cx="912" cy="500" r="14" fill="#4f46e5" opacity="0.6"/>
    <text x="880" y="550" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8b949e">
      Lido
    </text>

    <!-- Card 6 - Balancer -->
    <rect x="980" y="475" width="95" height="65" rx="8" fill="rgba(8, 145, 178, 0.15)" stroke="rgba(8, 145, 178, 0.4)" stroke-width="1"/>
    <circle cx="1027" cy="500" r="14" fill="#0891b2" opacity="0.6"/>
    <text x="990" y="550" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8b949e">
      Balancer
    </text>
  </g>

  <!-- Vertical accent lines -->
  <line x1="700" y1="60" x2="700" y2="580" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>

  <!-- Footer -->
  <text x="80" y="595" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#475569">
    degen0x.com
  </text>
</svg>