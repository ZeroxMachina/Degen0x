<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="euler-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Decorative circles -->
  <circle cx="950" cy="200" r="180" fill="#6366f1" opacity="0.06"/>
  <circle cx="1050" cy="350" r="120" fill="#0891b2" opacity="0.05"/>
  <circle cx="850" cy="420" r="90" fill="#d97706" opacity="0.04"/>
  <!-- Vault icon representation -->
  <g transform="translate(900, 180)" filter="url(#glow)">
    <rect x="0" y="0" width="200" height="160" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1.5"/>
    <rect x="20" y="20" width="70" height="55" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <rect x="110" y="20" width="70" height="55" rx="8" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
    <rect x="20" y="90" width="70" height="55" rx="8" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <rect x="110" y="90" width="70" height="55" rx="8" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
    <text x="55" y="53" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#818cf8" font-weight="600">EVK</text>
    <text x="145" y="53" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#22d3ee" font-weight="600">EVC</text>
    <text x="55" y="123" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#a78bfa" font-weight="600">Vaults</text>
    <text x="145" y="123" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#fbbf24" font-weight="600">RWA</text>
  </g>
  <!-- Logo placeholder -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="url(#euler-brand)" opacity="0.9"/>
    <text x="16" y="21" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="white" font-weight="800">0x</text>
    <text x="44" y="22" font-family="Inter,sans-serif" font-size="16" fill="#8b949e" font-weight="600">degen0x</text>
  </g>
  <!-- Category badge -->
  <rect x="60" y="140" width="60" height="26" rx="13" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="90" y="157" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#818cf8" font-weight="600">LEARN</text>
  <!-- Title -->
  <text x="60" y="220" font-family="Inter,sans-serif" font-size="48" fill="#e6edf3" font-weight="800" letter-spacing="-0.02em">Euler V2 Modular</text>
  <text x="60" y="278" font-family="Inter,sans-serif" font-size="48" fill="#e6edf3" font-weight="800" letter-spacing="-0.02em">Lending Guide</text>
  <!-- Subtitle -->
  <text x="60" y="330" font-family="Inter,sans-serif" font-size="20" fill="#8b949e" font-weight="400">Vaults, EVK, EVC &amp; Institutional DeFi — 2026</text>
  <!-- Stats -->
  <g transform="translate(60, 380)">
    <rect width="130" height="44" rx="10" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6e7681">TVL</text>
    <text x="65" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#22c55e" font-weight="700">$671M+</text>
  </g>
  <g transform="translate(210, 380)">
    <rect width="130" height="44" rx="10" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6e7681">Vaults</text>
    <text x="65" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#06b6d4" font-weight="700">297+</text>
  </g>
  <g transform="translate(360, 380)">
    <rect width="130" height="44" rx="10" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6e7681">Audits</text>
    <text x="65" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#8b5cf6" font-weight="700">31</text>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" font-family="Inter,sans-serif" font-size="14" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="615" text-anchor="end" font-family="Inter,sans-serif" font-size="12" fill="#6e7681">April 2026</text>
</svg>