<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="nodeGlow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeGlow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeGlow3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeGlow4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentBar)"/>

  <!-- Decorative background circles -->
  <circle cx="950" cy="180" r="200" fill="#6366f1" opacity="0.04"/>
  <circle cx="1050" cy="400" r="150" fill="#06b6d4" opacity="0.04"/>
  <circle cx="150" cy="500" r="120" fill="#f59e0b" opacity="0.03"/>

  <!-- Network visualization: 4 protocol nodes connected by lines -->
  <!-- Connection lines -->
  <line x1="880" y1="160" x2="1060" y2="160" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <line x1="880" y1="160" x2="880" y2="320" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
  <line x1="1060" y1="160" x2="1060" y2="320" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
  <line x1="880" y1="320" x2="1060" y2="320" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
  <line x1="880" y1="160" x2="1060" y2="320" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <line x1="1060" y1="160" x2="880" y2="320" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>

  <!-- Protocol nodes -->
  <!-- LayerZero -->
  <circle cx="880" cy="160" r="36" fill="url(#nodeGlow1)"/>
  <circle cx="880" cy="160" r="24" fill="#161b22" stroke="#6366f1" stroke-width="2"/>
  <text x="880" y="155" text-anchor="middle" fill="#6366f1" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">LZ</text>
  <text x="880" y="167" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="7">V2</text>
  <text x="880" y="205" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">LayerZero</text>

  <!-- Wormhole -->
  <circle cx="1060" cy="160" r="36" fill="url(#nodeGlow2)"/>
  <circle cx="1060" cy="160" r="24" fill="#161b22" stroke="#06b6d4" stroke-width="2"/>
  <text x="1060" y="155" text-anchor="middle" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">WH</text>
  <text x="1060" y="167" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="7">NTT</text>
  <text x="1060" y="205" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">Wormhole</text>

  <!-- Hyperlane -->
  <circle cx="880" cy="320" r="36" fill="url(#nodeGlow3)"/>
  <circle cx="880" cy="320" r="24" fill="#161b22" stroke="#f59e0b" stroke-width="2"/>
  <text x="880" y="315" text-anchor="middle" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">HL</text>
  <text x="880" y="327" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="7">ISM</text>
  <text x="880" y="365" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">Hyperlane</text>

  <!-- CCIP -->
  <circle cx="1060" cy="320" r="36" fill="url(#nodeGlow4)"/>
  <circle cx="1060" cy="320" r="24" fill="#161b22" stroke="#22c55e" stroke-width="2"/>
  <text x="1060" y="315" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">CC</text>
  <text x="1060" y="327" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="7">IP</text>
  <text x="1060" y="365" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">CCIP</text>

  <!-- Stats row -->
  <rect x="830" y="410" rx="8" ry="8" width="130" height="55" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="895" y="433" text-anchor="middle" fill="#6366f1" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">159M+</text>
  <text x="895" y="452" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">Messages</text>

  <rect x="975" y="410" rx="8" ry="8" width="130" height="55" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="1040" y="433" text-anchor="middle" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">168+</text>
  <text x="1040" y="452" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">Chains</text>

  <!-- Logo area -->
  <text x="60" y="70" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="0.05em">degen0x.com</text>

  <!-- Category badges -->
  <rect x="60" y="110" rx="4" ry="4" width="50" height="24" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="126" text-anchor="middle" fill="#8b5cf6" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">DeFi</text>

  <rect x="120" y="110" rx="4" ry="4" width="100" height="24" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="170" y="126" text-anchor="middle" fill="#58a6ff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Infrastructure</text>

  <!-- Title -->
  <text x="60" y="200" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.02em">
    <tspan x="60" dy="0">Cross-Chain</tspan>
    <tspan x="60" dy="52">Messaging</tspan>
    <tspan x="60" dy="52">Protocols 2026</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="380" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">
    LayerZero V2 · Wormhole NTT · Hyperlane · CCIP
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#161b22"/>
  <text x="60" y="624" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="11">degen0x.com — Your Crypto Intelligence Platform</text>
  <text x="1140" y="624" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="11">March 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentBar)"/>
</svg>