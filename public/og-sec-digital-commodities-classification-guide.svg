<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#627EEA"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#627EEA"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative SEC-style seal -->
  <circle cx="1000" cy="280" r="130" fill="none" stroke="#627EEA" stroke-opacity="0.08" stroke-width="3"/>
  <circle cx="1000" cy="280" r="110" fill="none" stroke="#627EEA" stroke-opacity="0.06" stroke-width="1.5"/>
  <circle cx="1000" cy="280" r="50" fill="#627EEA" opacity="0.04"/>
  <text x="1000" y="270" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#627EEA" text-anchor="middle" opacity="0.15">SEC</text>
  <text x="1000" y="300" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#627EEA" text-anchor="middle" opacity="0.12">CFTC</text>

  <!-- Classification grid decoration -->
  <g transform="translate(830, 430)" fill="none">
    <rect x="0" y="0" width="80" height="40" rx="6" stroke="#22c55e" stroke-opacity="0.15"/>
    <text x="40" y="25" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle" opacity="0.3">BTC</text>

    <rect x="90" y="0" width="80" height="40" rx="6" stroke="#627EEA" stroke-opacity="0.15"/>
    <text x="130" y="25" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#627EEA" text-anchor="middle" opacity="0.3">ETH</text>

    <rect x="180" y="0" width="80" height="40" rx="6" stroke="#9945FF" stroke-opacity="0.15"/>
    <text x="220" y="25" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9945FF" text-anchor="middle" opacity="0.3">SOL</text>

    <rect x="270" y="0" width="80" height="40" rx="6" stroke="#f59e0b" stroke-opacity="0.15"/>
    <text x="310" y="25" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" opacity="0.3">+13</text>

    <rect x="0" y="50" width="80" height="40" rx="6" stroke="#06b6d4" stroke-opacity="0.15"/>
    <text x="40" y="75" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle" opacity="0.3">XRP</text>

    <rect x="90" y="50" width="80" height="40" rx="6" stroke="#ef4444" stroke-opacity="0.15"/>
    <text x="130" y="75" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" opacity="0.3">ADA</text>

    <rect x="180" y="50" width="80" height="40" rx="6" stroke="#22c55e" stroke-opacity="0.15"/>
    <text x="220" y="75" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle" opacity="0.3">LINK</text>

    <rect x="270" y="50" width="80" height="40" rx="6" stroke="#8b949e" stroke-opacity="0.15"/>
    <text x="310" y="75" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle" opacity="0.3">AVAX</text>
  </g>

  <!-- degen0x logo text -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#818cf8" opacity="0.9">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="140" width="120" height="30" rx="15" fill="#627EEA" opacity="0.2"/>
  <text x="120" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#627EEA" text-anchor="middle">Regulation</text>

  <rect x="190" y="140" width="80" height="30" rx="15" fill="#f59e0b" opacity="0.2"/>
  <text x="230" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">2026</text>

  <!-- Title -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">SEC Digital</text>
  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">Commodities</text>
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">Classification</text>

  <!-- Subtitle -->
  <text x="60" y="410" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">All 16 crypto assets classified by SEC-CFTC joint interpretation</text>

  <!-- Stats -->
  <g transform="translate(60, 450)">
    <rect x="0" y="0" width="140" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="70" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">ASSETS CLASSIFIED</text>
    <text x="70" y="44" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="middle">16</text>

    <rect x="155" y="0" width="140" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="225" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">CATEGORIES</text>
    <text x="225" y="44" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#627EEA" text-anchor="middle">5</text>

    <rect x="310" y="0" width="140" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="380" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">DATE</text>
    <text x="380" y="44" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f59e0b" text-anchor="middle">Mar 17</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">degen0x.com</text>
  <text x="1140" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">2026 Guide</text>
</svg>