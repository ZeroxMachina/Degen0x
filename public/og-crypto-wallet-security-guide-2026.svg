<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentBar)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="180" r="200" fill="#6366f1" opacity="0.04"/>
  <circle cx="1050" cy="350" r="150" fill="#ef4444" opacity="0.04"/>
  <circle cx="100" cy="500" r="120" fill="#06b6d4" opacity="0.03"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(80, 80)" filter="url(#glow)">
    <path d="M30 8 L55 20 L55 42 C55 60 43 75 30 80 C17 75 5 60 5 42 L5 20 Z" fill="url(#shieldGrad)" opacity="0.9"/>
    <path d="M22 42 L28 48 L40 34" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- degen0x logo text -->
  <text x="150" y="115" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="0.05em">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="160" width="110" height="30" rx="15" fill="#ef444420" stroke="#ef444460" stroke-width="1"/>
  <text x="135" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">SECURITY</text>

  <!-- Title -->
  <text x="80" y="245" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Crypto Wallet Security</text>
  <text x="80" y="305" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="80" y="360" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Protect against drainers, phishing, and approval exploits</text>

  <!-- Stats row -->
  <g transform="translate(80, 410)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="200" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">MONTHLY PHISHING LOSSES</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ef4444" font-weight="800">$311M</text>

    <!-- Stat 2 -->
    <rect x="220" y="0" width="200" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="240" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">#1 ATTACK VECTOR</text>
    <text x="240" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#f59e0b" font-weight="800">Drainers</text>

    <!-- Stat 3 -->
    <rect x="440" y="0" width="200" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="460" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">SECURITY TOOLS</text>
    <text x="460" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#22c55e" font-weight="800">5 Reviewed</text>
  </g>

  <!-- Lock icons decorative -->
  <g transform="translate(850, 200)" opacity="0.12">
    <rect x="0" y="20" width="60" height="45" rx="8" fill="#6366f1"/>
    <path d="M12 20 V12 A18 18 0 0 1 48 12 V20" stroke="#6366f1" stroke-width="4" fill="none"/>
  </g>
  <g transform="translate(1000, 300)" opacity="0.08">
    <rect x="0" y="15" width="45" height="34" rx="6" fill="#ef4444"/>
    <path d="M9 15 V10 A13.5 13.5 0 0 1 36 10 V15" stroke="#ef4444" stroke-width="3" fill="none"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="612" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681" font-weight="600">degen0x.com</text>
  <text x="1120" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>