      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#080d1c"/>
  <ellipse cx="100" cy="100" rx="200" ry="200" fill="url(#accentGrad)" opacity="0.08"/>
  <ellipse cx="1100" cy="530" rx="250" ry="200" fill="url(#accentGrad)" opacity="0.06"/>
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" stroke="url(#accentGrad)" stroke-width="1"/>
  <!-- Exchange arrows icon -->
  <g transform="translate(540, 130)" filter="url(#glow)" opacity="0.6">
    <path d="M30 0 L60 20 L30 40 L30 25 L0 25 L0 15 L30 15 Z" fill="#06b6d4"/>
    <path d="M30 50 L0 70 L30 90 L30 75 L60 75 L60 65 L30 65 Z" fill="#6366f1"/>
  </g>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Crypto Exchanges</text>
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="28" fill="#8b949e" text-anchor="middle">Expert Reviews, Fee Comparisons &amp; Guides</text>
  <line x1="350" y1="370" x2="850" y2="370" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
