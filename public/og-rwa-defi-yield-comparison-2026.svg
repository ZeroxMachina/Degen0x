<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Accent Bar -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="120" r="70" fill="#0891b2" opacity="0.08" />
  <circle cx="1050" cy="500" r="100" fill="#d97706" opacity="0.06" />

  <!-- VS divider -->
  <line x1="600" y1="200" x2="600" y2="450" stroke="#4f46e5" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- RWA side bar -->
  <g opacity="0.7">
    <rect x="100" y="200" width="120" height="100" rx="12" fill="none" stroke="#0891b2" stroke-width="2"/>
    <text x="160" y="240" font-size="18" font-weight="bold" fill="#0891b2" text-anchor="middle" font-family="Inter">RWA</text>
    <text x="160" y="270" font-size="48" font-weight="bold" fill="#0891b2" text-anchor="middle" font-family="Inter">4-8%</text>
  </g>

  <!-- DeFi side bar -->
  <g opacity="0.7">
    <rect x="980" y="200" width="120" height="100" rx="12" fill="none" stroke="#d97706" stroke-width="2"/>
    <text x="1040" y="240" font-size="18" font-weight="bold" fill="#d97706" text-anchor="middle" font-family="Inter">DeFi</text>
    <text x="1040" y="270" font-size="48" font-weight="bold" fill="#d97706" text-anchor="middle" font-family="Inter">5-30%+</text>
  </g>

  <!-- Category Badge -->
  <rect x="60" y="480" width="140" height="32" rx="16" fill="#0891b2" opacity="0.2" stroke="#0891b2" stroke-width="1.5"/>
  <text x="130" y="502" font-size="13" fill="#0891b2" text-anchor="middle" font-family="Inter" font-weight="600">YIELD</text>

  <!-- Main Title -->
  <text x="70" y="560" font-size="52" font-weight="bold" fill="url(#titleGradient)" font-family="Inter">RWA Yield vs DeFi Yield</text>

  <!-- Subtitle -->
  <text x="70" y="600" font-size="18" fill="#8b949e" font-family="Inter">Where to Earn in 2026</text>

  <!-- degen0x branding -->
  <text x="1100" y="600" font-size="14" fill="#8b949e" text-anchor="end" font-family="Inter" font-weight="600">degen0x</text>
</svg>