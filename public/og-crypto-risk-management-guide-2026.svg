<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Subtle decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#ef4444" opacity="0.04"/>
  <circle cx="150" cy="500" r="140" fill="#06b6d4" opacity="0.03"/>
  <circle cx="900" cy="450" r="120" fill="#f59e0b" opacity="0.03"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>
  <text x="60" y="80" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">degen0x.com</text>

  <!-- Category badges -->
  <rect x="60" y="110" width="82" height="26" rx="6" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="101" y="128" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle">Investing</text>
  <rect x="152" y="110" width="115" height="26" rx="6" fill="#d2992220" stroke="#d2992240" stroke-width="1"/>
  <text x="209" y="128" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#d29922" text-anchor="middle">Intermediate</text>

  <!-- Title -->
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="url(#titleGrad)">Crypto Risk Management</text>
  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="url(#titleGrad)">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="293" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Position sizing, stop-losses, portfolio hedging &amp; risk frameworks</text>

  <!-- Stats cards row -->
  <rect x="60" y="325" width="200" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="355" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Max Position Size</text>
  <text x="80" y="390" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ef4444">2-5%</text>

  <rect x="280" y="325" width="200" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="300" y="355" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Portfolio Drawdown Limit</text>
  <text x="300" y="390" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#f59e0b">-20%</text>

  <rect x="500" y="325" width="200" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="520" y="355" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Risk/Reward Ratio</text>
  <text x="520" y="390" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#22c55e">1:3+</text>

  <!-- Shield icon illustration (right side) -->
  <rect x="810" y="300" width="340" height="220" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="830" y="330" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">RISK FRAMEWORK</text>

  <!-- Shield shape -->
  <path d="M980,355 L1040,375 L1040,430 C1040,460 1010,485 980,495 C950,485 920,460 920,430 L920,375 Z" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <path d="M980,365 L1030,382 L1030,428 C1030,452 1005,473 980,482 C955,473 930,452 930,428 L930,382 Z" fill="#6366f110"/>
  <text x="980" y="425" font-family="Inter, system-ui, sans-serif" font-size="32" fill="#6366f1" text-anchor="middle" opacity="0.8">🛡️</text>

  <!-- Risk levels -->
  <rect x="830" y="370" width="60" height="8" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="898" y="378" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Low</text>
  <rect x="830" y="392" width="60" height="8" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="898" y="400" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Medium</text>
  <rect x="830" y="414" width="60" height="8" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="898" y="422" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">High</text>

  <!-- Bottom info bar -->
  <rect x="60" y="445" width="700" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="478" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Covers: Position sizing · Stop-loss strategies · Portfolio hedging · DeFi risk · On-chain risk tools</text>
  <text x="80" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#58a6ff">+ Risk Score Calculator &amp; Portfolio Analyzer →</text>

  <!-- Bottom branding -->
  <rect x="0" y="586" width="1200" height="44" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="614" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8">degen0x.com</text>
  <text x="1140" y="614" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Updated March 2026</text>
</svg>