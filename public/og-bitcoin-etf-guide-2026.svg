<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="200" fill="#f7931a" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="150" fill="#eab308" opacity="0.04" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="120" fill="#f7931a" opacity="0.03" filter="url(#glow)"/>

  <!-- Bitcoin icon -->
  <g transform="translate(900, 100)" opacity="0.18">
    <circle cx="55" cy="55" r="50" fill="none" stroke="#f7931a" stroke-width="3"/>
    <text x="55" y="72" fill="#f7931a" font-family="Inter, sans-serif" font-size="52" text-anchor="middle" font-weight="800">₿</text>
  </g>

  <!-- Bar chart (representing ETF inflows) -->
  <g transform="translate(850, 270)" opacity="0.2">
    <rect x="0" y="60" width="30" height="30" rx="4" fill="#f7931a" opacity="0.5"/>
    <rect x="45" y="45" width="30" height="45" rx="4" fill="#f7931a" opacity="0.5"/>
    <rect x="90" y="30" width="30" height="60" rx="4" fill="#f7931a" opacity="0.6"/>
    <rect x="135" y="20" width="30" height="70" rx="4" fill="#f59e0b" opacity="0.6"/>
    <rect x="180" y="10" width="30" height="80" rx="4" fill="#eab308" opacity="0.6"/>
    <rect x="225" y="0" width="30" height="90" rx="4" fill="#22c55e" opacity="0.7"/>
    <!-- Baseline -->
    <line x1="0" y1="90" x2="260" y2="90" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Category badge -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="190" height="28" rx="14" fill="#f7931a20" stroke="#f7931a40" stroke-width="1"/>
    <text x="95" y="18" fill="#f7931a" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="700" letter-spacing="0.5">BITCOIN &amp; INVESTING</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Bitcoin ETF Guide</text>
  <text x="60" y="230" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">2026</text>
  <text x="60" y="285" fill="#f7931a" font-family="Inter, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.01em">Spot ETFs, Options &amp; Flows</text>

  <!-- Subtitle -->
  <text x="60" y="340" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Everything you need to know about Bitcoin ETFs: IBIT, FBTC, ARKB, HODL.</text>
  <text x="60" y="365" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Fees, inflows, options strategies, and how they impact BTC price.</text>

  <!-- Stat cards -->
  <g transform="translate(60, 400)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">TOTAL ETF AUM</text>
    <text x="16" y="55" fill="#f7931a" font-family="Inter, sans-serif" font-size="24" font-weight="800">$120B+</text>

    <!-- Card 2 -->
    <rect x="180" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="196" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">SPOT ETFS</text>
    <text x="196" y="55" fill="#f7931a" font-family="Inter, sans-serif" font-size="24" font-weight="800">11</text>

    <!-- Card 3 -->
    <rect x="360" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="376" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">LOWEST FEE</text>
    <text x="376" y="55" fill="#06b6d4" font-family="Inter, sans-serif" font-size="24" font-weight="800">0.15%</text>

    <!-- Card 4 -->
    <rect x="540" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="556" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">NET INFLOWS</text>
    <text x="556" y="55" fill="#22c55e" font-family="Inter, sans-serif" font-size="24" font-weight="800">$42B+</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500">degen0x.com</text>
  <text x="1140" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="end">Learn Guide</text>
</svg>