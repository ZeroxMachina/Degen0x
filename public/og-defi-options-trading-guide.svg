  <text x="523" y="523" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Perpetual Options</text>

  <!-- Bottom bar -->
  <rect x="0" y="575" width="1200" height="55" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="575" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="48" y="607" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">degen0x.com</text>
  <text x="1152" y="607" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400">Complete Guide · March 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
