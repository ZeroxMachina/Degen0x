  <path d="M930 280 L950 280 L980 280 L1020 280 L1050 280 L1080 280 L1110 280 L1150 280 L1150 340 L930 340 Z" fill="#ef4444" opacity="0.1"/>

  <!-- Call option line (upward) -->
  <path d="M930 280 L950 260 L980 220 L1020 180 L1050 160 L1080 170 L1110 150 L1150 160" fill="none" stroke="#818cf8" stroke-width="2.5"/>

