  <rect x="412" y="345" width="170" height="75" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="432" y="372" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Protocols</text>
  <text x="432" y="400" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">4 Compared</text>

