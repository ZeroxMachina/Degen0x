<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0c1228"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glows -->
  <circle cx="900" cy="250" r="260" fill="url(#glow1)"/>
  <circle cx="400" cy="500" r="200" fill="url(#glow2)"/>

  <!-- Attestation badge illustration -->
  <g transform="translate(830, 140)">
    <!-- Outer ring -->
    <circle cx="130" cy="130" r="120" fill="none" stroke="rgba(99, 102, 241, 0.2)" stroke-width="3"/>
    <circle cx="130" cy="130" r="100" fill="none" stroke="rgba(139, 92, 246, 0.15)" stroke-width="2" stroke-dasharray="8 6"/>

    <!-- Badge center -->
    <circle cx="130" cy="130" r="72" fill="url(#badgeGrad)" opacity="0.15"/>
    <circle cx="130" cy="130" r="72" fill="none" stroke="url(#badgeGrad)" stroke-width="2"/>

    <!-- Shield icon inside -->
    <text x="130" y="120" text-anchor="middle" font-size="48">🛡️</text>
    <text x="130" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#a5b4fc">ON-CHAIN</text>

    <!-- Verification checkmarks orbiting -->
    <g transform="translate(130, 130)">
      <circle cx="0" cy="-105" r="16" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="0" y="-100" text-anchor="middle" font-size="12">✓</text>

      <circle cx="90" cy="52" r="16" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="90" y="57" text-anchor="middle" font-size="12">✓</text>

      <circle cx="-90" cy="52" r="16" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="-90" y="57" text-anchor="middle" font-size="12">✓</text>
    </g>

    <!-- Chain connection lines -->
    <line x1="230" y1="80" x2="280" y2="60" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
    <line x1="230" y1="180" x2="280" y2="200" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>

    <!-- EAS label -->
    <rect x="280" y="44" rx="10" ry="10" width="80" height="28" fill="rgba(99, 102, 241, 0.15)" stroke="rgba(99, 102, 241, 0.3)" stroke-width="1"/>
    <text x="320" y="63" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#a5b4fc">EAS</text>

    <rect x="280" y="188" rx="10" ry="10" width="80" height="28" fill="rgba(139, 92, 246, 0.15)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1"/>
    <text x="320" y="207" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">Base L2</text>
  </g>

  <!-- Logo -->
  <text x="80" y="80" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Title -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">XP Attestation</text>

  <!-- Subtitle -->
  <text x="80" y="310" font-family="Inter, sans-serif" font-size="22" fill="#8b949e">Prove your crypto knowledge on-chain.</text>
  <text x="80" y="342" font-family="Inter, sans-serif" font-size="22" fill="#8b949e">Verifiable credentials via EAS on Base.</text>

  <!-- Feature pills -->
  <rect x="80" y="380" rx="16" ry="16" width="170" height="36" fill="rgba(139, 92, 246, 0.15)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1"/>
  <text x="165" y="404" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#c4b5fd">🛡️ On-Chain Proof</text>

  <rect x="266" y="380" rx="16" ry="16" width="155" height="36" fill="rgba(99, 102, 241, 0.15)" stroke="rgba(99, 102, 241, 0.3)" stroke-width="1"/>
  <text x="343" y="404" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#a5b4fc">⚡ XP Verified</text>

  <rect x="437" y="380" rx="16" ry="16" width="160" height="36" fill="rgba(6, 182, 212, 0.15)" stroke="rgba(6, 182, 212, 0.3)" stroke-width="1"/>
  <text x="517" y="404" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#67e8f9">🏆 Earn Badges</text>

  <!-- Bottom bar -->
  <rect y="596" width="1200" height="34" fill="rgba(0,0,0,0.4)"/>
  <text x="80" y="618" font-family="Inter, sans-serif" font-size="14" fill="#6e7681">degen0x.com/xp-attestation</text>
  <text x="1120" y="618" text-anchor="end" font-family="Inter, sans-serif" font-size="14" fill="#6e7681">The Crypto Knowledge Hub</text>
</svg>