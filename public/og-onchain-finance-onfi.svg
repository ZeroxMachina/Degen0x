<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="200" cy="300" r="250" fill="#4f46e5" opacity="0.05"/>
  <circle cx="1000" cy="350" r="200" fill="#0891b2" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="2">degen0x</text>

  <!-- Badges -->
  <rect x="60" y="140" width="65" height="28" rx="14" fill="rgba(31,111,235,0.2)" stroke="#1f6feb" stroke-width="1"/>
  <text x="92" y="159" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#58a6ff" text-anchor="middle">DeFi</text>
  <rect x="140" y="140" width="110" height="28" rx="14" fill="rgba(56,139,253,0.1)" stroke="#388bfd" stroke-width="1"/>
  <text x="195" y="159" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#79c0ff" text-anchor="middle">Intermediate</text>

  <!-- Title -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#title-grad)" letter-spacing="-1">On-Chain Finance</text>
  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#title-grad)" letter-spacing="-1">(OnFi)</text>

  <!-- Subtitle -->
  <text x="60" y="350" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">DeFi Meets Wall Street — Institutional Blockchain Finance in 2026</text>

  <!-- Key data points -->
  <g transform="translate(60, 400)">
    <rect x="0" y="0" width="200" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">INSTITUTIONAL TVL</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#22c55e">$17B+</text>
  </g>
  <g transform="translate(280, 400)">
    <rect x="0" y="0" width="200" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">TOKENIZED ASSETS</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#58a6ff">RWAs</text>
  </g>
  <g transform="translate(500, 400)">
    <rect x="0" y="0" width="200" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">COMPLIANCE</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#bc8cff">KYC/AML</text>
  </g>

  <!-- TradFi logos representation -->
  <g transform="translate(800, 200)">
    <rect x="0" y="0" width="330" height="240" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">KEY PLAYERS</text>
    <text x="24" y="70" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">🏦 BlackRock BUIDL</text>
    <text x="24" y="100" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">🔗 Ondo Finance USDY</text>
    <text x="24" y="130" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">🌿 Maple Finance</text>
    <text x="24" y="160" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">⚙️ Centrifuge</text>
    <text x="24" y="190" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">💧 Clearpool</text>
    <text x="24" y="220" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">+ more protocols...</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>