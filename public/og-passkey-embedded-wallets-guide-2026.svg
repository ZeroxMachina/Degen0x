<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="nodeGrad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="nodeGrad5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Background decorative circles -->
  <circle cx="950" cy="180" r="200" fill="#06b6d4" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="150" fill="#8b5cf6" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="1100" cy="450" r="100" fill="#ec4899" opacity="0.02" filter="url(#softGlow)"/>

  <!-- Passkey / Fingerprint visual -->
  <!-- Central passkey node -->
  <circle cx="900" cy="230" r="50" fill="url(#nodeGrad1)" opacity="0.9" filter="url(#glow)"/>
  <!-- Fingerprint icon (simplified) -->
  <g transform="translate(900, 230)" opacity="0.9">
    <path d="M-12,-18 C-20,-8 -20,8 -12,18" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M-4,-22 C-16,-8 -16,8 -4,22" stroke="white" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M4,-22 C-8,-8 -8,8 4,22" stroke="white" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M12,-18 C0,-8 0,8 12,18" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>
  </g>
  <text x="900" y="260" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" opacity="0.7" letter-spacing="1">PASSKEY</text>

  <!-- Provider nodes in orbit -->
  <!-- Coinbase -->
  <circle cx="770" cy="145" r="28" fill="url(#nodeGrad2)" opacity="0.85"/>
  <text x="770" y="143" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" font-weight="600">Coinbase</text>
  <text x="770" y="154" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="8" opacity="0.7">Smart Wallet</text>
  <line x1="794" y1="162" x2="858" y2="205" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>

  <!-- Privy -->
  <circle cx="1045" cy="145" r="28" fill="url(#nodeGrad3)" opacity="0.85"/>
  <text x="1045" y="143" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" font-weight="600">Privy</text>
  <text x="1045" y="154" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="8" opacity="0.7">by Stripe</text>
  <line x1="1021" y1="162" x2="942" y2="205" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>

  <!-- Dynamic -->
  <circle cx="1070" cy="310" r="28" fill="url(#nodeGrad4)" opacity="0.85"/>
  <text x="1070" y="308" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" font-weight="600">Dynamic</text>
  <text x="1070" y="319" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="8" opacity="0.7">Fireblocks</text>
  <line x1="1046" y1="294" x2="942" y2="255" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>

  <!-- Web3Auth -->
  <circle cx="745" cy="310" r="28" fill="url(#nodeGrad5)" opacity="0.85"/>
  <text x="745" y="308" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" font-weight="600">Web3Auth</text>
  <text x="745" y="319" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="8" opacity="0.7">MetaMask</text>
  <line x1="769" y1="294" x2="858" y2="255" stroke="#ec4899" stroke-width="1.5" opacity="0.4"/>

  <!-- Turnkey -->
  <circle cx="820" cy="390" r="24" fill="#8b5cf6" opacity="0.7"/>
  <text x="820" y="392" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" font-weight="600">Turnkey</text>
  <line x1="832" y1="370" x2="885" y2="275" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>

  <!-- Para -->
  <circle cx="990" cy="390" r="24" fill="#0ea5e9" opacity="0.7"/>
  <text x="990" y="392" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" font-weight="600">Para</text>
  <line x1="978" y1="370" x2="915" y2="275" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>

  <!-- Stats cards -->
  <g transform="translate(720, 440)">
    <rect x="0" y="0" width="120" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="60" y="25" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="16" font-weight="800">5.2B+</text>
    <text x="60" y="42" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">Wallet Users</text>
  </g>
  <g transform="translate(860, 440)">
    <rect x="0" y="0" width="120" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="60" y="25" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="16" font-weight="800">75M+</text>
    <text x="60" y="42" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">Privy Wallets</text>
  </g>
  <g transform="translate(1000, 440)">
    <rect x="0" y="0" width="120" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="60" y="25" text-anchor="middle" fill="#ec4899" font-family="Inter, sans-serif" font-size="16" font-weight="800">30+</text>
    <text x="60" y="42" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">Providers</text>
  </g>

  <!-- Logo area -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="14" fill="url(#brandGrad)" opacity="0.9"/>
    <text x="14" y="21" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="800">0x</text>
    <text x="40" y="22" fill="#e6edf3" font-family="Inter, sans-serif" font-size="16" font-weight="700">degen0x</text>
  </g>

  <!-- Badges -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="62" height="24" rx="12" fill="#06b6d420" stroke="#06b6d440" stroke-width="1"/>
    <text x="31" y="16" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="10" font-weight="600">Wallets</text>
    <rect x="70" y="0" width="68" height="24" rx="12" fill="#8b5cf620" stroke="#8b5cf640" stroke-width="1"/>
    <text x="104" y="16" text-anchor="middle" fill="#bc8cff" font-family="Inter, sans-serif" font-size="10" font-weight="600">Security</text>
  </g>

  <!-- Title -->
  <text x="60" y="180" fill="#e6edf3" font-family="Inter, sans-serif" font-size="40" font-weight="900" letter-spacing="-1">
    <tspan>Passkey &amp; Embedded</tspan>
  </text>
  <text x="60" y="228" fill="#e6edf3" font-family="Inter, sans-serif" font-size="36" font-weight="900" letter-spacing="-1" opacity="0.9">
    <tspan>Wallets Guide 2026</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="278" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">
    No Seed Phrases Required
  </text>
  <text x="60" y="303" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">
    Biometric Auth for Web3
  </text>

  <!-- Feature pills -->
  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="125" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="62" y="20" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="11" font-weight="600">Passkey Auth</text>
  </g>
  <g transform="translate(195, 340)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="11" font-weight="600">MPC Wallets</text>
  </g>
  <g transform="translate(325, 340)">
    <rect x="0" y="0" width="155" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="77" y="20" text-anchor="middle" fill="#ec4899" font-family="Inter, sans-serif" font-size="11" font-weight="600">Provider Comparison</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500">degen0x.com</text>
  <text x="1140" y="615" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="12">Learn · Wallets · Security</text>
</svg>