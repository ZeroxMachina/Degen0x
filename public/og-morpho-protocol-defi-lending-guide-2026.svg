<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="circleGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="circleGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Grid pattern -->
  <g stroke="#1a2332" stroke-width="1" opacity="0.3">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="140" cy="110" r="85" fill="url(#circleGrad1)"/>
  <circle cx="1060" cy="380" r="130" fill="url(#circleGrad2)"/>
  <circle cx="920" cy="140" r="65" fill="url(#circleGrad1)"/>
  <circle cx="260" cy="520" r="95" fill="url(#circleGrad2)"/>

  <!-- Category badges -->
  <rect x="120" y="80" width="140" height="36" rx="18" fill="#1a2332" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="104" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6" text-anchor="middle">DeFi</text>

  <rect x="290" y="80" width="140" height="36" rx="18" fill="#1a2332" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="104" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">Lending</text>

  <!-- Title -->
  <text x="600" y="195" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" text-anchor="middle">Morpho Protocol</text>
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" text-anchor="middle">Guide 2026</text>

  <!-- Subtitle -->
  <text x="600" y="295" font-family="Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle">Next-Gen DeFi Lending & Borrowing</text>

  <!-- Stats row -->
  <g>
    <!-- Stat 1 -->
    <rect x="200" y="320" width="170" height="72" rx="8" fill="#1a2332" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <text x="285" y="345" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3b82f6" text-anchor="middle">$5B+</text>
    <text x="285" y="365" font-family="Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">TVL</text>

    <!-- Stat 2 -->
    <rect x="515" y="320" width="170" height="72" rx="8" fill="#1a2332" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <text x="600" y="345" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#22c55e" text-anchor="middle">100+</text>
    <text x="600" y="365" font-family="Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Markets</text>

    <!-- Stat 3 -->
    <rect x="830" y="320" width="170" height="72" rx="8" fill="#1a2332" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <text x="915" y="345" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3b82f6" text-anchor="middle">3x</text>
    <text x="915" y="365" font-family="Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Capital Efficiency</text>
  </g>

  <!-- Key features -->
  <g>
    <circle cx="180" cy="440" r="4" fill="#3b82f6"/>
    <text x="200" y="447" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Peer-to-Peer Matching</text>

    <circle cx="180" cy="475" r="4" fill="#22c55e"/>
    <text x="200" y="482" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Rate Optimization</text>

    <circle cx="180" cy="510" r="4" fill="#3b82f6"/>
    <text x="200" y="517" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Composable Vaults</text>

    <circle cx="650" cy="440" r="4" fill="#22c55e"/>
    <text x="670" y="447" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Dynamic Pricing</text>

    <circle cx="650" cy="475" r="4" fill="#3b82f6"/>
    <text x="670" y="482" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Supply Curve Control</text>

    <circle cx="650" cy="510" r="4" fill="#22c55e"/>
    <text x="670" y="517" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Flash Loan Ready</text>
  </g>

  <!-- Bottom bar -->
  <rect y="590" width="1200" height="40" fill="#0a0f18" stroke="#1a2332" stroke-width="1"/>
  <text x="40" y="615" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">degen0x</text>
  <text x="1160" y="615" font-family="Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="end">March 2026</text>
</svg>