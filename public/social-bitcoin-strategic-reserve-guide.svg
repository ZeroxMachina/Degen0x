<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="60%" style="stop-color:#0c1228"/>
      <stop offset="100%" style="stop-color:#100d1e"/>
    </linearGradient>
    <!-- Brand signature gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#f0883e"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <!-- Title gradient (gold → amber) -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="45%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- BTC circle glow -->
    <radialGradient id="btcGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
      <stop offset="60%" style="stop-color:#f59e0b;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <!-- Subtle BG glow left -->
    <radialGradient id="leftGlow" cx="0%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"/>
    </radialGradient>
    <!-- Top accent bar gradient -->
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="40%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0"/>
    </linearGradient>
    <!-- Glass surface -->
    <filter id="glassBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <!-- Glow filter for logo -->
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- BTC icon glow -->
    <filter id="btcIconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Left indigo glow -->
  <rect width="1200" height="630" fill="url(#leftGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="680" height="4" fill="url(#accentBar)" rx="0"/>

  <!-- Decorative BTC ring right side -->
  <circle cx="920" cy="315" r="280" fill="url(#btcGlow)"/>
  <circle cx="920" cy="315" r="230" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.12" stroke-dasharray="8 12"/>
  <circle cx="920" cy="315" r="180" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.18" stroke-dasharray="4 8"/>
  <circle cx="920" cy="315" r="130" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.22" stroke-dasharray="6 6"/>

  <!-- BTC Symbol large -->
  <g transform="translate(920,315)" filter="url(#btcIconGlow)">
    <!-- Outer circle subtle -->
    <circle r="95" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
    <!-- ₿ stylized -->
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia, serif" font-size="96" font-weight="700"
          fill="url(#brandGrad)" opacity="0.9">₿</text>
  </g>

  <!-- Country flag dots around BTC (representing sovereign holders) -->
  <!-- US flag dot -->
  <circle cx="1046" cy="222" r="10" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5"/>
  <text x="1063" y="227" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">US 325K BTC</text>
  <!-- Bhutan dot -->
  <circle cx="1070" cy="280" r="10" fill="#f59e0b" stroke="#ffffff" stroke-width="1.5"/>
  <text x="1087" y="285" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">Bhutan ~13K</text>
  <!-- El Salvador dot -->
  <circle cx="1082" cy="340" r="10" fill="#22c55e" stroke="#ffffff" stroke-width="1.5"/>
  <text x="1099" y="345" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">El Salvador</text>
  <!-- Brazil dot -->
  <circle cx="1060" cy="398" r="10" fill="#84cc16" stroke="#ffffff" stroke-width="1.5"/>
  <text x="1077" y="403" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">Brazil (target)</text>
  <!-- Orbit line connecting them -->
  <path d="M 1046 222 Q 1100 230 1082 340 Q 1068 390 1060 398"
        fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 6"/>

  <!-- LEFT CONTENT AREA -->

  <!-- Small logo badge top-left -->
  <g transform="translate(58, 46)" filter="url(#logoGlow)">
    <circle r="14" fill="#4f46e5" opacity="0.9"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="white">0x</text>
  </g>
  <text x="82" y="58" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="0.5">degen0x</text>

  <!-- Breaking badge -->
  <rect x="58" y="108" width="126" height="26" rx="13"
        fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="76" cy="121" r="4" fill="#f59e0b"/>
  <text x="88" y="126" font-family="Inter, sans-serif" font-size="12" font-weight="600"
        fill="#f59e0b" letter-spacing="0.5">OFFICIAL RESERVE</text>

  <!-- Main headline -->
  <text x="58" y="205" font-family="Inter, sans-serif" font-size="70" font-weight="900"
        fill="url(#titleGrad)" letter-spacing="-2">BITCOIN</text>
  <text x="58" y="280" font-family="Inter, sans-serif" font-size="70" font-weight="900"
        fill="#e6edf3" letter-spacing="-2">STRATEGIC</text>
  <text x="58" y="355" font-family="Inter, sans-serif" font-size="70" font-weight="900"
        fill="#e6edf3" letter-spacing="-2">RESERVE</text>

  <!-- Subheadline -->
  <text x="60" y="400" font-family="Inter, sans-serif" font-size="20" font-weight="400"
        fill="#8b949e">Which governments are HODLing — and what it means for price</text>

  <!-- Data pills row -->
  <!-- Pill 1: US Holdings -->
  <rect x="58" y="428" width="172" height="42" rx="10"
        fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="78" y="444" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" font-weight="500">🇺🇸 US HOLDS</text>
  <text x="78" y="460" font-family="Inter, sans-serif" font-size="15" fill="#fbbf24" font-weight="700">325,000 BTC</text>

  <!-- Pill 2: Supply % -->
  <rect x="242" y="428" width="148" height="42" rx="10"
        fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="262" y="444" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" font-weight="500">SUPPLY HELD</text>
  <text x="262" y="460" font-family="Inter, sans-serif" font-size="15" fill="#fbbf24" font-weight="700">1.6% of 21M</text>

  <!-- Pill 3: Countries -->
  <rect x="402" y="428" width="148" height="42" rx="10"
        fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="422" y="444" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" font-weight="500">COUNTRIES</text>
  <text x="422" y="460" font-family="Inter, sans-serif" font-size="15" fill="#fbbf24" font-weight="700">5+ Stacking</text>

  <!-- Live tracker pill -->
  <rect x="58" y="485" width="180" height="34" rx="17"
        fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.5)" stroke-width="1"/>
  <circle cx="76" cy="502" r="4" fill="#22c55e"/>
  <text x="88" y="507" font-family="Inter, sans-serif" font-size="13" font-weight="600"
        fill="#22c55e">LIVE TRACKER</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(255,255,255,0.025)"/>
  <rect x="0" y="590" width="1200" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Logo in bottom bar -->
  <circle cx="70" cy="610" r="11" fill="#4f46e5" opacity="0.9"/>
  <text x="70" y="614" text-anchor="middle" font-family="Inter, sans-serif"
        font-size="9" font-weight="800" fill="white">0x</text>
  <text x="92" y="614" font-family="Inter, sans-serif" font-size="14" font-weight="600"
        fill="#8b949e">degen0x.com</text>

  <!-- Divider in bottom bar -->
  <rect x="210" y="599" width="1" height="22" fill="rgba(255,255,255,0.1)"/>

  <text x="228" y="614" font-family="Inter, sans-serif" font-size="13" fill="#6e7681">
    Interactive Sovereign BTC Tracker — No signup required
  </text>

  <!-- Bottom right: category tag -->
  <text x="1140" y="614" text-anchor="end" font-family="Inter, sans-serif"
        font-size="13" fill="#f59e0b" font-weight="500">Bitcoin</text>
</svg>
