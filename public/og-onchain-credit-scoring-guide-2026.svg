<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="25%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="75%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <ellipse cx="250" cy="300" rx="300" ry="250" fill="#8b5cf6" opacity="0.05"/>
  <ellipse cx="950" cy="350" rx="250" ry="200" fill="#0891b2" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="150" width="60" height="32" rx="6" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="1"/>
  <text x="90" y="171" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">DeFi</text>

  <rect x="132" y="150" width="72" height="32" rx="6" fill="#58a6ff20" stroke="#58a6ff" stroke-width="1"/>
  <text x="168" y="171" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#58a6ff" text-anchor="middle">Credit</text>

  <rect x="216" y="150" width="110" height="32" rx="6" fill="#f0883e20" stroke="#f0883e" stroke-width="1"/>
  <text x="271" y="171" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0883e" text-anchor="middle">Intermediate</text>

  <!-- Main title -->
  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Onchain Credit Scoring</text>
  <text x="60" y="310" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-size="21" fill="#8b949e">DeFi credit ratings: Credora vs Spectral vs Cred Protocol</text>

  <!-- Credit score visualization -->
  <rect x="60" y="410" width="540" height="130" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Score bar -->
  <text x="85" y="445" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">MACRO Credit Score</text>
  <rect x="85" y="458" width="490" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
  <rect x="85" y="458" width="380" height="10" rx="5" fill="url(#scoreGrad)"/>
  <circle cx="465" cy="463" r="8" fill="#0891b2" stroke="#080d1c" stroke-width="2"/>
  <text x="85" y="490" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">300</text>
  <text x="540" y="490" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">850</text>
  <text x="445" y="490" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0891b2">748</text>

  <!-- Labels -->
  <text x="85" y="525" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Undercollateralized Lending · ZK Privacy · $12T+ Market Opportunity</text>

  <!-- Decorative: protocol comparison -->
  <rect x="720" y="200" width="400" height="300" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="750" y="240" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#8b949e">Protocol Comparison</text>

  <text x="750" y="280" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">Credora</text>
  <rect x="860" y="268" width="220" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="860" y="268" width="200" height="8" rx="4" fill="#8b5cf6" opacity="0.7"/>

  <text x="750" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0891b2">Spectral</text>
  <rect x="860" y="308" width="220" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="860" y="308" width="170" height="8" rx="4" fill="#0891b2" opacity="0.7"/>

  <text x="750" y="360" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">Cred Protocol</text>
  <rect x="860" y="348" width="220" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="860" y="348" width="140" height="8" rx="4" fill="#22c55e" opacity="0.7"/>

  <text x="750" y="410" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">RedStone Stack · ML Scoring · Real-Time</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>
