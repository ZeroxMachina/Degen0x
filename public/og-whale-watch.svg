<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0c1529"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accentBar)"/>

  <!-- Decorative glow circles -->
  <circle cx="900" cy="200" r="200" fill="#6366f1" opacity="0.06"/>
  <circle cx="300" cy="450" r="150" fill="#0891b2" opacity="0.05"/>
  <circle cx="1050" cy="500" r="120" fill="#d97706" opacity="0.04"/>

  <!-- Logo area -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Whale emoji icon -->
  <text x="60" y="210" font-size="72">🐋</text>

  <!-- Title -->
  <text x="60" y="310" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#f1f5f9" letter-spacing="-0.02em">Whale Watch</text>

  <!-- Subtitle -->
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e" letter-spacing="-0.01em">Real-time large transaction monitoring across ETH, SOL, BTC &amp; ARB</text>

  <!-- Mock stat cards -->
  <!-- Card 1 -->
  <rect x="60" y="410" width="240" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="442" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">24H Volume</text>
  <text x="80" y="472" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">$847.3M</text>

  <!-- Card 2 -->
  <rect x="320" y="410" width="240" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="340" y="442" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Largest Tx</text>
  <text x="340" y="472" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">$42.1M</text>

  <!-- Card 3 -->
  <rect x="580" y="410" width="240" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="600" y="442" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Active Whales</text>
  <text x="600" y="472" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">1,247</text>

  <!-- Live badge -->
  <rect x="1020" y="50" width="120" height="36" rx="18" fill="#22c55e"/>
  <circle cx="1048" cy="68" r="5" fill="#fff" opacity="0.9"/>
  <text x="1062" y="74" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">LIVE</text>

  <!-- Decorative chart line -->
  <polyline points="840,430 870,410 900,420 930,390 960,400 990,370 1020,380 1050,350 1080,360 1110,330 1140,340" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Bottom bar -->
  <rect y="610" width="1200" height="20" fill="rgba(255,255,255,0.03)"/>
  <text x="60" y="590" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com/whale-watch</text>
</svg>
