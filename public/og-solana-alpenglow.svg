<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9945ff"/>
      <stop offset="50%" stop-color="#14f195"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow1" cx="0.3" cy="0.4" r="0.5" fx="0.3" fy="0.4" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#9945ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9945ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="0.7" cy="0.6" r="0.4" fx="0.7" fy="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#14f195" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#14f195" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="350" cy="250" r="300" fill="#9945ff" opacity="0.06"/>
  <circle cx="900" cy="400" r="250" fill="#14f195" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo area -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="2">degen0x</text>

  <!-- Speed visualization -->
  <g transform="translate(800, 180)">
    <rect x="0" y="0" width="320" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">FINALITY COMPARISON</text>
    <text x="24" y="65" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Before:</text>
    <text x="100" y="65" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f85149">~12.8s</text>
    <rect x="170" y="52" width="130" height="18" rx="4" fill="rgba(248,81,73,0.15)"/>
    <rect x="170" y="52" width="130" height="18" rx="4" fill="#f85149" opacity="0.3"/>
    <text x="24" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">After:</text>
    <text x="100" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#14f195">150ms</text>
    <rect x="170" y="87" width="15" height="18" rx="4" fill="#14f195" opacity="0.4"/>
  </g>

  <!-- Category badge -->
  <rect x="60" y="160" width="80" height="28" rx="14" fill="rgba(153,69,255,0.15)" stroke="#9945ff" stroke-width="1"/>
  <text x="100" y="179" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#9945ff" text-anchor="middle">Layer 1</text>

  <!-- Title -->
  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="54" font-weight="800" fill="url(#accent)" letter-spacing="-1">Solana Alpenglow</text>

  <!-- Subtitle -->
  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">150ms Finality — 100x Faster Consensus</text>
  <text x="60" y="335" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#6e7681">How Votor + Rotor rewire Solana's engine in 2026</text>

  <!-- Key stats -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="180" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">PROPAGATION</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#14f195">18ms</text>
  </g>
  <g transform="translate(260, 380)">
    <rect x="0" y="0" width="180" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">IMPROVEMENT</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#9945ff">~100x</text>
  </g>
  <g transform="translate(460, 380)">
    <rect x="0" y="0" width="180" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">FAST PATH</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#06b6d4">≥80%</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>