<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <!-- Background gradient — dark amber/amber tint for urgency -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0e0a"/>
      <stop offset="55%" stop-color="#0e0d10"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <!-- Brand signature -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Urgency title gradient -->
    <linearGradient id="urgencyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <!-- Cool title gradient for bottom section -->
    <linearGradient id="coolGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="amberGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="amberAtmo" cx="15%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="indigoAtmo" cx="80%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#amberAtmo)"/>
  <rect width="1200" height="630" fill="url(#indigoAtmo)"/>
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.8" fill="rgba(255,255,255,0.025)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ═══ TOP ACCENT BAR ═══ -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#urgencyGrad)"/>

  <!-- ═══ URGENCY BADGE ═══ -->
  <rect x="48" y="36" width="200" height="34" rx="17" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Pulsing dot -->
  <circle cx="74" cy="53" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <text x="155" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24" letter-spacing="0.08em">FOMC — 48 HOURS</text>

  <!-- ═══ LARGE COUNTDOWN NUMBER ═══ -->
  <text x="48" y="172" font-size="110" font-weight="900" letter-spacing="-0.05em" fill="url(#urgencyGrad)" opacity="0.15">48H</text>

  <!-- Title overlay -->
  <text x="48" y="168" font-size="82" font-weight="900" letter-spacing="-0.04em" fill="url(#urgencyGrad)">Fed Decision</text>
  <text x="48" y="248" font-size="42" font-weight="700" letter-spacing="-0.02em" fill="#e6edf3">is 2 days away.</text>
  <text x="48" y="290" font-size="20" fill="#8b949e">Here's what moves in crypto when the Fed cuts rates.</text>

  <!-- ═══ IMPACT CARDS — horizontal strip ═══ -->
  <!-- Card 1: BTC/ETH -->
  <rect x="48" y="320" width="248" height="100" rx="14" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="172" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#4ade80" letter-spacing="0.08em">BTC / ETH</text>
  <text x="172" y="378" text-anchor="middle" font-size="24" font-weight="800" fill="#4ade80">+15–30%</text>
  <text x="172" y="400" text-anchor="middle" font-size="12" fill="#8b949e">avg 72h post-cut</text>

  <!-- Card 2: Stablecoin Yield -->
  <rect x="308" y="320" width="248" height="100" rx="14" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="432" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#fbbf24" letter-spacing="0.08em">STABLECOIN YIELD</text>
  <text x="432" y="378" text-anchor="middle" font-size="24" font-weight="800" fill="#fbbf24">Reprices</text>
  <text x="432" y="400" text-anchor="middle" font-size="12" fill="#8b949e">DeFi APYs shift same day</text>

  <!-- Card 3: Tokenized T-Bills -->
  <rect x="568" y="320" width="248" height="100" rx="14" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="692" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#f87171" letter-spacing="0.08em">TOKENIZED T-BILLS</text>
  <text x="692" y="378" text-anchor="middle" font-size="24" font-weight="800" fill="#f87171">Yield ↓</text>
  <text x="692" y="400" text-anchor="middle" font-size="12" fill="#8b949e">On-chain rates follow Fed</text>

  <!-- Card 4: DCA Signal -->
  <rect x="828" y="320" width="320" height="100" rx="14" fill="rgba(99,102,241,0.10)" stroke="rgba(99,102,241,0.3)" stroke-width="1.5"/>
  <text x="988" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#818cf8" letter-spacing="0.08em">SMART MOVE</text>
  <text x="988" y="378" text-anchor="middle" font-size="24" font-weight="800" fill="url(#coolGrad)">DCA the dip</text>
  <text x="988" y="400" text-anchor="middle" font-size="12" fill="#8b949e">Run your numbers before it hits</text>

  <!-- ═══ CTA STRIP ═══ -->
  <rect x="48" y="446" width="728" height="56" rx="14" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1.5"/>
  <text x="412" y="469" text-anchor="middle" font-size="14" fill="#8b949e">Run your DCA scenario now →</text>
  <text x="412" y="491" text-anchor="middle" font-size="18" font-weight="700" fill="#818cf8">degen0x.com/tools/dca-calculator</text>

  <!-- Stablecoin yield CTA -->
  <rect x="800" y="446" width="350" height="56" rx="14" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="975" y="469" text-anchor="middle" font-size="14" fill="#8b949e">Full yield breakdown →</text>
  <text x="975" y="491" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">degen0x.com/learn/stablecoin-yield</text>

  <!-- ═══ TIMELINE BAR ═══ -->
  <rect x="48" y="528" width="1104" height="40" rx="10" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Timeline points -->
  <!-- NOW -->
  <circle cx="100" cy="548" r="7" fill="#f59e0b" filter="url(#glow)"/>
  <text x="100" y="572" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">NOW</text>
  <text x="100" y="543" text-anchor="middle" font-size="10" fill="#8b949e">Mar 16</text>

  <!-- T-1 -->
  <circle cx="340" cy="548" r="5" fill="rgba(245,158,11,0.5)"/>
  <text x="340" y="572" text-anchor="middle" font-size="10" fill="#8b949e">Mar 17</text>
  <text x="340" y="543" text-anchor="middle" font-size="10" fill="#6e7681">Position</text>

  <!-- FOMC DAY -->
  <circle cx="600" cy="548" r="8" fill="#ef4444" filter="url(#glow)"/>
  <text x="600" y="572" text-anchor="middle" font-size="11" font-weight="700" fill="#f87171">FOMC DAY</text>
  <text x="600" y="543" text-anchor="middle" font-size="10" fill="#8b949e">Mar 18</text>

  <!-- POST-CUT -->
  <circle cx="860" cy="548" r="5" fill="rgba(34,197,94,0.5)"/>
  <text x="860" y="572" text-anchor="middle" font-size="10" fill="#8b949e">Mar 19–20</text>
  <text x="860" y="543" text-anchor="middle" font-size="10" fill="#4ade80">Move</text>

  <!-- SETTLED -->
  <circle cx="1100" cy="548" r="5" fill="rgba(99,102,241,0.5)"/>
  <text x="1100" y="572" text-anchor="middle" font-size="10" fill="#8b949e">Mar 21+</text>
  <text x="1100" y="543" text-anchor="middle" font-size="10" fill="#818cf8">Settled</text>

  <!-- Timeline line -->
  <line x1="100" y1="548" x2="1100" y2="548" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- ═══ BOTTOM BAR ═══ -->
  <rect x="0" y="596" width="1200" height="34" fill="rgba(0,0,0,0.45)"/>
  <circle cx="52" cy="613" r="10" fill="rgba(99,102,241,0.3)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="52" y="618" text-anchor="middle" font-size="9" font-weight="800" fill="#818cf8">0x</text>
  <text x="70" y="618" font-size="13" font-weight="700" fill="#e6edf3">degen0x.com</text>
  <text x="170" y="618" font-size="13" fill="#6e7681">· Tools &amp; guides for the rate-cut trade</text>
  <rect x="1000" y="601" width="178" height="24" rx="12" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1089" y="617" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">⚡ FOMC T-2 DAYS</text>
</svg>
