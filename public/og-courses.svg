<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow1" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Ambient glow circles -->
  <circle cx="250" cy="200" r="300" fill="#6366f1" opacity="0.06"/>
  <circle cx="950" cy="450" r="280" fill="#06b6d4" opacity="0.05"/>
  <circle cx="600" cy="80" r="200" fill="#f59e0b" opacity="0.03"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.02" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo area -->
  <circle cx="100" cy="72" r="18" fill="#6366f1" opacity="0.15"/>
  <text x="100" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" fill="#818cf8" text-anchor="middle">0x</text>
  <text x="130" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="140" width="100" height="30" rx="15" fill="#6366f120" stroke="#6366f150" stroke-width="1"/>
  <text x="130" y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="0.05em">LEARN</text>

  <!-- Title -->
  <text x="80" y="230" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-0.03em">Free Crypto</text>
  <text x="80" y="295" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="url(#accent)" letter-spacing="-0.03em">Courses</text>

  <!-- Subtitle -->
  <text x="80" y="345" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">
    Bitcoin · DeFi · Solana · L2s · Security — Earn XP as you learn
  </text>

  <!-- Decorative course card icons -->
  <!-- Card 1: Book icon -->
  <g transform="translate(700, 140)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Book icon -->
    <path d="M 28 25 L 28 60 Q 30 58 35 58 Q 40 58 42 60 L 42 25" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
    <line x1="35" y1="25" x2="35" y2="58" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Bitcoin 101</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Beginner</text>
  </g>

  <!-- Card 2: Progress bar -->
  <g transform="translate(720, 235)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Progress bars icon -->
    <rect x="22" y="28" width="18" height="32" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="22" y="38" width="18" height="22" fill="#f59e0b" opacity="0.8" rx="1.5"/>
    <rect x="45" y="28" width="18" height="32" rx="2" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="45" y="30" width="18" height="30" fill="#06b6d4" opacity="0.8" rx="1.5"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">DeFi Basics</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Intermediate</text>
  </g>

  <!-- Card 3: Badge icon -->
  <g transform="translate(740, 330)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Badge/shield icon -->
    <path d="M 35 25 L 35 42 Q 35 50 42 53 Q 49 50 49 42 L 49 25 Z" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="42" cy="40" r="3" fill="#818cf8"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Security 201</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Advanced</text>
  </g>

  <!-- Card 4: Solana chain -->
  <g transform="translate(950, 180)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Connected nodes icon -->
    <circle cx="28" cy="38" r="4" fill="#14F195"/>
    <circle cx="42" cy="32" r="4" fill="#14F195"/>
    <circle cx="56" cy="38" r="4" fill="#14F195"/>
    <line x1="31" y1="37" x2="39" y2="33" stroke="#14F195" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="45" y1="31" x2="53" y2="37" stroke="#14F195" stroke-width="1" stroke-opacity="0.6"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Solana Deep</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Intermediate</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="white" fill-opacity="0.02"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="white" stroke-opacity="0.06"/>
  <text x="80" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1120" y="612" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Free · No signup · Open source</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>