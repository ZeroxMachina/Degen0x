<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="green-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative background circles -->
  <circle cx="1120" cy="120" r="150" fill="#22c55e" opacity="0.04"/>
  <circle cx="100" cy="500" r="140" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="900" cy="550" r="120" fill="#22c55e" opacity="0.03"/>

  <!-- IoT mesh network visualization (right side) -->
  <g opacity="0.65">
    <!-- Hexagonal mesh pattern -->
    <!-- Top row -->
    <line x1="950" y1="80" x2="1000" y2="100" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
    <line x1="1000" y1="100" x2="1050" y2="80" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="1050" y1="80" x2="1100" y2="100" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

    <!-- Central nodes and connections -->
    <circle cx="950" cy="80" r="8" fill="#22c55e" opacity="0.25"/>
    <circle cx="1000" cy="100" r="10" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="1050" cy="80" r="8" fill="#22c55e" opacity="0.25"/>
    <circle cx="1100" cy="100" r="10" fill="#8b5cf6" opacity="0.3"/>

    <!-- Middle layer -->
    <line x1="1000" y1="100" x2="950" y2="150" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="1000" y1="100" x2="1050" y2="150" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
    <line x1="1050" y1="80" x2="1000" y2="150" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="1050" y1="80" x2="1100" y2="150" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
    <line x1="1100" y1="100" x2="1050" y2="150" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

    <circle cx="950" cy="150" r="8" fill="#22c55e" opacity="0.25"/>
    <circle cx="1000" cy="130" r="9" fill="#8b5cf6" opacity="0.28"/>
    <circle cx="1050" cy="150" r="8" fill="#22c55e" opacity="0.25"/>
    <circle cx="1100" cy="150" r="8" fill="#22c55e" opacity="0.25"/>

    <!-- Bottom layer -->
    <line x1="950" y1="150" x2="1000" y2="210" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
    <line x1="1050" y1="150" x2="1020" y2="210" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="1100" y1="150" x2="1080" y2="210" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

    <circle cx="1000" cy="210" r="10" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="1020" cy="210" r="8" fill="#22c55e" opacity="0.25"/>
    <circle cx="1080" cy="210" r="8" fill="#22c55e" opacity="0.25"/>

    <!-- Secondary mesh section (lower) -->
    <line x1="950" y1="280" x2="1020" y2="310" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <line x1="1020" y1="310" x2="1090" y2="280" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
    <line x1="1090" y1="280" x2="1050" y2="340" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>

    <circle cx="950" cy="280" r="7" fill="#22c55e" opacity="0.2"/>
    <circle cx="1020" cy="310" r="9" fill="#8b5cf6" opacity="0.25"/>
    <circle cx="1090" cy="280" r="7" fill="#22c55e" opacity="0.2"/>
    <circle cx="1050" cy="340" r="7" fill="#22c55e" opacity="0.2"/>
  </g>

  <!-- Logo (top-left) -->
  <g>
    <circle cx="50" cy="35" r="20" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="50" y="42" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#22c55e" text-anchor="middle">0x</text>
    <text x="80" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ffffff">degen0x</text>
  </g>

  <!-- Category badges -->
  <g>
    <rect x="60" y="80" width="90" height="30" rx="20" fill="rgba(34, 197, 94, 0.15)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="105" y="100" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">DePIN</text>

    <rect x="170" y="80" width="100" height="30" rx="20" fill="rgba(139, 92, 246, 0.15)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="220" y="100" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" text-anchor="middle">Earning</text>
  </g>

  <!-- Main title -->
  <text x="60" y="170" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#ffffff">DePIN Earning</text>
  <text x="60" y="240" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#22c55e">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">Earn Crypto with Physical Infrastructure</text>

  <!-- Feature pills -->
  <g filter="url(#shadow)">
    <rect x="60" y="330" width="180" height="60" rx="8" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="1"/>
    <text x="150" y="352" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="middle">$50B+</text>
    <text x="150" y="380" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">Market Cap</text>

    <rect x="280" y="330" width="180" height="60" rx="8" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="370" y="356" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#8b5cf6" text-anchor="middle">Helium</text>
    <text x="370" y="380" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">Hivemapper</text>

    <rect x="500" y="330" width="180" height="60" rx="8" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="1"/>
    <text x="590" y="352" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="middle">Real</text>
    <text x="590" y="380" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">Hardware</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0, 0, 0, 0.3)"/>
  <text x="60" y="615" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500">degen0x.com</text>
</svg>
