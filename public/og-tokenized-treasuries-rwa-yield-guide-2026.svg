<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>
  <rect width="1200" height="8" fill="url(#gradAccent2)"/>

  <!-- decorative circles -->
  <circle cx="160" cy="180" r="48" fill="none" stroke="#0891b2" stroke-width="1.5" opacity="0.25"/>
  <circle cx="1070" cy="510" r="52" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.2"/>
  <circle cx="1090" cy="170" r="38" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.15"/>

  <!-- decorative treasury/bond document outlines -->
  <g opacity="0.35">
    <!-- document 1 -->
    <rect x="940" y="360" width="50" height="70" fill="none" stroke="#0891b2" stroke-width="1.5" rx="2"/>
    <line x1="950" y1="375" x2="980" y2="375" stroke="#0891b2" stroke-width="1"/>
    <line x1="950" y1="390" x2="980" y2="390" stroke="#0891b2" stroke-width="1"/>
    <line x1="950" y1="405" x2="975" y2="405" stroke="#0891b2" stroke-width="1"/>

    <!-- document 2 -->
    <rect x="1010" y="380" width="50" height="70" fill="none" stroke="#d97706" stroke-width="1.5" rx="2"/>
    <line x1="1020" y1="395" x2="1050" y2="395" stroke="#d97706" stroke-width="1"/>
    <line x1="1020" y1="410" x2="1050" y2="410" stroke="#d97706" stroke-width="1"/>
    <line x1="1020" y1="425" x2="1045" y2="425" stroke="#d97706" stroke-width="1"/>

    <!-- percentage symbol -->
    <text x="1070" y="490" font-family="Inter, sans-serif" font-size="52" font-weight="700" fill="#4f46e5" opacity="0.4">%</text>
  </g>

  <!-- badge -->
  <text x="80" y="120" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#06b6d4" opacity="0.9">RWA &amp; YIELD</text>

  <!-- title -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Tokenized Treasuries &amp;</text>
  <text x="80" y="310" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#ffffff">RWA Yield Guide 2026</text>

  <!-- subtitle -->
  <text x="80" y="370" font-family="Inter, sans-serif" font-size="17" fill="#8b949e">How to earn real-world asset yields on-chain with T-Bills and bonds</text>

  <!-- degen0x branding -->
  <text x="1120" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end" opacity="0.8">degen0x.com</text>

  <!-- bottom gradient line -->
  <rect y="622" width="1200" height="8" fill="url(#gradAccent2)" opacity="0.5"/>
</svg>