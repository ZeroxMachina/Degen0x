<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Decorative glowing circles -->
  <circle cx="150" cy="100" r="80" fill="#ec4899" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1050" cy="550" r="120" fill="#8b5cf6" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1100" cy="80" r="60" fill="#8b5cf6" opacity="0.06" filter="url(#glow)"/>

  <!-- Logo text (degen0x) -->
  <text x="50" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="1">degen0x</text>

  <!-- Category badges -->
  <g>
    <!-- Badge 1: DeFi -->
    <rect x="50" y="90" width="80" height="32" rx="16" fill="rgba(236, 72, 153, 0.2)" stroke="#ec4899" stroke-width="1"/>
    <text x="90" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ec4899" text-anchor="middle">DeFi</text>

    <!-- Badge 2: Perpetuals -->
    <rect x="150" y="90" width="120" height="32" rx="16" fill="rgba(139, 92, 246, 0.2)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="210" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">Perpetuals</text>

    <!-- Badge 3: 2026 -->
    <rect x="290" y="90" width="80" height="32" rx="16" fill="rgba(236, 72, 153, 0.2)" stroke="#ec4899" stroke-width="1"/>
    <text x="330" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ec4899" text-anchor="middle">2026</text>
  </g>

  <!-- Title -->
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff">Paradex: ZK Perpetuals</text>
  <text x="50" y="280" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#8b5cf6">Trading Guide 2026</text>

  <!-- Subtitle -->
  <text x="50" y="330" font-family="Arial, sans-serif" font-size="20" fill="#9ca3af">Self-custodial perpetual DEX powered by Starknet ZK proofs</text>

  <!-- Stats cards -->
  <g>
    <!-- Card 1: Type -->
    <rect x="50" y="380" width="260" height="140" rx="12" fill="rgba(236, 72, 153, 0.1)" stroke="rgba(236, 72, 153, 0.3)" stroke-width="1"/>
    <text x="70" y="410" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Type</text>
    <text x="70" y="450" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ec4899">Perp DEX</text>

    <!-- Card 2: Network -->
    <rect x="340" y="380" width="260" height="140" rx="12" fill="rgba(139, 92, 246, 0.1)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1"/>
    <text x="360" y="410" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Network</text>
    <text x="360" y="450" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#8b5cf6">Starknet</text>

    <!-- Card 3: Custody -->
    <rect x="630" y="380" width="260" height="140" rx="12" fill="rgba(236, 72, 153, 0.1)" stroke="rgba(236, 72, 153, 0.3)" stroke-width="1"/>
    <text x="650" y="410" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Custody</text>
    <text x="650" y="450" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ec4899">Self-Custodial</text>

    <!-- Card 4: Proofs -->
    <rect x="920" y="380" width="230" height="140" rx="12" fill="rgba(139, 92, 246, 0.1)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1"/>
    <text x="940" y="410" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Proofs</text>
    <text x="940" y="450" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#8b5cf6">ZK-STARKs</text>
  </g>

  <!-- Footer -->
  <text x="1150" y="610" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#6b7280" text-anchor="end">degen0x.com</text>
</svg>
