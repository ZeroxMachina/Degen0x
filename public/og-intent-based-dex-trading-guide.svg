    <text x="20" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">INTENT DEX VOLUME</text>
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#06b6d4">$120B+</text>
    <text x="20" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e">▲ 40% of DEX volume</text>

    <rect x="270" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="290" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">AVG PRICE IMPROVEMENT</text>
    <text x="290" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#22c55e">0.3–0.8%</text>
    <text x="290" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">vs traditional AMM swaps</text>

    <rect x="540" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
