      <rect x="130" y="0" width="120" height="28" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b50" stroke-width="1"/>
      <text x="190" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#f59e0b">1inch Fusion</text>

      <rect x="260" y="0" width="120" height="28" rx="6" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e50" stroke-width="1"/>
      <text x="320" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#22c55e">CoW Protocol</text>

      <rect x="390" y="0" width="90" height="28" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf650" stroke-width="1"/>
      <text x="435" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#8b5cf6">Across</text>

      <rect x="490" y="0" width="80" height="28" rx="6" fill="#ef4444" fill-opacity="0.1" stroke="#ef444450" stroke-width="1"/>
      <text x="530" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ef4444">deBridge</text>
