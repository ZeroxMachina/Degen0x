    <text x="560" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Solver pays gas for you</text>

    <rect x="810" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="830" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">MEV PROTECTION</text>
    <text x="830" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#8b5cf6">100%</text>
    <text x="830" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Frontrun &amp; sandwich proof</text>
