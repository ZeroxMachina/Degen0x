    <text x="80" y="46" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Sign off-chain order</text>

    <line x1="170" y1="30" x2="220" y2="30" stroke="#30363d" stroke-width="2"/>

    <rect x="230" y="0" width="160" height="60" rx="10" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="310" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#8b5cf6">Solver Auction</text>
    <text x="310" y="46" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Compete for best fill</text>

