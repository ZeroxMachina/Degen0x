    <rect x="460" y="0" width="160" height="60" rx="10" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="540" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">Cross-DEX</text>
    <text x="540" y="46" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Route across venues</text>

    <line x1="630" y1="30" x2="680" y2="30" stroke="#30363d" stroke-width="2"/>

    <rect x="690" y="0" width="160" height="60" rx="10" fill="#22c55e" fill-opacity="0.25" stroke="#22c55e" stroke-width="2"/>
