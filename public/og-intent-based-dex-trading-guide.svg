    <line x1="200" y1="0" x2="1200" y2="500" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="#22c55e" stroke-width="1"/>
    <line x1="0" y1="400" x2="600" y2="630" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <circle cx="180" cy="150" r="200" fill="#06b6d4" opacity="0.05"/>
