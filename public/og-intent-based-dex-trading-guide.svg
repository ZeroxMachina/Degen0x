  <text x="80" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e">How solvers find your best price — UniswapX, 1inch Fusion, CoW Protocol</text>

  <!-- Stat cards -->
  <g transform="translate(60, 140)">
