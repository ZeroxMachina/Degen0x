<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#080d1c"/>
  <ellipse cx="120" cy="100" rx="200" ry="190" fill="url(#accentGrad)" opacity="0.07"/>
  <ellipse cx="1080" cy="530" rx="200" ry="180" fill="url(#accentGrad)" opacity="0.05"/>
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" stroke="url(#accentGrad)" stroke-width="1"/>
  <!-- Chart line going up -->
  <g transform="translate(350, 130)" opacity="0.3">
    <polyline points="0,80 80,70 160,50 240,60 320,30 400,10 480,0" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="0,80 80,70 160,50 240,60 320,30 400,10 480,0 480,80 0,80" fill="#22c55e" opacity="0.1"/>
  </g>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Crypto Investing</text>
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="28" fill="#8b949e" text-anchor="middle">Best Picks, Staking &amp; Yield Strategies</text>
  <line x1="350" y1="370" x2="850" y2="370" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
  <rect x="280" y="400" width="180" height="40" rx="20" fill="#22c55e" opacity="0.15"/>
  <text x="370" y="426" font-family="Arial, sans-serif" font-size="15" fill="#22c55e" text-anchor="middle">Staking</text>
  <rect x="500" y="400" width="200" height="40" rx="20" fill="#6366f1" opacity="0.15"/>
  <text x="600" y="426" font-family="Arial, sans-serif" font-size="15" fill="#6366f1" text-anchor="middle">Yield Farming</text>
  <rect x="740" y="400" width="180" height="40" rx="20" fill="#f59e0b" opacity="0.15"/>
  <text x="830" y="426" font-family="Arial, sans-serif" font-size="15" fill="#f59e0b" text-anchor="middle">AI Crypto</text>
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle" opacity="0.8">degen0x.com</text>
