<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient4" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#mainGradient)"/>

  <!-- Decorative bars -->
  <rect x="80" y="480" width="120" height="8" fill="url(#accentGradient4)" rx="4"/>
  <rect x="240" y="490" width="100" height="6" fill="url(#accentGradient4)" rx="3"/>
  <rect x="380" y="485" width="90" height="7" fill="url(#accentGradient4)" rx="3" opacity="0.6"/>

  <rect x="920" y="480" width="100" height="6" fill="url(#accentGradient4)" rx="3"/>
  <rect x="1050" y="490" width="130" height="8" fill="url(#accentGradient4)" rx="4"/>

  <!-- Glass morphism card background -->
  <rect x="60" y="100" width="1080" height="430" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" rx="12"/>

  <!-- Category badge -->
  <g>
    <rect x="80" y="120" width="140" height="40" fill="rgba(79,70,229,0.2)" stroke="rgba(79,70,229,0.5)" stroke-width="1" rx="6"/>
    <text x="150" y="147" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#4f46e5" text-anchor="middle">ECOSYSTEM</text>
  </g>

  <!-- Title -->
  <text x="600" y="220" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" text-anchor="middle" dominant-baseline="middle">
    <tspan x="600" dy="0">Maple Finance</tspan>
    <tspan x="600" dy="65">Guide</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="380" font-family="Inter, sans-serif" font-size="24" fill="#8b949e" text-anchor="middle" dominant-baseline="middle">
    Institutional DeFi lending and fixed-rate capital markets
  </text>

  <!-- Decorative gradient circles (subtle) -->
  <circle cx="200" cy="250" r="50" fill="rgba(79,70,229,0.1)" opacity="0.4"/>
  <circle cx="1000" cy="350" r="60" fill="rgba(217,119,6,0.1)" opacity="0.4"/>

  <!-- Footer branding -->
  <text x="600" y="580" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#8b949e" text-anchor="middle">degen0x.com</text>
</svg>