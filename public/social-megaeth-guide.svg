<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="60%" stop-color="#0a0f22"/>
      <stop offset="100%" stop-color="#0c1128"/>
    </linearGradient>
    <!-- Brand signature gradient: indigo → cyan → amber -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Title text gradient (red/orange speed theme) -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Speed glow -->
    <radialGradient id="speedGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <!-- Indigo glow for logo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- Bar fill gradient (fast) -->
    <linearGradient id="barFast" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Bar fill gradient (slow) -->
    <linearGradient id="barSlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="roundedCard">
      <rect x="680" y="120" width="460" height="390" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient speed glow (right side) -->
  <ellipse cx="950" cy="315" rx="400" ry="300" fill="url(#speedGlow)" opacity="0.6"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#e6edf3" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Speed streaks (decorative) -->
  <g opacity="0.12">
    <rect x="-20" y="180" width="300" height="2" rx="1" fill="url(#titleGrad)"/>
    <rect x="-20" y="220" width="200" height="1.5" rx="1" fill="url(#titleGrad)"/>
    <rect x="-20" y="260" width="250" height="1" rx="1" fill="url(#titleGrad)"/>
    <rect x="-20" y="300" width="180" height="1.5" rx="1" fill="#f59e0b"/>
    <rect x="-20" y="340" width="220" height="1" rx="1" fill="#f59e0b"/>
  </g>

  <!-- === LEFT PANEL: TEXT CONTENT === -->

  <!-- Logo + brand name -->
  <circle cx="68" cy="60" r="22" fill="url(#logoGlow)"/>
  <text x="68" y="64" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="900" text-anchor="middle" fill="#818cf8" letter-spacing="-1">0x</text>
  <text x="100" y="66" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">degen0x</text>

  <!-- Category pill -->
  <rect x="60" y="110" width="120" height="30" rx="15" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="120" y="130" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#ef4444" letter-spacing="1">L2 GUIDE</text>

  <!-- Main title -->
  <text font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="900" letter-spacing="-2" fill="url(#titleGrad)">
    <tspan x="60" y="230">MegaETH</tspan>
  </text>
  <text x="60" y="280" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#e6edf3" letter-spacing="-1">Real-Time EVM.</text>
  <text x="60" y="320" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#8b949e" letter-spacing="-1">100,000 TPS.</text>

  <!-- Stat pills row -->
  <!-- Pill 1: TPS -->
  <rect x="60" y="350" width="148" height="52" rx="12" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="134" y="371" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ef4444" letter-spacing="0.5">TPS</text>
  <text x="134" y="393" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" text-anchor="middle" fill="#fbbf24" letter-spacing="-1">100K</text>

  <!-- Pill 2: Latency -->
  <rect x="220" y="350" width="148" height="52" rx="12" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="294" y="371" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#f59e0b" letter-spacing="0.5">LATENCY</text>
  <text x="294" y="393" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" text-anchor="middle" fill="#fbbf24" letter-spacing="-1">1ms</text>

  <!-- Pill 3: Status -->
  <rect x="380" y="350" width="148" height="52" rx="12" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="454" y="371" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#22c55e" letter-spacing="0.5">STATUS</text>
  <text x="454" y="393" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" text-anchor="middle" fill="#22c55e" letter-spacing="-1">LIVE</text>

  <!-- Description -->
  <text x="60" y="442" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e" letter-spacing="-0.3">EVM-compatible · Feb 2026 mainnet · Real-time block sync</text>

  <!-- CTA -->
  <rect x="60" y="470" width="260" height="46" rx="10" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.5)" stroke-width="1.5"/>
  <text x="190" y="499" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#ef4444" letter-spacing="-0.3">degen0x.com/learn/megaeth-guide →</text>

  <!-- === RIGHT PANEL: TPS COMPARISON CHART === -->

  <!-- Chart card background -->
  <rect x="680" y="110" width="460" height="410" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Chart title -->
  <text x="910" y="152" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#8b949e" letter-spacing="0.5">TPS COMPARISON</text>

  <!-- Bar chart — horizontal bars -->
  <!-- MegaETH: 100K TPS — full width -->
  <text x="700" y="195" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">MegaETH</text>
  <rect x="700" y="202" width="380" height="28" rx="6" fill="url(#barFast)" opacity="0.9"/>
  <rect x="700" y="202" width="380" height="28" rx="6" fill="url(#barFast)" filter="url(#softGlow)" opacity="0.2"/>
  <text x="1090" y="221" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" text-anchor="end" fill="#fbbf24">100,000</text>

  <!-- Monad: ~10K TPS (not yet live) -->
  <text x="700" y="258" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">Monad</text>
  <rect x="700" y="265" width="152" height="24" rx="6" fill="rgba(139,92,246,0.45)"/>
  <text x="864" y="282" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="end" fill="#a78bfa">10,000*</text>
  <text x="868" y="282" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">*testnet</text>

  <!-- Arbitrum: ~2K TPS -->
  <text x="700" y="316" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">Arbitrum</text>
  <rect x="700" y="323" width="58" height="24" rx="6" fill="url(#barSlow)" opacity="0.6"/>
  <text x="770" y="340" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#06b6d4">2,000</text>

  <!-- Base: ~2K TPS -->
  <text x="700" y="373" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">Base</text>
  <rect x="700" y="380" width="54" height="24" rx="6" fill="url(#barSlow)" opacity="0.5"/>
  <text x="766" y="397" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#06b6d4">2,000</text>

  <!-- Optimism: ~2K TPS -->
  <text x="700" y="430" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">Optimism</text>
  <rect x="700" y="437" width="50" height="24" rx="6" fill="url(#barSlow)" opacity="0.4"/>
  <text x="762" y="454" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#06b6d4">2,000</text>

  <!-- "50x faster" callout -->
  <rect x="840" y="310" width="178" height="66" rx="12" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.35)" stroke-width="1"/>
  <text x="929" y="334" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="900" text-anchor="middle" fill="url(#titleGrad)">50×</text>
  <text x="929" y="366" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#8b949e" letter-spacing="0.3">FASTER THAN ARBITRUM</text>

  <!-- Bottom bar -->
  <rect x="0" y="596" width="1200" height="34" fill="rgba(0,0,0,0.4)"/>
  <text x="600" y="619" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#6e7681" letter-spacing="1">degen0x.com — Free Crypto Tools &amp; Guides</text>
</svg>
