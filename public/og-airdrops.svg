<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow1" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Ambient glow circles -->
  <circle cx="300" cy="180" r="310" fill="#06b6d4" opacity="0.06"/>
  <circle cx="880" cy="420" r="290" fill="#f59e0b" opacity="0.05"/>
  <circle cx="600" cy="80" r="200" fill="#6366f1" opacity="0.03"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.02" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo area -->
  <circle cx="100" cy="72" r="18" fill="#6366f1" opacity="0.15"/>
  <text x="100" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" fill="#818cf8" text-anchor="middle">0x</text>
  <text x="130" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="140" width="100" height="30" rx="15" fill="#06b6d420" stroke="#06b6d450" stroke-width="1"/>
  <text x="130" y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22d3ee" text-anchor="middle" letter-spacing="0.05em">TOOLS</text>

  <!-- Title -->
  <text x="80" y="230" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-0.03em">Airdrop Calendar</text>
  <text x="80" y="295" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="url(#accent)" letter-spacing="-0.03em">&amp; Tracker</text>

  <!-- Subtitle -->
  <text x="80" y="345" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">
    Never miss a drop · Track eligibility · All chains
  </text>

  <!-- Decorative airdrop icons -->
  <!-- Card 1: Parachute/gift -->
  <g transform="translate(700, 140)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Parachute icon -->
    <path d="M 22 40 Q 22 28 42 25 Q 62 28 62 40 L 42 55" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="30" y1="38" x2="28" y2="50" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="42" y1="37" x2="42" y2="55" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="54" y1="38" x2="56" y2="50" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Live Drops</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">12 active</text>
  </g>

  <!-- Card 2: Calendar -->
  <g transform="translate(720, 235)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Calendar grid icon -->
    <rect x="22" y="28" width="36" height="30" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="22" y1="35" x2="58" y2="35" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="26" cy="42" r="1.5" fill="#f59e0b"/>
    <circle cx="34" cy="42" r="1.5" fill="#f59e0b"/>
    <circle cx="42" cy="42" r="1.5" fill="#f59e0b"/>
    <circle cx="26" cy="50" r="1.5" fill="#f59e0b"/>
    <circle cx="34" cy="50" r="1.5" fill="#f59e0b" opacity="0.5"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Upcoming</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">March schedule</text>
  </g>

  <!-- Card 3: Chain badges -->
  <g transform="translate(740, 330)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Multi-chain badges -->
    <circle cx="26" cy="35" r="5" fill="#627eea" opacity="0.8"/>
    <text x="26" y="38" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">E</text>
    <circle cx="38" cy="35" r="5" fill="#14F195" opacity="0.8"/>
    <text x="38" y="38" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#080d1c" text-anchor="middle">S</text>
    <circle cx="50" cy="35" r="5" fill="#2775CA" opacity="0.8"/>
    <text x="50" y="38" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">A</text>
    <!-- Check marks below -->
    <path d="M 22 48 L 25 51 L 30 45" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <path d="M 34 48 L 37 51 L 42 45" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <path d="M 46 48 L 49 51 L 54 45" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">All Chains</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">12+ networks</text>
  </g>

  <!-- Card 4: Eligibility check -->
  <g transform="translate(950, 180)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Eligibility checkmark -->
    <circle cx="42" cy="40" r="10" fill="none" stroke="#818cf8" stroke-width="2"/>
    <path d="M 37 40 L 40 43 L 47 36" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Check indicator -->
    <circle cx="52" cy="30" r="4" fill="#06b6d4"/>
    <text x="52" y="32" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">✓</text>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Eligible Now</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">8 you qualify</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="white" fill-opacity="0.02"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="white" stroke-opacity="0.06"/>
  <text x="80" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1120" y="612" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Free · No signup · Open source</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>