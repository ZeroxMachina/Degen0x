<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accentGrad2)"/>

  <!-- Decorative glow circles -->
  <circle cx="1000" cy="180" r="200" fill="#6366f1" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="150" cy="480" r="140" fill="#06b6d4" opacity="0.04" filter="url(#glow2)"/>

  <!-- Options payoff diagram visualization -->
  <g transform="translate(780, 140)" opacity="0.35">
    <!-- Grid -->
    <line x1="0" y1="120" x2="340" y2="120" stroke="#30363d" stroke-width="1"/>
    <line x1="170" y1="0" x2="170" y2="240" stroke="#30363d" stroke-width="1"/>
    <text x="340" y="135" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Price →</text>
    <text x="175" y="12" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">P/L ↑</text>

    <!-- Call option payoff (green) -->
    <polyline points="0,150 170,150 340,20" fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <text x="280" y="55" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">Long Call</text>

    <!-- Put option payoff (red) -->
    <polyline points="0,20 170,150 340,150" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,3"/>
    <text x="30" y="55" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444">Long Put</text>

    <!-- Strike label -->
    <text x="170" y="260" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Strike</text>
  </g>

  <!-- ETF ticker badges -->
  <g transform="translate(800, 410)">
    <rect width="80" height="36" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="40" y="23" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#818cf8" text-anchor="middle">IBIT</text>

    <rect x="95" width="80" height="36" rx="8" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
    <text x="135" y="23" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#06b6d4" text-anchor="middle">ETHA</text>

    <rect x="190" width="80" height="36" rx="8" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="230" y="23" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#f59e0b" text-anchor="middle">FBTC</text>
  </g>

  <!-- Category badge -->
  <rect x="80" y="100" width="90" height="30" rx="15" fill="#6366f1" opacity="0.15"/>
  <text x="125" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#6366f1" text-anchor="middle">Trading</text>

  <rect x="185" y="100" width="120" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
  <text x="245" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">Intermediate</text>

  <!-- Title -->
  <text x="80" y="200" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="url(#titleGrad2)">Crypto ETF Options</text>
  <text x="80" y="260" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="url(#titleGrad2)">Trading Guide</text>
  <text x="80" y="310" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#f59e0b">2026</text>

  <!-- Subtitle -->
  <text x="80" y="360" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Position limits removed · Covered calls &amp; protective puts</text>
  <text x="80" y="388" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">FLEX options · Institutional-grade access strategies</text>

  <!-- Key highlight -->
  <g transform="translate(80, 420)">
    <rect width="320" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Position Limits</text>
    <text x="20" y="48" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e">25K → 250K+ contracts ✓</text>
  </g>
  <g transform="translate(420, 420)">
    <rect width="280" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Exchanges</text>
    <text x="20" y="48" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#06b6d4">NYSE · Nasdaq · Cboe · MIAX</text>
  </g>

  <!-- Bottom bar -->
  <rect y="596" width="1200" height="34" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="618" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1120" y="618" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Comprehensive Crypto Education</text>
</svg>