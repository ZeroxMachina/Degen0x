<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="urgency" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" clip-path="url(#cardClip)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="950" cy="120" r="200" fill="#f59e0b" opacity="0.06" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="180" fill="#ef4444" opacity="0.04" filter="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#urgency)"/>

  <!-- degen0x logo text -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#brand)" letter-spacing="0.05em">degen0x</text>

  <!-- Countdown badge -->
  <rect x="880" y="40" width="260" height="52" rx="26" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="920" y="72" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#ef4444">14</text>
  <text x="954" y="72" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#f87171"> DAYS TO DEADLINE</text>

  <!-- Main title -->
  <text x="60" y="180" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Crypto Taxes 2026</text>
  <text x="60" y="235" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600" fill="#f59e0b" letter-spacing="-0.01em">Don't Wait Until April 15</text>

  <!-- Subtitle -->
  <text x="60" y="285" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Every rule, every exception, every strategy — free guide + tax calculator</text>

  <!-- Glass card: Checklist -->
  <rect x="60" y="320" width="500" height="240" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Checklist items -->
  <text x="90" y="365" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#f59e0b" letter-spacing="0.05em">TAX CHECKLIST</text>

  <!-- Item 1 -->
  <rect x="90" y="385" width="20" height="20" rx="4" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1.5"/>
  <polyline points="95,396 99,401 107,391" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="122" y="401" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Export exchange transaction history</text>

  <!-- Item 2 -->
  <rect x="90" y="420" width="20" height="20" rx="4" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1.5"/>
  <polyline points="95,431 99,436 107,426" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="122" y="436" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Track DeFi swaps &amp; staking rewards</text>

  <!-- Item 3 -->
  <rect x="90" y="455" width="20" height="20" rx="4" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="122" y="471" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Calculate cost basis for every asset</text>

  <!-- Item 4 -->
  <rect x="90" y="490" width="20" height="20" rx="4" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="122" y="506" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">File or extend before April 15</text>

  <!-- Glass card: Taxable events -->
  <rect x="600" y="320" width="540" height="240" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="630" y="365" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ef4444" letter-spacing="0.05em">TAXABLE EVENTS</text>

  <!-- Taxable event pills -->
  <rect x="630" y="385" width="140" height="34" rx="17" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="660" y="407" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#f87171">Sold for Profit</text>

  <rect x="785" y="385" width="155" height="34" rx="17" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="808" y="407" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#f87171">Token Swaps</text>

  <rect x="955" y="385" width="155" height="34" rx="17" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="975" y="407" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#f87171">Staking Rewards</text>

  <rect x="630" y="430" width="120" height="34" rx="17" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="656" y="452" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#f87171">Airdrops</text>

  <rect x="765" y="430" width="155" height="34" rx="17" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="790" y="452" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#f87171">Paid in Crypto</text>

  <rect x="935" y="430" width="160" height="34" rx="17" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="955" y="452" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#f87171">Mining Income</text>

  <!-- Savings callout -->
  <rect x="630" y="485" width="480" height="55" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="655" y="510" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">TIP:</text>
  <text x="695" y="510" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#86efac">Report losses too — they offset gains and reduce what you owe</text>
  <text x="655" y="530" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Use tax-loss harvesting before year-end</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#8b949e">degen0x.com/learn/crypto-tax-guide-2026</text>
  <text x="1000" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Free Tax Calculator</text>
</svg>