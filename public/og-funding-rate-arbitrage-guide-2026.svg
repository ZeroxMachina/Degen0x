<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="accentBar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chartGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentBar2)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="180" r="160" fill="#06b6d4" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="1100" cy="450" r="100" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="100" cy="550" r="80" fill="#22c55e" opacity="0.04"/>

  <!-- Decorative funding rate chart -->
  <g transform="translate(750, 120)" opacity="0.2">
    <!-- Grid -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#30363d" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="350" y2="100" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="200" x2="350" y2="200" stroke="#30363d" stroke-width="0.5"/>

    <!-- Positive funding area -->
    <path d="M0 100 L30 70 L60 55 L90 80 L120 40 L150 50 L180 30 L210 60 L240 45 L270 65 L300 35 L330 50 L350 55 L350 100 Z" fill="url(#chartGrad)"/>
    <path d="M0 100 L30 70 L60 55 L90 80 L120 40 L150 50 L180 30 L210 60 L240 45 L270 65 L300 35 L330 50 L350 55" fill="none" stroke="#22c55e" stroke-width="2"/>

    <!-- Negative funding area (below line) -->
    <path d="M0 100 L30 110 L60 130 L90 105 L120 115 L150 108 L180 125 L210 110 L240 120 L270 105 L300 118 L330 108 L350 112 L350 100 Z" fill="url(#chartGrad2)" opacity="0.5"/>
    <path d="M0 100 L30 110 L60 130 L90 105 L120 115 L150 108 L180 125 L210 110 L240 120 L270 105 L300 118 L330 108 L350 112" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Labels -->
    <text x="355" y="55" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">+0.03%</text>
    <text x="355" y="115" fill="#06b6d4" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">-0.01%</text>
    <text x="175" y="220" text-anchor="middle" fill="#6e7681" font-family="Inter, Arial, sans-serif" font-size="10">Funding Rate (8hr)</text>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="14" fill="none" stroke="#818cf8" stroke-width="2"/>
    <text x="16" y="21" text-anchor="middle" fill="#818cf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">0x</text>
  </g>
  <text x="96" y="56" fill="#e6edf3" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" opacity="0.7">degen0x</text>

  <!-- Category badges -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <text x="55" y="19" text-anchor="middle" fill="#bc8cff" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">ADVANCED</text>
    <rect x="122" y="0" width="130" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
    <text x="187" y="19" text-anchor="middle" fill="#06b6d4" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">PERPETUALS</text>
  </g>

  <!-- Title -->
  <text x="60" y="200" fill="#e6edf3" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">
    Funding Rate Arbitrage
  </text>
  <text x="60" y="255" fill="#e6edf3" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">
    Guide 2026
  </text>

  <!-- Subtitle -->
  <text x="60" y="305" fill="#8b949e" font-family="Inter, Arial, sans-serif" font-size="20">
    Delta-neutral strategies for perpetual futures · 5-15% APY
  </text>

  <!-- Strategy cards row -->
  <g transform="translate(60, 350)">
    <!-- Strategy 1 -->
    <rect x="0" y="0" width="210" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Cash-and-Carry</text>
    <text x="20" y="52" fill="#8b949e" font-family="Inter, Arial, sans-serif" font-size="12">Buy spot, short perp</text>
    <text x="20" y="80" fill="#06b6d4" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">5-15%</text>
    <text x="120" y="80" fill="#6e7681" font-family="Inter, Arial, sans-serif" font-size="12">APY</text>

    <!-- Strategy 2 -->
    <rect x="225" y="0" width="210" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="245" y="30" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Cross-Exchange</text>
    <text x="245" y="52" fill="#8b949e" font-family="Inter, Arial, sans-serif" font-size="12">Exploit rate spreads</text>
    <text x="245" y="80" fill="#06b6d4" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">8-25%</text>
    <text x="345" y="80" fill="#6e7681" font-family="Inter, Arial, sans-serif" font-size="12">APY</text>

    <!-- Strategy 3 -->
    <rect x="450" y="0" width="210" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="470" y="30" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Delta-Neutral</text>
    <text x="470" y="52" fill="#8b949e" font-family="Inter, Arial, sans-serif" font-size="12">DEX/CEX combos</text>
    <text x="470" y="80" fill="#06b6d4" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">6-18%</text>
    <text x="570" y="80" fill="#6e7681" font-family="Inter, Arial, sans-serif" font-size="12">APY</text>
  </g>

  <!-- Bottom info -->
  <g transform="translate(60, 490)">
    <text x="0" y="0" fill="#6e7681" font-family="Inter, Arial, sans-serif" font-size="14">CEX: Binance · Bybit  |  DEX: dYdX · Hyperliquid · GMX</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.4)"/>
  <text x="60" y="620" fill="#6e7681" font-family="Inter, Arial, sans-serif" font-size="14">degen0x.com/learn/funding-rate-arbitrage-guide-2026</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="Inter, Arial, sans-serif" font-size="14">March 2026</text>
</svg>