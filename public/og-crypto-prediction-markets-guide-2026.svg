<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles for depth -->
  <circle cx="200" cy="150" r="120" fill="#4f46e5" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="1000" cy="400" r="150" fill="#0891b2" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="600" cy="650" r="200" fill="#d97706" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- degen0x branding -->
  <text x="40" y="50" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#6366f1">degen0x</text>

  <!-- Badge -->
  <rect x="1050" y="28" width="130" height="44" rx="22" fill="rgba(79, 70, 229, 0.2)" stroke="#6366f1" stroke-width="1"/>
  <text x="1115" y="55" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#a5b4fc" text-anchor="middle">2026 Guide</text>

  <!-- Main content area -->
  <g>
    <!-- Title -->
    <text x="60" y="140" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="700" fill="url(#titleGrad)">Crypto Prediction</text>
    <text x="60" y="200" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="700" fill="url(#titleGrad)">Markets</text>

    <!-- Subtitle with gradient -->
    <text x="60" y="265" font-family="Inter, -apple-system, sans-serif" font-size="38" font-weight="600" fill="url(#subtitleGrad)">Bet on Real-World Events On-Chain</text>

    <!-- Description -->
    <text x="60" y="325" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#cbd5e1">Trade outcomes on elections, sports, crypto events &amp; more</text>
  </g>

  <!-- Decorative prediction probability bars -->
  <g opacity="0.7">
    <!-- Bar 1: Elections -->
    <rect x="850" y="160" width="240" height="8" rx="4" fill="rgba(79, 70, 229, 0.2)" stroke="#6366f1" stroke-width="1"/>
    <rect x="850" y="160" width="156" height="8" rx="4" fill="#4f46e5"/>
    <text x="850" y="145" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#a5b4fc" font-weight="600">Elections</text>
    <text x="1100" y="175" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#a5b4fc" font-weight="600">65%</text>

    <!-- Bar 2: Sports -->
    <rect x="850" y="220" width="240" height="8" rx="4" fill="rgba(8, 145, 178, 0.2)" stroke="#06b6d4" stroke-width="1"/>
    <rect x="850" y="220" width="180" height="8" rx="4" fill="#0891b2"/>
    <text x="850" y="205" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#06b6d4" font-weight="600">Sports</text>
    <text x="1100" y="235" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#06b6d4" font-weight="600">75%</text>

    <!-- Bar 3: Crypto Events -->
    <rect x="850" y="280" width="240" height="8" rx="4" fill="rgba(217, 119, 6, 0.2)" stroke="#d97706" stroke-width="1"/>
    <rect x="850" y="280" width="120" height="8" rx="4" fill="#d97706"/>
    <text x="850" y="265" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">Crypto Events</text>
    <text x="1100" y="295" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">50%</text>

    <!-- YES/NO labels -->
    <text x="1130" y="178" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#cbd5e1">YES</text>
  </g>

  <!-- Protocol pills -->
  <g>
    <text x="60" y="430" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#94a3b8">Featured Markets:</text>

    <!-- Pill 1: Polymarket -->
    <rect x="60" y="450" width="120" height="32" rx="16" fill="rgba(79, 70, 229, 0.15)" stroke="#6366f1" stroke-width="1"/>
    <text x="120" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle" font-weight="500">Polymarket</text>

    <!-- Pill 2: Azuro -->
    <rect x="195" y="450" width="95" height="32" rx="16" fill="rgba(8, 145, 178, 0.15)" stroke="#06b6d4" stroke-width="1"/>
    <text x="242" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#06b6d4" text-anchor="middle" font-weight="500">Azuro</text>

    <!-- Pill 3: SX Bet -->
    <rect x="305" y="450" width="95" height="32" rx="16" fill="rgba(217, 119, 6, 0.15)" stroke="#d97706" stroke-width="1"/>
    <text x="352" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="500">SX Bet</text>

    <!-- Pill 4: Hedgehog -->
    <rect x="415" y="450" width="120" height="32" rx="16" fill="rgba(139, 92, 246, 0.15)" stroke="#a78bfa" stroke-width="1"/>
    <text x="475" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="500">Hedgehog</text>

    <!-- Pill 5: +More -->
    <rect x="550" y="450" width="85" height="32" rx="16" fill="rgba(148, 163, 184, 0.1)" stroke="#64748b" stroke-width="1"/>
    <text x="592" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle" font-weight="500">+More</text>
  </g>

  <!-- Bottom bar -->
  <rect y="596" width="1200" height="34" fill="rgba(15, 23, 41, 0.8)"/>
  <rect y="596" width="1200" height="1" fill="url(#accent)"/>

  <text x="60" y="620" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#94a3b8">degen0x.com</text>
  <text x="1140" y="620" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="end">Free · Comprehensive Guide</text>
</svg>