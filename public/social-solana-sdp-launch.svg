<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgSDP" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0c1225"/>
    </linearGradient>
    <linearGradient id="solanaGrad" x1="0" y1="0" x2="300" y2="0">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="50%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#00D18C"/>
    </linearGradient>
    <linearGradient id="accentSDP" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="50%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#00D18C"/>
    </linearGradient>
    <filter id="glowSDP">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlowSDP">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgSDP)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accentSDP)"/>

  <!-- Decorative glow circles -->
  <circle cx="1000" cy="150" r="200" fill="#9945FF" opacity="0.05" filter="url(#softGlowSDP)"/>
  <circle cx="300" cy="450" r="150" fill="#14F195" opacity="0.04" filter="url(#softGlowSDP)"/>

  <!-- BREAKING badge -->
  <rect x="40" y="30" width="220" height="32" rx="16" fill="rgba(20,241,149,0.15)" stroke="rgba(20,241,149,0.4)" stroke-width="1"/>
  <circle cx="60" cy="46" r="4" fill="#14F195">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="160" y="52" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#14F195" text-anchor="middle" letter-spacing="1.5">LAUNCHED TODAY</text>

  <!-- degen0x logo -->
  <text x="1120" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#818cf8" text-anchor="end" opacity="0.7">degen0x</text>

  <!-- Main title -->
  <text x="50" y="120" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="url(#solanaGrad)" letter-spacing="-1">Solana Developer</text>
  <text x="50" y="175" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#e6edf3" letter-spacing="-1">Platform Is Live</text>

  <!-- Subtitle -->
  <text x="50" y="212" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Enterprise-grade APIs for stablecoins, payments, and tokenized assets.</text>

  <!-- SOL price chip -->
  <rect x="50" y="235" width="200" height="40" rx="10" fill="rgba(20,241,149,0.08)" stroke="rgba(20,241,149,0.2)" stroke-width="1"/>
  <text x="70" y="260" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#14F195">$SOL +6.48%</text>
  <text x="163" y="260" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Best top-10</text>

  <!-- Partner cards (3 across) -->
  <!-- Mastercard -->
  <rect x="50" y="300" width="340" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="50" y="300" width="340" height="4" rx="2" fill="#FF5F00"/>
  <text x="70" y="335" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#e6edf3">Mastercard</text>
  <text x="70" y="360" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Stablecoin Settlement</text>
  <text x="70" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Exploring direct USDC settlement on Solana</text>
  <text x="70" y="400" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">for merchant payments</text>

  <!-- Western Union -->
  <rect x="410" y="300" width="340" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="410" y="300" width="340" height="4" rx="2" fill="#FFDD00"/>
  <text x="430" y="335" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#e6edf3">Western Union</text>
  <text x="430" y="360" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Cross-Border Payments</text>
  <text x="430" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Testing stablecoin rails for international</text>
  <text x="430" y="400" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">remittance corridors</text>

  <!-- Worldpay -->
  <rect x="770" y="300" width="380" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="770" y="300" width="380" height="4" rx="2" fill="#00A4E4"/>
  <text x="790" y="335" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#e6edf3">Worldpay</text>
  <text x="790" y="360" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Merchant Tokenization</text>
  <text x="790" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Building tokenized deposit infrastructure</text>
  <text x="790" y="400" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">for enterprise merchants</text>

  <!-- Stats row -->
  <!-- 20+ Infra Partners -->
  <rect x="50" y="435" width="260" height="55" rx="14" fill="rgba(153,69,255,0.08)" stroke="rgba(153,69,255,0.2)" stroke-width="1"/>
  <text x="180" y="457" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#9945FF" text-anchor="middle">INFRASTRUCTURE PARTNERS</text>
  <text x="180" y="479" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#e6edf3" text-anchor="middle">20+</text>

  <!-- AI Tooling -->
  <rect x="330" y="435" width="260" height="55" rx="14" fill="rgba(20,241,149,0.08)" stroke="rgba(20,241,149,0.2)" stroke-width="1"/>
  <text x="460" y="457" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#14F195" text-anchor="middle">AI DEV TOOLS INTEGRATED</text>
  <text x="460" y="479" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#e6edf3" text-anchor="middle">Claude + Codex</text>

  <!-- Modules -->
  <rect x="610" y="435" width="260" height="55" rx="14" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="740" y="457" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#06b6d4" text-anchor="middle">API MODULES</text>
  <text x="740" y="479" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#e6edf3" text-anchor="middle">Issuance + Payments</text>

  <!-- Stablecoin Supply -->
  <rect x="890" y="435" width="260" height="55" rx="14" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="1020" y="457" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">SOL STABLECOIN SUPPLY</text>
  <text x="1020" y="479" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#e6edf3" text-anchor="middle">$15.7B ATH</text>

  <!-- Big watermark text -->
  <text x="1080" y="575" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="900" fill="rgba(153,69,255,0.06)" text-anchor="end" letter-spacing="-3">SDP</text>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(255,255,255,0.02)"/>
  <rect y="600" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="600" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681" text-anchor="middle">degen0x.com/learn/solana-ecosystem</text>
</svg>
