<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="900" cy="300" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="200" cy="500" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-4" y="-4" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glows -->
  <circle cx="900" cy="300" r="300" fill="url(#glow1)"/>
  <circle cx="200" cy="500" r="250" fill="url(#glow2)"/>

  <!-- Decorative network nodes -->
  <g opacity="0.15" stroke="#6366f1" stroke-width="1">
    <circle cx="850" cy="180" r="4" fill="#6366f1"/>
    <circle cx="950" cy="220" r="3" fill="#06b6d4"/>
    <circle cx="1020" cy="160" r="5" fill="#818cf8"/>
    <circle cx="900" cy="280" r="3" fill="#06b6d4"/>
    <circle cx="1050" cy="280" r="4" fill="#6366f1"/>
    <circle cx="980" cy="340" r="3" fill="#818cf8"/>
    <line x1="850" y1="180" x2="950" y2="220"/>
    <line x1="950" y1="220" x2="1020" y2="160"/>
    <line x1="950" y1="220" x2="900" y2="280"/>
    <line x1="900" y1="280" x2="1050" y2="280"/>
    <line x1="1050" y1="280" x2="980" y2="340"/>
    <line x1="1020" y1="160" x2="1050" y2="280"/>
    <line x1="850" y1="180" x2="900" y2="280"/>
  </g>

  <!-- Restaking flow diagram -->
  <g opacity="0.2" transform="translate(820, 380)">
    <rect x="0" y="0" width="100" height="40" rx="8" stroke="#22c55e" stroke-width="1.5" fill="rgba(34,197,94,0.08)"/>
    <text x="50" y="25" text-anchor="middle" fill="#22c55e" font-size="11" font-family="Inter, sans-serif">Collateral</text>
    <line x1="100" y1="20" x2="140" y2="20" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="120" y="14" text-anchor="middle" fill="#8b949e" font-size="8" font-family="Inter, sans-serif">→</text>
    <rect x="140" y="0" width="80" height="40" rx="8" stroke="#6366f1" stroke-width="1.5" fill="rgba(99,102,241,0.08)"/>
    <text x="180" y="25" text-anchor="middle" fill="#818cf8" font-size="11" font-family="Inter, sans-serif">Vault</text>
    <line x1="220" y1="20" x2="260" y2="20" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="260" y="0" width="100" height="40" rx="8" stroke="#06b6d4" stroke-width="1.5" fill="rgba(6,182,212,0.08)"/>
    <text x="310" y="25" text-anchor="middle" fill="#06b6d4" font-size="11" font-family="Inter, sans-serif">Network</text>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="url(#titleGrad)" opacity="0.9"/>
    <text x="16" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="800" font-family="Inter, sans-serif">0x</text>
    <text x="42" y="22" fill="#e6edf3" font-size="16" font-weight="700" font-family="Inter, sans-serif">degen0x</text>
  </g>

  <!-- Category badge -->
  <rect x="60" y="120" width="95" height="28" rx="6" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="107" y="139" text-anchor="middle" fill="#818cf8" font-size="12" font-weight="600" font-family="Inter, sans-serif">Restaking</text>

  <!-- Title -->
  <text x="60" y="200" fill="url(#titleGrad)" font-size="46" font-weight="800" font-family="Inter, sans-serif" letter-spacing="-0.02em">Symbiotic Protocol</text>
  <text x="60" y="256" fill="url(#titleGrad)" font-size="46" font-weight="800" font-family="Inter, sans-serif" letter-spacing="-0.02em">Restaking Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="310" fill="#8b949e" font-size="20" font-family="Inter, sans-serif">Permissionless universal restaking for any ERC-20 token</text>

  <!-- Stats pills -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="130" height="36" rx="8" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
    <text x="65" y="23" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700" font-family="Inter, sans-serif">$1.6B+ TVL</text>

    <rect x="145" y="0" width="155" height="36" rx="8" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
    <text x="222" y="23" text-anchor="middle" fill="#06b6d4" font-size="14" font-weight="700" font-family="Inter, sans-serif">70+ Networks</text>

    <rect x="315" y="0" width="165" height="36" rx="8" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <text x="397" y="23" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="700" font-family="Inter, sans-serif">1,200+ Operators</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" fill="#6e7681" font-size="13" font-family="Inter, sans-serif">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-size="13" font-family="Inter, sans-serif">March 2026</text>
</svg>
