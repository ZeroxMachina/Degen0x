<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="dataFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="200" r="180" fill="url(#circle1)"/>
  <circle cx="1080" cy="380" r="120" fill="url(#circle2)"/>
  <circle cx="100" cy="520" r="90" fill="url(#circle2)"/>

  <!-- DePIN network visualization -->
  <g opacity="0.5">
    <!-- Data flow lines (horizontal) -->
    <rect x="850" y="180" width="280" height="2" rx="1" fill="url(#dataFlow)"/>
    <rect x="870" y="220" width="250" height="2" rx="1" fill="url(#dataFlow)"/>
    <rect x="860" y="260" width="270" height="2" rx="1" fill="url(#dataFlow)"/>
    <rect x="880" y="300" width="230" height="2" rx="1" fill="url(#dataFlow)"/>
    <rect x="850" y="340" width="260" height="2" rx="1" fill="url(#dataFlow)"/>

    <!-- Nodes (users sharing bandwidth) -->
    <circle cx="870" cy="180" r="6" fill="#22c55e" opacity="0.7"/>
    <circle cx="890" cy="220" r="5" fill="#4ade80" opacity="0.6"/>
    <circle cx="880" cy="260" r="6" fill="#22c55e" opacity="0.7"/>
    <circle cx="900" cy="300" r="5" fill="#4ade80" opacity="0.5"/>
    <circle cx="870" cy="340" r="6" fill="#22c55e" opacity="0.6"/>

    <!-- Central processing -->
    <rect x="1000" y="210" width="60" height="100" rx="8" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <text x="1030" y="265" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle" opacity="0.6">AI</text>

    <!-- Output arrows -->
    <circle cx="1090" cy="230" r="4" fill="#6366f1" opacity="0.5"/>
    <circle cx="1090" cy="260" r="4" fill="#6366f1" opacity="0.5"/>
    <circle cx="1090" cy="290" r="4" fill="#6366f1" opacity="0.5"/>

    <!-- Pulse rings -->
    <circle cx="870" cy="180" r="14" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <circle cx="880" cy="260" r="14" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <circle cx="870" cy="340" r="14" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.025" stroke="#ffffff" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- Category badges -->
  <g transform="translate(80, 100)">
    <rect width="60" height="28" rx="6" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="30" y="19" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#4ade80" text-anchor="middle">DePIN</text>
    <rect x="70" width="100" height="28" rx="6" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="120" y="19" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">AI &amp; CRYPTO</text>
  </g>

  <!-- Title -->
  <text x="80" y="195" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">GRASS Protocol</text>
  <text x="80" y="250" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">Guide 2026</text>

  <!-- Subtitle -->
  <text x="80" y="295" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#8b949e">Earn Crypto Sharing Your Internet for AI Training</text>

  <!-- Stats row -->
  <g transform="translate(80, 340)">
    <rect width="170" height="72" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="85" y="30" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#4ade80" text-anchor="middle">8.5M</text>
    <text x="85" y="52" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Monthly Active Users</text>
  </g>
  <g transform="translate(268, 340)">
    <rect width="170" height="72" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="85" y="30" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#06b6d4" text-anchor="middle">100+ TB</text>
    <text x="85" y="52" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Daily Data Scraped</text>
  </g>
  <g transform="translate(456, 340)">
    <rect width="170" height="72" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="85" y="30" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#f59e0b" text-anchor="middle">~20</text>
    <text x="85" y="52" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Paying AI Clients</text>
  </g>

  <!-- Key features -->
  <g transform="translate(80, 450)">
    <circle cx="8" cy="8" r="4" fill="#22c55e"/>
    <text x="20" y="13" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#c9d1d9">Solana DePIN Network</text>
    <circle cx="210" cy="8" r="4" fill="#06b6d4"/>
    <text x="222" y="13" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#c9d1d9">ZK-Proof Data Ledger</text>
    <circle cx="420" cy="8" r="4" fill="#f59e0b"/>
    <text x="432" y="13" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#c9d1d9">Bandwidth Mining</text>
  </g>

  <!-- Bottom bar -->
  <rect y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <rect y="590" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Logo text -->
  <text x="80" y="616" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#818cf8">degen0x</text>
  <text x="160" y="616" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6e7681">degen0x.com</text>

  <!-- Date -->
  <text x="1120" y="616" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>