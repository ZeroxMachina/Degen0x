<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-btc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent-btc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bitcoin-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow-btc">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-btc)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-btc)"/>

  <!-- Background decorative circles -->
  <circle cx="1050" cy="80" r="120" fill="#f59e0b" opacity="0.03"/>
  <circle cx="1100" cy="150" r="80" fill="#0891b2" opacity="0.02"/>
  <circle cx="950" cy="500" r="140" fill="#f59e0b" opacity="0.04"/>

  <!-- Decorative Bitcoin circles on right -->
  <circle cx="1080" cy="200" r="25" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <circle cx="1080" cy="200" r="35" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <circle cx="1000" cy="350" r="20" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <circle cx="1050" cy="420" r="30" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.35"/>

  <!-- Yield bar chart visualization -->
  <g opacity="0.6" filter="url(#glow-btc)">
    <rect x="950" y="480" width="15" height="80" fill="#f59e0b"/>
    <rect x="980" y="450" width="15" height="110" fill="#d97706"/>
    <rect x="1010" y="420" width="15" height="140" fill="#f59e0b" opacity="0.8"/>
    <rect x="1040" y="460" width="15" height="100" fill="#d97706"/>
  </g>

  <!-- Logo: degen0x top-left -->
  <g>
    <circle cx="60" cy="45" r="30" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <text x="60" y="52" fill="#0891b2" font-family="Inter, sans-serif" font-size="24" font-weight="700" text-anchor="middle">0x</text>
    <text x="110" y="52" fill="#ffffff" font-family="Inter, sans-serif" font-size="16" font-weight="700">degen0x</text>
  </g>

  <!-- Category badges -->
  <g>
    <!-- DeFi badge -->
    <rect x="60" y="100" width="80" height="32" rx="6" fill="rgba(79, 70, 229, 0.2)" stroke="#4f46e5" stroke-width="1"/>
    <text x="100" y="122" fill="#a8b5ff" font-family="Inter, sans-serif" font-size="12" font-weight="600" text-anchor="middle">DeFi</text>

    <!-- Bitcoin badge -->
    <rect x="160" y="100" width="90" height="32" rx="6" fill="rgba(245, 158, 11, 0.2)" stroke="#f59e0b" stroke-width="1"/>
    <text x="205" y="122" fill="#fcd34d" font-family="Inter, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Bitcoin</text>
  </g>

  <!-- Main title -->
  <text x="60" y="220" fill="#ffffff" font-family="Inter, sans-serif" font-size="56" font-weight="700">BTC Yield Strategies</text>
  <text x="60" y="280" fill="#ffffff" font-family="Inter, sans-serif" font-size="48" font-weight="700">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="330" fill="#8b949e" font-family="Inter, sans-serif" font-size="20" font-weight="400">Earn 3-8% APY on Your Bitcoin</text>

  <!-- Stats cards -->
  <g>
    <!-- Card 1: 3-8% APY -->
    <rect x="60" y="380" width="140" height="90" rx="8" fill="rgba(79, 70, 229, 0.1)" stroke="#4f46e5" stroke-width="1"/>
    <text x="130" y="410" fill="#f59e0b" font-family="Inter, sans-serif" font-size="24" font-weight="700" text-anchor="middle">3-8%</text>
    <text x="130" y="435" fill="#8b949e" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">APY</text>

    <!-- Card 2: 5+ Protocols -->
    <rect x="220" y="380" width="140" height="90" rx="8" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b" stroke-width="1"/>
    <text x="290" y="410" fill="#fcd34d" font-family="Inter, sans-serif" font-size="24" font-weight="700" text-anchor="middle">5+</text>
    <text x="290" y="435" fill="#8b949e" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Protocols</text>

    <!-- Card 3: Real Data -->
    <rect x="380" y="380" width="140" height="90" rx="8" fill="rgba(8, 145, 178, 0.1)" stroke="#0891b2" stroke-width="1"/>
    <text x="450" y="410" fill="#06d6d6" font-family="Inter, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Real</text>
    <text x="450" y="435" fill="#8b949e" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Data</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500">degen0x.com</text>
</svg>