  <!-- Difference chips -->
  <rect x="80" y="442" width="225" height="52" rx="12" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-opacity="0.2"/>
  <text x="100" y="462" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">BTC ETF AUM</text>
  <text x="100" y="482" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#818cf8">$128B</text>

  <rect x="320" y="442" width="225" height="52" rx="12" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-opacity="0.2"/>
  <text x="340" y="462" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">MSTR Holdings</text>
  <text x="340" y="482" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fbbf24">762,099 BTC</text>

  <rect x="560" y="442" width="225" height="52" rx="12" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-opacity="0.2"/>
  <text x="580" y="462" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Stablecoin Supply</text>
  <text x="580" y="482" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#4ade80">$304B ATH</text>

  <rect x="800" y="442" width="320" height="52" rx="12" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-opacity="0.2"/>
  <text x="820" y="462" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">SEC Commodity Tokens</text>
  <text x="820" y="482" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#22d3ee">16 Classified</text>

  <!-- Insight bar -->
  <rect x="80" y="520" width="1040" height="44" rx="12" fill="white" opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="100" y="547" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Fear is the price of opportunity. Track it live →</text>
  <text x="545" y="547" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#6366f1">degen0x.com/tools/fear-greed-timeline</text>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="white" opacity="0.02"/>
  <text x="80" y="621" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1120" y="621" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">March 24, 2026</text>

  <!-- Bottom accent bar -->
  <rect y="626" width="1200" height="4" fill="url(#brandGrad2)"/>
