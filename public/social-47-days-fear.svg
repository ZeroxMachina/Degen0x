  <!-- Badge -->
  <rect x="80" y="40" width="220" height="32" rx="16" fill="#ef4444" opacity="0.15"/>
  <circle cx="98" cy="56" r="5" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="112" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ef4444" letter-spacing="0.08em">EXTREME FEAR — DAY 47</text>

  <!-- Logo -->
  <text x="1080" y="62" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end">degen0x</text>

  <!-- Giant counter -->
  <text x="80" y="155" font-family="Inter, system-ui, sans-serif" font-size="88" font-weight="900" fill="url(#fearGrad)" letter-spacing="-0.03em">47 Days</text>
  <text x="80" y="200" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" fill="#e6edf3" letter-spacing="-0.01em">of Consecutive Extreme Fear</text>
  <text x="80" y="230" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">Longest streak since the FTX collapse. What does history say happens next?</text>

  <!-- Historical comparison cards -->
