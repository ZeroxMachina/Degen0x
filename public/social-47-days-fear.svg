  <!-- Card 1: COVID -->
  <rect x="80" y="295" width="330" height="90" rx="16" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="100" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">COVID CRASH — MAR 2020</text>
  <text x="100" y="345" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">45 days of fear →</text>
  <text x="100" y="370" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#22c55e">+1,200% rally</text>

  <!-- Card 2: China Ban -->
  <rect x="430" y="295" width="330" height="90" rx="16" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="450" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">CHINA BAN — MAY 2021</text>
  <text x="450" y="345" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">38 days of fear →</text>
  <text x="450" y="370" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#22c55e">New ATH by Nov</text>

  <!-- Card 3: FTX -->
