  <text x="800" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">FTX COLLAPSE — NOV 2022</text>
  <text x="800" y="345" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">42 days of fear →</text>
  <text x="800" y="370" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#22c55e">+400% by 2024</text>

  <!-- What's different section -->
