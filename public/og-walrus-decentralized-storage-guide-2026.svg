<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#e6edf3" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#e6edf3" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#e6edf3" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#e6edf3" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#e6edf3" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#e6edf3" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#e6edf3" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#e6edf3" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#e6edf3" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#e6edf3" stroke-width="1"/>
  </g>

  <!-- Decorative storage nodes -->
  <g filter="url(#glow)" opacity="0.15">
    <circle cx="900" cy="200" r="80" fill="#06b6d4"/>
    <circle cx="1020" cy="320" r="50" fill="#3b82f6"/>
    <circle cx="850" cy="400" r="60" fill="#8b5cf6"/>
    <line x1="900" y1="200" x2="1020" y2="320" stroke="#06b6d4" stroke-width="2"/>
    <line x1="1020" y1="320" x2="850" y2="400" stroke="#3b82f6" stroke-width="2"/>
    <line x1="850" y1="400" x2="900" y2="200" stroke="#8b5cf6" stroke-width="2"/>
  </g>

  <!-- Badge -->
  <rect x="60" y="80" width="100" height="28" rx="6" fill="#06b6d420" stroke="#06b6d4" stroke-width="1"/>
  <text x="110" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#06b6d4" text-anchor="middle">LEARN</text>

  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)">Walrus Protocol:</text>
  <text x="60" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)">Decentralized Storage</text>
  <text x="60" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e">Sui-powered storage for blobs, NFTs, and on-chain data</text>

  <!-- Stats -->
  <g>
    <rect x="60" y="370" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="80" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#06b6d4">Sui Ecosystem</text>
    <text x="80" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Built on Move VM</text>

    <rect x="300" y="370" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="320" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#3b82f6">Blob Storage</text>
    <text x="320" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Erasure-coded data</text>

    <rect x="540" y="370" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="560" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#8b5cf6">DePIN</text>
    <text x="560" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Decentralized infra</text>
  </g>

  <!-- Footer -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0f1a"/>
  <text x="60" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#58a6ff">degen0x.com</text>
  <text x="1140" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#484f58" text-anchor="end">2026 Guide</text>
</svg>