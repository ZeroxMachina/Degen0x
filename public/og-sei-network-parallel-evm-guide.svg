<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top gradient accent bar -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Decorative circle top-left -->
  <circle cx="80" cy="120" r="45" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Decorative circle bottom-right -->
  <circle cx="1120" cy="520" r="50" stroke="#4ade80" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Parallel processing lines -->
  <g opacity="0.25">
    <line x1="950" y1="200" x2="1050" y2="200" stroke="#22c55e" stroke-width="2"/>
    <line x1="945" y1="220" x2="1055" y2="220" stroke="#16a34a" stroke-width="2"/>
    <line x1="950" y1="240" x2="1050" y2="240" stroke="#22c55e" stroke-width="2"/>
    <line x1="945" y1="260" x2="1055" y2="260" stroke="#15803d" stroke-width="2"/>
  </g>

  <!-- Speed indicators - arrow-like shapes -->
  <g opacity="0.3">
    <polygon points="200,380 220,380 210,360 200,380" fill="#22c55e"/>
    <polygon points="220,390 240,390 230,370 220,390" fill="#16a34a"/>
    <polygon points="240,400 260,400 250,380 240,400" fill="#22c55e"/>
  </g>

  <!-- Network nodes -->
  <g opacity="0.25">
    <circle cx="150" cy="450" r="8" fill="#22c55e"/>
    <circle cx="180" cy="430" r="8" fill="#4ade80"/>
    <circle cx="210" cy="450" r="8" fill="#16a34a"/>
    <circle cx="180" cy="470" r="8" fill="#22c55e"/>
    <!-- Connection lines between nodes -->
    <line x1="150" y1="450" x2="180" y2="430" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <line x1="150" y1="450" x2="180" y2="470" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <line x1="210" y1="450" x2="180" y2="430" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <line x1="210" y1="450" x2="180" y2="470" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Additional speed visual elements -->
  <g opacity="0.2">
    <circle cx="270" cy="360" r="4" fill="#4ade80"/>
    <circle cx="285" cy="355" r="4" fill="#22c55e"/>
    <circle cx="300" cy="360" r="4" fill="#16a34a"/>
  </g>

  <!-- Badge -->
  <text x="80" y="80" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#22c55e" opacity="0.9">Layer 1 · EVM</text>

  <!-- Title Line 1 -->
  <text x="80" y="200" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Sei Network &amp;</text>

  <!-- Title Line 2 -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Parallel EVM Guide</text>

  <!-- Subtitle -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">High-performance blockchain with parallel execution for DeFi</text>

  <!-- Branding -->
  <text x="1120" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end" opacity="0.8">degen0x.com</text>

  <!-- Bottom gradient line -->
  <rect y="622" width="1200" height="8" fill="url(#gradAccent)" opacity="0.5"/>
</svg>