<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1530"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="solGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="50%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles (Solana palette) -->
  <circle cx="1000" cy="150" r="200" fill="#9945FF" opacity="0.05" filter="url(#glow)"/>
  <circle cx="1080" cy="380" r="140" fill="#14F195" opacity="0.04" filter="url(#glow)"/>

  <!-- Growth chart background decoration -->
  <g transform="translate(750, 200)" opacity="0.18">
    <path d="M0 200 L30 180 L60 190 L90 160 L120 140 L150 120 L180 80 L210 60 L240 30 L270 15 L300 5" fill="none" stroke="#22c55e" stroke-width="3"/>
    <path d="M0 200 L30 180 L60 190 L90 160 L120 140 L150 120 L180 80 L210 60 L240 30 L270 15 L300 5 L300 200 Z" fill="url(#chartGrad)"/>
  </g>

  <!-- degen0x logo text -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#6366f1" opacity="0.9">degen0x</text>

  <!-- Category badge -->
  <rect x="60" y="130" width="100" height="30" rx="15" fill="#9945FF30"/>
  <text x="110" y="150" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#9945FF" text-anchor="middle">Solana</text>

  <rect x="175" y="130" width="130" height="30" rx="15" fill="#0969da30"/>
  <text x="240" y="150" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#58a6ff" text-anchor="middle">Intermediate</text>

  <!-- Main title -->
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Solana DeFi Ecosystem</text>
  <text x="60" y="285" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="335" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Top protocols, TVL breakdown &amp; yield opportunities</text>
  <text x="60" y="363" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">in the fastest-growing DeFi ecosystem</text>

  <!-- Stats row -->
  <g transform="translate(60, 410)">
    <rect width="150" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Total DeFi TVL</text>
    <text x="15" y="48" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#22c55e">$9B+</text>
  </g>
  <g transform="translate(230, 410)">
    <rect width="160" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">YoY Growth</text>
    <text x="15" y="48" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#14F195">900%</text>
  </g>
  <g transform="translate(410, 410)">
    <rect width="170" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Stablecoins</text>
    <text x="15" y="48" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#06b6d4">$13.45B</text>
  </g>
  <g transform="translate(600, 410)">
    <rect width="160" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">SOL TVL (ATH)</text>
    <text x="15" y="48" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#9945FF">80M SOL</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
