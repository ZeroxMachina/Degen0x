  <text x="462" y="581" text-anchor="end" font-size="13" font-weight="600" fill="#a78bfa">SOL ecosystem</text>
  <circle cx="480" cy="577" r="5" fill="#a78bfa" filter="url(#glow)"/>
  <text x="492" y="582" font-size="11" fill="#a78bfa">LIVE</text>

  <!-- ═══ BOTTOM BAR ═══ -->
