  <text x="70" y="618" font-size="13" font-weight="700" fill="#e6edf3">degen0x.com</text>
  <text x="72" y="618" font-size="13" fill="rgba(255,255,255,0.2)"> · </text>
  <text x="85" y="618" font-size="13" fill="#6e7681">degen0x.com/learn/restaking-eigenlayer-guide</text>
  <!-- Right badge -->
