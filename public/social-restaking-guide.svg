  <rect x="350" y="302" width="148" height="40" rx="20" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <text x="424" y="327" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">+2–5% Extra APY</text>

