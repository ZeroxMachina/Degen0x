  <rect x="670" y="508" width="432" height="40" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="886" y="533" text-anchor="middle" font-size="13" font-weight="700" fill="#4ade80">+2–5% additional APY on top of base staking yield</text>

  <!-- ═══ LEFT PANEL: Competitor comparison ═══ -->
  <!-- Section label -->
