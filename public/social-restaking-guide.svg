  <!-- Panel background -->
  <rect x="620" y="48" width="532" height="516" rx="20" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.07)" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Panel label -->
  <text x="886" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="0.12em">RESTAKING FLOW</text>

