    <circle cx="16" cy="16" r="1" fill="rgba(255,255,255,0.03)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ═══ TOP ACCENT BAR ═══ -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- ═══ BADGE — TOP LEFT ═══ -->
  <rect x="48" y="38" width="190" height="32" rx="16" fill="rgba(99,102,241,0.18)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.6"/>
  <text x="143" y="59" text-anchor="middle" font-size="13" font-weight="600" fill="#818cf8" letter-spacing="0.08em">RESTAKING GUIDE 2026</text>

