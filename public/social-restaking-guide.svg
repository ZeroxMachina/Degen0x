  <!-- Symbiotic row -->
  <rect x="48" y="452" width="532" height="42" rx="10" fill="rgba(6,182,212,0.07)" stroke="rgba(6,182,212,0.18)" stroke-width="1"/>
  <text x="70" y="477" font-size="14" font-weight="700" fill="#22d3ee">Symbiotic</text>
  <text x="220" y="477" font-size="13" fill="#8b949e">Multi-asset · Paradigm-backed</text>
  <text x="462" y="477" text-anchor="end" font-size="13" font-weight="600" fill="#22d3ee">Growing</text>
  <circle cx="480" cy="473" r="5" fill="#22d3ee" filter="url(#glow)"/>
  <text x="492" y="478" font-size="11" fill="#22d3ee">LIVE</text>

  <!-- Karak row -->
  <rect x="48" y="504" width="532" height="42" rx="10" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.18)" stroke-width="1"/>
  <text x="70" y="529" font-size="14" font-weight="700" fill="#fbbf24">Karak</text>
  <text x="220" y="529" font-size="13" fill="#8b949e">Cross-chain · Aggressive incentives</text>
  <text x="462" y="529" text-anchor="end" font-size="13" font-weight="600" fill="#fbbf24">~$2B TVL</text>
  <circle cx="480" cy="525" r="5" fill="#fbbf24" filter="url(#glow)"/>
  <text x="492" y="530" font-size="11" fill="#fbbf24">LIVE</text>

