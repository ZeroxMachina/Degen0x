  <text x="70" y="425" font-size="14" font-weight="700" fill="#818cf8">EigenLayer</text>
  <text x="220" y="425" font-size="13" fill="#8b949e">ETH · LSTs · $20B TVL</text>
  <text x="462" y="425" text-anchor="end" font-size="13" font-weight="600" fill="#4ade80">60+ AVSs</text>
  <circle cx="480" cy="421" r="5" fill="#4ade80" filter="url(#glow)"/>
