  <text x="122" y="327" text-anchor="middle" font-size="14" font-weight="700" fill="#4ade80">$20B+ TVR</text>

  <!-- 60+ AVSs -->
  <rect x="208" y="302" width="130" height="40" rx="20" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.5"/>
  <text x="273" y="327" text-anchor="middle" font-size="14" font-weight="700" fill="#22d3ee">60+ AVSs</text>

