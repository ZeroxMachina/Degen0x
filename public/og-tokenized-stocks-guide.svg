<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glow1" cx="0.3" cy="0.2" r="0.5" fx="0.3" fy="0.2" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="0.8" cy="0.7" r="0.4" fx="0.8" fy="0.7" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="300" cy="200" r="250" fill="#6366f1" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="950" cy="450" r="200" fill="#0891b2" opacity="0.06" filter="url(#blur2)"/>
  <circle cx="100" cy="500" r="150" fill="#d97706" opacity="0.05" filter="url(#blur1)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
  </g>

  <!-- Logo placeholder (0x glyph) -->
  <g transform="translate(80, 50)">
    <circle cx="20" cy="20" r="18" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>
    <text x="20" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#6366f1">0x</text>
  </g>
  <text x="125" y="68" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="130" width="110" height="30" rx="15" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="135" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#6366f1">DeFi · RWA</text>

  <rect x="200" y="130" width="120" height="30" rx="15" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
  <text x="260" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e">March 2026</text>

  <!-- Main title -->
  <text x="80" y="220" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Tokenized Stocks 2026</text>
  <text x="80" y="275" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="700" fill="url(#accent)" letter-spacing="-0.01em">Buy US Equities On-Chain 24/7</text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">The complete guide to Ondo Finance, Backed Finance, Dinari — risks, yields, &amp; regulations</text>

  <!-- Stats cards -->
  <g transform="translate(80, 380)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="230" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Total On-Chain Equities</text>
    <text x="20" y="60" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">$1B+</text>
    <text x="20" y="78" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">March 2026 milestone</text>

    <!-- Card 2 -->
    <rect x="250" y="0" width="230" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="270" y="30" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Market Leader</text>
    <text x="270" y="60" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#6366f1">Ondo ~58%</text>
    <text x="270" y="78" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">50+ US stocks &amp; ETFs</text>

    <!-- Card 3 -->
    <rect x="500" y="0" width="230" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="520" y="30" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Approved In</text>
    <text x="520" y="60" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#f59e0b">US EU UAE</text>
    <text x="520" y="78" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">3 major jurisdictions</text>

    <!-- Card 4 -->
    <rect x="750" y="0" width="230" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="770" y="30" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Settlement</text>
    <text x="770" y="60" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4">24/7</text>
    <text x="770" y="78" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Near-instant on-chain</text>
  </g>

  <!-- Decorative stock tickers floating -->
  <g opacity="0.15">
    <text x="850" y="100" font-family="Inter, monospace" font-size="14" font-weight="600" fill="#22c55e">AAPL +1.23%</text>
    <text x="900" y="130" font-family="Inter, monospace" font-size="14" font-weight="600" fill="#ef4444">TSLA -2.18%</text>
    <text x="870" y="160" font-family="Inter, monospace" font-size="14" font-weight="600" fill="#22c55e">NVDA +3.45%</text>
    <text x="920" y="190" font-family="Inter, monospace" font-size="14" font-weight="600" fill="#22c55e">SPY +0.64%</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="rgba(0,0,0,0.4)"/>
  <rect x="0" y="540" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="80" y="590" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">degen0x.com</text>
  <text x="1120" y="590" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">14 min read · Intermediate</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>