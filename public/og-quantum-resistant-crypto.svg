<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="280" cy="280" r="260" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="900" cy="400" r="240" fill="#06b6d4" opacity="0.05"/>
  <circle cx="600" cy="150" r="150" fill="#ec4899" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo area -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="2">degen0x</text>

  <!-- Threat matrix panel -->
  <g transform="translate(780, 130)">
    <rect x="0" y="0" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">QUANTUM VULNERABILITY</text>

    <!-- ECDSA row -->
    <text x="24" y="70" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e6edf3">ECDSA</text>
    <rect x="120" y="57" width="190" height="20" rx="4" fill="rgba(239,68,68,0.1)"/>
    <rect x="120" y="57" width="180" height="20" rx="4" fill="#ef4444" opacity="0.4"/>
    <text x="300" y="72" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ef4444" text-anchor="end">HIGH</text>

    <!-- RSA row -->
    <text x="24" y="105" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e6edf3">RSA</text>
    <rect x="120" y="92" width="190" height="20" rx="4" fill="rgba(239,68,68,0.1)"/>
    <rect x="120" y="92" width="170" height="20" rx="4" fill="#ef4444" opacity="0.35"/>
    <text x="300" y="107" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ef4444" text-anchor="end">HIGH</text>

    <!-- Lattice row -->
    <text x="24" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e6edf3">Lattice</text>
    <rect x="120" y="127" width="190" height="20" rx="4" fill="rgba(34,197,94,0.1)"/>
    <rect x="120" y="127" width="30" height="20" rx="4" fill="#22c55e" opacity="0.4"/>
    <text x="300" y="142" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e" text-anchor="end">SAFE</text>

    <!-- Hash row -->
    <text x="24" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e6edf3">Hash-based</text>
    <rect x="120" y="162" width="190" height="20" rx="4" fill="rgba(34,197,94,0.1)"/>
    <rect x="120" y="162" width="25" height="20" rx="4" fill="#22c55e" opacity="0.4"/>
    <text x="300" y="177" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e" text-anchor="end">SAFE</text>
  </g>

  <!-- Category badge -->
  <rect x="60" y="140" width="80" height="28" rx="14" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="100" y="159" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" text-anchor="middle">Security</text>

  <!-- Title -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#accent)" letter-spacing="-1">Quantum-Resistant</text>
  <text x="60" y="295" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#accent)" letter-spacing="-1">Crypto</text>

  <!-- Subtitle -->
  <text x="60" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Protect Your Holdings Before Q-Day Arrives</text>

  <!-- Key stats -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="190" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">BTC VULNERABLE</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#ef4444">25%</text>
  </g>
  <g transform="translate(270, 390)">
    <rect x="0" y="0" width="190" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">AT RISK VALUE</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f59e0b">$718B</text>
  </g>
  <g transform="translate(480, 390)">
    <rect x="0" y="0" width="190" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">NIST STANDARDS</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#22c55e">4 Approved</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>