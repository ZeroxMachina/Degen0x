<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>

    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f22;stop-opacity:1" />
    </linearGradient>

    <!-- Top accent bar gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Glow blur filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="110" cy="160" r="80" fill="#a855f7" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1090" cy="530" r="120" fill="#a855f7" opacity="0.08" filter="url(#glow)"/>
  <circle cx="600" cy="-60" r="150" fill="#0891b2" opacity="0.06" filter="url(#glow)"/>

  <!-- Logo text -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#4f46e5" letter-spacing="2">
    degen0x
  </text>

  <!-- Category badge -->
  <rect x="40" y="80" width="110" height="40" rx="20" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
  <text x="95" y="105" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#a855f7" text-anchor="middle">
    RWA
  </text>

  <!-- Main title -->
  <text x="40" y="200" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    Tokenized Treasury
  </text>
  <text x="40" y="265" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    Bills Guide 2026
  </text>

  <!-- Subtitle -->
  <text x="40" y="320" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#8b949e">
    Earn US Treasury yields on-chain with USDY, USDM, and more
  </text>

  <!-- Right panel background -->
  <rect x="750" y="100" width="430" height="470" rx="20" fill="rgba(168, 85, 247, 0.05)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>

  <!-- Right panel title -->
  <text x="780" y="140" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">
    Yield Comparison
  </text>

  <!-- USDY -->
  <rect x="780" y="160" width="360" height="80" rx="8" fill="rgba(168, 85, 247, 0.1)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>

  <text x="800" y="180" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="white">USDY (Ondo Finance)</text>
  <text x="800" y="200" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#8b949e">Current Yield</text>

  <rect x="1050" y="170" width="120" height="28" rx="6" fill="rgba(168, 85, 247, 0.2)"/>
  <text x="1110" y="191" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#a855f7" text-anchor="middle">4.25%</text>

  <circle cx="810" cy="225" r="2" fill="#a855f7"/>
  <text x="820" y="228" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#8b949e">Treasury Bills + Money Market</text>

  <!-- USDM -->
  <rect x="780" y="260" width="360" height="80" rx="8" fill="rgba(168, 85, 247, 0.1)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>

  <text x="800" y="280" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="white">USDM (Monerium)</text>
  <text x="800" y="300" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#8b949e">Current Yield</text>

  <rect x="1050" y="270" width="120" height="28" rx="6" fill="rgba(168, 85, 247, 0.2)"/>
  <text x="1110" y="291" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#a855f7" text-anchor="middle">5.0%</text>

  <circle cx="810" cy="325" r="2" fill="#a855f7"/>
  <text x="820" y="328" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#8b949e">Short-term Treasury Notes</text>

  <!-- USD0++ -->
  <rect x="780" y="360" width="360" height="80" rx="8" fill="rgba(168, 85, 247, 0.1)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>

  <text x="800" y="380" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="white">USD0++ (Zero Hash)</text>
  <text x="800" y="400" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#8b949e">Current Yield</text>

  <rect x="1050" y="370" width="120" height="28" rx="6" fill="rgba(168, 85, 247, 0.2)"/>
  <text x="1110" y="391" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#a855f7" text-anchor="middle">5.8%</text>

  <circle cx="810" cy="425" r="2" fill="#a855f7"/>
  <text x="820" y="428" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#8b949e">Premium yield basket allocation</text>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(168, 85, 247, 0.1)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1"/>
  <text x="40" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8b949e">
    degen0x.com
  </text>
  <text x="1160" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#a855f7" text-anchor="end">
    Learn Crypto
  </text>
</svg>
