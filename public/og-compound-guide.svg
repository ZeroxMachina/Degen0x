<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d395"/>
      <stop offset="50%" stop-color="#00b37d"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="180" fill="#00d395" opacity="0.04"/>
  <circle cx="1050" cy="400" r="120" fill="#6366f1" opacity="0.05"/>
  <circle cx="200" cy="500" r="100" fill="#00d395" opacity="0.03"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.1em">DEGEN0X.COM</text>

  <!-- Category badge -->
  <rect x="60" y="100" width="110" height="28" rx="14" fill="#00d39520" stroke="#00d39540" stroke-width="1"/>
  <text x="115" y="119" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#00d395" text-anchor="middle">ECOSYSTEM</text>

  <!-- Protocol icon -->
  <rect x="60" y="155" width="64" height="64" rx="16" fill="#00d39520" stroke="#00d39540" stroke-width="1"/>
  <text x="92" y="198" font-family="Inter, system-ui, sans-serif" font-size="36" text-anchor="middle">🏦</text>

  <!-- Title -->
  <text x="140" y="185" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Compound Finance</text>
  <text x="140" y="215" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">DeFi Lending OG · Complete 2026 Guide</text>

  <!-- Stat cards row -->
  <g transform="translate(60, 260)">
    <!-- TVL -->
    <rect width="160" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-transform="uppercase">TVL</text>
    <text x="16" y="58" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#00d395">$2.1B</text>
  </g>
  <g transform="translate(236, 260)">
    <!-- Markets -->
    <rect width="160" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">MARKETS</text>
    <text x="16" y="58" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#58a6ff">USDC, ETH+</text>
  </g>
  <g transform="translate(412, 260)">
    <!-- Token -->
    <rect width="160" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">TOKEN</text>
    <text x="16" y="58" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#bc8cff">$COMP</text>
  </g>
  <g transform="translate(588, 260)">
    <!-- Architecture -->
    <rect width="200" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">ARCHITECTURE</text>
    <text x="16" y="58" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#3fb950">Comet V3</text>
  </g>

  <!-- Decorative chart visualization -->
  <g transform="translate(850, 260)">
    <rect width="290" height="280" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Supply APY (USDC)</text>
    <!-- Bar chart -->
    <rect x="30" y="180" width="30" height="60" rx="4" fill="#00d39560"/>
    <rect x="70" y="150" width="30" height="90" rx="4" fill="#00d39570"/>
    <rect x="110" y="120" width="30" height="120" rx="4" fill="#00d39580"/>
    <rect x="150" y="90" width="30" height="150" rx="4" fill="#00d39590"/>
    <rect x="190" y="60" width="30" height="180" rx="4" fill="#00d395"/>
    <text x="45" y="258" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Q1</text>
    <text x="85" y="258" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Q2</text>
    <text x="125" y="258" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Q3</text>
    <text x="165" y="258" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Q4</text>
    <text x="205" y="258" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Now</text>
  </g>

  <!-- Bottom section -->
  <text x="60" y="420" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Algorithmic money markets · Single-asset borrowing</text>
  <text x="60" y="448" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">$COMP governance · Comet architecture</text>

  <!-- Tags -->
  <g transform="translate(60, 475)">
    <rect width="80" height="26" rx="13" fill="#00d39520"/>
    <text x="40" y="18" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#00d395" text-anchor="middle">Lending</text>
    <rect x="90" width="80" height="26" rx="13" fill="#58a6ff20"/>
    <text x="130" y="18" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#58a6ff" text-anchor="middle">DeFi OG</text>
    <rect x="180" width="100" height="26" rx="13" fill="#bc8cff20"/>
    <text x="230" y="18" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#bc8cff" text-anchor="middle">Governance</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681">degen0x.com/ecosystem/compound</text>
  <text x="1140" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681" text-anchor="end">2026 Guide</text>
</svg>
