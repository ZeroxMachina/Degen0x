<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="circleGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="circleGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Grid pattern -->
  <g stroke="#1a2332" stroke-width="1" opacity="0.3">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="150" cy="105" r="80" fill="url(#circleGrad1)"/>
  <circle cx="1070" cy="400" r="125" fill="url(#circleGrad2)"/>
  <circle cx="910" cy="130" r="62" fill="url(#circleGrad1)"/>
  <circle cx="240" cy="510" r="92" fill="url(#circleGrad2)"/>

  <!-- Category badges -->
  <rect x="120" y="80" width="140" height="36" rx="18" fill="#1a2332" stroke="#22c55e" stroke-width="1.5"/>
  <text x="190" y="104" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">Layer 1</text>

  <rect x="290" y="80" width="140" height="36" rx="18" fill="#1a2332" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="360" y="104" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#06b6d4" text-anchor="middle">Move VM</text>

  <!-- Title -->
  <text x="600" y="195" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" text-anchor="middle">Aptos Blockchain</text>
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" text-anchor="middle">Guide 2026</text>

  <!-- Subtitle -->
  <text x="600" y="295" font-family="Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle">Move-Powered Layer 1 for Scalable DeFi</text>

  <!-- Stats row -->
  <g>
    <!-- Stat 1 -->
    <rect x="200" y="320" width="170" height="72" rx="8" fill="#1a2332" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <text x="285" y="345" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#22c55e" text-anchor="middle">160K+</text>
    <text x="285" y="365" font-family="Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Peak TPS</text>

    <!-- Stat 2 -->
    <rect x="515" y="320" width="170" height="72" rx="8" fill="#1a2332" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <text x="600" y="345" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#06b6d4" text-anchor="middle">$1.2B</text>
    <text x="600" y="365" font-family="Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">TVL</text>

    <!-- Stat 3 -->
    <rect x="830" y="320" width="170" height="72" rx="8" fill="#1a2332" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <text x="915" y="345" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#22c55e" text-anchor="middle">$12B+</text>
    <text x="915" y="365" font-family="Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">FDV</text>
  </g>

  <!-- Key features -->
  <g>
    <circle cx="180" cy="440" r="4" fill="#22c55e"/>
    <text x="200" y="447" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Move Language</text>

    <circle cx="180" cy="475" r="4" fill="#06b6d4"/>
    <text x="200" y="482" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Block-STM Execution</text>

    <circle cx="180" cy="510" r="4" fill="#22c55e"/>
    <text x="200" y="517" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Keyless Accounts</text>

    <circle cx="650" cy="440" r="4" fill="#06b6d4"/>
    <text x="670" y="447" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Object Model</text>

    <circle cx="650" cy="475" r="4" fill="#22c55e"/>
    <text x="670" y="482" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Fair Ordering</text>

    <circle cx="650" cy="510" r="4" fill="#06b6d4"/>
    <text x="670" y="517" font-family="Arial, sans-serif" font-size="15" fill="#c9d1d9">Native NFTs</text>
  </g>

  <!-- Bottom bar -->
  <rect y="590" width="1200" height="40" fill="#0a0f18" stroke="#1a2332" stroke-width="1"/>
  <text x="40" y="615" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#22c55e">degen0x</text>
  <text x="1160" y="615" font-family="Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="end">March 2026</text>
</svg>