<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="60%" style="stop-color:#0d1428"/>
      <stop offset="100%" style="stop-color:#080d1c"/>
    </linearGradient>
    <!-- Brand signature gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Title text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Card glass -->
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <!-- Clip paths -->
    <clipPath id="cardClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="200" cy="500" rx="280" ry="200" fill="#4f46e5" opacity="0.06"/>
  <ellipse cx="1000" cy="130" rx="320" ry="220" fill="#0891b2" opacity="0.07"/>
  <ellipse cx="700" cy="400" rx="200" ry="150" fill="#d97706" opacity="0.04"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- degen0x logo mark (top-left) -->
  <g transform="translate(52, 42)">
    <circle cx="18" cy="18" r="18" fill="#6366f1" opacity="0.2"/>
    <circle cx="18" cy="18" r="18" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <text x="18" y="23" text-anchor="middle" font-family="Inter, monospace" font-size="11" font-weight="700" fill="#818cf8">0x</text>
  </g>
  <text x="82" y="64" font-family="Inter, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#8b949e" letter-spacing="0.5">degen0x</text>

  <!-- LIVE badge (top right) -->
  <g transform="translate(1050, 38)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
    <circle cx="16" cy="15" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="52" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#22c55e" letter-spacing="1">NEW</text>
  </g>

  <!-- Main title area -->
  <text x="52" y="160" font-family="Inter, -apple-system, sans-serif" font-size="68" font-weight="900" fill="url(#titleGrad)" letter-spacing="-2">PayFi Guide 2026</text>
  <text x="54" y="210" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#8b949e">Payment Finance: where stablecoins meet real yield</text>

  <!-- Subtitle pill -->
  <rect x="52" y="228" width="340" height="36" rx="18" fill="rgba(79,70,229,0.15)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="222" y="251" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8" letter-spacing="0.5">+ Interactive Yield Calculator</text>

  <!-- Stats row (3 cards) -->
  <!-- Card 1: Sector Size -->
  <g transform="translate(52, 294)">
    <rect width="200" height="90" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="100" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6e7681" letter-spacing="1">SECTOR SIZE</text>
    <text x="100" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#22d3ee">$2.27B</text>
    <text x="100" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#6e7681">2026 market cap</text>
  </g>

  <!-- Card 2: Huma Volume -->
  <g transform="translate(268, 294)">
    <rect width="200" height="90" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="100" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6e7681" letter-spacing="1">HUMA VOLUME</text>
    <text x="100" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#4ade80">$10B+</text>
    <text x="100" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#6e7681">cumulative on Solana</text>
  </g>

  <!-- Card 3: Daily Flow -->
  <g transform="translate(484, 294)">
    <rect width="200" height="90" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="100" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6e7681" letter-spacing="1">DAILY VOLUME</text>
    <text x="100" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#fbbf24">$148M+</text>
    <text x="100" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#6e7681">on-chain daily flows</text>
  </g>

  <!-- Right side: Yield Calculator Preview Card -->
  <g transform="translate(720, 90)">
    <rect width="432" height="470" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="1" filter="url(#cardShadow)"/>

    <!-- Card header -->
    <rect width="432" height="56" rx="20" fill="rgba(99,102,241,0.12)"/>
    <rect width="432" height="36" y="20" fill="rgba(99,102,241,0.12)"/>
    <text x="20" y="36" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">PayFi Yield Calculator</text>
    <rect x="320" y="14" width="96" height="28" rx="14" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
    <text x="368" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#4ade80">LIVE CALC</text>

    <!-- Input row: Capital -->
    <text x="20" y="88" font-family="Inter, sans-serif" font-size="11" fill="#6e7681" letter-spacing="0.5">CAPITAL AMOUNT</text>
    <rect x="20" y="96" width="392" height="40" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <text x="36" y="121" font-family="Inter, monospace" font-size="16" font-weight="600" fill="#e6edf3">$10,000</text>

    <!-- Protocol selector -->
    <text x="20" y="164" font-family="Inter, sans-serif" font-size="11" fill="#6e7681" letter-spacing="0.5">PROTOCOL</text>
    <rect x="20" y="172" width="392" height="40" rx="10" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
    <text x="36" y="197" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#818cf8">Huma Finance Permissionless</text>
    <text x="370" y="197" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#22c55e">10% APY</text>

    <!-- Output rows -->
    <line x1="20" y1="232" x2="412" y2="232" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Per transaction -->
    <text x="20" y="262" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">Yield per transaction</text>
    <text x="412" y="262" text-anchor="end" font-family="Inter, monospace" font-size="15" font-weight="700" fill="#e6edf3">$27.40</text>

    <!-- Monthly yield -->
    <text x="20" y="300" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">Monthly yield</text>
    <text x="412" y="300" text-anchor="end" font-family="Inter, monospace" font-size="18" font-weight="800" fill="#22d3ee">$83.33</text>

    <!-- Annual yield -->
    <rect x="20" y="318" width="392" height="52" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="36" y="348" font-family="Inter, sans-serif" font-size="14" fill="#8b949e">Annual yield</text>
    <text x="396" y="350" text-anchor="end" font-family="Inter, monospace" font-size="24" font-weight="900" fill="#4ade80">$1,000.00</text>

    <!-- 5yr compound -->
    <text x="20" y="396" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">5-year compounded</text>
    <text x="412" y="396" text-anchor="end" font-family="Inter, monospace" font-size="16" font-weight="700" fill="#fbbf24">$6,105.10</text>

    <!-- Protocol list -->
    <text x="20" y="432" font-family="Inter, sans-serif" font-size="11" fill="#6e7681" letter-spacing="0.5">ALSO: AAVE USDC 5.5% · ONDO OUSG 5.2% · CURVE 3POOL 3.5%</text>

    <!-- CTA -->
    <rect x="20" y="444" width="392" height="16" rx="4" fill="rgba(255,255,255,0.03)"/>
    <text x="216" y="455" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#6366f1" letter-spacing="0.5">degen0x.com/learn/payfi-guide</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="588" width="1200" height="42" fill="rgba(0,0,0,0.4)"/>
  <line x1="0" y1="588" x2="1200" y2="588" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Bottom left: degen0x.com -->
  <text x="52" y="615" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="160" y="615" font-family="Inter, sans-serif" font-size="14" fill="#3d444d">/learn/payfi-guide</text>

  <!-- Bottom right: tags -->
  <text x="1148" y="615" text-anchor="end" font-family="Inter, sans-serif" font-size="13" fill="#3d444d">#PayFi  #DeFi  #StablecoinYield</text>
</svg>
