<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="250" r="200" fill="#22c55e" opacity="0.06"/>
  <circle cx="150" cy="500" r="120" fill="#58a6ff" opacity="0.04"/>

  <!-- Thematic icon: arrows up and down (on/off ramp) -->
  <g opacity="0.14" transform="translate(950, 200)">
    <!-- Up arrow -->
    <path d="M 0 40 L 0 -20 M 0 -20 L -15 -5 M 0 -20 L 15 -5" stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Down arrow -->
    <path d="M 50 -40 L 50 20 M 50 20 L 35 5 M 50 20 L 65 5" stroke="#58a6ff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Vertical line connecting -->
    <line x1="25" y1="-20" x2="25" y2="20" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Category badge -->
  <rect x="60" y="180" width="140" height="32" rx="16" fill="#22c55e" opacity="0.2"/>
  <text x="130" y="201" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Onboarding</text>

  <!-- Title (two lines) -->
  <text x="60" y="280" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Crypto On-Ramps &amp; Off-Ramps</text>
  <text x="60" y="335" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="390" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="20">Buy and sell crypto with fiat — fees, methods &amp; best options</text>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="#0a0f1e" opacity="0.8"/>
  <text x="60" y="598" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">degen0x</text>
  <text x="170" y="598" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16">degen0x.com</text>
  <text x="1060" y="598" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="end">2026 Guide</text>
</svg>