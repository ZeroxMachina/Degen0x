<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.3" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#080d1c"/>

  <circle cx="100" cy="100" r="150" fill="url(#purpleGradient)" filter="url(#softGlow)"/>
  <circle cx="1100" cy="530" r="200" fill="url(#purpleGradient)" filter="url(#softGlow)"/>

  <g opacity="0.2">
    <path d="M 950 80 L 1050 80 L 1000 150 Z" stroke="#6366f1" stroke-width="2" fill="none"/>
    <path d="M 950 120 L 1050 120 L 1000 190 Z" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="1000" cy="100" r="40" stroke="#06b6d4" stroke-width="2" fill="none"/>
  </g>

  <g opacity="0.15" filter="url(#glow)">
    <circle cx="150" cy="550" r="60" stroke="#6366f1" stroke-width="2" fill="none"/>
    <circle cx="150" cy="550" r="35" stroke="#8b5cf6" stroke-width="1" fill="none"/>
  </g>

  <text x="60" y="120" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#e6edf3">Starknet Guide</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#e6edf3">2026</text>

  <text x="60" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#8b949e">Validity Rollup, STRK Staking & BTCFi</text>

  <g opacity="0.05">
    <rect x="60" y="280" width="1080" height="280" rx="16" fill="url(#mainGradient)"/>
  </g>

  <rect x="80" y="300" width="300" height="240" rx="12" fill="#1a1f35" stroke="#6366f1" stroke-width="1" opacity="0.7"/>
  <circle cx="130" cy="340" r="20" fill="url(#mainGradient)"/>
  <text x="170" y="330" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8b949e">Total Value Locked</text>
  <text x="100" y="385" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#06b6d4">$542M</text>
  <text x="100" y="415" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#8b949e">Secured by ZK proofs</text>

  <rect x="450" y="300" width="300" height="240" rx="12" fill="#1a1f35" stroke="#8b5cf6" stroke-width="1" opacity="0.7"/>
  <circle cx="500" cy="340" r="20" fill="url(#mainGradient)"/>
  <text x="540" y="330" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8b949e">STRK Staked</text>
  <text x="470" y="385" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#f59e0b">1.1B</text>
  <text x="470" y="415" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#8b949e">Decentralized validators</text>

  <rect x="820" y="300" width="320" height="240" rx="12" fill="#1a1f35" stroke="#0891b2" stroke-width="1" opacity="0.7"/>
