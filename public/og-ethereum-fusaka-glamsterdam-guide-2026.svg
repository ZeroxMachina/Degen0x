<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Upgrade visualization - stacked layers -->
  <g opacity="0.3">
    <rect x="110" y="100" width="90" height="90" fill="none" stroke="#4f46e5" stroke-width="2" rx="5"/>
    <rect x="120" y="145" width="90" height="90" fill="none" stroke="#0891b2" stroke-width="2" rx="5"/>
    <rect x="130" y="190" width="90" height="90" fill="none" stroke="#d97706" stroke-width="2" rx="5"/>
  </g>

  <!-- Upgrade arrow -->
  <line x1="280" y1="180" x2="400" y2="180" stroke="#0891b2" stroke-width="3" opacity="0.5"/>
  <polygon points="400,180 420,175 420,185" fill="#0891b2" opacity="0.5"/>

  <!-- Right side network visualization -->
  <circle cx="950" cy="480" r="55" fill="none" stroke="#d97706" stroke-width="2" opacity="0.3"/>
  <circle cx="950" cy="480" r="30" fill="none" stroke="#d97706" stroke-width="1" opacity="0.15"/>
  <circle cx="850" cy="420" r="20" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.2"/>
  <line x1="870" y1="435" x2="930" y2="465" stroke="#0891b2" stroke-width="1" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="280" font-family="Inter, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">
    Ethereum Fusaka & Glamsterdam
  </text>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" fill="#8b949e">
    Next-Generation Protocol Upgrades
  </text>

  <!-- Footer branding -->
  <text x="1150" y="600" font-family="Inter, sans-serif" font-size="16" text-anchor="end" fill="#6e7681">
    degen0x.com
  </text>

  <!-- Decorative elements -->
  <circle cx="150" cy="450" r="4" fill="#4f46e5" opacity="0.6"/>
  <circle cx="700" cy="120" r="4" fill="#d97706" opacity="0.5"/>
  <circle cx="1100" cy="300" r="4" fill="#0891b2" opacity="0.5"/>
  <circle cx="400" cy="500" r="3" fill="#4f46e5" opacity="0.4"/>
</svg>