<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="circleGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="circleGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="200" r="180" fill="url(#circleGrad1)"/>
  <circle cx="900" cy="450" r="130" fill="url(#circleGrad2)"/>
  <circle cx="200" cy="550" r="100" fill="url(#circleGrad1)"/>

  <!-- Agent identity visualization -->
  <g opacity="0.2">
    <!-- Agent node (central) -->
    <circle cx="970" cy="250" r="40" stroke="#06b6d4" stroke-width="2" fill="url(#agentGrad)"/>
    <text x="970" y="245" fill="#06b6d4" font-size="20" font-family="Inter, system-ui, sans-serif" text-anchor="middle">AI</text>
    <text x="970" y="265" fill="#8b949e" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Agent</text>

    <!-- Identity attributes radiating out -->
    <!-- DID -->
    <circle cx="870" cy="170" r="22" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>
    <text x="870" y="175" fill="#8b5cf6" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="middle">DID</text>
    <line x1="890" y1="185" x2="940" y2="220" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Wallet -->
    <circle cx="1090" cy="190" r="22" stroke="#22c55e" stroke-width="1.5" fill="none"/>
    <text x="1090" y="186" fill="#22c55e" font-size="9" font-family="Inter, system-ui, sans-serif" text-anchor="middle">0x...</text>
    <text x="1090" y="198" fill="#22c55e" font-size="9" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Wallet</text>
    <line x1="1070" y1="200" x2="1010" y2="240" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Attestation -->
    <circle cx="1070" cy="330" r="22" stroke="#f59e0b" stroke-width="1.5" fill="none"/>
    <text x="1070" y="328" fill="#f59e0b" font-size="8" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Attest-</text>
    <text x="1070" y="340" fill="#f59e0b" font-size="8" font-family="Inter, system-ui, sans-serif" text-anchor="middle">ation</text>
    <line x1="1050" y1="315" x2="1000" y2="280" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Permission -->
    <circle cx="870" cy="330" r="22" stroke="#ef4444" stroke-width="1.5" fill="none"/>
    <text x="870" y="328" fill="#ef4444" font-size="8" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Perm-</text>
    <text x="870" y="340" fill="#ef4444" font-size="8" font-family="Inter, system-ui, sans-serif" text-anchor="middle">issions</text>
    <line x1="890" y1="315" x2="940" y2="275" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- Logo area -->
  <g transform="translate(60, 50)">
    <circle cx="18" cy="18" r="18" fill="#6366f1" opacity="0.9"/>
    <text x="18" y="24" fill="white" font-size="16" font-weight="700" font-family="Inter, system-ui, sans-serif" text-anchor="middle">0x</text>
    <text x="48" y="24" fill="#e6edf3" font-size="18" font-weight="600" font-family="Inter, system-ui, sans-serif">degen0x</text>
  </g>

  <!-- Category badges -->
  <rect x="60" y="180" width="68" height="24" rx="12" fill="#06b6d4"/>
  <text x="94" y="196" fill="white" font-size="11" font-weight="600" font-family="Inter, system-ui, sans-serif" text-anchor="middle">AI Agents</text>
  <rect x="138" y="180" width="62" height="24" rx="12" fill="#8b5cf6"/>
  <text x="169" y="196" fill="white" font-size="11" font-weight="600" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Identity</text>
  <rect x="210" y="180" width="80" height="24" rx="12" fill="#f59e0b" opacity="0.9"/>
  <text x="250" y="196" fill="#0d1117" font-size="11" font-weight="600" font-family="Inter, system-ui, sans-serif" text-anchor="middle">2026 Guide</text>

  <!-- Title -->
  <text x="60" y="270" fill="url(#titleGrad)" font-size="46" font-weight="800" font-family="Inter, system-ui, sans-serif" letter-spacing="-1">
    AI Agent Identity &amp;
  </text>
  <text x="60" y="330" fill="#e6edf3" font-size="44" font-weight="700" font-family="Inter, system-ui, sans-serif" letter-spacing="-0.5">
    Non-Human Identity
  </text>
  <text x="60" y="385" fill="#e6edf3" font-size="38" font-weight="700" font-family="Inter, system-ui, sans-serif" letter-spacing="-0.5">
    (NHI) in Crypto
  </text>

  <!-- Subtitle -->
  <text x="60" y="435" fill="#8b949e" font-size="18" font-family="Inter, system-ui, sans-serif">
    DIDs, agent wallets, permissions, attestations &amp; autonomous onchain actors
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0f1f"/>
  <text x="60" y="616" fill="#6e7681" font-size="15" font-family="Inter, system-ui, sans-serif">degen0x.com</text>
  <text x="1140" y="616" fill="#6e7681" font-size="14" font-family="Inter, system-ui, sans-serif" text-anchor="end">March 2026</text>
</svg>