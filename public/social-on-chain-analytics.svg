<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="80" y1="400" x2="580" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="80" y1="400" x2="580" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
    <clipPath id="roundCard">
      <rect x="660" y="160" width="480" height="360" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="350" r="180" fill="#6366f1" opacity="0.06" filter="url(#glow1)"/>
  <circle cx="900" cy="250" r="200" fill="#06b6d4" opacity="0.05" filter="url(#glow1)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="80" y1="200" x2="580" y2="200"/>
    <line x1="80" y1="260" x2="580" y2="260"/>
    <line x1="80" y1="320" x2="580" y2="320"/>
    <line x1="80" y1="380" x2="580" y2="380"/>
    <line x1="80" y1="440" x2="580" y2="440"/>
    <line x1="80" y1="200" x2="80" y2="440"/>
    <line x1="180" y1="200" x2="180" y2="440"/>
    <line x1="280" y1="200" x2="280" y2="440"/>
    <line x1="380" y1="200" x2="380" y2="440"/>
    <line x1="480" y1="200" x2="480" y2="440"/>
    <line x1="580" y1="200" x2="580" y2="440"/>
  </g>

  <!-- Chart area fill -->
  <path d="M80 420 L130 400 L180 390 L230 370 L280 350 L330 310 L380 280 L430 250 L480 230 L530 210 L580 195 L580 440 L80 440 Z" fill="url(#chartFill)"/>

  <!-- Chart line -->
  <path d="M80 420 L130 400 L180 390 L230 370 L280 350 L330 310 L380 280 L430 250 L480 230 L530 210 L580 195" stroke="url(#chartLine)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chart data points -->
  <circle cx="280" cy="350" r="5" fill="#06b6d4"/>
  <circle cx="380" cy="280" r="5" fill="#06b6d4"/>
  <circle cx="480" cy="230" r="5" fill="#6366f1"/>
  <circle cx="580" cy="195" r="5" fill="#6366f1"/>

  <!-- Annotation callout on chart -->
  <line x1="430" y1="250" x2="430" y2="180" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <rect x="395" y="155" width="70" height="24" rx="6" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="430" y="171" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">Whale Buy</text>

  <!-- Y-axis labels -->
  <text x="70" y="205" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$68K</text>
  <text x="70" y="325" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$52K</text>
  <text x="70" y="445" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$38K</text>

  <!-- degen0x logo mark -->
  <g transform="translate(80, 60)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.2"/>
    <text x="16" y="21" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#818cf8" text-anchor="middle">0x</text>
  </g>
  <text x="120" y="80" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">degen0x.com</text>

  <!-- Hero title -->
  <text x="80" y="135" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">On-Chain Analytics</text>
  <text x="80" y="175" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">See crypto moves before they happen</text>

  <!-- Right panel: glass card with metrics -->
  <g clip-path="url(#roundCard)">
    <rect x="660" y="160" width="480" height="360" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>

    <!-- Card header -->
    <text x="692" y="200" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Key Signals</text>

    <!-- Metric 1: Exchange Netflow -->
    <rect x="692" y="220" width="416" height="64" rx="10" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
    <text x="712" y="245" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">Exchange Netflow</text>
    <text x="712" y="270" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e">-24,500 BTC</text>
    <rect x="1020" y="236" width="70" height="24" rx="6" fill="#22c55e" fill-opacity="0.12"/>
    <text x="1055" y="252" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">Bullish</text>

    <!-- Metric 2: MVRV Ratio -->
    <rect x="692" y="296" width="416" height="64" rx="10" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
    <text x="712" y="321" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">MVRV Ratio</text>
    <text x="712" y="346" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f59e0b">1.85</text>
    <rect x="1020" y="312" width="70" height="24" rx="6" fill="#f59e0b" fill-opacity="0.12"/>
    <text x="1055" y="328" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Neutral</text>

    <!-- Metric 3: Stablecoin Supply -->
    <rect x="692" y="372" width="416" height="64" rx="10" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
    <text x="712" y="397" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">Stablecoin Supply Ratio</text>
    <text x="712" y="422" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e">+12.4% (30d)</text>
    <rect x="1020" y="388" width="70" height="24" rx="6" fill="#22c55e" fill-opacity="0.12"/>
    <text x="1055" y="404" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">Bullish</text>

    <!-- Card footer -->
    <text x="692" y="470" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">3 metrics that predict price moves</text>
    <rect x="692" y="480" width="416" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
  </g>

  <!-- Bottom bar -->
  <rect y="610" width="1200" height="20" fill="#060a16"/>
  <rect y="610" width="1200" height="2" fill="url(#accent)" opacity="0.3"/>
  <text x="600" y="625" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">degen0x.com/learn/on-chain-analytics-guide</text>
</svg>