<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Shield icon (security symbol) -->
  <path d="M150,120 L150,200 C150,260 200,300 220,310 C240,300 290,260 290,200 L290,120 L220,90 Z"
        fill="url(#shieldGrad)" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <text x="220" y="215" font-family="Inter, sans-serif" font-size="40" text-anchor="middle" fill="#06b6d4" opacity="0.7">🔒</text>

  <!-- Hardware wallet outline (right side) -->
  <rect x="920" y="140" width="140" height="220" rx="16" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.35"/>
  <rect x="950" y="170" width="80" height="60" rx="6" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <circle cx="990" cy="310" r="15" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.25"/>
  <!-- Screen lines -->
  <line x1="960" y1="185" x2="1020" y2="185" stroke="#0891b2" stroke-width="1" opacity="0.2"/>
  <line x1="960" y1="200" x2="1010" y2="200" stroke="#0891b2" stroke-width="1" opacity="0.2"/>
  <line x1="960" y1="215" x2="1000" y2="215" stroke="#0891b2" stroke-width="1" opacity="0.2"/>

  <!-- Seed phrase grid (bottom left) -->
  <g opacity="0.3" transform="translate(80, 400)">
    <rect x="0" y="0" width="70" height="24" rx="4" fill="none" stroke="#d97706" stroke-width="1"/>
    <text x="35" y="16" font-family="monospace" font-size="9" text-anchor="middle" fill="#d97706">1. apple</text>
    <rect x="80" y="0" width="70" height="24" rx="4" fill="none" stroke="#d97706" stroke-width="1"/>
    <text x="115" y="16" font-family="monospace" font-size="9" text-anchor="middle" fill="#d97706">2. brave</text>
    <rect x="160" y="0" width="70" height="24" rx="4" fill="none" stroke="#d97706" stroke-width="1"/>
    <text x="195" y="16" font-family="monospace" font-size="9" text-anchor="middle" fill="#d97706">3. crane</text>
    <rect x="0" y="32" width="70" height="24" rx="4" fill="none" stroke="#d97706" stroke-width="1"/>
    <text x="35" y="48" font-family="monospace" font-size="9" text-anchor="middle" fill="#d97706">4. delta</text>
    <rect x="80" y="32" width="70" height="24" rx="4" fill="none" stroke="#d97706" stroke-width="1"/>
    <text x="115" y="48" font-family="monospace" font-size="9" text-anchor="middle" fill="#d97706">5. ●●●●●</text>
    <rect x="160" y="32" width="70" height="24" rx="4" fill="none" stroke="#d97706" stroke-width="1"/>
    <text x="195" y="48" font-family="monospace" font-size="9" text-anchor="middle" fill="#d97706">6. ●●●●●</text>
  </g>

  <!-- Decorative circles -->
  <circle cx="800" cy="120" r="50" fill="none" stroke="#0891b2" stroke-width="1.5" opacity="0.2"/>
  <circle cx="1100" cy="500" r="35" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.2"/>

  <!-- Category badge -->
  <rect x="80" y="280" width="110" height="30" rx="15" fill="#06b6d420" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
  <text x="135" y="300" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#06b6d4">Security</text>

  <!-- Title -->
  <text x="600" y="330" font-family="Inter, sans-serif" font-size="44" font-weight="bold" text-anchor="middle" fill="white">
    Cold Storage &amp; Seed Phrase
  </text>
  <text x="600" y="385" font-family="Inter, sans-serif" font-size="44" font-weight="bold" text-anchor="middle" fill="white">
    Security Guide 2026
  </text>

  <!-- Subtitle -->
  <text x="600" y="430" font-family="Inter, sans-serif" font-size="22" text-anchor="middle" fill="#8b949e">
    Hardware Wallets, Backup Strategies &amp; Self-Custody Best Practices
  </text>

  <!-- Small decorative dots -->
  <circle cx="400" cy="130" r="3" fill="#0891b2" opacity="0.6"/>
  <circle cx="650" cy="100" r="3" fill="#d97706" opacity="0.5"/>
  <circle cx="500" cy="540" r="3" fill="#4f46e5" opacity="0.5"/>
  <circle cx="900" cy="520" r="3" fill="#22c55e" opacity="0.4"/>

  <!-- Footer branding -->
  <text x="1150" y="600" font-family="Inter, sans-serif" font-size="16" text-anchor="end" fill="#6e7681">
    degen0x.com
  </text>
</svg>