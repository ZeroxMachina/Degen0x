<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1530"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="nftGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="200" fill="#6366f1" opacity="0.04"/>
  <circle cx="1050" cy="350" r="150" fill="#06b6d4" opacity="0.05"/>
  <circle cx="200" cy="500" r="120" fill="#d97706" opacity="0.03"/>

  <!-- NFT Frame Illustration (right side) -->
  <rect x="820" y="160" width="280" height="280" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="840" y="180" width="240" height="200" rx="12" fill="url(#nftGlow)"/>
  <!-- NFT diamond icon -->
  <polygon points="960,220 1020,290 960,360 900,290" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <polygon points="960,240 1000,290 960,340 920,290" fill="#6366f1" opacity="0.15"/>
  <!-- Lending arrow -->
  <line x1="870" y1="400" x2="1050" y2="400" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <polygon points="1050,395 1065,400 1050,405" fill="#22c55e" opacity="0.5"/>
  <text x="960" y="425" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" opacity="0.7">Liquidity Flow</text>
  <!-- DeFi tokens -->
  <circle cx="870" cy="460" r="18" fill="rgba(255,255,255,0.04)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="870" y="465" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle" font-weight="700">ETH</text>
  <circle cx="960" cy="460" r="18" fill="rgba(255,255,255,0.04)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="960" y="465" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle" font-weight="700">USDC</text>
  <circle cx="1050" cy="460" r="18" fill="rgba(255,255,255,0.04)" stroke="#d97706" stroke-width="1.5"/>
  <text x="1050" y="465" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#d97706" text-anchor="middle" font-weight="700">APY</text>

  <!-- Logo -->
  <circle cx="80" cy="60" r="20" fill="none" stroke="#818cf8" stroke-width="2"/>
  <text x="80" y="67" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#818cf8" text-anchor="middle" font-weight="800">0x</text>

  <!-- Category badge -->
  <rect x="60" y="160" width="60" height="24" rx="12" fill="#6366f1"/>
  <text x="90" y="176" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">GUIDE</text>

  <!-- Title -->
  <text x="60" y="230" font-family="Inter, system-ui, sans-serif" font-size="48" fill="url(#titleGrad)" font-weight="800" letter-spacing="-1">NFTFi Guide 2026</text>
  <text x="60" y="285" font-family="Inter, system-ui, sans-serif" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">DeFi Meets NFTs</text>

