  <text x="60" y="340" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">NFT Lending · Fractionalization · Perpetuals · Yield</text>

  <!-- Stats row -->
  <rect x="60" y="380" width="180" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="405" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Blend Market Share</text>
  <text x="80" y="428" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#22c55e" font-weight="700">~93%</text>

  <rect x="260" y="380" width="180" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="280" y="405" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Protocols Compared</text>
  <text x="280" y="428" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#06b6d4" font-weight="700">5+</text>

  <rect x="460" y="380" width="180" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="480" y="405" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Lending Volume</text>
  <text x="480" y="428" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#d97706" font-weight="700">$2.1B+</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="615" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">14 min read · March 2026</text>
</svg>