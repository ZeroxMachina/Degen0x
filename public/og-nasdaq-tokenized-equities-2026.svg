<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f2e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Logo circle top-left -->
  <circle cx="60" cy="60" r="35" fill="#1a1f3a" stroke="url(#accentGradient)" stroke-width="2" opacity="0.8"/>
  <text x="60" y="70" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#e6edf3" text-anchor="middle" dominant-baseline="middle">0x</text>

  <!-- Blockchain nodes network - right side -->
  <g opacity="0.4">
    <!-- Central node -->
    <circle cx="1050" cy="150" r="20" fill="#1a1f3a" stroke="#0891b2" stroke-width="2"/>
    <text x="1050" y="158" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#0891b2" text-anchor="middle">⬢</text>

    <!-- Connected nodes -->
    <circle cx="1000" cy="120" r="14" fill="#1a1f3a" stroke="#4f46e5" stroke-width="1.5" opacity="0.8"/>
    <circle cx="1100" cy="110" r="14" fill="#1a1f3a" stroke="#d97706" stroke-width="1.5" opacity="0.8"/>
    <circle cx="1020" cy="190" r="14" fill="#1a1f3a" stroke="#4f46e5" stroke-width="1.5" opacity="0.8"/>
    <circle cx="1080" cy="200" r="14" fill="#1a1f3a" stroke="#d97706" stroke-width="1.5" opacity="0.8"/>

    <!-- Connection lines -->
    <line x1="1050" y1="150" x2="1000" y2="120" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
    <line x1="1050" y1="150" x2="1100" y2="110" stroke="#d97706" stroke-width="1" opacity="0.3"/>
    <line x1="1050" y1="150" x2="1020" y2="190" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
    <line x1="1050" y1="150" x2="1080" y2="200" stroke="#d97706" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Stock chart candlesticks - bottom right -->
  <g opacity="0.5">
    <!-- Candlestick 1 -->
    <rect x="950" y="480" width="12" height="50" fill="none" stroke="#0891b2" stroke-width="1"/>
    <rect x="952" y="490" width="8" height="30" fill="#0891b2" opacity="0.6"/>

    <!-- Candlestick 2 -->
    <rect x="980" y="470" width="12" height="60" fill="none" stroke="#0891b2" stroke-width="1"/>
    <rect x="982" y="475" width="8" height="50" fill="#0891b2" opacity="0.6"/>

    <!-- Candlestick 3 -->
    <rect x="1010" y="450" width="12" height="80" fill="none" stroke="#4f46e5" stroke-width="1"/>
    <rect x="1012" y="460" width="8" height="70" fill="#4f46e5" opacity="0.6"/>

    <!-- Candlestick 4 -->
    <rect x="1040" y="420" width="12" height="110" fill="none" stroke="#d97706" stroke-width="1"/>
    <rect x="1042" y="430" width="8" height="100" fill="#d97706" opacity="0.6"/>

    <!-- Price trend line -->
    <polyline points="956,490 986,475 1016,460 1046,430" fill="none" stroke="#0891b2" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Left side - TradFi bridge elements -->
  <g opacity="0.4">
    <rect x="40" y="240" width="70" height="60" fill="#1a1f3a" stroke="#4f46e5" stroke-width="1.5" rx="8"/>
    <text x="75" y="275" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#4f46e5" text-anchor="middle">TradFi</text>
  </g>

  <!-- Bridge arrow -->
  <path d="M 115 270 L 145 270" stroke="#0891b2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <g opacity="0.4">
    <rect x="150" y="240" width="70" height="60" fill="#1a1f3a" stroke="#0891b2" stroke-width="1.5" rx="8"/>
    <text x="185" y="275" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#0891b2" text-anchor="middle">Chain</text>
  </g>

  <!-- DeFi elements left -->
  <circle cx="60" cy="420" r="16" fill="none" stroke="#d97706" stroke-width="2" opacity="0.5"/>
  <text x="60" y="428" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#d97706" text-anchor="middle">$</text>

  <!-- Glass-morphism card -->
  <rect x="120" y="100" width="1000" height="380" fill="#ffffff" opacity="0.03" rx="16"/>
  <rect x="120" y="100" width="1000" height="380" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.3" rx="16"/>

  <!-- Main title -->
  <text x="600" y="200" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="-0.5">Nasdaq Tokenized Equities</text>

  <!-- Subtitle -->
  <text x="600" y="300" font-family="Inter, sans-serif" font-size="28" font-weight="400" fill="#8b949e" text-anchor="middle">How Traditional Finance Meets Blockchain</text>

  <!-- Trading 2026 label -->
  <text x="600" y="350" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="url(#accentGradient)" text-anchor="middle">Trading 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Footer text -->
  <text x="1140" y="610" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#8b949e" text-anchor="end">degen0x.com</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0891b2"/>
    </marker>
  </defs>
</svg>