<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#121520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="50%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <linearGradient id="glowOrange" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f7931a" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="glowBlue" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="glowGreen" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="glowPurple" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="5" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="140" r="200" fill="#f7931a" opacity="0.035" filter="url(#glow)"/>
  <circle cx="200" cy="520" r="150" fill="#f59e0b" opacity="0.03" filter="url(#glow)"/>
  <circle cx="800" cy="480" r="120" fill="#3b82f6" opacity="0.03"/>

  <!-- Subtle grid -->
  <g opacity="0.025" stroke="#ffffff" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="400" x2="1200" y2="400"/>
  </g>

  <!-- Logo text -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#6366f1" letter-spacing="-0.5">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="85" width="90" height="28" rx="14" fill="#f7931a" opacity="0.15"/>
  <text x="105" y="104" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f7931a" text-anchor="middle" letter-spacing="0.5">BITCOIN</text>

  <rect x="160" y="85" width="80" height="28" rx="14" fill="#6366f1" opacity="0.15"/>
  <text x="200" y="104" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#6366f1" text-anchor="middle" letter-spacing="0.5">MACRO</text>

  <rect x="250" y="85" width="120" height="28" rx="14" fill="#3b82f6" opacity="0.15"/>
  <text x="310" y="104" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3b82f6" text-anchor="middle" letter-spacing="0.5">2026 GUIDE</text>

  <!-- Title -->
  <text x="60" y="170" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="url(#titleGrad)" letter-spacing="-1.5">Bitcoin Treasury Companies</text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-1">Who&apos;s Stacking BTC &amp; Why</text>

  <!-- Subtitle -->
  <text x="60" y="270" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e" letter-spacing="-0.3">172+ public companies hold Bitcoin. Strategy alone holds 687K BTC. The corporate playbook explained.</text>

  <!-- Stat cards row -->
  <!-- Card 1: Strategy -->
  <rect x="60" y="305" width="260" height="105" rx="14" fill="url(#glowOrange)" stroke="#f7931a" stroke-opacity="0.2" stroke-width="1"/>
  <text x="80" y="335" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f7931a">Strategy (MSTR)</text>
  <text x="80" y="367" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="900" fill="#e6edf3">687,410 BTC</text>
  <text x="80" y="393" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Largest corporate holder · +22.8% BTC/share YoY</text>

  <!-- Card 2: Total Companies -->
  <rect x="340" y="305" width="250" height="105" rx="14" fill="url(#glowBlue)" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="360" y="335" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3b82f6">Public Companies</text>
  <text x="360" y="367" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="900" fill="#e6edf3">172+</text>
  <text x="360" y="393" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Holding BTC on balance sheet · +40% YoY growth</text>

  <!-- Card 3: Total BTC -->
  <rect x="610" y="305" width="260" height="105" rx="14" fill="url(#glowGreen)" stroke="#22c55e" stroke-opacity="0.2" stroke-width="1"/>
  <text x="630" y="335" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e">Total Corporate BTC</text>
  <text x="630" y="367" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="900" fill="#e6edf3">~1,000,000</text>
  <text x="630" y="393" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">~4.8% of total 21M supply locked</text>

  <!-- Card 4: Asia -->
  <rect x="890" y="305" width="250" height="105" rx="14" fill="url(#glowPurple)" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="910" y="335" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b5cf6">Metaplanet (Japan)</text>
  <text x="910" y="367" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="900" fill="#e6edf3">35,102 BTC</text>
  <text x="910" y="393" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">"Asia&apos;s MicroStrategy" · DAT model</text>

  <!-- Flow diagram -->
  <g transform="translate(60, 440)">
    <rect width="155" height="36" rx="8" fill="#f7931a" opacity="0.12" stroke="#f7931a" stroke-opacity="0.3" stroke-width="1"/>
    <text x="77" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f7931a" text-anchor="middle">Raise Capital</text>

    <text x="172" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">→</text>

    <rect x="190" width="155" height="36" rx="8" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="267" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3b82f6" text-anchor="middle">Buy Bitcoin</text>

    <text x="362" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">→</text>

    <rect x="380" width="180" height="36" rx="8" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="470" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">Grow BTC/Share</text>

    <text x="577" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">→</text>

    <rect x="595" width="170" height="36" rx="8" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="680" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b5cf6" text-anchor="middle">NAV Premium</text>
  </g>

  <!-- Top holders list -->
  <g transform="translate(60, 510)">
    <text x="0" y="14" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5">TOP HOLDERS:</text>

    <rect x="120" width="100" height="24" rx="12" fill="#f7931a" opacity="0.1"/>
    <text x="170" y="16" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f7931a" text-anchor="middle">Strategy</text>

    <rect x="230" width="100" height="24" rx="12" fill="#3b82f6" opacity="0.1"/>
    <text x="280" y="16" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">Marathon</text>

    <rect x="340" width="120" height="24" rx="12" fill="#22c55e" opacity="0.1"/>
    <text x="400" y="16" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#22c55e" text-anchor="middle">Twenty One</text>

    <rect x="470" width="110" height="24" rx="12" fill="#8b5cf6" opacity="0.1"/>
    <text x="525" y="16" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" text-anchor="middle">Metaplanet</text>

    <rect x="590" width="80" height="24" rx="12" fill="#6366f1" opacity="0.1"/>
    <text x="630" y="16" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6366f1" text-anchor="middle">Riot</text>

    <rect x="680" width="100" height="24" rx="12" fill="#06b6d4" opacity="0.1"/>
    <text x="730" y="16" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#06b6d4" text-anchor="middle">Coinbase</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#060a15"/>
  <text x="60" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1140" y="620" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>