<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="300" r="300" fill="#6366f1" opacity="0.04"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="2">degen0x</text>

  <rect x="60" y="140" width="65" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1"/>
  <text x="92" y="159" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">Tool</text>

  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-1">Crypto Converter</text>
  <text x="60" y="305" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">Convert Between 10,000+ Cryptocurrencies Instantly</text>

  <!-- Conversion mockup -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="500" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="30" y="35" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">From</text>
    <text x="30" y="70" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#e6edf3">1.00 BTC</text>
    <text x="250" y="55" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#6366f1">→</text>
    <text x="300" y="35" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">To</text>
    <text x="300" y="70" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#22c55e">$82,450</text>
  </g>

  <!-- Popular pairs -->
  <g transform="translate(700, 200)">
    <rect x="0" y="0" width="420" height="260" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">POPULAR CONVERSIONS</text>
    <text x="24" y="75" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">₿ BTC → USD</text>
    <text x="300" y="75" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#22c55e" text-anchor="end">$82,450</text>
    <text x="24" y="115" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Ξ ETH → USD</text>
    <text x="300" y="115" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#22c55e" text-anchor="end">$3,780</text>
    <text x="24" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">◎ SOL → USD</text>
    <text x="300" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#22c55e" text-anchor="end">$183</text>
    <text x="24" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">₿ BTC → ETH</text>
    <text x="300" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#58a6ff" text-anchor="end">21.8 ETH</text>
    <text x="24" y="235" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ 10,000 more pairs</text>
  </g>

  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Free Tool</text>
</svg>