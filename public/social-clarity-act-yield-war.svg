<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1529"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded"><rect x="0" y="0" width="1200" height="630" rx="0"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" clip-path="url(#rounded)"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Decorative glow circles -->
  <circle cx="150" cy="500" r="180" fill="#4f46e5" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="1050" cy="130" r="200" fill="#d97706" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="600" cy="315" r="250" fill="#0891b2" opacity="0.03" filter="url(#softGlow)"/>

  <!-- degen0x logo text -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#brandGrad)" letter-spacing="0.05em">degen0x</text>

  <!-- VS Badge -->
  <rect x="540" y="200" width="120" height="50" rx="25" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="600" y="232" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#e6edf3" text-anchor="middle" letter-spacing="0.1em">VS</text>

  <!-- LEFT PANEL: Banks -->
  <rect x="50" y="130" width="460" height="310" rx="20" fill="rgba(239,68,68,0.05)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <!-- Bank icon -->
  <rect x="80" y="160" width="40" height="30" rx="4" fill="none" stroke="#ef4444" stroke-width="2"/>
  <line x1="85" y1="175" x2="115" y2="175" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
  <rect x="90" y="195" width="6" height="15" rx="1" fill="#ef4444" opacity="0.6"/>
  <rect x="102" y="195" width="6" height="15" rx="1" fill="#ef4444" opacity="0.6"/>
  <text x="130" y="182" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#ef4444">BANKS (ABA)</text>
  <text x="80" y="250" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Savings Rate</text>
  <text x="400" y="250" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ef4444" text-anchor="end">0.5% APY</text>
  <line x1="80" y1="268" x2="460" y2="268" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="298" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Liquidity</text>
  <text x="400" y="298" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ef4444" text-anchor="end">Business Hours</text>
  <line x1="80" y1="316" x2="460" y2="316" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="346" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Access</text>
  <text x="400" y="346" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ef4444" text-anchor="end">KYC Required</text>
  <line x1="80" y1="364" x2="460" y2="364" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="394" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Lobby</text>
  <text x="400" y="394" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ef4444" text-anchor="end">4,000+ Banks</text>

  <!-- RIGHT PANEL: Stablecoins -->
  <rect x="690" y="130" width="460" height="310" rx="20" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <!-- Stablecoin icon -->
  <circle cx="720" cy="175" r="15" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="720" y="181" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">$</text>
  <text x="745" y="182" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#22c55e">STABLECOINS (DeFi)</text>
  <text x="720" y="250" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Yield Rate</text>
  <text x="1040" y="250" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="end">4-8% APY</text>
  <line x1="720" y1="268" x2="1100" y2="268" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="720" y="298" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Liquidity</text>
  <text x="1040" y="298" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="end">24/7/365</text>
  <line x1="720" y1="316" x2="1100" y2="316" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="720" y="346" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Access</text>
  <text x="1040" y="346" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="end">Permissionless</text>
  <line x1="720" y1="364" x2="1100" y2="364" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="720" y="394" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Market Cap</text>
  <text x="1040" y="394" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="end">$200B+</text>

  <!-- Title -->
  <text x="600" y="498" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#e6edf3" text-anchor="middle" letter-spacing="-0.02em">The Stablecoin Yield War</text>
  <text x="600" y="535" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">CLARITY Act stalled — banks vs DeFi over yield provision</text>

  <!-- Prediction badge -->
  <rect x="490" y="556" width="220" height="34" rx="17" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="600" y="578" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">72% odds — passes 2026</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="1140" y="625" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681" text-anchor="end">degen0x.com</text>
</svg>