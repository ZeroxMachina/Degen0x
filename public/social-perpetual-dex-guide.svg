<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Candlestick decoration (right side) -->
  <g transform="translate(800, 40)" opacity="0.12">
    <!-- Candle 1 (green) -->
    <line x1="30" y1="20" x2="30" y2="180" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="18" y="50" width="24" height="80" rx="2" fill="#4ade80"/>
    <!-- Candle 2 (red) -->
    <line x1="75" y1="40" x2="75" y2="200" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="63" y="60" width="24" height="90" rx="2" fill="#ef4444"/>
    <!-- Candle 3 (green) -->
    <line x1="120" y1="10" x2="120" y2="170" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="108" y="30" width="24" height="100" rx="2" fill="#4ade80"/>
    <!-- Candle 4 (green) -->
    <line x1="165" y1="0" x2="165" y2="150" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="153" y="20" width="24" height="70" rx="2" fill="#4ade80"/>
    <!-- Candle 5 (red) -->
    <line x1="210" y1="30" x2="210" y2="180" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="198" y="50" width="24" height="80" rx="2" fill="#ef4444"/>
    <!-- Candle 6 (green) -->
    <line x1="255" y1="5" x2="255" y2="140" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="243" y="15" width="24" height="60" rx="2" fill="#4ade80"/>
    <!-- Candle 7 (green big) -->
    <line x1="300" y1="0" x2="300" y2="120" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="288" y="5" width="24" height="50" rx="2" fill="#4ade80"/>
  </g>

  <!-- Title -->
  <text x="80" y="110" fill="url(#accent2)" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" letter-spacing="-1">Best Perpetual DEXs</text>
  <text x="80" y="155" fill="#e0e0f0" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" opacity="0.9">Compare Hyperliquid, dYdX, GMX &amp; More — 2026</text>

  <!-- Hero stat -->
  <g transform="translate(80, 190)">
    <text x="0" y="50" fill="#4ade80" font-family="system-ui, sans-serif" font-size="64" font-weight="800">$10B</text>
    <text x="270" y="50" fill="#a0a0c0" font-family="system-ui, sans-serif" font-size="28" font-weight="400">daily volume</text>
  </g>

  <!-- Market share bar chart -->
  <g transform="translate(80, 280)">
    <text x="0" y="0" fill="#a0a0c0" font-family="system-ui, sans-serif" font-size="14" font-weight="500">MARKET SHARE</text>

    <!-- Hyperliquid -->
    <text x="0" y="35" fill="#e0e0f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Hyperliquid</text>
    <rect x="130" y="20" width="700" height="24" rx="4" fill="#1a1a2e"/>
    <rect x="130" y="20" width="490" height="24" rx="4" fill="url(#bar1)"/>
    <text x="635" y="37" fill="#0a0a1a" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="end">70%</text>
    <text x="640" y="37" fill="#a0a0c0" font-family="system-ui, sans-serif" font-size="13">$8B/day</text>

    <!-- dYdX -->
    <text x="0" y="75" fill="#e0e0f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">dYdX</text>
    <rect x="130" y="60" width="700" height="24" rx="4" fill="#1a1a2e"/>
    <rect x="130" y="60" width="98" height="24" rx="4" fill="url(#bar2)"/>
    <text x="240" y="77" fill="#a0a0c0" font-family="system-ui, sans-serif" font-size="13">~14%</text>

    <!-- GMX -->
    <text x="0" y="115" fill="#e0e0f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">GMX</text>
    <rect x="130" y="100" width="700" height="24" rx="4" fill="#1a1a2e"/>
    <rect x="130" y="100" width="56" height="24" rx="4" fill="#f59e0b"/>
    <text x="198" y="117" fill="#a0a0c0" font-family="system-ui, sans-serif" font-size="13">~5%</text>

    <!-- Lighter / GRVT / Others -->
    <text x="0" y="155" fill="#e0e0f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Others</text>
    <rect x="130" y="140" width="700" height="24" rx="4" fill="#1a1a2e"/>
    <rect x="130" y="140" width="77" height="24" rx="4" fill="#06b6d4"/>
    <text x="219" y="157" fill="#a0a0c0" font-family="system-ui, sans-serif" font-size="13">~11%</text>
  </g>

  <!-- Feature comparison pills -->
  <g transform="translate(80, 490)">
    <text x="0" y="0" fill="#a0a0c0" font-family="system-ui, sans-serif" font-size="14" font-weight="500">COMPARED ACROSS</text>

    <g transform="translate(0, 15)">
      <rect width="70" height="30" rx="15" fill="#4ade80" opacity="0.15"/>
      <text x="35" y="20" fill="#4ade80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Fees</text>
    </g>
    <g transform="translate(85, 15)">
      <rect width="90" height="30" rx="15" fill="#a855f7" opacity="0.15"/>
      <text x="45" y="20" fill="#a855f7" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Leverage</text>
    </g>
    <g transform="translate(190, 15)">
      <rect width="90" height="30" rx="15" fill="#06b6d4" opacity="0.15"/>
      <text x="45" y="20" fill="#06b6d4" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Liquidity</text>
    </g>
    <g transform="translate(295, 15)">
      <rect width="80" height="30" rx="15" fill="#f59e0b" opacity="0.15"/>
      <text x="40" y="20" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Speed</text>
    </g>
    <g transform="translate(390, 15)">
      <rect width="130" height="30" rx="15" fill="#ef4444" opacity="0.15"/>
      <text x="65" y="20" fill="#ef4444" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Decentralization</text>
    </g>
    <g transform="translate(535, 15)">
      <rect width="60" height="30" rx="15" fill="#4ade80" opacity="0.15"/>
      <text x="30" y="20" fill="#4ade80" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Risk</text>
    </g>
  </g>

  <!-- New badge: HIP-4 -->
  <g transform="translate(900, 490)">
    <rect width="220" height="60" rx="10" fill="#1a1a2e" stroke="#4ade80" stroke-width="1" opacity="0.9"/>
    <text x="15" y="22" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11" font-weight="700">NEW: HIP-4</text>
    <text x="15" y="42" fill="#e0e0f0" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Prediction Markets</text>
    <text x="15" y="55" fill="#a0a0c0" font-family="system-ui, sans-serif" font-size="11">+ Synthetic RWAs (Gold, Oil)</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0a0a14" opacity="0.7"/>

  <!-- degen0x branding -->
  <text x="80" y="612" fill="#e0e0f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700" opacity="0.5">degen0x.com/learn/best-perpetual-dex-guide</text>
  <text x="1120" y="612" fill="#e0e0f0" font-family="system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="end" opacity="0.7">degen0x</text>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>
</svg>