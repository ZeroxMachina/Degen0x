<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles for depth -->
  <circle cx="200" cy="150" r="120" fill="#4f46e5" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="1000" cy="400" r="150" fill="#0891b2" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="600" cy="650" r="200" fill="#d97706" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- degen0x branding -->
  <text x="40" y="50" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#6366f1">degen0x</text>

  <!-- Badge -->
  <rect x="1050" y="28" width="130" height="44" rx="22" fill="rgba(79, 70, 229, 0.2)" stroke="#6366f1" stroke-width="1"/>
  <text x="1115" y="55" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#a5b4fc" text-anchor="middle">2026 Guide</text>

  <!-- Main content area -->
  <g>
    <!-- Title -->
    <text x="60" y="140" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="700" fill="url(#titleGrad)">On-Chain</text>
    <text x="60" y="200" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="700" fill="url(#titleGrad)">Analytics</text>

    <!-- Subtitle with gradient -->
    <text x="60" y="265" font-family="Inter, -apple-system, sans-serif" font-size="38" font-weight="600" fill="url(#subtitleGrad)">MVRV, SOPR &amp; Trading Signals</text>

    <!-- Description -->
    <text x="60" y="325" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#cbd5e1">Master on-chain metrics for smarter crypto trading decisions</text>
  </g>

  <!-- Decorative chart visualization -->
  <g opacity="0.7">
    <!-- Grid lines -->
    <line x1="850" y1="150" x2="1100" y2="150" stroke="#4f46e5" stroke-width="1" opacity="0.2"/>
    <line x1="850" y1="200" x2="1100" y2="200" stroke="#0891b2" stroke-width="1" opacity="0.2"/>
    <line x1="850" y1="250" x2="1100" y2="250" stroke="#d97706" stroke-width="1" opacity="0.2"/>
    <line x1="850" y1="300" x2="1100" y2="300" stroke="#4f46e5" stroke-width="1" opacity="0.2"/>

    <!-- Line chart path (simplified trend) -->
    <polyline points="850,280 900,240 950,220 1000,190 1050,210 1100,170"
              stroke="url(#subtitleGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Data points on line -->
    <circle cx="850" cy="280" r="4" fill="#4f46e5"/>
    <circle cx="900" cy="240" r="4" fill="#4f46e5"/>
    <circle cx="950" cy="220" r="4" fill="#0891b2"/>
    <circle cx="1000" cy="190" r="4" fill="#0891b2"/>
    <circle cx="1050" cy="210" r="4" fill="#d97706"/>
    <circle cx="1100" cy="170" r="4" fill="#d97706"/>

    <!-- Metric labels -->
    <rect x="820" y="315" width="70" height="28" rx="4" fill="rgba(79, 70, 229, 0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="855" y="335" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle" font-weight="600">MVRV</text>

    <rect x="920" y="315" width="70" height="28" rx="4" fill="rgba(8, 145, 178, 0.2)" stroke="#06b6d4" stroke-width="1"/>
    <text x="955" y="335" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle" font-weight="600">SOPR</text>

    <rect x="1020" y="315" width="80" height="28" rx="4" fill="rgba(217, 119, 6, 0.2)" stroke="#d97706" stroke-width="1"/>
    <text x="1060" y="335" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="600">Flow</text>
  </g>

  <!-- Protocol pills -->
  <g>
    <text x="60" y="430" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#94a3b8">Featured Platforms:</text>

    <!-- Pill 1: Glassnode -->
    <rect x="60" y="450" width="120" height="32" rx="16" fill="rgba(79, 70, 229, 0.15)" stroke="#6366f1" stroke-width="1"/>
    <text x="120" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle" font-weight="500">Glassnode</text>

    <!-- Pill 2: Nansen -->
    <rect x="195" y="450" width="100" height="32" rx="16" fill="rgba(8, 145, 178, 0.15)" stroke="#06b6d4" stroke-width="1"/>
    <text x="245" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#06b6d4" text-anchor="middle" font-weight="500">Nansen</text>

    <!-- Pill 3: Dune -->
    <rect x="310" y="450" width="85" height="32" rx="16" fill="rgba(217, 119, 6, 0.15)" stroke="#d97706" stroke-width="1"/>
    <text x="352" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="500">Dune</text>

    <!-- Pill 4: Santiment -->
    <rect x="410" y="450" width="120" height="32" rx="16" fill="rgba(139, 92, 246, 0.15)" stroke="#a78bfa" stroke-width="1"/>
    <text x="470" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="500">Santiment</text>

    <!-- Pill 5: +More -->
    <rect x="545" y="450" width="85" height="32" rx="16" fill="rgba(148, 163, 184, 0.1)" stroke="#64748b" stroke-width="1"/>
    <text x="587" y="472" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle" font-weight="500">+More</text>
  </g>

  <!-- Bottom bar -->
  <rect y="596" width="1200" height="34" fill="rgba(15, 23, 41, 0.8)"/>
  <rect y="596" width="1200" height="1" fill="url(#accent)"/>

  <text x="60" y="620" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#94a3b8">degen0x.com</text>
  <text x="1140" y="620" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="end">Free · Comprehensive Guide</text>
</svg>