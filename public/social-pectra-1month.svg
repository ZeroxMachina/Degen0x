<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#818cf8" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#818cf8" stroke-width="1"/>
  </g>

  <!-- Top badge -->
  <rect x="40" y="30" width="200" height="32" rx="16" fill="url(#accent)" opacity="0.9"/>
  <text x="140" y="51" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1.5">PECTRA · 1 MONTH</text>

  <!-- Main title -->
  <text x="40" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#fff" letter-spacing="-1">What Actually Changed</text>
  <text x="40" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Ethereum's biggest upgrade since the Merge — 4 weeks in</text>

  <!-- Stats row -->
  <g transform="translate(40, 210)">
    <!-- Stat 1: Smart Wallets -->
    <rect x="0" y="0" width="260" height="120" rx="12" fill="#1e1e3f" stroke="#333366" stroke-width="1"/>
    <text x="20" y="35" font-family="system-ui, sans-serif" font-size="13" fill="#818cf8" font-weight="600" letter-spacing="1">SMART WALLET ADOPTION</text>
    <text x="20" y="75" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#greenGrad)" filter="url(#glow)">14%</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">of new wallets using EIP-7702</text>

    <!-- Stat 2: Gas Savings -->
    <rect x="280" y="0" width="260" height="120" rx="12" fill="#1e1e3f" stroke="#333366" stroke-width="1"/>
    <text x="300" y="35" font-family="system-ui, sans-serif" font-size="13" fill="#818cf8" font-weight="600" letter-spacing="1">AVG GAS SAVINGS</text>
    <text x="300" y="75" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#greenGrad)" filter="url(#glow)">~$4.20</text>
    <text x="300" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">per user per week via batching</text>

    <!-- Stat 3: Validator Reduction -->
    <rect x="560" y="0" width="260" height="120" rx="12" fill="#1e1e3f" stroke="#333366" stroke-width="1"/>
    <text x="580" y="35" font-family="system-ui, sans-serif" font-size="13" fill="#818cf8" font-weight="600" letter-spacing="1">VALIDATOR CONSOLIDATION</text>
    <text x="580" y="75" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#greenGrad)" filter="url(#glow)">-45%</text>
    <text x="580" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">fewer validators (EIP-7251 MaxEB)</text>

    <!-- Stat 4: L2 Fees -->
    <rect x="840" y="0" width="310" height="120" rx="12" fill="#1e1e3f" stroke="#333366" stroke-width="1"/>
    <text x="860" y="35" font-family="system-ui, sans-serif" font-size="13" fill="#818cf8" font-weight="600" letter-spacing="1">L2 TRANSACTION COST</text>
    <text x="860" y="75" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#greenGrad)" filter="url(#glow)">&lt;$0.001</text>
    <text x="860" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Base, Arbitrum, zkSync (PeerDAS)</text>
  </g>

  <!-- Key EIPs section -->
  <text x="40" y="380" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" font-weight="600" letter-spacing="0.5">KEY EIPS SHIPPED</text>

  <!-- EIP cards -->
  <g transform="translate(40, 395)">
    <rect x="0" y="0" width="270" height="80" rx="10" fill="#1a1a3e" stroke="#4ade80" stroke-width="1.5" opacity="0.9"/>
    <circle cx="20" cy="40" r="6" fill="#4ade80"/>
    <text x="36" y="30" font-family="monospace" font-size="14" fill="#4ade80" font-weight="700">EIP-7702</text>
    <text x="36" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1">Smart wallet transactions</text>
    <text x="36" y="66" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Batch · Gas sponsor · Recovery</text>

    <rect x="290" y="0" width="270" height="80" rx="10" fill="#1a1a3e" stroke="#818cf8" stroke-width="1.5" opacity="0.9"/>
    <circle cx="310" cy="40" r="6" fill="#818cf8"/>
    <text x="326" y="30" font-family="monospace" font-size="14" fill="#818cf8" font-weight="700">EIP-7251</text>
    <text x="326" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1">MaxEB validator consolidation</text>
    <text x="326" y="66" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">2048 ETH max · Auto-compound</text>

    <rect x="580" y="0" width="270" height="80" rx="10" fill="#1a1a3e" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
    <circle cx="600" cy="40" r="6" fill="#06b6d4"/>
    <text x="616" y="30" font-family="monospace" font-size="14" fill="#06b6d4" font-weight="700">EIP-7594</text>
    <text x="616" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1">PeerDAS blob scaling</text>
    <text x="616" y="66" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">48 blobs/block · L2 fees ↓60%</text>

    <rect x="870" y="0" width="280" height="80" rx="10" fill="#1a1a3e" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <circle cx="890" cy="40" r="6" fill="#f59e0b"/>
    <text x="906" y="30" font-family="monospace" font-size="14" fill="#f59e0b" font-weight="700">11 EIPs Total</text>
    <text x="906" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1">Biggest upgrade since Merge</text>
    <text x="906" y="66" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Shipped April 10, 2026</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0a1a"/>
  <text x="40" y="615" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">degen0x.com/learn/ethereum-pectra-upgrade-guide</text>
  <text x="1160" y="615" font-family="system-ui, sans-serif" font-size="13" fill="#4ade80" text-anchor="end" font-weight="600">degen0x</text>
</svg>
