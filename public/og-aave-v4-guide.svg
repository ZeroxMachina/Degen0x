<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="aaveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b6509e"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="200" r="180" fill="#b6509e" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="120" fill="#6366f1" opacity="0.05" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="100" fill="#0891b2" opacity="0.04" filter="url(#glow)"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>

  <!-- Ghost emoji (Aave brand) -->
  <text x="60" y="170" font-size="64">&#x1F47B;</text>

  <!-- Title -->
  <text x="60" y="260" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Aave v4: The Complete</text>
  <text x="60" y="320" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Guide for 2026</text>

  <!-- Subtitle -->
  <text x="60" y="370" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Hub &amp; Spoke Architecture  ·  GHO Stablecoin  ·  Horizon Institutional</text>

  <!-- Hub & Spoke mini diagram -->
  <!-- Hub -->
  <rect x="700" y="420" width="200" height="50" rx="10" fill="#b6509e" fill-opacity="0.15" stroke="#b6509e" stroke-opacity="0.4"/>
  <text x="800" y="451" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#b6509e" text-anchor="middle">Liquidity Hub</text>

  <!-- Connectors -->
  <line x1="740" y1="470" x2="700" y2="505" stroke="#30363d" stroke-width="1.5"/>
  <line x1="800" y1="470" x2="800" y2="505" stroke="#30363d" stroke-width="1.5"/>
  <line x1="860" y1="470" x2="900" y2="505" stroke="#30363d" stroke-width="1.5"/>

  <!-- Spokes -->
  <rect x="640" y="505" width="120" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="700" y="528" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Stablecoin</text>

  <rect x="775" y="505" width="120" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="835" y="528" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">ETH Derivatives</text>

  <rect x="910" y="505" width="120" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="970" y="528" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Horizon (RWA)</text>

  <!-- Key stats row -->
  <rect x="60" y="420" width="140" height="64" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="80" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-transform="uppercase">TVL AT PEAK</text>
  <text x="80" y="472" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#b6509e">$75B+</text>

  <rect x="220" y="420" width="140" height="64" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="240" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">GHO SUPPLY</text>
  <text x="240" y="472" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#06b6d4">~$500M</text>

  <rect x="380" y="420" width="140" height="64" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="400" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">LAUNCH</text>
  <text x="400" y="472" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#f59e0b">Q2 2026</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com/learn/aave-v4-guide</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Updated March 2026</text>
</svg>