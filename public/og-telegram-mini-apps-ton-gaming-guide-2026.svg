<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="500" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="tonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0098EA"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative elements - mini app grid -->
  <g transform="translate(700, 100)" opacity="0.12">
    <rect x="0" y="0" width="80" height="80" rx="16" stroke="#0098EA" stroke-width="2" fill="none"/>
    <rect x="100" y="0" width="80" height="80" rx="16" stroke="#818cf8" stroke-width="2" fill="none"/>
    <rect x="200" y="0" width="80" height="80" rx="16" stroke="#22c55e" stroke-width="2" fill="none"/>
    <rect x="300" y="0" width="80" height="80" rx="16" stroke="#f59e0b" stroke-width="2" fill="none"/>
    <rect x="0" y="100" width="80" height="80" rx="16" stroke="#f59e0b" stroke-width="2" fill="none"/>
    <rect x="100" y="100" width="80" height="80" rx="16" stroke="#22c55e" stroke-width="2" fill="none"/>
    <rect x="200" y="100" width="80" height="80" rx="16" stroke="#0098EA" stroke-width="2" fill="none"/>
    <rect x="300" y="100" width="80" height="80" rx="16" stroke="#818cf8" stroke-width="2" fill="none"/>
    <rect x="0" y="200" width="80" height="80" rx="16" stroke="#818cf8" stroke-width="2" fill="none"/>
    <rect x="100" y="200" width="80" height="80" rx="16" stroke="#f59e0b" stroke-width="2" fill="none"/>
    <rect x="200" y="200" width="80" height="80" rx="16" stroke="#22c55e" stroke-width="2" fill="none"/>
    <rect x="300" y="200" width="80" height="80" rx="16" stroke="#0098EA" stroke-width="2" fill="none"/>
  </g>

  <!-- Highlighted mini app icons -->
  <g transform="translate(740, 140)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#0098EA" fill-opacity="0.15" stroke="#0098EA" stroke-opacity="0.4"/>
    <text x="40" y="50" text-anchor="middle" font-size="32">🎮</text>
  </g>
  <g transform="translate(860, 140)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.4"/>
    <text x="40" y="50" text-anchor="middle" font-size="32">💎</text>
  </g>
  <g transform="translate(980, 140)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.4"/>
    <text x="40" y="50" text-anchor="middle" font-size="32">⚡</text>
  </g>
  <g transform="translate(800, 260)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4"/>
    <text x="40" y="50" text-anchor="middle" font-size="32">🏆</text>
  </g>
  <g transform="translate(920, 260)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-opacity="0.4"/>
    <text x="40" y="50" text-anchor="middle" font-size="32">🪙</text>
  </g>

  <!-- Connection lines between apps -->
  <g opacity="0.15" stroke="#0098EA" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="820" y1="220" x2="840" y2="260"/>
    <line x1="900" y1="220" x2="880" y2="260"/>
    <line x1="940" y1="180" x2="960" y2="260"/>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.2"/>
    <text x="16" y="21" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="14" font-weight="800">0x</text>
  </g>
  <text x="100" y="56" fill="#e6edf3" font-family="Inter, sans-serif" font-size="16" font-weight="700" opacity="0.7">degen0x</text>

  <!-- Category badges -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="120" height="26" rx="13" fill="#0098EA" fill-opacity="0.15" stroke="#0098EA" stroke-opacity="0.3"/>
    <text x="60" y="17" text-anchor="middle" fill="#0098EA" font-family="Inter, sans-serif" font-size="11" font-weight="700">Telegram / TON</text>

    <rect x="130" y="0" width="80" height="26" rx="13" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="170" y="17" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="11" font-weight="700">Gaming</text>

    <rect x="220" y="0" width="100" height="26" rx="13" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="270" y="17" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="11" font-weight="700">Mini Apps</text>
  </g>

  <!-- Title -->
  <text x="60" y="185" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.02em">Telegram Mini Apps</text>
  <text x="60" y="240" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.02em">&amp; TON Gaming</text>
  <text x="60" y="290" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="335" fill="#8b949e" font-family="Inter, sans-serif" font-size="17">Build, play, and earn on Telegram's Web3 ecosystem</text>

  <!-- Stats boxes -->
  <g transform="translate(60, 375)">
    <rect x="0" y="0" width="155" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="78" y="30" text-anchor="middle" fill="#0098EA" font-family="Inter, sans-serif" font-size="22" font-weight="800">950M+</text>
    <text x="78" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Telegram Users</text>

    <rect x="170" y="0" width="155" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="248" y="30" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="22" font-weight="800">100M+</text>
    <text x="248" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Mini App MAU</text>

    <rect x="340" y="0" width="155" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="418" y="30" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="22" font-weight="800">$5B+</text>
    <text x="418" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">TON Ecosystem TVL</text>
  </g>

  <!-- App names -->
  <g transform="translate(60, 485)">
    <text fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="600">Notcoin · Hamster Kombat · Catizen · TON Stars · Fanton · Blum</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0a0f1e"/>
  <text x="60" y="620" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="600">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="12">Updated March 2026</text>
</svg>