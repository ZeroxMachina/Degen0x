<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f00"/>
      <stop offset="50%" style="stop-color:#1a1a0a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Bitcoin symbol watermark -->
  <text x="950" y="300" font-family="system-ui, sans-serif" font-size="320" fill="#f59e0b" opacity="0.04" font-weight="900">₿</text>

  <!-- Top badge -->
  <rect x="40" y="30" width="240" height="32" rx="16" fill="url(#gold)" opacity="0.9"/>
  <text x="160" y="51" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1a0f00" text-anchor="middle" letter-spacing="1.5">HALVING CYCLE · 2028</text>

  <!-- Main title -->
  <text x="40" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#fff" letter-spacing="-1">Bitcoin Halving 2028</text>
  <text x="40" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8">The accumulation window is open. History favors the patient.</text>

  <!-- Cycle history cards -->
  <g transform="translate(40, 195)">
    <!-- 2012 -->
    <rect x="0" y="0" width="175" height="130" rx="10" fill="#1e1e2f" stroke="#333355" stroke-width="1"/>
    <text x="15" y="28" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" font-weight="600">2012 HALVING</text>
    <text x="15" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">$12 → $1,100</text>
    <text x="15" y="90" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="url(#gold)" filter="url(#glow2)">+9,083%</text>
    <rect x="15" y="108" width="145" height="6" rx="3" fill="#1a1a3e"/>
    <rect x="15" y="108" width="145" height="6" rx="3" fill="#f59e0b" opacity="0.9"/>

    <!-- 2016 -->
    <rect x="195" y="0" width="175" height="130" rx="10" fill="#1e1e2f" stroke="#333355" stroke-width="1"/>
    <text x="210" y="28" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" font-weight="600">2016 HALVING</text>
    <text x="210" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">$650 → $19,700</text>
    <text x="210" y="90" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="url(#gold)" filter="url(#glow2)">+2,931%</text>
    <rect x="210" y="108" width="145" height="6" rx="3" fill="#1a1a3e"/>
    <rect x="210" y="108" width="110" height="6" rx="3" fill="#f59e0b" opacity="0.8"/>

    <!-- 2020 -->
    <rect x="390" y="0" width="175" height="130" rx="10" fill="#1e1e2f" stroke="#333355" stroke-width="1"/>
    <text x="405" y="28" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" font-weight="600">2020 HALVING</text>
    <text x="405" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">$8,700 → $69,000</text>
    <text x="405" y="90" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="url(#gold)" filter="url(#glow2)">+693%</text>
    <rect x="405" y="108" width="145" height="6" rx="3" fill="#1a1a3e"/>
    <rect x="405" y="108" width="80" height="6" rx="3" fill="#f59e0b" opacity="0.7"/>

    <!-- 2024 (current) -->
    <rect x="585" y="0" width="175" height="130" rx="10" fill="#1e1e2f" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="600" y="28" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" font-weight="600">2024 HALVING</text>
    <text x="600" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">$64,000 → $108K+</text>
    <text x="600" y="90" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="url(#orange)" filter="url(#glow2)">+69%</text>
    <text x="600" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b">IN PROGRESS →</text>
  </g>

  <!-- DCA section -->
  <rect x="40" y="365" width="730" height="110" rx="12" fill="#1a1a3e" stroke="#333366" stroke-width="1"/>
  <text x="60" y="395" font-family="system-ui, sans-serif" font-size="14" fill="#f59e0b" font-weight="700" letter-spacing="1">DCA ACCUMULATION MATH</text>
  <text x="60" y="425" font-family="system-ui, sans-serif" font-size="18" fill="#fff">$100/week × 2 years = $10,400 invested</text>
  <text x="60" y="455" font-family="system-ui, sans-serif" font-size="18" fill="#4ade80">If BTC → $250K (mid-range): <tspan font-weight="800" font-size="22">$27,300 value (2.6×)</tspan></text>

  <!-- Next halving countdown -->
  <rect x="800" y="195" width="360" height="280" rx="12" fill="#1a1a3e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="980" y="235" font-family="system-ui, sans-serif" font-size="14" fill="#f59e0b" font-weight="700" letter-spacing="1" text-anchor="middle">NEXT HALVING</text>
  <text x="980" y="290" font-family="system-ui, sans-serif" font-size="56" font-weight="900" fill="#fff" text-anchor="middle" filter="url(#glow2)">~2 YRS</text>
  <text x="980" y="325" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">April 2028 (estimated)</text>

  <line x1="830" y1="350" x2="1130" y2="350" stroke="#333366" stroke-width="1"/>

  <text x="850" y="380" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Block reward drops to</text>
  <text x="850" y="405" font-family="system-ui, sans-serif" font-size="24" fill="#fbbf24" font-weight="800">1.5625 BTC</text>

  <text x="850" y="440" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">ETF demand absorbs</text>
  <text x="850" y="465" font-family="system-ui, sans-serif" font-size="24" fill="#4ade80" font-weight="800">~900 BTC/day</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0a1a"/>
  <text x="40" y="615" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">degen0x.com/learn/bitcoin-halving-2028-guide</text>
  <text x="760" y="615" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Run your DCA: degen0x.com/tools/dca-calculator</text>
  <text x="1160" y="615" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="end" font-weight="600">degen0x</text>
</svg>
