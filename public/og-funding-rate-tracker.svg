<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f85149" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f85149" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glows -->
  <circle cx="900" cy="200" r="180" fill="#22c55e" opacity="0.04" filter="url(#glow)"/>
  <circle cx="300" cy="450" r="120" fill="#f85149" opacity="0.04" filter="url(#glow)"/>

  <!-- Funding rate chart visualization -->
  <g transform="translate(750, 80)">
    <!-- Chart frame -->
    <rect x="0" y="0" width="380" height="260" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>

    <!-- Chart header -->
    <text x="20" y="30" fill="#8b949e" font-family="system-ui, sans-serif" font-size="12" font-weight="600">FUNDING RATES (8h)</text>

    <!-- Positive rates -->
    <rect x="20" y="50" width="340" height="1" fill="#30363d"/>

    <!-- BTC row -->
    <text x="30" y="75" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13" font-weight="600">BTC</text>
    <rect x="80" y="62" width="120" height="18" rx="3" fill="url(#greenGrad)"/>
    <text x="210" y="76" fill="#22c55e" font-family="monospace" font-size="13" font-weight="700">+0.0124%</text>
    <text x="300" y="76" fill="#8b949e" font-family="monospace" font-size="11">13.5% APR</text>

    <!-- ETH row -->
    <text x="30" y="105" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13" font-weight="600">ETH</text>
    <rect x="80" y="92" width="90" height="18" rx="3" fill="url(#greenGrad)"/>
    <text x="210" y="106" fill="#22c55e" font-family="monospace" font-size="13" font-weight="700">+0.0089%</text>
    <text x="300" y="106" fill="#8b949e" font-family="monospace" font-size="11">9.7% APR</text>

    <!-- SOL row -->
    <text x="30" y="135" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13" font-weight="600">SOL</text>
    <rect x="80" y="122" width="160" height="18" rx="3" fill="url(#greenGrad)"/>
    <text x="210" y="136" fill="#22c55e" font-family="monospace" font-size="13" font-weight="700">+0.0201%</text>
    <text x="300" y="136" fill="#8b949e" font-family="monospace" font-size="11">21.9% APR</text>

    <!-- DOGE row negative -->
    <text x="30" y="165" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13" font-weight="600">DOGE</text>
    <rect x="80" y="152" width="60" height="18" rx="3" fill="url(#redGrad)"/>
    <text x="210" y="166" fill="#f85149" font-family="monospace" font-size="13" font-weight="700">-0.0045%</text>
    <text x="300" y="166" fill="#8b949e" font-family="monospace" font-size="11">-4.9% APR</text>

    <!-- Exchange logos row -->
    <rect x="20" y="190" width="340" height="1" fill="#30363d"/>
    <text x="20" y="215" fill="#8b949e" font-family="system-ui, sans-serif" font-size="11">EXCHANGES</text>
    <g transform="translate(20, 225)">
      <rect x="0" y="0" width="50" height="22" rx="4" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="0.5"/>
      <text x="25" y="15" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Binance</text>
      <rect x="58" y="0" width="44" height="22" rx="4" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="0.5"/>
      <text x="80" y="15" text-anchor="middle" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Bybit</text>
      <rect x="110" y="0" width="38" height="22" rx="4" fill="#d97706" opacity="0.2" stroke="#d97706" stroke-width="0.5"/>
      <text x="129" y="15" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="9" font-weight="600">OKX</text>
      <rect x="156" y="0" width="44" height="22" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="0.5"/>
      <text x="178" y="15" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Bitget</text>
      <rect x="208" y="0" width="40" height="22" rx="4" fill="#f85149" opacity="0.2" stroke="#f85149" stroke-width="0.5"/>
      <text x="228" y="15" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="9" font-weight="600">dYdX</text>
      <rect x="256" y="0" width="65" height="22" rx="4" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="0.5"/>
      <text x="289" y="15" text-anchor="middle" fill="#d8b4fe" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Hyperliquid</text>
    </g>
  </g>

  <!-- Badge -->
  <rect x="60" y="100" width="70" height="30" rx="15" fill="#06b6d4" opacity="0.25"/>
  <text x="95" y="120" text-anchor="middle" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Tool</text>

  <!-- Title -->
  <text x="60" y="200" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="800" letter-spacing="-1">Funding Rate</text>
  <text x="60" y="260" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="800" letter-spacing="-1">Tracker</text>

  <!-- Subtitle -->
  <text x="60" y="310" fill="#8b949e" font-family="system-ui, sans-serif" font-size="18">Compare perp rates across 6 major exchanges</text>
  <text x="60" y="340" fill="#8b949e" font-family="system-ui, sans-serif" font-size="16">Real-time data · Arbitrage opportunities · Free</text>

  <!-- Feature pills -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#161b22" stroke="#22c55e" stroke-width="1"/>
    <text x="65" y="21" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="12" font-weight="600">8h + Annual</text>

    <rect x="145" y="0" width="130" height="32" rx="16" fill="#161b22" stroke="#6366f1" stroke-width="1"/>
    <text x="210" y="21" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="12" font-weight="600">6 Exchanges</text>

    <rect x="290" y="0" width="140" height="32" rx="16" fill="#161b22" stroke="#d97706" stroke-width="1"/>
    <text x="360" y="21" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Arb Spotting</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#0d1117" opacity="0.8"/>
  <text x="60" y="600" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">degen0x</text>
  <text x="160" y="600" fill="#8b949e" font-family="system-ui, sans-serif" font-size="16">.com/tools</text>
  <text x="1140" y="600" text-anchor="end" fill="#8b949e" font-family="system-ui, sans-serif" font-size="14">Free · No Signup Required</text>

  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>