<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0800"/>
      <stop offset="50%" stop-color="#110a00"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Bitcoin orange gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- BTC glow -->
    <radialGradient id="btcGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f7931a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="btcFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="yieldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="tvlBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background (warm dark) -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- BTC ambient glow -->
  <ellipse cx="900" cy="310" rx="420" ry="320" fill="url(#btcGlow)" opacity="0.7"/>
  <!-- Secondary smaller glow left -->
  <ellipse cx="200" cy="200" rx="200" ry="180" fill="url(#btcGlow)" opacity="0.2"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#f7931a" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Large BTC symbol (decorative, faded) -->
  <text x="1080" y="440" font-family="Inter, system-ui, sans-serif" font-size="280" font-weight="900" fill="#f7931a" opacity="0.04" text-anchor="middle">₿</text>

  <!-- === LEFT PANEL === -->

  <!-- Logo -->
  <circle cx="68" cy="60" r="22" fill="url(#logoGlow)"/>
  <text x="68" y="64" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="900" text-anchor="middle" fill="#818cf8" letter-spacing="-1">0x</text>
  <text x="100" y="66" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">degen0x</text>

  <!-- Category pill -->
  <rect x="60" y="110" width="180" height="30" rx="15" fill="rgba(247,147,26,0.15)" stroke="rgba(247,147,26,0.4)" stroke-width="1"/>
  <text x="150" y="130" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#f7931a" letter-spacing="1">BITCOIN STAKING</text>

  <!-- Main title -->
  <text font-family="Inter, system-ui, sans-serif" font-weight="900" letter-spacing="-2">
    <tspan x="60" y="215" font-size="52" fill="url(#titleGrad)">Babylon</tspan>
    <tspan x="60" dy="60" font-size="52" fill="#e6edf3">Protocol</tspan>
  </text>

  <!-- Tagline -->
  <text x="60" y="340" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f59e0b" letter-spacing="-0.5">Native BTC yield.</text>
  <text x="60" y="368" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#8b949e" letter-spacing="-0.3">No wrapping. No bridging. Your keys.</text>

  <!-- Key stats row -->
  <!-- TVL -->
  <rect x="60" y="395" width="148" height="62" rx="12" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="134" y="416" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#22c55e" letter-spacing="0.8">TOTAL TVL</text>
  <text x="134" y="442" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#4ade80" letter-spacing="-1">$1.9B</text>

  <!-- BTC Staked -->
  <rect x="220" y="395" width="148" height="62" rx="12" fill="rgba(247,147,26,0.1)" stroke="rgba(247,147,26,0.25)" stroke-width="1"/>
  <text x="294" y="416" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#f7931a" letter-spacing="0.8">BTC STAKED</text>
  <text x="294" y="442" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#fbbf24" letter-spacing="-1">57K ₿</text>

  <!-- APY -->
  <rect x="380" y="395" width="148" height="62" rx="12" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="454" y="416" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#818cf8" letter-spacing="0.8">APY RANGE</text>
  <text x="454" y="442" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#a78bfa" letter-spacing="-1">0.5–1.2%</text>

  <!-- CTA -->
  <rect x="60" y="476" width="320" height="46" rx="10" fill="rgba(247,147,26,0.15)" stroke="rgba(247,147,26,0.5)" stroke-width="1.5"/>
  <text x="220" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f7931a" letter-spacing="-0.3">degen0x.com/learn/babylon-protocol-bitcoin-staking →</text>

  <!-- === RIGHT PANEL: STAKING MECHANISM === -->

  <!-- Card -->
  <rect x="660" y="100" width="490" height="430" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Panel title -->
  <text x="905" y="138" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#8b949e" letter-spacing="0.5">HOW BABYLON STAKING WORKS</text>

  <!-- Flow diagram -->
  <!-- Step 1: Your BTC -->
  <rect x="690" y="155" width="200" height="64" rx="12" fill="rgba(247,147,26,0.12)" stroke="rgba(247,147,26,0.35)" stroke-width="1"/>
  <text x="790" y="180" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#f7931a">₿</text>
  <text x="790" y="200" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#e6edf3">Your Bitcoin</text>
  <text x="790" y="213" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#8b949e">Self-custodied</text>

  <!-- Arrow 1 -->
  <line x1="895" y1="187" x2="922" y2="187" stroke="#f7931a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="922,183 930,187 922,191" fill="#f7931a"/>

  <!-- Step 2: Bitcoin Timelock Script -->
  <rect x="930" y="155" width="200" height="64" rx="12" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="1030" y="178" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#818cf8" letter-spacing="0.3">BITCOIN SCRIPT</text>
  <text x="1030" y="196" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#e6edf3">Timelock Lock</text>
  <text x="1030" y="212" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#8b949e">On-chain, slashable</text>

  <!-- Arrow down from step 2 -->
  <line x1="1030" y1="219" x2="1030" y2="247" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="1026,247 1030,256 1034,247" fill="#6366f1"/>

  <!-- Step 3: PoS Chain Security -->
  <rect x="930" y="258" width="200" height="64" rx="12" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.35)" stroke-width="1"/>
  <text x="1030" y="281" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#06b6d4" letter-spacing="0.3">PoS CHAIN</text>
  <text x="1030" y="299" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#e6edf3">Security Provider</text>
  <text x="1030" y="315" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#8b949e">BTC secures the chain</text>

  <!-- Arrow left from step 3 back to yield -->
  <line x1="929" y1="290" x2="895" y2="290" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="895,286 886,290 895,294" fill="#22c55e"/>

  <!-- Step 4: Yield Back -->
  <rect x="690" y="258" width="200" height="64" rx="12" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
  <text x="790" y="281" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#22c55e" letter-spacing="0.3">YIELD PAID</text>
  <text x="790" y="299" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#e6edf3">0.5%–1.2% APY</text>
  <text x="790" y="315" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#8b949e">In native token</text>

  <!-- Loop arrow back to Your BTC -->
  <path d="M790 322 L790 340 L790 340" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3,2" fill="none"/>
  <path d="M750 340 Q750 357 768 357 L812 357 Q830 357 830 340" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2" fill="none"/>

  <!-- Key differentiators -->
  <rect x="680" y="346" width="450" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="905" y="370" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#8b949e" letter-spacing="0.5">KEY PROPERTIES</text>

  <!-- Property rows -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13">
    <text x="702" y="395" fill="#4ade80">✓</text>
    <text x="720" y="395" fill="#e6edf3" font-weight="500">No wrapping — BTC stays on Bitcoin L1</text>

    <text x="702" y="420" fill="#4ade80">✓</text>
    <text x="720" y="420" fill="#e6edf3" font-weight="500">Slash-proof — Bitcoin's own timelock script enforces it</text>

    <text x="702" y="445" fill="#4ade80">✓</text>
    <text x="720" y="445" fill="#e6edf3" font-weight="500">Non-custodial — your keys, your BTC at all times</text>

    <text x="702" y="470" fill="#4ade80">✓</text>
    <text x="720" y="470" fill="#e6edf3" font-weight="500">Unlocks productive BTC without bridging risk</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="596" width="1200" height="34" fill="rgba(0,0,0,0.4)"/>
  <text x="600" y="619" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#6e7681" letter-spacing="1">degen0x.com — Free Crypto Tools &amp; Guides</text>
</svg>
