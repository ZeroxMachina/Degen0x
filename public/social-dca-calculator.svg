    <line x1="840" y1="418" x2="840" y2="408"/>
    <line x1="860" y1="418" x2="860" y2="411"/>
    <line x1="880" y1="418" x2="880" y2="408"/>
    <line x1="900" y1="418" x2="900" y2="411"/>
    <line x1="920" y1="418" x2="920" y2="408"/>
    <line x1="940" y1="418" x2="940" y2="411"/>
    <line x1="960" y1="418" x2="960" y2="408"/>
    <line x1="980" y1="418" x2="980" y2="411"/>
    <line x1="1000" y1="418" x2="1000" y2="408"/>
