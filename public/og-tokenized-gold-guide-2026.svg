<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.2"/>

  <circle cx="1100" cy="550" r="80" fill="none" stroke="#0891b2" stroke-width="2" opacity="0.3"/>
  <circle cx="1100" cy="550" r="50" fill="none" stroke="#0891b2" stroke-width="1" opacity="0.2"/>

  <!-- Accent line -->
  <line x1="50" y1="300" x2="150" y2="300" stroke="#d97706" stroke-width="3" opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="280" font-family="Inter, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">
    Tokenized Gold Guide 2026
  </text>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" fill="#8b949e">
    XAUT, PAXG, and On-Chain Gold Assets
  </text>

  <!-- Footer branding -->
  <text x="1150" y="600" font-family="Inter, sans-serif" font-size="16" text-anchor="end" fill="#6e7681">
    degen0x.com
  </text>

  <!-- Small decorative dots -->
  <circle cx="150" cy="400" r="4" fill="#4f46e5" opacity="0.5"/>
  <circle cx="1050" cy="200" r="4" fill="#0891b2" opacity="0.5"/>
  <circle cx="300" cy="550" r="4" fill="#d97706" opacity="0.5"/>
</svg>