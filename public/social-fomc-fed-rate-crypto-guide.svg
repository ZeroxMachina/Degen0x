<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0d1428"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="redGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="candleGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="candleRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded"><rect width="1200" height="630" rx="0"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="180" fill="#4f46e5" opacity="0.06" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="120" fill="#0891b2" opacity="0.05" filter="url(#glow)"/>
  <circle cx="1100" cy="500" r="100" fill="#d97706" opacity="0.04" filter="url(#glow)"/>

  <!-- Logo area -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#4f46e5" opacity="0.3"/>
    <circle cx="16" cy="16" r="12" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <text x="10" y="21" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#818cf8">0x</text>
    <text x="40" y="22" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.05em">degen0x</text>
  </g>

  <!-- URGENT badge -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="170" height="32" rx="16" fill="#ef4444" opacity="0.15"/>
    <rect x="0" y="0" width="170" height="32" rx="16" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
    <circle cx="20" cy="16" r="4" fill="#ef4444" filter="url(#glowSm)"/>
    <text x="32" y="21" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#ef4444" letter-spacing="0.08em">FED DECIDES MAR 18</text>
  </g>

  <!-- Main Title -->
  <text x="60" y="180" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">How FOMC &amp; Fed Rates</text>
  <text x="60" y="240" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="url(#brand)" letter-spacing="-0.02em">Impact Crypto Prices</text>

  <!-- Subtitle -->
  <text x="60" y="285" font-family="Inter, Arial, sans-serif" font-size="18" fill="#8b949e">Historical patterns, positioning strategies, and what to watch tomorrow</text>

  <!-- BTC Price Action Chart (simplified candlestick around FOMC dates) -->
  <g transform="translate(60, 320)">
    <!-- Glass panel -->
    <rect x="0" y="0" width="520" height="220" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BTC PRICE ACTION AROUND FOMC</text>

    <!-- Axis labels -->
    <text x="20" y="200" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">-2d</text>
    <text x="95" y="200" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">-1d</text>
    <text x="170" y="200" font-family="Inter, Arial, sans-serif" font-size="10" fill="#f59e0b">FOMC</text>
    <text x="255" y="200" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">+1d</text>
    <text x="340" y="200" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">+2d</text>
    <text x="420" y="200" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">+3d</text>

    <!-- FOMC decision line -->
    <line x1="185" y1="40" x2="185" y2="185" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
    <text x="175" y="52" font-family="Inter, Arial, sans-serif" font-size="9" fill="#f59e0b" opacity="0.8">▼</text>

    <!-- Candlesticks (stylized) -->
    <!-- Pre-FOMC: neutral -->
    <line x1="40" y1="90" x2="40" y2="150" stroke="#8b949e" stroke-width="1"/>
    <rect x="32" y="105" width="16" height="25" rx="2" fill="#8b949e" opacity="0.4"/>

    <line x1="110" y1="85" x2="110" y2="145" stroke="#8b949e" stroke-width="1"/>
    <rect x="102" y="95" width="16" height="30" rx="2" fill="#8b949e" opacity="0.4"/>

    <!-- FOMC day: big red -->
    <line x1="185" y1="70" x2="185" y2="170" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="174" y="85" width="22" height="60" rx="3" fill="url(#candleRed)" opacity="0.8"/>

    <!-- Post-FOMC: recovery green -->
    <line x1="270" y1="75" x2="270" y2="155" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="259" y="80" width="22" height="50" rx="3" fill="url(#candleGreen)" opacity="0.8"/>

    <line x1="355" y1="60" x2="355" y2="130" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="344" y="65" width="22" height="40" rx="3" fill="url(#candleGreen)" opacity="0.8"/>

    <line x1="440" y1="55" x2="440" y2="110" stroke="#22c55e" stroke-width="1"/>
    <rect x="429" y="58" width="22" height="30" rx="3" fill="url(#candleGreen)" opacity="0.7"/>

    <!-- Volatility zone highlight -->
    <rect x="165" y="55" width="40" height="140" rx="4" fill="#f59e0b" opacity="0.04"/>

    <!-- 3-8% move label -->
    <g transform="translate(350, 140)">
      <rect x="0" y="0" width="150" height="28" rx="14" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.3)" stroke-width="0.5"/>
      <text x="14" y="18" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#f59e0b">3-8% move in 24hrs</text>
    </g>
  </g>

  <!-- Right side: Scenario cards -->
  <g transform="translate(620, 320)">
    <!-- Hawkish -->
    <rect x="0" y="0" width="250" height="64" rx="12" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="0.5"/>
    <text x="16" y="26" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#ef4444" letter-spacing="0.05em">HAWKISH SURPRISE</text>
    <text x="16" y="48" font-family="Inter, Arial, sans-serif" font-size="13" fill="#e6edf3">Flash crash → buying opportunity</text>

    <!-- Hold -->
    <rect x="0" y="78" width="250" height="64" rx="12" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="0.5"/>
    <text x="16" y="104" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#06b6d4" letter-spacing="0.05em">RATE HOLD (EXPECTED)</text>
    <text x="16" y="126" font-family="Inter, Arial, sans-serif" font-size="13" fill="#e6edf3">Bullish continuation likely</text>

    <!-- Dovish -->
    <rect x="0" y="156" width="250" height="64" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="0.5"/>
    <text x="16" y="182" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#22c55e" letter-spacing="0.05em">DOVISH PIVOT</text>
    <text x="16" y="204" font-family="Inter, Arial, sans-serif" font-size="13" fill="#e6edf3">Strong rally across all crypto</text>
  </g>

  <!-- Stat pills -->
  <g transform="translate(620, 560)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="12" y="20" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">$BTC $71K</text>

    <rect x="132" y="0" width="130" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="144" y="20" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">FOMC T-1</text>

    <rect x="274" y="0" width="170" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="286" y="20" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#8b949e">No paywall. Free.</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="625" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#6e7681">degen0x.com/learn/fomc-fed-rate-crypto-guide</text>
  <text x="1060" y="625" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#6e7681">Mar 2026</text>
</svg>