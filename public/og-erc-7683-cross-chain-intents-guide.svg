<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <linearGradient id="circleGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="circleGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="150" r="220" fill="url(#circleGrad1)"/>
  <circle cx="200" cy="520" r="180" fill="url(#circleGrad2)"/>

  <!-- Cross-chain visualization -->
  <g opacity="0.2" transform="translate(820, 160)">
    <!-- Chain A -->
    <rect x="0" y="0" width="100" height="40" rx="8" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <text x="50" y="26" text-anchor="middle" fill="#6366f1" font-size="13" font-family="Inter, sans-serif">Ethereum</text>

    <!-- Arrow / intent flow -->
    <path d="M110 20 C160 20, 160 120, 210 120" fill="none" stroke="url(#chainGrad)" stroke-width="2" stroke-dasharray="6 4"/>
    <circle cx="160" cy="70" r="20" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="160" y="75" text-anchor="middle" fill="#a5b4fc" font-size="10" font-family="Inter, sans-serif">Intent</text>

    <!-- Chain B -->
    <rect x="210" y="100" width="100" height="40" rx="8" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="260" y="126" text-anchor="middle" fill="#06b6d4" font-size="13" font-family="Inter, sans-serif">Base</text>

    <!-- Filler -->
    <circle cx="100" cy="120" r="16" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
    <text x="100" y="125" text-anchor="middle" fill="#22c55e" font-size="9" font-family="Inter, sans-serif">Filler</text>
    <line x1="100" y1="104" x2="100" y2="40" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="116" y1="120" x2="210" y2="120" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  </g>

  <!-- Logo area -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.9"/>
    <text x="16" y="22" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Inter, sans-serif">0x</text>
    <text x="44" y="22" fill="#8b949e" font-size="15" font-weight="600" font-family="Inter, sans-serif">degen0x</text>
  </g>

  <!-- Category badge -->
  <rect x="60" y="100" width="80" height="28" rx="14" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
  <text x="100" y="119" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600" font-family="Inter, sans-serif">LEARN</text>

  <!-- Title -->
  <text x="60" y="190" fill="url(#titleGrad)" font-size="46" font-weight="800" font-family="Inter, sans-serif" letter-spacing="-1">ERC-7683 Guide 2026</text>
  <text x="60" y="250" fill="#e6edf3" font-size="36" font-weight="700" font-family="Inter, sans-serif" letter-spacing="-0.5">The Cross-Chain Intents</text>
  <text x="60" y="300" fill="#e6edf3" font-size="36" font-weight="700" font-family="Inter, sans-serif" letter-spacing="-0.5">Standard Explained</text>

  <!-- Subtitle -->
  <text x="60" y="355" fill="#8b949e" font-size="19" font-family="Inter, sans-serif">By Uniswap Labs &amp; Across Protocol · Endorsed by Vitalik</text>

  <!-- Key concepts -->
  <g transform="translate(60, 400)">
    <text fill="#6e7681" font-size="13" font-family="Inter, sans-serif" font-weight="600" letter-spacing="1">HOW IT WORKS</text>
  </g>
  <g transform="translate(60, 430)">
    <!-- Step 1 -->
    <rect x="0" y="0" width="200" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="24" cy="25" r="12" fill="#6366f1" fill-opacity="0.3"/>
    <text x="24" y="30" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="700" font-family="Inter, sans-serif">1</text>
    <text x="46" y="22" fill="#e6edf3" font-size="13" font-weight="600" font-family="Inter, sans-serif">User Declares Intent</text>
    <text x="46" y="38" fill="#8b949e" font-size="11" font-family="Inter, sans-serif">"Swap USDC → WETH"</text>

    <!-- Arrow -->
    <text x="217" y="30" fill="#6e7681" font-size="18">→</text>

    <!-- Step 2 -->
    <rect x="240" y="0" width="200" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="264" cy="25" r="12" fill="#06b6d4" fill-opacity="0.3"/>
    <text x="264" y="30" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700" font-family="Inter, sans-serif">2</text>
    <text x="286" y="22" fill="#e6edf3" font-size="13" font-weight="600" font-family="Inter, sans-serif">Fillers Compete</text>
    <text x="286" y="38" fill="#8b949e" font-size="11" font-family="Inter, sans-serif">Best price wins</text>

    <!-- Arrow -->
    <text x="457" y="30" fill="#6e7681" font-size="18">→</text>

    <!-- Step 3 -->
    <rect x="480" y="0" width="200" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="504" cy="25" r="12" fill="#22c55e" fill-opacity="0.3"/>
    <text x="504" y="30" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700" font-family="Inter, sans-serif">3</text>
    <text x="526" y="22" fill="#e6edf3" font-size="13" font-weight="600" font-family="Inter, sans-serif">Settled Cross-Chain</text>
    <text x="526" y="38" fill="#8b949e" font-size="11" font-family="Inter, sans-serif">Fast &amp; trustless</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="611" fill="#6e7681" font-size="14" font-family="Inter, sans-serif">degen0x.com</text>
  <text x="1140" y="611" text-anchor="end" fill="#6e7681" font-size="14" font-family="Inter, sans-serif">March 2026</text>
</svg>