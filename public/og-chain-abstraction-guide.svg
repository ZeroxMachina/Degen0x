<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <circle cx="900" cy="200" r="180" fill="#06b6d4" opacity="0.04"/>
  <circle cx="300" cy="500" r="140" fill="#6366f1" opacity="0.03"/>

  <text x="60" y="58" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Guide badge -->
  <rect x="160" y="38" width="120" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1"/>
  <text x="220" y="57" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#06b6d4">2026 Guide</text>

  <text x="60" y="200" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Chain Abstraction</text>
  <text x="60" y="260" font-family="Inter, -apple-system, sans-serif" font-size="38" font-weight="800" fill="url(#accent)" letter-spacing="-0.02em">One Account, Every Chain</text>

  <text x="60" y="310" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#8b949e">No bridging, no chain switching, no gas headaches — the complete guide</text>

  <!-- Chain abstraction visual - connected chains -->
  <g transform="translate(720, 100)">
    <!-- Central node -->
    <circle cx="200" cy="120" r="40" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="2" filter="url(#softGlow)"/>
    <text x="200" y="115" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#818cf8">Universal</text>
    <text x="200" y="132" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#818cf8">Account</text>

    <!-- Chain nodes -->
    <circle cx="70" cy="50" r="28" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="70" y="54" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#06b6d4">ETH</text>
    <line x1="98" y1="68" x2="162" y2="100" stroke="#06b6d4" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>

    <circle cx="330" cy="50" r="28" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="330" y="54" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">SOL</text>
    <line x1="302" y1="68" x2="238" y2="100" stroke="#8b5cf6" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>

    <circle cx="50" cy="180" r="28" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="50" y="184" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">ARB</text>
    <line x1="78" y1="168" x2="162" y2="138" stroke="#f59e0b" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>

    <circle cx="350" cy="180" r="28" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="350" y="184" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#22c55e">BASE</text>
    <line x1="322" y1="168" x2="238" y2="138" stroke="#22c55e" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>

    <circle cx="200" cy="230" r="28" fill="rgba(239,68,68,0.15)" stroke="#f87171" stroke-width="1.5"/>
    <text x="200" y="234" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f87171">BTC</text>
    <line x1="200" y1="202" x2="200" y2="160" stroke="#f87171" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>
  </g>

  <!-- Protocol pills -->
  <g transform="translate(60, 370)">
    <rect width="520" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="24" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.05em">PROTOCOLS COVERED</text>
    <rect x="20" y="42" width="120" height="34" rx="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="80" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#818cf8">Particle Network</text>
    <rect x="150" y="42" width="120" height="34" rx="10" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1"/>
    <text x="210" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#06b6d4">NEAR Chain Sig</text>
    <rect x="280" y="42" width="70" height="34" rx="10" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
    <text x="315" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">Socket</text>
    <rect x="360" y="42" width="65" height="34" rx="10" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="392" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">+More</text>
  </g>

  <rect y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="624" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="624" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#6e7681">Free · Comprehensive Guide</text>
</svg>