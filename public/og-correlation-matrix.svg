<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cellGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="cellGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="cellGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Top gradient bar -->
  <rect width="1200" height="8" fill="url(#topGradient)"/>

  <!-- Decorative circles background -->
  <circle cx="100" cy="450" r="80" fill="#4f46e5" opacity="0.08"/>
  <circle cx="1000" cy="150" r="120" fill="#0891b2" opacity="0.08"/>

  <!-- Logo area -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">
    degen0x
  </text>

  <!-- Main title -->
  <text x="40" y="150" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Crypto Correlation
  </text>
  <text x="40" y="215" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Matrix
  </text>

  <!-- Subtitle -->
  <text x="40" y="270" font-family="Inter, sans-serif" font-size="22" fill="#8b949e">
    Visualize how crypto assets move together
  </text>

  <!-- Matrix grid decoration on right side -->
  <g opacity="0.7">
    <!-- Column 1 -->
    <rect x="820" y="120" width="45" height="45" fill="url(#cellGradient1)" stroke="#4f46e5" stroke-width="1" opacity="0.9"/>
    <rect x="820" y="175" width="45" height="45" fill="url(#cellGradient2)" stroke="#0891b2" stroke-width="1" opacity="0.7"/>
    <rect x="820" y="230" width="45" height="45" fill="url(#cellGradient3)" stroke="#d97706" stroke-width="1" opacity="0.5"/>

    <!-- Column 2 -->
    <rect x="875" y="120" width="45" height="45" fill="url(#cellGradient2)" stroke="#0891b2" stroke-width="1" opacity="0.7"/>
    <rect x="875" y="175" width="45" height="45" fill="url(#cellGradient1)" stroke="#4f46e5" stroke-width="1" opacity="0.9"/>
    <rect x="875" y="230" width="45" height="45" fill="url(#cellGradient2)" stroke="#0891b2" stroke-width="1" opacity="0.6"/>

    <!-- Column 3 -->
    <rect x="930" y="120" width="45" height="45" fill="url(#cellGradient3)" stroke="#d97706" stroke-width="1" opacity="0.5"/>
    <rect x="930" y="175" width="45" height="45" fill="url(#cellGradient2)" stroke="#0891b2" stroke-width="1" opacity="0.6"/>
    <rect x="930" y="230" width="45" height="45" fill="url(#cellGradient1)" stroke="#4f46e5" stroke-width="1" opacity="0.8"/>

    <!-- Column 4 -->
    <rect x="985" y="120" width="45" height="45" fill="url(#cellGradient1)" stroke="#4f46e5" stroke-width="1" opacity="0.8"/>
    <rect x="985" y="175" width="45" height="45" fill="url(#cellGradient3)" stroke="#d97706" stroke-width="1" opacity="0.7"/>
    <rect x="985" y="230" width="45" height="45" fill="url(#cellGradient2)" stroke="#0891b2" stroke-width="1" opacity="0.9"/>
  </g>

  <!-- Bottom branding -->
  <text x="40" y="595" font-family="Inter, sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">
    degen0x.com
  </text>

  <!-- Accent line -->
  <line x1="40" y1="300" x2="150" y2="300" stroke="url(#topGradient)" stroke-width="3" stroke-linecap="round"/>
</svg>