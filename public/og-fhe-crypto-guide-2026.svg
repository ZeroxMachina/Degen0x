<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" clip-path="url(#rounded)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="200" fill="#8b5cf6" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="150" fill="#06b6d4" opacity="0.04" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="120" fill="#8b5cf6" opacity="0.03" filter="url(#glow)"/>

  <!-- Lock icon (representing encryption) -->
  <g transform="translate(900, 120)" opacity="0.15">
    <rect x="10" y="30" width="80" height="60" rx="10" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <path d="M25 30 V20 A25 25 0 0 1 75 20 V30" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="55" r="6" fill="#8b5cf6"/>
    <line x1="50" y1="61" x2="50" y2="72" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Data flow diagram (encrypted computation visualization) -->
  <g transform="translate(820, 260)" opacity="0.2">
    <!-- Input block -->
    <rect x="0" y="0" width="100" height="40" rx="8" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <text x="50" y="25" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Encrypted</text>
    <!-- Arrow -->
    <line x1="105" y1="20" x2="140" y2="20" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="140,15 150,20 140,25" fill="#6366f1"/>
    <!-- Process block -->
    <rect x="155" y="0" width="100" height="40" rx="8" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <text x="205" y="25" fill="#06b6d4" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Compute</text>
    <!-- Arrow -->
    <line x1="260" y1="20" x2="295" y2="20" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="295,15 305,20 295,25" fill="#06b6d4"/>
    <!-- Output block -->
    <rect x="310" y="0" width="100" height="40" rx="8" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="360" y="25" fill="#22c55e" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Result</text>
  </g>

  <!-- Category badge -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="190" height="28" rx="14" fill="#8b5cf620" stroke="#8b5cf640" stroke-width="1"/>
    <text x="95" y="18" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="700" letter-spacing="0.5">PRIVACY &amp; CRYPTOGRAPHY</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Fully Homomorphic</text>
  <text x="60" y="230" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Encryption (FHE)</text>
  <text x="60" y="285" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.01em">The Complete Guide for 2026</text>

  <!-- Subtitle -->
  <text x="60" y="340" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Compute on encrypted data without decrypting it.</text>
  <text x="60" y="365" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Zama, Fhenix, Inco, confidential DeFi, and more.</text>

  <!-- Stat cards -->
  <g transform="translate(60, 400)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">ZAMA VALUATION</text>
    <text x="16" y="55" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="24" font-weight="800">$1B+</text>

    <!-- Card 2 -->
    <rect x="180" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="196" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">FHE FUNDING</text>
    <text x="196" y="55" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="24" font-weight="800">$180M+</text>

    <!-- Card 3 -->
    <rect x="360" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="376" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">CURRENT TPS</text>
    <text x="376" y="55" fill="#06b6d4" font-family="Inter, sans-serif" font-size="24" font-weight="800">~20</text>

    <!-- Card 4 -->
    <rect x="540" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="556" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">2026 TARGET</text>
    <text x="556" y="55" fill="#22c55e" font-family="Inter, sans-serif" font-size="24" font-weight="800">1,000+</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500">degen0x.com</text>
  <text x="1140" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="end">Learn Guide</text>
</svg>