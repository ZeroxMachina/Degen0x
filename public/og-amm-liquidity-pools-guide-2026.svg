<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Decorative elements - AMM pools visualization -->
  <circle cx="200" cy="150" r="50" fill="none" stroke="#0891b2" stroke-width="2" opacity="0.4"/>
  <circle cx="200" cy="150" r="35" fill="none" stroke="#0891b2" stroke-width="1" opacity="0.2"/>

  <circle cx="1000" cy="480" r="70" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.3"/>
  <circle cx="1000" cy="480" r="45" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.15"/>

  <!-- Connecting lines representing liquidity flow -->
  <line x1="200" y1="150" x2="400" y2="300" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  <line x1="400" y1="300" x2="800" y2="200" stroke="#0891b2" stroke-width="2" opacity="0.4"/>

  <!-- Title -->
  <text x="600" y="280" font-family="Inter, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">
    AMM & Liquidity Pools
  </text>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" fill="#8b949e">
    Automated Market Makers and Yield Strategies
  </text>

  <!-- Footer branding -->
  <text x="1150" y="600" font-family="Inter, sans-serif" font-size="16" text-anchor="end" fill="#6e7681">
    degen0x.com
  </text>

  <!-- Small decorative dots -->
  <circle cx="100" cy="500" r="4" fill="#0891b2" opacity="0.6"/>
  <circle cx="650" cy="120" r="4" fill="#d97706" opacity="0.5"/>
  <circle cx="1100" cy="350" r="4" fill="#4f46e5" opacity="0.5"/>
</svg>