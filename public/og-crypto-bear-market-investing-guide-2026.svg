<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>

    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f22;stop-opacity:1" />
    </linearGradient>

    <!-- Top accent bar gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Glow blur filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="130" cy="140" r="85" fill="#4f46e5" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1070" cy="550" r="125" fill="#6366f1" opacity="0.08" filter="url(#glow)"/>
  <circle cx="600" cy="-45" r="155" fill="#d97706" opacity="0.06" filter="url(#glow)"/>

  <!-- Logo text -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#4f46e5" letter-spacing="2">
    degen0x
  </text>

  <!-- Category badge -->
  <rect x="40" y="80" width="140" height="40" rx="20" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="2"/>
  <text x="110" y="105" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="middle">
    Strategy
  </text>

  <!-- Main title -->
  <text x="40" y="200" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    Crypto Bear Market
  </text>
  <text x="40" y="265" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    Investing Guide
  </text>

  <!-- Subtitle -->
  <text x="40" y="320" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#8b949e">
    Proven strategies for surviving and thriving in crypto downturns
  </text>

  <!-- Right panel background -->
  <rect x="750" y="100" width="430" height="470" rx="20" fill="rgba(79, 102, 241, 0.05)" stroke="rgba(79, 102, 241, 0.2)" stroke-width="1"/>

  <!-- Right panel title -->
  <text x="780" y="140" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">
    Bear Market Timeline
  </text>

  <!-- Phase 1: Euphoria to Panic -->
  <g>
    <circle cx="800" cy="175" r="6" fill="#6366f1"/>
    <rect x="815" y="158" width="150" height="34" rx="4" fill="rgba(99, 102, 241, 0.15)"/>
    <text x="825" y="175" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">Phase 1: Euphoria</text>
    <text x="825" y="190" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#8b949e">to Panic</text>

    <rect x="780" y="200" width="360" height="3" rx="1.5" fill="rgba(99, 102, 241, 0.3)"/>
    <rect x="780" y="200" width="90" height="3" rx="1.5" fill="rgba(255, 0, 0, 0.5)"/>
  </g>

  <!-- Phase 2: Washout -->
  <g>
    <circle cx="800" cy="250" r="6" fill="#6366f1"/>
    <rect x="815" y="233" width="150" height="34" rx="4" fill="rgba(99, 102, 241, 0.15)"/>
    <text x="825" y="250" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">Phase 2: Washout</text>
    <text x="825" y="265" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#8b949e">& Capitulation</text>

    <rect x="780" y="275" width="360" height="3" rx="1.5" fill="rgba(99, 102, 241, 0.3)"/>
    <rect x="780" y="275" width="180" height="3" rx="1.5" fill="rgba(255, 100, 100, 0.6)"/>
  </g>

  <!-- Phase 3: Accumulation -->
  <g>
    <circle cx="800" cy="325" r="6" fill="#6366f1"/>
    <rect x="815" y="308" width="150" height="34" rx="4" fill="rgba(99, 102, 241, 0.15)"/>
    <text x="825" y="325" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">Phase 3: Accumulation</text>
    <text x="825" y="340" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#8b949e">Opportunities</text>

    <rect x="780" y="350" width="360" height="3" rx="1.5" fill="rgba(99, 102, 241, 0.3)"/>
    <rect x="780" y="350" width="270" height="3" rx="1.5" fill="rgba(34, 197, 94, 0.5)"/>
  </g>

  <!-- Phase 4: Recovery -->
  <g>
    <circle cx="800" cy="400" r="6" fill="#6366f1"/>
    <rect x="815" y="383" width="150" height="34" rx="4" fill="rgba(99, 102, 241, 0.15)"/>
    <text x="825" y="400" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">Phase 4: Recovery</text>
    <text x="825" y="415" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#8b949e">& Growth</text>

    <rect x="780" y="425" width="360" height="3" rx="1.5" fill="rgba(99, 102, 241, 0.3)"/>
    <rect x="780" y="425" width="360" height="3" rx="1.5" fill="rgba(34, 197, 94, 0.7)"/>
  </g>

  <!-- Key Action -->
  <rect x="780" y="460" width="360" height="45" rx="8" fill="rgba(34, 197, 94, 0.1)" stroke="rgba(34, 197, 94, 0.3)" stroke-width="1"/>
  <text x="800" y="477" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e">💡 Strategy: DCA, accumulate, avoid panic selling</text>
  <text x="800" y="495" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e">Focus on long-term fundamentals</text>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(79, 102, 241, 0.1)" stroke="rgba(79, 102, 241, 0.2)" stroke-width="1"/>
  <text x="40" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8b949e">
    degen0x.com
  </text>
  <text x="1160" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end">
    Learn Crypto
  </text>
</svg>
