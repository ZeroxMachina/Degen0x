  <rect x="660" y="440" width="180" height="70" rx="10" fill="rgba(63,185,80,0.1)" stroke="rgba(63,185,80,0.3)" stroke-width="1"/>
  <text x="680" y="466" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Axelar</text>
  <text x="680" y="494" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#3fb950">80+ chains</text>

  <!-- Decorative chain links -->
