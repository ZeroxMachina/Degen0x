  <circle cx="850" cy="180" r="220" fill="#06b6d4" opacity="0.05"/>
  <circle cx="350" cy="500" r="160" fill="#bc8cff" opacity="0.04"/>

  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <text x="60" y="210" font-size="72">🔗</text>

  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#f1f5f9" letter-spacing="-0.02em">Cross-Chain Interoperability</text>
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#f1f5f9" letter-spacing="-0.02em">Guide 2026</text>

