  <text x="80" y="494" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#06b6d4">165+ chains</text>

  <rect x="260" y="440" width="180" height="70" rx="10" fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <text x="280" y="466" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">CCIP</text>
  <text x="280" y="494" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#58a6ff">$33.6B sec</text>

  <rect x="460" y="440" width="180" height="70" rx="10" fill="rgba(188,140,255,0.1)" stroke="rgba(188,140,255,0.3)" stroke-width="1"/>
