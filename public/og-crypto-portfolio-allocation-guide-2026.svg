<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="250" r="200" fill="#6366f1" opacity="0.06"/>
  <circle cx="150" cy="500" r="120" fill="#6366f1" opacity="0.04"/>

  <!-- Pie Chart Icon (right side, low opacity) -->
  <g opacity="0.15" transform="translate(1010, 300)">
    <!-- Pie slices with different colors -->
    <!-- Blue slice (40%) -->
    <path d="M 0,0 L 0,-50 A 50,50 0 0,1 38.3,-32.1 Z" fill="#6366f1" opacity="0.8"/>
    <!-- Purple slice (30%) -->
    <path d="M 0,0 L 38.3,-32.1 A 50,50 0 0,1 48.3,15.45 Z" fill="#8b5cf6" opacity="0.8"/>
    <!-- Green slice (20%) -->
    <path d="M 0,0 L 48.3,15.45 A 50,50 0 0,1 15.45,47.6 Z" fill="#22c55e" opacity="0.8"/>
    <!-- Amber slice (10%) -->
    <path d="M 0,0 L 15.45,47.6 A 50,50 0 0,1 0,-50 Z" fill="#f59e0b" opacity="0.8"/>
    <!-- Center circle for pie chart effect -->
    <circle cx="0" cy="0" r="20" fill="#0a0f1e" opacity="0.8"/>
    <!-- Accent dots on slices -->
    <circle cx="0" cy="-35" r="4" fill="#06b6d4" opacity="0.9"/>
    <circle cx="40" cy="-10" r="4" fill="#06b6d4" opacity="0.9"/>
    <circle cx="30" cy="35" r="4" fill="#06b6d4" opacity="0.9"/>
  </g>

  <!-- Category badge -->
  <rect x="60" y="180" width="120" height="32" rx="16" fill="#6366f1" opacity="0.2"/>
  <text x="120" y="201" fill="#6366f1" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Investing</text>

  <!-- Title -->
  <text x="60" y="280" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Crypto Portfolio</text>
  <text x="60" y="335" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Allocation Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="390" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="20">Optimal portfolio strategies for every risk level</text>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="#0a0f1e" opacity="0.8"/>
  <text x="60" y="598" fill="#6366f1" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">degen0x</text>
  <text x="170" y="598" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16">degen0x.com</text>
  <text x="1060" y="598" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14">2026 Guide</text>
</svg>