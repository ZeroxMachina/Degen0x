<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#accentGradient)" opacity="0.3"/>

  <!-- Top accent bar -->
  <rect x="0" y="80" width="200" height="4" fill="url(#accentGradient)"/>

  <!-- Decorative circles on right side -->
  <circle cx="1050" cy="150" r="80" fill="#6366f1" opacity="0.08"/>
  <circle cx="1100" cy="350" r="120" fill="#06b6d4" opacity="0.06"/>
  <circle cx="1000" cy="500" r="60" fill="#6366f1" opacity="0.07"/>

  <!-- Title -->
  <text x="60" y="200" font-size="56" font-weight="bold" fill="#e6edf3" font-family="Arial, sans-serif">
    Privacy Coins Guide 2026
  </text>

  <!-- Subtitle -->
  <text x="60" y="280" font-size="28" fill="#8b949e" font-family="Arial, sans-serif">
    Monero, Zcash &amp; privacy tech explained
  </text>

  <!-- Emoji decorations -->
  <text x="60" y="150" font-size="48">🔒</text>
  <text x="130" y="150" font-size="48">🔐</text>
  <text x="200" y="150" font-size="48">🛡️</text>

  <!-- Domain at bottom -->
  <text x="60" y="595" font-size="18" fill="#8b949e" font-family="Arial, sans-serif">
    degen0x.com
  </text>
</svg>
