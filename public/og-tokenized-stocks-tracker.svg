<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="300" y1="0" x2="300" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow -->
  <circle cx="900" cy="300" r="300" fill="#6366f1" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="200" cy="500" r="200" fill="#06b6d4" opacity="0.05" filter="url(#blur1)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
  </g>

  <!-- Logo -->
  <g transform="translate(80, 50)">
    <circle cx="20" cy="20" r="18" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>
    <text x="20" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#6366f1">0x</text>
  </g>
  <text x="125" y="68" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badges -->
  <rect x="80" y="110" width="160" height="30" rx="15" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="160" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#6366f1">RWA · On-Chain Equities</text>

  <rect x="250" y="110" width="80" height="30" rx="15" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
  <text x="290" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e">LIVE</text>

  <!-- Main title -->
  <text x="80" y="200" font-family="Inter, system-ui, sans-serif" font-size="50" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Tokenized Stocks</text>
  <text x="80" y="255" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="700" fill="url(#accent)" letter-spacing="-0.01em">Tracker</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">Live on-chain equity data — Ondo Finance, Backed Finance, Dinari</text>

  <!-- Mini table preview -->
  <g transform="translate(80, 340)">
    <!-- Table header -->
    <rect x="0" y="0" width="580" height="36" rx="8" ry="8" fill="rgba(255,255,255,0.06)"/>
    <text x="20" y="23" font-family="Inter, monospace" font-size="11" font-weight="700" fill="#8b949e">ASSET</text>
    <text x="140" y="23" font-family="Inter, monospace" font-size="11" font-weight="700" fill="#8b949e">PRICE</text>
    <text x="250" y="23" font-family="Inter, monospace" font-size="11" font-weight="700" fill="#8b949e">24H</text>
    <text x="350" y="23" font-family="Inter, monospace" font-size="11" font-weight="700" fill="#8b949e">MCAP</text>
    <text x="460" y="23" font-family="Inter, monospace" font-size="11" font-weight="700" fill="#8b949e">APY</text>

    <!-- Row 1: AAPL -->
    <rect x="0" y="40" width="580" height="36" rx="0" fill="rgba(255,255,255,0.02)"/>
    <text x="20" y="63" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3">xAAPL</text>
    <text x="140" y="63" font-family="Inter, monospace" font-size="13" fill="#e6edf3">$218.45</text>
    <text x="250" y="63" font-family="Inter, monospace" font-size="13" font-weight="600" fill="#22c55e">+1.23%</text>
    <text x="350" y="63" font-family="Inter, monospace" font-size="13" fill="#e6edf3">$84.2M</text>
    <text x="460" y="63" font-family="Inter, monospace" font-size="13" fill="#f59e0b">0.52%</text>

    <!-- Row 2: SPY -->
    <rect x="0" y="80" width="580" height="36" rx="0" fill="transparent"/>
    <text x="20" y="103" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3">xSPY</text>
    <text x="140" y="103" font-family="Inter, monospace" font-size="13" fill="#e6edf3">$531.80</text>
    <text x="250" y="103" font-family="Inter, monospace" font-size="13" font-weight="600" fill="#22c55e">+0.64%</text>
    <text x="350" y="103" font-family="Inter, monospace" font-size="13" fill="#e6edf3">$245.3M</text>
    <text x="460" y="103" font-family="Inter, monospace" font-size="13" fill="#f59e0b">1.38%</text>

    <!-- Row 3: NVDA -->
    <rect x="0" y="120" width="580" height="36" rx="0" fill="rgba(255,255,255,0.02)"/>
    <text x="20" y="143" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3">xNVDA</text>
    <text x="140" y="143" font-family="Inter, monospace" font-size="13" fill="#e6edf3">$112.40</text>
    <text x="250" y="143" font-family="Inter, monospace" font-size="13" font-weight="600" fill="#22c55e">+3.45%</text>
    <text x="350" y="143" font-family="Inter, monospace" font-size="13" fill="#e6edf3">$92.1M</text>
    <text x="460" y="143" font-family="Inter, monospace" font-size="13" fill="#f59e0b">0.04%</text>

    <!-- Row 4: TSLA -->
    <rect x="0" y="160" width="580" height="36" rx="0" fill="transparent"/>
    <text x="20" y="183" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3">xTSLA</text>
    <text x="140" y="183" font-family="Inter, monospace" font-size="13" fill="#e6edf3">$287.10</text>
    <text x="250" y="183" font-family="Inter, monospace" font-size="13" font-weight="600" fill="#ef4444">-2.18%</text>
    <text x="350" y="183" font-family="Inter, monospace" font-size="13" fill="#e6edf3">$62.8M</text>
    <text x="460" y="183" font-family="Inter, monospace" font-size="13" fill="#6e7681">—</text>
  </g>

  <!-- Right side: mini chart -->
  <g transform="translate(720, 340)">
    <rect x="0" y="0" width="400" height="196" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e">TOTAL MARKET CAP</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#22c55e">$842.8M</text>
    <text x="170" y="55" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e">↑ $1B milestone</text>

    <!-- Chart line -->
    <polyline
      points="20,160 60,150 100,155 140,140 180,130 220,125 260,110 300,100 340,90 380,80"
      fill="none" stroke="url(#chartLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    />
    <!-- Chart area fill -->
    <polygon
      points="20,160 60,150 100,155 140,140 180,130 220,125 260,110 300,100 340,90 380,80 380,180 20,180"
      fill="url(#chartFill)"
    />
    <!-- Dot at end -->
    <circle cx="380" cy="80" r="4" fill="#06b6d4"/>
    <circle cx="380" cy="80" r="8" fill="#06b6d4" opacity="0.3" filter="url(#glow)"/>

    <!-- Protocol breakdown mini -->
    <g transform="translate(20, 165)">
      <rect x="0" y="0" width="140" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="0" width="82" height="4" rx="2" fill="#6366f1"/>
      <rect x="82" y="0" width="33" height="4" rx="2" fill="#06b6d4"/>
      <rect x="115" y="0" width="25" height="4" rx="2" fill="#f59e0b"/>
      <text x="155" y="5" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6e7681">Ondo 58% | Backed 24% | Dinari 18%</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="rgba(0,0,0,0.4)"/>
  <rect x="0" y="540" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="80" y="590" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">degen0x.com</text>
  <text x="1120" y="590" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Free Tool · Live Data · 10 Assets Tracked</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>