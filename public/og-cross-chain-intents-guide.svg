<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Decorative: intent flow arrows -->
  <circle cx="900" cy="200" r="100" fill="#6366f1" opacity="0.06"/>
  <circle cx="1060" cy="300" r="140" fill="#06b6d4" opacity="0.04"/>
  <circle cx="820" cy="380" r="70" fill="#d97706" opacity="0.05"/>
  <!-- Intent flow diagram: User → Fillers → Destination -->
  <rect x="850" y="160" width="90" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <text x="895" y="185" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#818cf8" text-anchor="middle">User</text>
  <!-- Arrow 1 -->
  <line x1="940" y1="180" x2="980" y2="180" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <polygon points="980,175 990,180 980,185" fill="#6366f1" opacity="0.4"/>
  <!-- Filler box -->
  <rect x="990" y="155" width="100" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <text x="1040" y="177" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22d3ee" text-anchor="middle">Fillers</text>
  <text x="1040" y="193" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">compete</text>
  <!-- Arrow 2 -->
  <line x1="1040" y1="205" x2="1040" y2="240" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
  <polygon points="1035,240 1040,250 1045,240" fill="#22c55e" opacity="0.4"/>
  <!-- Destination box -->
  <rect x="990" y="250" width="100" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
  <text x="1040" y="275" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3fb950" text-anchor="middle">Destination</text>
  <!-- Settlement arrow back -->
  <line x1="990" y1="270" x2="940" y2="270" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="965" y="262" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#d97706" text-anchor="middle" opacity="0.5">settle</text>
  <!-- Chain dots -->
  <circle cx="870" cy="320" r="4" fill="#6366f1" opacity="0.4"/>
  <circle cx="920" cy="340" r="3" fill="#06b6d4" opacity="0.3"/>
  <circle cx="960" cy="310" r="3" fill="#22c55e" opacity="0.3"/>
  <circle cx="1100" cy="330" r="4" fill="#8b5cf6" opacity="0.3"/>
  <line x1="870" y1="320" x2="920" y2="340" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <line x1="920" y1="340" x2="960" y2="310" stroke="#06b6d4" stroke-width="1" opacity="0.15"/>
  <line x1="960" y1="310" x2="1100" y2="330" stroke="#22c55e" stroke-width="1" opacity="0.12"/>
  <!-- Logo -->
  <text x="60" y="72" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#818cf8" opacity="0.9">degen0x</text>
  <!-- Category badges -->
  <rect x="60" y="140" width="70" height="24" rx="6" fill="#6366f1" opacity="0.15"/>
  <text x="95" y="156" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#818cf8" text-anchor="middle">Intents</text>
  <rect x="138" y="140" width="120" height="24" rx="6" fill="#06b6d4" opacity="0.15"/>
  <text x="198" y="156" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" text-anchor="middle">Interoperability</text>
  <rect x="266" y="140" width="80" height="24" rx="6" fill="#bc8cff" opacity="0.15"/>
  <text x="306" y="156" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#bc8cff" text-anchor="middle">Advanced</text>
  <!-- Title -->
  <text x="60" y="220" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#titleGrad)">Cross-Chain Intents Guide</text>
  <text x="60" y="268" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#e6edf3">ERC-7683, Fillers &amp; the End</text>
  <text x="60" y="308" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#e6edf3">of Traditional Bridges</text>
  <!-- Subtitle -->
  <text x="60" y="362" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">How competing solvers replace bridges with faster, cheaper cross-chain transfers</text>
  <!-- Stats boxes -->
  <rect x="60" y="400" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="140" y="430" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#22c55e" text-anchor="middle">~2s</text>
  <text x="140" y="454" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Median Fill Time</text>
  <rect x="236" y="400" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="316" y="430" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#06b6d4" text-anchor="middle">$0.04</text>
  <text x="316" y="454" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">USDC Transfer Fee</text>
  <rect x="412" y="400" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="492" y="430" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#d97706" text-anchor="middle">$9.96B+</text>
  <text x="492" y="454" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">deBridge Volume</text>
  <!-- Protocols -->
  <text x="60" y="510" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Across Protocol · UniswapX · deBridge · NEAR Intents · Cowswap</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="610" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">degen0x.com</text>
  <text x="1140" y="610" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">Updated March 2026</text>
</svg>