  <text x="394" y="436" font-family="Inter, sans-serif" font-size="10" fill="#6e7681" font-weight="500">SETTLEMENT</text>
  <text x="394" y="452" font-family="Inter, sans-serif" font-size="13" fill="#22d3ee" font-weight="700">On-Chain</text>

  <!-- Full guide CTA -->
  <rect x="58" y="476" width="540" height="50" rx="12"
