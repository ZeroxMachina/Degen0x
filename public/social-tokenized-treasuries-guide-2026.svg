        fill="rgba(255,255,255,0.05)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="242" y="436" font-family="Inter, sans-serif" font-size="10" fill="#6e7681" font-weight="500">T-BILL YIELD</text>
  <text x="242" y="452" font-family="Inter, sans-serif" font-size="13" fill="#4ade80" font-weight="700">4–5% APY</text>

  <!-- On-chain -->
  <rect x="374" y="422" width="152" height="38" rx="10"
