  <rect x="720" y="330" width="370" height="46" rx="10"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="742" cy="353" r="10" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="742" y="357" text-anchor="middle" font-family="Inter, sans-serif"
