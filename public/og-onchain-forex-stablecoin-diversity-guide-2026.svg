<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="500" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative - currency flow diagram -->
  <g transform="translate(680, 100)">
    <!-- Central hub -->
    <circle cx="230" cy="200" r="60" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.2" stroke-width="2"/>
    <circle cx="230" cy="200" r="40" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.3"/>
    <text x="230" y="195" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="14" font-weight="800">On-Chain</text>
    <text x="230" y="215" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="14" font-weight="800">FX</text>

    <!-- Currency nodes -->
    <!-- USD -->
    <circle cx="80" cy="80" r="35" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="80" y="76" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="18" font-weight="800">$</text>
    <text x="80" y="96" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" font-weight="600">USDC</text>

    <!-- EUR -->
    <circle cx="400" cy="80" r="35" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-opacity="0.3"/>
    <text x="400" y="76" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="18" font-weight="800">€</text>
    <text x="400" y="96" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" font-weight="600">EURC</text>

    <!-- GBP -->
    <circle cx="440" cy="240" r="35" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="440" y="236" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="18" font-weight="800">£</text>
    <text x="440" y="256" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" font-weight="600">GBPT</text>

    <!-- JPY -->
    <circle cx="80" cy="320" r="35" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.3"/>
    <text x="80" y="316" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="18" font-weight="800">¥</text>
    <text x="80" y="336" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" font-weight="600">JPYC</text>

    <!-- SGD -->
    <circle cx="380" cy="360" r="35" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3"/>
    <text x="380" y="356" text-anchor="middle" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="16" font-weight="800">S$</text>
    <text x="380" y="376" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" font-weight="600">XSGD</text>

    <!-- Connection lines -->
    <line x1="110" y1="108" x2="195" y2="170" stroke="#22c55e" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 4"/>
    <line x1="370" y1="108" x2="268" y2="170" stroke="#06b6d4" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 4"/>
    <line x1="408" y1="240" x2="290" y2="210" stroke="#f59e0b" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 4"/>
    <line x1="110" y1="300" x2="195" y2="235" stroke="#ef4444" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 4"/>
    <line x1="350" y1="340" x2="268" y2="235" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 4"/>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.2"/>
    <text x="16" y="21" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="14" font-weight="800">0x</text>
  </g>
  <text x="100" y="56" fill="#e6edf3" font-family="Inter, sans-serif" font-size="16" font-weight="700" opacity="0.7">degen0x</text>

  <!-- Category badges -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="50" y="17" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="11" font-weight="700">Stablecoins</text>

    <rect x="110" y="0" width="70" height="26" rx="13" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-opacity="0.3"/>
    <text x="145" y="17" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="11" font-weight="700">Forex</text>

    <rect x="190" y="0" width="70" height="26" rx="13" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.3"/>
    <text x="225" y="17" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="11" font-weight="700">DeFi</text>
  </g>

  <!-- Title -->
  <text x="60" y="195" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="40" font-weight="900" letter-spacing="-0.02em">On-Chain Forex &amp;</text>
  <text x="60" y="248" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="40" font-weight="900" letter-spacing="-0.02em">Stablecoin Diversity</text>
  <text x="60" y="300" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="40" font-weight="900" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="345" fill="#8b949e" font-family="Inter, sans-serif" font-size="17">Beyond USD — multi-currency stablecoins,</text>
  <text x="60" y="372" fill="#8b949e" font-family="Inter, sans-serif" font-size="17">on-chain FX swaps, and global DeFi access</text>

  <!-- Stats boxes -->
  <g transform="translate(60, 410)">
    <rect x="0" y="0" width="155" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="78" y="30" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="22" font-weight="800">$180B+</text>
    <text x="78" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Stablecoin Supply</text>

    <rect x="170" y="0" width="155" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="248" y="30" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="22" font-weight="800">15+</text>
    <text x="248" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Fiat Currencies</text>

    <rect x="340" y="0" width="155" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="418" y="30" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="22" font-weight="800">24/7</text>
    <text x="418" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Always-On FX</text>
  </g>

  <!-- Protocol names -->
  <g transform="translate(60, 520)">
    <text fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="600">USDC · EURC · GBPT · JPYC · XSGD · Curve · Uniswap · Circle · Monerium</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0a0f1e"/>
  <text x="60" y="620" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="600">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="12">Updated March 2026</text>
</svg>