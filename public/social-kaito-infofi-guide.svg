<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="55%" style="stop-color:#0d1028"/>
      <stop offset="100%" style="stop-color:#0a0d1e"/>
    </linearGradient>
    <!-- Brand signature gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Purple InfoFi glow gradient -->
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <!-- Cyan glow -->
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <!-- Kaito circle gradient -->
    <linearGradient id="kaitoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- Bar gradient for mindshare bars -->
    <linearGradient id="barPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="barCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="barIndigo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="barAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <!-- Filter for glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Card clip -->
    <clipPath id="cardClip">
      <rect x="680" y="90" width="460" height="450" rx="16"/>
    </clipPath>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="820" cy="200" rx="260" ry="200" fill="url(#glowPurple)"/>
  <ellipse cx="200" cy="420" rx="220" ry="180" fill="url(#glowCyan)"/>
  <ellipse cx="1050" cy="480" rx="200" ry="160" fill="url(#glowPurple)" opacity="0.5"/>

  <!-- === TOP ACCENT BAR === -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#brandGrad)"/>

  <!-- === LOGO (top-left) === -->
  <circle cx="60" cy="52" r="20" fill="url(#logoGrad)" opacity="0.15"/>
  <circle cx="60" cy="52" r="14" fill="none" stroke="url(#logoGrad)" stroke-width="1.5"/>
  <text x="60" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="11" fill="url(#logoGrad)" letter-spacing="-0.5">0x</text>
  <text x="82" y="58" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="16" fill="#e6edf3" letter-spacing="-0.3">degen0x</text>

  <!-- === LEFT: MAIN CONTENT === -->

  <!-- Category pill -->
  <rect x="56" y="96" width="120" height="26" rx="13" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.35)" stroke-width="1"/>
  <text x="116" y="114" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="12" fill="#a78bfa" letter-spacing="0.5">INFOFI GUIDE</text>

  <!-- Main title -->
  <text x="56" y="175" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="56" fill="#e6edf3" letter-spacing="-2">Kaito AI &amp;</text>
  <text x="56" y="240" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="56" fill="url(#kaitoGrad)" letter-spacing="-2" filter="url(#softGlow)">InfoFi 2026</text>

  <!-- Subtitle -->
  <text x="56" y="286" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="20" fill="#8b949e">Attention is now a tradeable asset.</text>
  <text x="56" y="312" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="20" fill="#8b949e">Polymarket partnership · KAITO token · Mindshare</text>

  <!-- Divider -->
  <rect x="56" y="338" width="48" height="3" rx="1.5" fill="url(#kaitoGrad)"/>

  <!-- === FEATURE PILLS ROW === -->
  <!-- Pill 1: KAITO Token -->
  <rect x="56" y="358" width="148" height="44" rx="10" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="130" y="376" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#a78bfa">KAITO Token</text>
  <text x="130" y="394" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e7681">Governance + utility</text>

  <!-- Pill 2: Polymarket -->
  <rect x="216" y="358" width="148" height="44" rx="10" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="290" y="376" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#22d3ee">Polymarket</text>
  <text x="290" y="394" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e7681">Attention Markets live</text>

  <!-- Pill 3: Mindshare -->
  <rect x="376" y="358" width="148" height="44" rx="10" fill="rgba(79,70,229,0.1)" stroke="rgba(79,70,229,0.25)" stroke-width="1"/>
  <text x="450" y="376" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#818cf8">Mindshare AI</text>
  <text x="450" y="394" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e7681">Attention → alpha signal</text>

  <!-- === BOTTOM URL === -->
  <text x="56" y="552" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="16" fill="#6366f1" filter="url(#glow)">degen0x.com/learn/kaito-ai-infofi-guide</text>

  <!-- === RIGHT: MINDSHARE CHART PANEL === -->
  <!-- Glass card background -->
  <rect x="672" y="82" width="476" height="466" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Panel title -->
  <text x="910" y="128" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="16" fill="#e6edf3">Crypto Mindshare Leaderboard</text>
  <text x="910" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7681">7-day attention score • Kaito AI data</text>

  <!-- Divider under panel title -->
  <line x1="700" y1="162" x2="1120" y2="162" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- === MINDSHARE BARS === -->
  <!-- Row 1: Ethereum -->
  <text x="700" y="197" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#e6edf3">Ethereum</text>
  <text x="1124" y="197" text-anchor="end" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#a78bfa">28.4%</text>
  <rect x="700" y="203" width="396" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="700" y="203" width="320" height="8" rx="4" fill="url(#barPurple)"/>

  <!-- Row 2: Bitcoin -->
  <text x="700" y="235" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#e6edf3">Bitcoin</text>
  <text x="1124" y="235" text-anchor="end" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#22d3ee">24.1%</text>
  <rect x="700" y="241" width="396" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="700" y="241" width="272" height="8" rx="4" fill="url(#barCyan)"/>

  <!-- Row 3: Solana -->
  <text x="700" y="273" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#e6edf3">Solana</text>
  <text x="1124" y="273" text-anchor="end" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#818cf8">18.7%</text>
  <rect x="700" y="279" width="396" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="700" y="279" width="211" height="8" rx="4" fill="url(#barIndigo)"/>

  <!-- Row 4: Kaito / InfoFi — highlighted row -->
  <rect x="688" y="295" width="440" height="34" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="700" y="315" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#a78bfa">Kaito / InfoFi ↑</text>
  <text x="1124" y="315" text-anchor="end" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#a78bfa">11.2%</text>
  <rect x="700" y="319" width="396" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="700" y="319" width="200" height="8" rx="4" fill="url(#barPurple)" filter="url(#glow)"/>
  <!-- Rising arrow label -->
  <rect x="910" y="297" width="80" height="20" rx="6" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="950" y="311" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="11" fill="#4ade80">+312% 7d ↑</text>

  <!-- Row 5: DeFi -->
  <text x="700" y="355" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#e6edf3">DeFi (broad)</text>
  <text x="1124" y="355" text-anchor="end" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#f59e0b">9.3%</text>
  <rect x="700" y="361" width="396" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="700" y="361" width="105" height="8" rx="4" fill="url(#barAmber)"/>

  <!-- Row 6: BTCFi -->
  <text x="700" y="393" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#e6edf3">BTCFi</text>
  <text x="1124" y="393" text-anchor="end" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#4ade80">8.3%</text>
  <rect x="700" y="399" width="396" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="700" y="399" width="94" height="8" rx="4" fill="url(#barGreen)"/>

  <!-- Divider -->
  <line x1="688" y1="422" x2="1128" y2="422" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Bottom tagline in card -->
  <text x="910" y="450" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7681">Mindshare scores correlate with price moves</text>
  <text x="910" y="468" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7681">— Kaito AI quantifies it before it becomes price action</text>

  <!-- "Attention Markets LIVE" badge -->
  <rect x="778" y="486" width="264" height="36" rx="18" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)" stroke-width="1.5"/>
  <circle cx="806" cy="504" r="5" fill="#a78bfa" filter="url(#glow)"/>
  <text x="918" y="509" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="14" fill="#c4b5fd">Attention Markets LIVE</text>

  <!-- === BOTTOM BAR === -->
  <rect x="0" y="596" width="1200" height="34" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="619" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#6e7681">degen0x.com — The Bloomberg Terminal for Crypto</text>
</svg>
