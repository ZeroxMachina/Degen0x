<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a18"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="60%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="indGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Bar chart gradients -->
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <filter id="blob" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="urgencyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient blobs -->
  <circle cx="150" cy="500" r="220" fill="rgba(245,158,11,0.09)" filter="url(#blob)"/>
  <circle cx="900" cy="150" r="200" fill="rgba(79,70,229,0.11)" filter="url(#blob)"/>
  <circle cx="600" cy="400" r="160" fill="rgba(8,145,178,0.07)" filter="url(#blob)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- ── Header ── -->
  <g transform="translate(60, 46)" filter="url(#logoGlow)">
    <circle cx="16" cy="16" r="16" fill="url(#brandGrad)" opacity="0.9"/>
    <text x="16" y="20.5" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="11" font-weight="700" fill="#ffffff">0x</text>
  </g>
  <text x="97" y="66" font-family="Inter, system-ui, sans-serif" font-size="16"
        font-weight="600" fill="#e6edf3">degen0x</text>

  <!-- FOMC Urgency badge -->
  <g filter="url(#urgencyGlow)">
    <rect x="60" y="105" width="140" height="28" rx="14" fill="url(#amberGrad)" opacity="0.92"/>
    <text x="130" y="123.5" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="12" font-weight="700" fill="#1a0a00" letter-spacing="0.3">⚡ FOMC TODAY</text>
  </g>

  <!-- Main title -->
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="48"
        font-weight="900" fill="url(#titleGrad)" letter-spacing="-1.5">Fed speaks today.</text>
  <text x="60" y="248" font-family="Inter, system-ui, sans-serif" font-size="48"
        font-weight="900" fill="url(#titleGrad)" letter-spacing="-1.5">Crypto reacts fast.</text>

  <!-- Subtitle -->
  <text x="60" y="292" font-family="Inter, system-ui, sans-serif" font-size="18"
        font-weight="400" fill="#8b949e">Two tools to watch before and after the decision.</text>

  <!-- Divider -->
  <rect x="60" y="316" width="500" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- Tool 1 card -->
  <rect x="60" y="332" width="234" height="100" rx="14"
        fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <rect x="60" y="332" width="234" height="100" rx="14" fill="url(#indGrad)" opacity="0.04"/>
  <text x="86" y="363" font-family="Inter, system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#a5b4fc">DCA Calculator</text>
  <text x="86" y="381" font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="400" fill="#6e7681" textLength="186">Model buys across volatile weeks</text>
  <text x="86" y="415" font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="600" fill="#6366f1">→ /tools/dca-calculator</text>

  <!-- Tool 2 card -->
  <rect x="308" y="332" width="234" height="100" rx="14"
        fill="rgba(8,145,178,0.1)" stroke="rgba(8,145,178,0.3)" stroke-width="1"/>
  <rect x="308" y="332" width="234" height="100" rx="14" fill="url(#cyanGrad)" opacity="0.04"/>
  <text x="334" y="363" font-family="Inter, system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#67e8f9">Fear &amp; Greed Index</text>
  <text x="334" y="381" font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="400" fill="#6e7681" textLength="188">Where is market sentiment now?</text>
  <text x="334" y="415" font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="600" fill="#06b6d4">→ /tools/fear-greed-index</text>

  <!-- Bottom CTA -->
  <text x="60" y="510" font-family="Inter, system-ui, sans-serif" font-size="15"
        font-weight="600" fill="#6366f1">degen0x.com — no signup, no fees</text>

  <!-- ── Right column: BTC price reaction chart ── -->
  <rect x="640" y="60" width="510" height="500" rx="20"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Chart header -->
  <text x="668" y="100" font-family="Inter, system-ui, sans-serif" font-size="13"
        font-weight="600" fill="#e6edf3">BTC / FOMC Day Returns (historical)</text>
  <text x="668" y="118" font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="400" fill="#6e7681">24h move on Fed decision day</text>

  <!-- Chart grid lines -->
  <line x1="700" y1="150" x2="1120" y2="150" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="700" y1="200" x2="1120" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="700" y1="250" x2="1120" y2="250" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="700" y1="300" x2="1120" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="700" y1="350" x2="1120" y2="350" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="700" y1="400" x2="1120" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Zero line -->
  <line x1="700" y1="300" x2="1120" y2="300" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="660" y="304" text-anchor="end" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="500" fill="#6e7681">0%</text>

  <!-- Y axis labels -->
  <text x="660" y="154" text-anchor="end" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="400" fill="#6e7681">+8%</text>
  <text x="660" y="204" text-anchor="end" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="400" fill="#6e7681">+4%</text>
  <text x="660" y="254" text-anchor="end" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="400" fill="#6e7681">+2%</text>
  <text x="660" y="354" text-anchor="end" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="400" fill="#6e7681">-2%</text>
  <text x="660" y="404" text-anchor="end" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="400" fill="#6e7681">-4%</text>

  <!-- Bars — FOMC dates on x axis -->
  <!-- Bar spacing: 5 bars, each ~64px wide with 22px gap, starting at x=718 -->

  <!-- Sep 2023: +3.1% (positive) — height=(3.1/8)*150=58px, y=300-58=242 -->
  <rect x="718" y="242" width="64" height="58" rx="4" fill="url(#bar1)" opacity="0.85"/>
  <text x="750" y="236" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="700" fill="#22c55e">+3.1%</text>
  <text x="750" y="428" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="500" fill="#6e7681">Sep '23</text>

  <!-- Nov 2023: -2.4% (negative) — height=(2.4/8)*150=45px, y=300 (going down) -->
  <rect x="804" y="300" width="64" height="45" rx="4" fill="url(#bar2)" opacity="0.85"/>
  <text x="836" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="700" fill="#ef4444">-2.4%</text>
  <text x="836" y="428" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="500" fill="#6e7681">Nov '23</text>

  <!-- Mar 2024: +7.2% (positive) — height=(7.2/8)*150=135px, y=300-135=165 -->
  <rect x="890" y="165" width="64" height="135" rx="4" fill="url(#bar3)" opacity="0.85"/>
  <text x="922" y="158" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="700" fill="#22c55e">+7.2%</text>
  <text x="922" y="428" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="500" fill="#6e7681">Mar '24</text>

  <!-- Sep 2025: -3.6% -->
  <rect x="976" y="300" width="64" height="67" rx="4" fill="url(#bar4)" opacity="0.85"/>
  <text x="1008" y="382" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="700" fill="#ef4444">-3.6%</text>
  <text x="1008" y="428" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="500" fill="#6e7681">Sep '25</text>

  <!-- Mar 2026: TODAY — question mark bar with pulsing border -->
  <rect x="1062" y="225" width="64" height="75" rx="4"
        fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1094" y="266" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="22" font-weight="900" fill="rgba(245,158,11,0.7)">?</text>
  <text x="1094" y="428" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="700" fill="#f59e0b">Mar '26</text>
  <text x="1094" y="442" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="9" font-weight="700" fill="#f59e0b">TODAY</text>

  <!-- Chart note -->
  <text x="868" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="400" fill="rgba(107,114,128,0.65)">
    Source: Historical BTC/FOMC reactions · degen0x.com
  </text>

  <!-- Bottom stat strip -->
  <rect x="648" y="488" width="486" height="60" rx="12"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="700" y="512" font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="500" fill="#6e7681">BTC Price</text>
  <text x="700" y="532" font-family="Inter, system-ui, sans-serif" font-size="17"
        font-weight="800" fill="#e6edf3">$71,240</text>

  <rect x="810" y="498" width="1" height="40" fill="rgba(255,255,255,0.06)"/>

  <text x="836" y="512" font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="500" fill="#6e7681">Fear &amp; Greed</text>
  <text x="836" y="532" font-family="Inter, system-ui, sans-serif" font-size="17"
        font-weight="800" fill="#f59e0b">Greed (72)</text>

  <rect x="1000" y="498" width="1" height="40" fill="rgba(255,255,255,0.06)"/>

  <text x="1024" y="512" font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="500" fill="#6e7681">ETH Pectra</text>
  <text x="1024" y="532" font-family="Inter, system-ui, sans-serif" font-size="17"
        font-weight="800" fill="#06b6d4">23 days</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="620" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="12" font-weight="500" fill="rgba(139,149,158,0.65)" letter-spacing="0.4">
    degen0x.com · Free crypto tools for every market event
  </text>
</svg>
