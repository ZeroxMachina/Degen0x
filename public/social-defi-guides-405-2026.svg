<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="roundCard">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" clip-path="url(#roundCard)"/>

  <!-- Decorative background orbs -->
  <circle cx="150" cy="500" r="180" fill="#4f46e5" opacity="0.06" filter="url(#softglow)"/>
  <circle cx="1050" cy="120" r="200" fill="#0891b2" opacity="0.05" filter="url(#softglow)"/>
  <circle cx="600" cy="600" r="150" fill="#d97706" opacity="0.04" filter="url(#softglow)"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand)"/>

  <!-- Logo area -->
  <g transform="translate(48, 36)">
    <circle cx="16" cy="16" r="14" fill="url(#indigo)" opacity="0.9"/>
    <text x="16" y="21" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">0x</text>
    <text x="40" y="22" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.02em">degen0x</text>
  </g>

  <!-- "405 PAGES LIVE" badge top-right -->
  <g transform="translate(1010, 30)">
    <rect x="0" y="0" width="150" height="32" rx="16" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="75" y="21" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">405 PAGES LIVE</text>
  </g>

  <!-- Main title -->
  <text x="48" y="115" fill="url(#brand)" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.03em">8 New DeFi &amp; Blockchain</text>
  <text x="48" y="165" fill="url(#brand)" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.03em">Deep Dives — Live Now</text>

  <!-- Subtitle -->
  <text x="48" y="200" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500">Day 55-59 of launch — the most comprehensive free crypto resource on the internet</text>

  <!-- Guide cards grid: 2 columns x 4 rows -->
  <!-- Left Column -->
  <!-- Card 1: Cross-Chain -->
  <g transform="translate(48, 230)">
    <rect width="540" height="62" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="30" cy="31" r="14" fill="url(#cyan)" opacity="0.2"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">🔗</text>
    <text x="56" y="27" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Cross-Chain Interoperability</text>
    <text x="56" y="46" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">Bridges, ZK proofs, intent-based, chain abstraction</text>
  </g>

  <!-- Card 2: DAO Governance -->
  <g transform="translate(48, 302)">
    <rect width="540" height="62" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="30" cy="31" r="14" fill="url(#purple)" opacity="0.2"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">🏛️</text>
    <text x="56" y="27" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">DAO Governance &amp; Voting</text>
    <text x="56" y="46" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">Token-weighted, quadratic, conviction voting</text>
  </g>

  <!-- Card 3: Sui Blockchain -->
  <g transform="translate(48, 374)">
    <rect width="540" height="62" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="30" cy="31" r="14" fill="url(#indigo)" opacity="0.2"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">🌊</text>
    <text x="56" y="27" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Sui Blockchain Guide</text>
    <text x="56" y="46" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">Move language, parallel execution, zkLogin</text>
  </g>

  <!-- Card 4: Portfolio Rebalancing -->
  <g transform="translate(48, 446)">
    <rect width="540" height="62" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="30" cy="31" r="14" fill="url(#green)" opacity="0.2"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">⚖️</text>
    <text x="56" y="27" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Portfolio Rebalancing Guide</text>
    <text x="56" y="46" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">Threshold, calendar, dynamic rebalancing strategies</text>
  </g>

  <!-- Right Column -->
  <!-- Card 5: Bitcoin Liquid Staking -->
  <g transform="translate(612, 230)">
    <rect width="540" height="62" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="30" cy="31" r="14" fill="url(#amber)" opacity="0.2"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">₿</text>
    <text x="56" y="27" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Bitcoin Liquid Staking Tokens</text>
    <text x="56" y="46" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">lstBTC, Babylon, BTCFi yield unlock</text>
  </g>

  <!-- Card 6: Aerodrome Finance -->
  <g transform="translate(612, 302)">
    <rect width="540" height="62" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="30" cy="31" r="14" fill="url(#indigo)" opacity="0.2"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">🏎️</text>
    <text x="56" y="27" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Aerodrome Finance</text>
    <text x="56" y="46" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">Base's #1 DEX, veAERO flywheel, LP strategies</text>
  </g>

  <!-- Card 7: Karak Network -->
  <g transform="translate(612, 374)">
    <rect width="540" height="62" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="30" cy="31" r="14" fill="url(#purple)" opacity="0.2"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">🛡️</text>
    <text x="56" y="27" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Karak Network</text>
    <text x="56" y="46" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">Restaking beyond Ethereum, multi-chain security</text>
  </g>

  <!-- Card 8: Fluid Protocol -->
  <g transform="translate(612, 446)">
    <rect width="540" height="62" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="30" cy="31" r="14" fill="url(#cyan)" opacity="0.2"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">💧</text>
    <text x="56" y="27" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Fluid Protocol</text>
    <text x="56" y="46" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">Lending + DEX unified, capital-efficient DeFi</text>
  </g>

  <!-- Bottom stats bar -->
  <rect x="0" y="530" width="1200" height="100" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="530" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Stats -->
  <g transform="translate(48, 570)">
    <text fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">405</text>
    <text x="80" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" dy="0">pages live</text>
  </g>

  <g transform="translate(250, 570)">
    <text fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">+71</text>
    <text x="60" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" dy="0">this week</text>
  </g>

  <g transform="translate(450, 570)">
    <text fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">1</text>
    <text x="22" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" dy="0">left in queue</text>
  </g>

  <g transform="translate(670, 570)">
    <text fill="#8b5cf6" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">FOMC T-2</text>
    <text x="145" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" dy="0">Wed Mar 19</text>
  </g>

  <!-- degen0x.com -->
  <text x="1152" y="600" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">degen0x.com</text>

  <!-- Bottom gradient accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brand)"/>
</svg>
