<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Shield decoration -->
  <g transform="translate(970, 250)" fill="none" stroke-width="2">
    <path d="M0 -90 L70 -55 L70 20 C70 70 0 110 0 110 C0 110 -70 70 -70 20 L-70 -55 Z" stroke="#22c55e" stroke-opacity="0.12" fill="rgba(34,197,94,0.03)"/>
    <path d="M0 -60 L45 -35 L45 15 C45 50 0 75 0 75 C0 75 -45 50 -45 15 L-45 -35 Z" stroke="#22c55e" stroke-opacity="0.08" fill="rgba(34,197,94,0.02)"/>
    <!-- Checkmark inside shield -->
    <path d="M-15 0 L-5 10 L15 -10" stroke="#22c55e" stroke-opacity="0.2" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Code decoration (audit code lines) -->
  <g transform="translate(850, 420)" font-family="monospace" font-size="11" opacity="0.15">
    <text x="0" y="0" fill="#22c55e">require(msg.sender == owner)</text>
    <text x="0" y="18" fill="#ef4444">// reentrancy guard</text>
    <text x="0" y="36" fill="#06b6d4">nonReentrant modifier</text>
    <text x="0" y="54" fill="#f59e0b">assert(balance &gt;= amount)</text>
    <text x="0" y="72" fill="#22c55e">emit Withdraw(to, amount)</text>
  </g>

  <!-- Vulnerability indicators -->
  <g transform="translate(870, 140)">
    <rect x="0" y="0" width="100" height="25" rx="5" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="50" y="17" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Access Ctrl</text>

    <rect x="110" y="0" width="100" height="25" rx="5" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
    <text x="160" y="17" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Reentrancy</text>

    <rect x="220" y="0" width="100" height="25" rx="5" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
    <text x="270" y="17" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle">Flash Loan</text>
  </g>

  <!-- degen0x logo text -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#818cf8" opacity="0.9">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="140" width="100" height="30" rx="15" fill="#22c55e" opacity="0.2"/>
  <text x="110" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">Security</text>

  <rect x="170" y="140" width="80" height="30" rx="15" fill="#06b6d4" opacity="0.2"/>
  <text x="210" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" text-anchor="middle">DeFi</text>

  <!-- Title -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">Smart Contract</text>
  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">Security Guide</text>

  <!-- Subtitle -->
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Audits, vulnerabilities &amp; how to evaluate protocol safety</text>

  <!-- Stats -->
  <g transform="translate(60, 400)">
    <rect x="0" y="0" width="160" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">2025 LOSSES</text>
    <text x="80" y="44" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ef4444" text-anchor="middle">$1.09B</text>

    <rect x="175" y="0" width="160" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="255" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">TOP ATTACK</text>
    <text x="255" y="44" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">Access Control</text>

    <rect x="350" y="0" width="160" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="430" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">AUDIT FIRMS</text>
    <text x="430" y="44" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="middle">5 Reviewed</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">degen0x.com</text>
  <text x="1140" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">2026 Guide</text>
</svg>