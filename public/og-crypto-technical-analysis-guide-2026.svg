<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="400" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="400" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="chartArea" x1="0" y1="200" x2="0" y2="380">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="700" y1="120" x2="700" y2="520"/>
    <line x1="800" y1="120" x2="800" y2="520"/>
    <line x1="900" y1="120" x2="900" y2="520"/>
    <line x1="1000" y1="120" x2="1000" y2="520"/>
    <line x1="1100" y1="120" x2="1100" y2="520"/>
    <line x1="700" y1="200" x2="1150" y2="200"/>
    <line x1="700" y1="280" x2="1150" y2="280"/>
    <line x1="700" y1="360" x2="1150" y2="360"/>
    <line x1="700" y1="440" x2="1150" y2="440"/>
  </g>

  <!-- Chart visualization - candlesticks -->
  <g transform="translate(700, 120)">
    <!-- Bullish candle -->
    <line x1="40" y1="100" x2="40" y2="320" stroke="#30363d" stroke-width="1" opacity="0.3"/>
    <rect x="30" y="180" width="20" height="80" rx="2" fill="#22c55e" opacity="0.9"/>
    <line x1="40" y1="140" x2="40" y2="180" stroke="#22c55e" stroke-width="2"/>
    <line x1="40" y1="260" x2="40" y2="300" stroke="#22c55e" stroke-width="2"/>

    <!-- Bearish candle -->
    <rect x="70" y="160" width="20" height="60" rx="2" fill="#ef4444" opacity="0.9"/>
    <line x1="80" y1="130" x2="80" y2="160" stroke="#ef4444" stroke-width="2"/>
    <line x1="80" y1="220" x2="80" y2="270" stroke="#ef4444" stroke-width="2"/>

    <!-- Bullish candle -->
    <rect x="110" y="200" width="20" height="90" rx="2" fill="#22c55e" opacity="0.9"/>
    <line x1="120" y1="170" x2="120" y2="200" stroke="#22c55e" stroke-width="2"/>
    <line x1="120" y1="290" x2="120" y2="320" stroke="#22c55e" stroke-width="2"/>

    <!-- Bullish candle -->
    <rect x="150" y="140" width="20" height="70" rx="2" fill="#22c55e" opacity="0.9"/>
    <line x1="160" y1="110" x2="160" y2="140" stroke="#22c55e" stroke-width="2"/>
    <line x1="160" y1="210" x2="160" y2="250" stroke="#22c55e" stroke-width="2"/>

    <!-- Bearish candle -->
    <rect x="190" y="120" width="20" height="50" rx="2" fill="#ef4444" opacity="0.9"/>
    <line x1="200" y1="90" x2="200" y2="120" stroke="#ef4444" stroke-width="2"/>
    <line x1="200" y1="170" x2="200" y2="210" stroke="#ef4444" stroke-width="2"/>

    <!-- Bullish candle -->
    <rect x="230" y="100" width="20" height="80" rx="2" fill="#22c55e" opacity="0.9"/>
    <line x1="240" y1="60" x2="240" y2="100" stroke="#22c55e" stroke-width="2"/>
    <line x1="240" y1="180" x2="240" y2="220" stroke="#22c55e" stroke-width="2"/>

    <!-- Bearish small -->
    <rect x="270" y="80" width="20" height="40" rx="2" fill="#ef4444" opacity="0.9"/>
    <line x1="280" y1="50" x2="280" y2="80" stroke="#ef4444" stroke-width="2"/>
    <line x1="280" y1="120" x2="280" y2="160" stroke="#ef4444" stroke-width="2"/>

    <!-- Bullish candle -->
    <rect x="310" y="50" width="20" height="60" rx="2" fill="#22c55e" opacity="0.9"/>
    <line x1="320" y1="20" x2="320" y2="50" stroke="#22c55e" stroke-width="2"/>
    <line x1="320" y1="110" x2="320" y2="140" stroke="#22c55e" stroke-width="2"/>

    <!-- Moving average line -->
    <path d="M 40 240 Q 120 230 160 190 Q 200 160 240 140 Q 280 110 320 80" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7" stroke-dasharray="6 3"/>

    <!-- RSI indicator area -->
    <text x="0" y="380" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600">RSI</text>
    <rect x="30" y="370" width="310" height="1" fill="#30363d" opacity="0.5"/>
    <path d="M 40 390 Q 80 370 120 395 Q 160 410 200 380 Q 240 360 280 375 Q 310 385 320 370" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.2"/>
    <text x="16" y="21" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="14" font-weight="800">0x</text>
  </g>
  <text x="100" y="56" fill="#e6edf3" font-family="Inter, sans-serif" font-size="16" font-weight="700" opacity="0.7">degen0x</text>

  <!-- Category badges -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.3"/>
    <text x="40" y="17" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="11" font-weight="700">Trading</text>

    <rect x="90" y="0" width="140" height="26" rx="13" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-opacity="0.3"/>
    <text x="160" y="17" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="11" font-weight="700">Technical Analysis</text>

    <rect x="240" y="0" width="110" height="26" rx="13" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="295" y="17" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="11" font-weight="700">Intermediate</text>
  </g>

  <!-- Title -->
  <text x="60" y="185" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.02em">Crypto Technical</text>
  <text x="60" y="240" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.02em">Analysis Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="285" fill="#8b949e" font-family="Inter, sans-serif" font-size="18">RSI, MACD, Bollinger Bands, Chart Patterns</text>
  <text x="60" y="312" fill="#8b949e" font-family="Inter, sans-serif" font-size="18">&amp; Multi-Indicator Trading Strategies</text>

  <!-- Stats boxes -->
  <g transform="translate(60, 350)">
    <rect x="0" y="0" width="150" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="75" y="30" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="22" font-weight="800">77%</text>
    <text x="75" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">RSI+MACD Win Rate</text>

    <rect x="165" y="0" width="150" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="240" y="30" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="22" font-weight="800">6</text>
    <text x="240" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Essential Indicators</text>

    <rect x="330" y="0" width="150" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="405" y="30" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="22" font-weight="800">8+</text>
    <text x="405" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Chart Patterns</text>
  </g>

  <!-- Indicator names -->
  <g transform="translate(60, 460)">
    <text fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="600">RSI · MACD · Bollinger Bands · Moving Averages · Volume Profile · Fibonacci</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0a0f1e"/>
  <text x="60" y="620" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="600">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="12">Updated March 2026</text>
</svg>