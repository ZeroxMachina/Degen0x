<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="l3grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <ellipse cx="600" cy="300" rx="400" ry="250" fill="#0891b2" opacity="0.04"/>
  <ellipse cx="200" cy="500" rx="250" ry="200" fill="#4f46e5" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="150" width="105" height="32" rx="6" fill="#06b6d420" stroke="#06b6d4" stroke-width="1"/>
  <text x="112" y="171" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" text-anchor="middle">Infrastructure</text>

  <rect x="178" y="150" width="75" height="32" rx="6" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="1"/>
  <text x="215" y="171" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">Scaling</text>

  <!-- Main title -->
  <text x="60" y="255" font-family="Inter, system-ui, sans-serif" font-size="50" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Layer 3 Chains</text>
  <text x="60" y="315" font-family="Inter, system-ui, sans-serif" font-size="50" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="365" font-family="Inter, system-ui, sans-serif" font-size="21" fill="#8b949e">App-specific chains built on top of L2s for ultra-low costs</text>

  <!-- Layer stack visualization -->
  <g transform="translate(730, 140)">
    <!-- L1 -->
    <rect x="0" y="280" width="380" height="70" rx="12" fill="rgba(99, 102, 241, 0.15)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="190" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#6366f1" text-anchor="middle">Layer 1</text>
    <text x="190" y="330" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Ethereum · Security &amp; Settlement</text>

    <!-- L2 -->
    <rect x="30" y="190" width="320" height="70" rx="12" fill="rgba(8, 145, 178, 0.15)" stroke="#0891b2" stroke-width="1.5"/>
    <text x="190" y="220" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0891b2" text-anchor="middle">Layer 2</text>
    <text x="190" y="240" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Arbitrum · Optimism · Base</text>

    <!-- L3 -->
    <rect x="60" y="100" width="260" height="70" rx="12" fill="rgba(217, 119, 6, 0.15)" stroke="#d97706" stroke-width="1.5"/>
    <text x="190" y="130" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#d97706" text-anchor="middle">Layer 3</text>
    <text x="190" y="150" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">App-Specific · Ultra-Low Cost</text>

    <!-- Connecting lines -->
    <line x1="190" y1="170" x2="190" y2="190" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="190" y1="260" x2="190" y2="280" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="4,4"/>
  </g>

  <!-- Key stats -->
  <rect x="60" y="410" width="540" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="120" y="450" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#22c55e" text-anchor="middle">&lt;$0.001</text>
  <text x="120" y="475" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">per tx</text>
  <text x="300" y="450" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#0891b2" text-anchor="middle">100K+</text>
  <text x="300" y="475" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">TPS</text>
  <text x="480" y="450" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#8b5cf6" text-anchor="middle">Custom</text>
  <text x="480" y="475" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Execution</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">2026 Guide</text>
</svg>