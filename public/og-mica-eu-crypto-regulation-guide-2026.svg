<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="euGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="180" fill="#58a6ff" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="420" r="120" fill="#4f46e5" opacity="0.05" filter="url(#glow)"/>
  <circle cx="180" cy="500" r="100" fill="#0891b2" opacity="0.04" filter="url(#glow)"/>

  <!-- EU Stars decorative element -->
  <g transform="translate(920, 120)" opacity="0.12">
    <circle cx="60" cy="0" r="6" fill="#58a6ff"/>
    <circle cx="90" cy="17" r="6" fill="#58a6ff"/>
    <circle cx="100" cy="52" r="6" fill="#58a6ff"/>
    <circle cx="90" cy="87" r="6" fill="#58a6ff"/>
    <circle cx="60" cy="104" r="6" fill="#58a6ff"/>
    <circle cx="30" cy="87" r="6" fill="#58a6ff"/>
    <circle cx="20" cy="52" r="6" fill="#58a6ff"/>
    <circle cx="30" cy="17" r="6" fill="#58a6ff"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(60, 120)">
    <path d="M30 0 L60 15 L60 40 C60 65 30 80 30 80 C30 80 0 65 0 40 L0 15 Z" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.6"/>
    <path d="M20 35 L28 43 L42 28" fill="none" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>

  <!-- Category badge -->
  <rect x="60" y="230" width="120" height="30" rx="15" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="120" y="250" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#58a6ff" text-anchor="middle">REGULATION</text>

  <!-- Title -->
  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">MiCA: EU Crypto</text>
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Regulation Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="410" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Stablecoin rules, CASP licensing, USDT impact &amp;</text>
  <text x="60" y="438" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">compliance requirements explained</text>

  <!-- Timeline decorative element -->
  <g transform="translate(60, 480)" opacity="0.5">
    <line x1="0" y1="10" x2="400" y2="10" stroke="#30363d" stroke-width="2"/>
    <circle cx="0" cy="10" r="5" fill="#22c55e"/>
    <circle cx="133" cy="10" r="5" fill="#22c55e"/>
    <circle cx="266" cy="10" r="5" fill="#f59e0b"/>
    <circle cx="400" cy="10" r="5" fill="#58a6ff"/>
    <text x="0" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Jun 2024</text>
    <text x="113" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Dec 2024</text>
    <text x="246" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Jul 2026</text>
    <text x="375" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Future</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0d1117" opacity="0.6"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="612" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Updated March 2026</text>
</svg>