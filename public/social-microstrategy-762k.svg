<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="btcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- BTC-themed glow -->
  <circle cx="1000" cy="200" r="250" fill="#f59e0b" opacity="0.04"/>
  <circle cx="150" cy="450" r="180" fill="#6366f1" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentBar)"/>

  <!-- Badge -->
  <rect x="60" y="40" rx="14" ry="14" width="180" height="28" fill="#f59e0b" opacity="0.15"/>
  <rect x="60" y="40" rx="14" ry="14" width="180" height="28" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <text x="82" y="59" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fbbf24" letter-spacing="0.1em">WHALE ACCUMULATION</text>

  <!-- degen0x logo -->
  <text x="1080" y="58" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="url(#brandGrad)" text-anchor="end">degen0x</text>

  <!-- Main Title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">MicroStrategy Now Holds</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="url(#btcGrad)" letter-spacing="-0.02em" filter="url(#glow)">762,099 BTC</text>

  <!-- Subtitle -->
  <text x="60" y="245" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">The largest corporate Bitcoin treasury in history — $57.69 billion</text>

  <!-- Stats row -->
  <!-- Card: Latest Purchase -->
  <rect x="60" y="280" rx="16" ry="16" width="340" height="120" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="312" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.08em">LATEST PURCHASE</text>
  <text x="80" y="348" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#e6edf3">1,031 BTC</text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">at $74,326 avg — March 24, 2026</text>

  <!-- Card: Total Value -->
  <rect x="420" y="280" rx="16" ry="16" width="340" height="120" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="440" y="312" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.08em">TOTAL VALUE</text>
  <text x="440" y="348" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e">$57.69B</text>
  <text x="440" y="380" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">avg cost basis: $75,694 per BTC</text>

  <!-- Card: Market Context -->
  <rect x="780" y="280" rx="16" ry="16" width="360" height="120" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="800" y="312" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.08em">BOUGHT DURING</text>
  <text x="800" y="348" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#ef4444">Fear &amp; Greed: 8</text>
  <text x="800" y="380" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">Day 46 consecutive Extreme Fear</text>

  <!-- Accumulation timeline bar -->
  <text x="60" y="440" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BTC ACCUMULATION TRAJECTORY</text>

  <!-- Progress bar background -->
  <rect x="60" y="455" rx="8" ry="8" width="1080" height="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Progress bar fill (762,099 / 1,000,000 target = 76.2%) -->
  <rect x="60" y="455" rx="8" ry="8" width="822" height="16" fill="url(#btcGrad)" opacity="0.8"/>

  <!-- Milestone markers -->
  <line x1="384" y1="450" x2="384" y2="476" stroke="#8b949e" stroke-width="1" opacity="0.4"/>
  <text x="384" y="490" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">300K</text>

  <line x1="600" y1="450" x2="600" y2="476" stroke="#8b949e" stroke-width="1" opacity="0.4"/>
  <text x="600" y="490" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">500K</text>

  <line x1="882" y1="450" x2="882" y2="476" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="882" y="490" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">762K ★</text>

  <line x1="1140" y1="450" x2="1140" y2="476" stroke="#8b949e" stroke-width="1" opacity="0.4"/>
  <text x="1140" y="490" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">1M</text>

  <!-- Key insight -->
  <rect x="60" y="510" rx="12" ry="12" width="700" height="40" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="80" y="536" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24">More BTC than any country except the United States</text>

  <!-- CTA -->
  <text x="60" y="585" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Track whale accumulation live:</text>
  <text x="310" y="585" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#06b6d4">degen0x.com/tools/whale-tracker</text>

  <!-- Price chips -->
  <rect x="60" y="598" rx="10" ry="10" width="110" height="22" fill="rgba(34,197,94,0.1)"/>
  <text x="115" y="614" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#22c55e" text-anchor="middle">BTC $71K +3.8%</text>

  <rect x="180" y="598" rx="10" ry="10" width="140" height="22" fill="rgba(239,68,68,0.1)"/>
  <text x="250" y="614" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444" text-anchor="middle">F&amp;G: 8 Extreme Fear</text>

  <!-- Footer -->
  <text x="1140" y="614" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681" text-anchor="end">degen0x.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentBar)"/>
</svg>
