  <text x="910" y="330" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8b949e">Revenue Share</text>
  <text x="840" y="385" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#22c55e">65%</text>
  <text x="840" y="415" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#8b949e">To liquidity providers</text>

  <text x="1140" y="610" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#8b949e" text-anchor="end">degen0x.com</text>

  <line x1="60" y1="625" x2="1140" y2="625" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
</svg>
