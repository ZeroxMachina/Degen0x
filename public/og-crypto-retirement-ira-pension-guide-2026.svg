<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad2" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="glowGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative glow -->
  <circle cx="1000" cy="300" r="250" fill="url(#glowGrad2)" opacity="0.5"/>

  <!-- Growth chart decoration -->
  <g transform="translate(750, 140)" opacity="0.2">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#30363d" stroke-width="1"/>
    <line x1="0" y1="300" x2="380" y2="300" stroke="#30363d" stroke-width="1"/>
    <line x1="0" y1="200" x2="380" y2="200" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="100" x2="380" y2="100" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4"/>
  </g>
  <g transform="translate(750, 140)" opacity="0.4">
    <!-- Growth line (retirement savings growth curve) -->
    <path d="M0,280 C40,275 80,265 120,250 C160,230 200,200 240,160 C280,110 320,60 380,20" fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <path d="M0,280 C40,275 80,265 120,250 C160,230 200,200 240,160 C280,110 320,60 380,20 L380,300 L0,300 Z" fill="url(#chartGrad)"/>
  </g>

  <!-- Year markers -->
  <g transform="translate(750, 455)" opacity="0.25">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">2026</text>
    <text x="120" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">2036</text>
    <text x="240" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">2046</text>
    <text x="360" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">2056</text>
  </g>

  <!-- Logo area -->
  <g transform="translate(60, 50)">
    <circle cx="18" cy="18" r="18" fill="url(#iconGrad2)" filter="url(#glow2)"/>
    <text x="18" y="24" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="white" text-anchor="middle">0x</text>
  </g>
  <text x="105" y="70" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3" letter-spacing="-0.02em">degen0x</text>

  <!-- Category badge -->
  <g transform="translate(60, 120)">
    <rect width="105" height="28" rx="14" fill="#22c55e" opacity="0.12"/>
    <rect width="105" height="28" rx="14" fill="none" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="52" y="19" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle" letter-spacing="0.05em">INVESTING</text>
  </g>

  <!-- Title -->
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#titleGrad2)" letter-spacing="-0.03em">Crypto IRA Guide</text>
  <text x="60" y="275" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="700" fill="#8b949e" letter-spacing="-0.02em">Bitcoin &amp; Crypto</text>
  <text x="60" y="330" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="700" fill="#8b949e" letter-spacing="-0.02em">Retirement Accounts</text>

  <!-- Subtitle -->
  <text x="60" y="390" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#6e7681">Tax-advantaged crypto investing with IRA,</text>
  <text x="60" y="420" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#6e7681">401(k), and pension fund strategies</text>

  <!-- Key stats -->
  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="140" height="56" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="70" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">IRA LIMIT</text>
    <text x="70" y="46" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="middle">$7,000</text>

    <rect x="160" y="0" width="140" height="56" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="230" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">401(K) LIMIT</text>
    <text x="230" y="46" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#06b6d4" text-anchor="middle">$23,500</text>

    <rect x="320" y="0" width="140" height="56" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="390" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">PROVIDERS</text>
    <text x="390" y="46" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f59e0b" text-anchor="middle">5+</text>
  </g>

  <!-- Bottom bar -->
  <rect y="606" width="1200" height="24" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="622" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="622" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">2026</text>
</svg>