<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="300" r="250" fill="#f59e0b" opacity="0.04"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="2">degen0x</text>

  <rect x="60" y="140" width="65" height="28" rx="14" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1"/>
  <text x="92" y="159" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Tool</text>

  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-1">Gas Tracker</text>
  <text x="60" y="305" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">Real-Time Ethereum Gas Prices &amp; Fee Estimates</text>

  <!-- Gas price display -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="160" height="90" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e" letter-spacing="1">🟢 LOW</text>
    <text x="20" y="65" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#22c55e">12</text>
    <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">gwei</text>
  </g>
  <g transform="translate(240, 360)">
    <rect x="0" y="0" width="160" height="90" rx="12" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f59e0b" letter-spacing="1">🟡 AVG</text>
    <text x="20" y="65" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#f59e0b">18</text>
    <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">gwei</text>
  </g>
  <g transform="translate(420, 360)">
    <rect x="0" y="0" width="160" height="90" rx="12" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ef4444" letter-spacing="1">🔴 HIGH</text>
    <text x="20" y="65" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ef4444">32</text>
    <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">gwei</text>
  </g>

  <!-- Mini gas chart -->
  <g transform="translate(700, 180)">
    <rect x="0" y="0" width="420" height="260" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">24H GAS TREND</text>
    <polyline points="40,200 80,180 120,150 160,190 200,140 240,120 280,160 320,110 360,130 380,100"
            fill="none" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="40" y1="220" x2="400" y2="220" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </g>

  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Free Tool</text>
</svg>