    <text x="340" y="121" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#14F195">6.20%</text>

    <text x="0" y="155" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">STKESOL</text>
    <rect x="110" y="142" rx="4" ry="4" width="230" height="18" fill="url(#barGrad5)"/>
    <text x="350" y="156" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#14F195">6.50%</text>
