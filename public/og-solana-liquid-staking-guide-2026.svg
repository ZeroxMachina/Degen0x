    <rect x="250" y="100" rx="12" ry="12" width="230" height="80" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <text x="270" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Top LSTs</text>
    <text x="270" y="160" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#F5A623">5+</text>
