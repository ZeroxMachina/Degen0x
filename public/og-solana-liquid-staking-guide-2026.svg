    <linearGradient id="barGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#9945FF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D18C"/>
      <stop offset="100%" stop-color="#00D18C" stop-opacity="0.6"/>
