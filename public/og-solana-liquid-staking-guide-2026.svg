    <text x="20" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Best APY</text>
    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4">8.5%</text>

