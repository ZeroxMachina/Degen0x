    <text x="0" y="85" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Sanctum INF</text>
    <rect x="110" y="72" rx="4" ry="4" width="300" height="18" fill="url(#barGrad3)"/>
