<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="200" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="420" r="140" fill="#06b6d4" opacity="0.05" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="120" fill="#d97706" opacity="0.04" filter="url(#glow)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Rollup layer diagram -->
  <g transform="translate(820, 120)">
    <!-- Layer boxes stacked -->
    <rect x="0" y="0" width="280" height="50" rx="8" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Execution Layer</text>

    <rect x="0" y="65" width="280" height="50" rx="8" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="140" y="95" text-anchor="middle" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Data Availability</text>

    <rect x="0" y="130" width="280" height="50" rx="8" fill="#d97706" opacity="0.2" stroke="#d97706" stroke-width="1.5"/>
    <text x="140" y="160" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Settlement</text>

    <rect x="0" y="195" width="280" height="50" rx="8" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.5"/>
    <text x="140" y="225" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Sequencing</text>

    <!-- Connecting arrows -->
    <line x1="140" y1="52" x2="140" y2="63" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <line x1="140" y1="117" x2="140" y2="128" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <line x1="140" y1="182" x2="140" y2="193" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Badge -->
  <rect x="60" y="80" width="130" height="30" rx="15" fill="#6366f1" opacity="0.3"/>
  <text x="125" y="100" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Infrastructure</text>

  <!-- Title -->
  <text x="60" y="170" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" letter-spacing="-1">Rollup-as-a-Service</text>
  <text x="60" y="225" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" letter-spacing="-1">(RaaS) Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="275" fill="#8b949e" font-family="system-ui, sans-serif" font-size="18">Conduit vs Caldera vs Gelato vs AltLayer</text>

  <!-- Provider pills -->
  <g transform="translate(60, 310)">
    <rect x="0" y="0" width="110" height="36" rx="18" fill="#161b22" stroke="#6366f1" stroke-width="1.5"/>
    <text x="55" y="23" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Conduit</text>

    <rect x="125" y="0" width="110" height="36" rx="18" fill="#161b22" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="180" y="23" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Caldera</text>

    <rect x="250" y="0" width="110" height="36" rx="18" fill="#161b22" stroke="#d97706" stroke-width="1.5"/>
    <text x="305" y="23" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Gelato</text>

    <rect x="375" y="0" width="110" height="36" rx="18" fill="#161b22" stroke="#22c55e" stroke-width="1.5"/>
    <text x="430" y="23" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14" font-weight="600">AltLayer</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(60, 400)">
    <text x="0" y="0" fill="#6366f1" font-family="system-ui, sans-serif" font-size="32" font-weight="800">100+</text>
    <text x="0" y="24" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13">Live Rollups</text>

    <text x="180" y="0" fill="#06b6d4" font-family="system-ui, sans-serif" font-size="32" font-weight="800">$354M</text>
    <text x="180" y="24" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13">Market by 2032</text>

    <text x="380" y="0" fill="#22c55e" font-family="system-ui, sans-serif" font-size="32" font-weight="800">20.5%</text>
    <text x="380" y="24" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13">CAGR</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#0d1117" opacity="0.8"/>
  <text x="60" y="600" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">degen0x</text>
  <text x="160" y="600" fill="#8b949e" font-family="system-ui, sans-serif" font-size="16">.com</text>
  <text x="1140" y="600" text-anchor="end" fill="#8b949e" font-family="system-ui, sans-serif" font-size="14">March 2026 · 12 min read</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>