  <text x="80" y="408" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ Batch transactions</text>
  <text x="80" y="430" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ Gasless UX</text>
  <text x="80" y="452" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ Social recovery</text>

  <!-- Card 2: EIP-7691 -->
  <rect x="430" y="280" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="430" y="280" width="340" height="4" rx="2" fill="#06b6d4"/>
  <text x="450" y="318" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" letter-spacing="0.05em">EIP-7691</text>
  <text x="450" y="348" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#e6edf3">2x Blob Throughput</text>
  <text x="450" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">L2 fees drop another 50%+</text>
  <text x="450" y="408" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ Base, Arbitrum, Optimism</text>
  <text x="450" y="430" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ Sub-cent transactions</text>
  <text x="450" y="452" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ High-frequency DeFi</text>

  <!-- Card 3: EIP-7251 -->
  <rect x="800" y="280" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="800" y="280" width="340" height="4" rx="2" fill="#f59e0b"/>
  <text x="820" y="318" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" letter-spacing="0.05em">EIP-7251</text>
  <text x="820" y="348" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#e6edf3">2,048 ETH Max Stake</text>
  <text x="820" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Validator consolidation unlocked</text>
  <text x="820" y="408" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ Institutional staking simplified</text>
  <text x="820" y="430" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ Higher net yields</text>
  <text x="820" y="452" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">+ Path to single-slot finality</text>

  <!-- Market context bar -->
  <rect x="60" y="510" width="1080" height="56" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="90" y="544" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">MARKET:</text>
  <text x="170" y="544" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">ETH $2,133</text>
  <text x="290" y="544" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ef4444">-60% from high</text>
  <text x="420" y="544" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">|</text>
  <text x="445" y="544" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">F&amp;G: 8</text>
  <text x="520" y="544" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ef4444">55-day streak</text>
  <text x="640" y="544" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">|</text>
  <text x="665" y="544" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Biggest upgrade in 2 years. Lowest sentiment in 2 years.</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="url(#brandGrad)">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">degen0x.com/learn/ethereum-pectra-upgrade-guide</text>
</svg>
