<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#0a1028"/>
      <stop offset="100%" style="stop-color:#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="ethGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#627eea"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="countdownGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundCard1"><rect x="60" y="280" width="340" height="200" rx="16"/></clipPath>
    <clipPath id="roundCard2"><rect x="430" y="280" width="340" height="200" rx="16"/></clipPath>
    <clipPath id="roundCard3"><rect x="800" y="280" width="340" height="200" rx="16"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#4f46e5" opacity="0.04"/>
  <circle cx="150" cy="500" r="180" fill="#0891b2" opacity="0.03"/>
  <circle cx="600" cy="50" r="120" fill="#d97706" opacity="0.03"/>

  <!-- Logo text -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="url(#brandGrad)">degen0x</text>

  <!-- Countdown badge -->
  <rect x="920" y="30" width="220" height="44" rx="22" fill="url(#countdownGrad)" opacity="0.9"/>
  <text x="1030" y="58" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#080d1c" text-anchor="middle">5 DAYS TO MAINNET</text>

  <!-- Ethereum diamond icon (simplified) -->
  <g transform="translate(60, 90)" filter="url(#softGlow)">
    <polygon points="30,0 60,30 30,55 0,30" fill="url(#ethGrad)" opacity="0.8"/>
    <polygon points="30,20 60,30 30,55 0,30" fill="#4f46e5" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="140" y="120" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Pectra Upgrade</text>
  <text x="140" y="170" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="url(#brandGrad)" letter-spacing="-0.01em">Ethereum's Biggest Since The Merge</text>

