  <text x="60" y="230" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">April 10, 2026 — Smart accounts, doubled L2 capacity, validator consolidation</text>

  <!-- Three feature cards with glass effect -->
  <!-- Card 1: EIP-7702 -->
  <rect x="60" y="280" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="60" y="280" width="340" height="4" rx="2" fill="#6366f1"/>
  <text x="80" y="318" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1" letter-spacing="0.05em">EIP-7702</text>
  <text x="80" y="348" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#e6edf3">Smart Accounts</text>
