<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative orbs -->
  <circle cx="950" cy="180" r="200" fill="#6366f1" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="200" cy="480" r="150" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Copy trading flow diagram (right side) -->
  <!-- Leader trader card -->
  <rect x="810" y="150" width="260" height="80" rx="12" fill="#161b22" stroke="#6366f140" stroke-width="1"/>
  <circle cx="848" cy="190" r="20" fill="#6366f130" stroke="#818cf8" stroke-width="2"/>
  <text x="848" y="196" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">T</text>
  <text x="886" y="182" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Top Trader</text>
  <text x="886" y="202" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">+184% PnL (90d)</text>
  <rect x="1000" y="172" width="56" height="24" rx="6" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
  <text x="1028" y="189" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Copy</text>

  <!-- Arrow -->
  <line x1="940" y1="240" x2="940" y2="280" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="932,276 940,290 948,276" fill="#8b949e"/>

  <!-- Follower cards -->
  <rect x="810" y="300" width="120" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="838" y="330" r="12" fill="#06b6d430" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="838" y="335" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Y</text>
  <text x="860" y="326" fill="#c9d1d9" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">You</text>
  <text x="860" y="342" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">+184%</text>

  <rect x="950" y="300" width="120" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="978" y="330" r="12" fill="#f9731630" stroke="#f97316" stroke-width="1.5"/>
  <text x="978" y="335" text-anchor="middle" fill="#f97316" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">A</text>
  <text x="1000" y="326" fill="#c9d1d9" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Alice</text>
  <text x="1000" y="342" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">+184%</text>

  <!-- degen0x branding -->
  <text x="70" y="80" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" letter-spacing="0.08em">degen0x</text>

  <!-- Title -->
  <text x="70" y="220" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em">Crypto Copy</text>
  <text x="70" y="285" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em">Trading</text>

  <!-- Subtitle -->
  <text x="70" y="340" fill="#c9d1d9" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400">Follow top traders and mirror their strategies.</text>
  <text x="70" y="370" fill="#c9d1d9" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400">Leaderboards, PnL stats, and risk scores.</text>

  <!-- Tags -->
  <rect x="70" y="420" width="80" height="28" rx="6" fill="#6366f115" stroke="#6366f140" stroke-width="1"/>
  <text x="110" y="439" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Trading</text>
  <rect x="162" y="420" width="80" height="28" rx="6" fill="#06b6d415" stroke="#06b6d440" stroke-width="1"/>
  <text x="202" y="439" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Social</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#161b22" opacity="0.8"/>
  <text x="70" y="612" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14">degen0x.com/copy-trading</text>
  <text x="1130" y="612" text-anchor="end" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14">Free Crypto Tools</text>
</svg>