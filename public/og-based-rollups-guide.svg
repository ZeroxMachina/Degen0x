<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="ethGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="1000" cy="200" r="200" fill="#6366f1" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="140" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="900" cy="500" r="120" fill="#22c55e" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Based Rollup Flow Visualization -->
  <!-- User node -->
  <circle cx="860" cy="145" r="28" fill="#161b22" stroke="#8b949e50" stroke-width="1.5"/>
  <text x="860" y="141" text-anchor="middle" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="20">👤</text>
  <text x="860" y="168" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">USER</text>

  <!-- Arrow down to L1 Validators -->
  <line x1="860" y1="175" x2="860" y2="210" stroke="#6366f150" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="855,208 860,218 865,208" fill="#6366f170"/>

  <!-- L1 Validators block -->
  <rect x="790" y="220" width="140" height="56" rx="12" fill="#6366f112" stroke="#6366f140" stroke-width="1.5"/>
  <text x="860" y="245" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">L1 VALIDATORS</text>
  <text x="860" y="264" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">Ethereum Proposers</text>

  <!-- Arrow to preconf (fast path) -->
  <line x1="930" y1="248" x2="1000" y2="170" stroke="#22c55e50" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="996,175 1006,167 999,178" fill="#22c55e70"/>

  <!-- Preconf commitment -->
  <rect x="1000" y="130" width="140" height="55" rx="10" fill="#22c55e10" stroke="#22c55e40" stroke-width="1.5"/>
  <text x="1070" y="152" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">PRECONFIRMATION</text>
  <text x="1070" y="172" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800">~100ms</text>

  <!-- Arrow down to L1 Block -->
  <line x1="860" y1="276" x2="860" y2="320" stroke="#6366f150" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="855,318 860,328 865,318" fill="#6366f170"/>

  <!-- L1 Block -->
  <rect x="790" y="330" width="140" height="55" rx="12" fill="#06b6d412" stroke="#06b6d440" stroke-width="1.5"/>
  <text x="860" y="354" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">ETHEREUM BLOCK</text>
  <text x="860" y="374" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">L1 + L2 settled together</text>

  <!-- Arrow down to finalization -->
  <line x1="860" y1="385" x2="860" y2="420" stroke="#06b6d450" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="855,418 860,428 865,418" fill="#06b6d470"/>

  <!-- Final settlement -->
  <rect x="790" y="430" width="140" height="48" rx="10" fill="#22c55e10" stroke="#22c55e35" stroke-width="1.5"/>
  <text x="860" y="452" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">FINALIZED</text>
  <text x="860" y="469" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">Full L1 Security</text>

  <!-- Comparison cards (right side) -->
  <!-- Traditional -->
  <rect x="1000" y="230" width="155" height="65" rx="10" fill="#161b22" stroke="#f8514930" stroke-width="1"/>
  <text x="1077" y="253" text-anchor="middle" fill="#f85149" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">TRADITIONAL ROLLUP</text>
  <text x="1077" y="275" text-anchor="middle" fill="#f85149" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">Centralized</text>
  <text x="1077" y="290" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9">Single sequencer</text>

  <!-- Based -->
  <rect x="1000" y="310" width="155" height="65" rx="10" fill="#161b22" stroke="#22c55e30" stroke-width="1"/>
  <text x="1077" y="333" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">BASED ROLLUP</text>
  <text x="1077" y="355" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">Decentralized</text>
  <text x="1077" y="370" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9">L1 validator sequencing</text>

  <!-- Key metrics row -->
  <rect x="1000" y="395" width="155" height="85" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="1077" y="418" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">KEY EIP</text>
  <text x="1077" y="440" text-anchor="middle" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800">EIP-7917</text>
  <text x="1077" y="458" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9">Proposer Lookahead</text>
  <text x="1077" y="473" text-anchor="middle" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="9">Leading impl: Taiko</text>

  <!-- Logo area -->
  <text x="60" y="62" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" letter-spacing="-0.02em">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="120" width="85" height="28" rx="6" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="102" y="139" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Ethereum</text>

  <rect x="155" y="120" width="80" height="28" rx="6" fill="#8b5cf620" stroke="#8b5cf640" stroke-width="1"/>
  <text x="195" y="139" text-anchor="middle" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Advanced</text>

  <rect x="245" y="120" width="55" height="28" rx="6" fill="#0ea5e920" stroke="#0ea5e940" stroke-width="1"/>
  <text x="272" y="139" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Learn</text>

  <!-- Title -->
  <text x="60" y="215" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Based Rollups &amp;</text>
  <text x="60" y="272" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Preconfirmations</text>

  <!-- Subtitle -->
  <text x="60" y="320" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">How Ethereum validators replace centralized</text>
  <text x="60" y="348" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">sequencers with 100ms finality &amp; full L1 security</text>

  <!-- Feature pills -->
  <rect x="60" y="385" width="130" height="32" rx="16" fill="#6366f115" stroke="#6366f135" stroke-width="1"/>
  <text x="125" y="406" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">L1 Sequencing</text>

  <rect x="205" y="385" width="100" height="32" rx="16" fill="#22c55e15" stroke="#22c55e35" stroke-width="1"/>
  <text x="255" y="406" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">~100ms</text>

  <rect x="320" y="385" width="160" height="32" rx="16" fill="#06b6d415" stroke="#06b6d435" stroke-width="1"/>
  <text x="400" y="406" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">No Sequencer</text>

  <rect x="495" y="385" width="120" height="32" rx="16" fill="#8b5cf615" stroke="#8b5cf635" stroke-width="1"/>
  <text x="555" y="406" text-anchor="middle" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Composable</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0f1e"/>
  <rect x="0" y="590" width="1200" height="1" fill="#30363d"/>
  <text x="60" y="616" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">degen0x.com</text>
  <text x="1140" y="616" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400">Compare · Review · DYOR</text>
</svg>