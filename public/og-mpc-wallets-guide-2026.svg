<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-mpc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent-mpc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="mpc-indigo-cyan" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow-mpc">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-mpc)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-mpc)"/>

  <!-- Background decorative circles -->
  <circle cx="1050" cy="100" r="140" fill="#6366f1" opacity="0.025"/>
  <circle cx="1100" cy="200" r="95" fill="#06b6d4" opacity="0.03"/>
  <circle cx="980" cy="450" r="125" fill="#6366f1" opacity="0.028"/>

  <!-- Key shards / distributed nodes diagram -->
  <g opacity="0.7" filter="url(#glow-mpc)">
    <!-- Central lock icon -->
    <circle cx="1050" cy="210" r="16" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <rect x="1044" y="205" width="12" height="10" rx="1" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="1050" y1="215" x2="1050" y2="225" stroke="#06b6d4" stroke-width="1.5"/>

    <!-- Shard 1 - Top Left -->
    <polygon points="980,150 995,145 1000,160" fill="#6366f1"/>
    <line x1="1050" y1="210" x2="990" y2="152" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>

    <!-- Shard 2 - Top Right -->
    <polygon points="1100,140 1120,145 1110,160" fill="#06b6d4"/>
    <line x1="1050" y1="210" x2="1110" y2="148" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>

    <!-- Shard 3 - Bottom Left -->
    <polygon points="975,270 995,265 985,280" fill="#6366f1"/>
    <line x1="1050" y1="210" x2="985" y2="272" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>

    <!-- Shard 4 - Bottom Right -->
    <polygon points="1110,275 1125,270 1115,285" fill="#06b6d4"/>
    <line x1="1050" y1="210" x2="1115" y2="277" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Distributed nodes (multi-party) -->
  <g opacity="0.5" filter="url(#glow-mpc)">
    <circle cx="1000" cy="420" r="6" fill="#6366f1"/>
    <circle cx="1050" cy="410" r="6" fill="#06b6d4"/>
    <circle cx="1100" cy="420" r="6" fill="#6366f1"/>
    <circle cx="1025" cy="465" r="6" fill="#06b6d4"/>
    <circle cx="1075" cy="465" r="6" fill="#6366f1"/>

    <!-- Connection lines -->
    <line x1="1000" y1="420" x2="1050" y2="410" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <line x1="1050" y1="410" x2="1100" y2="420" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <line x1="1025" y1="465" x2="1075" y2="465" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Logo: degen0x top-left -->
  <g>
    <circle cx="60" cy="45" r="30" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <text x="60" y="52" fill="#0891b2" font-family="Inter, sans-serif" font-size="24" font-weight="700" text-anchor="middle">0x</text>
    <text x="110" y="52" fill="#ffffff" font-family="Inter, sans-serif" font-size="16" font-weight="700">degen0x</text>
  </g>

  <!-- Category badges -->
  <g>
    <!-- Security badge -->
    <rect x="60" y="100" width="90" height="32" rx="6" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="105" y="122" fill="#c7d2fe" font-family="Inter, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Security</text>

    <!-- Wallets badge -->
    <rect x="170" y="100" width="90" height="32" rx="6" fill="rgba(6, 182, 212, 0.2)" stroke="#06b6d4" stroke-width="1"/>
    <text x="215" y="122" fill="#06d6d6" font-family="Inter, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Wallets</text>
  </g>

  <!-- Main title -->
  <text x="60" y="220" fill="#ffffff" font-family="Inter, sans-serif" font-size="56" font-weight="700">MPC Wallets</text>
  <text x="60" y="280" fill="#ffffff" font-family="Inter, sans-serif" font-size="48" font-weight="700">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="330" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Multi-Party Computation for Crypto Security</text>

  <!-- Stats cards -->
  <g>
    <!-- Card 1: No Seed Phrase -->
    <rect x="60" y="380" width="140" height="90" rx="8" fill="rgba(99, 102, 241, 0.1)" stroke="#6366f1" stroke-width="1"/>
    <text x="130" y="408" fill="#c7d2fe" font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle">No Seed</text>
    <text x="130" y="428" fill="#c7d2fe" font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Phrase</text>

    <!-- Card 2: Multi-Party -->
    <rect x="220" y="380" width="140" height="90" rx="8" fill="rgba(6, 182, 212, 0.1)" stroke="#06b6d4" stroke-width="1"/>
    <text x="290" y="408" fill="#06d6d6" font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Multi-</text>
    <text x="290" y="428" fill="#06d6d6" font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Party</text>

    <!-- Card 3: Enterprise -->
    <rect x="380" y="380" width="140" height="90" rx="8" fill="rgba(79, 70, 229, 0.1)" stroke="#4f46e5" stroke-width="1"/>
    <text x="450" y="410" fill="#a8b5ff" font-family="Inter, sans-serif" font-size="22" font-weight="700" text-anchor="middle">🚀</text>
    <text x="450" y="435" fill="#8b949e" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Enterprise</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500">degen0x.com</text>
</svg>