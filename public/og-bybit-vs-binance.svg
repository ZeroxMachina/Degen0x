<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <circle cx="200" cy="500" r="200" fill="url(#glow1)"/>
  <circle cx="1000" cy="150" r="180" fill="url(#glow2)"/>
  <!-- Glass card -->
  <rect x="60" y="80" width="1080" height="460" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Logo text -->
  <text x="100" y="140" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1">degen0x</text>
  <!-- VS layout -->
  <text x="300" y="260" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="#e6edf3" text-anchor="middle">Bybit</text>
  <text x="600" y="270" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#f59e0b" text-anchor="middle">VS</text>
  <text x="900" y="260" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="#e6edf3" text-anchor="middle">Binance</text>
  <!-- Subtitle -->
  <text x="600" y="340" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e" text-anchor="middle">Fees, Features, Security &amp; Trading Compared</text>
  <!-- Stats -->
  <text x="300" y="420" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#06b6d4" text-anchor="middle">40M+ Users • 600+ Coins • Copy Trading</text>
  <text x="900" y="420" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle">150M+ Users • 500+ Coins • Highest Liquidity</text>
  <!-- Divider -->
  <line x1="600" y1="200" x2="600" y2="460" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Bottom -->
  <text x="600" y="590" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681" text-anchor="middle">degen0x.com — Crypto Exchange Comparison</text>
</svg>