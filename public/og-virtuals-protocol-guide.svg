<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="180" r="200" fill="url(#circle1)"/>
  <circle cx="1050" cy="400" r="140" fill="url(#circle2)"/>
  <circle cx="150" cy="500" r="100" fill="url(#circle2)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- Agent nodes visualization -->
  <g opacity="0.6">
    <!-- Central node -->
    <circle cx="980" cy="280" r="32" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
    <circle cx="980" cy="280" r="8" fill="#6366f1" opacity="0.8"/>
    <!-- Connected nodes -->
    <circle cx="920" cy="220" r="5" fill="#06b6d4" opacity="0.6"/>
    <line x1="925" y1="223" x2="972" y2="274" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <circle cx="1050" cy="240" r="5" fill="#8b5cf6" opacity="0.6"/>
    <line x1="1045" y1="243" x2="988" y2="274" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <circle cx="1040" cy="340" r="5" fill="#06b6d4" opacity="0.6"/>
    <line x1="1035" y1="337" x2="988" y2="286" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <circle cx="920" cy="340" r="5" fill="#f59e0b" opacity="0.6"/>
    <line x1="925" y1="337" x2="972" y2="286" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    <circle cx="890" cy="280" r="4" fill="#22c55e" opacity="0.5"/>
    <line x1="894" y1="280" x2="948" y2="280" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <circle cx="1070" cy="280" r="4" fill="#22c55e" opacity="0.5"/>
    <line x1="1066" y1="280" x2="1012" y2="280" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <!-- Outer ring nodes -->
    <circle cx="870" cy="200" r="3" fill="#818cf8" opacity="0.4"/>
    <circle cx="1080" cy="200" r="3" fill="#818cf8" opacity="0.4"/>
    <circle cx="1100" cy="360" r="3" fill="#818cf8" opacity="0.4"/>
    <circle cx="870" cy="370" r="3" fill="#818cf8" opacity="0.4"/>
  </g>

  <!-- Category badge -->
  <rect x="80" y="100" width="110" height="28" rx="6" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="135" y="119" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">AI &amp; CRYPTO</text>

  <!-- Title -->
  <text x="80" y="190" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">Virtuals Protocol</text>
  <text x="80" y="245" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">(VIRTUAL) Guide 2026</text>

  <!-- Subtitle -->
  <text x="80" y="290" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#8b949e">The AI Agent Launchpad Taking Crypto by Storm</text>

  <!-- Stats row -->
  <g transform="translate(80, 340)">
    <rect width="180" height="72" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="90" y="30" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#818cf8" text-anchor="middle">18,000+</text>
    <text x="90" y="52" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Agents Deployed</text>
  </g>
  <g transform="translate(280, 340)">
    <rect width="180" height="72" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="90" y="30" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#06b6d4" text-anchor="middle">$450M+</text>
    <text x="90" y="52" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Agentic GDP</text>
  </g>
  <g transform="translate(480, 340)">
    <rect width="180" height="72" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="90" y="30" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#f59e0b" text-anchor="middle">$1B+</text>
    <text x="90" y="52" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Market Cap</text>
  </g>

  <!-- Key features -->
  <g transform="translate(80, 450)">
    <circle cx="8" cy="8" r="4" fill="#6366f1"/>
    <text x="20" y="13" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#c9d1d9">Bonding Curve Tokenization</text>
    <circle cx="230" cy="8" r="4" fill="#06b6d4"/>
    <text x="242" y="13" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#c9d1d9">Built on Base (L2)</text>
    <circle cx="410" cy="8" r="4" fill="#f59e0b"/>
    <text x="422" y="13" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#c9d1d9">AIXBT · Luna · G.A.M.E.</text>
  </g>

  <!-- Bottom bar -->
  <rect y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <rect y="590" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Logo text -->
  <text x="80" y="616" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#818cf8">degen0x</text>
  <text x="160" y="616" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6e7681">degen0x.com</text>

  <!-- Date -->
  <text x="1120" y="616" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>