<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="morphoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="1000" cy="150" r="140" fill="#06b6d4" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1100" cy="450" r="110" fill="#6366f1" opacity="0.05" filter="url(#glow)"/>
  <circle cx="150" cy="550" r="90" fill="#059669" opacity="0.04" filter="url(#glow)"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>

  <!-- Lending emoji -->
  <text x="60" y="170" font-size="64">🏦</text>

  <!-- Title -->
  <text x="60" y="260" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Morpho Protocol</text>

  <!-- Subtitle -->
  <text x="60" y="320" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#8b949e">Optimized lending &amp; borrowing guide</text>

  <!-- Decorative icons -->
  <text x="60" y="380" font-size="32">💰 📊 ⚡</text>

  <!-- Key features row -->
  <rect x="60" y="420" width="180" height="64" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="80" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-transform="uppercase">Peer-to-Peer</text>
  <text x="80" y="472" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#06b6d4">Lending</text>

  <rect x="260" y="420" width="180" height="64" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="280" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-transform="uppercase">Optimized Rates</text>
  <text x="280" y="472" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#059669">Capital Efficient</text>

  <rect x="460" y="420" width="180" height="64" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="480" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-transform="uppercase">Blue Vault</text>
  <text x="480" y="472" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#6366f1">Smart Vaults</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com/learn/morpho-protocol-guide</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Updated March 2026</text>
</svg>
