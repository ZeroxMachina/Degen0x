    <text x="280" y="23" font-family="Inter, monospace" font-size="11" font-weight="700" fill="#8b949e">30D FLOWS</text>
    <text x="390" y="23" font-family="Inter, monospace" font-size="11" font-weight="700" fill="#8b949e">FEE</text>
    <text x="470" y="23" font-family="Inter, monospace" font-size="11" font-weight="700" fill="#8b949e">STAKING</text>

    <!-- Row 1: BSOL -->
