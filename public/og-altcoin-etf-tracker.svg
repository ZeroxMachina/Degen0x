    <text x="20" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#6366f1">0x</text>
  </g>
  <text x="125" y="68" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badges -->
  <rect x="80" y="110" width="165" height="30" rx="15" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="162" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#6366f1">Crypto ETFs · Tracker</text>

  <rect x="255" y="110" width="80" height="30" rx="15" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
  <text x="295" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e">LIVE</text>

  <!-- Main title -->
  <text x="80" y="205" font-family="Inter, system-ui, sans-serif" font-size="50" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Altcoin ETF</text>
  <text x="80" y="260" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="700" fill="url(#accent)" letter-spacing="-0.01em">Tracker</text>

