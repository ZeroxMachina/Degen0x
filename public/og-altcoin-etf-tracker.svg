    <text x="280" y="143" font-family="Inter, monospace" font-size="13" font-weight="600" fill="#22c55e">+$24M</text>
    <text x="390" y="143" font-family="Inter, monospace" font-size="13" fill="#e6edf3">0.20%</text>
    <text x="470" y="143" font-family="Inter, monospace" font-size="13" fill="#6e7681">—</text>

    <!-- Row 4: GSOL (high fee) -->
    <rect x="0" y="160" width="580" height="36" fill="transparent"/>
    <text x="20" y="183" font-family="Inter, monospace" font-size="14" font-weight="800" fill="#9945ff">GSOL</text>
    <rect x="110" y="169" width="42" height="22" rx="11" fill="rgba(153,69,255,0.12)" stroke="rgba(153,69,255,0.3)" stroke-width="0.5"/>
    <text x="131" y="184" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#9945ff">SOL</text>
    <text x="190" y="183" font-family="Inter, monospace" font-size="13" fill="#e6edf3">$155M</text>
    <text x="280" y="183" font-family="Inter, monospace" font-size="13" font-weight="600" fill="#f85149">-$18M</text>
    <text x="390" y="183" font-family="Inter, monospace" font-size="13" fill="#f85149">2.00%</text>
    <text x="470" y="183" font-family="Inter, monospace" font-size="13" fill="#6e7681">—</text>
  </g>

  <!-- Right side: AUM breakdown chart -->
  <g transform="translate(720, 340)">
    <rect x="0" y="0" width="400" height="196" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e">TOTAL ALTCOIN ETF AUM</text>
    <text x="20" y="58" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">$22.87B</text>
    <text x="175" y="58" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e">20 funds tracked</text>

    <!-- Stacked bar chart -->
