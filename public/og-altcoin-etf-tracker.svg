      <!-- ETH bar -->
      <rect x="0" y="0" width="250" height="24" rx="4" fill="#627eea"/>
      <text x="10" y="16" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff">ETH — $20.47B (89.5%)</text>

      <!-- SOL bar -->
      <rect x="0" y="30" width="30" height="24" rx="4" fill="#9945ff"/>
      <text x="40" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#9945ff">SOL — $1.44B (6.3%)</text>

      <!-- XRP bar -->
      <rect x="0" y="60" width="20" height="24" rx="4" fill="#00aae4"/>
      <text x="30" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#00aae4">XRP — $951M (4.2%)</text>
    </g>

    <!-- Staking highlight -->
    <g transform="translate(20, 170)">
      <rect x="0" y="0" width="140" height="18" rx="9" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.3)" stroke-width="0.5"/>
      <text x="10" y="13" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#22c55e">5 staking ETFs</text>
      <rect x="155" y="0" width="140" height="18" rx="9" fill="rgba(248,81,73,0.12)" stroke="rgba(248,81,73,0.3)" stroke-width="0.5"/>
      <text x="165" y="13" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#f85149">2 high-fee funds</text>
