      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>

    <!-- Card shadow -->
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>

    <!-- Monero bar fill -->
