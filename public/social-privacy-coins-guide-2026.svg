    <circle cx="60" cy="360" r="1.5"/> <circle cx="180" cy="360" r="1.5"/> <circle cx="300" cy="360" r="1.5"/>
    <circle cx="420" cy="360" r="1.5"/> <circle cx="60" cy="460" r="1.5"/> <circle cx="180" cy="460" r="1.5"/>
