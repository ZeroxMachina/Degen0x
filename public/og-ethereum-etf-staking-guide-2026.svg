<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccentEthEtf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradEthEtf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070b18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1426;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ethDiamondFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradEthEtf)"/>
  <rect width="1200" height="8" fill="url(#gradAccentEthEtf)"/>

  <!-- decorative geometric grid (institutional / orderly feel) -->
  <g opacity="0.08" stroke="#8b5cf6" stroke-width="1">
    <line x1="0"   y1="120" x2="1200" y2="120"/>
    <line x1="0"   y1="510" x2="1200" y2="510"/>
    <line x1="80"  y1="80"  x2="80"   y2="600"/>
    <line x1="1120" y1="80" x2="1120" y2="600"/>
  </g>

  <!-- decorative circles (subtle, restrained) -->
  <circle cx="170" cy="200" r="56" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.22"/>
  <circle cx="1060" cy="510" r="44" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.22"/>
  <circle cx="1090" cy="180" r="34" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.18"/>

  <!-- Topical motif (right third): ETH diamond + ETF certificate + yield ladder -->
  <g opacity="0.42">
    <!-- ETH diamond glyph (upper octahedron + lower octahedron) -->
    <g transform="translate(990, 295)">
      <!-- upper -->
      <polygon points="0,-90 -42,0 0,-22 42,0" fill="url(#ethDiamondFill)" opacity="0.85"/>
      <!-- lower -->
      <polygon points="0,90 -42,12 0,-10 42,12" fill="url(#ethDiamondFill)" opacity="0.55"/>
      <!-- midline accent -->
      <line x1="-42" y1="0" x2="42" y2="0" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
    </g>

    <!-- ETF certificate outline (left of diamond) -->
    <g transform="translate(870, 350)">
      <rect x="0" y="0" width="68" height="86" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="3"/>
      <line x1="12" y1="20" x2="56" y2="20" stroke="#8b5cf6" stroke-width="1"/>
      <line x1="12" y1="36" x2="56" y2="36" stroke="#8b5cf6" stroke-width="1"/>
      <line x1="12" y1="52" x2="48" y2="52" stroke="#8b5cf6" stroke-width="1"/>
      <!-- "ETF" mark -->
      <text x="34" y="76" font-family="Inter, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="1">ETF</text>
    </g>
  </g>

  <!-- Yield ladder bars (left of motif, suggesting tiered staking distributions) -->
  <g opacity="0.6">
    <rect x="800" y="280" width="6" height="28" fill="#6366f1"/>
    <rect x="812" y="270" width="6" height="38" fill="#8b5cf6"/>
    <rect x="824" y="260" width="6" height="48" fill="#10b981"/>
    <rect x="836" y="250" width="6" height="58" fill="#10b981"/>
    <rect x="848" y="240" width="6" height="68" fill="#34d399"/>
  </g>

  <!-- badge -->
  <text x="80" y="120" font-family="Inter, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#a78bfa" letter-spacing="2" opacity="0.95">ETF · ETHEREUM · STAKING</text>

  <!-- title -->
  <text x="80" y="240" font-family="Inter, Helvetica, sans-serif" font-size="62" font-weight="800" fill="#ffffff">Ethereum ETF Staking 2026</text>

  <!-- subtitle line 1 -->
  <text x="80" y="310" font-family="Inter, Helvetica, sans-serif" font-size="28" font-weight="600" fill="#cbd5e1">Spot ETFs that pay you to hold &#x2014;</text>

  <!-- subtitle line 2 -->
  <text x="80" y="350" font-family="Inter, Helvetica, sans-serif" font-size="28" font-weight="600" fill="#cbd5e1">staking rewards, on tap.</text>

  <!-- detail strip -->
  <text x="80" y="420" font-family="Inter, Helvetica, sans-serif" font-size="17" fill="#8b949e">Spot ETFs  ·  Staking rewards  ·  Monthly distributions  ·  Regulated rails</text>

  <!-- divider -->
  <rect x="80" y="450" width="120" height="2" fill="url(#gradAccentEthEtf)" opacity="0.7"/>

  <!-- supporting tagline -->
  <text x="80" y="490" font-family="Inter, Helvetica, sans-serif" font-size="15" fill="#64748b">A practical guide to the ETFs that actually earn yield.</text>

  <!-- degen0x branding -->
  <text x="1120" y="600" font-family="Inter, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#a78bfa" text-anchor="end" opacity="0.85">degen0x.com</text>

  <!-- bottom gradient line -->
  <rect y="622" width="1200" height="8" fill="url(#gradAccentEthEtf)" opacity="0.5"/>
</svg>
