<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="hyper-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Decorative circles (chain nodes) -->
  <circle cx="900" cy="160" r="150" fill="#06b6d4" opacity="0.05"/>
  <circle cx="1050" cy="300" r="100" fill="#6366f1" opacity="0.05"/>
  <circle cx="850" cy="400" r="80" fill="#d97706" opacity="0.04"/>
  <!-- Network visualization -->
  <g transform="translate(820, 140)" filter="url(#glow)">
    <!-- Chain nodes -->
    <circle cx="80" cy="60" r="28" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.4)" stroke-width="1.5"/>
    <text x="80" y="65" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#22d3ee" font-weight="600">ETH</text>
    <circle cx="240" cy="40" r="28" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)" stroke-width="1.5"/>
    <text x="240" y="45" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#a78bfa" font-weight="600">SOL</text>
    <circle cx="300" cy="170" r="28" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1.5"/>
    <text x="300" y="175" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#fbbf24" font-weight="600">ATOM</text>
    <circle cx="160" cy="200" r="28" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
    <text x="160" y="205" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#818cf8" font-weight="600">MOVE</text>
    <!-- Hyperlane center hub -->
    <circle cx="180" cy="110" r="36" fill="rgba(6,182,212,0.2)" stroke="rgba(6,182,212,0.5)" stroke-width="2"/>
    <text x="180" y="107" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#22d3ee" font-weight="700">HYPER</text>
    <text x="180" y="120" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#6e7681">LANE</text>
    <!-- Connection lines -->
    <line x1="108" y1="72" x2="148" y2="96" stroke="rgba(6,182,212,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="212" y1="52" x2="200" y2="88" stroke="rgba(139,92,246,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="276" y1="155" x2="210" y2="125" stroke="rgba(245,158,11,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="172" y1="175" x2="176" y2="146" stroke="rgba(99,102,241,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="url(#hyper-brand)" opacity="0.9"/>
    <text x="16" y="21" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="white" font-weight="800">0x</text>
    <text x="44" y="22" font-family="Inter,sans-serif" font-size="16" fill="#8b949e" font-weight="600">degen0x</text>
  </g>
  <!-- Category badge -->
  <rect x="60" y="140" width="60" height="26" rx="13" fill="rgba(6,182,212,0.2)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
  <text x="90" y="157" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#22d3ee" font-weight="600">LEARN</text>
  <!-- Title -->
  <text x="60" y="220" font-family="Inter,sans-serif" font-size="46" fill="#e6edf3" font-weight="800" letter-spacing="-0.02em">Hyperlane</text>
  <text x="60" y="276" font-family="Inter,sans-serif" font-size="46" fill="#e6edf3" font-weight="800" letter-spacing="-0.02em">Permissionless</text>
  <text x="60" y="332" font-family="Inter,sans-serif" font-size="46" fill="#e6edf3" font-weight="800" letter-spacing="-0.02em">Interoperability</text>
  <!-- Subtitle -->
  <text x="60" y="380" font-family="Inter,sans-serif" font-size="20" fill="#8b949e" font-weight="400">Cross-Chain Messaging, Warp Routes &amp; HYPER Token — 2026</text>
  <!-- Stats -->
  <g transform="translate(60, 420)">
    <rect width="130" height="44" rx="10" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6e7681">Chains</text>
    <text x="65" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#06b6d4" font-weight="700">150+</text>
  </g>
  <g transform="translate(210, 420)">
    <rect width="130" height="44" rx="10" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6e7681">Bridged</text>
    <text x="65" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#6366f1" font-weight="700">$6B+</text>
  </g>
  <g transform="translate(360, 420)">
    <rect width="140" height="44" rx="10" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="70" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6e7681">Community</text>
    <text x="70" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#22c55e" font-weight="700">57%</text>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" font-family="Inter,sans-serif" font-size="14" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="615" text-anchor="end" font-family="Inter,sans-serif" font-size="12" fill="#6e7681">April 2026</text>
</svg>