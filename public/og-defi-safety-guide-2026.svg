<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="200" fill="#22c55e" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="150" fill="#ef4444" opacity="0.04" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="120" fill="#22c55e" opacity="0.03" filter="url(#glow)"/>

  <!-- Shield icon (representing security) -->
  <g transform="translate(900, 100)" opacity="0.18">
    <path d="M50 10 L90 30 L90 65 C90 90 70 110 50 120 C30 110 10 90 10 65 L10 30 Z" fill="none" stroke="#22c55e" stroke-width="3"/>
    <path d="M35 65 L48 78 L70 50" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Security checklist visualization -->
  <g transform="translate(850, 270)" opacity="0.2">
    <!-- Checklist items -->
    <rect x="0" y="0" width="20" height="20" rx="4" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M4 10 L8 15 L16 5" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="10" x2="200" y2="10" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

    <rect x="0" y="30" width="20" height="20" rx="4" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M4 40 L8 45 L16 35" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="40" x2="180" y2="40" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

    <rect x="0" y="60" width="20" height="20" rx="4" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <line x1="30" y1="70" x2="160" y2="70" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

    <rect x="0" y="90" width="20" height="20" rx="4" fill="none" stroke="#ef4444" stroke-width="2"/>
    <line x1="30" y1="100" x2="140" y2="100" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Category badge -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="180" height="28" rx="14" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
    <text x="90" y="18" fill="#22c55e" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="700" letter-spacing="0.5">DEFI &amp; SECURITY</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">DeFi Safety Guide</text>
  <text x="60" y="230" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">2026</text>
  <text x="60" y="285" fill="#22c55e" font-family="Inter, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.01em">Protect Your Assets On-Chain</text>

  <!-- Subtitle -->
  <text x="60" y="340" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Smart contract audits, rug pull detection, wallet security, and approval hygiene.</text>
  <text x="60" y="365" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">A practical guide to staying safe in DeFi during 2026.</text>

  <!-- Stat cards -->
  <g transform="translate(60, 400)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">2025 HACKS</text>
    <text x="16" y="55" fill="#ef4444" font-family="Inter, sans-serif" font-size="24" font-weight="800">$1.7B</text>

    <!-- Card 2 -->
    <rect x="180" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="196" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">AUDIT COVERAGE</text>
    <text x="196" y="55" fill="#22c55e" font-family="Inter, sans-serif" font-size="24" font-weight="800">68%</text>

    <!-- Card 3 -->
    <rect x="360" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="376" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">BUG BOUNTIES</text>
    <text x="376" y="55" fill="#06b6d4" font-family="Inter, sans-serif" font-size="24" font-weight="800">$150M+</text>

    <!-- Card 4 -->
    <rect x="540" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="556" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">SAFETY TOOLS</text>
    <text x="556" y="55" fill="#f59e0b" font-family="Inter, sans-serif" font-size="24" font-weight="800">20+</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500">degen0x.com</text>
  <text x="1140" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="end">Learn Guide</text>
</svg>