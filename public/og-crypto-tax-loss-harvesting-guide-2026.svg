<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Decorative chart - gains bar (green) -->
  <rect x="850" y="180" width="60" height="160" rx="4" fill="url(#greenGrad)" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
  <text x="880" y="175" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#22c55e" opacity="0.8">+$12K</text>

  <!-- Decorative chart - loss bar (red) -->
  <rect x="930" y="240" width="60" height="100" rx="4" fill="url(#redGrad)" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <text x="960" y="235" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#ef4444" opacity="0.8">-$8K</text>

  <!-- Decorative chart - net bar (cyan) -->
  <rect x="1010" y="260" width="60" height="80" rx="4" fill="none" stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>
  <text x="1040" y="255" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#0891b2" opacity="0.8">Net $4K</text>

  <!-- Axis line -->
  <line x1="830" y1="340" x2="1090" y2="340" stroke="#30363d" stroke-width="1"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="140" r="60" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.25"/>
  <circle cx="150" cy="140" r="40" fill="none" stroke="#d97706" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="520" r="45" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.2"/>

  <!-- IRS form icon outline -->
  <rect x="100" y="400" width="100" height="130" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <line x1="115" y1="430" x2="185" y2="430" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <line x1="115" y1="450" x2="175" y2="450" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <line x1="115" y1="470" x2="180" y2="470" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <line x1="115" y1="490" x2="160" y2="490" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <text x="150" y="418" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" fill="#6366f1" opacity="0.4">Form 8949</text>

  <!-- Category badge -->
  <rect x="80" y="230" width="130" height="30" rx="15" fill="#06b6d420" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
  <text x="145" y="250" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#06b6d4">Tax Strategy</text>

  <!-- Title -->
  <text x="600" y="300" font-family="Inter, sans-serif" font-size="46" font-weight="bold" text-anchor="middle" fill="white">
    Crypto Tax-Loss Harvesting
  </text>

  <!-- Subtitle -->
  <text x="600" y="355" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" fill="#8b949e">
    IRS Rules, Wash Sale Loophole & Strategy Guide 2026
  </text>

  <!-- Small decorative dots -->
  <circle cx="350" cy="130" r="3" fill="#0891b2" opacity="0.6"/>
  <circle cx="700" cy="100" r="3" fill="#d97706" opacity="0.5"/>
  <circle cx="500" cy="520" r="3" fill="#4f46e5" opacity="0.5"/>
  <circle cx="800" cy="500" r="3" fill="#22c55e" opacity="0.4"/>

  <!-- Footer branding -->
  <text x="1150" y="600" font-family="Inter, sans-serif" font-size="16" text-anchor="end" fill="#6e7681">
    degen0x.com
  </text>
</svg>