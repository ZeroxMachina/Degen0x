<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow1" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Ambient glow circles -->
  <circle cx="280" cy="150" r="320" fill="#f59e0b" opacity="0.07"/>
  <circle cx="920" cy="480" r="260" fill="#06b6d4" opacity="0.05"/>
  <circle cx="600" cy="100" r="200" fill="#6366f1" opacity="0.04"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.02" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo area -->
  <circle cx="100" cy="72" r="18" fill="#6366f1" opacity="0.15"/>
  <text x="100" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" fill="#818cf8" text-anchor="middle">0x</text>
  <text x="130" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="140" width="120" height="30" rx="15" fill="#f59e0b20" stroke="#f59e0b50" stroke-width="1"/>
  <text x="140" y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="0.05em">REWARDS</text>

  <!-- Title -->
  <text x="80" y="230" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-0.03em">Gamification &amp;</text>
  <text x="80" y="295" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="url(#accent)" letter-spacing="-0.03em">Rewards</text>

  <!-- Subtitle -->
  <text x="80" y="345" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">
    Earn XP · Unlock Badges · Climb the Leaderboard
  </text>

  <!-- Decorative reward icons -->
  <!-- Card 1: Trophy -->
  <g transform="translate(700, 140)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Trophy icon -->
    <path d="M 22 25 L 22 38 Q 22 45 28 48 L 28 55 L 56 55 L 56 48 Q 62 45 62 38 L 62 25" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 25 25 L 22 20 M 59 25 L 62 20" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <rect x="28" y="55" width="28" height="3" fill="#f59e0b" opacity="0.6"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Leaderboard</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Top 100 rank</text>
  </g>

  <!-- Card 2: XP Bar -->
  <g transform="translate(720, 235)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- XP progress bar -->
    <rect x="22" y="35" width="35" height="8" rx="4" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <rect x="22" y="35" width="27" height="8" rx="4" fill="url(#accent)"/>
    <text x="62" y="41" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#818cf8">1,250 XP</text>
    <!-- Lightning bolt -->
    <path d="M 35 48 L 33 58 L 40 56 L 38 65 L 48 52 L 42 54 L 44 46 Z" fill="#06b6d4" opacity="0.8"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Earn XP</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Quick learner</text>
  </g>

  <!-- Card 3: Badges -->
  <g transform="translate(740, 330)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Badge collection -->
    <circle cx="26" cy="35" r="6" fill="#f59e0b" opacity="0.8"/>
    <circle cx="38" cy="32" r="6" fill="#06b6d4" opacity="0.8"/>
    <circle cx="50" cy="35" r="6" fill="#818cf8" opacity="0.8"/>
    <circle cx="32" cy="48" r="6" fill="#14F195" opacity="0.8"/>
    <circle cx="44" cy="48" r="6" fill="#f59e0b" opacity="0.6"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">22 Badges</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Unlock more</text>
  </g>

  <!-- Card 4: Streak flame -->
  <g transform="translate(950, 180)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Streak flame icon -->
    <path d="M 42 32 Q 39 35 39 40 Q 39 48 42 50 Q 45 48 45 40 Q 45 35 42 32 Z" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <path d="M 42 35 Q 40 37 40 40 Q 40 45 42 47 Q 44 45 44 40 Q 44 37 42 35 Z" fill="#f59e0b" opacity="0.7"/>
    <!-- Streak number -->
    <text x="52" y="42" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" fill="#f59e0b">7</text>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Daily Streak</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Keep it going</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="white" fill-opacity="0.02"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="white" stroke-opacity="0.06"/>
  <text x="80" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1120" y="612" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Free · No signup · Open source</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>