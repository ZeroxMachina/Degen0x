<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentBar)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="200" r="180" fill="#ef4444" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="120" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>
  <circle cx="150" cy="500" r="100" fill="#0891b2" opacity="0.04"/>

  <!-- Shield icon (decorative) -->
  <g transform="translate(900, 140)" opacity="0.15">
    <path d="M80 0 L160 40 L160 110 C160 170 120 210 80 230 C40 210 0 170 0 110 L0 40 Z" fill="url(#shieldGrad)" stroke="#ef4444" stroke-width="2"/>
    <line x1="80" y1="80" x2="80" y2="140" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <circle cx="80" cy="160" r="5" fill="#ef4444"/>
  </g>

  <!-- Attack vector icons (small decorative) -->
  <g transform="translate(920, 380)" opacity="0.12">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="10" y1="25" x2="40" y2="25" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="25" y1="10" x2="25" y2="40" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <g transform="translate(1000, 350)" opacity="0.12">
    <circle cx="25" cy="25" r="22" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="15" y1="15" x2="35" y2="35" stroke="#ef4444" stroke-width="2"/>
  </g>

  <!-- Logo placeholder -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="14" fill="none" stroke="#818cf8" stroke-width="2"/>
    <text x="16" y="21" text-anchor="middle" fill="#818cf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">0x</text>
  </g>
  <text x="96" y="56" fill="#e6edf3" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" opacity="0.7">degen0x</text>

  <!-- Category badges -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="150" height="28" rx="14" fill="#da3633" opacity="0.9"/>
    <text x="75" y="19" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">SECURITY</text>
    <rect x="162" y="0" width="170" height="28" rx="14" fill="#1f6feb" opacity="0.9"/>
    <text x="247" y="19" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">DAO GOVERNANCE</text>
    <rect x="344" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.08)"/>
    <text x="379" y="19" text-anchor="middle" fill="#8b949e" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">2026</text>
  </g>

  <!-- Title -->
  <text x="60" y="195" fill="#e6edf3" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">
    DAO Governance Security
  </text>
  <text x="60" y="250" fill="#e6edf3" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">
    Attack Vectors &amp; Defenses
  </text>

  <!-- Subtitle -->
  <text x="60" y="300" fill="#8b949e" font-family="Inter, Arial, sans-serif" font-size="20">
    $780M+ lost to governance exploits · 12,000+ DAOs · 5 critical vectors
  </text>

  <!-- Stats row -->
  <g transform="translate(60, 350)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="200" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="35" fill="#ef4444" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">$181M</text>
    <text x="20" y="58" fill="#8b949e" font-family="Inter, Arial, sans-serif" font-size="13">Beanstalk Flashloan</text>

    <!-- Stat 2 -->
    <rect x="220" y="0" width="200" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="240" y="35" fill="#f59e0b" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">$28B+</text>
    <text x="240" y="58" fill="#8b949e" font-family="Inter, Arial, sans-serif" font-size="13">Under DAO Governance</text>

    <!-- Stat 3 -->
    <rect x="440" y="0" width="200" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="460" y="35" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">6</text>
    <text x="460" y="58" fill="#8b949e" font-family="Inter, Arial, sans-serif" font-size="13">Defense Mechanisms</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.4)"/>
  <text x="60" y="620" fill="#6e7681" font-family="Inter, Arial, sans-serif" font-size="14">degen0x.com/learn/governance-security-attack-vectors-2026</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="Inter, Arial, sans-serif" font-size="14">March 2026</text>
</svg>