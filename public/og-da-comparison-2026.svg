<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />

  <!-- Accent Bar -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGradient)" />

  <!-- Decorative circles -->
  <circle cx="120" cy="130" r="90" fill="#7c3aed" opacity="0.07" />
  <circle cx="1080" cy="500" r="100" fill="#06b6d4" opacity="0.06" />
  <circle cx="600" cy="100" r="70" fill="#3b82f6" opacity="0.05" />

  <!-- Three columns: Celestia / EigenDA / Avail -->
  <g opacity="0.45">
    <!-- Celestia column -->
    <rect x="100" y="160" width="260" height="260" rx="12" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <rect x="100" y="160" width="260" height="44" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="230" y="188" font-size="16" font-weight="bold" fill="#c4b5fd" text-anchor="middle" font-family="Inter">CELESTIA</text>
    <text x="230" y="230" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">~50% Market Share</text>
    <text x="230" y="260" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">128MB Blocks (Matcha)</text>
    <text x="230" y="290" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">DAS + NMT Security</text>
    <text x="230" y="320" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">160GB+ Processed</text>
    <rect x="170" y="350" width="120" height="28" rx="14" fill="#7c3aed" opacity="0.2"/>
    <text x="230" y="369" font-size="11" fill="#c4b5fd" text-anchor="middle" font-family="Inter" font-weight="600">SOVEREIGN</text>

    <!-- EigenDA column -->
    <rect x="400" y="160" width="260" height="260" rx="12" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <rect x="400" y="160" width="260" height="44" rx="12" fill="#3b82f6" opacity="0.15"/>
    <text x="530" y="188" font-size="16" font-weight="bold" fill="#93c5fd" text-anchor="middle" font-family="Inter">EIGENDA</text>
    <text x="530" y="230" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">100MB/s Throughput</text>
    <text x="530" y="260" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">$335M+ Restaked</text>
    <text x="530" y="290" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">ETH Security via EigenLayer</text>
    <text x="530" y="320" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">$3.06B Ecosystem TVL</text>
    <rect x="470" y="350" width="120" height="28" rx="14" fill="#3b82f6" opacity="0.2"/>
    <text x="530" y="369" font-size="11" fill="#93c5fd" text-anchor="middle" font-family="Inter" font-weight="600">ETH-ALIGNED</text>

    <!-- Avail column -->
    <rect x="700" y="160" width="260" height="260" rx="12" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <rect x="700" y="160" width="260" height="44" rx="12" fill="#06b6d4" opacity="0.15"/>
    <text x="830" y="188" font-size="16" font-weight="bold" fill="#67e8f9" text-anchor="middle" font-family="Inter">AVAIL</text>
    <text x="830" y="230" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">KZG Commitments</text>
    <text x="830" y="260" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">DAS + Erasure Coding</text>
    <text x="830" y="290" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">Arb, OP, Polygon</text>
    <text x="830" y="320" font-size="13" fill="#8b949e" text-anchor="middle" font-family="Inter">Multichain-First</text>
    <rect x="770" y="350" width="120" height="28" rx="14" fill="#06b6d4" opacity="0.2"/>
    <text x="830" y="369" font-size="11" fill="#67e8f9" text-anchor="middle" font-family="Inter" font-weight="600">MULTICHAIN</text>
  </g>

  <!-- VS dividers -->
  <g opacity="0.3">
    <text x="380" y="300" font-size="20" font-weight="bold" fill="#8b949e" text-anchor="middle" font-family="Inter">vs</text>
    <text x="680" y="300" font-size="20" font-weight="bold" fill="#8b949e" text-anchor="middle" font-family="Inter">vs</text>
  </g>

  <!-- Category Badge -->
  <rect x="60" y="480" width="160" height="32" rx="16" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="140" y="502" font-size="13" fill="#8b5cf6" text-anchor="middle" font-family="Inter" font-weight="600">INFRASTRUCTURE</text>

  <!-- Main Title -->
  <text x="70" y="555" font-size="44" font-weight="bold" fill="url(#titleGradient)" font-family="Inter">Celestia vs EigenDA vs Avail</text>

  <!-- Subtitle -->
  <text x="70" y="595" font-size="20" fill="#8b949e" font-family="Inter">DA Layer Comparison 2026 — Architecture, Throughput &amp; Security</text>

  <!-- degen0x branding -->
  <text x="1100" y="600" font-size="14" fill="#8b949e" text-anchor="end" font-family="Inter" font-weight="600">degen0x</text>
</svg>