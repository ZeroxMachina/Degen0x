<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="barEigen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="barSymbiotic" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="barKarak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="200" r="180" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="120" fill="#06b6d4" opacity="0.05" filter="url(#glow)"/>
  <circle cx="150" cy="500" r="100" fill="#f59e0b" opacity="0.04" filter="url(#glow)"/>

  <!-- Logo area -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Category badge -->
  <rect x="60" y="95" width="80" height="26" rx="13" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="100" y="113" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#6366f1" text-anchor="middle">DeFi</text>

  <rect x="150" y="95" width="110" height="26" rx="13" fill="#06b6d420" stroke="#06b6d440" stroke-width="1"/>
  <text x="205" y="113" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#06b6d4" text-anchor="middle">Restaking</text>

  <!-- Main title -->
  <text x="60" y="185" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="url(#titleGrad)" letter-spacing="-0.02em">Restaking Comparison 2026</text>
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#8b949e" letter-spacing="-0.01em">EigenLayer vs Symbiotic vs Karak</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#6e7681">Side-by-side analysis of TVL, architecture, risks, and yields</text>

  <!-- Market share visualization -->
  <!-- EigenLayer bar -->
  <rect x="60" y="340" width="650" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="62" y="342" width="606" height="40" rx="6" fill="url(#barEigen)" opacity="0.85"/>
  <text x="78" y="368" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="white">EigenLayer — $15.3B TVL (93.9%)</text>

  <!-- Symbiotic bar -->
  <rect x="60" y="396" width="650" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="62" y="398" width="36" height="40" rx="6" fill="url(#barSymbiotic)" opacity="0.85"/>
  <text x="110" y="424" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#06b6d4">Symbiotic — $897M TVL (5.5%)</text>

  <!-- Karak bar -->
  <rect x="60" y="452" width="650" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="62" y="454" width="6" height="40" rx="3" fill="url(#barKarak)" opacity="0.85"/>
  <text x="80" y="480" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f59e0b">Karak — $102M TVL (0.6%)</text>

  <!-- Right side stats -->
  <rect x="760" y="340" width="380" height="156" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="780" y="372" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">TOTAL RESTAKING MARKET</text>
  <text x="780" y="410" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#e6edf3">$16.3B</text>
  <text x="780" y="440" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">across 3 protocols</text>
  <text x="780" y="475" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e" font-weight="600">4.65M+ ETH committed</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="560" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="602" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="602" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">14 min read · Updated March 2026</text>
</svg>
