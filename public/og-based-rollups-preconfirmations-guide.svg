  <text x="60" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#58a6ff">degen0x</text>
  <text x="155" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e">degen0x.com/learn/based-rollups-preconfirmations-guide</text>
