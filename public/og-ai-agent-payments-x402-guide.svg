<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative glow circles -->
  <circle cx="1000" cy="200" r="180" fill="#06b6d4" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="1100" cy="450" r="130" fill="#22c55e" opacity="0.04" filter="url(#glow2)"/>
  <circle cx="150" cy="520" r="100" fill="#6366f1" opacity="0.03" filter="url(#glow2)"/>

  <!-- x402 payment flow diagram -->
  <g transform="translate(800, 100)" opacity="0.2">
    <!-- Agent -->
    <rect x="0" y="0" width="90" height="50" rx="10" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <text x="45" y="22" fill="#06b6d4" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" font-weight="600">AI Agent</text>
    <text x="45" y="38" fill="#06b6d4" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">GET /api</text>

    <!-- Arrow down -->
    <line x1="45" y1="55" x2="45" y2="80" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="40,78 45,88 50,78" fill="#8b949e"/>

    <!-- Server -->
    <rect x="0" y="92" width="90" height="50" rx="10" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="45" y="114" fill="#f59e0b" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" font-weight="600">Server</text>
    <text x="45" y="130" fill="#f59e0b" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">HTTP 402</text>

    <!-- Arrow right to payment -->
    <line x1="95" y1="117" x2="140" y2="117" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="138,112 148,117 138,122" fill="#8b949e"/>

    <!-- USDC payment -->
    <rect x="152" y="92" width="110" height="50" rx="10" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="207" y="114" fill="#22c55e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" font-weight="600">USDC Payment</text>
    <text x="207" y="130" fill="#22c55e" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">EIP-3009 sig</text>

    <!-- Arrow down to Base -->
    <line x1="207" y1="147" x2="207" y2="172" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="202,170 207,180 212,170" fill="#8b949e"/>

    <!-- Base settlement -->
    <rect x="152" y="184" width="110" height="40" rx="10" fill="none" stroke="#6366f1" stroke-width="2"/>
    <text x="207" y="208" fill="#6366f1" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" font-weight="600">Base L2 Settle</text>
  </g>

  <!-- Category badge -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="#06b6d420" stroke="#06b6d440" stroke-width="1"/>
    <text x="60" y="18" fill="#06b6d4" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="700" letter-spacing="0.5">AI &amp; CRYPTO</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">AI Agent Payments</text>
  <text x="60" y="230" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">&amp; the x402 Protocol</text>
  <text x="60" y="285" fill="#06b6d4" font-family="Inter, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.01em">Complete Guide for 2026</text>

  <!-- Subtitle -->
  <text x="60" y="340" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">How AI agents autonomously pay for services on-chain.</text>
  <text x="60" y="365" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">x402, USDC on Base, Coinbase Agentic Wallets, ERC-8004.</text>

  <!-- Stat cards -->
  <g transform="translate(60, 400)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">TRANSACTIONS</text>
    <text x="16" y="55" fill="#06b6d4" font-family="Inter, sans-serif" font-size="24" font-weight="800">75M+</text>

    <!-- Card 2 -->
    <rect x="180" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="196" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">VOLUME</text>
    <text x="196" y="55" fill="#06b6d4" font-family="Inter, sans-serif" font-size="24" font-weight="800">$24M+</text>

    <!-- Card 3 -->
    <rect x="360" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="376" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">SETTLEMENT</text>
    <text x="376" y="55" fill="#22c55e" font-family="Inter, sans-serif" font-size="24" font-weight="800">&lt;2 sec</text>

    <!-- Card 4 -->
    <rect x="540" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="556" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">AVG FEE</text>
    <text x="556" y="55" fill="#22c55e" font-family="Inter, sans-serif" font-size="24" font-weight="800">Sub-cent</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500">degen0x.com</text>
  <text x="1140" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="end">Learn Guide</text>
</svg>