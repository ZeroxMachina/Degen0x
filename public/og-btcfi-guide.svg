<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#1a1205"/>
    </linearGradient>
    <linearGradient id="btcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#f59e0b" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="#f59e0b" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#f59e0b" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="#f59e0b" stroke-width="1"/>
    <line x1="0" y1="400" x2="600" y2="630" stroke="#f59e0b" stroke-width="1"/>
  </g>

  <!-- Bitcoin symbol background watermark -->
  <text x="950" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="320" font-weight="900" fill="#f59e0b" opacity="0.04">₿</text>

  <!-- Accent glow -->
  <circle cx="200" cy="150" r="200" fill="#f59e0b" opacity="0.06"/>
  <circle cx="1000" cy="500" r="180" fill="#fb923c" opacity="0.04"/>

  <!-- Top bar -->
  <rect x="60" y="50" width="4" height="50" rx="2" fill="url(#btcGrad)"/>

  <!-- Title -->
  <text x="80" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#e6edf3">
    BTCFi Guide 2026
  </text>
  <text x="80" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e">
    Earn yield on your Bitcoin — staking, lending, and DeFi
  </text>

  <!-- Stat cards row -->
  <g transform="translate(60, 140)">
    <!-- Card 1: TVL -->
    <rect x="0" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-transform="uppercase" letter-spacing="1">Total BTCFi TVL</text>
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#f59e0b">$7.1B+</text>
    <text x="20" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e">▲ +2,237% from 2024</text>

    <!-- Card 2: Stacks -->
    <rect x="270" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="290" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">Stacks TVL</text>
    <text x="290" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#3b82f6">$208M</text>
    <text x="290" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">sBTC — 5,000 BTC cap</text>

    <!-- Card 3: Rootstock -->
    <rect x="540" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="560" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">Rootstock TVL</text>
    <text x="560" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#8b5cf6">$160M+</text>
    <text x="560" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">EVM-compatible sidechain</text>

    <!-- Card 4: BTC % -->
    <rect x="810" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="830" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">BTC in DeFi</text>
    <text x="830" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#22c55e">0.46%</text>
    <text x="830" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Massive room for growth</text>
  </g>

  <!-- Protocol flow diagram -->
  <g transform="translate(60, 290)">
    <!-- Bitcoin -->
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">₿ Native BTC</text>
    <text x="80" y="46" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Self-custody</text>

    <!-- Arrow 1 -->
    <line x1="170" y1="30" x2="220" y2="30" stroke="#30363d" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Babylon -->
    <rect x="230" y="0" width="160" height="60" rx="10" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
    <text x="310" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#22c55e">Babylon Staking</text>
    <text x="310" y="46" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Trustless · Low risk</text>

    <!-- Arrow 2 -->
    <line x1="400" y1="30" x2="450" y2="30" stroke="#30363d" stroke-width="2"/>

    <!-- L2 / Sidechain -->
    <rect x="460" y="0" width="160" height="60" rx="10" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="540" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">L2s &amp; Sidechains</text>
    <text x="540" y="46" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Stacks · RSK · Merlin</text>

    <!-- Arrow 3 -->
    <line x1="630" y1="30" x2="680" y2="30" stroke="#30363d" stroke-width="2"/>

    <!-- DeFi Yield -->
    <rect x="690" y="0" width="160" height="60" rx="10" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="770" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#8b5cf6">DeFi Yield</text>
    <text x="770" y="46" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">2%–25% APY</text>

    <!-- Arrow 4 -->
    <line x1="860" y1="30" x2="910" y2="30" stroke="#30363d" stroke-width="2"/>

    <!-- Earn -->
    <rect x="920" y="0" width="160" height="60" rx="10" fill="#f59e0b" fill-opacity="0.25" stroke="#f59e0b" stroke-width="2"/>
    <text x="1000" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#f59e0b">Earn ₿</text>
    <text x="1000" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f59e0b">Without selling</text>
  </g>

  <!-- Risk badges row -->
  <g transform="translate(60, 390)">
    <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">YIELD STRATEGIES BY RISK</text>

    <rect x="0" y="30" width="200" height="45" rx="8" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="1"/>
    <text x="15" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#22c55e">LOW RISK</text>
    <text x="15" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Babylon · Aave WBTC</text>

    <rect x="220" y="30" width="260" height="45" rx="8" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
    <text x="235" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#f59e0b">MEDIUM RISK</text>
    <text x="235" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">sBTC DeFi · Rootstock · tBTC</text>

    <rect x="500" y="30" width="260" height="45" rx="8" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1"/>
    <text x="515" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ef4444">HIGH RISK</text>
    <text x="515" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Merlin · Botanix · New L2 staking</text>
  </g>

  <!-- Protocols covered -->
  <g transform="translate(60, 490)">
    <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">PROTOCOLS COVERED</text>
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="110" height="28" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b50" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#f59e0b">Babylon</text>

      <rect x="120" y="0" width="90" height="28" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f650" stroke-width="1"/>
      <text x="165" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#3b82f6">Stacks</text>

      <rect x="220" y="0" width="110" height="28" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf650" stroke-width="1"/>
      <text x="275" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#8b5cf6">Rootstock</text>

      <rect x="340" y="0" width="90" height="28" rx="6" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e50" stroke-width="1"/>
      <text x="385" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#22c55e">Aave</text>

      <rect x="440" y="0" width="90" height="28" rx="6" fill="#f97316" fill-opacity="0.1" stroke="#f9731650" stroke-width="1"/>
      <text x="485" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#f97316">WBTC</text>

      <rect x="540" y="0" width="90" height="28" rx="6" fill="#ef4444" fill-opacity="0.1" stroke="#ef444450" stroke-width="1"/>
      <text x="585" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ef4444">Merlin</text>

      <rect x="640" y="0" width="80" height="28" rx="6" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d450" stroke-width="1"/>
      <text x="680" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#06b6d4">tBTC</text>
    </g>
  </g>

  <!-- Footer branding -->
  <rect x="60" y="570" width="1080" height="1" fill="#30363d"/>
  <text x="60" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#58a6ff">degen0x</text>
  <text x="155" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e">degen0x.com/learn/btcfi-bitcoin-defi-guide-2026</text>
  <text x="1140" y="600" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">March 2026</text>
</svg>