<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="250" r="200" fill="#06b6d4" opacity="0.06"/>
  <circle cx="150" cy="500" r="120" fill="#8b5cf6" opacity="0.04"/>

  <!-- Thematic icon: Eye/iris (digital identity) -->
  <g opacity="0.14" transform="translate(900, 180)">
    <!-- Outer eye shape -->
    <ellipse cx="0" cy="0" rx="50" ry="35" fill="none" stroke="#06b6d4" stroke-width="3"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="15" fill="#06b6d4" opacity="0.6"/>
    <!-- Highlight dot -->
    <circle cx="5" cy="-5" r="4" fill="#06b6d4"/>
    <!-- Iris pattern (thin lines) -->
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="-12" y1="-8" x2="12" y2="8" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="-12" y1="8" x2="12" y2="-8" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Category badge -->
  <rect x="60" y="180" width="120" height="32" rx="16" fill="#06b6d4" opacity="0.2"/>
  <text x="120" y="201" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Identity</text>

  <!-- Title (two lines) -->
  <text x="60" y="280" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">World Chain &amp; Proof of</text>
  <text x="60" y="335" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Personhood Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="390" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="20">Digital identity verification for the decentralized web</text>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="#0a0f1e" opacity="0.8"/>
  <text x="60" y="598" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">degen0x</text>
  <text x="170" y="598" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16">degen0x.com</text>
  <text x="1060" y="598" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="end">2026 Guide</text>
</svg>