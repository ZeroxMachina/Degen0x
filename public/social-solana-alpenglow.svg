<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="60%" style="stop-color:#0a0f20"/>
      <stop offset="100%" style="stop-color:#060b18"/>
    </linearGradient>
    <!-- Brand signature gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <!-- Title text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="60%" style="stop-color:#a5f3fc"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <!-- Glow for stat cards -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip path for card rounding -->
    <clipPath id="cardClip">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient glow orbs -->
  <circle cx="900" cy="120" r="200" fill="#6366f1" opacity="0.06"/>
  <circle cx="1050" cy="400" r="160" fill="#06b6d4" opacity="0.05"/>
  <circle cx="200" cy="500" r="140" fill="#4f46e5" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Speed visualization — circuit-like background lines (right side) -->
  <g opacity="0.12">
    <line x1="760" y1="100" x2="1140" y2="100" stroke="#06b6d4" stroke-width="1"/>
    <line x1="760" y1="140" x2="1140" y2="140" stroke="#06b6d4" stroke-width="1"/>
    <line x1="760" y1="180" x2="1140" y2="180" stroke="#06b6d4" stroke-width="1"/>
    <line x1="760" y1="220" x2="1140" y2="220" stroke="#6366f1" stroke-width="1"/>
    <line x1="760" y1="260" x2="1140" y2="260" stroke="#6366f1" stroke-width="1"/>
    <line x1="900" y1="100" x2="900" y2="320" stroke="#06b6d4" stroke-width="1"/>
    <line x1="980" y1="100" x2="980" y2="320" stroke="#6366f1" stroke-width="1"/>
    <line x1="1060" y1="100" x2="1060" y2="320" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <!-- degen0x logo mark (top-left) -->
  <g transform="translate(60, 44)">
    <circle cx="18" cy="18" r="18" fill="url(#logoGrad)" opacity="0.9"/>
    <text x="18" y="23" text-anchor="middle" font-family="monospace" font-weight="900" font-size="13" fill="white">0x</text>
  </g>
  <text x="92" y="62" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="15" fill="#8b949e" letter-spacing="0.04em">degen0x.com</text>

  <!-- Category tag -->
  <rect x="60" y="92" width="110" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="115" y="111" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#a5b4fc" letter-spacing="0.06em">LEARN GUIDE</text>

  <!-- Main title -->
  <text x="60" y="186" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="64" fill="url(#titleGrad)" letter-spacing="-0.02em">Solana Alpenglow</text>
  <text x="60" y="252" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="42" fill="#e6edf3" letter-spacing="-0.02em">100× faster block finality</text>

  <!-- Subtitle -->
  <text x="60" y="302" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="20" fill="#8b949e">Votor + Rotor replace PoH + Tower BFT — mainnet Q1–Q2 2026</text>

  <!-- Separator line -->
  <line x1="60" y1="328" x2="680" y2="328" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Stat cards row -->
  <!-- Card 1: Finality Before -->
  <rect x="60" y="348" width="180" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="150" y="390" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#6e7681" letter-spacing="0.06em">BEFORE</text>
  <text x="150" y="426" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="30" fill="#ef4444">12.8s</text>
  <text x="150" y="448" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#8b949e">finality</text>

  <!-- Arrow -->
  <text x="266" y="415" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.25)">→</text>

  <!-- Card 2: Finality After -->
  <rect x="292" y="348" width="180" height="110" rx="16" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="382" y="390" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#67e8f9" letter-spacing="0.06em">AFTER</text>
  <text x="382" y="426" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="30" fill="#22c55e">150ms</text>
  <text x="382" y="448" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#8b949e">finality</text>

  <!-- Card 3: Speed multiplier -->
  <rect x="508" y="348" width="180" height="110" rx="16" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="598" y="390" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#a5b4fc" letter-spacing="0.06em">SPEEDUP</text>
  <text x="598" y="426" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="30" fill="#818cf8">100×</text>
  <text x="598" y="448" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#8b949e">faster</text>

  <!-- Propagation card -->
  <rect x="60" y="472" width="180" height="80" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="150" y="502" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="11" fill="#6e7681" letter-spacing="0.06em">BLOCK PROPAGATION</text>
  <text x="150" y="532" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#06b6d4">18ms</text>

  <!-- Votor card -->
  <rect x="258" y="472" width="200" height="80" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="358" y="502" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="11" fill="#6e7681" letter-spacing="0.06em">NEW CONSENSUS</text>
  <text x="358" y="532" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="18" fill="#a5b4fc">Votor + Rotor</text>

  <!-- Mainnet card -->
  <rect x="476" y="472" width="212" height="80" rx="14" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="582" y="502" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="11" fill="#fcd34d" letter-spacing="0.06em">MAINNET LAUNCH</text>
  <text x="582" y="532" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="18" fill="#f59e0b">Q1–Q2 2026</text>

  <!-- Right side visual — abstract speed lines / signal burst -->
  <g transform="translate(750, 280)" opacity="0.85">
    <!-- Central node -->
    <circle cx="200" cy="150" r="28" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="200" cy="150" r="18" fill="rgba(99,102,241,0.2)" stroke="#818cf8" stroke-width="1"/>
    <text x="200" y="155" text-anchor="middle" font-family="monospace" font-weight="900" font-size="14" fill="#e0e7ff">SOL</text>

    <!-- Ring 1 (fast) -->
    <circle cx="200" cy="150" r="60" fill="none" stroke="rgba(6,182,212,0.2)" stroke-width="1" stroke-dasharray="4 6"/>
    <!-- Ring 2 (slow) -->
    <circle cx="200" cy="150" r="100" fill="none" stroke="rgba(99,102,241,0.12)" stroke-width="1" stroke-dasharray="3 9"/>

    <!-- Validator nodes -->
    <circle cx="200" cy="80" r="10" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="260" cy="115" r="10" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="260" cy="185" r="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="200" cy="220" r="10" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="140" cy="185" r="10" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="140" cy="115" r="10" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>

    <!-- Speed lines from center -->
    <line x1="200" y1="122" x2="200" y2="90" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
    <line x1="222" y1="133" x2="252" y2="118" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
    <line x1="222" y1="167" x2="252" y2="182" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
    <line x1="200" y1="178" x2="200" y2="212" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
    <line x1="178" y1="167" x2="148" y2="182" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
    <line x1="178" y1="133" x2="148" y2="118" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>

    <!-- Outer validators (Rotor layer) -->
    <circle cx="200" cy="38" r="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <circle cx="305" cy="88" r="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <circle cx="305" cy="212" r="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <circle cx="200" cy="262" r="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <circle cx="95" cy="212" r="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <circle cx="95" cy="88" r="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>

    <!-- Votor / Rotor labels -->
    <rect x="130" y="290" width="55" height="20" rx="10" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
    <text x="157" y="304" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#67e8f9">Votor</text>
    <rect x="213" y="290" width="55" height="20" rx="10" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
    <text x="240" y="304" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#fcd34d">Rotor</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="589" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="615" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="14" fill="#6e7681">degen0x.com/learn/solana-alpenglow-guide</text>
  <text x="1140" y="615" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="13" fill="#6e7681">2026</text>
</svg>
