<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tokenGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="tokenGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="tokenGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Top gradient bar -->
  <rect width="1200" height="8" fill="url(#topGradient)"/>

  <!-- Decorative circles background -->
  <circle cx="120" cy="380" r="100" fill="#4f46e5" opacity="0.08"/>
  <circle cx="980" cy="150" r="105" fill="#d97706" opacity="0.08"/>

  <!-- Logo area -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">
    degen0x
  </text>

  <!-- Main title -->
  <text x="40" y="150" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Crypto Airdrop
  </text>
  <text x="40" y="215" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Tracker
  </text>

  <!-- Subtitle -->
  <text x="40" y="270" font-family="Inter, sans-serif" font-size="22" fill="#8b949e">
    Never miss a token airdrop opportunity
  </text>

  <!-- Parachute and token drops visualization on right side -->
  <g opacity="0.85" filter="url(#glow)">
    <!-- Parachute 1 -->
    <path d="M 850 100 Q 835 115 820 120" stroke="#4f46e5" stroke-width="2" fill="none"/>
    <path d="M 850 100 Q 865 115 880 120" stroke="#4f46e5" stroke-width="2" fill="none"/>
    <path d="M 820 120 L 815 150" stroke="#4f46e5" stroke-width="1.5"/>
    <path d="M 880 120 L 885 150" stroke="#4f46e5" stroke-width="1.5"/>
    <circle cx="850" cy="160" r="16" fill="url(#tokenGradient1)" stroke="#4f46e5" stroke-width="2"/>
    <text x="846" y="167" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff">A</text>

    <!-- Parachute 2 -->
    <path d="M 940 90 Q 925 105 910 110" stroke="#0891b2" stroke-width="2" fill="none"/>
    <path d="M 940 90 Q 955 105 970 110" stroke="#0891b2" stroke-width="2" fill="none"/>
    <path d="M 910 110 L 905 140" stroke="#0891b2" stroke-width="1.5"/>
    <path d="M 970 110 L 975 140" stroke="#0891b2" stroke-width="1.5"/>
    <circle cx="940" cy="155" r="16" fill="url(#tokenGradient2)" stroke="#0891b2" stroke-width="2"/>
    <text x="936" y="162" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff">B</text>

    <!-- Parachute 3 -->
    <path d="M 1020 110 Q 1005 125 990 130" stroke="#d97706" stroke-width="2" fill="none"/>
    <path d="M 1020 110 Q 1035 125 1050 130" stroke="#d97706" stroke-width="2" fill="none"/>
    <path d="M 990 130 L 985 160" stroke="#d97706" stroke-width="1.5"/>
    <path d="M 1050 130 L 1055 160" stroke="#d97706" stroke-width="1.5"/>
    <circle cx="1020" cy="175" r="16" fill="url(#tokenGradient3)" stroke="#d97706" stroke-width="2"/>
    <text x="1016" y="182" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff">C</text>

    <!-- Falling drops -->
    <circle cx="880" cy="220" r="12" fill="#4f46e5" stroke="#0891b2" stroke-width="1.5" opacity="0.7"/>
    <circle cx="950" cy="200" r="12" fill="#0891b2" stroke="#4f46e5" stroke-width="1.5" opacity="0.7"/>
    <circle cx="1000" cy="240" r="12" fill="#d97706" stroke="#4f46e5" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Bottom branding -->
  <text x="40" y="595" font-family="Inter, sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">
    degen0x.com
  </text>

  <!-- Accent line -->
  <line x1="40" y1="300" x2="150" y2="300" stroke="url(#topGradient)" stroke-width="3" stroke-linecap="round"/>
</svg>