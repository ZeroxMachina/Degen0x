<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0e0d1f"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="60%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="statGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="chartBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.2"/>
    </linearGradient>
    <radialGradient id="blobCenter" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blobRight" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient blobs -->
  <ellipse cx="700" cy="350" rx="350" ry="280" fill="url(#blobCenter)"/>
  <ellipse cx="1100" cy="150" rx="220" ry="180" fill="url(#blobRight)"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#topBar)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="150" x2="1200" y2="150" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="450" x2="1200" y2="450" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- degen0x logo -->
  <circle cx="60" cy="52" r="20" fill="none" stroke="url(#topBar)" stroke-width="2"/>
  <text x="60" y="58" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#818cf8" text-anchor="middle">0x</text>
  <text x="90" y="58" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">degen0x</text>

  <!-- Category tag -->
  <rect x="60" y="90" width="108" height="26" rx="13" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="114" y="108" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">DEFI TRADING</text>

  <!-- Big stat — left side hero -->
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="88" font-weight="900" letter-spacing="-3" fill="url(#statGrad)">$342B</text>
  <text x="62" y="238" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#6e7681">Monthly on-chain options volume</text>

  <!-- Growth badge -->
  <rect x="62" y="258" width="145" height="30" rx="15" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="98" y="278" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#4ade80">▲ +872% YoY</text>

  <!-- Main title -->
  <text x="60" y="335" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" letter-spacing="-1.5" fill="url(#titleGrad)">DeFi Options Trading</text>
  <text x="60" y="385" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" letter-spacing="-1.5" fill="url(#titleGrad)">Guide 2026</text>

  <text x="60" y="420" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Derive · Stryke · Panoptic — strategies, risks &amp; platform comparison</text>

  <!-- Divider -->
  <line x1="60" y1="448" x2="500" y2="448" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Bottom row — 3 protocol chips -->
  <!-- Derive -->
  <rect x="60" y="465" width="230" height="100" rx="14" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <rect x="60" y="465" width="230" height="3" rx="2" fill="#6366f1"/>
  <text x="80" y="494" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Derive</text>
  <text x="80" y="516" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#818cf8">~70%</text>
  <text x="80" y="536" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">DeFi options market share</text>
  <text x="80" y="554" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">$369M+ monthly volume</text>

  <!-- Stryke -->
  <rect x="310" y="465" width="230" height="100" rx="14" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <rect x="310" y="465" width="230" height="3" rx="2" fill="#06b6d4"/>
  <text x="330" y="494" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Stryke</text>
  <text x="330" y="516" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4">40x</text>
  <text x="330" y="536" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">AMM LP fee multiplier</text>
  <text x="330" y="554" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Dual-earning model</text>

  <!-- Panoptic -->
  <rect x="560" y="465" width="230" height="100" rx="14" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <rect x="560" y="465" width="230" height="3" rx="2" fill="#f59e0b"/>
  <text x="580" y="494" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Panoptic</text>
  <text x="580" y="516" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="800" fill="#f59e0b">∞ Expiry</text>
  <text x="580" y="536" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Perpetual options</text>
  <text x="580" y="554" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Any Uni v3 pool</text>

  <!-- Right side: Payoff curve illustration -->
  <g transform="translate(820, 130)">
    <!-- Panel -->
    <rect x="0" y="0" width="320" height="360" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="160" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" text-anchor="middle">CALL OPTION PAYOFF</text>

    <!-- Axes -->
    <line x1="40" y1="270" x2="290" y2="270" stroke="#30363d" stroke-width="1.5"/>
    <line x1="40" y1="60" x2="40" y2="270" stroke="#30363d" stroke-width="1.5"/>

    <!-- Axis labels -->
    <text x="165" y="296" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">Underlying Price</text>
    <text x="20" y="165" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle" transform="rotate(-90,20,165)">P&amp;L</text>

    <!-- Strike price label -->
    <line x1="150" y1="60" x2="150" y2="275" stroke="rgba(245,158,11,0.4)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="150" y="305" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Strike</text>

    <!-- Payoff line — flat then rising -->
    <polyline
      points="40,240 150,240 290,100"
      fill="none"
      stroke="#22c55e"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- Area fill under payoff -->
    <polygon
      points="40,240 150,240 290,100 290,270 40,270"
      fill="rgba(34,197,94,0.08)"/>

    <!-- Max loss line -->
    <line x1="40" y1="240" x2="150" y2="240" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="90" y="233" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Max Loss = Premium</text>

    <!-- Unlimited upside label -->
    <text x="235" y="90" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#4ade80">Unlimited</text>
    <text x="235" y="103" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#4ade80">upside ↗</text>

    <!-- P&L calculator badge -->
    <rect x="55" y="318" width="210" height="30" rx="15" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="160" y="338" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle">⚡ P&amp;L Calculator Included</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.4)"/>
  <text x="1140" y="620" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681" text-anchor="end">degen0x.com</text>
</svg>
