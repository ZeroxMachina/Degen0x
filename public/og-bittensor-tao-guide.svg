<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="950" cy="150" r="180" fill="#6366f1" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="140" fill="#06b6d4" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Subnet network visualization (decorative) -->
  <!-- Central node -->
  <circle cx="980" cy="315" r="50" fill="none" stroke="#6366f140" stroke-width="2"/>
  <circle cx="980" cy="315" r="24" fill="#6366f115" stroke="#6366f160" stroke-width="1.5"/>
  <text x="980" y="321" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">TAO</text>

  <!-- Subnet nodes -->
  <line x1="980" y1="265" x2="980" y2="195" stroke="#6366f130" stroke-width="1"/>
  <circle cx="980" cy="185" r="18" fill="#6366f110" stroke="#6366f140" stroke-width="1"/>
  <text x="980" y="190" text-anchor="middle" fill="#818cf880" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">SN1</text>

  <line x1="1020" y1="345" x2="1080" y2="385" stroke="#06b6d430" stroke-width="1"/>
  <circle cx="1090" cy="392" r="18" fill="#06b6d410" stroke="#06b6d440" stroke-width="1"/>
  <text x="1090" y="397" text-anchor="middle" fill="#22d3ee80" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">SN18</text>

  <line x1="940" y1="345" x2="880" y2="395" stroke="#6366f130" stroke-width="1"/>
  <circle cx="870" cy="402" r="18" fill="#6366f110" stroke="#6366f140" stroke-width="1"/>
  <text x="870" y="407" text-anchor="middle" fill="#818cf880" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">SN62</text>

  <line x1="1025" y1="300" x2="1090" y2="270" stroke="#06b6d430" stroke-width="1"/>
  <circle cx="1100" cy="265" r="16" fill="#06b6d410" stroke="#06b6d440" stroke-width="1"/>

  <line x1="935" y1="300" x2="870" y2="260" stroke="#6366f130" stroke-width="1"/>
  <circle cx="860" cy="253" r="16" fill="#6366f110" stroke="#6366f140" stroke-width="1"/>

  <line x1="980" y1="365" x2="980" y2="430" stroke="#6366f130" stroke-width="1"/>
  <circle cx="980" cy="440" r="14" fill="#6366f110" stroke="#6366f130" stroke-width="1"/>

  <!-- Logo area -->
  <text x="60" y="62" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" letter-spacing="-0.02em">degen0x</text>

  <!-- Category badge -->
  <rect x="60" y="120" width="95" height="28" rx="6" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="107" y="139" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">AI &amp; Crypto</text>

  <rect x="165" y="120" width="55" height="28" rx="6" fill="#0ea5e920" stroke="#0ea5e940" stroke-width="1"/>
  <text x="192" y="139" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Learn</text>

  <!-- Title -->
  <text x="60" y="210" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Bittensor (TAO)</text>
  <text x="60" y="265" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="310" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">How AI subnets, miners, validators &amp; Yuma Consensus work</text>

  <!-- Stat cards row -->
  <!-- Card 1: Market Cap -->
  <rect x="60" y="360" width="170" height="80" rx="10" fill="#161b2280" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="390" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">MARKET CAP</text>
  <text x="80" y="420" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">$2.77B</text>

  <!-- Card 2: Subnets -->
  <rect x="245" y="360" width="170" height="80" rx="10" fill="#161b2280" stroke="#30363d" stroke-width="1"/>
  <text x="265" y="390" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">ACTIVE SUBNETS</text>
  <text x="265" y="420" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">128</text>

  <!-- Card 3: Supply -->
  <rect x="430" y="360" width="170" height="80" rx="10" fill="#161b2280" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="390" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">CIRCULATING</text>
  <text x="450" y="420" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">~9.6M TAO</text>

  <!-- Card 4: Halving -->
  <rect x="615" y="360" width="170" height="80" rx="10" fill="#161b2280" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="390" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">DAILY EMISSIONS</text>
  <text x="635" y="420" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">3,600/day</text>

  <!-- Flow diagram: Miners → Validators → Yuma → TAO -->
  <rect x="60" y="470" width="105" height="34" rx="8" fill="#6366f115" stroke="#6366f140" stroke-width="1"/>
  <text x="112" y="492" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Miners</text>

  <text x="178" y="492" fill="#30363d" font-family="Inter, system-ui, sans-serif" font-size="16">→</text>

  <rect x="196" y="470" width="120" height="34" rx="8" fill="#06b6d415" stroke="#06b6d440" stroke-width="1"/>
  <text x="256" y="492" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Validators</text>

  <text x="329" y="492" fill="#30363d" font-family="Inter, system-ui, sans-serif" font-size="16">→</text>

  <rect x="347" y="470" width="150" height="34" rx="8" fill="#6366f115" stroke="#6366f140" stroke-width="1"/>
  <text x="422" y="492" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Yuma Consensus</text>

  <text x="510" y="492" fill="#30363d" font-family="Inter, system-ui, sans-serif" font-size="16">→</text>

  <rect x="528" y="470" width="120" height="34" rx="8" fill="#22c55e15" stroke="#22c55e40" stroke-width="1"/>
  <text x="588" y="492" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">TAO Rewards</text>

  <!-- Topic pills -->
  <rect x="60" y="530" width="70" height="24" rx="12" fill="#6366f115" stroke="#6366f130" stroke-width="1"/>
  <text x="95" y="546" text-anchor="middle" fill="#818cf880" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Subnets</text>

  <rect x="140" y="530" width="70" height="24" rx="12" fill="#06b6d415" stroke="#06b6d430" stroke-width="1"/>
  <text x="175" y="546" text-anchor="middle" fill="#22d3ee80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Halving</text>

  <rect x="220" y="530" width="90" height="24" rx="12" fill="#6366f115" stroke="#6366f130" stroke-width="1"/>
  <text x="265" y="546" text-anchor="middle" fill="#818cf880" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">ETF Filings</text>

  <rect x="320" y="530" width="95" height="24" rx="12" fill="#06b6d415" stroke="#06b6d430" stroke-width="1"/>
  <text x="367" y="546" text-anchor="middle" fill="#22d3ee80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Decentralized AI</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#080d1c"/>
  <rect x="0" y="590" width="1200" height="1" fill="#30363d"/>
  <text x="60" y="616" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">degen0x.com</text>
  <text x="1140" y="616" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400">March 2026</text>
</svg>