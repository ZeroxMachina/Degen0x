<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="eth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="ethVert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e40c9"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="250" cy="280" r="300" fill="#6e40c9" opacity="0.06"/>
  <circle cx="900" cy="400" r="250" fill="#1f6feb" opacity="0.05"/>
  <circle cx="600" cy="100" r="200" fill="#3fb950" opacity="0.03"/>

  <!-- Top accent bar -->
