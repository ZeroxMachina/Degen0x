  <!-- EIP comparison panel -->
  <g transform="translate(760, 110)">
    <rect x="0" y="0" width="370" height="240" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">KEY EIPS IN PECTRA</text>

    <!-- EIP rows -->
    <rect x="24" y="55" width="322" height="36" rx="8" fill="rgba(110,64,201,0.15)" stroke="rgba(110,64,201,0.3)" stroke-width="1"/>
    <text x="40" y="78" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#a371f7">EIP-7702</text>
    <text x="140" y="78" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e6edf3">Smart Wallets for All</text>

    <rect x="24" y="100" width="322" height="36" rx="8" fill="rgba(31,111,235,0.15)" stroke="rgba(31,111,235,0.3)" stroke-width="1"/>
    <text x="40" y="123" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#58a6ff">EIP-7251</text>
    <text x="140" y="123" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e6edf3">Validators → 2048 ETH</text>

    <rect x="24" y="145" width="322" height="36" rx="8" fill="rgba(63,185,80,0.15)" stroke="rgba(63,185,80,0.3)" stroke-width="1"/>
    <text x="40" y="168" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3fb950">EIP-7691</text>
    <text x="140" y="168" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e6edf3">2× Blob Throughput</text>

    <rect x="24" y="190" width="322" height="36" rx="8" fill="rgba(227,179,65,0.15)" stroke="rgba(227,179,65,0.3)" stroke-width="1"/>
    <text x="40" y="213" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#e3b341">+8 more</text>
    <text x="140" y="213" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e6edf3">Deposits, BLS, Requests</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(760, 380)">
    <rect x="0" y="0" width="175" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b949e" letter-spacing="1">TOTAL EIPS</text>
    <text x="20" y="60" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#a371f7">11</text>

    <rect x="195" y="0" width="175" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="215" y="30" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b949e" letter-spacing="1">TARGET</text>
    <text x="215" y="60" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#3fb950">Apr 2026</text>
  </g>

  <!-- Title -->
  <text x="60" y="180" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="url(#eth)">Ethereum Pectra</text>
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="url(#eth)">Upgrade Guide</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">EIP-7702 Smart Wallets · 2048 ETH Validators · 2× Blobs</text>

  <!-- Ethereum diamond icon (simplified) -->
  <g transform="translate(60, 340)">
    <polygon points="40,0 80,40 40,55 0,40" fill="url(#ethVert)" opacity="0.3"/>
    <polygon points="40,60 80,44 40,80 0,44" fill="url(#ethVert)" opacity="0.5"/>
  </g>
  <text x="160" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Ethereum's biggest upgrade since The Merge</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="624" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681">degen0x.com/learn/ethereum-pectra-upgrade-guide</text>
  <text x="1140" y="624" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" text-anchor="end">2026</text>
</svg>
