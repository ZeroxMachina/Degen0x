<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="aaveGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#b6509e"/>
      <stop offset="100%" stop-color="#2ebac6"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="70"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glows -->
  <circle cx="150" cy="400" r="280" fill="#b6509e" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="900" cy="180" r="260" fill="#2ebac6" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="600" cy="500" r="200" fill="#6366f1" opacity="0.05" filter="url(#blur1)"/>

  <!-- Grid pattern -->
  <g opacity="0.025" stroke="#ffffff" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
  </g>

  <!-- Logo -->
  <g transform="translate(80, 48)">
    <circle cx="20" cy="20" r="18" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>
    <text x="20" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#6366f1">0x</text>
  </g>
  <text x="125" y="66" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="106" width="130" height="28" rx="14" fill="#6366f118" stroke="#6366f138" stroke-width="1"/>
  <text x="145" y="125" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#6366f1">DeFi Lending</text>

  <rect x="220" y="106" width="100" height="28" rx="14" fill="#22c55e18" stroke="#22c55e38" stroke-width="1"/>
  <text x="270" y="125" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e">Reviews</text>

  <!-- Main title -->
  <text x="80" y="200" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.03em">DeFi Lending Protocols</text>
  <text x="80" y="258" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="700" fill="url(#accent)" letter-spacing="-0.02em">Aave · Compound · Morpho</text>

  <!-- Subtitle -->
  <text x="80" y="302" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">Independent reviews — fees, collateral, liquidation risk, and who each is best for</text>

  <!-- Protocol Cards (3 side by side) -->

  <!-- AAVE Card -->
  <g transform="translate(80, 338)">
    <rect x="0" y="0" width="310" height="186" rx="14" fill="rgba(182,80,158,0.08)" stroke="rgba(182,80,158,0.2)" stroke-width="1"/>
    <!-- Aave ghost logo approximation -->
    <circle cx="34" cy="34" r="22" fill="rgba(182,80,158,0.15)"/>
    <text x="34" y="41" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#b6509e">A</text>
    <text x="68" y="38" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#b6509e">Aave V3</text>
    <rect x="16" y="66" width="278" height="1" fill="rgba(255,255,255,0.06)"/>
    <text x="16" y="90" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">TVL</text>
    <text x="290" y="90" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">~$15B</text>
    <text x="16" y="114" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">USDC Supply APY</text>
    <text x="290" y="114" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e">4.8%</text>
    <text x="16" y="138" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Chains</text>
    <text x="290" y="138" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">ETH · ARB · Base+</text>
    <text x="16" y="166" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Best for multi-chain lending</text>
    <circle cx="288" cy="162" r="6" fill="#22c55e" opacity="0.85"/>
  </g>

  <!-- COMPOUND Card -->
  <g transform="translate(410, 338)">
    <rect x="0" y="0" width="310" height="186" rx="14" fill="rgba(0,210,100,0.07)" stroke="rgba(0,210,100,0.2)" stroke-width="1"/>
    <circle cx="34" cy="34" r="22" fill="rgba(0,210,100,0.15)"/>
    <text x="34" y="41" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#00d264">C</text>
    <text x="68" y="38" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#00d264">Compound III</text>
    <rect x="16" y="66" width="278" height="1" fill="rgba(255,255,255,0.06)"/>
    <text x="16" y="90" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">TVL</text>
    <text x="290" y="90" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">~$3.2B</text>
    <text x="16" y="114" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">USDC Supply APY</text>
    <text x="290" y="114" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e">5.1%</text>
    <text x="16" y="138" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Architecture</text>
    <text x="290" y="138" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Comet (1 asset/mkt)</text>
    <text x="16" y="166" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Best for USDC yield</text>
    <circle cx="288" cy="162" r="6" fill="#22c55e" opacity="0.85"/>
  </g>

  <!-- MORPHO Card -->
  <g transform="translate(740, 338)">
    <rect x="0" y="0" width="380" height="186" rx="14" fill="rgba(99,102,241,0.09)" stroke="rgba(99,102,241,0.22)" stroke-width="1"/>
    <circle cx="34" cy="34" r="22" fill="rgba(99,102,241,0.18)"/>
    <text x="34" y="41" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#6366f1">M</text>
    <text x="68" y="38" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#6366f1">Morpho</text>
    <rect x="16" y="66" width="348" height="1" fill="rgba(255,255,255,0.06)"/>
    <text x="16" y="90" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">TVL</text>
    <text x="360" y="90" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">~$4.8B</text>
    <text x="16" y="114" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">USDC Vault APY</text>
    <text x="360" y="114" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e">6.2%</text>
    <text x="16" y="138" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Model</text>
    <text x="360" y="138" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Blue + MetaMorpho vaults</text>
    <text x="16" y="166" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Best optimizer yield right now</text>
    <rect x="334" y="154" width="42" height="18" rx="9" fill="#f59e0b22" stroke="#f59e0b44" stroke-width="1"/>
    <text x="355" y="167" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#f59e0b">TOP</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="598" width="1200" height="32" fill="rgba(255,255,255,0.02)"/>
  <text x="80" y="619" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com/defi-lending/reviews</text>
  <text x="1120" y="619" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">March 2026</text>
</svg>
