<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="1000" cy="180" r="200" fill="#6366f1" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="140" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="850" cy="480" r="120" fill="#f59e0b" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Shield icon (inheritance/protection theme) -->
  <g transform="translate(860, 120)">
    <path d="M60 0 L120 30 L120 75 C120 120 90 150 60 165 C30 150 0 120 0 75 L0 30 Z" fill="#6366f112" stroke="#6366f140" stroke-width="2"/>
    <path d="M60 15 L105 38 L105 75 C105 110 82 135 60 147 C38 135 15 110 15 75 L15 38 Z" fill="#6366f108" stroke="#6366f125" stroke-width="1"/>
    <!-- Lock icon inside shield -->
    <rect x="42" y="68" width="36" height="28" rx="4" fill="#818cf8" opacity="0.3" stroke="#818cf8" stroke-width="1.5"/>
    <path d="M48 68 L48 55 C48 45 52 38 60 38 C68 38 72 45 72 55 L72 68" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="82" r="4" fill="#e6edf3"/>
  </g>

  <!-- Key chain visualization -->
  <g transform="translate(1020, 130)">
    <!-- Key 1 -->
    <rect x="0" y="0" width="130" height="48" rx="10" fill="#161b22" stroke="#22c55e30" stroke-width="1"/>
    <text x="15" y="20" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">KEY 1 — HEIR</text>
    <text x="15" y="38" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9">Multi-sig signer</text>
    <circle cx="115" cy="24" r="8" fill="#22c55e20" stroke="#22c55e" stroke-width="1"/>
    <text x="115" y="28" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="10">✓</text>

    <!-- Key 2 -->
    <rect x="0" y="60" width="130" height="48" rx="10" fill="#161b22" stroke="#6366f130" stroke-width="1"/>
    <text x="15" y="80" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">KEY 2 — EXECUTOR</text>
    <text x="15" y="98" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9">Attorney/Trustee</text>
    <circle cx="115" cy="84" r="8" fill="#6366f120" stroke="#6366f1" stroke-width="1"/>
    <text x="115" y="88" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="10">✓</text>

    <!-- Key 3 -->
    <rect x="0" y="120" width="130" height="48" rx="10" fill="#161b22" stroke="#06b6d430" stroke-width="1"/>
    <text x="15" y="140" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">KEY 3 — BACKUP</text>
    <text x="15" y="158" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9">Casa / Vault</text>
    <circle cx="115" cy="144" r="8" fill="#06b6d420" stroke="#06b6d4" stroke-width="1"/>
    <text x="115" y="148" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="10">✓</text>
  </g>

  <!-- Stats card -->
  <rect x="860" y="330" width="290" height="80" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="880" y="358" fill="#f85149" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">AT RISK</text>
  <text x="880" y="390" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">$30B+</text>
  <text x="1020" y="390" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">locked in</text>
  <text x="1020" y="405" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">inaccessible wallets</text>

  <!-- Tax info card -->
  <rect x="860" y="425" width="290" height="65" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="880" y="450" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">2026 ESTATE EXEMPTION</text>
  <text x="880" y="478" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">~$7M</text>
  <text x="965" y="478" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">(down from $13M)</text>

  <!-- Logo area -->
  <text x="60" y="62" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" letter-spacing="-0.02em">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="120" width="105" height="28" rx="6" fill="#3d264520" stroke="#d2a8ff40" stroke-width="1"/>
  <text x="112" y="139" text-anchor="middle" fill="#d2a8ff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Estate Plan</text>

  <rect x="175" y="120" width="75" height="28" rx="6" fill="#f59e0b20" stroke="#f59e0b40" stroke-width="1"/>
  <text x="212" y="139" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Beginner</text>

  <rect x="260" y="120" width="55" height="28" rx="6" fill="#0ea5e920" stroke="#0ea5e940" stroke-width="1"/>
  <text x="287" y="139" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Learn</text>

  <!-- Title -->
  <text x="60" y="215" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">Crypto Inheritance</text>
  <text x="60" y="272" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">Planning 2026</text>

  <!-- Subtitle -->
  <text x="60" y="320" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Protect your Bitcoin, Ethereum &amp; altcoins</text>
  <text x="60" y="348" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">for your heirs with multi-sig, trusts &amp; Casa</text>

  <!-- Feature pills -->
  <rect x="60" y="385" width="100" height="32" rx="16" fill="#6366f115" stroke="#6366f135" stroke-width="1"/>
  <text x="110" y="406" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Multi-Sig</text>

  <rect x="175" y="385" width="120" height="32" rx="16" fill="#22c55e15" stroke="#22c55e35" stroke-width="1"/>
  <text x="235" y="406" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Casa Protocol</text>

  <rect x="310" y="385" width="130" height="32" rx="16" fill="#06b6d415" stroke="#06b6d435" stroke-width="1"/>
  <text x="375" y="406" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Dead Man Switch</text>

  <rect x="455" y="385" width="100" height="32" rx="16" fill="#f59e0b15" stroke="#f59e0b35" stroke-width="1"/>
  <text x="505" y="406" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Tax Guide</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0f1e"/>
  <rect x="0" y="590" width="1200" height="1" fill="#30363d"/>
  <text x="60" y="616" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">degen0x.com</text>
  <text x="1140" y="616" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400">Compare · Review · DYOR</text>
</svg>