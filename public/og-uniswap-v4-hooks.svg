  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com/learn/uniswap-v4-hooks-guide</text>
