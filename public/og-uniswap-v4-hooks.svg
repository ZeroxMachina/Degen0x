  <text x="80" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">CUMULATIVE VOL</text>
  <text x="80" y="472" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#ff007a">$180B+</text>

  <rect x="220" y="420" width="140" height="64" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="240" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">HOOKS BUILT</text>
  <text x="240" y="472" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#06b6d4">2,500+</text>

  <rect x="380" y="420" width="140" height="64" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
