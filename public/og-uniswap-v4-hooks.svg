  <text x="715" y="491" font-family="monospace" font-size="10" fill="#818cf8" text-anchor="middle">beforeSwap()</text>

  <rect x="800" y="470" width="130" height="32" rx="6" fill="#06b6d420" stroke="#06b6d440"/>
  <text x="865" y="491" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">afterSwap()</text>

  <!-- Arrows -->
  <line x1="750" y1="454" x2="715" y2="470" stroke="#30363d" stroke-width="1.5"/>
  <line x1="830" y1="454" x2="865" y2="470" stroke="#30363d" stroke-width="1.5"/>

