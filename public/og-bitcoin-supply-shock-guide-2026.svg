<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1530"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="btcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="180" r="220" fill="#f59e0b" opacity="0.03"/>
  <circle cx="900" cy="400" r="160" fill="#ef4444" opacity="0.03"/>

  <!-- Supply Chart Visualization (right side) -->
  <g transform="translate(720, 120)">
    <!-- Chart area -->
    <rect x="0" y="0" width="400" height="320" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Y axis labels -->
    <text x="15" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">3.5M</text>
    <text x="15" y="110" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">3.0M</text>
    <text x="15" y="180" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">2.75M</text>
    <!-- Grid lines -->
    <line x1="50" y1="35" x2="380" y2="35" stroke="#21262d" stroke-width="1"/>
    <line x1="50" y1="105" x2="380" y2="105" stroke="#21262d" stroke-width="1"/>
    <line x1="50" y1="175" x2="380" y2="175" stroke="#21262d" stroke-width="1"/>
    <!-- Downward curve (exchange reserves declining) -->
    <path d="M60,55 C120,58 180,80 220,105 S300,155 380,175" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <path d="M60,55 C120,58 180,80 220,105 S300,155 380,175 L380,300 L60,300 Z" fill="url(#btcGrad)" opacity="0.3"/>
    <!-- Current value dot -->
    <circle cx="380" cy="175" r="5" fill="#ef4444"/>
    <text x="350" y="200" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ef4444" font-weight="600">2.75M BTC</text>
    <!-- Chart title -->
    <text x="200" y="260" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Exchange Reserves (2019–2026)</text>
    <!-- X axis labels -->
    <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">2019</text>
    <text x="220" y="290" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">2023</text>
    <text x="370" y="290" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">2026</text>
  </g>

  <!-- Logo -->
  <circle cx="80" cy="60" r="20" fill="none" stroke="#818cf8" stroke-width="2"/>
  <text x="80" y="67" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#818cf8" text-anchor="middle" font-weight="800">0x</text>

  <!-- Category badge -->
  <rect x="60" y="140" width="72" height="24" rx="12" fill="#f59e0b"/>
  <text x="96" y="156" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0d1117" text-anchor="middle" font-weight="600">BITCOIN</text>

  <!-- Title -->
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="46" fill="url(#titleGrad)" font-weight="800" letter-spacing="-1">Bitcoin Supply</text>
  <text x="60" y="265" font-family="Inter, system-ui, sans-serif" font-size="46" fill="#e6edf3" font-weight="800" letter-spacing="-1">Shock 2026</text>

  <!-- Subtitle -->
  <text x="60" y="310" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">Exchange Reserves · ETF Custody · Price Impact</text>

  <!-- Stats row -->
  <rect x="60" y="350" width="155" height="65" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="75" y="375" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Exchange Reserves</text>
  <text x="75" y="400" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ef4444" font-weight="700">7yr Low</text>

  <rect x="230" y="350" width="155" height="65" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="245" y="375" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">ETF Holdings</text>
  <text x="245" y="400" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#f59e0b" font-weight="700">1.3M BTC</text>

  <rect x="400" y="350" width="155" height="65" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="415" y="375" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Lost Forever</text>
  <text x="415" y="400" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#6e7681" font-weight="700">3.7M BTC</text>

  <!-- Bitcoin symbol decoration -->
  <text x="620" y="500" font-family="Inter, system-ui, sans-serif" font-size="120" fill="#f59e0b" opacity="0.04" font-weight="900">₿</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="615" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">Complete Analysis · March 2026</text>
</svg>