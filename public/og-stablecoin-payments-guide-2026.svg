<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="300" cy="280" r="260" fill="#06b6d4" opacity="0.06"/>
  <circle cx="900" cy="380" r="220" fill="#22c55e" opacity="0.05"/>
  <circle cx="600" cy="500" r="160" fill="#6366f1" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo area -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="2">degen0x</text>

  <!-- Comparison panel: Wire vs Stablecoin -->
  <g transform="translate(780, 120)">
    <rect x="0" y="0" width="340" height="220" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">WIRE vs STABLECOIN</text>

    <!-- Wire transfer row -->
    <text x="24" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">SWIFT Wire</text>
    <text x="24" y="90" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Speed:</text>
    <text x="100" y="90" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444">2-5 days</text>
    <text x="24" y="110" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Cost:</text>
    <text x="100" y="110" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444">$75-$200</text>

    <!-- Divider -->
    <line x1="24" y1="125" x2="316" y2="125" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Stablecoin row -->
    <text x="24" y="150" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">USDC on Solana</text>
    <text x="24" y="170" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Speed:</text>
    <text x="100" y="170" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">&lt;1 second</text>
    <text x="24" y="190" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Cost:</text>
    <text x="100" y="190" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">$0.001</text>
    <text x="24" y="210" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Avail:</text>
    <text x="100" y="210" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">24/7/365</text>
  </g>

  <!-- Category badges -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1"/>
    <text x="50" y="19" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4" text-anchor="middle">Stablecoins</text>
    <rect x="110" y="0" width="80" height="28" rx="14" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1"/>
    <text x="150" y="19" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Beginner</text>
  </g>

  <!-- Title -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#accent)" letter-spacing="-1">Stablecoin Payments</text>
  <text x="60" y="295" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="url(#accent)" letter-spacing="-1">GENIUS Act &amp; Cross-Border</text>

  <!-- Subtitle -->
  <text x="60" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">How on-chain dollars are replacing wire transfers in 2026</text>

  <!-- Key stats -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="190" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">2025 VOLUME</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#22c55e">$31T</text>
  </g>
  <g transform="translate(270, 390)">
    <rect x="0" y="0" width="190" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">GENIUS ACT</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#06b6d4">Signed</text>
  </g>
  <g transform="translate(480, 390)">
    <rect x="0" y="0" width="190" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">SETTLEMENT</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f59e0b">&lt;1 sec</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>