  <text x="80" y="508" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">Day 23</text>

  <rect x="340" y="445" width="260" height="80" rx="14" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="360" y="475" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">QUEUE STATUS</text>
  <text x="360" y="508" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#4ade80">0 Remaining</text>

  <rect x="620" y="445" width="260" height="80" rx="14" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
