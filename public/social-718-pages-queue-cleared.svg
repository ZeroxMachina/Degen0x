  <!-- Big number -->
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="900" fill="url(#numGrad)" filter="url(#glow2)" letter-spacing="-0.04em">718</text>

  <!-- Title -->
