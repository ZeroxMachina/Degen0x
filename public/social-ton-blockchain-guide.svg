<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="60%" style="stop-color:#0a1228"/>
      <stop offset="100%" style="stop-color:#060b18"/>
    </linearGradient>
    <!-- TON blue accent gradient -->
    <linearGradient id="tonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0098ea"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- Brand signature gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6edf3"/>
      <stop offset="60%" style="stop-color:#0098ea"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Card glass -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative background blobs -->
  <circle cx="900" cy="120" r="220" fill="#0098ea" opacity="0.06"/>
  <circle cx="1050" cy="420" r="160" fill="#06b6d4" opacity="0.05"/>
  <circle cx="150" cy="500" r="180" fill="#4f46e5" opacity="0.05"/>
  <circle cx="600" cy="315" r="300" fill="#0891b2" opacity="0.03"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- TON diamond logo (large, right side) -->
  <g transform="translate(870, 200)" filter="url(#softGlow)" opacity="0.9">
    <!-- Outer diamond shape -->
    <polygon points="130,0 260,130 130,260 0,130" fill="url(#tonGrad)" opacity="0.15"/>
    <polygon points="130,0 260,130 130,260 0,130" fill="none" stroke="#0098ea" stroke-width="1.5" opacity="0.4"/>
    <!-- Inner TON diamond -->
    <polygon points="130,30 230,130 130,230 30,130" fill="url(#tonGrad)" opacity="0.2"/>
    <!-- TON text in center -->
    <text x="130" y="145" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="#0098ea" text-anchor="middle" opacity="0.9">TON</text>
    <!-- Diamond accent lines -->
    <line x1="130" y1="0" x2="130" y2="260" stroke="#0098ea" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="130" x2="260" y2="130" stroke="#0098ea" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Network dots — simulating 900M user nodes -->
  <g opacity="0.25">
    <!-- Orbit rings around TON logo area -->
    <circle cx="1000" cy="330" r="180" fill="none" stroke="#0098ea" stroke-width="0.8" stroke-dasharray="4 8"/>
    <circle cx="1000" cy="330" r="230" fill="none" stroke="#06b6d4" stroke-width="0.5" stroke-dasharray="2 12"/>
    <!-- Dots on orbits -->
    <circle cx="820" cy="330" r="3" fill="#0098ea"/>
    <circle cx="1000" cy="150" r="3" fill="#0098ea"/>
    <circle cx="1180" cy="330" r="3" fill="#06b6d4"/>
    <circle cx="1000" cy="510" r="3" fill="#06b6d4"/>
    <circle cx="870" cy="205" r="2.5" fill="#0098ea" opacity="0.8"/>
    <circle cx="1130" cy="205" r="2.5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="870" cy="455" r="2.5" fill="#0098ea" opacity="0.8"/>
    <circle cx="1130" cy="455" r="2.5" fill="#06b6d4" opacity="0.8"/>
  </g>

  <!-- Left content area -->
  <!-- degen0x logo text -->
  <text x="64" y="72" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.5">degen0x</text>
  <text x="64" y="92" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#8b949e" letter-spacing="1">degen0x.com</text>

  <!-- Divider -->
  <rect x="64" y="108" width="40" height="2" fill="url(#tonGrad)" rx="1"/>

  <!-- GUIDE label -->
  <rect x="64" y="128" width="90" height="26" rx="13" fill="#0098ea" opacity="0.15"/>
  <rect x="64" y="128" width="90" height="26" rx="13" fill="none" stroke="#0098ea" stroke-width="1" opacity="0.4"/>
  <text x="109" y="145" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#0098ea" text-anchor="middle" letter-spacing="1">GUIDE</text>

  <!-- Main title -->
  <text x="64" y="222" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900" fill="url(#titleGrad)" letter-spacing="-1.5">TON</text>
  <text x="64" y="295" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900" fill="#e6edf3" letter-spacing="-1.5">BLOCKCHAIN</text>
  <text x="64" y="368" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900" fill="#e6edf3" letter-spacing="-1.5">GUIDE</text>

  <!-- Subtitle -->
  <text x="64" y="410" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" fill="#8b949e">The crypto network hiding inside Telegram</text>

  <!-- Stat pills -->
  <!-- Pill 1: 900M Users -->
  <rect x="64" y="444" width="160" height="44" rx="10" fill="rgba(0,152,234,0.12)" stroke="rgba(0,152,234,0.3)" stroke-width="1"/>
  <text x="144" y="462" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0098ea" text-anchor="middle">900M+</text>
  <text x="144" y="479" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#8b949e" text-anchor="middle">Telegram Users</text>

  <!-- Pill 2: Top-10 Cap -->
  <rect x="236" y="444" width="160" height="44" rx="10" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="316" y="462" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#06b6d4" text-anchor="middle">TOP 10</text>
  <text x="316" y="479" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#8b949e" text-anchor="middle">Market Cap</text>

  <!-- Pill 3: Built-in Wallet -->
  <rect x="408" y="444" width="170" height="44" rx="10" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="493" y="462" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#a5b4fc" text-anchor="middle">TON SPACE</text>
  <text x="493" y="479" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#8b949e" text-anchor="middle">Built-in Wallet</text>

  <!-- Bottom bar -->
  <rect x="0" y="582" width="1200" height="48" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="582" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="64" y="611" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="64" y="611" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#8b949e" x="180">  /learn/ton-blockchain-guide</text>
  <text x="180" y="611" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#8b949e">/learn/ton-blockchain-guide</text>

  <!-- Telegram icon hint (bottom right) -->
  <text x="1120" y="611" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#0098ea" text-anchor="end">✈ Telegram Native</text>
</svg>
