<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9945ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />

  <!-- Accent Bar -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGradient)" />

  <!-- Decorative circles -->
  <circle cx="100" cy="200" r="60" fill="#9945ff" opacity="0.08" />
  <circle cx="1050" cy="500" r="90" fill="#4f46e5" opacity="0.06" />

  <!-- Three protocol columns -->
  <!-- Marinade column -->
  <g opacity="0.5">
    <rect x="120" y="180" width="160" height="200" rx="12" fill="none" stroke="#9945ff" stroke-width="2"/>
    <text x="200" y="220" font-size="20" font-weight="bold" fill="#9945ff" text-anchor="middle" font-family="Inter">Marinade</text>
    <text x="200" y="250" font-size="14" fill="#8b949e" text-anchor="middle" font-family="Inter">Liquid Staking</text>
    <circle cx="200" cy="310" r="35" fill="#9945ff" opacity="0.2" stroke="#9945ff" stroke-width="1"/>
  </g>

  <!-- Jito column -->
  <g opacity="0.6">
    <rect x="380" y="160" width="160" height="240" rx="12" fill="none" stroke="#4f46e5" stroke-width="2.5"/>
    <text x="460" y="210" font-size="20" font-weight="bold" fill="#4f46e5" text-anchor="middle" font-family="Inter">Jito</text>
    <text x="460" y="240" font-size="14" fill="#8b949e" text-anchor="middle" font-family="Inter">MEV + Staking</text>
    <circle cx="460" cy="320" r="40" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  </g>

  <!-- Sanctum column -->
  <g opacity="0.5">
    <rect x="640" y="180" width="160" height="200" rx="12" fill="none" stroke="#0891b2" stroke-width="2"/>
    <text x="720" y="220" font-size="20" font-weight="bold" fill="#0891b2" text-anchor="middle" font-family="Inter">Sanctum</text>
    <text x="720" y="250" font-size="14" fill="#8b949e" text-anchor="middle" font-family="Inter">Pooled Staking</text>
    <circle cx="720" cy="310" r="35" fill="#0891b2" opacity="0.2" stroke="#0891b2" stroke-width="1"/>
  </g>

  <!-- Solana-themed decoration -->
  <g opacity="0.3">
    <path d="M 900 200 L 950 250 L 900 300" fill="none" stroke="#9945ff" stroke-width="2"/>
    <path d="M 950 200 L 1000 250 L 950 300" fill="none" stroke="#9945ff" stroke-width="2"/>
  </g>

  <!-- Category Badge -->
  <rect x="60" y="480" width="160" height="32" rx="16" fill="#9945ff" opacity="0.2" stroke="#9945ff" stroke-width="1.5"/>
  <text x="140" y="502" font-size="13" fill="#9945ff" text-anchor="middle" font-family="Inter" font-weight="600">LIQUID STAKING</text>

  <!-- Main Title -->
  <text x="70" y="560" font-size="52" font-weight="bold" fill="url(#titleGradient)" font-family="Inter">Marinade vs Jito vs Sanctum</text>

  <!-- Subtitle -->
  <text x="70" y="600" font-size="18" fill="#8b949e" font-family="Inter">Solana LST Comparison 2026</text>

  <!-- degen0x branding -->
  <text x="1100" y="600" font-size="14" fill="#8b949e" text-anchor="end" font-family="Inter" font-weight="600">degen0x</text>
</svg>