<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative identity nodes -->
  <circle cx="900" cy="250" r="180" fill="none" stroke="#a855f7" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="900" cy="250" r="120" fill="none" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="900" cy="250" r="60" fill="#a855f7" opacity="0.06"/>

  <!-- Identity chain nodes -->
  <g fill="none" stroke-width="1.5">
    <circle cx="840" cy="170" r="20" stroke="#6366f1" stroke-opacity="0.3" fill="rgba(99,102,241,0.08)"/>
    <text x="840" y="175" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6366f1" text-anchor="middle" opacity="0.5">ENS</text>

    <circle cx="970" cy="160" r="20" stroke="#a855f7" stroke-opacity="0.3" fill="rgba(168,85,247,0.08)"/>
    <text x="970" y="165" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#a855f7" text-anchor="middle" opacity="0.5">SBT</text>

    <circle cx="1020" cy="280" r="20" stroke="#06b6d4" stroke-opacity="0.3" fill="rgba(6,182,212,0.08)"/>
    <text x="1020" y="285" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#06b6d4" text-anchor="middle" opacity="0.5">EAS</text>

    <circle cx="960" cy="360" r="20" stroke="#22c55e" stroke-opacity="0.3" fill="rgba(34,197,94,0.08)"/>
    <text x="960" y="365" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle" opacity="0.5">DID</text>

    <circle cx="820" cy="330" r="20" stroke="#f59e0b" stroke-opacity="0.3" fill="rgba(245,158,11,0.08)"/>
    <text x="820" y="335" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" opacity="0.5">PoP</text>

    <!-- Connection lines -->
    <line x1="860" y1="175" x2="950" y2="165" stroke="#8b949e" stroke-opacity="0.1"/>
    <line x1="975" y1="180" x2="1010" y2="260" stroke="#8b949e" stroke-opacity="0.1"/>
    <line x1="1010" y1="300" x2="970" y2="340" stroke="#8b949e" stroke-opacity="0.1"/>
    <line x1="940" y1="360" x2="840" y2="335" stroke="#8b949e" stroke-opacity="0.1"/>
    <line x1="830" y1="310" x2="845" y2="190" stroke="#8b949e" stroke-opacity="0.1"/>
  </g>

  <!-- Fingerprint icon (abstract) -->
  <g transform="translate(900, 250)" stroke="#a855f7" stroke-opacity="0.15" fill="none" stroke-width="1.5">
    <path d="M-30 0 A30 30 0 0 1 30 0"/>
    <path d="M-20 8 A20 20 0 0 1 20 8"/>
    <path d="M-10 -8 A15 15 0 0 1 10 -8"/>
  </g>

  <!-- degen0x logo text -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#818cf8" opacity="0.9">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="140" width="100" height="30" rx="15" fill="#a855f7" opacity="0.2"/>
  <text x="110" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a855f7" text-anchor="middle">Identity</text>

  <rect x="170" y="140" width="80" height="30" rx="15" fill="#6366f1" opacity="0.2"/>
  <text x="210" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle">Web3</text>

  <!-- Title -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">Onchain Identity</text>
  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">ENS, Soulbound Tokens, Attestations &amp; DIDs</text>

  <!-- Feature pills -->
  <g transform="translate(60, 410)">
    <rect x="0" y="0" width="85" height="35" rx="8" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    <text x="42" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#818cf8" text-anchor="middle">ENS</text>

    <rect x="95" y="0" width="85" height="35" rx="8" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
    <text x="137" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle">SBTs</text>

    <rect x="190" y="0" width="85" height="35" rx="8" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
    <text x="232" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#06b6d4" text-anchor="middle">EAS</text>

    <rect x="285" y="0" width="120" height="35" rx="8" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="345" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">Proof of Person</text>

    <rect x="415" y="0" width="85" height="35" rx="8" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
    <text x="457" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">DIDs</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">degen0x.com</text>
  <text x="1140" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">2026 Guide</text>
</svg>