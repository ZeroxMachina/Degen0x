<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#10b98100"/>
      <stop offset="100%" stop-color="#10b98130"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="200" fill="#10b981" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="150" fill="#3b82f6" opacity="0.04" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="120" fill="#10b981" opacity="0.03" filter="url(#glow)"/>

  <!-- Pie chart icon (representing index diversification) -->
  <g transform="translate(880, 100)" opacity="0.18">
    <circle cx="80" cy="80" r="70" fill="none" stroke="#10b981" stroke-width="3"/>
    <path d="M80 10 A70 70 0 0 1 150 80 L80 80 Z" fill="#10b981" opacity="0.3"/>
    <path d="M150 80 A70 70 0 0 1 80 150 L80 80 Z" fill="#06b6d4" opacity="0.3"/>
    <path d="M80 150 A70 70 0 0 1 10 80 L80 80 Z" fill="#3b82f6" opacity="0.3"/>
    <path d="M10 80 A70 70 0 0 1 80 10 L80 80 Z" fill="#8b5cf6" opacity="0.3"/>
  </g>

  <!-- Rising chart visualization -->
  <g transform="translate(830, 280)" opacity="0.2">
    <polyline points="0,80 40,70 80,60 120,45 160,50 200,35 240,20 280,15 320,5" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M0,80 L40,70 L80,60 L120,45 L160,50 L200,35 L240,20 L280,15 L320,5 L320,80 L0,80 Z" fill="url(#chartGrad)"/>
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="320" y2="0" stroke="#ffffff" stroke-width="0.3" opacity="0.2"/>
    <line x1="0" y1="40" x2="320" y2="40" stroke="#ffffff" stroke-width="0.3" opacity="0.2"/>
    <line x1="0" y1="80" x2="320" y2="80" stroke="#ffffff" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Category badge -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="220" height="28" rx="14" fill="#10b98120" stroke="#10b98140" stroke-width="1"/>
    <text x="110" y="18" fill="#10b981" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="700" letter-spacing="0.5">PORTFOLIO &amp; INVESTING</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Crypto Index Funds</text>
  <text x="60" y="230" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Guide 2026</text>
  <text x="60" y="285" fill="#10b981" font-family="Inter, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.01em">Diversified Crypto Exposure</text>

  <!-- Subtitle -->
  <text x="60" y="340" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">DeFi index protocols, on-chain baskets, and tokenized portfolios.</text>
  <text x="60" y="365" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Comparing fees, coverage, rebalancing, and risk-adjusted returns.</text>

  <!-- Stat cards -->
  <g transform="translate(60, 400)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">INDEX TVL</text>
    <text x="16" y="55" fill="#10b981" font-family="Inter, sans-serif" font-size="24" font-weight="800">$8.2B+</text>

    <!-- Card 2 -->
    <rect x="180" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="196" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">PROTOCOLS</text>
    <text x="196" y="55" fill="#10b981" font-family="Inter, sans-serif" font-size="24" font-weight="800">15+</text>

    <!-- Card 3 -->
    <rect x="360" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="376" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">AVG ANNUAL FEE</text>
    <text x="376" y="55" fill="#06b6d4" font-family="Inter, sans-serif" font-size="24" font-weight="800">0.5-2%</text>

    <!-- Card 4 -->
    <rect x="540" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="556" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">2026 GROWTH</text>
    <text x="556" y="55" fill="#22c55e" font-family="Inter, sans-serif" font-size="24" font-weight="800">+340%</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500">degen0x.com</text>
  <text x="1140" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="end">Learn Guide</text>
</svg>