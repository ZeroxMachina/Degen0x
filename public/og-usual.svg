<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#080d1c"/>
  <ellipse cx="100" cy="100" rx="200" ry="200" fill="url(#accentGrad)" opacity="0.08"/>
  <ellipse cx="1100" cy="530" rx="250" ry="200" fill="url(#accentGrad)" opacity="0.06"/>
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" stroke="url(#accentGrad)" stroke-width="1"/>

  <!-- Dollar/coin symbol icon -->
  <g transform="translate(600, 160)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#accentGrad)" stroke-width="3" filter="url(#glow)"/>
    <path d="M 0,-20 L 0,20" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M -12,-8 L 12,-8" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M -12,8 L 12,8" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <text x="600" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">Usual Money</text>
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="28" fill="#8b949e" text-anchor="middle">USD0 Revenue-Sharing Stablecoin</text>
  <line x1="300" y1="380" x2="900" y2="380" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle" opacity="0.8">degen0x.com</text>
</svg>