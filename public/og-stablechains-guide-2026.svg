<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="200" fill="#f59e0b" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="150" fill="#22c55e" opacity="0.04" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="120" fill="#f59e0b" opacity="0.03" filter="url(#glow)"/>

  <!-- Chain links icon (representing stablechains) -->
  <g transform="translate(870, 110)" opacity="0.18">
    <!-- Chain link 1 -->
    <rect x="0" y="20" width="60" height="40" rx="20" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <!-- Chain link 2 -->
    <rect x="40" y="20" width="60" height="40" rx="20" fill="none" stroke="#eab308" stroke-width="3"/>
    <!-- Chain link 3 -->
    <rect x="80" y="20" width="60" height="40" rx="20" fill="none" stroke="#22c55e" stroke-width="3"/>
    <!-- Dollar sign -->
    <text x="70" y="95" fill="#f59e0b" font-family="Inter, sans-serif" font-size="36" text-anchor="middle" font-weight="800" opacity="0.6">$</text>
  </g>

  <!-- Stablechain architecture diagram -->
  <g transform="translate(830, 260)" opacity="0.2">
    <!-- L1 Block -->
    <rect x="0" y="0" width="90" height="40" rx="8" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="45" y="25" fill="#f59e0b" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Stablecoin</text>
    <!-- Arrow -->
    <line x1="95" y1="20" x2="130" y2="20" stroke="#eab308" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="130,15 140,20 130,25" fill="#eab308"/>
    <!-- L2 Block -->
    <rect x="145" y="0" width="90" height="40" rx="8" fill="none" stroke="#eab308" stroke-width="2"/>
    <text x="190" y="25" fill="#eab308" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Appchain</text>
    <!-- Arrow -->
    <line x1="240" y1="20" x2="275" y2="20" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="275,15 285,20 275,25" fill="#22c55e"/>
    <!-- Output Block -->
    <rect x="290" y="0" width="90" height="40" rx="8" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="335" y="25" fill="#22c55e" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Payments</text>
  </g>

  <!-- Category badge -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="260" height="28" rx="14" fill="#f59e0b20" stroke="#f59e0b40" stroke-width="1"/>
    <text x="130" y="18" fill="#f59e0b" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="700" letter-spacing="0.5">STABLECOINS &amp; INFRASTRUCTURE</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Stablechains</text>
  <text x="60" y="230" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Guide 2026</text>
  <text x="60" y="285" fill="#f59e0b" font-family="Inter, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.01em">Stablecoin-Native Chains</text>

  <!-- Subtitle -->
  <text x="60" y="340" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Purpose-built L2s and appchains optimized for stablecoin payments.</text>
  <text x="60" y="365" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Noble, Mento, and the future of dollar-denominated blockchains.</text>

  <!-- Stat cards -->
  <g transform="translate(60, 400)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">STABLECOIN MCAP</text>
    <text x="16" y="55" fill="#f59e0b" font-family="Inter, sans-serif" font-size="24" font-weight="800">$230B+</text>

    <!-- Card 2 -->
    <rect x="180" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="196" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">STABLECHAINS</text>
    <text x="196" y="55" fill="#f59e0b" font-family="Inter, sans-serif" font-size="24" font-weight="800">8+</text>

    <!-- Card 3 -->
    <rect x="360" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="376" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">AVG LATENCY</text>
    <text x="376" y="55" fill="#06b6d4" font-family="Inter, sans-serif" font-size="24" font-weight="800">&lt;1 sec</text>

    <!-- Card 4 -->
    <rect x="540" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="556" y="28" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">TX COST</text>
    <text x="556" y="55" fill="#22c55e" font-family="Inter, sans-serif" font-size="24" font-weight="800">&lt;$0.01</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500">degen0x.com</text>
  <text x="1140" y="621" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="end">Learn Guide</text>
</svg>