<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e6ed;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#06b6d4" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="150" cy="100" r="80" fill="#6366f1" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1050" cy="500" r="120" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>
  <circle cx="900" cy="120" r="60" fill="#d97706" opacity="0.07" filter="url(#glow)"/>

  <!-- Category badge -->
  <rect x="60" y="60" width="180" height="40" rx="20" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="2"/>
  <text x="150" y="87" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#6366f1" text-anchor="middle">ON-CHAIN</text>

  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="url(#titleGradient)">Whale Wallet Tracker</text>

  <!-- Subtitle -->
  <text x="60" y="210" font-family="system-ui, sans-serif" font-size="20" fill="#8b949e">Monitor smart money moves across chains</text>

  <!-- Visualization: Flow diagram with wallet icons and arrows -->
  <g>
    <!-- Chart background -->
    <rect x="750" y="80" width="400" height="400" rx="12" fill="#0a1427" opacity="0.5" stroke="#1e293b" stroke-width="1"/>

    <!-- Left wallet (source) -->
    <circle cx="800" cy="200" r="25" fill="#6366f1" opacity="0.8" filter="url(#glow)"/>
    <text x="800" y="210" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">W1</text>

    <!-- Center wallet (intermediate) -->
    <circle cx="950" cy="200" r="25" fill="#0891b2" opacity="0.7" filter="url(#glow)"/>
    <text x="950" y="210" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">W2</text>

    <!-- Right wallet (destination) -->
    <circle cx="1100" cy="200" r="25" fill="#06b6d4" opacity="0.8" filter="url(#glow)"/>
    <text x="1100" y="210" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">W3</text>

    <!-- Flow arrows -->
    <path d="M 825 200 L 920 200" stroke="#06b6d4" stroke-width="3" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
    <text x="872" y="195" font-family="system-ui, sans-serif" font-size="11" fill="#06b6d4">2.5K ETH</text>

    <path d="M 975 200 L 1070 200" stroke="#06b6d4" stroke-width="3" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
    <text x="1022" y="195" font-family="system-ui, sans-serif" font-size="11" fill="#06b6d4">2.5K ETH</text>

    <!-- Additional flow from left -->
    <path d="M 800 225 Q 875 280 950 225" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.7" stroke-dasharray="4,2"/>
    <text x="875" y="265" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">1.2K ETH</text>

    <!-- Flow downward -->
    <path d="M 950 225 L 950 290" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
    <text x="965" y="265" font-family="system-ui, sans-serif" font-size="11" fill="#ef4444">500 USDC</text>

    <!-- Bottom wallet (sink) -->
    <circle cx="950" cy="330" r="20" fill="#ef4444" opacity="0.6" filter="url(#glow)"/>
    <text x="950" y="338" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">W4</text>

    <!-- Stats box -->
    <rect x="770" y="390" width="360" height="70" rx="8" fill="#0a1427" opacity="0.7" stroke="#1e293b" stroke-width="1"/>
    <text x="785" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Total Volume:</text>
    <text x="785" y="428" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#06b6d4">$8.5M</text>

    <text x="950" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Transactions:</text>
    <text x="950" y="428" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#06b6d4">127</text>

    <text x="1050" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Tracked:</text>
    <text x="1050" y="428" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#06b6d4">24h</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0a1427" opacity="0.6"/>
  <circle cx="60" cy="615" r="10" fill="#6366f1"/>
  <text x="75" y="621" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">degen0x.com</text>

  <!-- Decorative accent elements -->
  <circle cx="1180" cy="615" r="8" fill="#6366f1" opacity="0.3"/>
  <circle cx="1150" cy="615" r="6" fill="#4f46e5" opacity="0.25"/>
</svg>
