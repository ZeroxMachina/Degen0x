<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0f170f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#22c55e" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="#22c55e" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="400" x2="600" y2="630" stroke="#22c55e" stroke-width="1"/>
  </g>

  <circle cx="180" cy="150" r="200" fill="#22c55e" opacity="0.05"/>
  <circle cx="1020" cy="480" r="180" fill="#06b6d4" opacity="0.04"/>

  <text x="880" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="320" font-weight="900" fill="#22c55e" opacity="0.03">◈</text>

  <rect x="60" y="50" width="4" height="50" rx="2" fill="url(#accentGrad)"/>

  <text x="80" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#e6edf3">Data Availability Layers 2026</text>
  <text x="80" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e">Celestia vs EigenDA vs Avail — cost, throughput, and trust comparison</text>

  <!-- Stat cards -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">DA MARKET SIZE</text>
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#22c55e">$2.8B+</text>
    <text x="20" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e">▲ Critical infra layer</text>

    <rect x="270" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="290" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">CELESTIA SHARE</text>
    <text x="290" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#8b5cf6">~50%</text>
    <text x="290" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">DAS pioneer, low cost</text>

    <rect x="540" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="560" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">EIGENDA THROUGHPUT</text>
    <text x="560" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#3b82f6">100 MB/s</text>
    <text x="560" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Highest throughput DA</text>

    <rect x="810" y="0" width="250" height="100" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
    <text x="830" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">AVAIL FINALITY</text>
    <text x="830" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#f59e0b">~40s</text>
    <text x="830" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Fastest DA finality</text>
  </g>

  <!-- Comparison bars -->
  <g transform="translate(60, 290)">
    <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">THROUGHPUT COMPARISON</text>

    <text x="0" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6">Celestia</text>
    <rect x="100" y="38" width="10" height="16" rx="3" fill="#8b5cf6"/>
    <text x="120" y="51" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">1.33 MB/s</text>

    <text x="0" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#3b82f6">EigenDA</text>
    <rect x="100" y="66" width="700" height="16" rx="3" fill="#3b82f6"/>
    <text x="810" y="79" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">100 MB/s</text>

    <text x="0" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#22c55e">Avail</text>
    <rect x="100" y="94" width="112" height="16" rx="3" fill="#22c55e"/>
    <text x="222" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">16 MB/s</text>
  </g>

  <!-- Protocol badges -->
  <g transform="translate(60, 430)">
    <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">DA LAYERS ANALYZED</text>
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="100" height="28" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf650" stroke-width="1"/>
      <text x="50" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#8b5cf6">Celestia</text>

      <rect x="110" y="0" width="100" height="28" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f650" stroke-width="1"/>
      <text x="160" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#3b82f6">EigenDA</text>

      <rect x="220" y="0" width="80" height="28" rx="6" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e50" stroke-width="1"/>
      <text x="260" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#22c55e">Avail</text>

      <rect x="310" y="0" width="80" height="28" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b50" stroke-width="1"/>
      <text x="350" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#f59e0b">NEAR DA</text>

      <rect x="400" y="0" width="100" height="28" rx="6" fill="#ef4444" fill-opacity="0.1" stroke="#ef444450" stroke-width="1"/>
      <text x="450" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ef4444">EIP-4844</text>
    </g>
  </g>

  <rect x="60" y="570" width="1080" height="1" fill="#30363d"/>
  <text x="60" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#58a6ff">degen0x</text>
  <text x="155" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e">degen0x.com/learn/data-availability-layer-guide-2026</text>
  <text x="1140" y="600" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">March 2026</text>
</svg>