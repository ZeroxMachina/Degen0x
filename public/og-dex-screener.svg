<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="candleUp" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="candleDown" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Top gradient bar -->
  <rect width="1200" height="8" fill="url(#topGradient)"/>

  <!-- Decorative circles background -->
  <circle cx="150" cy="150" r="95" fill="#10b981" opacity="0.08"/>
  <circle cx="1020" cy="400" r="110" fill="#4f46e5" opacity="0.08"/>

  <!-- Logo area -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">
    degen0x
  </text>

  <!-- Main title -->
  <text x="40" y="150" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
    DEX Screener
  </text>
  <text x="40" y="215" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
  </text>

  <!-- Subtitle -->
  <text x="40" y="270" font-family="Inter, sans-serif" font-size="22" fill="#8b949e">
    Scan decentralized exchange pairs in real-time
  </text>

  <!-- Candlestick chart on right side -->
  <g opacity="0.85" filter="url(#glow)">
    <!-- Grid background -->
    <rect x="820" y="100" width="230" height="200" fill="none" stroke="#374151" stroke-width="1" opacity="0.2"/>

    <!-- Candlestick 1 (Green) -->
    <line x1="850" y1="130" x2="850" y2="190" stroke="#10b981" stroke-width="2"/>
    <rect x="835" y="150" width="30" height="30" fill="url(#candleUp)" stroke="#10b981" stroke-width="1.5"/>

    <!-- Candlestick 2 (Red) -->
    <line x1="900" y1="120" x2="900" y2="200" stroke="#ef4444" stroke-width="2"/>
    <rect x="885" y="140" width="30" height="40" fill="url(#candleDown)" stroke="#ef4444" stroke-width="1.5"/>

    <!-- Candlestick 3 (Green) -->
    <line x1="950" y1="140" x2="950" y2="210" stroke="#10b981" stroke-width="2"/>
    <rect x="935" y="160" width="30" height="35" fill="url(#candleUp)" stroke="#10b981" stroke-width="1.5"/>

    <!-- Candlestick 4 (Green) -->
    <line x1="1000" y1="125" x2="1000" y2="215" stroke="#10b981" stroke-width="2"/>
    <rect x="985" y="155" width="30" height="40" fill="url(#candleUp)" stroke="#10b981" stroke-width="1.5"/>

    <!-- Candlestick 5 (Red) -->
    <line x1="1020" y1="135" x2="1020" y2="205" stroke="#ef4444" stroke-width="2"/>
    <rect x="1005" y="150" width="30" height="35" fill="url(#candleDown)" stroke="#ef4444" stroke-width="1.5"/>
  </g>

  <!-- Bottom branding -->
  <text x="40" y="595" font-family="Inter, sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">
    degen0x.com
  </text>

  <!-- Accent line -->
  <line x1="40" y1="300" x2="150" y2="300" stroke="url(#topGradient)" stroke-width="3" stroke-linecap="round"/>
</svg>