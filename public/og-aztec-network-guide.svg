  <text x="830" y="229" text-anchor="middle" fill="#818cf860" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600">ZK</text>

  <line x1="1060" y1="260" x2="1120" y2="230" stroke="#06b6d425" stroke-width="1" stroke-dasharray="4,4"/>
