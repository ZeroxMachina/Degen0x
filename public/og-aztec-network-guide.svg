<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="950" cy="180" r="200" fill="#8b5cf6" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="180" cy="480" r="150" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="1100" cy="500" r="100" fill="#6366f1" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Privacy shield visualization (decorative, right side) -->
  <!-- Shield outline -->
  <path d="M980 160 L1060 195 L1060 310 Q1060 380 980 420 Q900 380 900 310 L900 195 Z" fill="none" stroke="#8b5cf640" stroke-width="2"/>
  <path d="M980 180 L1045 210 L1045 305 Q1045 365 980 400 Q915 365 915 305 L915 210 Z" fill="#8b5cf608" stroke="#8b5cf630" stroke-width="1"/>

  <!-- Lock icon inside shield -->
  <rect x="960" y="270" width="40" height="35" rx="4" fill="none" stroke="#818cf880" stroke-width="2"/>
  <path d="M968 270 L968 255 Q968 240 980 240 Q992 240 992 255 L992 270" fill="none" stroke="#818cf880" stroke-width="2"/>
  <circle cx="980" cy="285" r="4" fill="#818cf8" opacity="0.6"/>
  <line x1="980" y1="289" x2="980" y2="296" stroke="#818cf880" stroke-width="2"/>

