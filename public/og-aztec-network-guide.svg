  <text x="399" y="468" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Ignition Chain</text>

  <text x="476" y="468" fill="#6e768180" font-family="Inter, system-ui, sans-serif" font-size="16">→</text>

