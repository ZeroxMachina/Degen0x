  <text x="251" y="468" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">ZK Proof</text>

  <text x="318" y="468" fill="#6e768180" font-family="Inter, system-ui, sans-serif" font-size="16">→</text>

