<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1525"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="50%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="celestiaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="eigenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="availGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glowPurple">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Ambient glow blobs -->
    <radialGradient id="blobLeft" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blobRight" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="300" rx="300" ry="250" fill="url(#blobLeft)"/>
  <ellipse cx="1050" cy="200" rx="250" ry="200" fill="url(#blobRight)"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#topBar)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="120" x2="1200" y2="120" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- degen0x logo mark (top-left) -->
  <circle cx="60" cy="52" r="20" fill="none" stroke="url(#topBar)" stroke-width="2"/>
  <text x="60" y="58" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#818cf8" text-anchor="middle">0x</text>
  <text x="90" y="58" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">degen0x</text>

  <!-- Category tag -->
  <rect x="60" y="90" width="90" height="26" rx="13" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="105" y="108" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#06b6d4" text-anchor="middle">LEARN GUIDE</text>

  <!-- Main title -->
  <text x="60" y="185" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" letter-spacing="-1.5" fill="url(#titleGrad)">Data Availability Layer</text>
  <text x="60" y="247" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" letter-spacing="-1.5" fill="url(#titleGrad)">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Celestia vs EigenDA V2 vs Avail — market share, throughput &amp; finality compared</text>

  <!-- Divider -->
  <line x1="60" y1="318" x2="440" y2="318" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Three protocol cards -->
  <!-- Card 1: Celestia -->
  <rect x="60" y="340" width="330" height="210" rx="16" fill="url(#celestiaGrad)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <!-- Celestia header accent -->
  <rect x="60" y="340" width="330" height="4" rx="2" fill="#6366f1"/>
  <rect x="60" y="344" width="330" height="1" fill="rgba(99,102,241,0.1)"/>

  <circle cx="96" cy="380" r="14" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="96" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">C</text>
  <text x="120" y="386" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Celestia</text>

  <text x="80" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5">MARKET SHARE</text>
  <text x="80" y="445" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#818cf8">~50%</text>

  <text x="80" y="480" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5">MODEL</text>
  <text x="80" y="500" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#c7d2fe">DAS light nodes</text>

  <text x="80" y="528" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">First-mover · Proven · Modular</text>

  <!-- Card 2: EigenDA -->
  <rect x="420" y="340" width="330" height="210" rx="16" fill="url(#eigenGrad)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <rect x="420" y="340" width="330" height="4" rx="2" fill="#06b6d4"/>
  <rect x="420" y="344" width="330" height="1" fill="rgba(6,182,212,0.1)"/>

  <circle cx="456" cy="380" r="14" fill="rgba(6,182,212,0.2)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
  <text x="456" y="385" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#06b6d4" text-anchor="middle">E</text>
  <text x="480" y="386" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">EigenDA V2</text>

  <text x="440" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5">THROUGHPUT</text>
  <text x="440" y="445" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#06b6d4">100 MB/s</text>

  <text x="440" y="480" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5">MODEL</text>
  <text x="440" y="500" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#67e8f9">DAC + Restaking</text>

  <text x="440" y="528" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">EigenLayer native · Enterprise</text>

  <!-- Card 3: Avail -->
  <rect x="780" y="340" width="360" height="210" rx="16" fill="url(#availGrad)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <rect x="780" y="340" width="360" height="4" rx="2" fill="#8b5cf6"/>
  <rect x="780" y="344" width="360" height="1" fill="rgba(139,92,246,0.1)"/>

  <circle cx="816" cy="380" r="14" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <text x="816" y="385" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">A</text>
  <text x="840" y="386" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Avail</text>

  <text x="800" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5">FINALITY</text>
  <text x="800" y="445" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#a78bfa">~40s</text>

  <text x="800" y="480" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5">MODEL</text>
  <text x="800" y="500" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#c4b5fd">DAS + KZG proofs</text>

  <text x="800" y="528" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Crypto-strong guarantees</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.4)"/>
  <text x="1140" y="620" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681" text-anchor="end">degen0x.com</text>

  <!-- Interactive badge -->
  <rect x="960" y="285" width="180" height="30" rx="15" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="1050" y="305" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle">⚡ Interactive Comparison</text>
</svg>
