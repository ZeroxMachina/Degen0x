<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#mainGradient)"/>

  <!-- Decorative blob shapes -->
  <circle cx="150" cy="500" r="100" fill="url(#accentGradient2)"/>
  <circle cx="1050" cy="100" r="90" fill="url(#accentGradient2)"/>
  <circle cx="600" cy="50" r="60" fill="url(#accentGradient2)" opacity="0.5"/>

  <!-- Glass morphism card background -->
  <rect x="60" y="100" width="1080" height="430" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" rx="12"/>

  <!-- Category badge -->
  <g>
    <rect x="80" y="120" width="120" height="40" fill="rgba(8,145,178,0.2)" stroke="rgba(8,145,178,0.5)" stroke-width="1" rx="6"/>
    <text x="140" y="147" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0891b2" text-anchor="middle">LEARN</text>
  </g>

  <!-- Title -->
  <text x="600" y="220" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" text-anchor="middle" dominant-baseline="middle">
    <tspan x="600" dy="0">Ethereum Blob Space</tspan>
    <tspan x="600" dy="65">Economics</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="380" font-family="Inter, sans-serif" font-size="24" fill="#8b949e" text-anchor="middle" dominant-baseline="middle">
    Understanding EIP-4844 blob markets and L2 cost dynamics
  </text>

  <!-- Decorative grid pattern -->
  <g stroke="rgba(8,145,178,0.1)" stroke-width="1" opacity="0.5">
    <line x1="250" y1="480" x2="280" y2="480"/>
    <line x1="250" y1="500" x2="280" y2="500"/>
    <line x1="250" y1="480" x2="250" y2="520"/>
    <line x1="280" y1="480" x2="280" y2="520"/>
  </g>

  <g stroke="rgba(217,119,6,0.1)" stroke-width="1" opacity="0.5">
    <line x1="920" y1="480" x2="950" y2="480"/>
    <line x1="920" y1="500" x2="950" y2="500"/>
    <line x1="920" y1="480" x2="920" y2="520"/>
    <line x1="950" y1="480" x2="950" y2="520"/>
  </g>

  <!-- Footer branding -->
  <text x="600" y="580" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#8b949e" text-anchor="middle">degen0x.com</text>
</svg>