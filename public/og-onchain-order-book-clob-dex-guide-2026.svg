<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>
  <!-- Decorative circles -->
  <circle cx="950" cy="200" r="180" fill="#4f46e5" opacity="0.08"/>
  <circle cx="1050" cy="400" r="120" fill="#0891b2" opacity="0.06"/>
  <circle cx="150" cy="500" r="100" fill="#d97706" opacity="0.05"/>
  <!-- Logo text -->
  <text x="60" y="80" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#8b949e">degen0x</text>
  <!-- Category badge -->
  <rect x="60" y="100" width="95" height="32" rx="16" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1"/>
  <text x="107" y="121" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">DeFi</text>
  <!-- Title -->
  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#ffffff">Onchain Order Book DEXes</text>
  <!-- Subtitle -->
  <text x="60" y="320" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#8b949e">Hyperliquid, dYdX & the CLOB Revolution 2026</text>
  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="621" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b">degen0x.com</text>
</svg>