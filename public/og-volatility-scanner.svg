<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Accent bar -->
  <rect width="1200" height="6" fill="url(#accentGradient)"/>

  <!-- Decorative gradient circles background -->
  <circle cx="140" cy="260" r="120" fill="#4f46e5" opacity="0.08"/>
  <circle cx="1090" cy="320" r="140" fill="#0891b2" opacity="0.08"/>
  <circle cx="1000" cy="100" r="95" fill="#d97706" opacity="0.06"/>

  <!-- Glass-morphism container -->
  <rect x="50" y="60" width="1100" height="520" rx="16" fill="url(#glassGradient)"
        stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- degen0x logo text -->
  <text x="80" y="115" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#8b949e" letter-spacing="2">
    degen0x
  </text>

  <!-- Title -->
  <text x="80" y="220" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    Crypto Volatility
  </text>
  <text x="80" y="280" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    Scanner
  </text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">
    Identify the most volatile tokens in real-time
  </text>

  <!-- Decorative waveform oscillation patterns -->
  <g filter="url(#glow)">
    <!-- Grid background -->
    <rect x="750" y="360" width="320" height="120" rx="8" fill="rgba(79, 70, 229, 0.08)" stroke="rgba(79, 70, 229, 0.2)" stroke-width="1"/>

    <!-- Vertical grid lines -->
    <line x1="790" y1="360" x2="790" y2="480" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="830" y1="360" x2="830" y2="480" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="870" y1="360" x2="870" y2="480" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="910" y1="360" x2="910" y2="480" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="950" y1="360" x2="950" y2="480" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="990" y1="360" x2="990" y2="480" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="1030" y1="360" x2="1030" y2="480" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>

    <!-- Horizontal grid lines -->
    <line x1="750" y1="380" x2="1070" y2="380" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="750" y1="400" x2="1070" y2="400" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="750" y1="420" x2="1070" y2="420" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="750" y1="440" x2="1070" y2="440" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>
    <line x1="750" y1="460" x2="1070" y2="460" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>

    <!-- Waveform 1 - High volatility -->
    <path d="M 760 420 Q 775 390 790 420 Q 805 450 820 420 Q 835 390 850 420 Q 865 450 880 420 Q 895 390 910 420 Q 925 450 940 420 Q 955 390 970 420 Q 985 450 1000 420 Q 1015 390 1030 420 Q 1045 450 1060 420"
          stroke="url(#accentGradient)" stroke-width="2.5" fill="none" opacity="0.9"/>

    <!-- Waveform area fill -->
    <path d="M 760 420 Q 775 390 790 420 Q 805 450 820 420 Q 835 390 850 420 Q 865 450 880 420 Q 895 390 910 420 Q 925 450 940 420 Q 955 390 970 420 Q 985 450 1000 420 Q 1015 390 1030 420 Q 1045 450 1060 420 L 1060 460 Q 1045 460 1030 460 Q 1015 460 1000 460 Q 985 460 970 460 Q 955 460 940 460 Q 925 460 910 460 Q 895 460 880 460 Q 865 460 850 460 Q 835 460 820 460 Q 805 460 790 460 Q 775 460 760 460 Z"
          fill="url(#accentGradient)" opacity="0.15"/>

    <!-- Peak indicators -->
    <circle cx="790" cy="420" r="3" fill="#4f46e5" opacity="0.9"/>
    <circle cx="850" cy="420" r="3" fill="#0891b2" opacity="0.9"/>
    <circle cx="910" cy="420" r="3" fill="#d97706" opacity="0.9"/>
    <circle cx="970" cy="420" r="3" fill="#10b981" opacity="0.9"/>
    <circle cx="1030" cy="420" r="3" fill="#4f46e5" opacity="0.9"/>

    <!-- Volatility intensity indicator -->
    <text x="765" y="500" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#10b981">
      ▲ High Vol
    </text>
    <text x="910" y="500" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#d97706">
      ● Medium Vol
    </text>
  </g>

  <!-- Vertical accent lines -->
  <line x1="700" y1="60" x2="700" y2="580" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>

  <!-- Footer -->
  <text x="80" y="595" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#475569">
    degen0x.com
  </text>
</svg>