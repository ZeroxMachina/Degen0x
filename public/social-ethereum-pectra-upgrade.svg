<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070c1a"/>
      <stop offset="55%" style="stop-color:#0b1122"/>
      <stop offset="100%" style="stop-color:#080e1e"/>
    </linearGradient>

    <!-- Brand signature gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>

    <!-- Ethereum purple gradient -->
    <linearGradient id="ethGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6edf3"/>
      <stop offset="100%" style="stop-color:#c9d1d9"/>
    </linearGradient>

    <!-- EIP card gradients -->
    <linearGradient id="eip1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5" stop-opacity="0.15"/>
      <stop offset="100%" style="stop-color:#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="eip2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2" stop-opacity="0.15"/>
      <stop offset="100%" style="stop-color:#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="eip3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" style="stop-color:#16a34a" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
    </filter>
    <filter id="barGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ethGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Atmospheric glows -->
  <circle cx="900" cy="300" r="280" fill="#6366f1" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="160" cy="180" r="200" fill="#0891b2" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="650" cy="550" r="160" fill="#8b5cf6" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#brandGrad)" filter="url(#barGlow)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0" y1="525" x2="1200" y2="525" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>

  <!-- degen0x logo (top-left) -->
  <g transform="translate(56, 48)">
    <circle cx="20" cy="20" r="22" fill="#4f46e5" opacity="0.15"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <text x="20" y="26" font-family="'Inter', monospace" font-size="12" font-weight="800" text-anchor="middle" fill="#818cf8">0x</text>
  </g>
  <text x="88" y="73" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.05em">degen0x</text>

  <!-- "Mainnet: April 2026" badge (top-right) -->
  <rect x="938" y="36" width="206" height="52" rx="26" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.4)" stroke-width="1.5"/>
  <text x="1041" y="57" font-family="'Inter', sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#8b5cf6" letter-spacing="0.08em">MAINNET</text>
  <text x="1041" y="76" font-family="'Inter', sans-serif" font-size="14" font-weight="800" text-anchor="middle" fill="#a78bfa">⟠  April 2026</text>

  <!-- Ethereum diamond logo (large, decorative, right side) -->
  <g transform="translate(850, 145)" opacity="0.18" filter="url(#ethGlow)">
    <polygon points="120,0 240,120 120,160 0,120" fill="#8b5cf6"/>
    <polygon points="120,0 240,120 120,80" fill="#6366f1"/>
    <polygon points="0,120 120,160 120,80" fill="#4f46e5"/>
    <polygon points="120,160 240,120 120,240" fill="#6366f1"/>
    <polygon points="120,160 0,120 120,240" fill="#8b5cf6"/>
  </g>

  <!-- Main headline -->
  <text x="56" y="188" font-family="'Inter', sans-serif" font-size="68" font-weight="900" fill="url(#titleGrad)" letter-spacing="-0.025em">Ethereum</text>
  <text x="56" y="268" font-family="'Inter', sans-serif" font-size="68" font-weight="900" fill="url(#titleGrad)" letter-spacing="-0.025em">Pectra Upgrade</text>

  <!-- Subtitle -->
  <text x="56" y="314" font-family="'Inter', sans-serif" font-size="19" font-weight="400" fill="#8b949e">Biggest change since the Merge — 3 paradigm shifts landing April 2026</text>

  <!-- Thin gradient rule -->
  <line x1="56" y1="340" x2="580" y2="340" stroke="url(#brandGrad)" stroke-width="1.5" opacity="0.45"/>

  <!-- Three EIP cards side by side -->

  <!-- EIP-7251 card -->
  <rect x="56" y="360" width="326" height="172" rx="16" fill="url(#eip1Grad)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <rect x="56" y="360" width="5" height="172" rx="3" fill="#6366f1"/>
  <!-- EIP badge -->
  <rect x="70" y="376" width="90" height="22" rx="11" fill="rgba(99,102,241,0.2)"/>
  <text x="115" y="392" font-family="'Inter', monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#818cf8">EIP-7251</text>
  <text x="78" y="422" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Validator Stakes</text>
  <text x="78" y="444" font-family="'Inter', sans-serif" font-size="13" font-weight="400" fill="#8b949e">Max stake: 32 → 2,048 ETH</text>
  <text x="78" y="464" font-family="'Inter', sans-serif" font-size="13" font-weight="400" fill="#8b949e">90% fewer validators needed</text>
  <!-- Stat highlight -->
  <text x="78" y="498" font-family="'Inter', sans-serif" font-size="24" font-weight="800" fill="#6366f1">64×</text>
  <text x="114" y="498" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#6e7681"> larger max stake</text>
  <text x="78" y="518" font-family="'Inter', sans-serif" font-size="11" font-weight="400" fill="#4e5662">↑ Consolidation efficiency</text>

  <!-- EIP-7702 card -->
  <rect x="394" y="360" width="326" height="172" rx="16" fill="url(#eip2Grad)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <rect x="394" y="360" width="5" height="172" rx="3" fill="#06b6d4"/>
  <!-- EIP badge -->
  <rect x="408" y="376" width="90" height="22" rx="11" fill="rgba(6,182,212,0.15)"/>
  <text x="453" y="392" font-family="'Inter', monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#22d3ee">EIP-7702</text>
  <text x="416" y="422" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Smart EOA Wallets</text>
  <text x="416" y="444" font-family="'Inter', sans-serif" font-size="13" font-weight="400" fill="#8b949e">EOA acts as smart contract</text>
  <text x="416" y="464" font-family="'Inter', sans-serif" font-size="13" font-weight="400" fill="#8b949e">No migration needed</text>
  <!-- Stat highlight -->
  <text x="416" y="498" font-family="'Inter', sans-serif" font-size="18" font-weight="800" fill="#06b6d4">Gas sponsoring</text>
  <text x="416" y="518" font-family="'Inter', sans-serif" font-size="11" font-weight="400" fill="#4e5662">Batch txs · Recovery keys · No new wallet</text>

  <!-- EIP-7691 card -->
  <rect x="732" y="360" width="326" height="172" rx="16" fill="url(#eip3Grad)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <rect x="732" y="360" width="5" height="172" rx="3" fill="#22c55e"/>
  <!-- EIP badge -->
  <rect x="746" y="376" width="90" height="22" rx="11" fill="rgba(34,197,94,0.15)"/>
  <text x="791" y="392" font-family="'Inter', monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#4ade80">EIP-7691</text>
  <text x="754" y="422" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Blob Throughput ×2</text>
  <text x="754" y="444" font-family="'Inter', sans-serif" font-size="13" font-weight="400" fill="#8b949e">Blobs: 3 → 6 per block</text>
  <text x="754" y="464" font-family="'Inter', sans-serif" font-size="13" font-weight="400" fill="#8b949e">Base · Arbitrum · Optimism</text>
  <!-- Stat highlight -->
  <text x="754" y="498" font-family="'Inter', sans-serif" font-size="24" font-weight="800" fill="#22c55e">~50%</text>
  <text x="806" y="498" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#6e7681"> L2 fee drop</text>
  <text x="754" y="518" font-family="'Inter', sans-serif" font-size="11" font-weight="400" fill="#4e5662">↓ Rollup data costs halved</text>

  <!-- Impact tags row -->
  <g transform="translate(56, 548)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <text x="65" y="19" font-family="'Inter', sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#a78bfa">ETH Staking</text>

    <rect x="140" y="0" width="116" height="28" rx="14" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
    <text x="198" y="19" font-family="'Inter', sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#22d3ee">Account Abstraction</text>

    <rect x="266" y="0" width="104" height="28" rx="14" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
    <text x="318" y="19" font-family="'Inter', sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#4ade80">L2 Scaling</text>

    <rect x="380" y="0" width="86" height="28" rx="14" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <text x="423" y="19" font-family="'Inter', sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#818cf8">DeFi UX</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="578" width="1200" height="52" fill="rgba(0,0,0,0.3)"/>
  <line x1="0" y1="578" x2="1200" y2="578" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="56" y="611" font-family="'Inter', sans-serif" font-size="15" font-weight="600" fill="#6e7681">degen0x.com/learn/ethereum-pectra-upgrade-guide</text>
  <text x="1144" y="611" font-family="'Inter', sans-serif" font-size="13" font-weight="400" text-anchor="end" fill="#4e5662">Free · No signup</text>
</svg>
