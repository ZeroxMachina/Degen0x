<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="#f59e0b" opacity="0.04" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="150" fill="#ef4444" opacity="0.04" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="180" fill="#8b5cf6" opacity="0.03" filter="url(#glow)"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Badges -->
  <rect x="60" y="90" width="110" height="28" rx="14" fill="#f59e0b" opacity="0.15"/>
  <text x="115" y="109" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">Trading &amp; AI</text>

  <rect x="185" y="90" width="140" height="28" rx="14" fill="#3b82f6" opacity="0.15"/>
  <text x="255" y="109" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3b82f6" text-anchor="middle">Beginner-Friendly</text>

  <rect x="340" y="90" width="80" height="28" rx="14" fill="#22c55e" opacity="0.15"/>
  <text x="380" y="109" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">2026</text>

  <!-- Title -->
  <text x="60" y="185" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">No-Code AI Trading Agents</text>
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#8b949e">Build Crypto Bots Without Code</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#6e7681">250,000+ daily active AI agents · Describe strategies in plain English</text>

  <!-- Stats cards -->
  <g transform="translate(60, 330)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="250" height="100" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="35" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Daily Active AI Agents</text>
    <text x="20" y="70" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#f59e0b">250K+</text>

    <!-- Card 2 -->
    <rect x="270" y="0" width="250" height="100" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="290" y="35" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">DeFi Protocols with AI</text>
    <text x="290" y="70" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ef4444">68%</text>

    <!-- Card 3 -->
    <rect x="540" y="0" width="250" height="100" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="560" y="35" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">AI vs Human Accuracy</text>
    <text x="560" y="70" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#22c55e">+27%</text>
  </g>

  <!-- AI Agent visualization -->
  <g transform="translate(870, 320)">
    <!-- Robot icon stylized -->
    <rect x="0" y="10" width="260" height="120" rx="20" fill="url(#cardGrad)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="130" y="50" font-family="Inter, system-ui, sans-serif" font-size="28" text-anchor="middle" fill="#f59e0b">🤖</text>
    <text x="130" y="80" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#e6edf3">AI Agent Active</text>
    <text x="130" y="100" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#22c55e">● Executing Strategy</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com · No-Code AI Trading Agents Guide 2026</text>
  <text x="1140" y="620" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>