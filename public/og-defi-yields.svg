<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="yieldGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="950" cy="200" r="200" fill="#22c55e" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="200" cy="450" r="150" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Yield bar chart (right side) -->
  <!-- Bars -->
  <rect x="800" y="310" width="48" height="90" rx="4" fill="url(#yieldGrad)" stroke="#22c55e40" stroke-width="1"/>
  <rect x="860" y="250" width="48" height="150" rx="4" fill="url(#yieldGrad)" stroke="#22c55e40" stroke-width="1"/>
  <rect x="920" y="200" width="48" height="200" rx="4" fill="url(#yieldGrad)" stroke="#22c55e40" stroke-width="1"/>
  <rect x="980" y="270" width="48" height="130" rx="4" fill="url(#yieldGrad)" stroke="#22c55e40" stroke-width="1"/>
  <rect x="1040" y="180" width="48" height="220" rx="4" fill="url(#yieldGrad)" stroke="#22c55e40" stroke-width="1"/>

  <!-- Bar labels -->
  <text x="824" y="296" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">4.2%</text>
  <text x="884" y="236" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">7.1%</text>
  <text x="944" y="186" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">9.8%</text>
  <text x="1004" y="256" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">6.2%</text>
  <text x="1064" y="166" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">12.5%</text>

  <!-- X-axis labels -->
  <text x="824" y="420" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Aave</text>
  <text x="884" y="420" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Morpho</text>
  <text x="944" y="420" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Pendle</text>
  <text x="1004" y="420" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Curve</text>
  <text x="1064" y="420" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Ethena</text>

  <!-- Baseline -->
  <line x1="790" y1="400" x2="1100" y2="400" stroke="#30363d" stroke-width="1"/>

  <!-- degen0x branding -->
  <text x="70" y="80" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" letter-spacing="0.08em">degen0x</text>

  <!-- Title -->
  <text x="70" y="220" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em">DeFi Yield</text>
  <text x="70" y="285" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em">Tracker</text>

  <!-- Subtitle -->
  <text x="70" y="340" fill="#c9d1d9" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400">Compare live DeFi yields across top protocols.</text>
  <text x="70" y="370" fill="#c9d1d9" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400">Updated in real-time from DefiLlama data.</text>

  <!-- Tags -->
  <rect x="70" y="420" width="60" height="28" rx="6" fill="#22c55e15" stroke="#22c55e40" stroke-width="1"/>
  <text x="100" y="439" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">DeFi</text>
  <rect x="142" y="420" width="70" height="28" rx="6" fill="#6366f115" stroke="#6366f140" stroke-width="1"/>
  <text x="177" y="439" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Yields</text>
  <rect x="224" y="420" width="90" height="28" rx="6" fill="#d2992215" stroke="#d2992240" stroke-width="1"/>
  <text x="269" y="439" text-anchor="middle" fill="#d29922" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Real-Time</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#161b22" opacity="0.8"/>
  <text x="70" y="612" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14">degen0x.com/defi-yields</text>
  <text x="1130" y="612" text-anchor="end" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14">Free Crypto Tools</text>
</svg>