<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgProtocol" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#171c25"/>
    </linearGradient>
    <linearGradient id="accentProtocol" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="50%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
    <linearGradient id="titleProtocol" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#fafaf9"/>
    </linearGradient>
    <linearGradient id="utxoFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a16207" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="opcatFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ca8a04" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#a16207" stop-opacity="0.16"/>
    </linearGradient>
    <radialGradient id="glowAmber" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgProtocol)"/>

  <!-- Soft glow on right third (cluster motif anchor) -->
  <ellipse cx="930" cy="315" rx="320" ry="240" fill="url(#glowAmber)"/>

  <!-- Top accent rule -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentProtocol)"/>

  <!-- Decorative micro-circles (cypherpunk dots) -->
  <circle cx="80" cy="555" r="3" fill="#fde047" opacity="0.55"/>
  <circle cx="100" cy="555" r="3" fill="#ca8a04" opacity="0.55"/>
  <circle cx="120" cy="555" r="3" fill="#92400e" opacity="0.55"/>

  <!-- Cluster-signal badge top-left -->
  <rect x="60" y="56" width="190" height="30" rx="6" fill="#92400e" fill-opacity="0.18" stroke="#ca8a04" stroke-opacity="0.55" stroke-width="1"/>
  <text x="74" y="76" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#fde047" letter-spacing="0.08em">BITCOIN PROTOCOL</text>

  <!-- Brand mark above title -->
  <text x="60" y="120" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#ca8a04" opacity="0.9">degen0x</text>

  <!-- Title -->
  <text x="60" y="200" font-family="Inter, -apple-system, sans-serif" font-size="58" font-weight="800" fill="url(#titleProtocol)" letter-spacing="-0.02em">Bitcoin Covenants</text>
  <text x="60" y="266" font-family="Inter, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#fafaf9" letter-spacing="-0.02em">&amp; OP_CAT — 2026</text>

  <!-- Subtitle -->
  <text x="60" y="312" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#cbd5e1">BIP-347 unlocks vaults, trustless bridges</text>
  <text x="60" y="344" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#cbd5e1">&amp; native DEXes for programmable Bitcoin.</text>

  <!-- Detail strip -->
  <text x="60" y="400" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#fde047">BIP-347 · OP_CAT · OP_CTV · CSFS · LNHANCE</text>

  <!-- Italic tagline -->
  <text x="60" y="438" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#94a3b8">How vaults, bridges &amp; trustless DEXes finally come to Bitcoin.</text>

  <!-- Right-third covenant flow motif -->
  <g transform="translate(770, 130)">
    <!-- Step 1: UTXO + rules -->
    <rect x="40" y="0" width="280" height="72" rx="10" fill="url(#utxoFill)" stroke="#ca8a04" stroke-opacity="0.55" stroke-width="1"/>
    <text x="58" y="30" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#fde047">UTXO + COVENANT</text>
    <text x="58" y="54" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#a8a29e">tx.outputs[0].script == required</text>

    <!-- Down-arrow 1 -->
    <line x1="180" y1="72" x2="180" y2="100" stroke="#ca8a04" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="4 4"/>
    <polygon points="174,96 186,96 180,104" fill="#ca8a04" fill-opacity="0.7"/>

    <!-- Step 2: OP_CAT verifies -->
    <rect x="40" y="106" width="280" height="72" rx="10" fill="url(#opcatFill)" stroke="#fde047" stroke-opacity="0.55" stroke-width="1"/>
    <text x="58" y="136" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#fde047">OP_CAT VERIFIES</text>
    <text x="58" y="160" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#a8a29e">script introspection · merkle path</text>

    <!-- Branch lines -->
    <line x1="120" y1="178" x2="90" y2="216" stroke="#fde047" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="4 4"/>
    <polygon points="84,210 96,212 90,222" fill="#fde047" fill-opacity="0.75"/>
    <line x1="240" y1="178" x2="270" y2="216" stroke="#92400e" stroke-opacity="0.65" stroke-width="1.5" stroke-dasharray="4 4"/>
    <polygon points="264,210 276,212 270,222" fill="#92400e" fill-opacity="0.85"/>

    <!-- Step 3a: Allowed -->
    <rect x="0" y="222" width="160" height="56" rx="10" fill="#fafaf9" fill-opacity="0.08" stroke="#fafaf9" stroke-opacity="0.4" stroke-width="1"/>
    <text x="18" y="248" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#fafaf9">SPEND ALLOWED</text>
    <text x="18" y="266" font-family="ui-monospace, monospace" font-size="10" fill="#cbd5e1">rules satisfied</text>

    <!-- Step 3b: Blocked -->
    <rect x="200" y="222" width="160" height="56" rx="10" fill="#92400e" fill-opacity="0.18" stroke="#92400e" stroke-opacity="0.6" stroke-width="1"/>
    <text x="218" y="248" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#fde047">SPEND BLOCKED</text>
    <text x="218" y="266" font-family="ui-monospace, monospace" font-size="10" fill="#a8a29e">rules violated</text>

    <!-- Use-case row -->
    <text x="20" y="318" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.06em">UNLOCKS</text>
    <text x="20" y="346" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fafaf9">Vaults · Bridges · DEX-on-BTC</text>
    <text x="20" y="368" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">Time-locks · trustless swaps · cancel keys</text>

    <text x="180" y="408" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Covenant Enforcement Flow</text>
  </g>

  <!-- Bottom-left brand mark -->
  <text x="60" y="586" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ca8a04">degen0x.com</text>

  <!-- Bottom-right year chip -->
  <rect x="1098" y="566" width="56" height="28" rx="6" fill="#fde047" fill-opacity="0.92"/>
  <text x="1126" y="586" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#171c25" text-anchor="middle">2026</text>

  <!-- Bottom rule -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accentProtocol)"/>
</svg>
