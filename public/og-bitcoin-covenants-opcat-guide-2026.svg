<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="degen0x — Bitcoin Covenants and OP_CAT Guide 2026">
  <defs>
    <linearGradient id="bgGradCov" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="accentCov" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="55%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#fafaf9"/>
    </linearGradient>
    <linearGradient id="titleGradCov" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="lockAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="lockSlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="lockBone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf9" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#a8a29e" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradCov)"/>

  <!-- Top accent bar (amber to slate to bone) -->
  <rect width="1200" height="4" fill="url(#accentCov)"/>

  <!-- Ambient halo behind motif -->
  <circle cx="945" cy="315" r="260" fill="url(#halo)"/>

  <!-- Right-third topical motif: Covenant-Lock cluster (3 nested locks gating spend paths) -->
  <g opacity="0.5">
    <text x="945" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fde68a" text-anchor="middle" letter-spacing="2.6">COVENANT LOCKS</text>

    <!-- Spend-path lattice: thin lines fanning from a central UTXO -->
    <g stroke="#475569" stroke-opacity="0.55" stroke-width="1" fill="none">
      <line x1="945" y1="315" x2="780" y2="195"/>
      <line x1="945" y1="315" x2="780" y2="435"/>
      <line x1="945" y1="315" x2="1110" y2="195"/>
      <line x1="945" y1="315" x2="1110" y2="435"/>
      <line x1="945" y1="315" x2="945" y2="160"/>
      <line x1="945" y1="315" x2="945" y2="470"/>
    </g>

    <!-- Outer Lock (slate, largest base layer) -->
    <g transform="translate(945,315)">
      <rect x="-110" y="-30" width="220" height="160" rx="14" fill="url(#lockSlate)"/>
      <path d="M -68 -30 L -68 -78 a 68 68 0 0 1 136 0 L 68 -30" stroke="#94a3b8" stroke-width="14" fill="none" stroke-opacity="0.85"/>
      <circle cx="0" cy="42" r="10" fill="#fafaf9" fill-opacity="0.85"/>
      <rect x="-3" y="42" width="6" height="36" fill="#fafaf9" fill-opacity="0.85"/>
    </g>

    <!-- Middle Lock (amber main layer) -->
    <g transform="translate(945,315) scale(0.62)">
      <rect x="-110" y="-30" width="220" height="160" rx="14" fill="url(#lockAmber)"/>
      <path d="M -68 -30 L -68 -78 a 68 68 0 0 1 136 0 L 68 -30" stroke="#fbbf24" stroke-width="16" fill="none" stroke-opacity="0.95"/>
      <circle cx="0" cy="42" r="11" fill="#fffbeb" fill-opacity="0.95"/>
      <rect x="-3" y="42" width="6" height="38" fill="#fffbeb" fill-opacity="0.95"/>
    </g>

    <!-- Inner Lock (bone innermost) -->
    <g transform="translate(945,315) scale(0.30)">
      <rect x="-110" y="-30" width="220" height="160" rx="14" fill="url(#lockBone)"/>
      <path d="M -68 -30 L -68 -78 a 68 68 0 0 1 136 0 L 68 -30" stroke="#fafaf9" stroke-width="18" fill="none" stroke-opacity="0.95"/>
      <circle cx="0" cy="42" r="14" fill="#1c1917" fill-opacity="0.6"/>
    </g>

    <!-- Op-code chips (BIP-347 / OP_CAT vibe) -->
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="10" font-weight="700" letter-spacing="1.5">
      <rect x="775" y="495" width="84" height="22" rx="4" fill="#d97706" fill-opacity="0.18" stroke="#d97706" stroke-opacity="0.55"/>
      <text x="817" y="510" fill="#fde68a" text-anchor="middle">OP_CAT</text>
      <rect x="867" y="495" width="84" height="22" rx="4" fill="#475569" fill-opacity="0.22" stroke="#94a3b8" stroke-opacity="0.55"/>
      <text x="909" y="510" fill="#e2e8f0" text-anchor="middle">OP_CTV</text>
      <rect x="959" y="495" width="92" height="22" rx="4" fill="#475569" fill-opacity="0.22" stroke="#94a3b8" stroke-opacity="0.55"/>
      <text x="1005" y="510" fill="#e2e8f0" text-anchor="middle">CSFS</text>
      <rect x="1059" y="495" width="92" height="22" rx="4" fill="#fafaf9" fill-opacity="0.12" stroke="#fafaf9" stroke-opacity="0.45"/>
      <text x="1105" y="510" fill="#fafaf9" text-anchor="middle">LNHANCE</text>
    </g>
  </g>

  <!-- Brand wordmark -->
  <text x="64" y="118" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="800" font-size="36" fill="#d97706" letter-spacing="-0.5">degen0x</text>

  <!-- Eyebrow / category -->
  <text x="64" y="172" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="16" fill="#94a3b8" letter-spacing="3">BITCOIN PROTOCOL · COVENANTS</text>

  <!-- Headline -->
  <text x="64" y="262" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="68" fill="url(#titleGradCov)" letter-spacing="-1.5">Bitcoin Covenants</text>
  <text x="64" y="334" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="68" fill="url(#titleGradCov)" letter-spacing="-1.5">&amp; OP_CAT</text>

  <!-- Subhead -->
  <text x="64" y="394" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24" fill="#cbd5e1">BIP-347 · vaults · trustless bridges · activation debate</text>

  <!-- Tag pills (cluster identity) -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">
    <rect x="64" y="430" width="116" height="30" rx="15" fill="#d97706" fill-opacity="0.16" stroke="#d97706" stroke-opacity="0.6"/>
    <text x="122" y="450" fill="#fde68a" text-anchor="middle">BIP-347</text>
    <rect x="190" y="430" width="124" height="30" rx="15" fill="#475569" fill-opacity="0.28" stroke="#94a3b8" stroke-opacity="0.5"/>
    <text x="252" y="450" fill="#e2e8f0" text-anchor="middle">Programmable</text>
    <rect x="324" y="430" width="98" height="30" rx="15" fill="#fafaf9" fill-opacity="0.1" stroke="#fafaf9" stroke-opacity="0.45"/>
    <text x="373" y="450" fill="#fafaf9" text-anchor="middle">2026</text>
  </g>

  <!-- Footer rule + label -->
  <rect x="64" y="566" width="80" height="4" rx="2" fill="url(#accentCov)"/>
  <text x="64" y="598" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#94a3b8">degen0x.com · Learn · Bitcoin Covenants Guide 2026</text>
</svg>
