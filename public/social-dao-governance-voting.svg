<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1a1033"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="voteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="yesGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="noGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Subtle radial pattern -->
  <circle cx="600" cy="315" r="300" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.06"/>
  <circle cx="600" cy="315" r="250" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.08"/>
  <circle cx="600" cy="315" r="200" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.1"/>

  <!-- Decorative glow -->
  <circle cx="600" cy="280" r="100" fill="#8b5cf6" opacity="0.06"/>

  <!-- Title -->
  <text x="600" y="75" font-family="system-ui, sans-serif" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#glow2)">DAO Governance &amp; Voting</text>
  <text x="600" y="115" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">How Crypto Governance Actually Works</text>

  <!-- Treasury stat -->
  <text x="600" y="165" font-family="system-ui, sans-serif" font-size="42" fill="#8b5cf6" text-anchor="middle" font-weight="bold" filter="url(#glow2)">$25B+</text>
  <text x="600" y="190" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">IN DAO TREASURIES</text>

  <!-- Voting visualization - mock proposal -->
  <rect x="320" y="220" rx="12" ry="12" width="560" height="180" fill="#1e1b4b" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>

  <!-- Proposal header -->
  <text x="350" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#8b5cf6" font-weight="bold" letter-spacing="2">PROPOSAL #247</text>
  <text x="350" y="280" font-family="system-ui, sans-serif" font-size="18" fill="#fff" font-weight="bold">Increase Treasury Diversification to 30%</text>

  <!-- Vote bar -->
  <rect x="350" y="300" rx="8" ry="8" width="500" height="24" fill="#1e293b"/>
  <rect x="350" y="300" rx="8" ry="8" width="340" height="24" fill="url(#yesGrad)" opacity="0.9"/>
  <rect x="690" y="300" width="160" height="24" fill="url(#noGrad)" opacity="0.9">
    <animate attributeName="width" from="0" to="160" dur="0.5s" fill="freeze"/>
  </rect>

  <!-- Vote labels -->
  <text x="360" y="317" font-family="system-ui, sans-serif" font-size="12" fill="#fff" font-weight="bold">FOR 68%</text>
  <text x="830" y="317" font-family="system-ui, sans-serif" font-size="12" fill="#f87171" font-weight="bold" text-anchor="end">AGAINST 32%</text>

  <!-- Vote stats row -->
  <text x="350" y="355" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Quorum: 4.2M / 5M tokens</text>
  <text x="700" y="355" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Delegates: 847</text>
  <text x="350" y="380" font-family="system-ui, sans-serif" font-size="12" fill="#4ade80">● ACTIVE — 2 days remaining</text>

  <!-- DAO logos/badges row -->
  <g transform="translate(140, 440)">
    <!-- Uniswap -->
    <rect x="0" y="0" rx="10" ry="10" width="150" height="55" fill="#ff007a" fill-opacity="0.1" stroke="#ff007a" stroke-width="1"/>
    <text x="75" y="25" font-family="system-ui, sans-serif" font-size="15" fill="#ff007a" text-anchor="middle" font-weight="bold">Uniswap</text>
    <text x="75" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">$3.4B Treasury</text>
  </g>

  <g transform="translate(320, 440)">
    <!-- Aave -->
    <rect x="0" y="0" rx="10" ry="10" width="150" height="55" fill="#b6509e" fill-opacity="0.1" stroke="#b6509e" stroke-width="1"/>
    <text x="75" y="25" font-family="system-ui, sans-serif" font-size="15" fill="#b6509e" text-anchor="middle" font-weight="bold">Aave</text>
    <text x="75" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">$2.1B Treasury</text>
  </g>

  <g transform="translate(500, 440)">
    <!-- Arbitrum -->
    <rect x="0" y="0" rx="10" ry="10" width="150" height="55" fill="#28a0f0" fill-opacity="0.1" stroke="#28a0f0" stroke-width="1"/>
    <text x="75" y="25" font-family="system-ui, sans-serif" font-size="15" fill="#28a0f0" text-anchor="middle" font-weight="bold">Arbitrum</text>
    <text x="75" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">$4.7B Treasury</text>
  </g>

  <g transform="translate(680, 440)">
    <!-- Optimism -->
    <rect x="0" y="0" rx="10" ry="10" width="150" height="55" fill="#ff0420" fill-opacity="0.1" stroke="#ff0420" stroke-width="1"/>
    <text x="75" y="25" font-family="system-ui, sans-serif" font-size="15" fill="#ff0420" text-anchor="middle" font-weight="bold">Optimism</text>
    <text x="75" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">$8.3B Treasury</text>
  </g>

  <g transform="translate(860, 440)">
    <!-- MakerDAO -->
    <rect x="0" y="0" rx="10" ry="10" width="150" height="55" fill="#1aab9b" fill-opacity="0.1" stroke="#1aab9b" stroke-width="1"/>
    <text x="75" y="25" font-family="system-ui, sans-serif" font-size="15" fill="#1aab9b" text-anchor="middle" font-weight="bold">MakerDAO</text>
    <text x="75" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">$5.2B Treasury</text>
  </g>

  <!-- Capability pills -->
  <rect x="150" y="530" rx="14" ry="14" width="160" height="28" fill="#8b5cf6" fill-opacity="0.15"/>
  <text x="230" y="549" font-family="system-ui, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">ON-CHAIN VOTING</text>

  <rect x="340" y="530" rx="14" ry="14" width="160" height="28" fill="#06b6d4" fill-opacity="0.15"/>
  <text x="420" y="549" font-family="system-ui, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle" font-weight="bold">SNAPSHOT + TALLY</text>

  <rect x="530" y="530" rx="14" ry="14" width="180" height="28" fill="#f59e0b" fill-opacity="0.15"/>
  <text x="620" y="549" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">DELEGATE MECHANICS</text>

  <rect x="740" y="530" rx="14" ry="14" width="180" height="28" fill="#4ade80" fill-opacity="0.15"/>
  <text x="830" y="549" font-family="system-ui, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="bold">QUADRATIC VOTING</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#000" fill-opacity="0.4"/>
  <text x="40" y="612" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" font-weight="bold">degen0x.com/learn/dao-governance-voting-guide</text>

  <!-- Badge -->
  <rect x="920" y="590" rx="12" ry="12" width="240" height="28" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
  <text x="1040" y="609" font-family="system-ui, sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle" font-weight="bold">12 MIN READ · DEEP DIVE</text>

  <!-- Corner accent -->
  <rect x="0" y="0" width="4" height="630" fill="#8b5cf6"/>
</svg>