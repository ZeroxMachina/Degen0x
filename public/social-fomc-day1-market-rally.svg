<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0c1229"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="chartClip">
      <rect x="40" y="280" width="500" height="180" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative background circles -->
  <circle cx="900" cy="150" r="200" fill="url(#amberGlow)" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="150" fill="#4f46e5" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- LIVE indicator -->
  <rect x="40" y="28" width="70" height="28" rx="14" fill="#ef4444" opacity="0.15"/>
  <circle cx="58" cy="42" r="4" fill="#ef4444" filter="url(#glow)"/>
  <text x="72" y="47" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" letter-spacing="0.05em">LIVE</text>

  <!-- Date badge -->
  <rect x="130" y="28" width="180" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="220" y="47" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">MARCH 17, 2026</text>

  <!-- degen0x logo text -->
  <text x="1160" y="47" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="url(#brandGrad)" text-anchor="end" letter-spacing="-0.02em">degen0x</text>

  <!-- Main title -->
  <text x="40" y="110" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">FOMC Day 1</text>
  <text x="40" y="155" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#8b949e" letter-spacing="-0.01em">Fed meeting starts today. Decision tomorrow 2PM ET.</text>

  <!-- BTC price hero -->
  <rect x="40" y="185" width="320" height="72" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="60" y="215" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">BITCOIN</text>
  <text x="60" y="244" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">$73,700</text>
  <rect x="225" y="224" width="120" height="26" rx="13" fill="rgba(34,197,94,0.12)"/>
  <text x="285" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">8-DAY STREAK</text>

  <!-- ETH price -->
  <rect x="380" y="185" width="200" height="72" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="215" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">ETHEREUM</text>
  <text x="400" y="244" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#e6edf3">+13%</text>
  <text x="470" y="244" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#22c55e">weekly</text>

  <!-- Mini BTC chart (stylized 8-day uptrend) -->
  <rect x="40" y="280" width="540" height="180" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="60" y="308" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BTC 8-DAY RALLY — $60K TO $74.5K</text>

  <!-- Chart area fill -->
  <polygon points="70,440 130,425 190,415 250,405 310,395 370,380 430,360 490,340 550,325 550,440" fill="url(#greenGrad)"/>
  <!-- Chart line -->
  <polyline points="70,440 130,425 190,415 250,405 310,395 370,380 430,360 490,340 550,325" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Chart dots -->
  <circle cx="70" cy="440" r="3" fill="#22c55e"/>
  <circle cx="130" cy="425" r="3" fill="#22c55e"/>
  <circle cx="190" cy="415" r="3" fill="#22c55e"/>
  <circle cx="250" cy="405" r="3" fill="#22c55e"/>
  <circle cx="310" cy="395" r="3" fill="#22c55e"/>
  <circle cx="370" cy="380" r="3" fill="#22c55e"/>
  <circle cx="430" cy="360" r="3" fill="#22c55e"/>
  <circle cx="490" cy="340" r="3" fill="#22c55e"/>
  <circle cx="550" cy="325" r="4" fill="#22c55e" filter="url(#glow)"/>
  <!-- Price labels -->
  <text x="65" y="438" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6e7681" text-anchor="end">$60K</text>
  <text x="555" y="320" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22c55e">$74.5K</text>
  <!-- FOMC marker -->
  <line x1="550" y1="310" x2="550" y2="445" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="548" y="455" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#f59e0b" text-anchor="end">FOMC →</text>

  <!-- Right panel: Key metrics -->
  <rect x="620" y="185" width="540" height="275" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="650" y="218" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="url(#brandGrad)" letter-spacing="0.03em">WHAT TO WATCH TOMORROW</text>

  <!-- Metric rows -->
  <!-- Rate decision -->
  <rect x="650" y="235" width="480" height="48" rx="10" fill="rgba(255,255,255,0.03)"/>
  <text x="670" y="256" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e">RATE DECISION</text>
  <text x="670" y="275" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Hold at 3.50–3.75%</text>
  <rect x="1020" y="248" width="90" height="24" rx="12" fill="rgba(34,197,94,0.12)"/>
  <text x="1065" y="265" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">98% PROB</text>

  <!-- Dot plot -->
  <rect x="650" y="293" width="480" height="48" rx="10" fill="rgba(245,158,11,0.06)"/>
  <text x="670" y="314" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e">DOT PLOT (THE REAL CATALYST)</text>
  <text x="670" y="333" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">0 cuts = bearish · 1 cut = neutral · 2 cuts = bullish</text>

  <!-- ETF inflows -->
  <rect x="650" y="351" width="480" height="48" rx="10" fill="rgba(255,255,255,0.03)"/>
  <text x="670" y="372" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e">MARCH ETF INFLOWS</text>
  <text x="670" y="391" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#06b6d4">$1.3B+ (first positive month since October)</text>

  <!-- Fear index -->
  <rect x="650" y="409" width="480" height="40" rx="10" fill="rgba(255,255,255,0.03)"/>
  <text x="670" y="430" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e">FEAR &amp; GREED</text>
  <text x="850" y="430" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">28</text>
  <text x="875" y="430" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e">(up from Extreme Fear 23)</text>

  <!-- Bottom status bar -->
  <rect x="0" y="490" width="1200" height="140" fill="rgba(0,0,0,0.3)"/>

  <!-- 3 scenario pills -->
  <text x="40" y="520" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e" letter-spacing="0.05em">THREE SCENARIOS</text>

  <!-- Bull -->
  <rect x="40" y="532" width="360" height="56" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="60" y="554" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e">BULL — Dot plot shows 2 cuts</text>
  <text x="60" y="575" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#8b949e">Powell calls Iran inflation transitory → BTC rally</text>

  <!-- Base -->
  <rect x="420" y="532" width="360" height="56" rx="12" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="440" y="554" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#06b6d4">BASE — 1 cut, vague guidance</text>
  <text x="440" y="575" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#8b949e">BTC treads water → wait for clarity</text>

  <!-- Bear -->
  <rect x="800" y="532" width="360" height="56" rx="12" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="820" y="554" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ef4444">BEAR — 0 cuts, stagflation flag</text>
  <text x="820" y="575" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#8b949e">Rate cuts pushed past 2026 → BTC sells off</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.4)"/>
  <text x="40" y="620" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681">degen0x.com/learn/fomc-fed-rate-crypto-guide</text>
  <text x="1160" y="620" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6e7681" text-anchor="end">Don't react. Prepare.</text>
</svg>