<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#0d1130;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e22;stop-opacity:1"/>
    </linearGradient>
    <!-- Brand signature gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="50%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <!-- Ethereum purple glow -->
    <radialGradient id="ethGlow" cx="85%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <!-- Cyan glow bottom-left -->
    <radialGradient id="cyanGlow" cx="15%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <!-- Glass card gradient -->
    <linearGradient id="cardGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <!-- Ethereum diamond gradient -->
    <linearGradient id="ethDiamond" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <!-- Amber card gradient -->
    <linearGradient id="amberCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <!-- EIP pill gradients -->
    <linearGradient id="pill1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="pill2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="pill3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
    </linearGradient>
    <!-- Countdown badge gradient -->
    <linearGradient id="countdownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="roundedCard">
      <rect x="64" y="170" width="780" height="350" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#ethGlow)"/>
  <rect width="1200" height="630" fill="url(#cyanGlow)"/>

  <!-- Subtle dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.03"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top accent bar (brand gradient) -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- ─── ETHEREUM DIAMOND (right side decorative) ─── -->
  <!-- Outer glow -->
  <g filter="url(#glow-purple)" opacity="0.6">
    <polygon points="980,95 1060,220 980,310 900,220" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <polygon points="980,130 1040,220 980,285 920,220" fill="url(#ethDiamond)" opacity="0.15"/>
  </g>
  <!-- Main diamond shape -->
  <polygon points="980,105 1050,215 980,300 910,215" fill="none" stroke="url(#ethDiamond)" stroke-width="2" opacity="0.7"/>
  <polygon points="980,140 1035,215 980,275 925,215" fill="url(#ethDiamond)" opacity="0.12"/>
  <!-- Diamond inner lines -->
  <line x1="980" y1="105" x2="980" y2="300" stroke="#8b5cf6" stroke-width="1" opacity="0.25"/>
  <line x1="910" y1="215" x2="1050" y2="215" stroke="#8b5cf6" stroke-width="1" opacity="0.25"/>
  <!-- Small orbiting nodes -->
  <circle cx="980" cy="105" r="5" fill="#a78bfa" opacity="0.8" filter="url(#glow-purple)"/>
  <circle cx="1050" cy="215" r="4" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="980" cy="300" r="5" fill="#6366f1" opacity="0.8"/>
  <circle cx="910" cy="215" r="4" fill="#8b5cf6" opacity="0.6"/>
  <!-- Network nodes scattered -->
  <circle cx="850" cy="150" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="1090" cy="140" r="2.5" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="1120" cy="280" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="870" cy="320" r="2" fill="#6366f1" opacity="0.3"/>
  <!-- Connecting lines -->
  <line x1="850" y1="150" x2="910" y2="215" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,6" opacity="0.2"/>
  <line x1="1090" y1="140" x2="1050" y2="215" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,6" opacity="0.2"/>
  <line x1="1120" y1="280" x2="1050" y2="215" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,6" opacity="0.2"/>

  <!-- ─── MAIN CONTENT CARD ─── -->
  <rect x="64" y="170" width="780" height="350" rx="20" ry="20" fill="url(#cardGlass)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#drop-shadow)"/>

  <!-- ─── LOGO + BRAND (top-left) ─── -->
  <!-- degen0x logo circle -->
  <circle cx="104" cy="60" r="22" fill="#6366f1" opacity="0.15"/>
  <circle cx="104" cy="60" r="18" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.7"/>
  <text x="104" y="65" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#818cf8" text-anchor="middle" letter-spacing="-0.5">0x</text>
  <text x="132" y="65" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#8b949e" letter-spacing="0.5">degen0x</text>

  <!-- ─── COUNTDOWN BADGE (top right of card) ─── -->
  <rect x="676" y="188" width="148" height="36" rx="18" ry="18" fill="url(#countdownGrad)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="699" cy="206" r="5" fill="#22c55e" opacity="0.9"/>
  <text x="712" y="211" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#4ade80" letter-spacing="0.3">~30 DAYS TO MAINNET</text>

  <!-- ─── MAIN TITLE ─── -->
  <text x="96" y="265" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#8b949e" letter-spacing="3">ETHEREUM UPGRADE</text>

  <text font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" letter-spacing="-2" filter="url(#glow-text)">
    <tspan x="96" dy="0">
      <tspan y="350" fill="url(#titleGrad)">PECTRA</tspan>
    </tspan>
  </text>

  <text x="96" y="395" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#8b949e">
    11 EIPs • Smart Wallets • 2,048 ETH Validators • Cheaper L2 Fees
  </text>

  <!-- ─── EIP PILLS ─── -->
  <!-- Pill 1: EIP-7702 Smart Wallets -->
  <rect x="96" y="422" width="238" height="70" rx="14" ry="14" fill="url(#pill1Grad)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="115" y="447" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#818cf8" letter-spacing="1.5">EIP-7702</text>
  <text x="115" y="468" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#e6edf3">Smart Wallets</text>
  <text x="115" y="484" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Batch txns · Gas sponsorship</text>

  <!-- Pill 2: EIP-7251 Validators -->
  <rect x="348" y="422" width="238" height="70" rx="14" ry="14" fill="url(#pill2Grad)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="367" y="447" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="1.5">EIP-7251</text>
  <text x="367" y="468" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#e6edf3">2,048 ETH Max</text>
  <text x="367" y="484" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Validator consolidation</text>

  <!-- Pill 3: EIP-7691 Blobs -->
  <rect x="600" y="422" width="222" height="70" rx="14" ry="14" fill="url(#pill3Grad)" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="619" y="447" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="1.5">EIP-7691</text>
  <text x="619" y="468" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#e6edf3">2× Blob Throughput</text>
  <text x="619" y="484" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Cheaper L2 transactions</text>

  <!-- ─── BOTTOM TIMELINE ─── -->
  <!-- Timeline bar -->
  <rect x="96" y="510" width="540" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="96" y="510" width="400" height="4" rx="2" fill="url(#brandGrad)" opacity="0.8"/>

  <!-- Timeline nodes -->
  <circle cx="96" cy="512" r="6" fill="#22c55e"/>
  <text x="82" y="534" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">Sepolia</text>
  <text x="82" y="546" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Feb ✓</text>

  <circle cx="248" cy="512" r="6" fill="#22c55e"/>
  <text x="248" y="534" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">Holesky</text>
  <text x="248" y="546" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Mar ✓</text>

  <circle cx="496" cy="512" r="7" fill="#f59e0b" stroke="#fde68a" stroke-width="2" stroke-opacity="0.5"/>
  <text x="496" y="534" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">MAINNET</text>
  <text x="496" y="546" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Apr 2026</text>

  <!-- Upcoming marker -->
  <circle cx="636" cy="512" r="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ─── BOTTOM URL ─── -->
  <text x="1136" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end" opacity="0.8">degen0x.com/learn/ethereum-pectra-upgrade-guide</text>

  <!-- Bottom gradient fade -->
  <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#080d1c;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#080d1c;stop-opacity:0.6"/>
  </linearGradient>
  <rect x="0" y="570" width="1200" height="60" fill="url(#bottomFade)"/>
</svg>
