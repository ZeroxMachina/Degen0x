<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>

    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>

    <linearGradient id="barUNI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff007a"/>
      <stop offset="100%" style="stop-color:#ff6ba8"/>
    </linearGradient>

    <linearGradient id="barLIDO" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a3ff"/>
      <stop offset="100%" style="stop-color:#4ec9ff"/>
    </linearGradient>

    <linearGradient id="barAAVE" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b6509e"/>
      <stop offset="100%" style="stop-color:#d880ca"/>
    </linearGradient>

    <linearGradient id="barHYPER" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>

    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45" result="blur"/>
    </filter>

    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Glow orbs -->
  <circle cx="950" cy="200" r="200" fill="#6366f1" opacity="0.07" filter="url(#orbGlow)"/>
  <circle cx="1050" cy="500" r="140" fill="#06b6d4" opacity="0.07" filter="url(#orbGlow)"/>
  <circle cx="150" cy="480" r="130" fill="#d97706" opacity="0.06" filter="url(#orbGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#brandGrad)"/>

  <!-- degen0x logo (top-left) -->
  <rect x="48" y="44" width="36" height="36" rx="10" fill="url(#logoGrad)" opacity="0.95"/>
  <text x="66" y="68" font-family="system-ui, monospace" font-size="14" font-weight="900" fill="white" text-anchor="middle">0x</text>
  <text x="93" y="68" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#e6edf3" letter-spacing="-0.5">degen0x</text>

  <!-- Category badge -->
  <rect x="48" y="130" width="96" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="96" y="148" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="0.5">TOKENOMICS</text>

  <!-- Main title line 1 -->
  <text x="48" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="66" font-weight="900" fill="url(#titleGrad)" letter-spacing="-1.5">Tokenomics 2.0</text>

  <!-- Main title line 2 -->
  <text x="48" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="900" fill="#e6edf3" letter-spacing="-1">DeFi Protocol Revenue</text>

  <!-- Subtitle -->
  <text x="48" y="372" font-family="system-ui, sans-serif" font-size="20" fill="#8b949e">Fee switches, buybacks &amp; burns — how DeFi tokens earn real value.</text>

  <!-- Divider -->
  <line x1="48" y1="410" x2="580" y2="410" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Protocol revenue bar chart (left column, below divider) -->
  <text x="48" y="436" font-family="system-ui, sans-serif" font-size="12" fill="#6e7681" font-weight="600" letter-spacing="0.5">30-DAY PROTOCOL REVENUE</text>

  <!-- Uniswap bar -->
  <text x="48" y="460" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">UNI</text>
  <rect x="84" y="448" width="220" height="14" rx="4" fill="url(#barUNI)" opacity="0.85"/>
  <text x="310" y="460" font-family="system-ui, sans-serif" font-size="12" fill="#e6edf3" font-weight="700">$102M</text>

  <!-- Lido bar -->
  <text x="48" y="483" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">LDO</text>
  <rect x="84" y="471" width="186" height="14" rx="4" fill="url(#barLIDO)" opacity="0.85"/>
  <text x="276" y="483" font-family="system-ui, sans-serif" font-size="12" fill="#e6edf3" font-weight="700">$85M</text>

  <!-- Hyperliquid bar -->
  <text x="48" y="506" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">HYPE</text>
  <rect x="84" y="494" width="162" height="14" rx="4" fill="url(#barHYPER)" opacity="0.85"/>
  <text x="252" y="506" font-family="system-ui, sans-serif" font-size="12" fill="#e6edf3" font-weight="700">$74M</text>

  <!-- Aave bar -->
  <text x="48" y="529" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">AAVE</text>
  <rect x="84" y="517" width="127" height="14" rx="4" fill="url(#barAAVE)" opacity="0.85"/>
  <text x="217" y="529" font-family="system-ui, sans-serif" font-size="12" fill="#e6edf3" font-weight="700">$58M</text>

  <!-- Right side: decorative mechanism cards -->
  <!-- Card: Fee Switch -->
  <rect x="700" y="130" width="200" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="720" y="162" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1" font-weight="700" letter-spacing="0.5">FEE SWITCH</text>
  <text x="720" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#e6edf3">Protocol → Holders</text>
  <text x="720" y="198" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Revenue flows to token stakers</text>

  <!-- Card: Buyback & Burn -->
  <rect x="920" y="130" width="200" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="940" y="162" font-family="system-ui, sans-serif" font-size="11" fill="#22c55e" font-weight="700" letter-spacing="0.5">BUYBACK &amp; BURN</text>
  <text x="940" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#e6edf3">Supply → Decreases</text>
  <text x="940" y="198" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Revenue buys &amp; destroys tokens</text>

  <!-- Card: P/E Ratio -->
  <rect x="700" y="230" width="200" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="720" y="262" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b" font-weight="700" letter-spacing="0.5">DeFi P/E RATIO</text>
  <text x="720" y="280" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#e6edf3">Mcap ÷ Revenue</text>
  <text x="720" y="298" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Valuation vs. real earnings</text>

  <!-- Card: UNI Burn highlight -->
  <rect x="920" y="230" width="200" height="80" rx="14" fill="rgba(255,0,122,0.06)" stroke="rgba(255,0,122,0.2)" stroke-width="1"/>
  <text x="940" y="262" font-family="system-ui, sans-serif" font-size="11" fill="#ff007a" font-weight="700" letter-spacing="0.5">UNI BURN</text>
  <text x="940" y="280" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#e6edf3">$591M Burned</text>
  <text x="940" y="298" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">100M UNI permanently removed</text>

  <!-- Arrow connecting cards decoratively -->
  <line x1="810" y1="170" x2="920" y2="170" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="810" y1="270" x2="920" y2="270" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="800" y1="210" x2="800" y2="230" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="1020" y1="210" x2="1020" y2="230" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Reading time badge -->
  <rect x="48" y="554" width="120" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="108" y="572" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">📖 12 min read</text>

  <!-- Bottom bar -->
  <rect x="0" y="595" width="1200" height="35" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="594" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="600" y="617" font-family="system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">degen0x.com · Crypto intelligence for every level</text>
</svg>
