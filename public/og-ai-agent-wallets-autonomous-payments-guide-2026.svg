<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Subtle decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="150" cy="500" r="140" fill="#06b6d4" opacity="0.03"/>
  <circle cx="900" cy="450" r="120" fill="#d97706" opacity="0.03"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>
  <text x="60" y="80" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">degen0x.com</text>

  <!-- Category badges -->
  <rect x="60" y="110" width="55" height="26" rx="6" fill="#8b5cf620" stroke="#8b5cf640" stroke-width="1"/>
  <text x="88" y="128" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" text-anchor="middle">AI</text>
  <rect x="125" y="110" width="68" height="26" rx="6" fill="#06b6d420" stroke="#06b6d440" stroke-width="1"/>
  <text x="159" y="128" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4" text-anchor="middle">Crypto</text>
  <rect x="203" y="110" width="82" height="26" rx="6" fill="#d2992220" stroke="#d2992240" stroke-width="1"/>
  <text x="244" y="128" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#d29922" text-anchor="middle">Advanced</text>

  <!-- Title -->
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#titleGrad)">AI Agent Wallets &amp;</text>
  <text x="60" y="245" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#titleGrad)">Autonomous Payments</text>
  <text x="60" y="295" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#titleGrad)">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="335" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">How AI agents manage crypto wallets, make payments &amp; trade autonomously</text>

  <!-- Stats cards row -->
  <rect x="60" y="365" width="200" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="393" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">AI Agent Market</text>
  <text x="80" y="425" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#8b5cf6">$47B+</text>

  <rect x="280" y="365" width="200" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="300" y="393" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Agent Transactions</text>
  <text x="300" y="425" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4">12M+/day</text>

  <rect x="500" y="365" width="200" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="520" y="393" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Protocols</text>
  <text x="520" y="425" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">50+</text>

