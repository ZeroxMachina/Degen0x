  <line x1="930" y1="388" x2="960" y2="388" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="945" y="382" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6e7681">→</text>

  <rect x="960" y="370" width="70" height="36" rx="8" fill="#06b6d420" stroke="#06b6d440" stroke-width="1"/>
  <text x="995" y="393" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#06b6d4" text-anchor="middle">Wallet</text>

  <line x1="1030" y1="388" x2="1060" y2="388" stroke="#6e7681" stroke-width="1.5"/>
  <text x="1045" y="382" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6e7681">→</text>

  <rect x="1060" y="370" width="70" height="36" rx="8" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
  <text x="1095" y="393" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">DeFi</text>

  <!-- Second row: Payment flow -->
  <rect x="850" y="430" width="80" height="36" rx="8" fill="#8b5cf620" stroke="#8b5cf640" stroke-width="1"/>
  <text x="890" y="453" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6" text-anchor="middle">Detect</text>

  <text x="945" y="448" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6e7681">→</text>

  <rect x="960" y="430" width="70" height="36" rx="8" fill="#f59e0b20" stroke="#f59e0b40" stroke-width="1"/>
  <text x="995" y="453" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">Sign</text>

  <text x="1045" y="448" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6e7681">→</text>

  <rect x="1060" y="430" width="70" height="36" rx="8" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
  <text x="1095" y="453" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">Execute</text>

  <!-- Labels -->
  <text x="890" y="492" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">MPC · Smart Wallets · Account Abstraction</text>

  <!-- Bottom info bar -->
  <rect x="60" y="470" width="700" height="55" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="502" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Covers: MPC wallets · Smart accounts · x402 payments · Agent frameworks · Security models</text>

  <!-- Bottom branding -->
  <rect x="0" y="586" width="1200" height="44" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="614" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8">degen0x.com</text>
  <text x="1140" y="614" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Updated March 2026</text>
</svg>