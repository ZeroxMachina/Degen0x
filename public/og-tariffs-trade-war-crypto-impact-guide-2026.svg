<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="500" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative chart - volatile price action -->
  <g transform="translate(650, 80)">
    <!-- Grid -->
    <g opacity="0.05" stroke="#ffffff" stroke-width="1">
      <line x1="0" y1="0" x2="500" y2="0"/>
      <line x1="0" y1="80" x2="500" y2="80"/>
      <line x1="0" y1="160" x2="500" y2="160"/>
      <line x1="0" y1="240" x2="500" y2="240"/>
      <line x1="0" y1="320" x2="500" y2="320"/>
      <line x1="0" y1="400" x2="500" y2="400"/>
    </g>

    <!-- Volatile downtrend line -->
    <path d="M 20 120 L 60 80 L 100 150 L 140 100 L 180 200 L 220 160 L 260 280 L 300 220 L 340 310 L 380 270 L 420 340 L 460 300" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
    <!-- Area fill -->
    <path d="M 20 120 L 60 80 L 100 150 L 140 100 L 180 200 L 220 160 L 260 280 L 300 220 L 340 310 L 380 270 L 420 340 L 460 300 L 460 420 L 20 420 Z" fill="url(#redGrad)"/>

    <!-- Tariff announcement markers -->
    <g transform="translate(140, 70)">
      <line x1="0" y1="0" x2="0" y2="350" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
      <rect x="-30" y="-20" width="60" height="20" rx="4" fill="#f59e0b" fill-opacity="0.2"/>
      <text x="0" y="-6" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="9" font-weight="700">TARIFF</text>
    </g>
    <g transform="translate(300, 190)">
      <line x1="0" y1="0" x2="0" y2="230" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
      <rect x="-40" y="-20" width="80" height="20" rx="4" fill="#f59e0b" fill-opacity="0.2"/>
      <text x="0" y="-6" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="9" font-weight="700">RETALIATION</text>
    </g>

    <!-- BTC label -->
    <text x="470" y="306" fill="#ef4444" font-family="Inter, sans-serif" font-size="12" font-weight="700" opacity="0.7">BTC</text>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.2"/>
    <text x="16" y="21" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="14" font-weight="800">0x</text>
  </g>
  <text x="100" y="56" fill="#e6edf3" font-family="Inter, sans-serif" font-size="16" font-weight="700" opacity="0.7">degen0x</text>

  <!-- Category badges -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.3"/>
    <text x="40" y="17" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="11" font-weight="700">Macro</text>

    <rect x="90" y="0" width="100" height="26" rx="13" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="140" y="17" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="11" font-weight="700">Trade War</text>

    <rect x="200" y="0" width="80" height="26" rx="13" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.3"/>
    <text x="240" y="17" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="11" font-weight="700">Policy</text>
  </g>

  <!-- Title -->
  <text x="60" y="195" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.02em">Tariffs &amp; Trade War</text>
  <text x="60" y="250" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.02em">Crypto Impact</text>
  <text x="60" y="305" fill="url(#titleGrad)" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="350" fill="#8b949e" font-family="Inter, sans-serif" font-size="17">How trade policy shocks ripple through</text>
  <text x="60" y="375" fill="#8b949e" font-family="Inter, sans-serif" font-size="17">crypto markets and DeFi</text>

  <!-- Stats boxes -->
  <g transform="translate(60, 410)">
    <rect x="0" y="0" width="160" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="80" y="30" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="22" font-weight="800">-15%</text>
    <text x="80" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">BTC on Tariff Day</text>

    <rect x="175" y="0" width="160" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="255" y="30" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="22" font-weight="800">$2T+</text>
    <text x="255" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Crypto Market Cap</text>

    <rect x="350" y="0" width="160" height="70" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="430" y="30" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="22" font-weight="800">DeFi</text>
    <text x="430" y="52" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Hedge Strategies</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0a0f1e"/>
  <text x="60" y="620" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="600">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="12">Updated March 2026</text>
</svg>