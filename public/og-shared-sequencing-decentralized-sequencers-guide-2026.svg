<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Sequencer network visual -->
  <g filter="url(#glow)" opacity="0.15">
    <!-- Central sequencer node -->
    <circle cx="950" cy="230" r="40" fill="#22c55e"/>
    <!-- Connected rollup nodes -->
    <circle cx="850" cy="150" r="25" fill="#06b6d4"/>
    <circle cx="1060" cy="170" r="25" fill="#6366f1"/>
    <circle cx="870" cy="340" r="25" fill="#f59e0b"/>
    <circle cx="1040" cy="320" r="25" fill="#ec4899"/>
    <!-- Lines -->
    <line x1="950" y1="230" x2="850" y2="150" stroke="#22c55e" stroke-width="2"/>
    <line x1="950" y1="230" x2="1060" y2="170" stroke="#06b6d4" stroke-width="2"/>
    <line x1="950" y1="230" x2="870" y2="340" stroke="#f59e0b" stroke-width="2"/>
    <line x1="950" y1="230" x2="1040" y2="320" stroke="#ec4899" stroke-width="2"/>
    <!-- Cross connections -->
    <line x1="850" y1="150" x2="1060" y2="170" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="870" y1="340" x2="1040" y2="320" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Badge -->
  <rect x="60" y="80" width="100" height="28" rx="6" fill="#22c55e20" stroke="#22c55e" stroke-width="1"/>
  <text x="110" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">LEARN</text>

  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)">Shared Sequencing &amp;</text>
  <text x="60" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)">Decentralized</text>
  <text x="60" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)">Sequencers 2026</text>

  <text x="60" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e">Espresso, Astria, Radius — solving the rollup centralization problem</text>

  <!-- Stats -->
  <g>
    <rect x="60" y="370" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="80" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#22c55e">Espresso</text>
    <text x="80" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Shared sequencing</text>

    <rect x="300" y="370" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="320" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#06b6d4">Astria</text>
    <text x="320" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Lazy sequencing</text>

    <rect x="540" y="370" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="560" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#6366f1">Anti-MEV</text>
    <text x="560" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Fair ordering</text>
  </g>

  <!-- Footer -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0f1a"/>
  <text x="60" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#58a6ff">degen0x.com</text>
  <text x="1140" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#484f58" text-anchor="end">2026 Guide</text>
</svg>