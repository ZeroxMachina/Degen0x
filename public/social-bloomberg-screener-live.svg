<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="brand2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="300" cy="200" r="250" fill="#6366f1" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="900" cy="400" r="200" fill="#06b6d4" opacity="0.06" filter="url(#glow2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand2)"/>

  <!-- degen0x logo text -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#brand2)" letter-spacing="0.05em">degen0x</text>

  <!-- LIVE badge -->
  <rect x="920" y="40" width="220" height="44" rx="22" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <circle cx="950" cy="62" r="6" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="968" y="69" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e" letter-spacing="0.08em">LIVE DATA</text>

  <!-- Main title -->
  <text x="60" y="165" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Bloomberg Screener V3</text>
  <text x="60" y="215" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="600" fill="#06b6d4" letter-spacing="-0.01em">Real-Time DeFi Data — Powered by DefiLlama</text>

  <!-- Subtitle -->
  <text x="60" y="260" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">Live TVL, yields, and volume across 200+ protocols. Free. No signup. Updated every 60 seconds.</text>

  <!-- Glass card: Protocol table mockup -->
  <rect x="60" y="290" width="720" height="270" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Table header -->
  <rect x="60" y="290" width="720" height="40" rx="16" fill="rgba(255,255,255,0.03)"/>
  <text x="90" y="316" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="0.08em">PROTOCOL</text>
  <text x="310" y="316" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="0.08em">TVL</text>
  <text x="450" y="316" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="0.08em">APY</text>
  <text x="570" y="316" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="0.08em">24H CHANGE</text>

  <!-- Row 1: Aave -->
  <circle cx="105" cy="358" r="14" fill="#2e1a47"/>
  <text x="100" y="363" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#b57bff" text-anchor="middle">A</text>
  <text x="132" y="363" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">Aave V3</text>
  <text x="132" y="380" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Lending</text>
  <text x="310" y="367" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#e6edf3">$12.4B</text>
  <text x="450" y="367" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#06b6d4">4.2%</text>
  <text x="570" y="367" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#22c55e">+2.1%</text>

  <!-- Row 2: Lido -->
  <circle cx="105" cy="418" r="14" fill="#1a2e47"/>
  <text x="100" y="423" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#60b8ff" text-anchor="middle">L</text>
  <text x="132" y="423" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">Lido</text>
  <text x="132" y="440" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Liquid Staking</text>
  <text x="310" y="427" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#e6edf3">$28.6B</text>
  <text x="450" y="427" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#06b6d4">3.6%</text>
  <text x="570" y="427" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#22c55e">+0.8%</text>

  <!-- Row 3: EigenLayer -->
  <circle cx="105" cy="478" r="14" fill="#1a3347"/>
  <text x="100" y="483" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#6366f1" text-anchor="middle">E</text>
  <text x="132" y="483" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">EigenLayer</text>
  <text x="132" y="500" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Restaking</text>
  <text x="310" y="487" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#e6edf3">$15.2B</text>
  <text x="450" y="487" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#06b6d4">5.1%</text>
  <text x="570" y="487" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#ef4444">-1.3%</text>

  <!-- Row 4: Uniswap -->
  <circle cx="105" cy="538" r="14" fill="#2e1a3a"/>
  <text x="100" y="543" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ff007a" text-anchor="middle">U</text>
  <text x="132" y="543" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">Uniswap V3</text>
  <text x="132" y="558" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">DEX</text>
  <text x="310" y="547" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#e6edf3">$5.8B</text>
  <text x="450" y="547" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#06b6d4">8.4%</text>
  <text x="570" y="547" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#22c55e">+3.7%</text>

  <!-- Right side: Feature highlights -->
  <rect x="820" y="290" width="320" height="270" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="850" y="330" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681" letter-spacing="0.08em">WHAT'S NEW</text>

  <!-- Feature 1 -->
  <circle cx="860" cy="370" r="8" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="860" cy="370" r="3" fill="#06b6d4"/>
  <text x="880" y="375" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Live TVL tracking</text>
  <text x="880" y="393" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">200+ protocols, real-time</text>

  <!-- Feature 2 -->
  <circle cx="860" cy="425" r="8" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="860" cy="425" r="3" fill="#6366f1"/>
  <text x="880" y="430" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Yield comparison</text>
  <text x="880" y="448" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">APY across lending &amp; staking</text>

  <!-- Feature 3 -->
  <circle cx="860" cy="480" r="8" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="860" cy="480" r="3" fill="#f59e0b"/>
  <text x="880" y="485" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">60-second refresh</text>
  <text x="880" y="503" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">DefiLlama API integration</text>

  <!-- Feature 4 -->
  <circle cx="860" cy="535" r="8" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="860" cy="535" r="3" fill="#22c55e"/>
  <text x="880" y="540" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Free, no signup</text>
  <text x="880" y="558" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">No paywall. Just data.</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#8b949e">degen0x.com/tools/bloomberg-screener</text>
  <text x="1020" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Sprint 58</text>
</svg>