    <circle cx="1020" cy="140" r="60" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <circle cx="1080" cy="80" r="60" fill="none" stroke="#22d3ee" stroke-width="3"/>
    <circle cx="880" cy="160" r="60" fill="none" stroke="#fbbf24" stroke-width="3"/>
