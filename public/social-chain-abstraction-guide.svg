  <text x="92" y="460" font-family="system-ui, sans-serif" font-size="14" fill="#22d3ee" font-weight="700">Intent-Based Execution</text>
  <text x="92" y="480" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">Socket — 300+ chains, solver network</text>

