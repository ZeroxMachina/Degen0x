  <rect x="876" y="475" width="85" height="40" rx="8" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="918" y="500" font-family="system-ui, sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle" font-weight="600">SOL</text>

