  <rect x="0" y="590" width="1200" height="40" fill="rgba(6,182,212,0.06)"/>
  <text x="50" y="616" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.6)" font-weight="700">degen0x</text>
  <text x="130" y="616" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">degen0x.com/learn/chain-abstraction-guide-2026</text>
  <rect x="1050" y="600" width="110" height="26" rx="13" fill="rgba(6,182,212,0.2)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="1105" y="618" font-family="system-ui, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle" font-weight="600">FULL GUIDE</text>
