  <circle cx="335" cy="365" r="8" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="335" y="369" font-family="system-ui, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="700">2</text>
