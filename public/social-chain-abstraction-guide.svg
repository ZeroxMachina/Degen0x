  <text x="309" y="283" font-family="system-ui, sans-serif" font-size="10" fill="rgba(139,92,246,0.7)" text-anchor="middle" letter-spacing="1">QoQ GROWTH</text>
  <text x="309" y="300" font-family="system-ui, sans-serif" font-size="15" fill="#8b5cf6" text-anchor="middle" font-weight="700">+557%</text>

