<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="circleGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="circleGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="url(#circleGrad1)"/>
  <circle cx="150" cy="500" r="150" fill="url(#circleGrad2)"/>

  <!-- ZK proof visualization -->
  <g opacity="0.15">
    <!-- Circuit-like lines -->
    <line x1="900" y1="200" x2="1100" y2="200" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="1000" y1="150" x2="1000" y2="350" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="1000" cy="200" r="6" fill="#6366f1"/>
    <circle cx="1000" cy="280" r="4" fill="#06b6d4"/>
    <circle cx="940" cy="200" r="4" fill="#a5b4fc"/>
    <circle cx="1060" cy="200" r="4" fill="#a5b4fc"/>
    <!-- Proof arrows -->
    <path d="M950 320 L1000 280 L1050 320" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <rect x="960" y="340" width="80" height="30" rx="4" fill="none" stroke="#22c55e" stroke-width="1"/>
    <text x="1000" y="360" text-anchor="middle" fill="#22c55e" font-size="11" font-family="Inter, sans-serif">✓ VERIFIED</text>
  </g>

  <!-- Logo area -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.9"/>
    <text x="16" y="22" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Inter, sans-serif">0x</text>
    <text x="44" y="22" fill="#8b949e" font-size="15" font-weight="600" font-family="Inter, sans-serif">degen0x</text>
  </g>

  <!-- Category badge -->
  <rect x="60" y="100" width="80" height="28" rx="14" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
  <text x="100" y="119" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600" font-family="Inter, sans-serif">LEARN</text>

  <!-- Title -->
  <text x="60" y="190" fill="url(#titleGrad)" font-size="48" font-weight="800" font-family="Inter, sans-serif" letter-spacing="-1">ZK Coprocessors</text>
  <text x="60" y="250" fill="url(#titleGrad)" font-size="48" font-weight="800" font-family="Inter, sans-serif" letter-spacing="-1">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="310" fill="#8b949e" font-size="22" font-family="Inter, sans-serif">Offchain Compute, Onchain Proof</text>

  <!-- Key projects -->
  <g transform="translate(60, 370)">
    <text fill="#6e7681" font-size="13" font-family="Inter, sans-serif" font-weight="600" letter-spacing="1">FEATURED PROJECTS</text>
  </g>
  <g transform="translate(60, 400)">
    <rect x="0" y="0" width="90" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="45" y="21" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500" font-family="Inter, sans-serif">Axiom</text>

    <rect x="100" y="0" width="90" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="145" y="21" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500" font-family="Inter, sans-serif">Brevis</text>

    <rect x="200" y="0" width="120" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="260" y="21" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500" font-family="Inter, sans-serif">Herodotus</text>

    <rect x="330" y="0" width="110" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="385" y="21" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500" font-family="Inter, sans-serif">RISC Zero</text>

    <rect x="450" y="0" width="110" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="505" y="21" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500" font-family="Inter, sans-serif">Succinct</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="611" fill="#6e7681" font-size="14" font-family="Inter, sans-serif">degen0x.com</text>
  <text x="1140" y="611" text-anchor="end" fill="#6e7681" font-size="14" font-family="Inter, sans-serif">March 2026</text>
</svg>