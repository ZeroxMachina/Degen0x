<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1530"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="180" r="180" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="350" r="120" fill="#06b6d4" opacity="0.05" filter="url(#glow)"/>

  <!-- Shield icon (TEE enclave visual) -->
  <g transform="translate(900, 120)" opacity="0.15">
    <path d="M80 10 L150 40 V120 C150 180 80 210 80 210 C80 210 10 180 10 120 V40 Z" fill="url(#shield)" stroke="#6366f1" stroke-width="2"/>
    <path d="M60 110 L80 130 L120 80" fill="none" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Lock icon decoration -->
  <g transform="translate(1020, 280)" opacity="0.12">
    <rect x="10" y="30" width="50" height="40" rx="5" fill="#06b6d4"/>
    <path d="M20 30 V20 C20 8 50 8 50 20 V30" fill="none" stroke="#06b6d4" stroke-width="4"/>
    <circle cx="35" cy="50" r="5" fill="#080d1c"/>
  </g>

  <!-- degen0x logo text -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#6366f1" opacity="0.9">degen0x</text>

  <!-- Category badge -->
  <rect x="60" y="140" width="210" height="30" rx="15" fill="#6366f120"/>
  <text x="165" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1" text-anchor="middle">Privacy &amp; Cryptography</text>

  <!-- Main title -->
  <text x="60" y="230" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">TEE &amp; Verifiable</text>
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Compute Guide</text>

  <!-- Subtitle -->
  <text x="60" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">How Trusted Execution Environments reshape blockchain</text>
  <text x="60" y="368" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">privacy, MEV protection &amp; confidential AI in 2026</text>

  <!-- Stats row -->
  <g transform="translate(60, 420)">
    <rect width="160" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-transform="uppercase">Teams Building</text>
    <text x="15" y="48" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#6366f1">50+</text>
  </g>
  <g transform="translate(240, 420)">
    <rect width="200" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">LLM Tokens via Phala</text>
    <text x="15" y="48" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#06b6d4">3.73B</text>
  </g>
  <g transform="translate(460, 420)">
    <rect width="180" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Speed Advantage</text>
    <text x="15" y="48" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#22c55e">~Native</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
