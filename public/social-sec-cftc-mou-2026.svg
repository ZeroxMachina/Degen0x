<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="cardGlow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(99,102,241,0.15)"/>
      <stop offset="100%" stop-color="rgba(99,102,241,0.02)"/>
    </linearGradient>
    <linearGradient id="cardGlow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(6,182,212,0.15)"/>
      <stop offset="100%" stop-color="rgba(6,182,212,0.02)"/>
    </linearGradient>
    <linearGradient id="cardGlow3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(245,158,11,0.15)"/>
      <stop offset="100%" stop-color="rgba(245,158,11,0.02)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded1"><rect x="60" y="340" width="250" height="120" rx="16"/></clipPath>
    <clipPath id="rounded2"><rect x="330" y="340" width="250" height="120" rx="16"/></clipPath>
    <clipPath id="rounded3"><rect x="600" y="340" width="250" height="120" rx="16"/></clipPath>
    <clipPath id="rounded4"><rect x="870" y="340" width="270" height="120" rx="16"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="200" cy="150" r="200" fill="#4f46e5" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="1000" cy="500" r="180" fill="#0891b2" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="600" cy="300" r="150" fill="#d97706" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Badge -->
  <rect x="60" y="40" width="220" height="34" rx="17" fill="url(#badgeGrad)" opacity="0.15"/>
  <circle cx="78" cy="57" r="5" fill="#22c55e" opacity="0.9"/>
  <text x="92" y="62" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e" letter-spacing="0.05em">HISTORIC AGREEMENT</text>

  <!-- degen0x logo text -->
  <text x="1080" y="62" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#accent)" text-anchor="end" letter-spacing="-0.02em">degen0x</text>

  <!-- Main Title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">SEC + CFTC End the</text>
  <text x="60" y="198" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Crypto Turf War</text>

  <!-- Subtitle -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Historic MOU classifies BTC &amp; ETH as commodities — regulatory clarity for institutional capital</text>

  <!-- Classification tags row -->
  <!-- BTC = Commodity -->
  <rect x="60" y="275" width="195" height="38" rx="12" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="80" y="299" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f59e0b">₿ Bitcoin</text>
  <text x="165" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f59e0b" opacity="0.8">→ Commodity</text>

  <!-- ETH = Commodity -->
  <rect x="270" y="275" width="210" height="38" rx="12" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="290" y="299" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#818cf8">◆ Ethereum</text>
  <text x="387" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#818cf8" opacity="0.8">→ Commodity</text>

  <!-- ICO = Security -->
  <rect x="495" y="275" width="215" height="38" rx="12" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="515" y="299" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ef4444">⚠ ICO Tokens</text>
  <text x="625" y="299" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ef4444" opacity="0.8">→ Securities</text>

  <!-- Stat Cards -->
  <!-- Card 1: Weekly Inflows -->
  <rect x="60" y="340" width="250" height="120" rx="16" fill="url(#cardGlow1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="80" y="375" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-transform="uppercase" letter-spacing="0.06em">WEEKLY INFLOWS</text>
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3">$1.06B</text>
  <text x="80" y="438" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e">3rd consecutive week</text>

  <!-- Card 2: BTC Price -->
  <rect x="330" y="340" width="250" height="120" rx="16" fill="url(#cardGlow2)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="350" y="375" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.06em">BTC PRICE</text>
  <text x="350" y="410" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3">$73,882</text>
  <text x="350" y="438" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e">+$2,327 today ↑</text>

  <!-- Card 3: Short Liquidations -->
  <rect x="600" y="340" width="250" height="120" rx="16" fill="url(#cardGlow3)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="620" y="375" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.06em">SHORT LIQUIDATIONS</text>
  <text x="620" y="410" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3">$285M</text>
  <text x="620" y="438" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#f59e0b">83% of total liquidations</text>

  <!-- Card 4: BlackRock AUM -->
  <rect x="870" y="340" width="270" height="120" rx="16" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="890" y="375" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.06em">BLACKROCK CRYPTO ETPs</text>
  <text x="890" y="410" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3">$130B+</text>
  <text x="890" y="438" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b5cf6">IBIT + ETHB + more</text>

  <!-- CTA Bar -->
  <rect x="60" y="490" width="1080" height="52" rx="14" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="600" y="522" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="600" fill="#818cf8" text-anchor="middle">Full 2026 crypto regulations breakdown → degen0x.com/learn/crypto-regulations-2026</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="600" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com — Free crypto tools, guides &amp; market data</text>
  <text x="1140" y="600" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">March 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>