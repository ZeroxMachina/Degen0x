<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="pt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="yt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="320" cy="300" r="280" fill="#6366f1" opacity="0.06"/>
  <circle cx="880" cy="350" r="240" fill="#a371f7" opacity="0.05"/>
  <circle cx="650" cy="500" r="160" fill="#06b6d4" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo area -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="2">degen0x</text>

  <!-- Yield tokenization diagram -->
  <g transform="translate(760, 120)">
    <rect x="0" y="0" width="360" height="220" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">YIELD TOKENIZATION</text>

    <!-- Asset box -->
    <rect x="130" y="55" width="100" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="180" y="78" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">stETH</text>

    <!-- Arrow down -->
    <line x1="180" y1="95" x2="180" y2="115" stroke="#8b949e" stroke-width="1.5"/>
    <polygon points="175,112 180,120 185,112" fill="#8b949e"/>

    <!-- Split into PT and YT -->
    <line x1="180" y1="120" x2="110" y2="145" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="180" y1="120" x2="250" y2="145" stroke="#f59e0b" stroke-width="1.5"/>

    <!-- PT box -->
    <rect x="50" y="145" width="120" height="55" rx="10" fill="rgba(99,102,241,0.15)" stroke="#818cf8" stroke-width="1"/>
    <text x="110" y="168" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#818cf8" text-anchor="middle">PT (Principal)</text>
    <text x="110" y="188" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Fixed Yield</text>

    <!-- YT box -->
    <rect x="190" y="145" width="120" height="55" rx="10" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1"/>
    <text x="250" y="168" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">YT (Yield)</text>
    <text x="250" y="188" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Speculative</text>
  </g>

  <!-- Category badges -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="60" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1"/>
    <text x="30" y="19" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">DeFi</text>
    <rect x="70" y="0" width="90" height="28" rx="14" fill="rgba(139,92,246,0.15)" stroke="#a371f7" stroke-width="1"/>
    <text x="115" y="19" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a371f7" text-anchor="middle">Advanced</text>
  </g>

  <!-- Title -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#accent)" letter-spacing="-1">Pendle Finance</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">Yield Tokenization Explained — 2026 Guide</text>
  <text x="60" y="325" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#6e7681">PT/YT mechanics · Boros V3 · sPENDLE tokenomics</text>

  <!-- Key stats -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="180" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">TVL</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#22c55e">$8.9B</text>
  </g>
  <g transform="translate(260, 380)">
    <rect x="0" y="0" width="180" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">MARKET SHARE</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#a371f7">58%</text>
  </g>
  <g transform="translate(460, 380)">
    <rect x="0" y="0" width="180" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">CHAINS</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#06b6d4">5 Live</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>