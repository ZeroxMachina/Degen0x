  <text x="620" y="216" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Dollar weakens → liquidity loosens → risk-on rotation</text>
  <text x="620" y="238" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Institutional capital accelerates into BTC ETFs</text>
  <text x="620" y="260" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="rgba(34,197,94,0.7)">Powell's tone: "inflation progressing" → sustained rally</text>

  <!-- Scenario Card 2 — Hawkish -->
  <rect x="600" y="290" width="560" height="148" rx="16" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.22)" stroke-width="1" filter="url(#glassShadow)"/>
  <rect x="600" y="290" width="4" height="148" rx="2" fill="#ef4444"/>

  <rect x="620" y="306" width="96" height="22" rx="11" fill="rgba(239,68,68,0.18)"/>
  <text x="668" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ef4444" letter-spacing="1">HAWKISH</text>

  <text x="736" y="321" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#6e7681">Dot plot removes projected cuts</text>

  <text x="620" y="354" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#ef4444">$65K–$70K</text>
  <text x="810" y="354" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#ef4444">support re-test</text>

  <text x="620" y="380" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Dollar strengthens → risk-off pressure across all assets</text>
  <text x="620" y="402" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Short-term correction — but structure remains intact</text>
  <text x="620" y="424" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="rgba(239,68,68,0.7)">Stagflation signals → prolonged consolidation phase</text>

  <!-- Scenario Card 3 — Base Case -->
  <rect x="600" y="454" width="560" height="100" rx="16" fill="rgba(99,102,241,0.07)" stroke="rgba(99,102,241,0.2)" stroke-width="1" filter="url(#glassShadow)"/>
  <rect x="600" y="454" width="4" height="100" rx="2" fill="#6366f1"/>

  <rect x="620" y="470" width="106" height="22" rx="11" fill="rgba(99,102,241,0.2)"/>
  <text x="673" y="485" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#818cf8" letter-spacing="1">BASE CASE</text>

  <text x="746" y="485" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#6e7681">1 cut stays, neutral tone</text>

  <text x="620" y="518" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#818cf8">$72K–$77K</text>
  <text x="790" y="518" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#818cf8">consolidation range</text>

  <text x="620" y="540" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Market digests, ETF inflows continue, next move in May</text>

  <!-- === BOTTOM BAR === -->
  <rect x="0" y="582" width="1200" height="48" fill="rgba(255,255,255,0.025)" />
  <line x1="0" y1="582" x2="1200" y2="582" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Bottom logo + url -->
  <circle cx="50" cy="606" r="12" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="50" y="611" text-anchor="middle" font-family="Inter, monospace" font-size="9" font-weight="900" fill="#818cf8">0x</text>
  <text x="72" y="611" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">degen<tspan fill="#6366f1">0x</tspan><tspan fill="#6e7681">.com</tspan></text>

  <!-- Tagline -->
  <text x="600" y="611" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#6e7681">Real-time crypto tools, guides &amp; data — no sign-up required</text>

  <!-- Date + page count pill (right) -->
  <rect x="1010" y="590" width="170" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="1095" y="611" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8b949e">Mar 18, 2026 · 398 pages</text>
</svg>
