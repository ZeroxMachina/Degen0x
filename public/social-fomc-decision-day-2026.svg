<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="60%" style="stop-color:#0a1128"/>
      <stop offset="100%" style="stop-color:#060912"/>
    </linearGradient>

    <!-- Brand signature gradient (indigo → cyan → amber) -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6edf3"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>

    <!-- Indigo glow -->
    <radialGradient id="indigoGlow" cx="25%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>

    <!-- Cyan glow (right side) -->
    <radialGradient id="cyanGlow" cx="80%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>

    <!-- Glass panel filter -->
    <filter id="glassShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.5)"/>
    </filter>

    <!-- Green dot glow -->
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip for main card -->
    <clipPath id="mainClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#indigoGlow)"/>
  <rect width="1200" height="630" fill="url(#cyanGlow)"/>

  <!-- Subtle dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- === TOP GRADIENT BAR === -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- === LOGO AREA (top-left) === -->
  <!-- Logo circle with gradient -->
  <circle cx="56" cy="46" r="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
  <text x="56" y="52" text-anchor="middle" font-family="Inter, monospace" font-size="14" font-weight="900" fill="#818cf8">0x</text>
  <!-- Wordmark -->
  <text x="86" y="52" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">degen<tspan fill="#6366f1">0x</tspan></text>

  <!-- Live badge -->
  <rect x="1070" y="28" width="98" height="34" rx="17" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <circle cx="1088" cy="45" r="5" fill="#ef4444" filter="url(#greenGlow)"/>
  <text x="1098" y="50" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#ef4444" letter-spacing="0.5">LIVE</text>

  <!-- === MAIN CONTENT AREA === -->

  <!-- Left column: Main title + context -->

  <!-- Eyebrow label -->
  <rect x="56" y="90" width="230" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="171" y="109" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#818cf8" letter-spacing="1.5">FOMC DECISION DAY</text>

  <!-- Main title -->
  <text x="56" y="175" font-family="Inter, sans-serif" font-size="66" font-weight="900" letter-spacing="-2" fill="url(#titleGrad)">The Fed</text>
  <text x="56" y="250" font-family="Inter, sans-serif" font-size="66" font-weight="900" letter-spacing="-2" fill="#e6edf3">decides today.</text>

  <!-- Sub-headline -->
  <text x="56" y="298" font-family="Inter, sans-serif" font-size="21" font-weight="400" fill="#8b949e">Rate hold priced in — the dot plot is the real signal</text>

  <!-- Divider line -->
  <line x1="56" y1="326" x2="380" y2="326" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Key data points -->
  <text x="56" y="358" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6e7681" letter-spacing="1">DECISION AT 2PM ET · PRESS CONF AT 2:30PM ET</text>

  <!-- BTC price pill -->
  <rect x="56" y="378" width="155" height="44" rx="10" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.3)" stroke-width="1" filter="url(#glassShadow)"/>
  <text x="68" y="397" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#22c55e" letter-spacing="1">$BTC</text>
  <text x="68" y="413" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#22c55e">$75,240</text>
  <text x="178" y="413" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e">↑ 25%</text>

  <!-- F&G pill -->
  <rect x="224" y="378" width="155" height="44" rx="10" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1" filter="url(#glassShadow)"/>
  <text x="236" y="397" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f59e0b" letter-spacing="1">FEAR &amp; GREED</text>
  <text x="236" y="413" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#f59e0b">35 / 100</text>
  <text x="354" y="413" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">↑</text>

  <!-- ETF pill -->
  <rect x="56" y="432" width="323" height="44" rx="10" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1" filter="url(#glassShadow)"/>
  <text x="68" y="451" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#818cf8" letter-spacing="1">ETF INFLOWS</text>
  <text x="68" y="467" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#818cf8">$962.8M</text>
  <text x="185" y="467" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#6366f1"> — 6-day streak</text>

  <!-- URL -->
  <rect x="56" y="492" width="340" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="76" y="517" font-family="Inter, monospace" font-size="14" font-weight="500" fill="#8b949e">degen0x.com/learn/fomc-fed-rate-crypto-guide</text>

  <!-- === RIGHT COLUMN: Scenario cards === -->

  <!-- Section header -->
  <text x="600" y="109" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#6e7681" letter-spacing="2">DOT PLOT SCENARIOS</text>

  <!-- Scenario Card 1 — Dovish -->
  <rect x="600" y="126" width="560" height="148" rx="16" fill="rgba(34,197,94,0.07)" stroke="rgba(34,197,94,0.25)" stroke-width="1" filter="url(#glassShadow)"/>
  <!-- Left accent bar -->
  <rect x="600" y="126" width="4" height="148" rx="2" fill="#22c55e"/>

  <!-- Scenario label -->
