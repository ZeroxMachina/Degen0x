  <text x="665" y="157" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#22c55e" letter-spacing="1">DOVISH</text>

  <text x="730" y="157" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#6e7681">Dot plot shifts to 2+ cuts in 2026</text>

  <text x="620" y="190" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#22c55e">$80K–$85K</text>
