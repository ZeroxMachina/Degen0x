  <circle cx="170" cy="440" r="45" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)" stroke-width="2"/>
  <text x="170" y="435" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#8b5cf6" text-anchor="middle">AI</text>
  <text x="170" y="453" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">AGENT</text>

