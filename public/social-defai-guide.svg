  <rect x="60" y="78" width="260" height="30" rx="15" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="190" y="98" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" text-anchor="middle" letter-spacing="0.08em">AI × DeFi — THE 2026 NARRATIVE</text>

