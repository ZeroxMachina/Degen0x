  <text x="610" y="365" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Autonolas</text>
  <text x="610" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Agent-to-agent economy</text>
  <text x="610" y="408" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b5cf6">$OLAS · $300M+ mcap</text>

  <!-- Spectral -->
  <rect x="860" y="340" width="250" height="80" rx="10" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
  <text x="880" y="365" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Spectral</text>
  <text x="880" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">On-chain ML inference</text>
  <text x="880" y="408" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#06b6d4">$SPEC · Credit scoring</text>

