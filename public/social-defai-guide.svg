  <rect x="590" y="435" width="250" height="80" rx="10" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="610" y="460" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Fetch.ai</text>
  <text x="610" y="480" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">AI agent marketplace</text>
  <text x="610" y="503" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f59e0b">$FET · DeFi integrations</text>

  <!-- Virtuals Protocol -->
  <rect x="860" y="435" width="250" height="80" rx="10" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="880" y="460" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Virtuals Protocol</text>
  <text x="880" y="480" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">AI agents as tokens</text>
  <text x="880" y="503" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e">Tradeable AI agents</text>

  <!-- Warning chip -->
  <rect x="60" y="545" width="430" height="32" rx="16" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="275" y="566" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">AI hallucinations with real money — understand the risks before aping</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="580" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="610" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1140" y="610" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">DeFAI Guide — AI × DeFi 2026</text>
