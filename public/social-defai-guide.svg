  <text x="60" y="168" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">DeFAI</text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#8b949e" letter-spacing="-0.01em">Autonomous AI Agents</text>
  <text x="60" y="265" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#8b949e" letter-spacing="-0.01em">Meet DeFi</text>

