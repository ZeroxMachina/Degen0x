  <text x="380" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" text-anchor="middle">Trade Execution</text>

  <rect x="290" y="422" width="180" height="36" rx="18" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="380" y="445" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4" text-anchor="middle">Yield Optimization</text>

  <rect x="290" y="482" width="180" height="36" rx="18" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="380" y="505" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Risk Management</text>

  <!-- RIGHT: Protocol Cards -->
  <rect x="560" y="290" width="590" height="260" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

