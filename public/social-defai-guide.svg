  <line x1="215" y1="440" x2="290" y2="440" stroke="rgba(6,182,212,0.3)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="215" y1="460" x2="290" y2="500" stroke="rgba(245,158,11,0.3)" stroke-width="1.5" stroke-dasharray="4,4"/>

