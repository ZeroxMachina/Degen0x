<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgSDP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentSDP" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGradSDP" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="solanaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <filter id="glowSDP">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgSDP)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentSDP)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="200" fill="#9945FF" opacity="0.05" filter="url(#glowSDP)"/>
  <circle cx="1100" cy="480" r="150" fill="#14F195" opacity="0.04" filter="url(#glowSDP)"/>
  <circle cx="100" cy="550" r="120" fill="#6366f1" opacity="0.03" filter="url(#glowSDP)"/>

  <!-- API Module Diagram (right side) -->
  <g transform="translate(780, 100)" opacity="0.25">
    <!-- Issuance Module -->
    <rect x="0" y="0" width="140" height="60" rx="12" fill="none" stroke="#9945FF" stroke-width="2"/>
    <text x="70" y="25" fill="#9945FF" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="700">ISSUANCE</text>
    <text x="70" y="45" fill="#9945FF" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Stablecoins + RWAs</text>

    <!-- Payments Module -->
    <rect x="0" y="85" width="140" height="60" rx="12" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <text x="70" y="110" fill="#06b6d4" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="700">PAYMENTS</text>
    <text x="70" y="130" fill="#06b6d4" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Fiat On/Off Ramp</text>

    <!-- Trading Module -->
    <rect x="0" y="170" width="140" height="60" rx="12" fill="none" stroke="#14F195" stroke-width="2"/>
    <text x="70" y="195" fill="#14F195" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="700">TRADING</text>
    <text x="70" y="215" fill="#14F195" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Atomic Swaps</text>

    <!-- Connecting line -->
    <line x1="170" y1="30" x2="220" y2="115" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <line x1="170" y1="115" x2="220" y2="115" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <line x1="170" y1="200" x2="220" y2="115" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

    <!-- Enterprise Box -->
    <rect x="220" y="80" width="130" height="70" rx="12" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="285" y="108" fill="#f59e0b" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="700">ENTERPRISE</text>
    <text x="285" y="125" fill="#f59e0b" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">Mastercard</text>
    <text x="285" y="140" fill="#f59e0b" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">Worldpay + WU</text>
  </g>

  <!-- Enterprise partner logos (text representations) -->
  <g transform="translate(800, 400)" opacity="0.15">
    <rect x="0" y="0" width="100" height="36" rx="8" fill="none" stroke="#e6edf3" stroke-width="1.5"/>
    <text x="50" y="23" fill="#e6edf3" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Mastercard</text>
    <rect x="120" y="0" width="85" height="36" rx="8" fill="none" stroke="#e6edf3" stroke-width="1.5"/>
    <text x="162" y="23" fill="#e6edf3" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Worldpay</text>
    <rect x="225" y="0" width="120" height="36" rx="8" fill="none" stroke="#e6edf3" stroke-width="1.5"/>
    <text x="285" y="23" fill="#e6edf3" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Western Union</text>
  </g>

  <!-- Badge -->
  <rect x="60" y="80" width="120" height="30" rx="15" fill="#9945FF" opacity="0.2"/>
  <rect x="60" y="80" width="120" height="30" rx="15" fill="none" stroke="#9945FF" stroke-width="1" opacity="0.4"/>
  <text x="120" y="100" fill="#c084fc" font-family="Inter, sans-serif" font-size="13" text-anchor="middle" font-weight="600">SOLANA</text>

  <!-- Title -->
  <text x="60" y="170" fill="url(#titleGradSDP)" font-family="Inter, sans-serif" font-size="48" font-weight="900" letter-spacing="-1">
    Solana Developer
  </text>
  <text x="60" y="230" fill="url(#titleGradSDP)" font-family="Inter, sans-serif" font-size="48" font-weight="900" letter-spacing="-1">
    Platform (SDP)
  </text>

  <!-- Subtitle -->
  <text x="60" y="280" fill="#8b949e" font-family="Inter, sans-serif" font-size="20">
    Enterprise APIs for Stablecoins, RWAs &amp; Payments
  </text>

  <!-- Key stats -->
  <g transform="translate(60, 320)">
    <rect x="0" y="0" width="150" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="75" y="25" fill="#e6edf3" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" font-weight="700">65,000+</text>
    <text x="75" y="44" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">TPS</text>

    <rect x="170" y="0" width="150" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="245" y="25" fill="#e6edf3" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" font-weight="700">20+</text>
    <text x="245" y="44" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">Tech Partners</text>

    <rect x="340" y="0" width="150" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="415" y="25" fill="#e6edf3" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" font-weight="700">Sub-cent</text>
    <text x="415" y="44" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">Fees</text>
  </g>

  <!-- Guide badge -->
  <text x="60" y="430" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="600">
    COMPLETE GUIDE 2026
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" fill="#8b949e" font-family="Inter, sans-serif" font-size="16" font-weight="600">
    degen0x.com
  </text>
  <text x="1140" y="616" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" text-anchor="end">
    March 2026
  </text>
</svg>