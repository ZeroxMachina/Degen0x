  <text x="115" y="451" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">🏦 JPMorgan</text>

  <rect x="185" y="430" width="110" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="240" y="451" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">⬛ BlackRock</text>

