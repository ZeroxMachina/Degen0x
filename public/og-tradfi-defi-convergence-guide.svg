  <text x="925" y="399" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">KYC DeFi Pools</text>

  <rect x="1010" y="380" width="120" height="28" rx="6" fill="rgba(34,197,94,0.1)" stroke="#22c55e40" stroke-width="1"/>
