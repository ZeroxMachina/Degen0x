<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="250" r="200" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="150" cy="500" r="120" fill="#6366f1" opacity="0.04"/>

  <!-- Game Controller Icon (right side, low opacity) -->
  <g opacity="0.15" transform="translate(1000, 280)">
    <!-- Controller body -->
    <rect x="-60" y="-30" width="120" height="80" rx="20" fill="#8b5cf6" opacity="0.8"/>
    <!-- Left D-pad -->
    <rect x="-45" y="-10" width="8" height="24" fill="#06b6d4" opacity="0.8"/>
    <rect x="-55" y="0" width="24" height="8" fill="#06b6d4" opacity="0.8"/>
    <!-- Right buttons -->
    <circle cx="35" cy="-5" r="8" fill="#06b6d4" opacity="0.8"/>
    <circle cx="50" cy="5" r="8" fill="#06b6d4" opacity="0.8"/>
    <circle cx="35" cy="15" r="8" fill="#06b6d4" opacity="0.8"/>
    <circle cx="20" cy="5" r="8" fill="#06b6d4" opacity="0.8"/>
    <!-- Center bumpers -->
    <rect x="-20" y="-35" width="15" height="6" rx="3" fill="#8b5cf6" opacity="0.9"/>
    <rect x="5" y="-35" width="15" height="6" rx="3" fill="#8b5cf6" opacity="0.9"/>
  </g>

  <!-- Category badge -->
  <rect x="60" y="180" width="110" height="32" rx="16" fill="#8b5cf6" opacity="0.2"/>
  <text x="115" y="201" fill="#8b5cf6" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Gaming</text>

  <!-- Title -->
  <text x="60" y="280" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Web3 Gaming &amp;</text>
  <text x="60" y="335" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">GameFi Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="390" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="20">Play-to-earn, on-chain gaming economies &amp; token rewards</text>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="#0a0f1e" opacity="0.8"/>
  <text x="60" y="598" fill="#6366f1" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">degen0x</text>
  <text x="170" y="598" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16">degen0x.com</text>
  <text x="1060" y="598" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14">2026 Guide</text>
</svg>