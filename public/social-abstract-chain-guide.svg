  <text x="893" y="310" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#6e7681" letter-spacing="0.3">Abstract</text>
  <text x="893" y="350" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#6e7681" letter-spacing="0.3">Chain</text>

