    <!-- Step 1 -->
    <circle cx="942" cy="220" r="12" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.5)" stroke-width="1.5"/>
    <text x="942" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">1</text>
    <text x="962" y="217" fill="#e6edf3" font-weight="600" font-size="13">Connect</text>
    <text x="962" y="233" fill="#8b949e" font-size="11">Email or social</text>

    <!-- Step 2 -->
    <circle cx="942" cy="290" r="12" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.5)" stroke-width="1.5"/>
    <text x="942" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">2</text>
    <text x="962" y="287" fill="#e6edf3" font-weight="600" font-size="13">Use dApp</text>
    <text x="962" y="303" fill="#8b949e" font-size="11">One click. Done.</text>

    <!-- Checkmarks for skipped steps -->
    <text x="942" y="358" font-size="11" fill="#4ade80" text-anchor="middle">✓</text>
    <text x="962" y="360" fill="#6e7681" font-size="11">No seed phrase</text>
    <text x="942" y="385" font-size="11" fill="#4ade80" text-anchor="middle">✓</text>
    <text x="962" y="387" fill="#6e7681" font-size="11">Gasless UX</text>
    <text x="942" y="410" font-size="11" fill="#4ade80" text-anchor="middle">✓</text>
    <text x="962" y="412" fill="#6e7681" font-size="11">ZK-secured</text>
  </g>

  <!-- $0 gas badge -->
