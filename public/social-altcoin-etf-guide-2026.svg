<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#0a0f20;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#050810;stop-opacity:1"/>
    </linearGradient>
    <!-- Brand gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="45%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
    <!-- SOL gradient (green) -->
    <linearGradient id="solGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14f195;stop-opacity:1"/>
    </linearGradient>
    <!-- ETF bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip path for card -->
    <clipPath id="cardClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative ambient orbs -->
  <circle cx="950" cy="120" r="200" fill="#4f46e5" opacity="0.06"/>
  <circle cx="1050" cy="500" r="160" fill="#06b6d4" opacity="0.05"/>
  <circle cx="200" cy="500" r="180" fill="#f59e0b" opacity="0.04"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#titleGrad)"/>

  <!-- degen0x logo area (top-left) -->
  <circle cx="52" cy="42" r="18" fill="#4f46e5" opacity="0.9" filter="url(#subtleGlow)"/>
  <text x="52" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="white">0x</text>
  <text x="78" y="48" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8b949e">degen0x</text>

  <!-- Category pill: TRACKER -->
  <rect x="76" y="58" width="120" height="24" rx="12" fill="rgba(250,204,21,0.15)" stroke="#f59e0b" stroke-width="1"/>
  <text x="136" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#f59e0b" letter-spacing="1.5">ETF TRACKER</text>

  <!-- MAIN TITLE -->
  <text x="60" y="160" font-family="Inter, sans-serif" font-size="58" font-weight="900" fill="url(#titleGrad)" letter-spacing="-1.5">Altcoin ETF Guide</text>
  <text x="60" y="225" font-family="Inter, sans-serif" font-size="58" font-weight="900" fill="url(#titleGrad)" letter-spacing="-1.5">2026</text>

  <!-- Subtitle -->
  <text x="60" y="268" font-family="Inter, sans-serif" font-size="20" fill="#8b949e">SOL · XRP · ETH — 19 funds tracked. Staking yield included.</text>

  <!-- ─── ETF Comparison Panel (right side) ─── -->
  <rect x="660" y="80" width="500" height="420" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Panel title -->
  <text x="910" y="116" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="1">AUM COMPARISON</text>

  <!-- SOL bar row -->
  <text x="690" y="158" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#14f195">$SOL ETFs</text>
  <text x="1130" y="158" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">$1.45B</text>
  <rect x="690" y="165" width="400" height="12" rx="6" fill="rgba(255,255,255,0.06)"/>
  <rect x="690" y="165" width="360" height="12" rx="6" fill="url(#solGrad)" opacity="0.85"/>
  <!-- staking badge -->
  <rect x="690" y="185" width="88" height="18" rx="9" fill="rgba(20,241,149,0.15)" stroke="#14f195" stroke-width="0.8"/>
  <text x="734" y="197" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#14f195">~6–8% APY ✓</text>

  <!-- XRP bar row -->
  <text x="690" y="234" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#06b6d4">$XRP ETFs</text>
  <text x="1130" y="234" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">$1.0B+</text>
  <rect x="690" y="241" width="400" height="12" rx="6" fill="rgba(255,255,255,0.06)"/>
  <rect x="690" y="241" width="248" height="12" rx="6" fill="#06b6d4" opacity="0.75"/>

  <!-- ETH bar row -->
  <text x="690" y="285" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#8b5cf6">$ETH ETFs</text>
  <text x="1130" y="285" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">$8.2B</text>
  <rect x="690" y="292" width="400" height="12" rx="6" fill="rgba(255,255,255,0.06)"/>
  <rect x="690" y="292" width="390" height="12" rx="6" fill="#8b5cf6" opacity="0.75"/>
  <!-- no staking note -->
  <rect x="690" y="312" width="96" height="18" rx="9" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="0.8"/>
  <text x="738" y="324" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ef4444">No staking ✗</text>

  <!-- Divider -->
  <line x1="690" y1="345" x2="1130" y2="345" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Key stat pills row -->
  <!-- 19 ETFs -->
  <rect x="690" y="360" width="120" height="52" rx="12" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="750" y="384" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#818cf8">19</text>
  <text x="750" y="402" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6366f1">ETFs tracked</text>

  <!-- 16 SOL funds -->
  <rect x="826" y="360" width="140" height="52" rx="12" fill="rgba(20,241,149,0.08)" stroke="rgba(20,241,149,0.25)" stroke-width="1"/>
  <text x="896" y="384" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#14f195">16</text>
  <text x="896" y="402" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#14f195">Solana funds</text>

  <!-- 126+ pending -->
  <rect x="982" y="360" width="148" height="52" rx="12" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="1056" y="384" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f59e0b">126+</text>
  <text x="1056" y="402" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#f59e0b">pending SEC</text>

  <!-- Bottom key features (left side) -->
  <g transform="translate(60, 320)">
    <!-- Feature rows -->
    <circle cx="10" cy="10" r="4" fill="#4ade80"/>
    <text x="24" y="15" font-family="Inter, sans-serif" font-size="16" fill="#e6edf3">SOL staking yield not available in any other ETF</text>

    <circle cx="10" cy="46" r="4" fill="#06b6d4"/>
    <text x="24" y="51" font-family="Inter, sans-serif" font-size="16" fill="#e6edf3">7-day NAV performance · sortable columns</text>

    <circle cx="10" cy="82" r="4" fill="#8b5cf6"/>
    <text x="24" y="87" font-family="Inter, sans-serif" font-size="16" fill="#e6edf3">No Bloomberg subscription needed</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="602" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#6366f1">degen0x.com/tools/altcoin-etf-tracker</text>
  <text x="1140" y="602" text-anchor="end" font-family="Inter, sans-serif" font-size="14" fill="#6e7681">Free · No login</text>
</svg>
