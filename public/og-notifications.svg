<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bellGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>
  <circle cx="950" cy="200" r="180" fill="#6366f1" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="120" fill="#0891b2" opacity="0.05" filter="url(#softGlow)"/>
  <g transform="translate(880, 160)" filter="url(#glow)">
    <circle cx="80" cy="80" r="70" fill="url(#bellGlow)" opacity="0.3"/>
    <path d="M80 30 C80 30 55 30 50 65 C45 100 40 110 35 115 L125 115 C120 110 115 100 110 65 C105 30 80 30 80 30 Z" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.8"/>
    <circle cx="80" cy="125" r="10" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.8"/>
    <circle cx="105" cy="40" r="12" fill="#ef4444"/>
    <text x="105" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="white">5</text>
  </g>
  <text x="60" y="70" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#6366f1" letter-spacing="-0.02em">degen0x</text>
  <text x="60" y="270" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="#e6edf3" letter-spacing="-0.03em">Notifications</text>
  <text x="60" y="330" font-family="Inter, sans-serif" font-size="26" fill="#8b949e">Price alerts, streak reminders, whale moves</text>
  <text x="60" y="365" font-family="Inter, sans-serif" font-size="26" fill="#8b949e">— never miss what matters in crypto</text>
  <g transform="translate(60, 410)">
    <rect width="480" height="50" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    <text x="48" y="32" font-family="Inter, sans-serif" font-size="15" fill="#e6edf3">ETH crossed $3,800 — alert triggered</text>
    <circle cx="460" cy="25" r="5" fill="#58a6ff"/>
  </g>
  <g transform="translate(60, 470)">
    <rect width="480" height="50" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="48" y="32" font-family="Inter, sans-serif" font-size="15" fill="#e6edf3">Whale: $45M USDC moved to Aave</text>
  </g>
  <rect y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="1140" y="600" text-anchor="end" font-family="Inter, sans-serif" font-size="16" fill="#6e7681">degen0x.com</text>
</svg>
