<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow -->
  <circle cx="950" cy="250" r="180" fill="#22c55e" opacity="0.04"/>
  <circle cx="850" cy="350" r="120" fill="#6366f1" opacity="0.05"/>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.3"/>
    <text x="16" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#818cf8">0x</text>
    <text x="42" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e">degen0x</text>
  </g>

  <!-- Category badge -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="65" height="26" rx="13" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
    <text x="32" y="17" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22c55e">GUIDE</text>
  </g>

  <!-- Title -->
  <text x="60" y="175" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="#e6edf3">
    Crypto Staking
  </text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="#e6edf3">
    Guide 2026
  </text>

  <!-- Subtitle -->
  <text x="60" y="270" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">
    Earn passive income with PoS, liquid staking, and restaking
  </text>

  <!-- Staking visualization: stacked coins with yield arrows -->
  <g transform="translate(850, 120)">
    <!-- Coin stack 1 (ETH) -->
    <ellipse cx="0" cy="180" rx="50" ry="15" fill="#6366f1" opacity="0.3"/>
    <ellipse cx="0" cy="165" rx="50" ry="15" fill="#6366f1" opacity="0.4"/>
    <ellipse cx="0" cy="150" rx="50" ry="15" fill="#6366f1" opacity="0.5"/>
    <ellipse cx="0" cy="135" rx="50" ry="15" fill="#6366f1" opacity="0.7"/>
    <ellipse cx="0" cy="120" rx="50" ry="15" fill="#818cf8" opacity="0.9"/>
    <text x="0" y="125" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#fff">ETH</text>
    <text x="0" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e">3.2% APY</text>

    <!-- Coin stack 2 (SOL) -->
    <ellipse cx="140" cy="180" rx="50" ry="15" fill="#06b6d4" opacity="0.3"/>
    <ellipse cx="140" cy="165" rx="50" ry="15" fill="#06b6d4" opacity="0.4"/>
    <ellipse cx="140" cy="150" rx="50" ry="15" fill="#06b6d4" opacity="0.5"/>
    <ellipse cx="140" cy="135" rx="50" ry="15" fill="#06b6d4" opacity="0.7"/>
    <ellipse cx="140" cy="120" rx="50" ry="15" fill="#22d3ee" opacity="0.9"/>
    <text x="140" y="125" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#fff">SOL</text>
    <text x="140" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e">6.8% APY</text>

    <!-- Coin stack 3 (ATOM) -->
    <ellipse cx="280" cy="180" rx="50" ry="15" fill="#f59e0b" opacity="0.3"/>
    <ellipse cx="280" cy="165" rx="50" ry="15" fill="#f59e0b" opacity="0.4"/>
    <ellipse cx="280" cy="150" rx="50" ry="15" fill="#f59e0b" opacity="0.5"/>
    <ellipse cx="280" cy="135" rx="50" ry="15" fill="#f59e0b" opacity="0.7"/>
    <ellipse cx="280" cy="120" rx="50" ry="15" fill="#fbbf24" opacity="0.9"/>
    <text x="280" y="125" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#fff">ATOM</text>
    <text x="280" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e">15.1% APY</text>

    <!-- Yield arrows going up -->
    <g opacity="0.5">
      <path d="M0,105 L0,75" stroke="#22c55e" stroke-width="2"/>
      <path d="M-5,80 L0,75 L5,80" stroke="#22c55e" stroke-width="2" fill="none"/>
      <path d="M140,105 L140,75" stroke="#22c55e" stroke-width="2"/>
      <path d="M135,80 L140,75 L145,80" stroke="#22c55e" stroke-width="2" fill="none"/>
      <path d="M280,105 L280,75" stroke="#22c55e" stroke-width="2"/>
      <path d="M275,80 L280,75 L285,80" stroke="#22c55e" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- Topic pills -->
  <g transform="translate(60, 320)">
    <rect x="0" y="0" width="135" height="34" rx="17" fill="#22c55e15" stroke="#22c55e30" stroke-width="1"/>
    <text x="67" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e">Liquid Staking</text>

    <rect x="150" y="0" width="115" height="34" rx="17" fill="#6366f115" stroke="#6366f130" stroke-width="1"/>
    <text x="207" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8">Restaking</text>

    <rect x="280" y="0" width="130" height="34" rx="17" fill="#06b6d415" stroke="#06b6d430" stroke-width="1"/>
    <text x="345" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4">Validators</text>

    <rect x="425" y="0" width="145" height="34" rx="17" fill="#f59e0b15" stroke="#f59e0b30" stroke-width="1"/>
    <text x="497" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">Risk Analysis</text>
  </g>

  <!-- Stats badges -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="145" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="72" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#22c55e">$40B+</text>
    <text x="72" y="43" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Staked ETH</text>

    <rect x="160" y="0" width="145" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="232" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#06b6d4">10+ Chains</text>
    <text x="232" y="43" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">PoS Networks</text>

    <rect x="320" y="0" width="145" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="392" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#f59e0b">3-15% APY</text>
    <text x="392" y="43" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Yield Range</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Free Tools &amp; Guides</text>
</svg>