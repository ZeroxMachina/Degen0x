<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <clipPath id="roundCard">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" clip-path="url(#roundCard)"/>

  <!-- Decorative glows -->
  <ellipse cx="200" cy="150" rx="250" ry="200" fill="url(#purpleGlow)" filter="url(#softGlow)"/>
  <ellipse cx="1000" cy="500" rx="300" ry="250" fill="url(#cyanGlow)" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand)"/>

  <!-- Badge: INSTITUTIONAL SIGNAL -->
  <rect x="60" y="50" width="220" height="30" rx="15" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1"/>
  <circle cx="78" cy="65" r="4" fill="#8b5cf6">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="92" y="70" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" letter-spacing="0.08em">INSTITUTIONAL SIGNAL</text>

  <!-- degen0x logo text -->
  <text x="1080" y="70" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#brand)" text-anchor="end" letter-spacing="-0.02em">degen0x</text>

  <!-- Main title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#e6edf3" letter-spacing="-0.03em">Apollo Global Goes DeFi</text>
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#8b949e">$938B asset manager locks in 9% of Morpho Protocol's token supply</text>

  <!-- Stat cards row -->
  <!-- Card 1: AUM -->
  <rect x="60" y="230" width="250" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="265" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e" letter-spacing="0.06em">APOLLO AUM</text>
  <text x="80" y="305" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#f59e0b">$938B</text>
  <text x="80" y="325" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Pensions, insurance, sovereign wealth</text>

  <!-- Card 2: Token Deal -->
  <rect x="330" y="230" width="250" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="350" y="265" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e" letter-spacing="0.06em">MORPHO TOKENS</text>
  <text x="350" y="305" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#8b5cf6">90M</text>
  <text x="350" y="325" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">9% of total supply over 48 months</text>

  <!-- Card 3: Morpho TVL -->
  <rect x="600" y="230" width="250" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="620" y="265" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e" letter-spacing="0.06em">MORPHO TVL</text>
  <text x="620" y="305" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#06b6d4">$10B+</text>
  <text x="620" y="325" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Top 3 DeFi lending protocol</text>

  <!-- Card 4: DeFi Lending TVL -->
  <rect x="870" y="230" width="270" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="890" y="265" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e" letter-spacing="0.06em">DEFI LENDING SECTOR</text>
  <text x="890" y="305" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e">$55B</text>
  <text x="890" y="325" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Record TVL — modular era begins</text>

  <!-- Architecture comparison section -->
  <rect x="60" y="370" width="530" height="180" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="405" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3" letter-spacing="0.04em">MODULAR vs MONOLITHIC</text>

  <!-- Morpho -->
  <rect x="80" y="420" width="240" height="50" rx="10" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="100" y="442" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#8b5cf6">Morpho Blue</text>
  <text x="100" y="460" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Immutable core, permissionless</text>

  <!-- Aave -->
  <rect x="340" y="420" width="230" height="50" rx="10" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="1"/>
  <text x="360" y="442" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#6366f1">Aave V4</text>
  <text x="360" y="460" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Hub-and-spoke, 345-day audit</text>

  <!-- V2 Feature -->
  <rect x="80" y="480" width="490" height="50" rx="10" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="100" y="502" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">Morpho V2 (2026)</text>
  <text x="260" y="502" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Fixed-rate loans for institutional desks</text>
  <text x="100" y="520" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Externalized rate pricing • Custom terms • Compliance-compatible markets</text>

  <!-- CTA section -->
  <rect x="620" y="370" width="520" height="180" rx="16" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="650" y="410" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1" letter-spacing="0.06em">DEEP DIVE</text>
  <text x="650" y="445" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#e6edf3">Morpho Protocol Guide 2026</text>
  <text x="650" y="475" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Architecture, vaults, tokenomics,</text>
  <text x="650" y="495" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Apollo deal, and Aave comparison</text>
  <rect x="650" y="515" width="200" height="22" rx="11" fill="#6366f1"/>
  <text x="680" y="531" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">degen0x.com/learn →</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="610" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="url(#brand)">degen0x.com</text>
  <text x="1140" y="610" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Free tools • No signup • Just data</text>
</svg>