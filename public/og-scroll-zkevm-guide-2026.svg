<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top gradient accent bar -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Decorative circle top-left -->
  <circle cx="80" cy="120" r="45" stroke="#d97706" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Decorative circle bottom-right -->
  <circle cx="1120" cy="520" r="50" stroke="#4f46e5" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- ZK proof symbols - layered rectangles suggesting rollup blocks -->
  <g opacity="0.25">
    <rect x="950" y="200" width="60" height="60" fill="#06b6d4" rx="4"/>
    <rect x="965" y="215" width="60" height="60" fill="#0891b2" rx="4"/>
    <rect x="980" y="230" width="60" height="60" fill="#0e7490" rx="4"/>
  </g>

  <!-- Circular ZK proof symbols -->
  <g opacity="0.2">
    <circle cx="200" cy="450" r="8" fill="#06b6d4"/>
    <circle cx="220" cy="460" r="8" fill="#0891b2"/>
    <circle cx="240" cy="450" r="8" fill="#06b6d4"/>
    <circle cx="220" cy="430" r="8" fill="#0e7490"/>
  </g>

  <!-- Badge -->
  <text x="80" y="80" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" opacity="0.9">Layer 2 · zkEVM</text>

  <!-- Title Line 1 -->
  <text x="80" y="200" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Scroll zkEVM</text>

  <!-- Title Line 2 -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Guide 2026</text>

  <!-- Subtitle -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">Ethereum-equivalent zero-knowledge rollup scaling solution</text>

  <!-- Branding -->
  <text x="1120" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end" opacity="0.8">degen0x.com</text>

  <!-- Bottom gradient line -->
  <rect y="622" width="1200" height="8" fill="url(#gradAccent)" opacity="0.5"/>
</svg>