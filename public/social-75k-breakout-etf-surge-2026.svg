<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0a1128"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="priceLineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="chartClip">
      <rect x="60" y="310" width="500" height="160" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="150" cy="100" r="200" fill="#4f46e5" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="1050" cy="530" r="180" fill="#0891b2" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="600" cy="300" r="250" fill="#22c55e" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Logo area (top-left) -->
  <circle cx="60" cy="42" r="16" fill="#4f46e5" opacity="0.9"/>
  <text x="62" y="47" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#e6edf3" text-anchor="middle">0x</text>
  <text x="86" y="47" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#8b949e">degen0x.com</text>

  <!-- Main headline -->
  <text x="60" y="110" font-family="Inter, sans-serif" font-size="52" font-weight="900" fill="url(#greenGrad)" letter-spacing="-2">$75,000</text>
  <text x="60" y="155" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">BTC Breaks 6-Week High</text>
  <text x="60" y="185" font-family="Inter, sans-serif" font-size="16" fill="#8b949e">25% recovery from February bottom — institutions loading</text>

  <!-- Price recovery mini-chart (stylized) -->
  <g transform="translate(60, 210)">
    <!-- Chart background glass panel -->
    <rect x="-10" y="-10" width="520" height="280" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="0" y1="40" x2="500" y2="40" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="100" x2="500" y2="100" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="160" x2="500" y2="160" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="220" x2="500" y2="220" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- Y-axis labels -->
    <text x="-5" y="44" font-family="Inter, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$90K</text>
    <text x="-5" y="104" font-family="Inter, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$75K</text>
    <text x="-5" y="164" font-family="Inter, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$65K</text>
    <text x="-5" y="224" font-family="Inter, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$55K</text>

    <!-- X-axis labels -->
    <text x="0" y="248" font-family="Inter, sans-serif" font-size="10" fill="#6e7681">Jan</text>
    <text x="83" y="248" font-family="Inter, sans-serif" font-size="10" fill="#6e7681">Feb 6</text>
    <text x="166" y="248" font-family="Inter, sans-serif" font-size="10" fill="#6e7681">Feb 20</text>
    <text x="250" y="248" font-family="Inter, sans-serif" font-size="10" fill="#6e7681">Mar 1</text>
    <text x="333" y="248" font-family="Inter, sans-serif" font-size="10" fill="#6e7681">Mar 9</text>
    <text x="460" y="248" font-family="Inter, sans-serif" font-size="10" fill="#6e7681" font-weight="700" fill="#22c55e">Mar 17</text>

    <!-- Area fill under price line -->
    <path d="M0,60 L50,55 L83,70 L120,190 L160,180 L200,170 L250,155 L300,140 L333,120 L380,105 L420,95 L460,90 L500,80 L500,220 L0,220 Z" fill="url(#areaFill)"/>

    <!-- Price line: Jan ~$83K → Feb 6 ATL ~$60K → Recovery → Mar 17 $75K -->
    <path d="M0,60 L50,55 L83,70 L120,190 L160,180 L200,170 L250,155 L300,140 L333,120 L380,105 L420,95 L460,90 L500,80"
          fill="none" stroke="url(#priceLineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Feb 6 bottom marker -->
    <circle cx="120" cy="190" r="5" fill="#ef4444" filter="url(#glow)"/>
    <text x="120" y="210" font-family="Inter, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="700">$60K</text>
    <text x="120" y="222" font-family="Inter, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">F&amp;G: 5</text>

    <!-- Current price marker -->
    <circle cx="500" cy="80" r="6" fill="#22c55e" filter="url(#glow)"/>
    <text x="490" y="72" font-family="Inter, sans-serif" font-size="12" fill="#22c55e" text-anchor="end" font-weight="800">$75,272</text>

    <!-- ETF inflow start marker -->
    <line x1="333" y1="120" x2="333" y2="240" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    <text x="333" y="240" font-family="Inter, sans-serif" font-size="8" fill="#06b6d4" text-anchor="middle">ETF streak starts</text>

    <!-- +25% label -->
    <rect x="390" y="130" width="70" height="24" rx="6" fill="#22c55e" opacity="0.15"/>
    <text x="425" y="146" font-family="Inter, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle" font-weight="800">+25%</text>
  </g>

  <!-- Right side: Key metrics cards -->
  <g transform="translate(620, 55)">
    <!-- ETF Inflows Card -->
    <rect x="0" y="0" width="260" height="100" rx="14" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, sans-serif" font-size="11" fill="#06b6d4" font-weight="600" letter-spacing="1">ETF INFLOWS</text>
    <text x="20" y="60" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#e6edf3">$962.8M</text>
    <text x="20" y="82" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">6-day streak — longest since Oct</text>

    <!-- Short Liquidations Card -->
    <rect x="0" y="115" width="260" height="100" rx="14" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="20" y="145" font-family="Inter, sans-serif" font-size="11" fill="#ef4444" font-weight="600" letter-spacing="1">SHORT LIQUIDATIONS</text>
    <text x="20" y="175" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#e6edf3">$540M+</text>
    <text x="20" y="197" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">24h — bears getting squeezed</text>

    <!-- Strategy Inc Card -->
    <rect x="0" y="230" width="260" height="100" rx="14" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
    <text x="20" y="260" font-family="Inter, sans-serif" font-size="11" fill="#8b5cf6" font-weight="600" letter-spacing="1">STRATEGY INC.</text>
    <text x="20" y="290" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#e6edf3">738,731 BTC</text>
    <text x="20" y="312" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">+17,994 last week — targeting 1M</text>

    <!-- Fear & Greed Card -->
    <rect x="0" y="345" width="260" height="100" rx="14" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="20" y="375" font-family="Inter, sans-serif" font-size="11" fill="#22c55e" font-weight="600" letter-spacing="1">FEAR &amp; GREED RECOVERY</text>
    <text x="20" y="405" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#e6edf3">5 → 30+</text>
    <text x="20" y="427" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">39-day extreme fear streak ending</text>
  </g>

  <!-- Right side: additional context -->
  <g transform="translate(900, 55)">
    <!-- FOMC Card -->
    <rect x="0" y="0" width="250" height="100" rx="14" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, sans-serif" font-size="11" fill="#f59e0b" font-weight="600" letter-spacing="1">FOMC DECISION</text>
    <text x="20" y="60" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#e6edf3">T-24h</text>
    <text x="20" y="82" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">Dot plot = the signal to watch</text>

    <!-- Published Pages -->
    <rect x="0" y="115" width="250" height="100" rx="14" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    <text x="20" y="145" font-family="Inter, sans-serif" font-size="11" fill="#6366f1" font-weight="600" letter-spacing="1">DEGEN0X PAGES</text>
    <text x="20" y="175" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#e6edf3">400</text>
    <text x="20" y="197" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">Published &amp; indexed</text>

    <!-- Tax Countdown -->
    <rect x="0" y="230" width="250" height="100" rx="14" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
    <text x="20" y="260" font-family="Inter, sans-serif" font-size="11" fill="#f59e0b" font-weight="600" letter-spacing="1">TAX DEADLINE</text>
    <text x="20" y="290" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#e6edf3">27 Days</text>
    <text x="20" y="312" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">IRS now gets 1099s from exchanges</text>

    <!-- Powell Exit -->
    <rect x="0" y="345" width="250" height="100" rx="14" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
    <text x="20" y="375" font-family="Inter, sans-serif" font-size="11" fill="#8b5cf6" font-weight="600" letter-spacing="1">POWELL EXIT</text>
    <text x="20" y="405" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#e6edf3">May 23</text>
    <text x="20" y="427" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">Warsh incoming — new regime</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, sans-serif" font-size="13" fill="#6e7681">degen0x.com — The crypto toolkit that does the homework for you</text>
  <text x="1140" y="616" font-family="Inter, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Mar 17, 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brandGrad)"/>
</svg>
