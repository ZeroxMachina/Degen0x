<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.9" />
    </linearGradient>

    <radialGradient id="glowCircle1" cx="20%" cy="20%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#f7931a;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="glowCircle2" cx="80%" cy="80%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Decorative gradient circles -->
  <circle cx="120" cy="120" r="220" fill="url(#glowCircle1)"/>
  <circle cx="1080" cy="520" r="260" fill="url(#glowCircle2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Bitcoin/Circuit motif (stylized) -->
  <g opacity="0.07">
    <!-- Bitcoin B outline -->
    <text x="920" y="530" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="url(#mainGradient)">&#x20BF;</text>
    <!-- Circuit lines -->
    <line x1="900" y1="350" x2="1150" y2="350" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <line x1="950" y1="400" x2="1100" y2="400" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <circle cx="1150" cy="350" r="4" fill="url(#mainGradient)"/>
    <circle cx="900" cy="350" r="4" fill="url(#mainGradient)"/>
    <circle cx="1100" cy="400" r="4" fill="url(#mainGradient)"/>
  </g>

  <!-- Main title -->
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#e6edf3" letter-spacing="-1">
    Bitcoin BitVM
  </text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#e6edf3" letter-spacing="-1">
    &amp; Programmability
  </text>

  <!-- Subtitle -->
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="30" font-weight="500" fill="#8b949e">
    Smart Contracts on BTC | Guide 2026
  </text>

  <!-- Gradient line accent -->
  <line x1="60" y1="345" x2="420" y2="345" stroke="url(#mainGradient)" stroke-width="4" stroke-linecap="round"/>

  <!-- Tags -->
  <rect x="60" y="380" width="110" height="36" rx="18" fill="#f7931a" opacity="0.15"/>
  <text x="85" y="404" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#f7931a">BitVM2</text>

  <rect x="185" y="380" width="100" height="36" rx="18" fill="#4f46e5" opacity="0.15"/>
  <text x="205" y="404" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#818cf8">Citrea</text>

  <rect x="300" y="380" width="110" height="36" rx="18" fill="#06b6d4" opacity="0.15"/>
  <text x="322" y="404" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#06b6d4">Bitlayer</text>

  <!-- Footer: degen0x.com -->
  <text x="60" y="590" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e6edf3">
    degen0x.com
  </text>

  <!-- Subtle gradient indicator -->
  <circle cx="1100" cy="90" r="8" fill="url(#mainGradient)" opacity="0.6"/>
</svg>