<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>
  <circle cx="1000" cy="200" r="180" fill="url(#circle1)"/>
  <circle cx="1080" cy="380" r="120" fill="url(#circle2)"/>
  <circle cx="100" cy="520" r="90" fill="url(#circle2)"/>
  <!-- Grid -->
  <g opacity="0.025" stroke="#ffffff" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>
  <!-- Category badges at y=100 -->
  <rect x="80" y="85" width="90" height="32" rx="6" fill="rgba(249, 115, 22, 0.15)" stroke="rgba(249, 115, 22, 0.4)" stroke-width="1"/>
  <text x="125" y="107" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f97316" text-anchor="middle">DeFi</text>
  <rect x="190" y="85" width="120" height="32" rx="6" fill="rgba(168, 85, 247, 0.15)" stroke="rgba(168, 85, 247, 0.4)" stroke-width="1"/>
  <text x="250" y="107" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#a855f7" text-anchor="middle">Perpetuals</text>
  <!-- Title at y=195 and y=250 -->
  <text x="80" y="195" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">Perp DEX Wars</text>
  <text x="80" y="250" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">Comparison 2026</text>
  <!-- Subtitle at y=295 -->
  <text x="80" y="295" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#8b949e">Which Decentralized Perp Exchange Wins?</text>
  <!-- Stats row at y=340: 3 boxes 170x72 each -->
  <rect x="80" y="340" width="170" height="72" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="165" y="360" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">$10B+</text>
  <text x="165" y="385" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Daily Volume</text>
  <rect x="285" y="340" width="170" height="72" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="370" y="360" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">15+</text>
  <text x="370" y="385" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Platforms</text>
  <rect x="490" y="340" width="170" height="72" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="575" y="360" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">100x</text>
  <text x="575" y="385" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Max Leverage</text>
  <!-- Features at y=450 -->
  <circle cx="80" cy="453" r="3" fill="#f97316"/>
  <text x="100" y="458" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">Hyperliquid vs dYdX</text>
  <circle cx="380" cy="453" r="3" fill="#a855f7"/>
  <text x="400" y="458" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">GMX vs Vertex</text>
  <circle cx="670" cy="453" r="3" fill="#6366f1"/>
  <text x="690" y="458" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">Fee Comparison</text>
  <!-- Bottom bar -->
  <rect y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <rect y="590" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="80" y="616" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#818cf8">degen0x</text>
  <text x="160" y="616" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6e7681">degen0x.com</text>
  <text x="1120" y="616" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>