<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="suiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6fbcf0"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="180" fill="#6fbcf0" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="420" r="130" fill="#58a6ff" opacity="0.05" filter="url(#glow)"/>
  <circle cx="180" cy="500" r="100" fill="#0891b2" opacity="0.04" filter="url(#glow)"/>

  <!-- Category Badge -->
  <rect x="60" y="480" width="120" height="32" rx="16" fill="#6fbcf0" opacity="0.2" stroke="#6fbcf0" stroke-width="1.5"/>
  <text x="120" y="502" font-size="13" fill="#6fbcf0" text-anchor="middle" font-family="Inter" font-weight="600">DEFI</text>

  <!-- Main Title -->
  <text x="70" y="560" font-size="48" font-weight="bold" fill="url(#suiGrad)" font-family="Inter">Sui DeFi Ecosystem Guide 2026</text>

  <!-- Subtitle -->
  <text x="70" y="600" font-size="18" fill="#8b949e" font-family="Inter">$2.6B TVL and Growing</text>

  <!-- Sui protocol blocks -->
  <!-- Suilend -->
  <g opacity="0.6">
    <rect x="130" y="180" width="140" height="140" rx="12" fill="none" stroke="#6fbcf0" stroke-width="2"/>
    <text x="200" y="235" font-size="16" font-weight="bold" fill="#6fbcf0" text-anchor="middle" font-family="Inter">Suilend</text>
    <text x="200" y="260" font-size="12" fill="#8b949e" text-anchor="middle" font-family="Inter">Lending</text>
  </g>

  <!-- Navi -->
  <g opacity="0.6">
    <rect x="360" y="200" width="140" height="140" rx="12" fill="none" stroke="#58a6ff" stroke-width="2.5"/>
    <text x="430" y="255" font-size="16" font-weight="bold" fill="#58a6ff" text-anchor="middle" font-family="Inter">Navi</text>
    <text x="430" y="280" font-size="12" fill="#8b949e" text-anchor="middle" font-family="Inter">Protocol</text>
  </g>

  <!-- Cetus -->
  <g opacity="0.6">
    <rect x="590" y="180" width="140" height="140" rx="12" fill="none" stroke="#0891b2" stroke-width="2"/>
    <text x="660" y="235" font-size="16" font-weight="bold" fill="#0891b2" text-anchor="middle" font-family="Inter">Cetus</text>
    <text x="660" y="260" font-size="12" fill="#8b949e" text-anchor="middle" font-family="Inter">AMM</text>
  </g>

  <!-- Move language reference -->
  <g opacity="0.5">
    <rect x="850" y="200" width="140" height="120" rx="12" fill="none" stroke="#6fbcf0" stroke-width="2"/>
    <text x="920" y="245" font-size="14" font-weight="bold" fill="#6fbcf0" text-anchor="middle" font-family="Inter">Move</text>
    <text x="920" y="270" font-size="11" fill="#8b949e" text-anchor="middle" font-family="Inter">Language</text>
  </g>

  <!-- degen0x branding -->
  <text x="1100" y="600" font-size="14" fill="#8b949e" text-anchor="end" font-family="Inter" font-weight="600">degen0x</text>
</svg>