<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="badgeGlow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badgeGlow2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badgeGlow3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gradient accent bar top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="900" cy="200" r="180" fill="#6366f1" opacity="0.04"/>
  <circle cx="350" cy="450" r="140" fill="#06b6d4" opacity="0.03"/>
  <circle cx="1050" cy="500" r="100" fill="#f59e0b" opacity="0.03"/>

  <!-- degen0x logo text (top-left) -->
  <text x="60" y="58" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Main title -->
  <text x="60" y="200" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Achievement Badges</text>
  <text x="60" y="260" font-family="Inter, -apple-system, sans-serif" font-size="42" font-weight="800" fill="url(#accent)" letter-spacing="-0.02em">Mint Soulbound NFTs</text>

  <!-- Subtitle -->
  <text x="60" y="310" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#8b949e">Prove your crypto mastery on-chain · Earn XP · Collect badges</text>

  <!-- Badge 1 - Indigo -->
  <g transform="translate(700, 140)">
    <circle cx="70" cy="70" r="65" fill="url(#badgeGlow1)" filter="url(#softGlow)"/>
    <circle cx="70" cy="70" r="52" fill="rgba(255,255,255,0.04)" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="70" cy="70" r="42" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
    <text x="70" y="80" text-anchor="middle" font-size="36">🎓</text>
    <text x="70" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#6366f1">DeFi Scholar</text>
  </g>

  <!-- Badge 2 - Cyan -->
  <g transform="translate(880, 120)">
    <circle cx="70" cy="70" r="65" fill="url(#badgeGlow2)" filter="url(#softGlow)"/>
    <circle cx="70" cy="70" r="52" fill="rgba(255,255,255,0.04)" stroke="#06b6d4" stroke-width="2.5"/>
    <circle cx="70" cy="70" r="42" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
    <text x="70" y="80" text-anchor="middle" font-size="36">⛓️</text>
    <text x="70" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#06b6d4">On-Chain Pro</text>
  </g>

  <!-- Badge 3 - Amber -->
  <g transform="translate(1040, 160)">
    <circle cx="70" cy="70" r="65" fill="url(#badgeGlow3)" filter="url(#softGlow)"/>
    <circle cx="70" cy="70" r="52" fill="rgba(255,255,255,0.04)" stroke="#f59e0b" stroke-width="2.5"/>
    <circle cx="70" cy="70" r="42" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
    <text x="70" y="80" text-anchor="middle" font-size="36">🏆</text>
    <text x="70" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">OG Degen</text>
  </g>

  <!-- Glass card stats panel -->
  <rect x="60" y="370" width="480" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Stat items inside card -->
  <g transform="translate(90, 395)">
    <text font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-transform="uppercase" letter-spacing="0.05em">BADGES</text>
    <text y="28" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#6366f1">24+</text>
  </g>
  <line x1="220" y1="390" x2="220" y2="450" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <g transform="translate(250, 395)">
    <text font-family="Inter, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.05em">SOULBOUND</text>
    <text y="28" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#06b6d4">NFTs</text>
  </g>
  <line x1="380" y1="390" x2="380" y2="450" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <g transform="translate(410, 395)">
    <text font-family="Inter, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.05em">CHAIN</text>
    <text y="28" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#f59e0b">Solana</text>
  </g>

  <!-- Small badge row at bottom right -->
  <g transform="translate(700, 380)">
    <rect width="440" height="90" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="24" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.05em">RECENT BADGES EARNED</text>
    <g transform="translate(20, 38)">
      <circle cx="20" cy="20" r="18" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1.5"/>
      <text x="20" y="26" text-anchor="middle" font-size="18">🔥</text>
    </g>
    <g transform="translate(70, 38)">
      <circle cx="20" cy="20" r="18" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="20" y="26" text-anchor="middle" font-size="18">💎</text>
    </g>
    <g transform="translate(120, 38)">
      <circle cx="20" cy="20" r="18" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="20" y="26" text-anchor="middle" font-size="18">🧠</text>
    </g>
    <g transform="translate(170, 38)">
      <circle cx="20" cy="20" r="18" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="20" y="26" text-anchor="middle" font-size="18">🎯</text>
    </g>
    <g transform="translate(220, 38)">
      <circle cx="20" cy="20" r="18" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="20" y="26" text-anchor="middle" font-size="18">⚡</text>
    </g>
    <text x="290" y="56" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">+19 more</text>
  </g>

  <!-- Bottom bar -->
  <rect y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="624" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="624" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#6e7681">Free · No Sign-up Required</text>
</svg>