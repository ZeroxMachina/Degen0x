<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Accent bar -->
  <rect width="1200" height="6" fill="url(#accentGradient)"/>

  <!-- Decorative gradient circles background -->
  <circle cx="160" cy="240" r="120" fill="#4f46e5" opacity="0.08"/>
  <circle cx="1080" cy="350" r="135" fill="#0891b2" opacity="0.08"/>
  <circle cx="920" cy="140" r="100" fill="#d97706" opacity="0.06"/>

  <!-- Glass-morphism container -->
  <rect x="50" y="60" width="1100" height="520" rx="16" fill="url(#glassGradient)"
        stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- degen0x logo text -->
  <text x="80" y="115" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#8b949e" letter-spacing="2">
    degen0x
  </text>

  <!-- Title -->
  <text x="80" y="220" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    Smart Money
  </text>
  <text x="80" y="280" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    Tracker
  </text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">
    Follow whale wallets & institutional moves
  </text>

  <!-- Decorative wallet network with flow lines -->
  <g filter="url(#glow)">
    <!-- Center wallet -->
    <g>
      <rect x="880" y="360" width="40" height="40" rx="6" fill="rgba(79, 70, 229, 0.3)" stroke="url(#accentGradient)" stroke-width="1.5"/>
      <text x="892" y="385" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#4f46e5">₩</text>
    </g>

    <!-- Connected wallets -->
    <!-- Top-left wallet -->
    <g>
      <line x1="890" y1="370" x2="810" y2="330" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
      <rect x="770" y="310" width="40" height="40" rx="6" fill="rgba(8, 145, 178, 0.3)" stroke="rgba(8, 145, 178, 0.6)" stroke-width="1"/>
      <text x="782" y="335" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#0891b2">W</text>
    </g>

    <!-- Top-right wallet -->
    <g>
      <line x1="920" y1="365" x2="980" y2="325" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
      <rect x="1000" y="305" width="40" height="40" rx="6" fill="rgba(217, 119, 6, 0.3)" stroke="rgba(217, 119, 6, 0.6)" stroke-width="1"/>
      <text x="1012" y="330" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#d97706">W</text>
    </g>

    <!-- Bottom-left wallet -->
    <g>
      <line x1="890" y1="400" x2="810" y2="440" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
      <rect x="770" y="450" width="40" height="40" rx="6" fill="rgba(16, 185, 129, 0.3)" stroke="rgba(16, 185, 129, 0.6)" stroke-width="1"/>
      <text x="782" y="475" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#10b981">W</text>
    </g>

    <!-- Bottom-right wallet -->
    <g>
      <line x1="920" y1="395" x2="980" y2="435" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
      <rect x="1000" y="445" width="40" height="40" rx="6" fill="rgba(79, 70, 229, 0.3)" stroke="rgba(79, 70, 229, 0.6)" stroke-width="1"/>
      <text x="1012" y="470" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#4f46e5">W</text>
    </g>

    <!-- Flow indicators -->
    <circle cx="860" cy="380" r="3" fill="#10b981"/>
    <circle cx="940" cy="380" r="3" fill="#10b981"/>
  </g>

  <!-- Vertical accent lines -->
  <line x1="700" y1="60" x2="700" y2="580" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>

  <!-- Footer -->
  <text x="80" y="595" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#475569">
    degen0x.com
  </text>
</svg>