<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="55%" style="stop-color:#0b1025"/>
      <stop offset="100%" style="stop-color:#0a0e1e"/>
    </linearGradient>
    <!-- Brand signature gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="50%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <!-- Big number gradient -->
    <linearGradient id="bigNumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="40%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <!-- Indigo glow top-right -->
    <radialGradient id="indigoGlow" cx="82%" cy="20%" r="45%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <!-- Green glow bottom-left -->
    <radialGradient id="greenGlow" cx="15%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>
    <!-- Cyan glow center -->
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <!-- Glass card -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <!-- Category pill gradients -->
    <linearGradient id="toolPill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="learnPill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="comparePill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="defiPill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="numberGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="svgClip">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#indigoGlow)"/>
  <rect width="1200" height="630" fill="url(#greenGlow)"/>
  <rect width="1200" height="630" fill="url(#cyanGlow)"/>

  <!-- Decorative grid lines (very subtle) -->
  <g opacity="0.03" stroke="#e6edf3" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative circuit-like dots -->
  <g opacity="0.12" fill="#6366f1">
    <circle cx="880" cy="95" r="3"/>
    <circle cx="920" cy="95" r="3"/>
    <circle cx="960" cy="95" r="3"/>
    <circle cx="1000" cy="95" r="3"/>
    <circle cx="1040" cy="95" r="3"/>
    <circle cx="1080" cy="95" r="3"/>
    <circle cx="1120" cy="95" r="3"/>
    <circle cx="1160" cy="95" r="3"/>
  </g>
  <g opacity="0.08" fill="#06b6d4">
    <circle cx="880" cy="535" r="2.5"/>
    <circle cx="920" cy="535" r="2.5"/>
    <circle cx="960" cy="535" r="2.5"/>
    <circle cx="1000" cy="535" r="2.5"/>
    <circle cx="1040" cy="535" r="2.5"/>
    <circle cx="1080" cy="535" r="2.5"/>
  </g>

  <!-- Top brand accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Left content panel -->
  <!-- degen0x logo wordmark (top-left) -->
  <g transform="translate(56, 52)">
    <!-- 0x circle -->
    <circle cx="14" cy="14" r="14" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="14" cy="14" r="14" fill="#6366f1" opacity="0.15"/>
    <text x="14" y="19" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#a5b4fc" text-anchor="middle">0x</text>
    <!-- wordmark -->
    <text x="34" y="20" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">degen<tspan fill="#6366f1">0x</tspan></text>
  </g>

  <!-- Main headline area -->
  <text x="56" y="175" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#8b949e" letter-spacing="0.5">MILESTONE</text>

  <!-- The big 270+ number — hero element -->
  <text x="56" y="310" font-family="Inter, sans-serif" font-size="168" font-weight="900" fill="url(#bigNumGrad)" letter-spacing="-8" filter="url(#numberGlow)" opacity="0.9">270+</text>

  <!-- Subheadline -->
  <text x="58" y="360" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">pages live on degen0x.com</text>

  <!-- Descriptor -->
  <text x="58" y="398" font-family="Inter, sans-serif" font-size="17" font-weight="400" fill="#8b949e">Tools · Guides · Comparisons · DeFi Trackers — all free, no sign-up</text>

  <!-- Category pills row -->
  <g transform="translate(56, 430)">
    <!-- Tools -->
    <rect x="0" y="0" width="100" height="32" rx="16" fill="url(#toolPill)" stroke="#6366f1" stroke-opacity="0.35" stroke-width="1"/>
    <text x="50" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle">🔧 Tools</text>
    <!-- Learn -->
    <rect x="112" y="0" width="100" height="32" rx="16" fill="url(#learnPill)" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1"/>
    <text x="162" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#22d3ee" text-anchor="middle">📚 Learn</text>
    <!-- Compare -->
    <rect x="224" y="0" width="120" height="32" rx="16" fill="url(#comparePill)" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1"/>
    <text x="284" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">⚖️ Compare</text>
    <!-- DeFi -->
    <rect x="356" y="0" width="100" height="32" rx="16" fill="url(#defiPill)" stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="1"/>
    <text x="406" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">⚡ DeFi</text>
  </g>

  <!-- Right panel — glass card with page count breakdown -->
  <rect x="760" y="110" width="390" height="380" rx="20"
    fill="url(#glassGrad)"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="1"/>

  <!-- Card inner glow border accent -->
  <rect x="760" y="110" width="390" height="4" rx="2" fill="url(#brandGrad)" opacity="0.6"/>

  <!-- Card title -->
  <text x="955" y="158" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="1">CONTENT BREAKDOWN</text>

  <!-- Separator -->
  <line x1="785" y1="170" x2="1125" y2="170" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Category rows with bar charts -->
  <!-- Tools -->
  <text x="785" y="205" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#e6edf3">🔧 Tools</text>
  <text x="1130" y="205" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#818cf8" text-anchor="end">92</text>
  <rect x="785" y="212" width="260" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="785" y="212" width="198" height="6" rx="3" fill="#6366f1" opacity="0.8"/>

  <!-- Learn Guides -->
  <text x="785" y="245" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#e6edf3">📚 Learn Guides</text>
  <text x="1130" y="245" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="end">78</text>
  <rect x="785" y="252" width="260" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="785" y="252" width="168" height="6" rx="3" fill="#06b6d4" opacity="0.8"/>

  <!-- Comparisons -->
  <text x="785" y="285" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#e6edf3">⚖️ Comparisons</text>
  <text x="1130" y="285" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="end">54</text>
  <rect x="785" y="292" width="260" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="785" y="292" width="116" height="6" rx="3" fill="#f59e0b" opacity="0.8"/>

  <!-- DeFi Trackers -->
  <text x="785" y="325" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#e6edf3">⚡ DeFi Trackers</text>
  <text x="1130" y="325" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="end">31</text>
  <rect x="785" y="332" width="260" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="785" y="332" width="67" height="6" rx="3" fill="#8b5cf6" opacity="0.8"/>

  <!-- Exchanges / Reviews -->
  <text x="785" y="365" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#e6edf3">🏦 Exchanges &amp; Wallets</text>
  <text x="1130" y="365" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#34d399" text-anchor="end">15+</text>
  <rect x="785" y="372" width="260" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="785" y="372" width="32" height="6" rx="3" fill="#22c55e" opacity="0.8"/>

  <!-- Separator -->
  <line x1="785" y1="395" x2="1125" y2="395" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Free label -->
  <rect x="785" y="407" width="130" height="28" rx="14" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="850" y="426" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#4ade80" text-anchor="middle">✓ Always Free</text>

  <!-- No signup label -->
  <rect x="925" y="407" width="130" height="28" rx="14" fill="rgba(99,102,241,0.12)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="990" y="426" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle">✓ No Sign-Up</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.25)"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Bottom left — URL -->
  <text x="56" y="615" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#8b949e">degen0x.com</text>

  <!-- Bottom center — tagline -->
  <text x="600" y="615" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#6e7681" text-anchor="middle">The Bloomberg Terminal of crypto — for everyone</text>

  <!-- Bottom right — Still Building badge -->
  <rect x="1000" y="599" width="144" height="24" rx="12" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1072" y="616" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22d3ee" text-anchor="middle">🔧 Still Building</text>
</svg>
