<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neuralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Top gradient bar -->
  <rect width="1200" height="8" fill="url(#topGradient)"/>

  <!-- Decorative circles background -->
  <circle cx="180" cy="480" r="105" fill="#8b5cf6" opacity="0.08"/>
  <circle cx="1050" cy="180" r="115" fill="#0891b2" opacity="0.08"/>

  <!-- Logo area -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">
    degen0x
  </text>

  <!-- Main title -->
  <text x="40" y="150" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
    AI Trading Signals
  </text>
  <text x="40" y="215" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
  </text>

  <!-- Subtitle -->
  <text x="40" y="270" font-family="Inter, sans-serif" font-size="22" fill="#8b949e">
    AI-powered crypto trading analysis & alerts
  </text>

  <!-- Neural network visualization on right side -->
  <g opacity="0.85" filter="url(#glow)">
    <!-- Input layer -->
    <circle cx="820" cy="120" r="16" fill="#4f46e5" stroke="#0891b2" stroke-width="2"/>
    <circle cx="820" cy="180" r="16" fill="#4f46e5" stroke="#0891b2" stroke-width="2"/>
    <circle cx="820" cy="240" r="16" fill="#4f46e5" stroke="#0891b2" stroke-width="2"/>

    <!-- Hidden layer -->
    <circle cx="920" cy="100" r="18" fill="url(#neuralGradient)" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="920" cy="160" r="18" fill="url(#neuralGradient)" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="920" cy="220" r="18" fill="url(#neuralGradient)" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="920" cy="280" r="18" fill="url(#neuralGradient)" stroke="#8b5cf6" stroke-width="2"/>

    <!-- Output layer -->
    <circle cx="1020" cy="140" r="16" fill="#0891b2" stroke="#4f46e5" stroke-width="2"/>
    <circle cx="1020" cy="220" r="16" fill="#0891b2" stroke="#4f46e5" stroke-width="2"/>

    <!-- Connecting lines -->
    <line x1="836" y1="120" x2="902" y2="100" stroke="#4f46e5" stroke-width="1.5" opacity="0.5"/>
    <line x1="836" y1="120" x2="902" y2="160" stroke="#4f46e5" stroke-width="1.5" opacity="0.5"/>
    <line x1="836" y1="120" x2="902" y2="220" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>

    <line x1="836" y1="180" x2="902" y2="100" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="836" y1="180" x2="902" y2="160" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="836" y1="180" x2="902" y2="220" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="836" y1="180" x2="902" y2="280" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

    <line x1="836" y1="240" x2="902" y2="160" stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>
    <line x1="836" y1="240" x2="902" y2="220" stroke="#0891b2" stroke-width="1.5" opacity="0.6"/>
    <line x1="836" y1="240" x2="902" y2="280" stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>

    <line x1="938" y1="100" x2="1004" y2="140" stroke="#4f46e5" stroke-width="1.5" opacity="0.6"/>
    <line x1="938" y1="160" x2="1004" y2="140" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="938" y1="220" x2="1004" y2="220" stroke="#0891b2" stroke-width="1.5" opacity="0.6"/>
    <line x1="938" y1="280" x2="1004" y2="220" stroke="#4f46e5" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Bottom branding -->
  <text x="40" y="595" font-family="Inter, sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">
    degen0x.com
  </text>

  <!-- Accent line -->
  <line x1="40" y1="300" x2="150" y2="300" stroke="url(#topGradient)" stroke-width="3" stroke-linecap="round"/>
</svg>