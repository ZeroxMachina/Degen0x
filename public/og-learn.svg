  <rect x="390" y="400" width="160" height="40" rx="20" fill="#06b6d4" opacity="0.15"/>
  <text x="470" y="426" font-family="Arial, sans-serif" font-size="15" fill="#06b6d4" text-anchor="middle">DeFi</text>
  <rect x="580" y="400" width="160" height="40" rx="20" fill="#8b5cf6" opacity="0.15"/>
  <text x="660" y="426" font-family="Arial, sans-serif" font-size="15" fill="#8b5cf6" text-anchor="middle">Staking</text>
