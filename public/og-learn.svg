<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#080d1c"/>
  <ellipse cx="130" cy="90" rx="200" ry="180" fill="url(#accentGrad)" opacity="0.07"/>
  <ellipse cx="1070" cy="540" rx="220" ry="190" fill="url(#accentGrad)" opacity="0.05"/>
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" stroke="url(#accentGrad)" stroke-width="1"/>
  <!-- Book/learn icon -->
  <g transform="translate(555, 120)" filter="url(#glow)" opacity="0.5">
    <path d="M45 10 L5 25 L5 85 L45 70 L85 85 L85 25 Z" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
    <line x1="45" y1="10" x2="45" y2="70" stroke="url(#accentGrad)" stroke-width="2"/>
  </g>
  <text x="600" y="275" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Learn Crypto</text>
  <text x="600" y="335" font-family="Arial, sans-serif" font-size="28" fill="#8b949e" text-anchor="middle">Beginner to Advanced Guides &amp; Tutorials</text>
  <line x1="350" y1="365" x2="850" y2="365" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
