<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0c1229"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <clipPath id="chartClip">
      <rect x="60" y="340" width="520" height="140" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="150" r="200" fill="url(#purpleGlow)" filter="url(#softGlow)"/>
  <circle cx="1000" cy="500" r="180" fill="url(#amberGlow)" filter="url(#softGlow)"/>
  <circle cx="600" cy="400" r="250" fill="url(#cyanGrad)" opacity="0.08" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Logo area -->
  <circle cx="76" cy="46" r="18" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.9"/>
  <text x="68" y="52" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#818cf8" text-anchor="middle">0x</text>
  <text x="104" y="52" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" letter-spacing="-0.02em">degen0x</text>

  <!-- FOMC badge -->
  <rect x="950" y="28" width="210" height="36" rx="18" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <circle cx="970" cy="46" r="5" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="985" y="51" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">FOMC DECISION TOMORROW</text>

  <!-- Main title -->
  <text x="60" y="130" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="url(#brandGrad)" letter-spacing="-0.03em">Institutions Are Loading Up</text>
  <text x="60" y="175" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#8b949e">Smart money buying while Fear &amp; Greed sits at 15</text>

  <!-- BTC price card -->
  <rect x="60" y="210" width="260" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="82" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">BTC</text>
  <text x="82" y="275" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">$75,800</text>
  <text x="250" y="275" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e">+25%</text>
  <text x="250" y="295" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#6e7681">from Feb low</text>

  <!-- ETH price card -->
  <rect x="340" y="210" width="240" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="362" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">ETH</text>
  <text x="362" y="275" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">+10%</text>
  <text x="362" y="295" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#6e7681">Leading CoinDesk 20</text>

  <!-- Fear & Greed card -->
  <rect x="600" y="210" width="240" height="100" rx="16" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="622" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Fear &amp; Greed</text>
  <text x="622" y="275" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ef4444" letter-spacing="-0.02em">15</text>
  <text x="622" y="295" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#6e7681">Extreme Fear</text>

  <!-- ETF inflows card -->
  <rect x="860" y="210" width="280" height="100" rx="16" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="882" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">March ETF Inflows</text>
  <text x="882" y="275" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#22c55e" letter-spacing="-0.02em">+$1.3B</text>
  <text x="882" y="295" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#6e7681">First positive since Oct</text>

  <!-- Mini chart area (BTC price from Feb bottom to now) -->
  <rect x="60" y="340" width="520" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="365" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e">BTC Recovery — Feb to Mar 2026</text>
  <!-- Price line (simplified uptrend from $60K to $75.8K) -->
  <polyline points="80,460 120,455 160,450 200,445 240,440 280,425 320,420 360,410 400,395 440,385 480,370 520,365 540,360 555,370 560,362"
    fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Area fill under line -->
  <polygon points="80,460 120,455 160,450 200,445 240,440 280,425 320,420 360,410 400,395 440,385 480,370 520,365 540,360 555,370 560,362 560,470 80,470"
    fill="url(#greenGrad)" opacity="0.3"/>
  <!-- Price labels -->
  <text x="80" y="475" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">$60K</text>
  <text x="540" y="355" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22c55e">$75.8K</text>

  <!-- Institutional buying cards (right side) -->
  <rect x="610" y="340" width="530" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="630" y="365" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e">INSTITUTIONAL BUYING THIS WEEK</text>

  <!-- Strategy row -->
  <rect x="630" y="380" width="490" height="40" rx="8" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="650" y="405" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#818cf8">Strategy (Saylor)</text>
  <text x="880" y="405" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#e6edf3">$1.57B BTC</text>
  <text x="1010" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">761,068 BTC total</text>

  <!-- Bitmine row -->
  <rect x="630" y="428" width="490" height="40" rx="8" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
  <text x="650" y="453" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#06b6d4">Bitmine</text>
  <text x="880" y="453" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#e6edf3">60,999 ETH</text>
  <text x="1010" y="453" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">4.6M ETH total</text>

  <!-- Bottom stat bar -->
  <rect x="0" y="510" width="1200" height="50" fill="rgba(255,255,255,0.02)"/>
  <line x1="0" y1="510" x2="1200" y2="510" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="80" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">Dot Plot:</text>
  <text x="145" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f59e0b">1 Cut Median</text>

  <text x="300" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">Hold Prob:</text>
  <text x="375" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#e6edf3">92%+</text>

  <text x="460" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">Powell Final:</text>
  <text x="550" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b5cf6">May 23</text>

  <text x="670" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">Core PCE:</text>
  <text x="740" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444">2.8%</text>

  <text x="830" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">BTC Miners/AI:</text>
  <text x="930" y="540" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e">+6-12%</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="610" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="220" y="610" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Free crypto tools, guides &amp; data</text>

  <!-- CTA -->
  <rect x="900" y="590" width="250" height="32" rx="16" fill="url(#brandGrad)" opacity="0.9"/>
  <text x="1025" y="611" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">Read FOMC Guide →</text>
</svg>