<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="eth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="peerdasGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6e40c9"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="200" cy="300" r="300" fill="#6e40c9" opacity="0.06"/>
  <circle cx="950" cy="200" r="250" fill="#1f6feb" opacity="0.05"/>
  <circle cx="600" cy="550" r="200" fill="#3fb950" opacity="0.03"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="2">degen0x</text>

  <!-- Category badge -->
  <rect x="60" y="100" width="100" height="28" rx="14" fill="rgba(110,64,201,0.25)" stroke="rgba(110,64,201,0.5)" stroke-width="1"/>
  <text x="83" y="119" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a371f7">Ethereum</text>

  <rect x="170" y="100" width="65" height="28" rx="14" fill="rgba(14,165,233,0.2)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>
  <text x="185" y="119" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#38bdf8">Learn</text>

  <!-- Title -->
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-1">Ethereum Fusaka &amp;</text>
  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-1">Glamsterdam Upgrade</text>
  <text x="60" y="305" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="url(#eth)" letter-spacing="-1">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="350" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">PeerDAS, danksharding roadmap, L2 cost reductions &amp; more</text>

  <!-- PeerDAS diagram panel -->
  <g transform="translate(740, 100)">
    <rect x="0" y="0" width="400" height="280" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="24" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="1">KEY UPGRADES</text>

    <!-- PeerDAS row -->
    <rect x="24" y="55" width="352" height="44" rx="10" fill="rgba(110,64,201,0.15)" stroke="rgba(110,64,201,0.3)" stroke-width="1"/>
    <text x="44" y="82" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#a371f7">EIP-7594</text>
    <text x="145" y="82" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e6edf3">PeerDAS — Data Sampling</text>

    <!-- Gas limit row -->
    <rect x="24" y="110" width="352" height="44" rx="10" fill="rgba(31,111,235,0.15)" stroke="rgba(31,111,235,0.3)" stroke-width="1"/>
    <text x="44" y="137" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#58a6ff">EIP-7825</text>
    <text x="145" y="137" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e6edf3">Gas Limit Cap — 16.78M</text>

    <!-- Glamsterdam row -->
    <rect x="24" y="165" width="352" height="44" rx="10" fill="rgba(63,185,80,0.15)" stroke="rgba(63,185,80,0.3)" stroke-width="1"/>
    <text x="44" y="192" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#3fb950">2026</text>
    <text x="145" y="192" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e6edf3">Glamsterdam — MEV + UX</text>

    <!-- Danksharding row -->
    <rect x="24" y="220" width="352" height="44" rx="10" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="44" y="247" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">Future</text>
    <text x="145" y="247" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e6edf3">Full Danksharding — 1MB</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(740, 410)">
    <rect x="0" y="0" width="190" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">FUSAKA LIVE</text>
    <text x="20" y="52" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#3fb950">Dec 3, 2025</text>

    <rect x="205" y="0" width="190" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="225" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">TOTAL EIPs</text>
    <text x="225" y="52" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#a371f7">12 EIPs</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="607" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">degen0x.com</text>
  <text x="1050" y="607" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">2026 Guide</text>
</svg>
