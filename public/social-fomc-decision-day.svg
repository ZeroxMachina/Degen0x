<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f1629"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <clipPath id="roundCard">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" clip-path="url(#roundCard)"/>

  <!-- Decorative ambient glows -->
  <circle cx="200" cy="150" r="200" fill="url(#redGlow)" filter="url(#softGlow)"/>
  <circle cx="1000" cy="500" r="180" fill="url(#greenGlow)" filter="url(#softGlow)"/>
  <circle cx="600" cy="300" r="250" fill="url(#amberGlow)" filter="url(#softGlow)" opacity="0.5"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand)"/>

  <!-- URGENT badge -->
  <rect x="60" y="40" width="200" height="36" rx="18" fill="#ef4444" opacity="0.15"/>
  <rect x="60" y="40" width="200" height="36" rx="18" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <circle cx="82" cy="58" r="5" fill="#ef4444" filter="url(#glow)"/>
  <text x="96" y="63" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444" letter-spacing="0.08em">FOMC DECISION DAY</text>

  <!-- degen0x logo text -->
  <text x="1080" y="63" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#brand)" text-anchor="end">degen0x</text>

  <!-- Main title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">The Fed Decides Tomorrow.</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="url(#brand)" letter-spacing="-0.02em">Here's the Crypto Playbook.</text>

  <!-- Subtitle -->
  <text x="60" y="245" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Rate decision March 18 at 2:00 PM ET  |  Dot plot update  |  Powell press conference 2:30 PM</text>

  <!-- Three scenario cards -->
  <!-- Hawkish card -->
  <rect x="60" y="285" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ef4444" letter-spacing="0.06em">HAWKISH</text>
  <text x="80" y="348" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Dot plot shifts to 0 cuts</text>
  <text x="80" y="378" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#ef4444">$65K</text>
  <text x="80" y="405" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">BTC target if no 2026 cuts</text>
  <!-- Down arrow -->
  <line x1="340" y1="330" x2="340" y2="440" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
  <polygon points="332,430 340,450 348,430" fill="#ef4444" opacity="0.6"/>
  <!-- Candle bars (bearish) -->
  <rect x="300" y="340" width="8" height="30" rx="2" fill="#ef4444" opacity="0.5"/>
  <rect x="315" y="350" width="8" height="40" rx="2" fill="#ef4444" opacity="0.6"/>
  <rect x="330" y="345" width="8" height="50" rx="2" fill="#ef4444" opacity="0.7"/>
  <rect x="345" y="360" width="8" height="55" rx="2" fill="#ef4444" opacity="0.8"/>
  <rect x="360" y="370" width="8" height="60" rx="2" fill="#ef4444" opacity="0.9"/>

  <!-- Neutral card -->
  <rect x="430" y="285" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="450" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" letter-spacing="0.06em">NEUTRAL</text>
  <text x="450" y="348" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Hold at 1 cut (expected)</text>
  <text x="450" y="378" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#f59e0b">-2-4%</text>
  <text x="450" y="405" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Sell-the-news drift lower</text>
  <!-- Flat arrow -->
  <line x1="680" y1="390" x2="730" y2="395" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <polygon points="722,387 735,395 722,403" fill="#f59e0b" opacity="0.6"/>
  <!-- Candle bars (flat) -->
  <rect x="670" y="340" width="8" height="25" rx="2" fill="#f59e0b" opacity="0.4"/>
  <rect x="685" y="345" width="8" height="20" rx="2" fill="#f59e0b" opacity="0.5"/>
  <rect x="700" y="342" width="8" height="22" rx="2" fill="#f59e0b" opacity="0.5"/>
  <rect x="715" y="348" width="8" height="28" rx="2" fill="#f59e0b" opacity="0.6"/>
  <rect x="730" y="350" width="8" height="30" rx="2" fill="#f59e0b" opacity="0.6"/>

  <!-- Dovish card -->
  <rect x="800" y="285" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="820" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" letter-spacing="0.06em">DOVISH</text>
  <text x="820" y="348" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Dot plot shifts to 2 cuts</text>
  <text x="820" y="378" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#22c55e">$75K+</text>
  <text x="820" y="405" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">BTC breakout above resistance</text>
  <!-- Up arrow -->
  <line x1="1080" y1="450" x2="1080" y2="330" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  <polygon points="1072,340 1080,320 1088,340" fill="#22c55e" opacity="0.6"/>
  <!-- Candle bars (bullish) -->
  <rect x="1040" y="400" width="8" height="35" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="1055" y="385" width="8" height="45" rx="2" fill="#22c55e" opacity="0.6"/>
  <rect x="1070" y="370" width="8" height="50" rx="2" fill="#22c55e" opacity="0.7"/>
  <rect x="1085" y="355" width="8" height="55" rx="2" fill="#22c55e" opacity="0.8"/>
  <rect x="1100" y="340" width="8" height="60" rx="2" fill="#22c55e" opacity="0.9"/>

  <!-- Bottom stats bar -->
  <rect x="0" y="510" width="1200" height="120" fill="rgba(255,255,255,0.02)"/>
  <line x1="0" y1="510" x2="1200" y2="510" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Stat pills -->
  <rect x="60" y="530" width="180" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="150" y="553" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">BTC PRICE</text>
  <text x="150" y="577" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#e6edf3" text-anchor="middle">$73,087</text>

  <rect x="270" y="530" width="180" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="360" y="553" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">FEAR &amp; GREED</text>
  <text x="360" y="577" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#ef4444" text-anchor="middle">15 Extreme Fear</text>

  <rect x="480" y="530" width="180" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="570" y="553" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">MARCH ETF FLOWS</text>
  <text x="570" y="577" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#22c55e" text-anchor="middle">+$1.3B</text>

  <rect x="690" y="530" width="180" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="780" y="553" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">RATE HOLD PROB</text>
  <text x="780" y="577" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#f59e0b" text-anchor="middle">98.1%</text>

  <rect x="900" y="530" width="240" height="60" rx="12" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="1020" y="553" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">READ THE PLAYBOOK</text>
  <text x="1020" y="577" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#brand)" text-anchor="middle">degen0x.com</text>

</svg>