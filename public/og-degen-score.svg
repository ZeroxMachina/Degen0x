<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#080d1c"/>
  <rect y="0" width="1200" height="4" fill="url(#grad1)"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="400" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="950" cy="300" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scoreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <circle cx="80" cy="60" r="20" fill="#6366f1" opacity="0.8"/>
  <text x="108" y="68" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">degen0x</text>
  <rect x="60" y="180" width="80" height="30" rx="8" fill="#8b5cf6" opacity="0.2"/>
  <text x="72" y="200" fill="#8b5cf6" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">TOOLS</text>
  <text x="60" y="260" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-1">Degen Score</text>
  <text x="60" y="310" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="22">Rate your on-chain degen level across DeFi, NFTs, and trading</text>
  <!-- Score gauge -->
  <g transform="translate(920, 180)">
    <rect x="0" y="0" width="220" height="280" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Circular score -->
    <circle cx="110" cy="120" r="70" fill="none" stroke="#30363d" stroke-width="8"/>
    <circle cx="110" cy="120" r="70" fill="none" stroke="#8b5cf6" stroke-width="8" stroke-dasharray="330 110" stroke-linecap="round" transform="rotate(-90 110 120)"/>
    <text x="110" y="110" fill="#e6edf3" font-family="Inter, sans-serif" font-size="36" font-weight="800" text-anchor="middle">87</text>
    <text x="110" y="135" fill="#8b949e" font-family="Inter, sans-serif" font-size="13" text-anchor="middle">/ 100</text>
    <!-- Score breakdown -->
    <text x="25" y="215" fill="#8b949e" font-family="Inter, sans-serif" font-size="12">DeFi</text>
    <rect x="65" y="205" width="90" height="6" rx="3" fill="#30363d"/>
    <rect x="65" y="205" width="76" height="6" rx="3" fill="#22c55e"/>
    <text x="25" y="238" fill="#8b949e" font-family="Inter, sans-serif" font-size="12">NFTs</text>
    <rect x="65" y="228" width="90" height="6" rx="3" fill="#30363d"/>
    <rect x="65" y="228" width="45" height="6" rx="3" fill="#f59e0b"/>
    <text x="25" y="261" fill="#8b949e" font-family="Inter, sans-serif" font-size="12">Trade</text>
    <rect x="65" y="251" width="90" height="6" rx="3" fill="#30363d"/>
    <rect x="65" y="251" width="82" height="6" rx="3" fill="#6366f1"/>
  </g>
  <rect x="0" y="590" width="1200" height="40" fill="rgba(255,255,255,0.02)"/>
  <text x="60" y="616" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="16">degen0x.com</text>
  <text x="1080" y="616" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14">Free Tool</text>
</svg>
