    <text x="30" y="20" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">Coinbase</text>
    <rect x="105" y="5" width="48" height="18" rx="4" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
