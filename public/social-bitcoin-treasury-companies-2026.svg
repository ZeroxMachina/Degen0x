    <rect x="0" y="0" width="178" height="54" rx="12" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="89" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#818cf8">172+</text>
