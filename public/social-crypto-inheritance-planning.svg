<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#0f1629"/>
      <stop offset="100%" style="stop-color:#080d1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="300" r="200" fill="#f59e0b" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="900" cy="400" r="250" fill="#ef4444" opacity="0.03" filter="url(#softglow)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- LEFT SIDE: Content -->

  <!-- Hero stat -->
  <rect x="60" y="50" width="200" height="44" rx="22" fill="#ef4444" opacity="0.15"/>
  <rect x="60" y="50" width="200" height="44" rx="22" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <text x="160" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle">$30B LOCKED FOREVER</text>

  <!-- Title -->
  <text x="60" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#e6edf3">Crypto Inheritance</text>
  <text x="60" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="url(#accent)">Planning 2026</text>

  <!-- Subtitle -->
  <text x="60" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#8b949e">Protect Your Digital Assets for Your Heirs</text>

  <!-- Stats row -->
  <g transform="translate(60, 275)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="155" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="78" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">US CRYPTO HOLDERS</text>
    <text x="78" y="50" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#f59e0b" text-anchor="middle">17%</text>

    <!-- Stat 2 -->
    <rect x="170" y="0" width="155" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="248" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">ESTATE EXEMPTION</text>
    <text x="248" y="50" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ef4444" text-anchor="middle">~$7M</text>

    <!-- Stat 3 -->
    <rect x="340" y="0" width="155" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="418" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">EXEMPTION DROP</text>
    <text x="418" y="50" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ef4444" text-anchor="middle">-46%</text>
  </g>

  <!-- Solution cards -->
  <g transform="translate(60, 370)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="1.5">SOLUTIONS COMPARED</text>

    <!-- Card 1: Casa -->
    <rect x="0" y="15" width="230" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="25" cy="40" r="8" fill="#22c55e" opacity="0.2"/>
    <text x="25" y="44" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">1</text>
    <text x="45" y="37" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Casa</text>
    <text x="45" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Multisig inheritance protocol</text>

    <!-- Card 2: Inheriti -->
    <rect x="245" y="15" width="230" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="270" cy="40" r="8" fill="#06b6d4" opacity="0.2"/>
    <text x="270" y="44" font-family="system-ui, sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle">2</text>
    <text x="290" y="37" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Inheriti</text>
    <text x="290" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Decentralized dead man's switch</text>

    <!-- Card 3: MPC Wallets -->
    <rect x="0" y="75" width="230" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="25" cy="100" r="8" fill="#8b5cf6" opacity="0.2"/>
    <text x="25" y="104" font-family="system-ui, sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle">3</text>
    <text x="45" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">MPC Wallets</text>
    <text x="45" y="115" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Split keys across trusted parties</text>

    <!-- Card 4: Smart Contracts -->
    <rect x="245" y="75" width="230" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="270" cy="100" r="8" fill="#f59e0b" opacity="0.2"/>
    <text x="270" y="104" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">4</text>
    <text x="290" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Smart Contracts</text>
    <text x="290" y="115" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Auto-transfer after inactivity</text>
  </g>

  <!-- RIGHT SIDE: Visual -->

  <!-- Vault/lock visual -->
  <g transform="translate(680, 60)">
    <!-- Glass panel -->
    <rect x="0" y="0" width="460" height="430" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Lock icon -->
    <g transform="translate(175, 30)">
      <rect x="10" y="50" width="90" height="70" rx="10" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.7"/>
      <path d="M30,50 L30,30 A25,25 0 0 1 80,30 L80,50" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.7"/>
      <circle cx="55" cy="80" r="8" fill="#f59e0b" opacity="0.5"/>
      <line x1="55" y1="88" x2="55" y2="100" stroke="#f59e0b" stroke-width="2.5" opacity="0.5"/>
    </g>

    <!-- Flow diagram: Assets → Plan → Heirs -->
    <g transform="translate(30, 170)">
      <text x="200" y="0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" text-anchor="middle" letter-spacing="1.5">INHERITANCE FLOW</text>

      <!-- Your Assets -->
      <rect x="0" y="20" width="120" height="55" rx="10" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
      <text x="60" y="44" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">YOUR ASSETS</text>
      <text x="60" y="62" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6366f1" text-anchor="middle">BTC ETH SOL</text>

      <!-- Arrow -->
      <line x1="130" y1="47" x2="160" y2="47" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrowhead)"/>

      <!-- Estate Plan -->
      <rect x="165" y="20" width="120" height="55" rx="10" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
      <text x="225" y="44" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">ESTATE PLAN</text>
      <text x="225" y="62" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">PROTECTED</text>

      <!-- Arrow -->
      <line x1="295" y1="47" x2="325" y2="47" stroke="#6e7681" stroke-width="1.5"/>

      <!-- Heirs -->
      <rect x="330" y="20" width="100" height="55" rx="10" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
      <text x="380" y="44" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">YOUR HEIRS</text>
      <text x="380" y="62" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">SECURE</text>
    </g>

    <!-- Warning section -->
    <g transform="translate(30, 280)">
      <rect x="0" y="0" width="400" height="50" rx="10" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
      <text x="20" y="22" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ef4444">WITHOUT A PLAN</text>
      <text x="20" y="40" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">$30B+ permanently inaccessible. Your family gets nothing.</text>
    </g>

    <!-- Checklist items -->
    <g transform="translate(30, 350)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="11" fill="#22c55e">&#x2713;</text>
      <text x="18" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Step-by-step inheritance checklist</text>
      <text x="0" y="22" font-family="system-ui, sans-serif" font-size="11" fill="#22c55e">&#x2713;</text>
      <text x="18" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Tax implications for heirs (step-up basis)</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="11" fill="#22c55e">&#x2713;</text>
      <text x="18" y="44" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Solution comparison: Casa, Inheriti, MPC, smart contracts</text>
    </g>
  </g>

  <!-- Brand bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.4)"/>
  <rect x="0" y="598" width="1200" height="2" fill="url(#brand)"/>
  <text x="60" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="url(#brand)">degen0x</text>
  <text x="135" y="620" font-family="system-ui, sans-serif" font-size="12" fill="#6e7681">degen0x.com/learn/crypto-inheritance-planning</text>
</svg>