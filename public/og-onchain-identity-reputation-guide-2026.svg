<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top gradient accent bar -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Decorative circle top-left -->
  <circle cx="80" cy="120" r="45" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Decorative circle bottom-right -->
  <circle cx="1120" cy="520" r="50" stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- ID card outline -->
  <g opacity="0.25">
    <rect x="950" y="180" width="100" height="70" fill="#8b5cf6" opacity="0.3" rx="4"/>
    <line x1="950" y1="210" x2="1050" y2="210" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="975" cy="195" r="6" fill="#a78bfa"/>
  </g>

  <!-- Fingerprint-like circles -->
  <g opacity="0.2">
    <circle cx="150" cy="350" r="15" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="150" cy="350" r="12" fill="none" stroke="#a78bfa" stroke-width="1"/>
    <circle cx="150" cy="350" r="9" fill="none" stroke="#c4b5fd" stroke-width="1"/>
  </g>

  <!-- Verification checkmark -->
  <g opacity="0.3">
    <circle cx="1000" cy="100" r="20" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <polyline points="995,105 1000,110 1010,95" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Additional identity circles pattern -->
  <g opacity="0.2">
    <circle cx="220" cy="500" r="6" fill="#8b5cf6"/>
    <circle cx="240" cy="510" r="6" fill="#a78bfa"/>
    <circle cx="260" cy="500" r="6" fill="#7c3aed"/>
    <circle cx="240" cy="480" r="6" fill="#c4b5fd"/>
  </g>

  <!-- Badge -->
  <text x="80" y="80" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" opacity="0.9">Identity · Web3</text>

  <!-- Title Line 1 -->
  <text x="80" y="200" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#ffffff">On-Chain Identity &amp;</text>

  <!-- Title Line 2 -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Reputation Guide 2026</text>

  <!-- Subtitle -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">ENS, soulbound tokens, attestations &amp; decentralized identity</text>

  <!-- Branding -->
  <text x="1120" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end" opacity="0.8">degen0x.com</text>

  <!-- Bottom gradient line -->
  <rect y="622" width="1200" height="8" fill="url(#gradAccent)" opacity="0.5"/>
</svg>