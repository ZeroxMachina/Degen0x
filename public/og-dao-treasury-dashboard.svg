<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#080d1c"/>
  <rect y="0" width="1200" height="4" fill="url(#grad1)"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="900" cy="300" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <circle cx="80" cy="60" r="20" fill="#6366f1" opacity="0.8"/>
  <text x="108" y="68" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">degen0x</text>
  <rect x="60" y="180" width="80" height="30" rx="8" fill="#f59e0b" opacity="0.2"/>
  <text x="72" y="200" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">TOOLS</text>
  <text x="60" y="260" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-1">DAO Treasury Dashboard</text>
  <text x="60" y="310" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="22">Track DAO treasuries, token holdings, and spending across protocols</text>
  <!-- Bar chart -->
  <g transform="translate(830, 170)">
    <rect width="310" height="290" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" fill="#8b949e" font-family="Inter, sans-serif" font-size="12">Treasury Value (M)</text>
    <!-- Bars -->
    <rect x="30" y="60" width="40" height="180" rx="4" fill="url(#barGrad)" opacity="0.9"/>
    <text x="36" y="255" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">UNI</text>
    <rect x="85" y="90" width="40" height="150" rx="4" fill="url(#barGrad)" opacity="0.75"/>
    <text x="91" y="255" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">AAVE</text>
    <rect x="140" y="120" width="40" height="120" rx="4" fill="url(#barGrad)" opacity="0.6"/>
    <text x="147" y="255" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">ENS</text>
    <rect x="195" y="140" width="40" height="100" rx="4" fill="url(#barGrad)" opacity="0.5"/>
    <text x="198" y="255" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">COMP</text>
    <rect x="250" y="170" width="40" height="70" rx="4" fill="url(#barGrad)" opacity="0.4"/>
    <text x="258" y="255" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">LDO</text>
    <!-- Total -->
    <text x="20" y="280" fill="#e6edf3" font-family="Inter, sans-serif" font-size="14" font-weight="700">$4.2B Total Tracked</text>
  </g>
  <rect x="0" y="590" width="1200" height="40" fill="rgba(255,255,255,0.02)"/>
  <text x="60" y="616" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="16">degen0x.com</text>
  <text x="1080" y="616" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14">Free Tool</text>
</svg>
