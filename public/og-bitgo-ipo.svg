<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080d1c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#backgroundGradient)"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Logo circle in top-left -->
  <circle cx="60" cy="50" r="35" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.8"/>
  <text x="60" y="60" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#e6edf3" text-anchor="middle">0x</text>

  <!-- Decorative building blocks infrastructure on right -->
  <g opacity="0.14">
    <!-- Bottom row -->
    <rect x="880" y="380" width="50" height="50" fill="none" stroke="#d97706" stroke-width="2"/>
    <rect x="950" y="380" width="50" height="50" fill="none" stroke="#d97706" stroke-width="2"/>
    <rect x="1020" y="380" width="50" height="50" fill="none" stroke="#d97706" stroke-width="2"/>

    <!-- Middle row -->
    <rect x="900" y="310" width="50" height="50" fill="none" stroke="#0891b2" stroke-width="2"/>
    <rect x="970" y="310" width="50" height="50" fill="none" stroke="#0891b2" stroke-width="2"/>

    <!-- Top row -->
    <rect x="935" y="240" width="50" height="50" fill="none" stroke="#4f46e5" stroke-width="2"/>
  </g>

  <!-- IPO chart elements on left -->
  <g opacity="0.15">
    <!-- Upward trend bars -->
    <rect x="130" y="380" width="20" height="40" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <rect x="165" y="350" width="20" height="70" fill="none" stroke="#0891b2" stroke-width="2"/>
    <rect x="200" y="300" width="20" height="120" fill="none" stroke="#d97706" stroke-width="2"/>
    <rect x="235" y="250" width="20" height="170" fill="none" stroke="#4f46e5" stroke-width="2"/>

    <!-- Trend line -->
    <polyline points="140,380 175,350 210,300 245,250" fill="none" stroke="#b1a9ff" stroke-width="2"/>
  </g>

  <!-- Glass-morphism card background -->
  <rect x="80" y="100" width="1040" height="500" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" rx="16" opacity="0.8"/>

  <!-- Main title -->
  <text x="600" y="200" font-family="Inter, sans-serif" font-size="56" font-weight="bold" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">BitGo IPO & Crypto</text>
  <text x="600" y="260" font-family="Inter, sans-serif" font-size="56" font-weight="bold" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">Infrastructure</text>

  <!-- Accent line under title -->
  <rect x="200" y="280" width="800" height="2" fill="url(#accentGradient)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="Inter, sans-serif" font-size="26" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">What BitGo's Public Offering Means for the Industry</text>

  <!-- Key metrics boxes -->
  <g opacity="0.65">
    <!-- Left metric -->
    <rect x="170" y="410" width="220" height="60" fill="rgba(79, 70, 229, 0.08)" stroke="rgba(79, 70, 229, 0.3)" stroke-width="1" rx="8"/>
    <text x="280" y="430" font-family="Inter, sans-serif" font-size="13" fill="#6e7681" text-anchor="middle">Institutional Adoption</text>
    <text x="280" y="455" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#b1a9ff" text-anchor="middle">Accelerating</text>

    <!-- Center metric -->
    <rect x="440" y="410" width="220" height="60" fill="rgba(8, 145, 178, 0.08)" stroke="rgba(8, 145, 178, 0.3)" stroke-width="1" rx="8"/>
    <text x="550" y="430" font-family="Inter, sans-serif" font-size="13" fill="#6e7681" text-anchor="middle">Infrastructure Value</text>
    <text x="550" y="455" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#76e4f7" text-anchor="middle">Rising</text>

    <!-- Right metric -->
    <rect x="710" y="410" width="220" height="60" fill="rgba(217, 119, 6, 0.08)" stroke="rgba(217, 119, 6, 0.3)" stroke-width="1" rx="8"/>
    <text x="820" y="430" font-family="Inter, sans-serif" font-size="13" fill="#6e7681" text-anchor="middle">Market Maturation</text>
    <text x="820" y="455" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#fcd34d" text-anchor="middle">Expanding</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Footer text -->
  <text x="600" y="615" font-family="Inter, sans-serif" font-size="16" fill="#6e7681" text-anchor="middle">degen0x.com</text>
</svg>