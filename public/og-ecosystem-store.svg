<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow1" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Ambient glow circles -->
  <circle cx="300" cy="250" r="300" fill="#6366f1" opacity="0.06"/>
  <circle cx="900" cy="400" r="250" fill="#06b6d4" opacity="0.05"/>
  <circle cx="600" cy="100" r="200" fill="#f59e0b" opacity="0.03"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.02" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo area -->
  <circle cx="100" cy="72" r="18" fill="#6366f1" opacity="0.15"/>
  <text x="100" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" fill="#818cf8" text-anchor="middle">0x</text>
  <text x="130" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="140" width="120" height="30" rx="15" fill="#6366f120" stroke="#6366f150" stroke-width="1"/>
  <text x="140" y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="0.05em">ECOSYSTEM</text>

  <!-- Title -->
  <text x="80" y="230" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-0.03em">dApp Ecosystem</text>
  <text x="80" y="295" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="url(#accent)" letter-spacing="-0.03em">Directory</text>

  <!-- Subtitle -->
  <text x="80" y="345" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">
    176+ dApps · All chains · DeFi, NFTs, Gaming &amp; more
  </text>

  <!-- Decorative dApp cards -->
  <!-- Card 1 -->
  <rect x="700" y="130" width="180" height="80" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <circle cx="740" cy="170" r="16" fill="#627eea" opacity="0.8"/>
  <text x="740" y="176" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">Ξ</text>
  <text x="770" y="164" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Uniswap</text>
  <text x="770" y="182" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">DEX · $5.2B TVL</text>

  <!-- Card 2 -->
  <rect x="720" y="230" width="180" height="80" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <circle cx="760" cy="270" r="16" fill="#B6509E" opacity="0.8"/>
  <text x="760" y="276" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">A</text>
  <text x="790" y="264" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Aave</text>
  <text x="790" y="282" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Lending · $12.1B TVL</text>

  <!-- Card 3 -->
  <rect x="740" y="330" width="180" height="80" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <circle cx="780" cy="370" r="16" fill="#14F195" opacity="0.6"/>
  <text x="780" y="376" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#080d1c" text-anchor="middle" font-weight="700">J</text>
  <text x="810" y="364" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Jupiter</text>
  <text x="810" y="382" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">DEX Agg · Solana</text>

  <!-- Card 4 -->
  <rect x="950" y="180" width="180" height="80" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <circle cx="990" cy="220" r="16" fill="#FF0420" opacity="0.7"/>
  <text x="990" y="226" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">O</text>
  <text x="1020" y="214" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Optimism</text>
  <text x="1020" y="232" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">L2 · $800M TVL</text>

  <!-- Card 5 -->
  <rect x="970" y="280" width="180" height="80" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <circle cx="1010" cy="320" r="16" fill="#2775CA" opacity="0.8"/>
  <text x="1010" y="326" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">L</text>
  <text x="1040" y="314" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Lido</text>
  <text x="1040" y="332" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Staking · $14.8B TVL</text>

  <!-- Chain indicators -->
  <g transform="translate(80, 400)">
    <rect width="90" height="32" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.06"/>
    <text x="45" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">⟠ Ethereum</text>
  </g>
  <g transform="translate(185, 400)">
    <rect width="80" height="32" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.06"/>
    <text x="40" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">◎ Solana</text>
  </g>
  <g transform="translate(280, 400)">
    <rect width="85" height="32" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.06"/>
    <text x="42" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">🔵 Base</text>
  </g>
  <g transform="translate(380, 400)">
    <rect width="95" height="32" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.06"/>
    <text x="47" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">🔴 Arbitrum</text>
  </g>
  <g transform="translate(490, 400)">
    <rect width="70" height="32" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.06"/>
    <text x="35" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">+ more</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="white" fill-opacity="0.02"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="white" stroke-opacity="0.06"/>
  <text x="80" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1120" y="612" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Free · No signup · Open source</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>