<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="200" r="200" fill="url(#glowGrad)" opacity="0.4"/>
  <circle cx="200" cy="500" r="150" fill="#0891b2" opacity="0.05"/>

  <!-- Agent network decoration -->
  <g opacity="0.12" stroke="#6366f1" stroke-width="1">
    <circle cx="850" cy="180" r="40" fill="none"/>
    <circle cx="980" cy="250" r="30" fill="none"/>
    <circle cx="900" cy="340" r="35" fill="none"/>
    <circle cx="1050" cy="160" r="25" fill="none"/>
    <circle cx="1070" cy="320" r="28" fill="none"/>
    <line x1="850" y1="180" x2="980" y2="250"/>
    <line x1="980" y1="250" x2="900" y2="340"/>
    <line x1="850" y1="180" x2="1050" y2="160"/>
    <line x1="1050" y1="160" x2="1070" y2="320"/>
    <line x1="980" y1="250" x2="1070" y2="320"/>
    <line x1="900" y1="340" x2="1070" y2="320"/>
  </g>

  <!-- Small agent dots -->
  <g fill="#6366f1" opacity="0.3">
    <circle cx="850" cy="180" r="6"/>
    <circle cx="980" cy="250" r="5"/>
    <circle cx="900" cy="340" r="5.5"/>
    <circle cx="1050" cy="160" r="4"/>
    <circle cx="1070" cy="320" r="4.5"/>
  </g>

  <!-- Logo area -->
  <g transform="translate(60, 50)">
    <circle cx="18" cy="18" r="18" fill="url(#iconGrad)" filter="url(#glow)"/>
    <text x="18" y="24" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="white" text-anchor="middle">0x</text>
  </g>
  <text x="105" y="70" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3" letter-spacing="-0.02em">degen0x</text>

  <!-- Category badge -->
  <g transform="translate(60, 120)">
    <rect width="80" height="28" rx="14" fill="#6366f1" opacity="0.15"/>
    <rect width="80" height="28" rx="14" fill="none" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="40" y="19" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle" letter-spacing="0.05em">LEARN</text>
  </g>

  <!-- Title -->
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.03em">ERC-8183 Guide</text>
  <text x="60" y="275" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="700" fill="#8b949e" letter-spacing="-0.02em">Agentic Commerce</text>
  <text x="60" y="330" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="700" fill="#8b949e" letter-spacing="-0.02em">Standard</text>

  <!-- Subtitle -->
  <text x="60" y="390" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#6e7681">Trustless AI-to-AI transactions with escrow</text>
  <text x="60" y="420" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#6e7681">and automated delivery verification</text>

  <!-- Job lifecycle mini-diagram -->
  <g transform="translate(60, 460)" opacity="0.6">
    <rect x="0" y="0" width="90" height="32" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="45" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">OPEN</text>

    <text x="105" y="21" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">→</text>

    <rect x="120" y="0" width="90" height="32" rx="8" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="165" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle">FUNDED</text>

    <text x="225" y="21" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">→</text>

    <rect x="240" y="0" width="100" height="32" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="290" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">SUBMITTED</text>

    <text x="355" y="21" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">→</text>

    <rect x="370" y="0" width="100" height="32" rx="8" fill="#0891b2" opacity="0.15" stroke="#0891b2" stroke-opacity="0.3" stroke-width="1"/>
    <text x="420" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4" text-anchor="middle">TERMINAL</text>
  </g>

  <!-- Bottom bar -->
  <rect y="606" width="1200" height="24" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="622" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="622" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">2026</text>
</svg>