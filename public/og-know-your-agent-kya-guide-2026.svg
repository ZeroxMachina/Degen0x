<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glowing circles -->
  <circle cx="950" cy="150" r="120" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="80" fill="#06b6d4" opacity="0.05" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="100" fill="#d97706" opacity="0.04" filter="url(#glow)"/>

  <!-- Decorative network diagram (agent identity visualization) -->
  <!-- Central node -->
  <circle cx="950" cy="300" r="40" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="2" opacity="0.7"/>
  <text x="950" y="305" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="14" font-weight="600">AI Agent</text>

  <!-- Connected nodes -->
  <line x1="950" y1="260" x2="890" y2="190" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <circle cx="890" cy="180" r="22" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <text x="890" y="184" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Identity</text>

  <line x1="990" y1="290" x2="1060" y2="250" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <circle cx="1070" cy="240" r="22" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.5"/>
  <text x="1070" y="244" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Audit</text>

  <line x1="950" y1="340" x2="1020" y2="400" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <circle cx="1030" cy="410" r="22" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <text x="1030" y="414" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Wallet</text>

  <line x1="910" y1="310" x2="840" y2="360" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <circle cx="830" cy="370" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <text x="830" y="374" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">DAP</text>

  <!-- Logo area -->
  <text x="60" y="60" fill="#8b949e" font-family="system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="0.5">degen0x</text>

  <!-- Category badge -->
  <rect x="60" y="140" width="80" height="26" rx="13" fill="#6366f1"/>
  <text x="100" y="157" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">AI &amp; DeFi</text>

  <!-- Title -->
  <text x="60" y="220" fill="url(#titleGrad)" font-family="system-ui, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Know Your Agent</text>
  <text x="60" y="275" fill="url(#titleGrad)" font-family="system-ui, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">(KYA)</text>

  <!-- Subtitle -->
  <text x="60" y="330" fill="#8b949e" font-family="system-ui, sans-serif" font-size="20">AI Agent Identity &amp; Verification on Chain</text>

  <!-- Key terms -->
  <text x="60" y="390" fill="#6e7681" font-family="system-ui, sans-serif" font-size="14">Digital Agent Passports · Soulbound Tokens · Agent Wallets · KYA vs KYC</text>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" fill="#6e7681" font-family="system-ui, sans-serif" font-size="13">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="system-ui, sans-serif" font-size="13">2026 Guide</text>
</svg>
