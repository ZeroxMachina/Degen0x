<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e6ed;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="150" cy="100" r="80" fill="#4f46e5" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1050" cy="500" r="120" fill="#0891b2" opacity="0.06" filter="url(#glow)"/>
  <circle cx="900" cy="120" r="60" fill="#d97706" opacity="0.07" filter="url(#glow)"/>

  <!-- Category badge -->
  <rect x="60" y="60" width="220" height="40" rx="20" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="2"/>
  <text x="170" y="87" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#06b6d4" text-anchor="middle">MARKET DATA</text>

  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="url(#titleGradient)">Daily Market Recap</text>

  <!-- Subtitle -->
  <text x="60" y="210" font-family="system-ui, sans-serif" font-size="20" fill="#8b949e">Top gainers, losers &amp; market events — updated live</text>

  <!-- Visualization: Bar chart with top gainers/losers -->
  <g>
    <!-- Chart background -->
    <rect x="750" y="80" width="400" height="400" rx="12" fill="#0a1427" opacity="0.5" stroke="#1e293b" stroke-width="1"/>

    <!-- Green bars (gainers) -->
    <rect x="780" y="320" width="35" height="120" rx="4" fill="#22c55e" opacity="0.9"/>
    <text x="797" y="450" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">+28%</text>

    <rect x="830" y="240" width="35" height="200" rx="4" fill="#16a34a" opacity="0.8"/>
    <text x="847" y="450" font-family="system-ui, sans-serif" font-size="12" fill="#16a34a" text-anchor="middle">+42%</text>

    <rect x="880" y="280" width="35" height="160" rx="4" fill="#22c55e" opacity="0.85"/>
    <text x="897" y="450" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">+35%</text>

    <!-- Red bars (losers) -->
    <rect x="930" y="240" width="35" height="200" rx="4" fill="#ef4444" opacity="0.85"/>
    <text x="947" y="450" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">-42%</text>

    <rect x="980" y="300" width="35" height="140" rx="4" fill="#dc2626" opacity="0.9"/>
    <text x="997" y="450" font-family="system-ui, sans-serif" font-size="12" fill="#dc2626" text-anchor="middle">-25%</text>

    <rect x="1030" y="360" width="35" height="80" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="1047" y="450" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">-12%</text>

    <!-- Grid lines -->
    <line x1="770" y1="440" x2="1070" y2="440" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
    <line x1="770" y1="380" x2="1070" y2="380" stroke="#1e293b" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0a1427" opacity="0.6"/>
  <circle cx="60" cy="615" r="10" fill="#6366f1"/>
  <text x="75" y="621" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">degen0x.com</text>

  <!-- Decorative accent elements -->
  <circle cx="1180" cy="615" r="8" fill="#06b6d4" opacity="0.3"/>
  <circle cx="1150" cy="615" r="6" fill="#4f46e5" opacity="0.25"/>
</svg>
