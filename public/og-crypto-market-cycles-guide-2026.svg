<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="accentBar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cycleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="33%" stop-color="#58a6ff"/>
      <stop offset="66%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentBar2)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="150" r="180" fill="#6366f1" opacity="0.03"/>
  <circle cx="1050" cy="400" r="200" fill="#06b6d4" opacity="0.03"/>
  <circle cx="150" cy="550" r="100" fill="#d97706" opacity="0.03"/>

  <!-- Cycle visualization - sine wave representing market cycles -->
  <g transform="translate(650, 120)">
    <!-- Axis -->
    <line x1="0" y1="200" x2="480" y2="200" stroke="#30363d" stroke-width="1"/>

    <!-- Cycle curve -->
    <path d="M0 200 C40 200 60 80 120 60 C180 40 200 120 240 200 C280 280 300 340 360 340 C420 340 440 200 480 200"
          fill="none" stroke="url(#cycleGrad)" stroke-width="3" opacity="0.8"/>

    <!-- Area under curve -->
    <path d="M0 200 C40 200 60 80 120 60 C180 40 200 120 240 200 C280 280 300 340 360 340 C420 340 440 200 480 200 L480 400 L0 400 Z"
          fill="url(#areaFill)" opacity="0.15"/>

    <!-- Phase labels -->
    <text x="30" y="240" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e" font-weight="600">Accumulation</text>
    <text x="155" y="40" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#58a6ff" font-weight="600">Bull Run</text>
    <text x="270" y="240" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d29922" font-weight="600">Distribution</text>
    <text x="375" y="370" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ef4444" font-weight="600">Bear Market</text>

    <!-- Phase dots -->
    <circle cx="60" cy="200" r="5" fill="#22c55e"/>
    <circle cx="160" cy="60" r="5" fill="#58a6ff"/>
    <circle cx="300" cy="300" r="5" fill="#d29922"/>
    <circle cx="400" cy="340" r="5" fill="#ef4444"/>
  </g>

  <!-- degen0x logo text -->
  <text x="80" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="0.05em">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="100" width="100" height="30" rx="15" fill="#6366f120" stroke="#6366f160" stroke-width="1"/>
  <text x="130" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#6366f1" text-anchor="middle">TRADING</text>

  <!-- Title -->
  <text x="80" y="195" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Crypto Market Cycles</text>
  <text x="80" y="255" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="80" y="305" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#8b949e">Bull runs, bear markets, halving cycles &amp; on-chain indicators</text>

  <!-- Stats row -->
  <g transform="translate(80, 350)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="180" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="18" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">BTC ATH (OCT 2025)</text>
    <text x="18" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#22c55e" font-weight="800">$126,296</text>

    <!-- Stat 2 -->
    <rect x="200" y="0" width="180" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="218" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">DRAWDOWN FEB 2026</text>
    <text x="218" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ef4444" font-weight="800">-46.7%</text>

    <!-- Stat 3 -->
    <rect x="400" y="0" width="180" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="418" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">NEXT HALVING</text>
    <text x="418" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#d29922" font-weight="800">2028</text>
  </g>

  <!-- Phase indicator boxes -->
  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="120" height="36" rx="8" fill="#22c55e15" stroke="#22c55e40" stroke-width="1"/>
    <text x="60" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#22c55e" font-weight="700" text-anchor="middle">Accumulation</text>

    <rect x="135" y="0" width="100" height="36" rx="8" fill="#58a6ff15" stroke="#58a6ff40" stroke-width="1"/>
    <text x="185" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#58a6ff" font-weight="700" text-anchor="middle">Bull Run</text>

    <rect x="250" y="0" width="110" height="36" rx="8" fill="#d2992215" stroke="#d2992240" stroke-width="1"/>
    <text x="305" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#d29922" font-weight="700" text-anchor="middle">Distribution</text>

    <rect x="375" y="0" width="115" height="36" rx="8" fill="#ef444415" stroke="#ef444440" stroke-width="1"/>
    <text x="432" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ef4444" font-weight="700" text-anchor="middle">Bear Market</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="612" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681" font-weight="600">degen0x.com</text>
  <text x="1120" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>