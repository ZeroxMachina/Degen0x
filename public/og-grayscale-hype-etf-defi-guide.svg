<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trendGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Logo circle top-left -->
  <circle cx="60" cy="60" r="35" fill="#1a1f3a" stroke="url(#accentGradient)" stroke-width="2" opacity="0.8"/>
  <text x="60" y="70" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#e6edf3" text-anchor="middle" dominant-baseline="middle">0x</text>

  <!-- Upward trend chart - right side -->
  <g opacity="0.4">
    <!-- Chart background -->
    <rect x="920" y="80" width="240" height="200" fill="#1a1f3a" rx="12"/>

    <!-- Grid lines -->
    <line x1="920" y1="130" x2="1160" y2="130" stroke="#0891b2" stroke-width="0.5" opacity="0.3"/>
    <line x1="920" y1="160" x2="1160" y2="160" stroke="#0891b2" stroke-width="0.5" opacity="0.3"/>
    <line x1="920" y1="190" x2="1160" y2="190" stroke="#0891b2" stroke-width="0.5" opacity="0.3"/>

    <!-- Trend line -->
    <polyline points="940,220 980,180 1020,160 1060,140 1100,100 1140,80"
              fill="none" stroke="#0891b2" stroke-width="3" stroke-linecap="round"/>

    <!-- Area fill under trend -->
    <polygon points="940,220 980,180 1020,160 1060,140 1100,100 1140,80 1140,250 1100,250 1060,250 1020,250 980,250 940,250"
             fill="url(#trendGradient)"/>
  </g>

  <!-- ETF symbol elements -->
  <g opacity="0.5">
    <circle cx="1080" cy="380" r="28" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <text x="1080" y="388" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#4f46e5" text-anchor="middle">ETF</text>
  </g>

  <!-- Institutional badge -->
  <g opacity="0.5">
    <rect x="1030" y="450" width="100" height="50" fill="#1a1f3a" stroke="#d97706" stroke-width="1.5" rx="8"/>
    <text x="1080" y="475" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#d97706" text-anchor="middle">Institutional</text>
  </g>

  <!-- Left side - hyperliquid nodes -->
  <g opacity="0.4">
    <circle cx="60" cy="280" r="18" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <text x="60" y="288" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#4f46e5" text-anchor="middle">H</text>
  </g>

  <g opacity="0.4">
    <circle cx="60" cy="380" r="18" fill="none" stroke="#0891b2" stroke-width="2"/>
    <text x="60" y="388" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#0891b2" text-anchor="middle">Y</text>
  </g>

  <g opacity="0.4">
    <circle cx="60" cy="480" r="18" fill="none" stroke="#d97706" stroke-width="2"/>
    <text x="60" y="488" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#d97706" text-anchor="middle">P</text>
  </g>

  <!-- Connection lines -->
  <line x1="80" y1="280" x2="100" y2="280" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="380" x2="100" y2="380" stroke="#0891b2" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="480" x2="100" y2="480" stroke="#d97706" stroke-width="1" opacity="0.3"/>

  <!-- Glass-morphism card -->
  <rect x="120" y="100" width="1000" height="380" fill="#ffffff" opacity="0.03" rx="16"/>
  <rect x="120" y="100" width="1000" height="380" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.3" rx="16"/>

  <!-- Main title -->
  <text x="600" y="200" font-family="Inter, sans-serif" font-size="52" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="-0.5">Grayscale HYPE ETF & DeFi</text>

  <!-- Subtitle -->
  <text x="600" y="300" font-family="Inter, sans-serif" font-size="28" font-weight="400" fill="#8b949e" text-anchor="middle">Understanding Hyperliquid's Institutional Moment</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Footer text -->
  <text x="1140" y="610" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#8b949e" text-anchor="end">degen0x.com</text>

  <!-- Decorative accent elements bottom -->
  <rect x="200" y="520" width="3" height="60" fill="#4f46e5" opacity="0.4" rx="2"/>
  <rect x="250" y="500" width="3" height="80" fill="#0891b2" opacity="0.4" rx="2"/>
  <rect x="300" y="510" width="3" height="70" fill="#d97706" opacity="0.4" rx="2"/>
  <rect x="350" y="480" width="3" height="100" fill="#4f46e5" opacity="0.4" rx="2"/>
</svg>