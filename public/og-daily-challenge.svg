<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Decorative gradient shapes -->
  <ellipse cx="100" cy="100" rx="200" ry="200" fill="url(#accentGrad)" opacity="0.08"/>
  <ellipse cx="1100" cy="530" rx="250" ry="200" fill="url(#accentGrad)" opacity="0.06"/>

  <!-- Glass-morphism panel background -->
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" backdrop-filter="blur(10px)" stroke="url(#accentGrad)" stroke-width="1" opacity-stroke="0.2"/>

  <!-- Lightning bolt icon (left side) -->
  <g transform="translate(150, 180)">
    <path d="M 30 0 L 10 40 L 25 40 L 0 90 L 40 45 L 20 45 L 45 0 Z" fill="url(#accentGrad)" filter="url(#glow)"/>
  </g>

  <!-- Trophy icon (right side) -->
  <g transform="translate(1020, 180)">
    <ellipse cx="30" cy="15" rx="25" ry="20" fill="url(#accentGrad)" filter="url(#glow)"/>
    <rect x="15" y="35" width="30" height="40" rx="3" fill="url(#accentGrad)"/>
    <rect x="8" y="75" width="44" height="8" rx="2" fill="url(#accentGrad)"/>
    <rect x="25" y="83" width="10" height="15" rx="2" fill="url(#accentGrad)"/>
  </g>

  <!-- Crypto symbols scattered -->
  <g opacity="0.15">
    <!-- Bitcoin symbol -->
    <circle cx="250" cy="520" r="20" stroke="url(#accentGrad)" stroke-width="2" fill="none"/>
    <text x="250" y="530" font-size="24" font-weight="bold" fill="url(#accentGrad)" text-anchor="middle">₿</text>

    <!-- Ethereum symbol -->
    <circle cx="950" cy="520" r="20" stroke="url(#accentGrad)" stroke-width="2" fill="none"/>
    <text x="950" y="533" font-size="24" font-weight="bold" fill="url(#accentGrad)" text-anchor="middle">Ξ</text>
  </g>

  <!-- Main title -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    Daily Crypto Challenge
  </text>

  <!-- Subtitle -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" fill="#8b949e" text-anchor="middle">
    Test your knowledge. Earn XP. Level up.
  </text>

  <!-- degen0x.com text -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle" opacity="0.8">
    degen0x.com
  </text>

  <!-- Accent line under title -->
  <line x1="300" y1="350" x2="900" y2="350" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
</svg>