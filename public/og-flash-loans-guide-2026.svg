<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="flashGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="157" x2="1200" y2="157" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="white" stroke-width="1"/>
  </g>

  <!-- Flash bolt visualization (right side) -->
  <g transform="translate(820, 120)">
    <!-- Lightning bolt -->
    <path d="M120 0 L60 180 L130 180 L30 380 L180 140 L110 140 L200 0 Z" fill="url(#flashGrad)" opacity="0.15"/>
    <path d="M120 0 L60 180 L130 180 L30 380 L180 140 L110 140 L200 0 Z" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>

    <!-- Circular flow arrows -->
    <circle cx="140" cy="190" r="100" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.2" stroke-dasharray="8 4"/>
    <circle cx="140" cy="190" r="140" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.15" stroke-dasharray="6 6"/>
  </g>

  <!-- Transaction flow diagram (right side, lower) -->
  <g transform="translate(800, 370)">
    <!-- Flow: Borrow → Execute → Repay -->
    <rect x="0" y="0" width="90" height="36" rx="8" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1"/>
    <text x="45" y="23" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle">Borrow</text>

    <line x1="95" y1="18" x2="125" y2="18" stroke="url(#arrowGrad)" stroke-width="2" marker-end="none"/>
    <polygon points="122,14 130,18 122,22" fill="#06b6d4"/>

    <rect x="133" y="0" width="90" height="36" rx="8" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1"/>
    <text x="178" y="23" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#67e8f9" text-anchor="middle">Execute</text>

    <line x1="228" y1="18" x2="258" y2="18" stroke="url(#arrowGrad)" stroke-width="2"/>
    <polygon points="255,14 263,18 255,22" fill="#22c55e"/>

    <rect x="266" y="0" width="90" height="36" rx="8" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
    <text x="311" y="23" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#4ade80" text-anchor="middle">Repay</text>

    <!-- "1 Block" label -->
    <rect x="100" y="50" width="160" height="28" rx="14" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <text x="180" y="69" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">All in 1 Block</text>
  </g>

  <!-- Stats pills -->
  <g transform="translate(800, 470)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="55" y="21" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#818cf8" text-anchor="middle">$30B+ Aave</text>

    <rect x="120" y="0" width="110" height="32" rx="16" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
    <text x="175" y="21" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#67e8f9" text-anchor="middle">0.05% Fee</text>

    <rect x="240" y="0" width="120" height="32" rx="16" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
    <text x="300" y="21" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">0 Collateral</text>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.9"/>
    <text x="16" y="21" font-family="Inter, monospace" font-size="13" font-weight="800" fill="white" text-anchor="middle">0x</text>
    <text x="42" y="22" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#8b949e">degen0x</text>
  </g>

  <!-- Category badge -->
  <rect x="60" y="120" width="50" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1"/>
  <text x="85" y="137" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#818cf8" text-anchor="middle">DeFi</text>

  <!-- Title -->
  <text x="60" y="210" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">Flash Loans</text>
  <text x="60" y="270" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="320" font-family="Inter, sans-serif" font-size="18" fill="#8b949e">Borrow millions with zero collateral —</text>
  <text x="60" y="348" font-family="Inter, sans-serif" font-size="18" fill="#8b949e">repaid in one atomic transaction</text>

  <!-- Tags -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="60" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="30" y="17" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Aave</text>

    <rect x="68" y="0" width="60" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="98" y="17" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">dYdX</text>

    <rect x="136" y="0" width="75" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="174" y="17" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Uniswap</text>

    <rect x="219" y="0" width="75" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="257" y="17" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Balancer</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="606" width="1200" height="24" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="622" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="622" font-family="Inter, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>