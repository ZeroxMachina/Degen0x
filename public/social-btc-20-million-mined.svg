<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="supplyBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="95.2%" stop-color="#f59e0b"/>
      <stop offset="95.2%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Ambient glow -->
  <circle cx="900" cy="300" r="250" fill="#f59e0b" opacity="0.03" filter="url(#softGlow2)"/>
  <circle cx="300" cy="400" r="200" fill="#6366f1" opacity="0.03" filter="url(#softGlow2)"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- HISTORIC MILESTONE badge -->
  <rect x="60" y="45" width="210" height="32" rx="16" fill="#f59e0b" opacity="0.15"/>
  <circle cx="80" cy="61" r="5" fill="#f59e0b">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="95" y="67" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" letter-spacing="0.08em">HISTORIC MILESTONE</text>

  <!-- degen0x -->
  <text x="1090" y="67" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e" text-anchor="end" opacity="0.7">degen0x.com</text>

  <!-- Main title -->
  <text x="60" y="148" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">20 Million Bitcoin Mined</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#f59e0b" letter-spacing="-0.02em">Only ~1 Million Left. Ever.</text>

  <!-- Subtitle -->
  <text x="60" y="245" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">95.2% of all Bitcoin that will ever exist is now in circulation. The remaining supply will take until ~2140.</text>

  <!-- Supply bar visualization -->
  <text x="60" y="295" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.06em">TOTAL SUPPLY: 21,000,000 BTC</text>

  <!-- Bar background -->
  <rect x="60" y="310" width="1080" height="40" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Mined portion (95.2%) -->
  <rect x="62" y="312" width="1024" height="36" rx="18" fill="#f59e0b" opacity="0.8"/>
  <!-- Remaining portion (4.8%) -->
  <rect x="1086" y="312" width="52" height="36" rx="18" fill="#22c55e" opacity="0.6"/>

  <!-- Bar labels -->
  <text x="550" y="336" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#080d1c" text-anchor="middle">20,000,000 BTC Mined (95.2%)</text>
  <text x="1088" y="380" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="start">~1M left</text>

  <!-- Stats cards row -->
  <!-- Card 1: BTC Price -->
  <rect x="60" y="405" width="200" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="435" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.06em">BTC PRICE</text>
  <text x="85" y="472" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">$72,794</text>
  <text x="85" y="497" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">+2.54% today</text>

  <!-- Card 2: ETF Holdings -->
  <rect x="285" y="405" width="200" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="310" y="435" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.06em">ETF HOLDINGS</text>
  <text x="310" y="472" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4">$88B</text>
  <text x="310" y="497" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">6% of total supply</text>

  <!-- Card 3: Weekly Inflows -->
  <rect x="510" y="405" width="200" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="535" y="435" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.06em">WEEKLY INFLOWS</text>
  <text x="535" y="472" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">$1.06B</text>
  <text x="535" y="497" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">3rd straight week</text>

  <!-- Card 4: Strategy Holdings -->
  <rect x="735" y="405" width="200" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="760" y="435" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.06em">STRATEGY HOLDS</text>
  <text x="760" y="472" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#8b5cf6">720,737</text>
  <text x="760" y="497" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">BTC accumulated</text>

  <!-- Card 5: Fear & Greed -->
  <rect x="960" y="405" width="175" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="985" y="435" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.06em">FEAR &amp; GREED</text>
  <text x="985" y="472" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#ef4444">23</text>
  <text x="985" y="497" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">Extreme Fear</text>

  <!-- Bottom tagline -->
  <text x="60" y="560" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">Supply shrinking. Demand growing. Institutions accumulating.</text>

  <!-- CTA -->
  <rect x="60" y="575" width="260" height="38" rx="19" fill="url(#goldGrad)" opacity="0.9"/>
  <text x="190" y="600" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#080d1c" text-anchor="middle">Run DCA Scenarios →</text>

  <text x="340" y="600" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">degen0x.com/tools/dca-calculator</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent2)"/>
</svg>