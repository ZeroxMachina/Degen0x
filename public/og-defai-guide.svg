<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0d1225"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <!-- Top accent bar gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Glow circle 1 -->
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow circle 2 -->
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow circle 3 -->
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Agent node glow -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="200" r="250" fill="url(#glow1)"/>
  <circle cx="200" cy="500" r="200" fill="url(#glow2)"/>
  <circle cx="1050" cy="480" r="180" fill="url(#glow3)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- degen0x logo text (top left) -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#818cf8" letter-spacing="-0.5">degen0x</text>
  <text x="148" y="60" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e">.com</text>

  <!-- Category badge -->
  <rect x="60" y="100" width="100" height="28" rx="14" fill="#8b5cf620" stroke="#8b5cf640" stroke-width="1"/>
  <text x="110" y="119" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b5cf6" text-anchor="middle">AI &amp; DeFi</text>

  <rect x="172" y="100" width="120" height="28" rx="14" fill="#3b82f620" stroke="#3b82f640" stroke-width="1"/>
  <text x="232" y="119" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3b82f6" text-anchor="middle">Intermediate</text>

  <!-- Title -->
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="url(#titleGrad)" letter-spacing="-1.5">DeFAI Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="245" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#e6edf3" letter-spacing="-0.5">How AI Agents Are Taking Over</text>
  <text x="60" y="280" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#e6edf3" letter-spacing="-0.5">Decentralized Finance</text>

  <!-- Description -->
  <text x="60" y="330" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">Autonomous agents managing $2B+ TVL. Almanak, ElizaOS, Virtuals, and more.</text>

  <!-- Stats cards row -->
  <!-- Card 1: TVL Managed -->
  <rect x="60" y="375" width="180" height="80" rx="12" fill="#ffffff08" stroke="#ffffff10" stroke-width="1"/>
  <text x="80" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-transform="uppercase">TVL Managed</text>
  <text x="80" y="435" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">$2B+</text>

  <!-- Card 2: AI Agent Mkt Cap -->
  <rect x="260" y="375" width="180" height="80" rx="12" fill="#ffffff08" stroke="#ffffff10" stroke-width="1"/>
  <text x="280" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-transform="uppercase">Sector Mkt Cap</text>
  <text x="280" y="435" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#8b5cf6">$18B+</text>

  <!-- Card 3: Protocols -->
  <rect x="460" y="375" width="180" height="80" rx="12" fill="#ffffff08" stroke="#ffffff10" stroke-width="1"/>
  <text x="480" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-transform="uppercase">DeFAI Protocols</text>
  <text x="480" y="435" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4">150+</text>

  <!-- Agent illustration (right side) -->
  <!-- Perceive node -->
  <circle cx="880" cy="180" r="35" fill="#3b82f615" stroke="#3b82f650" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <text x="880" y="175" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#ffffff">&#x1F441;&#xFE0F;</text>
  <text x="880" y="200" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3b82f6">PERCEIVE</text>

  <!-- Reason node -->
  <circle cx="1040" cy="280" r="35" fill="#8b5cf615" stroke="#8b5cf650" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <text x="1040" y="275" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#ffffff">&#x1F9E0;</text>
  <text x="1040" y="300" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#8b5cf6">REASON</text>

  <!-- Act node -->
  <circle cx="880" cy="380" r="35" fill="#22c55e15" stroke="#22c55e50" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <text x="880" y="375" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#ffffff">&#x26A1;</text>
  <text x="880" y="400" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#22c55e">ACT</text>

  <!-- Connecting lines between nodes -->
  <line x1="910" y1="200" x2="1010" y2="262" stroke="#3b82f640" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="1010" y1="298" x2="910" y2="362" stroke="#8b5cf640" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="880" y1="345" x2="880" y2="215" stroke="#22c55e30" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Circular arrow hint -->
  <text x="950" y="290" font-family="Inter, system-ui, sans-serif" font-size="18" text-anchor="middle" fill="#ffffff20">&#x1F504;</text>

  <!-- Protocol name pills (decorative, right side bottom) -->
  <rect x="780" y="460" width="90" height="26" rx="13" fill="#8b5cf620" stroke="#8b5cf640" stroke-width="1"/>
  <text x="825" y="478" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" text-anchor="middle">Almanak</text>

  <rect x="880" y="460" width="80" height="26" rx="13" fill="#f59e0b20" stroke="#f59e0b40" stroke-width="1"/>
  <text x="920" y="478" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f59e0b" text-anchor="middle">Virtuals</text>

  <rect x="970" y="460" width="80" height="26" rx="13" fill="#3b82f620" stroke="#3b82f640" stroke-width="1"/>
  <text x="1010" y="478" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">ElizaOS</text>

  <rect x="1060" y="460" width="80" height="26" rx="13" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
  <text x="1100" y="478" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#22c55e" text-anchor="middle">Fetch.ai</text>

  <rect x="810" y="496" width="90" height="26" rx="13" fill="#ec489920" stroke="#ec489940" stroke-width="1"/>
  <text x="855" y="514" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ec4899" text-anchor="middle">Autonolas</text>

  <rect x="910" y="496" width="70" height="26" rx="13" fill="#a855f720" stroke="#a855f740" stroke-width="1"/>
  <text x="945" y="514" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#a855f7" text-anchor="middle">Beep</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#00000040"/>
  <rect x="0" y="580" width="1200" height="1" fill="#ffffff08"/>
  <text x="60" y="610" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#818cf8">degen0x.com</text>
  <text x="200" y="610" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Free crypto tools, guides &amp; research</text>
  <text x="1140" y="610" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>