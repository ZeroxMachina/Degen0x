<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ethGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="nodeGrad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Background decorative circles -->
  <circle cx="950" cy="200" r="200" fill="#6366f1" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="150" fill="#06b6d4" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Grid pattern for smart account visualization -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="0.5">
    <line x1="700" y1="100" x2="700" y2="530"/>
    <line x1="800" y1="100" x2="800" y2="530"/>
    <line x1="900" y1="100" x2="900" y2="530"/>
    <line x1="1000" y1="100" x2="1000" y2="530"/>
    <line x1="1100" y1="100" x2="1100" y2="530"/>
    <line x1="700" y1="150" x2="1150" y2="150"/>
    <line x1="700" y1="250" x2="1150" y2="250"/>
    <line x1="700" y1="350" x2="1150" y2="350"/>
    <line x1="700" y1="450" x2="1150" y2="450"/>
  </g>

  <!-- Smart Account Architecture Diagram -->
  <!-- Central EIP-7702 node -->
  <circle cx="900" cy="240" r="50" fill="url(#nodeGrad1)" opacity="0.9" filter="url(#glow)"/>
  <text x="900" y="233" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="700">EIP-7702</text>
  <text x="900" y="248" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="10" opacity="0.8">Smart</text>
  <text x="900" y="261" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="10" opacity="0.8">Accounts</text>

  <!-- EOA node -->
  <circle cx="760" cy="150" r="30" fill="url(#nodeGrad2)" opacity="0.85"/>
  <text x="760" y="148" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="10" font-weight="600">EOA</text>
  <text x="760" y="160" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" opacity="0.7">Wallet</text>
  <line x1="786" y1="168" x2="858" y2="212" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>

  <!-- Gasless node -->
  <circle cx="1050" cy="150" r="30" fill="url(#nodeGrad3)" opacity="0.85"/>
  <text x="1050" y="148" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="10" font-weight="600">Gasless</text>
  <text x="1050" y="160" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" opacity="0.7">Tx</text>
  <line x1="1024" y1="168" x2="942" y2="212" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

  <!-- Batch Tx node -->
  <circle cx="1060" cy="330" r="30" fill="url(#nodeGrad4)" opacity="0.85"/>
  <text x="1060" y="328" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="10" font-weight="600">Batch</text>
  <text x="1060" y="340" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" opacity="0.7">Operations</text>
  <line x1="1034" y1="312" x2="942" y2="268" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

  <!-- Paymaster node -->
  <circle cx="750" cy="330" r="30" fill="#8b5cf6" opacity="0.85"/>
  <text x="750" y="328" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="10" font-weight="600">Paymaster</text>
  <text x="750" y="340" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="9" opacity="0.7">Sponsor</text>
  <line x1="776" y1="312" x2="858" y2="268" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Transaction flow arrow -->
  <g opacity="0.15">
    <path d="M760 180 Q900 100 1050 180" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
  </g>

  <!-- Stats cards -->
  <g transform="translate(720, 410)">
    <rect x="0" y="0" width="120" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="60" y="25" text-anchor="middle" fill="#6366f1" font-family="Inter, sans-serif" font-size="16" font-weight="800">11K+</text>
    <text x="60" y="42" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">Authorizations</text>
  </g>
  <g transform="translate(860, 410)">
    <rect x="0" y="0" width="120" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="60" y="25" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="16" font-weight="800">$0 Gas</text>
    <text x="60" y="42" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">Sponsored Tx</text>
  </g>
  <g transform="translate(1000, 410)">
    <rect x="0" y="0" width="120" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="60" y="25" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="16" font-weight="800">Pectra</text>
    <text x="60" y="42" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="10">Upgrade</text>
  </g>

  <!-- Logo area -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="14" fill="url(#ethGrad)" opacity="0.9"/>
    <text x="14" y="21" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="800">0x</text>
    <text x="40" y="22" fill="#e6edf3" font-family="Inter, sans-serif" font-size="16" font-weight="700">degen0x</text>
  </g>

  <!-- Badges -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="72" height="24" rx="12" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
    <text x="36" y="16" text-anchor="middle" fill="#818cf8" font-family="Inter, sans-serif" font-size="10" font-weight="600">Ethereum</text>
    <rect x="80" y="0" width="100" height="24" rx="12" fill="#06b6d420" stroke="#06b6d440" stroke-width="1"/>
    <text x="130" y="16" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="10" font-weight="600">Smart Accounts</text>
  </g>

  <!-- Title -->
  <text x="60" y="180" fill="#e6edf3" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-1">
    <tspan>EIP-7702 Smart</tspan>
  </text>
  <text x="60" y="230" fill="#e6edf3" font-family="Inter, sans-serif" font-size="36" font-weight="900" letter-spacing="-1" opacity="0.9">
    <tspan>Accounts Guide 2026</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="280" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">
    Gasless Transactions &amp; Account Abstraction
  </text>
  <text x="60" y="305" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">
    on Ethereum Pectra
  </text>

  <!-- Feature pills -->
  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="145" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="72" y="20" text-anchor="middle" fill="#6366f1" font-family="Inter, sans-serif" font-size="11" font-weight="600">Gasless Transactions</text>
  </g>
  <g transform="translate(215, 340)">
    <rect x="0" y="0" width="130" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="65" y="20" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="11" font-weight="600">Batch Operations</text>
  </g>
  <g transform="translate(355, 340)">
    <rect x="0" y="0" width="130" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="65" y="20" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="11" font-weight="600">Paymaster Support</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500">degen0x.com</text>
  <text x="1140" y="615" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="12">Learn · Ethereum · Account Abstraction</text>
</svg>