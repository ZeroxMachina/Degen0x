  <rect x="816" y="485" width="308" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="816" y="485" width="62" height="6" rx="3" fill="url(#redGrad)"/>

  <!-- Bottom bar -->
  <rect x="0" y="535" width="1200" height="95" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="535" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

