    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundCard1"><rect x="60" y="235" width="340" height="280" rx="16"/></clipPath>
    <clipPath id="roundCard2"><rect x="430" y="235" width="340" height="280" rx="16"/></clipPath>
    <clipPath id="roundCard3"><rect x="800" y="235" width="340" height="280" rx="16"/></clipPath>
  </defs>

  <!-- Background -->
