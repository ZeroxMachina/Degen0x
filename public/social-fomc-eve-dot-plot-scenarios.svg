  <rect x="430" y="235" width="340" height="280" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <rect x="430" y="235" width="340" height="56" rx="16" fill="rgba(245,158,11,0.08)"/>
