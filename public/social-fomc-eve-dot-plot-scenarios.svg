  <!-- Bottom right: URL -->
  <text x="1140" y="572" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="url(#brandGrad)" text-anchor="end">degen0x.com/learn/fomc-fed-rate-crypto-guide</text>
  <text x="1140" y="595" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6e7681" text-anchor="end">Free tools · No signup · Just data</text>

