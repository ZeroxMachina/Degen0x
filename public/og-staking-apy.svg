<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#080d1c"/>
  <ellipse cx="120" cy="100" rx="200" ry="180" fill="url(#accentGrad)" opacity="0.07"/>
  <ellipse cx="1080" cy="530" rx="200" ry="180" fill="url(#accentGrad)" opacity="0.05"/>
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" stroke="url(#accentGrad)" stroke-width="1"/>
  <!-- Stacking coins icon -->
  <g transform="translate(545, 120)" filter="url(#glow)" opacity="0.5">
    <ellipse cx="45" cy="80" rx="40" ry="12" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <ellipse cx="45" cy="60" rx="40" ry="12" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
    <ellipse cx="45" cy="40" rx="40" ry="12" fill="none" stroke="#6366f1" stroke-width="2.5"/>
    <ellipse cx="45" cy="20" rx="40" ry="12" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  </g>
  <text x="600" y="285" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">Staking APY Calculator</text>
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="28" fill="#8b949e" text-anchor="middle">Compare Staking Yields Across Networks</text>
  <line x1="350" y1="370" x2="850" y2="370" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
  <!-- Mock APY comparison -->
  <g opacity="0.55">
    <text x="300" y="425" font-family="Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">ETH</text>
    <text x="300" y="455" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#22c55e" text-anchor="middle">3.4%</text>
    <text x="480" y="425" font-family="Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">SOL</text>
    <text x="480" y="455" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#22c55e" text-anchor="middle">6.8%</text>
    <text x="660" y="425" font-family="Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">ATOM</text>
    <text x="660" y="455" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#22c55e" text-anchor="middle">14.2%</text>
    <text x="840" y="425" font-family="Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">DOT</text>
    <text x="840" y="455" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#22c55e" text-anchor="middle">11.5%</text>
  </g>
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle" opacity="0.8">degen0x.com</text>
</svg>