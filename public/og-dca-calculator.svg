<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#080d1c"/>
  <ellipse cx="120" cy="90" rx="200" ry="180" fill="url(#accentGrad)" opacity="0.07"/>
  <ellipse cx="1080" cy="540" rx="200" ry="180" fill="url(#accentGrad)" opacity="0.05"/>
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" stroke="url(#accentGrad)" stroke-width="1"/>
  <!-- DCA staircase chart -->
  <g transform="translate(350, 130)" opacity="0.35">
    <rect x="0" y="60" width="40" height="20" rx="3" fill="#6366f1"/>
    <rect x="60" y="50" width="40" height="30" rx="3" fill="#6366f1"/>
    <rect x="120" y="35" width="40" height="45" rx="3" fill="#06b6d4"/>
    <rect x="180" y="40" width="40" height="40" rx="3" fill="#06b6d4"/>
    <rect x="240" y="25" width="40" height="55" rx="3" fill="#22c55e"/>
    <rect x="300" y="15" width="40" height="65" rx="3" fill="#22c55e"/>
    <rect x="360" y="0" width="40" height="80" rx="3" fill="#22c55e"/>
    <line x1="0" y1="80" x2="400" y2="80" stroke="#30363d" stroke-width="1"/>
  </g>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">DCA Calculator</text>
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="28" fill="#8b949e" text-anchor="middle">Dollar-Cost Averaging Simulator for Crypto</text>
  <line x1="350" y1="370" x2="850" y2="370" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
  <!-- Mock result -->
  <g opacity="0.6">
    <text x="400" y="430" font-family="Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Invested</text>
    <text x="400" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e6edf3" text-anchor="middle">$10,000</text>
    <text x="600" y="430" font-family="Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Current Value</text>
    <text x="600" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#22c55e" text-anchor="middle">$24,350</text>
    <text x="800" y="430" font-family="Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">ROI</text>
    <text x="800" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#22c55e" text-anchor="middle">+143.5%</text>
  </g>
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle" opacity="0.8">degen0x.com</text>
</svg>