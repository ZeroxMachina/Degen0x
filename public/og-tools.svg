    <circle cx="800" cy="220" r="3"/><circle cx="830" cy="220" r="3"/><circle cx="860" cy="220" r="3"/>
  </g>
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Crypto Tools</text>
