  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" stroke="url(#accentGrad)" stroke-width="1"/>
  <!-- Tool icons -->
  <g opacity="0.25">
    <text x="140" y="200" font-size="48" fill="url(#accentGrad)">&#x1F4CA;</text>
    <text x="980" y="200" font-size="48" fill="url(#accentGrad)">&#x2699;</text>
    <text x="140" y="460" font-size="40" fill="url(#accentGrad)">&#x1F4B9;</text>
    <text x="1000" y="460" font-size="40" fill="url(#accentGrad)">&#x1F50D;</text>
  </g>
