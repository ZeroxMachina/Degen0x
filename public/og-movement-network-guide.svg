  <text x="895" y="395" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Peak TPS</text>

  <rect x="985" y="340" width="150" height="70" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
