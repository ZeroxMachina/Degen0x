  <rect x="965" y="148" width="80" height="20" rx="4" fill="#6366f120" stroke="#6366f150" stroke-width="1"/>
  <rect x="1060" y="148" width="55" height="20" rx="4" fill="#818cf825" stroke="#818cf850" stroke-width="1"/>

  <rect x="835" y="194" width="80" height="20" rx="4" fill="#06b6d430" stroke="#06b6d460" stroke-width="1"/>
  <rect x="925" y="194" width="55" height="20" rx="4" fill="#22d3ee25" stroke="#22d3ee50" stroke-width="1"/>
  <rect x="995" y="194" width="70" height="20" rx="4" fill="#06b6d420" stroke="#06b6d450" stroke-width="1"/>

  <rect x="835" y="240" width="50" height="20" rx="4" fill="#6366f130" stroke="#6366f160" stroke-width="1"/>
