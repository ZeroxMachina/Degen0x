  <rect x="195" y="390" width="140" height="32" rx="16" fill="#06b6d415" stroke="#06b6d435" stroke-width="1"/>
  <text x="265" y="411" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">EVM Compatible</text>

  <rect x="350" y="390" width="110" height="32" rx="16" fill="#22c55e15" stroke="#22c55e35" stroke-width="1"/>
  <text x="405" y="411" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Celestia DA</text>

  <rect x="475" y="390" width="130" height="32" rx="16" fill="#d2992215" stroke="#d2992235" stroke-width="1"/>
  <text x="540" y="411" text-anchor="middle" fill="#d29922" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">10B $MOVE</text>

