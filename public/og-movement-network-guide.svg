<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="moveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="950" cy="180" r="200" fill="#6366f1" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="250" cy="500" r="150" fill="#22c55e" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="1100" cy="450" r="120" fill="#06b6d4" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Parallel execution visualization (decorative) -->
  <!-- Thread lanes -->
  <rect x="820" y="140" width="320" height="36" rx="8" fill="#6366f108" stroke="#6366f125" stroke-width="1"/>
  <rect x="820" y="186" width="320" height="36" rx="8" fill="#06b6d408" stroke="#06b6d425" stroke-width="1"/>
  <rect x="820" y="232" width="320" height="36" rx="8" fill="#6366f108" stroke="#6366f125" stroke-width="1"/>
  <rect x="820" y="278" width="320" height="36" rx="8" fill="#06b6d408" stroke="#06b6d425" stroke-width="1"/>

