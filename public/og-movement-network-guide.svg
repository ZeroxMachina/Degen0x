  <text x="60" y="215" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Movement Network</text>
  <text x="60" y="275" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="325" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">MoveVM parallel execution, $MOVE tokenomics,</text>
  <text x="60" y="352" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">staking, and how it compares to Solana &amp; Sui</text>

