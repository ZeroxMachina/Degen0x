  <text x="1060" y="395" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">TVL</text>

  <rect x="820" y="420" width="150" height="70" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="895" y="450" text-anchor="middle" fill="#d29922" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">160+</text>
  <text x="895" y="475" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Projects</text>

  <rect x="985" y="420" width="150" height="70" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="1060" y="450" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">&lt;$0.001</text>
