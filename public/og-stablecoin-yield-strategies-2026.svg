<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="yieldBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22c55e40"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="1000" cy="200" r="160" fill="#06b6d4" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="150" cy="480" r="120" fill="#22c55e" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Yield bar chart visualization (decorative, right side) -->
  <!-- Bars representing different yield levels -->
  <g transform="translate(850, 130)">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="280" y2="0" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="60" x2="280" y2="60" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="120" x2="280" y2="120" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="180" x2="280" y2="180" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4"/>

    <!-- Labels -->
    <text x="-8" y="5" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="9">20%</text>
    <text x="-8" y="65" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="9">15%</text>
    <text x="-8" y="125" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="9">10%</text>
    <text x="-8" y="185" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="9">5%</text>

    <!-- Aave bar -->
    <rect x="15" y="135" width="36" height="45" rx="4" fill="#22c55e40" stroke="#22c55e60" stroke-width="1"/>
    <text x="33" y="200" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Aave</text>
    <text x="33" y="130" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">7%</text>

    <!-- Morpho bar -->
    <rect x="65" y="90" width="36" height="90" rx="4" fill="#06b6d440" stroke="#06b6d460" stroke-width="1"/>
    <text x="83" y="200" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Morpho</text>
    <text x="83" y="85" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">15%</text>

    <!-- Curve bar -->
    <rect x="115" y="45" width="36" height="135" rx="4" fill="#6366f140" stroke="#6366f160" stroke-width="1"/>
    <text x="133" y="200" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Curve</text>
    <text x="133" y="40" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">20%</text>

    <!-- Pendle bar -->
    <rect x="165" y="15" width="36" height="165" rx="4" fill="#d2992240" stroke="#d2992260" stroke-width="1"/>
    <text x="183" y="200" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Pendle</text>
    <text x="183" y="10" text-anchor="middle" fill="#d29922" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">25%</text>

    <!-- Ethena bar -->
    <rect x="215" y="120" width="36" height="60" rx="4" fill="#22c55e30" stroke="#22c55e50" stroke-width="1"/>
    <text x="233" y="200" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Ethena</text>
    <text x="233" y="115" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">9%</text>
  </g>

  <!-- Logo area -->
  <text x="60" y="62" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" letter-spacing="-0.02em">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="120" width="50" height="28" rx="6" fill="#06b6d420" stroke="#06b6d440" stroke-width="1"/>
  <text x="85" y="139" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">DeFi</text>

  <rect x="120" y="120" width="55" height="28" rx="6" fill="#0ea5e920" stroke="#0ea5e940" stroke-width="1"/>
  <text x="147" y="139" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Learn</text>

  <!-- Title -->
  <text x="60" y="210" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">Stablecoin Yield</text>
  <text x="60" y="262" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">Strategies 2026</text>

  <!-- Subtitle -->
  <text x="60" y="305" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Earn 4-20% APY on USDC, USDT &amp; USDe without the volatility</text>

  <!-- Stat cards row -->
  <!-- Card 1: Supply -->
  <rect x="60" y="350" width="170" height="80" rx="10" fill="#161b2280" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="380" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">STABLECOIN SUPPLY</text>
  <text x="80" y="410" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">$272B</text>

  <!-- Card 2: Aave TVL -->
  <rect x="245" y="350" width="170" height="80" rx="10" fill="#161b2280" stroke="#30363d" stroke-width="1"/>
  <text x="265" y="380" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">AAVE TVL</text>
  <text x="265" y="410" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">$40B+</text>

  <!-- Card 3: Conservative -->
  <rect x="430" y="350" width="170" height="80" rx="10" fill="#161b2280" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="380" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">CONSERVATIVE APY</text>
  <text x="450" y="410" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">4-7%</text>

  <!-- Card 4: Aggressive -->
  <rect x="615" y="350" width="170" height="80" rx="10" fill="#161b2280" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="380" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">AGGRESSIVE APY</text>
  <text x="635" y="410" fill="#d29922" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">15-20%+</text>

  <!-- Strategy flow: Deposit → Protocol → Yield → Compound -->
  <rect x="60" y="460" width="130" height="34" rx="8" fill="#06b6d415" stroke="#06b6d440" stroke-width="1"/>
  <text x="125" y="482" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Deposit USDC</text>

  <text x="203" y="482" fill="#30363d" font-family="Inter, system-ui, sans-serif" font-size="16">→</text>

  <rect x="221" y="460" width="140" height="34" rx="8" fill="#6366f115" stroke="#6366f140" stroke-width="1"/>
  <text x="291" y="482" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">DeFi Protocol</text>

  <text x="374" y="482" fill="#30363d" font-family="Inter, system-ui, sans-serif" font-size="16">→</text>

  <rect x="392" y="460" width="120" height="34" rx="8" fill="#22c55e15" stroke="#22c55e40" stroke-width="1"/>
  <text x="452" y="482" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Earn Yield</text>

  <text x="525" y="482" fill="#30363d" font-family="Inter, system-ui, sans-serif" font-size="16">→</text>

  <rect x="543" y="460" width="130" height="34" rx="8" fill="#d2992215" stroke="#d2992240" stroke-width="1"/>
  <text x="608" y="482" text-anchor="middle" fill="#d29922" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Compound</text>

  <!-- Topic pills -->
  <rect x="60" y="520" width="55" height="24" rx="12" fill="#06b6d415" stroke="#06b6d430" stroke-width="1"/>
  <text x="87" y="536" text-anchor="middle" fill="#22d3ee80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Aave</text>

  <rect x="125" y="520" width="70" height="24" rx="12" fill="#6366f115" stroke="#6366f130" stroke-width="1"/>
  <text x="160" y="536" text-anchor="middle" fill="#818cf880" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Morpho</text>

  <rect x="205" y="520" width="60" height="24" rx="12" fill="#06b6d415" stroke="#06b6d430" stroke-width="1"/>
  <text x="235" y="536" text-anchor="middle" fill="#22d3ee80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Curve</text>

  <rect x="275" y="520" width="65" height="24" rx="12" fill="#d2992215" stroke="#d2992230" stroke-width="1"/>
  <text x="307" y="536" text-anchor="middle" fill="#d2992280" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Pendle</text>

  <rect x="350" y="520" width="70" height="24" rx="12" fill="#22c55e15" stroke="#22c55e30" stroke-width="1"/>
  <text x="385" y="536" text-anchor="middle" fill="#22c55e80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Ethena</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#080d1c"/>
  <rect x="0" y="590" width="1200" height="1" fill="#30363d"/>
  <text x="60" y="616" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">degen0x.com</text>
  <text x="1140" y="616" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400">March 2026</text>
</svg>