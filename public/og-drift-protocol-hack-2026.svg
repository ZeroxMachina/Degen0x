<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle circuit pattern gradient -->
    <pattern id="circuit" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 10 50 L 40 50 M 60 50 L 90 50 M 50 10 L 50 40 M 50 60 L 50 90" stroke="#1f2937" stroke-width="1" fill="none" opacity="0.3"/>
      <circle cx="50" cy="50" r="3" fill="#1f2937" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Circuit pattern background -->
  <rect width="1200" height="630" fill="url(#circuit)"/>

  <!-- Top gradient bar -->
  <rect width="1200" height="8" fill="url(#topGradient)"/>

  <!-- Subtle shield icon background (decorative) -->
  <g opacity="0.08">
    <path d="M 950 150 L 1050 150 L 1050 250 Q 1000 300 950 280 Q 900 300 850 250 L 850 150 Z" fill="#4f46e5"/>
  </g>

  <!-- Warning triangle icon (decorative) -->
  <g opacity="0.08">
    <path d="M 100 200 L 180 350 L 20 350 Z" fill="#ef4444"/>
  </g>

  <!-- degen0x logo text at top-left -->
  <text x="50" y="60" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#4f46e5">
    degen0x
  </text>

  <!-- SECURITY ALERT badge -->
  <g>
    <!-- Badge background -->
    <rect x="50" y="95" width="280" height="50" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>

    <!-- Alert text -->
    <text x="70" y="130" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#ef4444">
      ⚠ SECURITY ALERT
    </text>
  </g>

  <!-- Main title -->
  <text x="600" y="240" font-family="'Arial', sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    Drift Protocol
  </text>
  <text x="600" y="330" font-family="'Arial', sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    $285M Hack
  </text>

  <!-- Subtitle -->
  <text x="600" y="410" font-family="'Arial', sans-serif" font-size="24" fill="#8b949e" text-anchor="middle">
    Oracle Manipulation · Admin Key Exploit · DeFi Security Analysis
  </text>

  <!-- Decorative bottom accent line -->
  <line x1="200" y1="480" x2="1000" y2="480" stroke="url(#topGradient)" stroke-width="2" opacity="0.4"/>

  <!-- Small circuit dots decoration -->
  <circle cx="250" cy="520" r="3" fill="#4f46e5" opacity="0.5"/>
  <circle cx="950" cy="520" r="3" fill="#0891b2" opacity="0.5"/>
  <circle cx="600" cy="560" r="2" fill="#d97706" opacity="0.5"/>

  <!-- degen0x.com text at bottom right -->
  <text x="1120" y="610" font-family="'Arial', sans-serif" font-size="14" fill="#6b7280" text-anchor="end">
    degen0x.com
  </text>
</svg>
