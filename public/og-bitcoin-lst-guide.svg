<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0c1529"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="4" fill="url(#accentBar)"/>

  <!-- Decorative glow -->
  <circle cx="950" cy="180" r="200" fill="#f97316" opacity="0.06"/>
  <circle cx="250" cy="480" r="150" fill="#eab308" opacity="0.05"/>

  <!-- Logo -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Icon -->
  <text x="60" y="210" font-size="72">₿</text>

  <!-- Title -->
  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#f1f5f9" letter-spacing="-0.02em">Bitcoin Liquid Staking</text>
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#f1f5f9" letter-spacing="-0.02em">Tokens Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="405" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">LBTC vs SolvBTC vs pumpBTC — yields, risks &amp; DeFi integrations</text>

  <!-- Protocol cards -->
  <rect x="60" y="440" width="200" height="70" rx="10" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="80" y="466" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Lombard</text>
  <text x="80" y="494" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#fb923c">LBTC</text>

  <rect x="280" y="440" width="200" height="70" rx="10" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="300" y="466" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Solv Protocol</text>
  <text x="300" y="494" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#a78bfa">SolvBTC</text>

  <rect x="500" y="440" width="200" height="70" rx="10" fill="rgba(234,179,8,0.1)" stroke="rgba(234,179,8,0.3)" stroke-width="1"/>
  <text x="520" y="466" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">pumpBTC</text>
  <text x="520" y="494" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#eab308">pumpBTC</text>

  <!-- Market cap badge -->
  <rect x="1020" y="50" width="120" height="36" rx="18" fill="rgba(249,115,22,0.2)" stroke="rgba(249,115,22,0.4)" stroke-width="1"/>
  <text x="1042" y="74" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fb923c">$4B+ TVL</text>

  <rect y="610" width="1200" height="20" fill="rgba(255,255,255,0.03)"/>
  <text x="60" y="590" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com/learn/bitcoin-liquid-staking-tokens-guide-2026</text>
