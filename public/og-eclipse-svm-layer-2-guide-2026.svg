<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="eclipse" cx="950" cy="250" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ef4444" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Eclipse visual -->
  <circle cx="950" cy="250" r="200" fill="url(#eclipse)"/>
  <g filter="url(#glow)" opacity="0.2">
    <circle cx="950" cy="250" r="100" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="950" cy="250" r="140" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="950" cy="250" r="180" fill="none" stroke="#8b5cf6" stroke-width="1"/>
  </g>

  <!-- SVM arrow flow -->
  <g opacity="0.12">
    <rect x="850" y="200" width="200" height="100" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="950" y="245" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">Solana VM</text>
    <text x="950" y="265" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">on Ethereum L2</text>
  </g>

  <!-- Badge -->
  <rect x="60" y="80" width="100" height="28" rx="6" fill="#f59e0b20" stroke="#f59e0b" stroke-width="1"/>
  <text x="110" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">LEARN</text>

  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)">Eclipse: SVM on</text>
  <text x="60" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)">Ethereum Layer 2</text>
  <text x="60" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#titleGrad)">Guide 2026</text>

  <text x="60" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e">Solana's speed + Ethereum's security — the modular L2 thesis</text>

  <!-- Stats -->
  <g>
    <rect x="60" y="370" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="80" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#f59e0b">SVM</text>
    <text x="80" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Solana Virtual Machine</text>

    <rect x="300" y="370" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="320" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ef4444">ETH DA</text>
    <text x="320" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Ethereum settlement</text>

    <rect x="540" y="370" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="560" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#8b5cf6">Modular</text>
    <text x="560" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Best of both chains</text>
  </g>

  <!-- Footer -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0f1a"/>
  <text x="60" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#58a6ff">degen0x.com</text>
  <text x="1140" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#484f58" text-anchor="end">2026 Guide</text>
</svg>