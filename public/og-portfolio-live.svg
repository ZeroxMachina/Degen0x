<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Decorative gradient shapes -->
  <ellipse cx="200" cy="80" rx="220" ry="180" fill="url(#accentGrad)" opacity="0.07"/>
  <ellipse cx="1050" cy="550" rx="280" ry="220" fill="url(#accentGrad)" opacity="0.05"/>

  <!-- Glass-morphism panel -->
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" stroke="url(#accentGrad)" stroke-width="1" opacity-stroke="0.2"/>

  <!-- Chart visualization -->
  <g transform="translate(150, 150)">
    <!-- Grid lines -->
    <line x1="0" y1="250" x2="450" y2="250" stroke="#4f46e5" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="200" x2="450" y2="200" stroke="#4f46e5" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="150" x2="450" y2="150" stroke="#4f46e5" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="100" x2="450" y2="100" stroke="#4f46e5" stroke-width="1" opacity="0.2"/>

    <!-- Chart area fill -->
    <polygon points="0,250 60,180 120,150 180,120 240,100 300,130 360,110 420,140 450,100 450,250" fill="url(#chartGrad)" />

    <!-- Chart line -->
    <polyline points="0,250 60,180 120,150 180,120 240,100 300,130 360,110 420,140 450,100"
              fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Data points -->
    <circle cx="0" cy="250" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="60" cy="180" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="120" cy="150" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="180" cy="120" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="240" cy="100" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="300" cy="130" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="360" cy="110" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="420" cy="140" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="450" cy="100" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
  </g>

  <!-- Chain indicators (right side) -->
  <g transform="translate(720, 180)">
    <!-- Ethereum -->
    <circle cx="0" cy="0" r="20" fill="#4f46e5" opacity="0.2" stroke="url(#accentGrad)" stroke-width="2"/>
    <text x="0" y="8" font-size="20" font-weight="bold" fill="#0891b2" text-anchor="middle">Ξ</text>

    <!-- Polygon -->
    <circle cx="100" cy="0" r="20" fill="#4f46e5" opacity="0.2" stroke="url(#accentGrad)" stroke-width="2"/>
    <text x="100" y="8" font-size="16" font-weight="bold" fill="#0891b2" text-anchor="middle">◇</text>

    <!-- Arbitrum -->
    <circle cx="200" cy="0" r="20" fill="#4f46e5" opacity="0.2" stroke="url(#accentGrad)" stroke-width="2"/>
    <text x="200" y="8" font-size="18" font-weight="bold" fill="#0891b2" text-anchor="middle">⚡</text>
  </g>

  <!-- Multi-chain badge -->
  <g transform="translate(720, 280)">
    <rect x="0" y="0" width="240" height="50" rx="10" fill="#ffffff" opacity="0.06" stroke="url(#accentGrad)" stroke-width="1"/>
    <text x="120" y="35" font-family="Arial, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Multi-Chain Tracking</text>
  </g>

  <!-- Main title -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    Live Portfolio Dashboard
  </text>

  <!-- Subtitle -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" fill="#8b949e" text-anchor="middle">
    Real-time tracking across chains
  </text>

  <!-- degen0x.com text -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle" opacity="0.8">
    degen0x.com
  </text>

  <!-- Accent line -->
  <line x1="300" y1="350" x2="900" y2="350" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
</svg>