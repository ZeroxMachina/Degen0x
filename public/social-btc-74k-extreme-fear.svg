<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0c1424"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bullGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="50" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Decorative orbs -->
  <circle cx="150" cy="200" r="220" fill="#ef4444" opacity="0.04" filter="url(#softGlow2)"/>
  <circle cx="1050" cy="150" r="180" fill="#22c55e" opacity="0.05" filter="url(#softGlow2)"/>
  <circle cx="600" cy="500" r="200" fill="#f59e0b" opacity="0.03" filter="url(#softGlow2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Badge -->
  <rect x="60" y="40" width="210" height="34" rx="17" fill="url(#fearGrad)" opacity="0.15"/>
  <circle cx="78" cy="57" r="5" fill="#ef4444" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="92" y="62" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444" letter-spacing="0.05em">EXTREME FEAR → RALLY</text>

  <!-- degen0x logo -->
  <text x="1080" y="62" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#accent2)" text-anchor="end" letter-spacing="-0.02em">degen0x</text>

  <!-- Main Title -->
  <text x="60" y="138" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">38 Days of Extreme Fear.</text>
  <text x="60" y="194" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#22c55e" letter-spacing="-0.02em">Then Bitcoin Hit $74,000.</text>

  <!-- Subtitle -->
  <text x="60" y="236" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#8b949e">Longest Extreme Fear streak since Terra/Luna (2022) — institutions bought while retail panicked</text>

  <!-- Fear & Greed visualization bar -->
  <text x="60" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.08em">FEAR &amp; GREED INDEX</text>
  <!-- Full bar background -->
  <rect x="60" y="295" width="1080" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Fear zone (red, 0-25) -->
  <rect x="60" y="295" width="270" height="28" rx="14" fill="url(#fearGrad)" opacity="0.25"/>
  <!-- Current position marker at 23/100 -->
  <circle cx="308" cy="309" r="10" fill="#ef4444" stroke="#080d1c" stroke-width="3"/>
  <text x="308" y="313" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="white" text-anchor="middle">23</text>
  <!-- Labels -->
  <text x="68" y="340" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ef4444">Extreme Fear</text>
  <text x="330" y="340" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f59e0b">Fear</text>
  <text x="560" y="340" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Neutral</text>
  <text x="810" y="340" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e">Greed</text>
  <text x="1040" y="340" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#06b6d4">Extreme Greed</text>

  <!-- Historical pattern cards -->
  <text x="60" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.08em">WHAT HAPPENED AFTER EXTENDED EXTREME FEAR</text>

  <!-- Card 1: 2022 -->
  <rect x="60" y="400" width="255" height="90" rx="14" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="80" y="425" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">June 2022 (Terra/Luna)</text>
  <text x="80" y="455" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">+70%</text>
  <text x="80" y="476" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">over 6 months</text>

  <!-- Card 2: 2020 -->
  <rect x="335" y="400" width="255" height="90" rx="14" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="355" y="425" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">March 2020 (COVID)</text>
  <text x="355" y="455" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">+1,500%</text>
  <text x="355" y="476" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">to all-time high</text>

  <!-- Card 3: 2018 -->
  <rect x="610" y="400" width="255" height="90" rx="14" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="630" y="425" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">December 2018 (Bear Low)</text>
  <text x="630" y="455" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">+300%</text>
  <text x="630" y="476" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">through 2019</text>

  <!-- Card 4: NOW -->
  <rect x="885" y="400" width="255" height="90" rx="14" fill="rgba(22,197,94,0.08)" stroke="rgba(22,197,94,0.25)" stroke-width="1"/>
  <text x="905" y="425" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">March 2026 (Now)</text>
  <text x="905" y="455" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#f59e0b">$74K</text>
  <text x="905" y="476" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#22c55e">38 days → breakout</text>

  <!-- CTA Bar -->
  <rect x="60" y="510" width="1080" height="44" rx="12" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="600" y="538" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#22c55e" text-anchor="middle">Run DCA scenarios through fear cycles → degen0x.com/tools/dca-calculator</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="606" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com — Free crypto tools, guides &amp; market data</text>
  <text x="1140" y="606" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">March 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent2)"/>
</svg>