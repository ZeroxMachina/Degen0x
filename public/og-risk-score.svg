<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e6ed;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="150" cy="100" r="80" fill="#f59e0b" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1050" cy="500" r="120" fill="#f59e0b" opacity="0.06" filter="url(#glow)"/>
  <circle cx="900" cy="120" r="60" fill="#d97706" opacity="0.07" filter="url(#glow)"/>

  <!-- Category badge -->
  <rect x="60" y="60" width="240" height="40" rx="20" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
  <text x="180" y="87" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">RISK ANALYSIS</text>

  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="url(#titleGradient)">Portfolio Risk Score</text>

  <!-- Subtitle -->
  <text x="60" y="210" font-family="system-ui, sans-serif" font-size="20" fill="#8b949e">Analyze volatility, concentration &amp; liquidity risk</text>

  <!-- Visualization: Semi-circular gauge -->
  <g>
    <!-- Gauge background circle -->
    <rect x="750" y="80" width="400" height="400" rx="12" fill="#0a1427" opacity="0.5" stroke="#1e293b" stroke-width="1"/>

    <!-- Gauge background arc -->
    <path d="M 850 360 A 100 100 0 0 1 950 360" stroke="#1e293b" stroke-width="20" fill="none"/>
    
    <!-- Low risk zone (green) -->
    <path d="M 850 360 A 100 100 0 0 1 880 290" stroke="#22c55e" stroke-width="20" fill="none" opacity="0.8"/>
    
    <!-- Medium risk zone (yellow) -->
    <path d="M 880 290 A 100 100 0 0 1 920 270" stroke="#f59e0b" stroke-width="20" fill="none" opacity="0.8"/>
    
    <!-- High risk zone (red) -->
    <path d="M 920 270 A 100 100 0 0 1 950 360" stroke="#ef4444" stroke-width="20" fill="none" opacity="0.8"/>

    <!-- Needle pointing to 65% (medium-high) -->
    <line x1="900" y1="360" x2="910" y2="270" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
    <circle cx="900" cy="360" r="8" fill="#06b6d4"/>

    <!-- Score display -->
    <text x="900" y="420" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">65</text>
    <text x="900" y="445" font-family="system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">/ 100</text>

    <!-- Risk levels legend -->
    <rect x="760" y="475" width="12" height="12" rx="2" fill="#22c55e"/>
    <text x="780" y="484" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Low</text>

    <rect x="850" y="475" width="12" height="12" rx="2" fill="#f59e0b"/>
    <text x="870" y="484" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Medium</text>

    <rect x="970" y="475" width="12" height="12" rx="2" fill="#ef4444"/>
    <text x="990" y="484" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">High</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0a1427" opacity="0.6"/>
  <circle cx="60" cy="615" r="10" fill="#6366f1"/>
  <text x="75" y="621" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">degen0x.com</text>

  <!-- Decorative accent elements -->
  <circle cx="1180" cy="615" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="1150" cy="615" r="6" fill="#4f46e5" opacity="0.25"/>
</svg>
