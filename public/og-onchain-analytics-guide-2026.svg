<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentBar)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="180" r="200" fill="#06b6d4" opacity="0.03"/>
  <circle cx="1100" cy="420" r="180" fill="#6366f1" opacity="0.03"/>
  <circle cx="120" cy="520" r="100" fill="#d97706" opacity="0.03"/>

  <!-- On-chain data visualization -->
  <g transform="translate(650, 100)">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#30363d" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="#30363d" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#30363d" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#30363d" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="300" stroke="#30363d" stroke-width="0.5"/>
    <line x1="0" y1="75" x2="480" y2="75" stroke="#30363d" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="480" y2="150" stroke="#30363d" stroke-width="0.5"/>
    <line x1="0" y1="225" x2="480" y2="225" stroke="#30363d" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="480" y2="300" stroke="#30363d" stroke-width="0.5"/>

    <!-- Price line chart -->
    <path d="M0 240 C30 230 50 200 80 180 C110 160 130 190 160 170 C190 150 210 100 240 80 C270 60 290 90 320 70 C350 50 370 40 400 60 C430 80 450 110 480 90"
          fill="none" stroke="url(#chartLine)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Area fill -->
    <path d="M0 240 C30 230 50 200 80 180 C110 160 130 190 160 170 C190 150 210 100 240 80 C270 60 290 90 320 70 C350 50 370 40 400 60 C430 80 450 110 480 90 L480 300 L0 300 Z"
          fill="url(#areaFill)"/>

    <!-- Whale alert dots -->
    <circle cx="160" cy="170" r="8" fill="#d97706" opacity="0.15"/>
    <circle cx="160" cy="170" r="4" fill="#d97706"/>
    <text x="160" y="158" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#d97706" font-weight="600" text-anchor="middle">WHALE</text>

    <circle cx="320" cy="70" r="8" fill="#22c55e" opacity="0.15"/>
    <circle cx="320" cy="70" r="4" fill="#22c55e"/>
    <text x="320" y="58" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#22c55e" font-weight="600" text-anchor="middle">SMART $</text>

    <!-- Volume bars -->
    <rect x="0" y="270" width="16" height="30" rx="2" fill="#6366f1" opacity="0.3"/>
    <rect x="40" y="260" width="16" height="40" rx="2" fill="#6366f1" opacity="0.3"/>
    <rect x="80" y="250" width="16" height="50" rx="2" fill="#6366f1" opacity="0.4"/>
    <rect x="120" y="255" width="16" height="45" rx="2" fill="#6366f1" opacity="0.35"/>
    <rect x="160" y="240" width="16" height="60" rx="2" fill="#d97706" opacity="0.5"/>
    <rect x="200" y="265" width="16" height="35" rx="2" fill="#6366f1" opacity="0.3"/>
    <rect x="240" y="245" width="16" height="55" rx="2" fill="#6366f1" opacity="0.4"/>
    <rect x="280" y="250" width="16" height="50" rx="2" fill="#6366f1" opacity="0.35"/>
    <rect x="320" y="235" width="16" height="65" rx="2" fill="#22c55e" opacity="0.5"/>
    <rect x="360" y="255" width="16" height="45" rx="2" fill="#6366f1" opacity="0.35"/>
    <rect x="400" y="260" width="16" height="40" rx="2" fill="#6366f1" opacity="0.3"/>
    <rect x="440" y="250" width="16" height="50" rx="2" fill="#6366f1" opacity="0.35"/>
  </g>

  <!-- degen0x logo text -->
  <text x="80" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="0.05em">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="100" width="120" height="30" rx="15" fill="#06b6d420" stroke="#06b6d460" stroke-width="1"/>
  <text x="140" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#06b6d4" text-anchor="middle">ANALYTICS</text>

  <!-- Title -->
  <text x="80" y="195" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">On-Chain Analytics</text>
  <text x="80" y="255" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="80" y="305" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#8b949e">Dune, Glassnode, Nansen — track whales &amp; smart money</text>

  <!-- Platform pills -->
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="100" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="50" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#06b6d4" font-weight="700" text-anchor="middle">Glassnode</text>

    <rect x="115" y="0" width="80" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="155" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6366f1" font-weight="700" text-anchor="middle">Nansen</text>

    <rect x="210" y="0" width="70" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="245" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#d97706" font-weight="700" text-anchor="middle">Dune</text>

    <rect x="295" y="0" width="100" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="345" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b5cf6" font-weight="700" text-anchor="middle">DefiLlama</text>

    <rect x="410" y="0" width="80" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="450" y="23" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e" font-weight="700" text-anchor="middle">Artemis</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(80, 410)">
    <rect x="0" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="18" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">NVT RATIO</text>
    <text x="18" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#06b6d4" font-weight="800">42.8</text>

    <rect x="180" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="198" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">EXCHANGE NET FLOW</text>
    <text x="198" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#22c55e" font-weight="800">-24.5K BTC</text>

    <rect x="360" y="0" width="160" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="378" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">MVRV Z-SCORE</text>
    <text x="378" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#d97706" font-weight="800">2.14</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="612" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681" font-weight="600">degen0x.com</text>
  <text x="1120" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>