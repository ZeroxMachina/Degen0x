<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080d1c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#backgroundGradient)"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Logo circle in top-left -->
  <circle cx="60" cy="50" r="35" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.8"/>
  <text x="60" y="60" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#e6edf3" text-anchor="middle">0x</text>

  <!-- Decorative Capitol building silhouette on the right -->
  <g opacity="0.12">
    <!-- Main dome -->
    <circle cx="950" cy="220" r="80" fill="none" stroke="#4f46e5" stroke-width="3"/>
    <path d="M 870 220 Q 950 140 1030 220" fill="none" stroke="#4f46e5" stroke-width="3"/>
    <!-- Base wings -->
    <rect x="800" y="290" width="300" height="100" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <!-- Left wing -->
    <rect x="750" y="300" width="60" height="80" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <!-- Right wing -->
    <rect x="1040" y="300" width="60" height="80" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <!-- Columns -->
    <line x1="820" y1="290" x2="820" y2="390" stroke="#4f46e5" stroke-width="2"/>
    <line x1="860" y1="290" x2="860" y2="390" stroke="#4f46e5" stroke-width="2"/>
    <line x1="1040" y1="290" x2="1040" y2="390" stroke="#4f46e5" stroke-width="2"/>
    <line x1="1080" y1="290" x2="1080" y2="390" stroke="#4f46e5" stroke-width="2"/>
  </g>

  <!-- Blockchain chain elements on left -->
  <g opacity="0.15">
    <!-- Chain links -->
    <circle cx="120" cy="300" r="20" fill="none" stroke="#0891b2" stroke-width="2"/>
    <circle cx="120" cy="380" r="20" fill="none" stroke="#0891b2" stroke-width="2"/>
    <line x1="120" y1="320" x2="120" y2="360" stroke="#0891b2" stroke-width="2"/>

    <circle cx="200" cy="340" r="20" fill="none" stroke="#0891b2" stroke-width="2"/>
    <line x1="130" y1="300" x2="180" y2="330" stroke="#0891b2" stroke-width="2"/>
    <line x1="130" y1="380" x2="180" y2="350" stroke="#0891b2" stroke-width="2"/>
  </g>

  <!-- Glass-morphism card background -->
  <rect x="80" y="100" width="1040" height="500" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" rx="16" opacity="0.8"/>

  <!-- Main title -->
  <text x="600" y="200" font-family="Inter, sans-serif" font-size="52" font-weight="bold" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">Congressional Tokenization</text>
  <text x="600" y="260" font-family="Inter, sans-serif" font-size="52" font-weight="bold" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">Hearing Guide</text>

  <!-- Accent line under title -->
  <rect x="200" y="280" width="800" height="2" fill="url(#accentGradient)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="Inter, sans-serif" font-size="26" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">What Washington's Blockchain Policy Means for Crypto</text>

  <!-- Info badge -->
  <g opacity="0.6">
    <rect x="280" y="400" width="640" height="70" fill="rgba(79, 70, 229, 0.08)" stroke="rgba(8, 145, 178, 0.3)" stroke-width="1" rx="10"/>
    <circle cx="310" cy="435" r="6" fill="#0891b2"/>
    <text x="340" y="440" font-family="Inter, sans-serif" font-size="16" fill="#b1a9ff">Legislative frameworks shaping the future of tokenization</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Footer text -->
  <text x="600" y="615" font-family="Inter, sans-serif" font-size="16" fill="#6e7681" text-anchor="middle">degen0x.com</text>
</svg>