<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Accent bar -->
  <rect width="1200" height="6" fill="url(#accentGradient)"/>

  <!-- Decorative gradient circles background -->
  <circle cx="170" cy="210" r="110" fill="#4f46e5" opacity="0.08"/>
  <circle cx="1070" cy="400" r="130" fill="#0891b2" opacity="0.08"/>
  <circle cx="980" cy="110" r="100" fill="#d97706" opacity="0.06"/>

  <!-- Glass-morphism container -->
  <rect x="50" y="60" width="1100" height="520" rx="16" fill="url(#glassGradient)"
        stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- degen0x logo text -->
  <text x="80" y="115" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#8b949e" letter-spacing="2">
    degen0x
  </text>

  <!-- Title -->
  <text x="80" y="220" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    Exchange Fee
  </text>
  <text x="80" y="280" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    Comparison
  </text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">
    Compare trading fees across top crypto exchanges
  </text>

  <!-- Decorative bar chart comparison -->
  <g filter="url(#glow)">
    <!-- Y-axis -->
    <line x1="750" y1="360" x2="750" y2="480" stroke="rgba(139, 148, 158, 0.3)" stroke-width="1"/>
    <!-- X-axis -->
    <line x1="750" y1="480" x2="1080" y2="480" stroke="rgba(139, 148, 158, 0.3)" stroke-width="1"/>

    <!-- Bar 1 - Binance (tallest, lowest fee) -->
    <g>
      <rect x="765" y="420" width="35" height="60" rx="4" fill="url(#accentGradient)" opacity="0.8"/>
      <text x="768" y="505" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">
        Binance
      </text>
    </g>

    <!-- Bar 2 - Kraken -->
    <g>
      <rect x="820" y="410" width="35" height="70" rx="4" fill="#4f46e5" opacity="0.7"/>
      <text x="820" y="505" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">
        Kraken
      </text>
    </g>

    <!-- Bar 3 - Coinbase -->
    <g>
      <rect x="875" y="400" width="35" height="80" rx="4" fill="#0891b2" opacity="0.7"/>
      <text x="872" y="505" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">
        Coinbase
      </text>
    </g>

    <!-- Bar 4 - Bybit -->
    <g>
      <rect x="930" y="415" width="35" height="65" rx="4" fill="#d97706" opacity="0.7"/>
      <text x="929" y="505" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">
        Bybit
      </text>
    </g>

    <!-- Bar 5 - OKX -->
    <g>
      <rect x="985" y="425" width="35" height="55" rx="4" fill="#10b981" opacity="0.7"/>
      <text x="989" y="505" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">
        OKX
      </text>
    </g>

    <!-- Bar 6 - Gate -->
    <g>
      <rect x="1040" y="430" width="35" height="50" rx="4" fill="#4f46e5" opacity="0.6"/>
      <text x="1039" y="505" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">
        Gate
      </text>
    </g>

    <!-- Fee percentage labels -->
    <text x="752" y="368" font-family="Inter, sans-serif" font-size="9" fill="#8b949e">0.1%</text>
    <text x="752" y="385" font-family="Inter, sans-serif" font-size="9" fill="#8b949e">0.25%</text>
    <text x="752" y="402" font-family="Inter, sans-serif" font-size="9" fill="#8b949e">0.5%</text>
  </g>

  <!-- Vertical accent lines -->
  <line x1="700" y1="60" x2="700" y2="580" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>

  <!-- Footer -->
  <text x="80" y="595" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#475569">
    degen0x.com
  </text>
</svg>