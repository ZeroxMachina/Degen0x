<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>

    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f22;stop-opacity:1" />
    </linearGradient>

    <!-- Top accent bar gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Glow blur filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="150" cy="100" r="90" fill="#22c55e" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1050" cy="550" r="130" fill="#22c55e" opacity="0.08" filter="url(#glow)"/>
  <circle cx="600" cy="-40" r="160" fill="#0891b2" opacity="0.06" filter="url(#glow)"/>

  <!-- Logo text -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#4f46e5" letter-spacing="2">
    degen0x
  </text>

  <!-- Category badge -->
  <rect x="40" y="80" width="110" height="40" rx="20" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="95" y="105" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">
    Yield
  </text>

  <!-- Main title -->
  <text x="40" y="200" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    RWA Yield vs
  </text>
  <text x="40" y="265" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    DeFi Yield Comparison
  </text>

  <!-- Subtitle -->
  <text x="40" y="320" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#8b949e">
    Treasury-backed tokens vs DeFi protocols: risk, returns, and trade-offs
  </text>

  <!-- Right panel background -->
  <rect x="750" y="100" width="430" height="470" rx="20" fill="rgba(34, 197, 94, 0.05)" stroke="rgba(34, 197, 94, 0.2)" stroke-width="1"/>

  <!-- Right panel title -->
  <text x="780" y="140" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">
    Yield Comparison
  </text>

  <!-- RWA section -->
  <text x="780" y="175" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#22c55e">RWA (Real World Assets)</text>

  <!-- RWA bar background -->
  <rect x="780" y="185" width="360" height="50" rx="8" fill="rgba(34, 197, 94, 0.1)" stroke="rgba(34, 197, 94, 0.2)" stroke-width="1"/>

  <!-- RWA bar fill (4-5%) -->
  <rect x="780" y="185" width="54" height="50" rx="8" fill="rgba(34, 197, 94, 0.3)"/>

  <text x="800" y="205" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e">Average APY</text>
  <text x="800" y="225" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#22c55e">4-5%</text>

  <text x="950" y="205" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e">Risk Profile</text>
  <text x="950" y="225" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#22c55e">Low</text>

  <!-- DeFi section -->
  <text x="780" y="270" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0891b2">DeFi (Decentralized Finance)</text>

  <!-- DeFi bar background -->
  <rect x="780" y="280" width="360" height="50" rx="8" fill="rgba(8, 145, 178, 0.1)" stroke="rgba(8, 145, 178, 0.2)" stroke-width="1"/>

  <!-- DeFi bar fill (6-12%) - showing middle of range -->
  <rect x="780" y="280" width="108" height="50" rx="8" fill="rgba(8, 145, 178, 0.3)"/>

  <text x="800" y="300" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e">Average APY</text>
  <text x="800" y="320" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0891b2">6-12%</text>

  <text x="950" y="300" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e">Risk Profile</text>
  <text x="950" y="320" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#0891b2">High</text>

  <!-- Comparison metrics -->
  <g>
    <text x="780" y="370" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white">Key Differences:</text>

    <text x="790" y="400" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e">✓ RWA: Stable, regulated, lower returns</text>
    <text x="790" y="425" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e">✓ DeFi: Volatile, higher yields, smart contract risk</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(34, 197, 94, 0.1)" stroke="rgba(34, 197, 94, 0.2)" stroke-width="1"/>
  <text x="40" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8b949e">
    degen0x.com
  </text>
  <text x="1160" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="end">
    Learn Crypto
  </text>
</svg>
