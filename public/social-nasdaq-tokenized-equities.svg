<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="150" r="200" fill="url(#cardGlow)" opacity="0.4"/>
  <circle cx="200" cy="500" r="150" fill="#0891b2" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentBar)"/>

  <!-- Badge: BREAKING -->
  <rect x="60" y="40" rx="14" ry="14" width="140" height="28" fill="#6366f1" opacity="0.2"/>
  <rect x="60" y="40" rx="14" ry="14" width="140" height="28" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <circle cx="80" cy="54" r="4" fill="#22c55e"/>
  <text x="92" y="58" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#a5b4fc" letter-spacing="0.1em">BREAKING</text>

  <!-- degen0x logo text -->
  <text x="1080" y="58" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="url(#brandGrad)" text-anchor="end">degen0x</text>

  <!-- Main Title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Nasdaq Approved for</text>
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="url(#brandGrad)" letter-spacing="-0.02em">Tokenized Equities</text>

  <!-- Subtitle -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Wall Street's second-largest exchange adopts blockchain settlement</text>

  <!-- Feature cards row -->
  <!-- Card 1: 24/7 Trading -->
  <rect x="60" y="280" rx="16" ry="16" width="250" height="110" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="312" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" letter-spacing="0.05em">24/7 TRADING</text>
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">No Market Close</text>
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Trade stocks around the clock</text>

  <!-- Card 2: Instant Settlement -->
  <rect x="330" y="280" rx="16" ry="16" width="250" height="110" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="350" y="312" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e" letter-spacing="0.05em">SETTLEMENT</text>
  <text x="350" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">T+0 Instant</text>
  <text x="350" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">vs T+1 traditional settlement</text>

  <!-- Card 3: Fractional Shares -->
  <rect x="600" y="280" rx="16" ry="16" width="250" height="110" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="620" y="312" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" letter-spacing="0.05em">FRACTIONAL</text>
  <text x="620" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">Native Splits</text>
  <text x="620" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Any amount, any stock</text>

  <!-- Card 4: Global Access -->
  <rect x="870" y="280" rx="16" ry="16" width="270" height="110" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="890" y="312" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" letter-spacing="0.05em">GLOBAL ACCESS</text>
  <text x="890" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">No Brokerage</text>
  <text x="890" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Worldwide participation on-chain</text>

  <!-- Flow diagram: TradFi → Blockchain → Benefits -->
  <rect x="60" y="420" rx="12" ry="12" width="180" height="50" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="150" y="451" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#a5b4fc" text-anchor="middle">Traditional Equities</text>

  <!-- Arrow -->
  <line x1="255" y1="445" x2="310" y2="445" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <polygon points="310,440 320,445 310,450" fill="#6366f1" opacity="0.6"/>

  <!-- Blockchain box -->
  <rect x="330" y="420" rx="12" ry="12" width="200" height="50" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
  <text x="430" y="451" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#67e8f9" text-anchor="middle">Blockchain Rails</text>

  <!-- Arrow -->
  <line x1="545" y1="445" x2="600" y2="445" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  <polygon points="600,440 610,445 600,450" fill="#06b6d4" opacity="0.6"/>

  <!-- Benefits box -->
  <rect x="620" y="420" rx="12" ry="12" width="240" height="50" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="740" y="451" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="middle">Tokenized Securities</text>

  <!-- Stat chip -->
  <rect x="900" y="425" rx="20" ry="20" width="240" height="40" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1"/>
  <text x="920" y="451" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e">HISTORIC FIRST</text>
  <text x="1040" y="451" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">for major exchange</text>

  <!-- Bottom bar -->
  <rect x="0" y="505" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- CTA -->
  <text x="60" y="545" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Full guide on tokenized assets:</text>
  <text x="60" y="570" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#06b6d4">degen0x.com/learn/tokenized-real-world-assets-guide</text>

  <!-- Market context chips -->
  <rect x="60" y="590" rx="10" ry="10" width="120" height="24" fill="rgba(34,197,94,0.1)"/>
  <text x="120" y="607" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">BTC $71K +3.8%</text>

  <rect x="195" y="590" rx="10" ry="10" width="130" height="24" fill="rgba(34,197,94,0.1)"/>
  <text x="260" y="607" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">ETH $2,166 +5.2%</text>

  <rect x="340" y="590" rx="10" ry="10" width="120" height="24" fill="rgba(34,197,94,0.1)"/>
  <text x="400" y="607" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">SOL $90 +6.5%</text>

  <rect x="475" y="590" rx="10" ry="10" width="150" height="24" fill="rgba(239,68,68,0.1)"/>
  <text x="550" y="607" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">F&amp;G: 8 Extreme Fear</text>

  <!-- degen0x.com footer -->
  <text x="1140" y="607" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681" text-anchor="end">degen0x.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentBar)"/>
</svg>
