<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>

    <!-- Gradients -->
    <linearGradient id="brandGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="glassGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.08" />
    </linearGradient>

    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Background Pattern - Chain links -->
  <g opacity="0.06">
    <!-- Vertical chains -->
    <line x1="150" y1="0" x2="150" y2="630" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="20,10"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="20,10"/>
    <line x1="650" y1="0" x2="650" y2="630" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="20,10"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="20,10"/>
    <line x1="1050" y1="0" x2="1050" y2="630" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="20,10"/>

    <!-- Horizontal bridges -->
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#06b6d4" stroke-width="2" stroke-dasharray="15,10"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#06b6d4" stroke-width="2" stroke-dasharray="15,10"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#06b6d4" stroke-width="2" stroke-dasharray="15,10"/>
  </g>

  <!-- Decorative gradient orbs - bridge visualization -->
  <circle cx="150" cy="200" r="130" fill="url(#glassGradient2)" opacity="0.5"/>
  <circle cx="1050" cy="450" r="140" fill="url(#glassGradient2)" opacity="0.4"/>

  <!-- Top accent bar with gradient -->
  <rect width="1200" height="4" fill="url(#brandGradient2)"/>

  <!-- Main Content Container with Glass Effect -->
  <rect x="60" y="80" width="1080" height="480" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Left column - Main content -->
  <g>
    <!-- NEW GUIDE Badge with Purple -->
    <rect x="80" y="100" width="140" height="44" rx="10" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="150" y="130" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#8b5cf6" text-anchor="middle">
      NEW GUIDE
    </text>

    <!-- Main Title -->
    <text x="80" y="200" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-1">
      ERC-7683
    </text>
    <text x="80" y="255" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-1">
      Explained
    </text>

    <!-- Subtitle -->
    <text x="80" y="310" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#8b949e">
      Cross-Chain Intents Standard
    </text>
    <text x="80" y="335" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#8b949e">
      by Uniswap Labs + Across
    </text>
  </g>

  <!-- Right column - Stats boxes -->
  <g>
    <!-- Stat Box 1 - 50+ Projects -->
    <rect x="700" y="110" width="340" height="100" rx="16" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.3)" stroke-width="2"/>
    <text x="720" y="145" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#8b5cf6">
      50+
    </text>
    <text x="720" y="175" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#8b949e">
      Projects Adopted
    </text>

    <!-- Stat Box 2 - Universal Filler Network -->
    <rect x="700" y="230" width="340" height="100" rx="16" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.3)" stroke-width="2"/>
    <text x="720" y="260" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#06b6d4">
      Universal Filler Network
    </text>
    <text x="720" y="290" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#8b949e">
      Decentralized Execution Layer
    </text>

    <!-- Stat Box 3 - One-Click Cross-Chain -->
    <rect x="700" y="350" width="340" height="100" rx="16" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="2"/>
    <text x="720" y="380" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#22c55e">
      One-Click
    </text>
    <text x="720" y="410" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#22c55e">
      Cross-Chain
    </text>
  </g>

  <!-- Bottom branding section -->
  <g>
    <!-- Decorative line -->
    <line x1="80" y1="540" x2="1120" y2="540" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

    <!-- degen0x.com branding -->
    <text x="80" y="580" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">
      degen0x.com
    </text>

    <!-- Accent dots - Purple to Cyan gradient -->
    <circle cx="1090" cy="580" r="4" fill="#8b5cf6"/>
    <circle cx="1110" cy="580" r="4" fill="#06b6d4"/>
    <circle cx="1130" cy="580" r="4" fill="#06b6d4"/>
  </g>

  <!-- Decorative chain links visualization - connecting nodes -->
  <g opacity="0.6">
    <!-- Left chain element -->
    <circle cx="220" cy="320" r="8" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="220" cy="320" r="4" fill="#8b5cf6" opacity="0.6"/>

    <!-- Middle bridge -->
    <line x1="220" y1="320" x2="600" y2="320" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
    <circle cx="410" cy="320" r="6" fill="#06b6d4" opacity="0.4"/>

    <!-- Right chain element -->
    <circle cx="600" cy="320" r="8" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="600" cy="320" r="4" fill="#06b6d4" opacity="0.6"/>
  </g>

  <!-- Additional decorative bridge visualization -->
  <g opacity="0.4">
    <path d="M 250 400 Q 350 350 450 400" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="350" cy="350" r="3" fill="#8b5cf6"/>
  </g>
</svg>