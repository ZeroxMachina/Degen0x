<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>

    <!-- Gradients -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.08" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Animated Background Pattern - Circuit Grid -->
  <g opacity="0.08">
    <line x1="100" y1="0" x2="100" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#6366f1" stroke-width="1"/>

    <line x1="0" y1="100" x2="1200" y2="100" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Decorative gradient orbs - Circuit visualization -->
  <circle cx="200" cy="150" r="120" fill="url(#glassGradient)" opacity="0.6"/>
  <circle cx="1000" cy="500" r="150" fill="url(#glassGradient)" opacity="0.4"/>

  <!-- Top accent bar with gradient -->
  <rect width="1200" height="4" fill="url(#brandGradient)"/>

  <!-- Main Content Container with Glass Effect -->
  <rect x="60" y="80" width="1080" height="480" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Left column - Main content -->
  <g>
    <!-- NEW GUIDE Badge -->
    <rect x="80" y="100" width="140" height="44" rx="10" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="2"/>
    <text x="150" y="130" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#06b6d4" text-anchor="middle">
      NEW GUIDE
    </text>

    <!-- Main Title -->
    <text x="80" y="200" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-1">
      ZK Coprocessors
    </text>
    <text x="80" y="255" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-1">
      Guide 2026
    </text>

    <!-- Subtitle -->
    <text x="80" y="310" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#8b949e">
      Offchain Compute, Onchain Proof
    </text>
  </g>

  <!-- Right column - Stats boxes -->
  <g>
    <!-- Stat Box 1 - 6 Key Projects -->
    <rect x="700" y="110" width="340" height="100" rx="16" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="2"/>
    <text x="720" y="145" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#6366f1">
      6
    </text>
    <text x="720" y="175" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#8b949e">
      Key Projects
    </text>

    <!-- Stat Box 2 - Projects List -->
    <rect x="700" y="230" width="340" height="100" rx="16" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.3)" stroke-width="2"/>
    <text x="720" y="260" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">
      Axiom · Brevis · RISC Zero
    </text>
    <text x="720" y="290" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">
      Succinct · Modular · Sindri
    </text>

    <!-- Stat Box 3 - 10x Gas Savings -->
    <rect x="700" y="350" width="340" height="100" rx="16" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="2"/>
    <text x="720" y="385" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#22c55e">
      10x
    </text>
    <text x="720" y="415" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#8b949e">
      Gas Savings
    </text>
  </g>

  <!-- Bottom branding section -->
  <g>
    <!-- Decorative line -->
    <line x1="80" y1="540" x2="1120" y2="540" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

    <!-- degen0x.com branding -->
    <text x="80" y="580" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">
      degen0x.com
    </text>

    <!-- Accent dots -->
    <circle cx="1090" cy="580" r="4" fill="#6366f1"/>
    <circle cx="1110" cy="580" r="4" fill="#06b6d4"/>
    <circle cx="1130" cy="580" r="4" fill="#f59e0b"/>
  </g>

  <!-- Decorative circuit nodes - top right -->
  <g opacity="0.5">
    <circle cx="950" cy="130" r="6" fill="#6366f1"/>
    <circle cx="1020" cy="160" r="6" fill="#06b6d4"/>
    <circle cx="1080" cy="195" r="6" fill="#f59e0b"/>
    <line x1="950" y1="130" x2="1020" y2="160" stroke="#6366f1" stroke-width="1"/>
    <line x1="1020" y1="160" x2="1080" y2="195" stroke="#06b6d4" stroke-width="1"/>
  </g>
</svg>