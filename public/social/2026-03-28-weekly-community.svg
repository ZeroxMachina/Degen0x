<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Main gradient for accent bar -->
    <linearGradient id="gradientAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Decorative background gradients -->
    <radialGradient id="decorCircle1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="decorCircle2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="decorCircle3" cx="70%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Decorative gradient circles -->
  <circle cx="100" cy="100" r="300" fill="url(#decorCircle1)"/>
  <circle cx="1000" cy="550" r="350" fill="url(#decorCircle2)"/>
  <circle cx="900" cy="150" r="250" fill="url(#decorCircle3)"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#gradientAccent)"/>

  <!-- Top-left logo text "degen0x" -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#6366f1">
    degen0x
  </text>

  <!-- Main title -->
  <text x="40" y="150" font-family="Inter, sans-serif" font-size="64" font-weight="700" fill="#e6edf3">
    Week in Review:
  </text>
  <text x="40" y="220" font-family="Inter, sans-serif" font-size="64" font-weight="700" fill="#e6edf3">
    Mar 22–28
  </text>

  <!-- Subtitle -->
  <text x="40" y="270" font-family="Inter, sans-serif" font-size="18" fill="#8b949e">
    20+ New Guides • Bear Market Survival • DePIN • ETF Deep-Dives
  </text>

  <!-- Stats Row Background (glass-morphism container) -->
  <g id="statsContainer">
    <!-- Stat Card 1 -->
    <rect x="40" y="320" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Left accent bar for stat 1 (green) -->
    <rect x="40" y="320" width="6" height="200" rx="3" fill="#22c55e"/>

    <!-- Stat 1 number -->
    <text x="180" y="410" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" text-anchor="middle">
      556
    </text>

    <!-- Stat 1 label -->
    <text x="180" y="460" font-family="Inter, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">
      Pages Published
    </text>

    <!-- Stat Card 2 -->
    <rect x="430" y="320" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Left accent bar for stat 2 (red) -->
    <rect x="430" y="320" width="6" height="200" rx="3" fill="#ef4444"/>

    <!-- Stat 2 number -->
    <text x="600" y="410" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" text-anchor="middle">
      12
    </text>

    <!-- Stat 2 label -->
    <text x="600" y="460" font-family="Inter, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">
      Fear & Greed
    </text>

    <!-- Stat Card 3 -->
    <rect x="820" y="320" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Left accent bar for stat 3 (cyan) -->
    <rect x="820" y="320" width="6" height="200" rx="3" fill="#06b6d4"/>

    <!-- Stat 3 number -->
    <text x="990" y="410" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" text-anchor="middle">
      20+
    </text>

    <!-- Stat 3 label -->
    <text x="990" y="460" font-family="Inter, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">
      New This Week
    </text>
  </g>

  <!-- Bottom bar with website -->
  <text x="1160" y="610" font-family="Inter, sans-serif" font-size="14" fill="#8b949e" text-anchor="end">
    degen0x.com
  </text>
</svg>