  <text x="60" y="170" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">CLARITY Act: Bipartisan</text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Deal Just Changed Everything</text>

