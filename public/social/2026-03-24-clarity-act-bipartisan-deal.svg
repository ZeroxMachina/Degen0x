  <text x="90" y="452" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">⏳</text>
  <text x="120" y="452" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">Senate Banking markup</text>
  <text x="360" y="452" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f59e0b">LATE APRIL</text>

  <!-- Stat boxes row -->
  <!-- Box 1 -->
  <rect x="620" y="305" width="260" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="640" y="335" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">STABLECOIN SUPPLY</text>
