  <rect x="620" y="400" width="260" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="640" y="430" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BTC PRICE</text>
  <text x="640" y="465" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">$71,043</text>

  <!-- Box 4 -->
  <rect x="920" y="400" width="220" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="940" y="430" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">FEAR &amp; GREED</text>
  <text x="940" y="465" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#f59e0b">33 Fear</text>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="100" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Free crypto tools &amp; research — no signup required</text>
  <text x="60" y="600" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#brand)">degen0x.com/learn/crypto-regulations-2026</text>

