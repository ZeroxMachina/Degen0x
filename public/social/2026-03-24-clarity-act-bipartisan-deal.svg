  <rect x="60" y="305" width="520" height="175" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Passive Yield row -->
  <text x="85" y="340" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="0.05em">YIELD FRAMEWORK</text>
  <rect x="85" y="358" width="22" height="22" rx="4" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="92" y="375" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444">✕</text>
  <text x="120" y="375" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">Passive yield on balances</text>
  <text x="370" y="375" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ef4444">BANNED</text>

  <rect x="85" y="395" width="22" height="22" rx="4" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="90" y="412" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e">✓</text>
  <text x="120" y="412" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">Activity-based rewards</text>
  <text x="350" y="412" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e">ALLOWED</text>

