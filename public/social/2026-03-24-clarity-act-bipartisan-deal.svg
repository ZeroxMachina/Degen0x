  <text x="940" y="335" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">DEAL STATUS</text>
  <text x="940" y="370" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4">Unlocked</text>

