  <!-- Badge: LEGISLATIVE BREAKTHROUGH -->
  <rect x="60" y="85" width="310" height="32" rx="16" fill="#22c55e" opacity="0.15"/>
  <text x="75" y="106" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" letter-spacing="0.1em">LEGISLATIVE BREAKTHROUGH</text>

