<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="brand2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="rallyGreen" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="4" fill="url(#brand2)"/>

  <!-- Decorative orbs -->
  <circle cx="900" cy="200" r="220" fill="#22c55e" opacity="0.04" filter="url(#glow2)"/>
  <circle cx="200" cy="450" r="180" fill="#4f46e5" opacity="0.05" filter="url(#glow2)"/>

  <!-- Logo -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="0.05em">degen0x.com</text>

  <!-- Badge -->
  <rect x="60" y="85" width="220" height="32" rx="16" fill="#22c55e" opacity="0.15"/>
  <text x="75" y="106" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" letter-spacing="0.1em">RELIEF RALLY</text>

  <!-- Main Title -->
  <text x="60" y="175" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">BTC Reclaims $71K</text>
  <text x="60" y="235" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#8b949e" letter-spacing="-0.01em">+4% relief rally amid extreme fear</text>

  <!-- Mini price chart visualization -->
  <rect x="60" y="275" width="700" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Chart area fill -->
  <polygon points="90,395 130,385 180,390 230,380 280,388 330,375 380,370 430,360 480,345 530,320 580,310 630,300 680,295 720,290 720,395" fill="url(#rallyGreen)" opacity="0.5"/>

  <!-- Chart line -->
  <polyline points="90,395 130,385 180,390 230,380 280,388 330,375 380,370 430,360 480,345 530,320 580,310 630,300 680,295 720,290" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Price labels -->
  <text x="90" y="300" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">$67K</text>
  <text x="680" y="285" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e">$71,043</text>

  <!-- Date labels -->
  <text x="90" y="408" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Mar 20</text>
  <text x="680" y="408" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Mar 24</text>

  <!-- Stat boxes -->
  <rect x="800" y="275" width="340" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="820" y="298" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BTC 24H CHANGE</text>
  <text x="820" y="322" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#22c55e">+3.79%</text>
  <text x="960" y="322" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">→ $71,043</text>

  <rect x="800" y="345" width="340" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="820" y="368" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.05em">ETH 24H CHANGE</text>
  <text x="820" y="392" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#22c55e">+5.16%</text>
  <text x="960" y="392" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">ETH outperforms</text>

  <!-- Signal boxes row -->
  <rect x="60" y="440" width="340" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="465" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.05em">FEAR &amp; GREED INDEX</text>
  <text x="80" y="495" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#f59e0b">33</text>
  <text x="120" y="495" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Fear (recovering from 11)</text>

  <rect x="430" y="440" width="340" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="450" y="465" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.05em">STABLECOIN SUPPLY</text>
  <text x="450" y="495" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#06b6d4">$312B</text>
  <text x="530" y="495" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e">All-Time High</text>

  <rect x="800" y="440" width="340" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="820" y="465" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.05em">CLARITY ACT</text>
  <text x="820" y="495" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#22c55e">Deal Done</text>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="100" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Track live sentiment &amp; market cycles — free crypto tools</text>
  <text x="60" y="600" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#brand2)">degen0x.com/tools/fear-greed-timeline</text>

  <rect y="626" width="1200" height="4" fill="url(#brand2)"/>
</svg>