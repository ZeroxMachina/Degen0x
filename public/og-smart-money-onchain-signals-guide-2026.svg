<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="greenCyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#080d1c"/>

  <circle cx="140" cy="110" r="160" fill="url(#greenCyanGradient)" filter="url(#softGlow)"/>
  <circle cx="1060" cy="540" r="200" fill="url(#greenCyanGradient)" filter="url(#softGlow)"/>

  <g opacity="0.2">
    <circle cx="950" cy="100" r="55" stroke="#22c55e" stroke-width="2" fill="none"/>
    <rect x="925" y="75" width="50" height="50" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M 920 130 Q 935 120 950 130 Q 965 120 980 130" stroke="#22c55e" stroke-width="2" fill="none"/>
  </g>

  <g opacity="0.15" filter="url(#glow)">
