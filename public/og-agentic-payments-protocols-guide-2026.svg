<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgAP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentAP" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGradAP" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glowAP">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgAP)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentAP)"/>

  <!-- Decorative glow circles -->
  <circle cx="1000" cy="150" r="200" fill="#6366f1" opacity="0.05" filter="url(#glowAP)"/>
  <circle cx="1100" cy="500" r="130" fill="#06b6d4" opacity="0.04" filter="url(#glowAP)"/>
  <circle cx="150" cy="500" r="100" fill="#d97706" opacity="0.03" filter="url(#glowAP)"/>

  <!-- Protocol Stack Diagram (right side) -->
  <g transform="translate(750, 80)" opacity="0.25">
    <!-- Layer 5: Wallet Security -->
    <rect x="30" y="0" width="340" height="44" rx="10" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="200" y="27" fill="#f59e0b" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="600">Open Wallet Standard — Key Security</text>

    <!-- Layer 4: Authorization -->
    <rect x="30" y="55" width="340" height="44" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="200" y="82" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="600">AP2 — Authorization Framework</text>

    <!-- Layer 3: Commerce -->
    <rect x="30" y="110" width="340" height="44" rx="10" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="200" y="137" fill="#06b6d4" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="600">ACP — Agentic Commerce Protocol</text>

    <!-- Layer 2: On-chain -->
    <rect x="30" y="165" width="340" height="44" rx="10" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <text x="200" y="192" fill="#22c55e" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="600">ERC-8183 — On-Chain Settlement</text>

    <!-- Layer 1: Transport -->
    <rect x="30" y="220" width="340" height="44" rx="10" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <text x="200" y="247" fill="#6366f1" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="600">x402 — HTTP Micropayments</text>

    <!-- Stack label -->
    <text x="0" y="140" fill="#6e7681" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" transform="rotate(-90, 10, 140)" font-weight="600">STACK</text>
  </g>

  <!-- Agent icons (right side, lower) -->
  <g transform="translate(830, 370)" opacity="0.15">
    <!-- Agent 1 -->
    <circle cx="30" cy="30" r="25" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <text x="30" y="35" fill="#06b6d4" font-family="Inter, sans-serif" font-size="18" text-anchor="middle">AI</text>
    <!-- Arrow -->
    <line x1="60" y1="30" x2="100" y2="30" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="98,25 108,30 98,35" fill="#8b949e"/>
    <!-- Payment symbol -->
    <circle cx="130" cy="30" r="18" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="130" y="36" fill="#22c55e" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" font-weight="700">$</text>
    <!-- Arrow -->
    <line x1="153" y1="30" x2="193" y2="30" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="191,25 201,30 191,35" fill="#8b949e"/>
    <!-- Service -->
    <rect x="205" y="8" width="80" height="44" rx="10" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="245" y="35" fill="#f59e0b" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="600">Service</text>
  </g>

  <!-- Badge -->
  <rect x="60" y="80" width="130" height="30" rx="15" fill="#6366f1" opacity="0.2"/>
  <rect x="60" y="80" width="130" height="30" rx="15" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <text x="125" y="100" fill="#818cf8" font-family="Inter, sans-serif" font-size="13" text-anchor="middle" font-weight="600">AI &amp; AGENTS</text>

  <!-- Title -->
  <text x="60" y="170" fill="url(#titleGradAP)" font-family="Inter, sans-serif" font-size="46" font-weight="900" letter-spacing="-1">
    Agentic Payments
  </text>
  <text x="60" y="228" fill="url(#titleGradAP)" font-family="Inter, sans-serif" font-size="46" font-weight="900" letter-spacing="-1">
    Protocols Compared
  </text>

  <!-- Subtitle -->
  <text x="60" y="278" fill="#8b949e" font-family="Inter, sans-serif" font-size="20">
    x402 vs ACP vs AP2 vs ERC-8183 vs Open Wallet Standard
  </text>

  <!-- Key stats -->
  <g transform="translate(60, 320)">
    <rect x="0" y="0" width="130" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="65" y="25" fill="#e6edf3" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" font-weight="700">5</text>
    <text x="65" y="44" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">Protocols</text>

    <rect x="150" y="0" width="130" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="215" y="25" fill="#e6edf3" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" font-weight="700">115M+</text>
    <text x="215" y="44" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">x402 Txns</text>

    <rect x="300" y="0" width="130" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="365" y="25" fill="#e6edf3" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" font-weight="700">$5T+</text>
    <text x="365" y="44" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">Market Size</text>
  </g>

  <!-- Guide badge -->
  <text x="60" y="430" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="600">
    COMPREHENSIVE COMPARISON 2026
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" fill="#8b949e" font-family="Inter, sans-serif" font-size="16" font-weight="600">
    degen0x.com
  </text>
  <text x="1140" y="616" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" text-anchor="end">
    March 2026
  </text>
</svg>