<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0c1228"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glows -->
  <circle cx="900" cy="200" r="250" fill="url(#glow1)"/>
  <circle cx="350" cy="450" r="200" fill="url(#glow2)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.06">
    <circle cx="100" cy="100" r="1.5" fill="white"/>
    <circle cx="160" cy="100" r="1.5" fill="white"/>
    <circle cx="220" cy="100" r="1.5" fill="white"/>
    <circle cx="100" cy="160" r="1.5" fill="white"/>
    <circle cx="160" cy="160" r="1.5" fill="white"/>
    <circle cx="220" cy="160" r="1.5" fill="white"/>
    <circle cx="100" cy="220" r="1.5" fill="white"/>
    <circle cx="160" cy="220" r="1.5" fill="white"/>
    <circle cx="220" cy="220" r="1.5" fill="white"/>
  </g>

  <!-- Referral chain illustration -->
  <g transform="translate(780, 180)">
    <!-- Person 1 -->
    <circle cx="0" cy="0" r="36" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" fill="#6366f1" font-size="28">👤</text>

    <!-- Connection line 1 -->
    <line x1="40" y1="10" x2="100" y2="50" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>

    <!-- Person 2 -->
    <circle cx="140" cy="70" r="36" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="2"/>
    <text x="140" y="78" text-anchor="middle" fill="#06b6d4" font-size="28">👤</text>

    <!-- Connection line 2 -->
    <line x1="180" y1="80" x2="240" y2="120" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>

    <!-- Person 3 -->
    <circle cx="280" cy="140" r="36" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
    <text x="280" y="148" text-anchor="middle" fill="#f59e0b" font-size="28">👤</text>

    <!-- XP badges -->
    <rect x="-30" y="44" rx="10" ry="10" width="60" height="22" fill="#6366f1" opacity="0.3"/>
    <text x="0" y="59" text-anchor="middle" fill="#a5b4fc" font-family="Inter, sans-serif" font-size="11" font-weight="700">+500 XP</text>

    <rect x="110" y="114" rx="10" ry="10" width="60" height="22" fill="#06b6d4" opacity="0.3"/>
    <text x="140" y="129" text-anchor="middle" fill="#67e8f9" font-family="Inter, sans-serif" font-size="11" font-weight="700">+500 XP</text>

    <rect x="250" y="184" rx="10" ry="10" width="60" height="22" fill="#f59e0b" opacity="0.3"/>
    <text x="280" y="199" text-anchor="middle" fill="#fcd34d" font-family="Inter, sans-serif" font-size="11" font-weight="700">+500 XP</text>
  </g>

  <!-- Logo -->
  <text x="80" y="80" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Title -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Referral Program</text>

  <!-- Subtitle -->
  <text x="80" y="310" font-family="Inter, sans-serif" font-size="22" fill="#8b949e">Invite friends. Earn XP. Unlock exclusive rewards.</text>

  <!-- Feature pills -->
  <rect x="80" y="350" rx="16" ry="16" width="160" height="36" fill="rgba(99, 102, 241, 0.15)" stroke="rgba(99, 102, 241, 0.3)" stroke-width="1"/>
  <text x="160" y="374" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#a5b4fc">⚡ 500 XP Per Invite</text>

  <rect x="260" y="350" rx="16" ry="16" width="155" height="36" fill="rgba(6, 182, 212, 0.15)" stroke="rgba(6, 182, 212, 0.3)" stroke-width="1"/>
  <text x="337" y="374" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#67e8f9">🏆 Exclusive Badges</text>

  <rect x="435" y="350" rx="16" ry="16" width="170" height="36" fill="rgba(245, 158, 11, 0.15)" stroke="rgba(245, 158, 11, 0.3)" stroke-width="1"/>
  <text x="520" y="374" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#fcd34d">🎁 Tiered Rewards</text>

  <!-- Bottom bar -->
  <rect y="596" width="1200" height="34" fill="rgba(0,0,0,0.4)"/>
  <text x="80" y="618" font-family="Inter, sans-serif" font-size="14" fill="#6e7681">degen0x.com/referral</text>
  <text x="1120" y="618" text-anchor="end" font-family="Inter, sans-serif" font-size="14" fill="#6e7681">The Crypto Knowledge Hub</text>
</svg>