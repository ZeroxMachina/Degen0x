<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cyan-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative background circles -->
  <circle cx="1100" cy="-50" r="150" fill="#06b6d4" opacity="0.05"/>
  <circle cx="50" cy="550" r="120" fill="#22c55e" opacity="0.05"/>
  <circle cx="900" cy="400" r="100" fill="#0891b2" opacity="0.04"/>

  <!-- Staking node network visualization (right side) -->
  <g opacity="0.6">
    <!-- Central node -->
    <circle cx="1050" cy="200" r="25" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="1050" cy="200" r="20" fill="#06b6d4" opacity="0.1"/>

    <!-- Connected nodes -->
    <line x1="1050" y1="200" x2="950" y2="120" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <circle cx="950" cy="120" r="15" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="950" cy="120" r="12" fill="#06b6d4" opacity="0.15"/>

    <line x1="1050" y1="200" x2="1100" y2="100" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <circle cx="1100" cy="100" r="15" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="1100" cy="100" r="12" fill="#22c55e" opacity="0.15"/>

    <line x1="1050" y1="200" x2="1080" y2="310" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <circle cx="1080" cy="310" r="15" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="1080" cy="310" r="12" fill="#06b6d4" opacity="0.15"/>

    <line x1="1050" y1="200" x2="950" y2="280" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <circle cx="950" cy="280" r="15" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="950" cy="280" r="12" fill="#22c55e" opacity="0.15"/>
  </g>

  <!-- Logo (top-left) -->
  <g>
    <circle cx="50" cy="35" r="20" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <text x="50" y="42" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#06b6d4" text-anchor="middle">0x</text>
    <text x="80" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ffffff">degen0x</text>
  </g>

  <!-- Category badges -->
  <g>
    <rect x="60" y="80" width="110" height="30" rx="20" fill="rgba(6, 182, 212, 0.15)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="115" y="100" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#06b6d4" text-anchor="middle">Staking</text>

    <rect x="185" y="80" width="130" height="30" rx="20" fill="rgba(34, 197, 94, 0.15)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="250" y="100" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">Infrastructure</text>
  </g>

  <!-- Main title -->
  <text x="60" y="170" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#ffffff">Staking-as-a-Service</text>
  <text x="60" y="240" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#06b6d4">Providers 2026</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">Compare Top Institutional Staking Providers</text>

  <!-- Feature pills -->
  <g filter="url(#shadow)">
    <rect x="60" y="330" width="180" height="60" rx="8" fill="rgba(6, 182, 212, 0.1)" stroke="#06b6d4" stroke-width="1"/>
    <text x="150" y="355" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#06b6d4" text-anchor="middle">10+</text>
    <text x="150" y="380" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">Providers</text>

    <rect x="280" y="330" width="180" height="60" rx="8" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="1"/>
    <text x="370" y="355" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#22c55e" text-anchor="middle">Multi</text>
    <text x="370" y="380" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">Chain Support</text>

    <rect x="500" y="330" width="180" height="60" rx="8" fill="rgba(6, 182, 212, 0.1)" stroke="#06b6d4" stroke-width="1"/>
    <text x="590" y="355" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#06b6d4" text-anchor="middle">Grade</text>
    <text x="590" y="380" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">Enterprise</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0, 0, 0, 0.3)"/>
  <text x="60" y="615" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500">degen0x.com</text>
</svg>
