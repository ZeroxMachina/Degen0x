<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#0d0f24"/>
      <stop offset="100%" style="stop-color:#0a0d1f"/>
    </linearGradient>

    <!-- Brand top bar gradient -->
    <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>

    <!-- Title text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>

    <!-- Glow for ZK nodes -->
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>

    <!-- Glass card filter -->
    <filter id="glassShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Large ambient glow background -->
    <radialGradient id="ambientLeft" cx="25%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="ambientRight" cx="78%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>

    <!-- Proof beam gradient -->
    <linearGradient id="proofBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
    </linearGradient>

    <!-- Lock icon circle grad -->
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>

    <!-- Card glass gradient -->
    <linearGradient id="cardGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>

    <!-- Ignition chip gradient -->
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.3"/>
    </linearGradient>

    <!-- Noir code badge gradient -->
    <linearGradient id="noirGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Ambient glow layers -->
  <rect width="1200" height="630" fill="url(#ambientLeft)"/>
  <rect width="1200" height="630" fill="url(#ambientRight)"/>

  <!-- Subtle dot grid pattern -->
  <pattern id="dotGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#ffffff" fill-opacity="0.025"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- ═══ TOP BRAND BAR ═══ -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#topBarGrad)"/>

  <!-- ═══ LEFT PANEL (content) ═══ -->
  <!-- degen0x Logo mark -->
  <circle cx="58" cy="50" r="18" fill="url(#lockGrad)" opacity="0.9"/>
  <text x="58" y="56" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#e0e7ff" text-anchor="middle">0x</text>
  <text x="84" y="56" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Privacy badge -->
  <rect x="52" y="80" width="160" height="26" rx="13" fill="url(#chipGrad)" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="132" y="98" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" text-anchor="middle">🔐 PRIVACY ZKROLLUP</text>

  <!-- Main title -->
  <text x="52" y="162" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="900" letter-spacing="-1.5" fill="url(#titleGrad)">Aztec Network</text>
  <text x="52" y="218" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5" fill="#e6edf3">Private Smart Contracts</text>
  <text x="52" y="252" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5" fill="#e6edf3">on Ethereum — Explained</text>

  <!-- Subtitle description -->
  <text x="52" y="294" font-family="Inter, Arial, sans-serif" font-size="16" fill="#8b949e">ZK proofs · Noir language · Ignition Chain · AZTEC token</text>

  <!-- Divider -->
  <line x1="52" y1="318" x2="490" y2="318" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Stat chips row -->
  <!-- Chip 1: Sequencers -->
  <rect x="52" y="334" width="138" height="48" rx="10" fill="url(#cardGlass)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#glassShadow)"/>
  <text x="121" y="353" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#a78bfa" text-anchor="middle">3,500+</text>
  <text x="121" y="372" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Sequencers Live</text>

  <!-- Chip 2: Provers -->
  <rect x="200" y="334" width="138" height="48" rx="10" fill="url(#cardGlass)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#glassShadow)"/>
  <text x="269" y="353" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#06b6d4" text-anchor="middle">50+</text>
  <text x="269" y="372" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Active Provers</text>

  <!-- Chip 3: TGE Gain -->
  <rect x="348" y="334" width="138" height="48" rx="10" fill="url(#cardGlass)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#glassShadow)"/>
  <text x="417" y="353" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#22c55e" text-anchor="middle">+65%</text>
  <text x="417" y="372" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">TGE 24h Price</text>

  <!-- Vitalik badge -->
  <rect x="52" y="400" width="186" height="26" rx="8" fill="rgba(79,70,229,0.15)" stroke="rgba(129,140,248,0.3)" stroke-width="1"/>
  <text x="145" y="418" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc" text-anchor="middle">⚡ Vitalik-backed project</text>

  <!-- Noir badge -->
  <rect x="248" y="400" width="160" height="26" rx="8" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="328" y="418" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#67e8f9" text-anchor="middle">🛠 Noir v1.0 Stable</text>

  <!-- degen0x.com URL -->
  <text x="52" y="560" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#6366f1">degen0x.com/learn/aztec-network-guide</text>

  <!-- ═══ DIVIDER LINE (center) ═══ -->
  <line x1="540" y1="20" x2="540" y2="610" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ═══ RIGHT PANEL — Dual State Architecture Diagram ═══ -->
  <!-- Panel label -->
  <text x="870" y="48" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle" letter-spacing="2">DUAL STATE MODEL</text>

  <!-- ── PRIVATE STATE: PXE (top) ── -->
  <!-- Glow behind PXE node -->
  <ellipse cx="760" cy="190" rx="90" ry="70" fill="url(#glowPurple)"/>

  <!-- PXE card -->
  <rect x="590" y="110" width="340" height="150" rx="16" fill="url(#cardGlass)" stroke="rgba(124,58,237,0.4)" stroke-width="1.5" filter="url(#glassShadow)"/>
  <rect x="590" y="110" width="340" height="5" rx="3" fill="url(#topBarGrad)" opacity="0.6"/>

  <!-- PXE lock icon -->
  <circle cx="636" cy="165" r="22" fill="rgba(124,58,237,0.25)" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
  <text x="636" y="172" font-family="Arial" font-size="18" text-anchor="middle">🔒</text>

  <text x="668" y="154" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#a78bfa">Private Execution Env (PXE)</text>
  <text x="668" y="172" font-family="Inter, Arial, sans-serif" font-size="12" fill="#8b949e">Runs in your browser</text>

  <!-- PXE bullet points -->
  <circle cx="626" cy="201" r="3" fill="#7c3aed"/>
  <text x="636" y="205" font-family="Inter, Arial, sans-serif" font-size="11" fill="#c4b5fd">Private state — only you see it</text>

  <circle cx="626" cy="221" r="3" fill="#7c3aed"/>
  <text x="636" y="225" font-family="Inter, Arial, sans-serif" font-size="11" fill="#c4b5fd">ZK proof generation (no trusted setup)</text>

  <circle cx="626" cy="241" r="3" fill="#7c3aed"/>
  <text x="636" y="245" font-family="Inter, Arial, sans-serif" font-size="11" fill="#c4b5fd">Noir language: Rust-inspired ZK circuits</text>

  <!-- ── PROOF TRANSMISSION ARROW ── -->
  <!-- Vertical proof beam -->
  <line x1="760" y1="265" x2="760" y2="345" stroke="url(#proofBeam)" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- ZK Proof label on beam -->
  <rect x="694" y="287" width="132" height="22" rx="11" fill="rgba(79,70,229,0.25)" stroke="rgba(129,140,248,0.4)" stroke-width="1"/>
  <text x="760" y="302" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#a5b4fc" text-anchor="middle">ZK PROOF SUBMITTED</text>

  <!-- Arrow head down -->
  <polygon points="760,348 753,335 767,335" fill="#06b6d4" opacity="0.8"/>

  <!-- ── PUBLIC STATE: AVM (bottom) ── -->
  <!-- Glow behind AVM node -->
  <ellipse cx="760" cy="455" rx="90" ry="70" fill="url(#glowCyan)"/>

  <!-- AVM card -->
  <rect x="590" y="370" width="340" height="150" rx="16" fill="url(#cardGlass)" stroke="rgba(6,182,212,0.35)" stroke-width="1.5" filter="url(#glassShadow)"/>
  <rect x="590" y="370" width="340" height="5" rx="3" fill="rgba(6,182,212,0.5)"/>

  <!-- AVM icon -->
  <circle cx="636" cy="425" r="22" fill="rgba(6,182,212,0.2)" stroke="rgba(6,182,212,0.5)" stroke-width="1.5"/>
  <text x="636" y="432" font-family="Arial" font-size="18" text-anchor="middle">🌐</text>

  <text x="668" y="415" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#67e8f9">Aztec VM (AVM)</text>
  <text x="668" y="432" font-family="Inter, Arial, sans-serif" font-size="12" fill="#8b949e">Public state — fully transparent</text>

  <!-- AVM bullet points -->
  <circle cx="626" cy="462" r="3" fill="#06b6d4"/>
  <text x="636" y="466" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a5f3fc">Protocol liquidity pools visible on-chain</text>

  <circle cx="626" cy="482" r="3" fill="#06b6d4"/>
  <text x="636" y="486" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a5f3fc">3,500+ sequencers + 50+ provers</text>

  <circle cx="626" cy="502" r="3" fill="#06b6d4"/>
  <text x="636" y="506" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a5f3fc">Ignition Chain: live Nov 2025, zero downtime</text>

  <!-- ── VS label (competitor contrast, bottom right) ── -->
  <rect x="950" y="110" width="200" height="410" rx="16" fill="url(#cardGlass)" stroke="rgba(255,255,255,0.06)" stroke-width="1" filter="url(#glassShadow)"/>
  <text x="1050" y="142" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#6e7681" text-anchor="middle" letter-spacing="1.5">VS. ALTERNATIVES</text>
  <line x1="970" y1="152" x2="1130" y2="152" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Row: Zcash -->
  <text x="970" y="185" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Zcash</text>
  <text x="970" y="202" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">Shielded txns only</text>
  <rect x="1080" y="173" width="50" height="18" rx="4" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="1105" y="186" font-family="Inter, Arial, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">No DeFi</text>

  <line x1="970" y1="220" x2="1130" y2="220" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Row: Monero -->
  <text x="970" y="248" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Monero</text>
  <text x="970" y="265" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">Default private</text>
  <rect x="1080" y="236" width="50" height="18" rx="4" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="1105" y="249" font-family="Inter, Arial, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">No SC</text>

  <line x1="970" y1="283" x2="1130" y2="283" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Row: Tornado Cash -->
  <text x="970" y="311" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Tornado Cash</text>
  <text x="970" y="328" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6e7681">Mixer only</text>
  <rect x="1080" y="299" width="50" height="18" rx="4" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="1105" y="312" font-family="Inter, Arial, sans-serif" font-size="9" fill="#f87171" text-anchor="middle">OFAC</text>

  <line x1="970" y1="346" x2="1130" y2="346" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Row: Aztec (highlighted) -->
  <rect x="960" y="358" width="180" height="70" rx="10" fill="rgba(124,58,237,0.15)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <text x="970" y="381" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#a78bfa">Aztec Network</text>
  <text x="970" y="397" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8b949e">Full smart contracts</text>
  <rect x="1080" y="362" width="50" height="18" rx="4" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="1105" y="375" font-family="Inter, Arial, sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">✓ DeFi</text>
  <rect x="1080" y="385" width="50" height="18" rx="4" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="1105" y="398" font-family="Inter, Arial, sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">✓ ZK</text>

  <!-- Noir code snippet box -->
  <rect x="960" y="440" width="180" height="72" rx="10" fill="url(#noirGrad)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="975" y="460" font-family="monospace" font-size="10" fill="#7c3aed">// Noir language</text>
  <text x="975" y="477" font-family="monospace" font-size="10" fill="#a78bfa">fn transfer_private(</text>
  <text x="975" y="492" font-family="monospace" font-size="10" fill="#c4b5fd">  amount: Field</text>
  <text x="975" y="507" font-family="monospace" font-size="10" fill="#a78bfa">) -&gt; pub bool &#123;..&#125;</text>

  <!-- ═══ BOTTOM BAR ═══ -->
  <rect x="0" y="592" width="1200" height="38" fill="rgba(0,0,0,0.3)"/>
  <line x1="0" y1="592" x2="1200" y2="592" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Bottom: logo repeat -->
  <circle cx="40" cy="611" r="12" fill="url(#lockGrad)" opacity="0.8"/>
  <text x="40" y="616" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="800" fill="#e0e7ff" text-anchor="middle">0x</text>
  <text x="62" y="617" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#8b949e">degen0x.com</text>

  <!-- Bottom center tag -->
  <text x="600" y="617" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7681" text-anchor="middle">The crypto resource for degens who think</text>

  <!-- Bottom right: category -->
  <rect x="1040" y="598" width="140" height="24" rx="6" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="1110" y="614" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#c4b5fd" text-anchor="middle">PRIVACY · ZKROLLUP · L2</text>
</svg>
