<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0a1128"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brand2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ethGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="countdownGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Decorative glows -->
  <ellipse cx="600" cy="200" rx="400" ry="300" fill="url(#ethGlow)" filter="url(#softGlow2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand2)"/>

  <!-- Badge: UPGRADE COUNTDOWN -->
  <rect x="60" y="50" width="230" height="30" rx="15" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1"/>
  <circle cx="78" cy="65" r="4" fill="#06b6d4">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="92" y="70" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" letter-spacing="0.08em">UPGRADE COUNTDOWN</text>

  <!-- degen0x logo -->
  <text x="1080" y="70" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#brand2)" text-anchor="end" letter-spacing="-0.02em">degen0x</text>

  <!-- Countdown number -->
  <text x="60" y="185" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="900" fill="url(#countdownGrad)" letter-spacing="-0.04em" filter="url(#glow2)">T-14 DAYS</text>

  <!-- Main title -->
  <text x="60" y="230" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Pectra: Your Wallet Gets a Brain</text>
  <text x="60" y="265" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">EIP-7702 turns every Ethereum wallet into a smart wallet — April 10, 2026</text>

  <!-- Feature cards row -->
  <!-- Card 1: Batch Transactions -->
  <rect x="60" y="300" width="260" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="332" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#e6edf3">⚡</text>
  <text x="110" y="335" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Batch Transactions</text>
  <text x="80" y="360" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Approve + swap in one click</text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">No more multi-step flows</text>
  <text x="80" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e" font-weight="600">UX BREAKTHROUGH</text>

  <!-- Card 2: Gas Flexibility -->
  <rect x="340" y="300" width="260" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="360" y="332" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#e6edf3">💰</text>
  <text x="390" y="335" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Pay Gas in Any Token</text>
  <text x="360" y="360" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">USDC, DAI, any ERC-20</text>
  <text x="360" y="380" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">No ETH balance required</text>
  <text x="360" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#06b6d4" font-weight="600">ONBOARDING FIX</text>

  <!-- Card 3: Social Recovery -->
  <rect x="620" y="300" width="260" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="640" y="332" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#e6edf3">🔑</text>
  <text x="670" y="335" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Social Recovery</text>
  <text x="640" y="360" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Trusted contacts recover keys</text>
  <text x="640" y="380" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">No more lost seed phrases</text>
  <text x="640" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b5cf6" font-weight="600">SAFETY UPGRADE</text>

  <!-- Card 4: Session Keys -->
  <rect x="900" y="300" width="240" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="920" y="332" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#e6edf3">🤖</text>
  <text x="950" y="335" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Session Keys</text>
  <text x="920" y="360" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">DeFi automation built in</text>
  <text x="920" y="380" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Spending limits per session</text>
  <text x="920" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">DEFI POWER-UP</text>

  <!-- Key stat bar -->
  <rect x="60" y="450" width="1080" height="70" rx="16" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="110" y="490" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#6366f1">11 EIPs</text>
  <text x="200" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Biggest upgrade since the Merge</text>
  <text x="460" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">•</text>
  <text x="485" y="490" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#06b6d4">EIP-7702</text>
  <text x="575" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Account abstraction at protocol level</text>
  <text x="850" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">•</text>
  <text x="875" y="490" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e">No migration</text>
  <text x="975" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Same address</text>

  <!-- CTA -->
  <rect x="60" y="540" width="280" height="45" rx="12" fill="#6366f1"/>
  <text x="95" y="568" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Full Pectra Breakdown →</text>

  <text x="380" y="568" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">degen0x.com/learn/ethereum-pectra-upgrade-guide</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="url(#brand2)">degen0x.com</text>
  <text x="1140" y="612" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Free tools • No signup • Just data</text>
</svg>