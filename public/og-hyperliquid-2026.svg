<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="60%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="hlGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="candleGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="candleRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="#06b6d4" opacity="0.05" filter="url(#glow)"/>
  <circle cx="1100" cy="450" r="140" fill="#22c55e" opacity="0.04" filter="url(#glow)"/>

  <!-- Candlestick chart visualization -->
  <g transform="translate(700, 140)">
    <!-- Candlesticks -->
    <line x1="30" y1="40" x2="30" y2="180" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <rect x="22" y="70" width="16" height="60" rx="2" fill="url(#candleGreen)"/>

    <line x1="70" y1="30" x2="70" y2="160" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <rect x="62" y="50" width="16" height="70" rx="2" fill="url(#candleGreen)"/>

    <line x1="110" y1="60" x2="110" y2="190" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <rect x="102" y="80" width="16" height="65" rx="2" fill="url(#candleRed)"/>

    <line x1="150" y1="20" x2="150" y2="150" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <rect x="142" y="40" width="16" height="80" rx="2" fill="url(#candleGreen)"/>

    <line x1="190" y1="10" x2="190" y2="130" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <rect x="182" y="25" width="16" height="65" rx="2" fill="url(#candleGreen)"/>

    <line x1="230" y1="50" x2="230" y2="170" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <rect x="222" y="70" width="16" height="55" rx="2" fill="url(#candleRed)"/>

    <line x1="270" y1="15" x2="270" y2="120" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <rect x="262" y="30" width="16" height="55" rx="2" fill="url(#candleGreen)"/>

    <line x1="310" y1="5" x2="310" y2="100" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <rect x="302" y="15" width="16" height="50" rx="2" fill="url(#candleGreen)"/>

    <line x1="350" y1="40" x2="350" y2="140" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <rect x="342" y="55" width="16" height="50" rx="2" fill="url(#candleRed)"/>

    <line x1="390" y1="0" x2="390" y2="90" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <rect x="382" y="10" width="16" height="45" rx="2" fill="url(#candleGreen)"/>

    <!-- Order book depth lines -->
    <line x1="0" y1="220" x2="420" y2="220" stroke="#30363d" stroke-width="1" opacity="0.5"/>
    <text x="0" y="245" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11">150+ Perp Markets</text>
    <text x="280" y="245" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11">Sub-second Finality</text>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="18" cy="18" r="18" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.8"/>
    <text x="18" y="24" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">0x</text>
  </g>

  <!-- Category badges -->
  <rect x="60" y="100" width="60" height="26" rx="6" fill="#6366f1" opacity="0.2"/>
  <text x="90" y="118" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">DeFi</text>
  <rect x="130" y="100" width="80" height="26" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="170" y="118" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Trading</text>

  <!-- Title -->
  <text x="60" y="190" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5">Hyperliquid</text>
  <text x="60" y="250" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="600" letter-spacing="-0.5">Perp DEX Trading &amp; HYPE</text>

  <!-- Subtitle -->
  <text x="60" y="300" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="19">L1 blockchain · 50x leverage · Zero-fee spot · 200K TPS</text>

  <!-- Key stats -->
  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="150" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="28" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11">TVL</text>
    <text x="15" y="52" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">$4.9B</text>
  </g>
  <g transform="translate(225, 340)">
    <rect x="0" y="0" width="150" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="28" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11">Monthly Traders</text>
    <text x="15" y="52" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">314K</text>
  </g>
  <g transform="translate(390, 340)">
    <rect x="0" y="0" width="150" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="15" y="28" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11">Max Leverage</text>
    <text x="15" y="52" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">50x</text>
  </g>

  <!-- HYPE token pill -->
  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="200" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="100" y="23" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">HYPE · ~$35 · #16 MCap</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">degen0x.com</text>
  <text x="1140" y="616" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14">Guide 2026</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
