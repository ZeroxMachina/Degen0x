<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1529"/>
    </linearGradient>
    <linearGradient id="brandGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f0883e"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="74%" stop-color="#f59e0b"/>
      <stop offset="74%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad2)"/>

  <!-- Decorative glows -->
  <circle cx="200" cy="315" r="300" fill="#f59e0b" opacity="0.04" filter="url(#softGlow2)"/>
  <circle cx="1000" cy="400" r="200" fill="#4f46e5" opacity="0.05" filter="url(#softGlow2)"/>

  <!-- degen0x logo -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#brandGrad2)" letter-spacing="0.05em">degen0x</text>

  <!-- Title block -->
  <text x="600" y="90" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" text-anchor="middle" letter-spacing="-0.02em">The Race to 1,000,000 BTC</text>
  <text x="600" y="125" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Strategy (fmr. MicroStrategy) — the largest corporate Bitcoin holder</text>

  <!-- Progress bar container -->
  <rect x="100" y="160" width="1000" height="60" rx="30" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Filled portion (73.87%) -->
  <rect x="104" y="164" width="735" height="52" rx="26" fill="url(#goldGrad)" opacity="0.9"/>
  <!-- Progress text inside -->
  <text x="480" y="198" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#080d1c" text-anchor="middle">738,731 BTC</text>
  <!-- Target text outside -->
  <text x="1060" y="198" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6e7681" text-anchor="end">1,000,000</text>
  <!-- Percentage badge -->
  <rect x="850" y="172" width="80" height="30" rx="15" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="890" y="193" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">73.9%</text>

  <!-- Stats grid -->
  <!-- Row 1: Strategy stats -->
  <rect x="100" y="250" width="320" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="130" y="285" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.05em">PORTFOLIO VALUE</text>
  <text x="130" y="325" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#f59e0b">~$53B</text>
  <text x="130" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Avg cost basis: $43,200/BTC</text>

  <rect x="440" y="250" width="320" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="470" y="285" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.05em">WEEKLY BUY RATE</text>
  <text x="470" y="325" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#06b6d4">6,158 BTC</text>
  <text x="470" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">~$440M per week at current prices</text>

  <rect x="780" y="250" width="320" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="810" y="285" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.05em">SUPPLY OWNERSHIP</text>
  <text x="810" y="325" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#8b5cf6">3.5%</text>
  <text x="810" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">of all BTC that will ever exist</text>

  <!-- Row 2: Institutional context -->
  <rect x="100" y="405" width="490" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="130" y="440" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.05em">INSTITUTIONAL ACCUMULATION</text>
  <text x="130" y="475" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">BlackRock IBIT: <tspan font-weight="700" fill="#22c55e">$55B+</tspan></text>
  <text x="130" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Spot BTC ETFs: <tspan font-weight="700" fill="#22c55e">$88B</tspan> (6% of supply)</text>
  <text x="130" y="525" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Weekly inflows: <tspan font-weight="700" fill="#22c55e">$1.06B</tspan> (3rd straight week)</text>

  <rect x="610" y="405" width="490" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="640" y="440" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.05em">SUPPLY SQUEEZE THESIS</text>
  <text x="640" y="475" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Miner production: <tspan font-weight="700" fill="#ef4444">~450 BTC/day</tspan></text>
  <text x="640" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Strategy buying: <tspan font-weight="700" fill="#f59e0b">~880 BTC/day</tspan></text>
  <text x="640" y="525" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Institutions absorbing supply <tspan font-weight="700" fill="#f59e0b">2x faster</tspan> than mined</text>

  <!-- Bottom bar -->
  <rect x="0" y="555" width="1200" height="75" fill="rgba(0,0,0,0.2)"/>
  <text x="600" y="590" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e" text-anchor="middle">Simulate your own BTC accumulation</text>
  <!-- CTA pill -->
  <rect x="470" y="598" width="260" height="34" rx="17" fill="rgba(79,70,229,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="600" y="621" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">degen0x.com/tools/dca-calculator</text>
</svg>