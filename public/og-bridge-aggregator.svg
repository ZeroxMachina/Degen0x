<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Top gradient bar -->
  <rect width="1200" height="8" fill="url(#topGradient)"/>

  <!-- Decorative circles background -->
  <circle cx="100" cy="100" r="110" fill="#0891b2" opacity="0.08"/>
  <circle cx="950" cy="500" r="130" fill="#4f46e5" opacity="0.08"/>

  <!-- Logo area -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">
    degen0x
  </text>

  <!-- Main title -->
  <text x="40" y="150" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Cross-Chain Bridge
  </text>
  <text x="40" y="215" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Aggregator
  </text>

  <!-- Subtitle -->
  <text x="40" y="270" font-family="Inter, sans-serif" font-size="22" fill="#8b949e">
    Find the cheapest bridge route for any token
  </text>

  <!-- Network visualization on right side -->
  <g opacity="0.85" filter="url(#glow)">
    <!-- Connecting lines -->
    <line x1="820" y1="140" x2="900" y2="180" stroke="#0891b2" stroke-width="2" opacity="0.6"/>
    <line x1="900" y1="180" x2="980" y2="140" stroke="#4f46e5" stroke-width="2" opacity="0.6"/>
    <line x1="820" y1="140" x2="900" y2="220" stroke="#d97706" stroke-width="2" opacity="0.5"/>
    <line x1="900" y1="220" x2="980" y2="180" stroke="#0891b2" stroke-width="2" opacity="0.6"/>
    <line x1="900" y1="180" x2="950" y2="260" stroke="#4f46e5" stroke-width="2" opacity="0.5"/>

    <!-- Central node -->
    <circle cx="900" cy="180" r="28" fill="url(#nodeGradient)" stroke="#0891b2" stroke-width="2"/>
    <circle cx="900" cy="180" r="24" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.5"/>

    <!-- Chain nodes -->
    <circle cx="820" cy="140" r="20" fill="#4f46e5" stroke="#0891b2" stroke-width="2" opacity="0.8"/>
    <circle cx="980" cy="140" r="20" fill="#0891b2" stroke="#4f46e5" stroke-width="2" opacity="0.8"/>
    <circle cx="820" cy="220" r="20" fill="#d97706" stroke="#4f46e5" stroke-width="2" opacity="0.7"/>
    <circle cx="980" cy="220" r="20" fill="#4f46e5" stroke="#0891b2" stroke-width="2" opacity="0.8"/>
    <circle cx="950" cy="280" r="20" fill="#0891b2" stroke="#4f46e5" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Bottom branding -->
  <text x="40" y="595" font-family="Inter, sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">
    degen0x.com
  </text>

  <!-- Accent line -->
  <line x1="40" y1="300" x2="150" y2="300" stroke="url(#topGradient)" stroke-width="3" stroke-linecap="round"/>
</svg>