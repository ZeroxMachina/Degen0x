<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>

    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f22;stop-opacity:1" />
    </linearGradient>

    <!-- Top accent bar gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Glow blur filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="120" cy="180" r="85" fill="#06b6d4" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1080" cy="520" r="125" fill="#06b6d4" opacity="0.08" filter="url(#glow)"/>
  <circle cx="600" cy="-50" r="155" fill="#4f46e5" opacity="0.06" filter="url(#glow)"/>

  <!-- Logo text -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#4f46e5" letter-spacing="2">
    degen0x
  </text>

  <!-- Category badge -->
  <rect x="40" y="80" width="130" height="40" rx="20" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="2"/>
  <text x="105" y="105" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#06b6d4" text-anchor="middle">
    Layer 2
  </text>

  <!-- Main title -->
  <text x="40" y="200" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    Citrea: Bitcoin
  </text>
  <text x="40" y="265" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    ZK Rollup Guide
  </text>

  <!-- Subtitle -->
  <text x="40" y="320" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#8b949e">
    Zero-knowledge proofs meet Bitcoin — scaling BTC with validity rollups
  </text>

  <!-- Right panel background -->
  <rect x="750" y="100" width="430" height="470" rx="20" fill="rgba(6, 182, 212, 0.05)" stroke="rgba(6, 182, 212, 0.2)" stroke-width="1"/>

  <!-- Right panel title -->
  <text x="780" y="140" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">
    Architecture Flow
  </text>

  <!-- Architecture diagram -->
  <!-- Bitcoin box -->
  <rect x="780" y="165" width="100" height="60" rx="8" fill="rgba(249, 115, 22, 0.15)" stroke="rgba(249, 115, 22, 0.4)" stroke-width="2"/>
  <text x="830" y="190" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle">Bitcoin</text>
  <text x="830" y="212" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#8b949e" text-anchor="middle">Layer 1</text>

  <!-- Arrow 1 -->
  <line x1="885" y1="195" x2="920" y2="195" stroke="rgba(6, 182, 212, 0.5)" stroke-width="2"/>
  <polygon points="920,195 915,191 915,199" fill="rgba(6, 182, 212, 0.5)"/>

  <!-- ZK Proof box -->
  <rect x="925" y="165" width="105" height="60" rx="8" fill="rgba(6, 182, 212, 0.15)" stroke="rgba(6, 182, 212, 0.4)" stroke-width="2"/>
  <text x="977.5" y="190" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#06b6d4" text-anchor="middle">ZK Proof</text>
  <text x="977.5" y="212" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#8b949e" text-anchor="middle">Verify</text>

  <!-- Arrow 2 -->
  <line x1="1035" y1="195" x2="1070" y2="195" stroke="rgba(6, 182, 212, 0.5)" stroke-width="2"/>
  <polygon points="1070,195 1065,191 1065,199" fill="rgba(6, 182, 212, 0.5)"/>

  <!-- Citrea L2 box -->
  <rect x="1075" y="165" width="105" height="60" rx="8" fill="rgba(79, 70, 229, 0.15)" stroke="rgba(79, 70, 229, 0.4)" stroke-width="2"/>
  <text x="1127.5" y="190" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#4f46e5" text-anchor="middle">Citrea L2</text>
  <text x="1127.5" y="212" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#8b949e" text-anchor="middle">Scaling</text>

  <!-- Key benefits section -->
  <g>
    <text x="780" y="260" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="white">Key Features:</text>

    <!-- Feature 1 -->
    <rect x="780" y="275" width="360" height="45" rx="6" fill="rgba(79, 70, 229, 0.08)"/>
    <circle cx="800" cy="297" r="3" fill="#06b6d4"/>
    <text x="820" y="300" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Validity Rollups with ZK proofs</text>

    <!-- Feature 2 -->
    <rect x="780" y="330" width="360" height="45" rx="6" fill="rgba(79, 70, 229, 0.08)"/>
    <circle cx="800" cy="352" r="3" fill="#06b6d4"/>
    <text x="820" y="355" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#8b949e">High throughput & low fees</text>

    <!-- Feature 3 -->
    <rect x="780" y="385" width="360" height="45" rx="6" fill="rgba(79, 70, 229, 0.08)"/>
    <circle cx="800" cy="407" r="3" fill="#06b6d4"/>
    <text x="820" y="410" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Bitcoin security inheritance</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(6, 182, 212, 0.1)" stroke="rgba(6, 182, 212, 0.2)" stroke-width="1"/>
  <text x="40" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8b949e">
    degen0x.com
  </text>
  <text x="1160" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#06b6d4" text-anchor="end">
    Learn Crypto
  </text>
</svg>
