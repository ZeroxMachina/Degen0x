<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="200" fill="#6366f1" opacity="0.04"/>
  <circle cx="300" cy="500" r="120" fill="#06b6d4" opacity="0.03"/>
  <circle cx="1100" cy="450" r="80" fill="#f59e0b" opacity="0.03"/>

  <!-- Logo -->
  <text x="60" y="58" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Main title -->
  <text x="60" y="200" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Token Launch Radar</text>
  <text x="60" y="260" font-family="Inter, -apple-system, sans-serif" font-size="38" font-weight="800" fill="url(#accent)" letter-spacing="-0.02em">Track New Token Launches</text>

  <!-- Subtitle -->
  <text x="60" y="310" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#8b949e">Real-time launches across Ethereum, Solana, Base, Arbitrum &amp; BNB</text>

  <!-- Radar visual element -->
  <g transform="translate(820, 120)">
    <circle cx="140" cy="140" r="130" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
    <circle cx="140" cy="140" r="95" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
    <circle cx="140" cy="140" r="60" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.1"/>
    <line x1="140" y1="10" x2="140" y2="270" stroke="#6366f1" stroke-width="0.5" opacity="0.15"/>
    <line x1="10" y1="140" x2="270" y2="140" stroke="#6366f1" stroke-width="0.5" opacity="0.15"/>
    <!-- Sweep line -->
    <line x1="140" y1="140" x2="250" y2="60" stroke="#6366f1" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
    <!-- Token dots -->
    <circle cx="180" cy="80" r="6" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="100" cy="120" r="5" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="200" cy="170" r="7" fill="#f59e0b" filter="url(#glow)"/>
    <circle cx="90" cy="200" r="4" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="220" cy="130" r="5" fill="#ef4444" filter="url(#glow)"/>
  </g>

  <!-- Glass stats card -->
  <rect x="60" y="370" width="520" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <g transform="translate(90, 395)">
    <text font-family="Inter, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.05em">CHAINS</text>
    <text y="28" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#6366f1">5+</text>
  </g>
  <line x1="210" y1="390" x2="210" y2="450" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <g transform="translate(240, 395)">
    <text font-family="Inter, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.05em">RISK SCORES</text>
    <text y="28" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#22c55e">Live</text>
  </g>
  <line x1="390" y1="390" x2="390" y2="450" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <g transform="translate(420, 395)">
    <text font-family="Inter, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.05em">AUDITS</text>
    <text y="28" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#f59e0b">Verified</text>
  </g>

  <!-- Bottom bar -->
  <rect y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="624" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="624" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#6e7681">Free · No Sign-up Required</text>
</svg>