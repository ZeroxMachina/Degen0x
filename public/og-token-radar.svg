<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e6ed;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="150" cy="100" r="80" fill="#22c55e" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1050" cy="500" r="120" fill="#22c55e" opacity="0.06" filter="url(#glow)"/>
  <circle cx="900" cy="120" r="60" fill="#d97706" opacity="0.07" filter="url(#glow)"/>

  <!-- Category badge -->
  <rect x="60" y="60" width="200" height="40" rx="20" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="87" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#22c55e" text-anchor="middle">NEW TOKENS</text>

  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="url(#titleGradient)">Token Launch Radar</text>

  <!-- Subtitle -->
  <text x="60" y="210" font-family="system-ui, sans-serif" font-size="20" fill="#8b949e">Track upcoming &amp; recently launched tokens</text>

  <!-- Visualization: Radar/bullseye with dots -->
  <g>
    <!-- Chart background -->
    <rect x="750" y="80" width="400" height="400" rx="12" fill="#0a1427" opacity="0.5" stroke="#1e293b" stroke-width="1"/>

    <!-- Radar circles -->
    <circle cx="950" cy="280" r="100" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.6"/>
    <circle cx="950" cy="280" r="65" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
    <circle cx="950" cy="280" r="30" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.4"/>

    <!-- Crosshairs -->
    <line x1="850" y1="280" x2="1050" y2="280" stroke="#1e293b" stroke-width="1" opacity="0.4"/>
    <line x1="950" y1="180" x2="950" y2="380" stroke="#1e293b" stroke-width="1" opacity="0.4"/>

    <!-- Token dots (recently launched in center) -->
    <circle cx="950" cy="280" r="6" fill="#22c55e" opacity="0.9" filter="url(#glow)"/>
    <text x="960" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#22c55e">NEW</text>

    <!-- Upcoming tokens (outer rings) -->
    <circle cx="1000" cy="250" r="5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="970" cy="310" r="5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="920" cy="300" r="5" fill="#06b6d4" opacity="0.75"/>
    <circle cx="900" cy="250" r="5" fill="#06b6d4" opacity="0.7"/>

    <!-- Hot candidates (expanding ring) -->
    <circle cx="1020" cy="200" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="950" cy="150" r="4" fill="#f59e0b" opacity="0.75"/>
    <circle cx="880" cy="190" r="4" fill="#f59e0b" opacity="0.7"/>

    <!-- Legend -->
    <circle cx="780" y="340" r="4" fill="#22c55e" opacity="0.9"/>
    <text x="795" y="345" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Recently Launched</text>

    <circle cx="780" y="365" r="4" fill="#06b6d4" opacity="0.8"/>
    <text x="795" y="370" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Upcoming</text>

    <circle cx="780" y="390" r="4" fill="#f59e0b" opacity="0.8"/>
    <text x="795" y="395" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Hot Candidates</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0a1427" opacity="0.6"/>
  <circle cx="60" cy="615" r="10" fill="#6366f1"/>
  <text x="75" y="621" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">degen0x.com</text>

  <!-- Decorative accent elements -->
  <circle cx="1180" cy="615" r="8" fill="#22c55e" opacity="0.3"/>
  <circle cx="1150" cy="615" r="6" fill="#4f46e5" opacity="0.25"/>
</svg>
