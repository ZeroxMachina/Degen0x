<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>

    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f22;stop-opacity:1" />
    </linearGradient>

    <!-- Top accent bar gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Glow blur filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow -->
    <filter id="subtleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="100" cy="150" r="80" fill="#4f46e5" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1100" cy="500" r="120" fill="#0891b2" opacity="0.08" filter="url(#glow)"/>
  <circle cx="600" cy="-50" r="150" fill="#d97706" opacity="0.06" filter="url(#glow)"/>

  <!-- Logo text -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#4f46e5" letter-spacing="2">
    degen0x
  </text>

  <!-- Category badge -->
  <rect x="40" y="80" width="130" height="40" rx="20" fill="#d97706" opacity="0.2" stroke="#d97706" stroke-width="2"/>
  <text x="105" y="105" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#d97706" text-anchor="middle">
    Trading
  </text>

  <!-- Main title -->
  <text x="40" y="200" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    Crypto Leverage
  </text>
  <text x="40" y="265" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    Trading Guide 2026
  </text>

  <!-- Subtitle -->
  <text x="40" y="320" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#8b949e">
    Master margin trading, perpetual futures, and leverage strategies
  </text>

  <!-- Right panel background -->
  <rect x="750" y="100" width="430" height="470" rx="20" fill="rgba(79, 70, 229, 0.05)" stroke="rgba(79, 70, 229, 0.2)" stroke-width="1"/>

  <!-- Right panel title -->
  <text x="780" y="140" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">
    Leverage Multipliers
  </text>

  <!-- Leverage items -->
  <!-- 2x -->
  <rect x="780" y="160" width="360" height="45" rx="8" fill="rgba(34, 197, 94, 0.1)" stroke="rgba(34, 197, 94, 0.3)" stroke-width="1"/>
  <text x="800" y="190" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">2x</text>
  <text x="900" y="190" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Low Risk</text>
  <rect x="1050" y="172" width="80" height="21" rx="4" fill="rgba(34, 197, 94, 0.2)"/>
  <text x="1090" y="186" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">Safe</text>

  <!-- 5x -->
  <rect x="780" y="215" width="360" height="45" rx="8" fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.2)" stroke-width="1"/>
  <text x="800" y="245" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">5x</text>
  <text x="900" y="245" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Moderate Risk</text>
  <rect x="1050" y="227" width="80" height="21" rx="4" fill="rgba(34, 197, 94, 0.15)"/>
  <text x="1090" y="241" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">Good</text>

  <!-- 10x -->
  <rect x="780" y="270" width="360" height="45" rx="8" fill="rgba(234, 179, 8, 0.08)" stroke="rgba(234, 179, 8, 0.2)" stroke-width="1"/>
  <text x="800" y="300" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">10x</text>
  <text x="900" y="300" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">High Risk</text>
  <rect x="1050" y="282" width="80" height="21" rx="4" fill="rgba(234, 179, 8, 0.2)"/>
  <text x="1090" y="296" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#eab308" text-anchor="middle">Risky</text>

  <!-- 25x -->
  <rect x="780" y="325" width="360" height="45" rx="8" fill="rgba(239, 68, 68, 0.08)" stroke="rgba(239, 68, 68, 0.2)" stroke-width="1"/>
  <text x="800" y="355" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">25x</text>
  <text x="900" y="355" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Very High Risk</text>
  <rect x="1050" y="337" width="80" height="21" rx="4" fill="rgba(239, 68, 68, 0.2)"/>
  <text x="1090" y="351" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Extreme</text>

  <!-- 50x+ -->
  <rect x="780" y="380" width="360" height="45" rx="8" fill="rgba(220, 38, 38, 0.1)" stroke="rgba(220, 38, 38, 0.3)" stroke-width="1"/>
  <text x="800" y="410" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">50x - 100x</text>
  <text x="950" y="410" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#8b949e">Liquidation Risk</text>
  <rect x="1050" y="392" width="80" height="21" rx="4" fill="rgba(220, 38, 38, 0.3)"/>
  <text x="1090" y="406" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#dc2626" text-anchor="middle">Danger</text>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(79, 70, 229, 0.1)" stroke="rgba(79, 70, 229, 0.2)" stroke-width="1"/>
  <text x="40" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8b949e">
    degen0x.com
  </text>
  <text x="1160" y="620" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#4f46e5" text-anchor="end">
    Learn Crypto
  </text>
</svg>
