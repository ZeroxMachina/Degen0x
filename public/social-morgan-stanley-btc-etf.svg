<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#4f46e5" opacity="0.06"/>
  <circle cx="150" cy="500" r="120" fill="#0891b2" opacity="0.05"/>
  <circle cx="900" cy="450" r="100" fill="#d97706" opacity="0.04"/>

  <!-- INSTITUTIONAL badge -->
  <rect x="60" y="50" width="180" height="32" rx="16" fill="#22c55e" opacity="0.15"/>
  <text x="150" y="71" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="1.5">INSTITUTIONAL</text>

  <!-- Main title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Morgan Stanley Filed</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#accent)" letter-spacing="-0.02em">Spot BTC ETF S-1</text>

  <!-- Subtitle -->
  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">First major US bank pursuing direct Bitcoin exposure</text>

  <!-- Stats row - glass cards -->
  <!-- Card 1: ETF Inflows -->
  <rect x="60" y="300" width="320" height="120" rx="16" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-transform="uppercase" letter-spacing="1">SPOT ETF INFLOWS</text>
  <text x="80" y="385" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e" filter="url(#glow)">6 Days Straight</text>
  <text x="80" y="408" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">$201M on Mar 16 alone</text>

  <!-- Card 2: BTC Price -->
  <rect x="420" y="300" width="320" height="120" rx="16" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="440" y="340" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="1">BTC PRICE</text>
  <text x="440" y="385" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#f59e0b" filter="url(#glow)">$70,600</text>
  <text x="440" y="408" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">+2% monthly | 7 days to March close</text>

  <!-- Card 3: Fear & Greed -->
  <rect x="780" y="300" width="320" height="120" rx="16" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="800" y="340" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="1">FEAR &amp; GREED</text>
  <text x="800" y="385" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#ef4444" filter="url(#glow)">27</text>
  <text x="860" y="385" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#8b949e">Fear</text>
  <text x="800" y="408" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">48-day extreme streak broken</text>

  <!-- Stablecoin ATH callout -->
  <rect x="60" y="450" width="500" height="50" rx="12" fill="white" opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="80" y="481" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#06b6d4">Stablecoin Supply: </text>
  <text x="248" y="481" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e">$312B ATH</text>
  <text x="370" y="481" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681"> — Historically precedes rallies</text>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="white" opacity="0.02"/>
  <rect x="0" y="540" width="1200" height="1" fill="white" opacity="0.06"/>

  <!-- Logo area -->
  <circle cx="90" cy="585" r="22" fill="#4f46e5" opacity="0.3"/>
  <text x="90" y="592" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#818cf8" text-anchor="middle">0x</text>
  <text x="125" y="591" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">degen0x.com</text>

  <!-- CTA -->
  <text x="1140" y="591" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="end">Free ETF guide → /learn/bitcoin-etf-guide</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>