  <text x="712" y="337" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">GHO</text>
  <text x="712" y="355" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="400" fill="#6e7681" text-anchor="middle">Stablecoin</text>
