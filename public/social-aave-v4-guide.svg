<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- BG gradient — indigo-leaning for DeFi -->
    <linearGradient id="bgG" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07091a"/>
      <stop offset="55%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#090b1e"/>
    </linearGradient>
    <!-- Brand top bar gradient -->
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Title gradient — indigo/purple -->
    <linearGradient id="titleG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Hub glow -->
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- Ambient indigo orb left -->
    <radialGradient id="leftOrb" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <!-- Ambient cyan orb right -->
    <radialGradient id="rightOrb" cx="70%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <!-- Spoke connector gradient -->
    <linearGradient id="spokeG1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="spokeG2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgG)"/>

  <!-- Ambient orbs -->
  <ellipse cx="280" cy="320" rx="360" ry="300" fill="url(#leftOrb)"/>
  <ellipse cx="1000" cy="320" rx="300" ry="260" fill="url(#rightOrb)"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.022)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.022)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#topBar)"/>

  <!-- degen0x logo (top left) -->
  <circle cx="52" cy="40" r="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
  <text x="52" y="46" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#818cf8" text-anchor="middle" letter-spacing="-0.5">0x</text>
  <text x="79" y="46" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#e6edf3" letter-spacing="-0.3">degen<tspan fill="#6366f1">0x</tspan></text>

