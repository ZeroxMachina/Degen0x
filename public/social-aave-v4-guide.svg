  <rect x="1042" y="22" width="133" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="1108" y="43" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="1.5">DEFI GUIDE</text>

