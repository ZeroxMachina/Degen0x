  <text x="1038" y="183" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#06b6d4" text-anchor="middle">Arbitrum</text>
  <text x="1038" y="200" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="400" fill="#6e7681" text-anchor="middle">L2 spoke</text>

  <!-- Right: Base -->
  <rect x="1068" y="312" width="80" height="56" rx="10" fill="rgba(34,197,94,0.07)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="1108" y="337" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">Base</text>
  <text x="1108" y="355" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="400" fill="#6e7681" text-anchor="middle">L2 spoke</text>

  <!-- Bottom-right: Horizon RWA -->
  <rect x="990" y="460" width="96" height="60" rx="10" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="1038" y="484" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">Horizon</text>
  <text x="1038" y="502" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="400" fill="#6e7681" text-anchor="middle">RWA / T-bills</text>

  <!-- Bottom: Polygon -->
  <rect x="858" y="462" width="94" height="60" rx="10" fill="rgba(139,92,246,0.07)" stroke="rgba(139,92,246,0.22)" stroke-width="1"/>
  <text x="905" y="487" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">Polygon</text>
  <text x="905" y="505" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="400" fill="#6e7681" text-anchor="middle">L2 spoke</text>

