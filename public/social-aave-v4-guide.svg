  <text x="68" y="186" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="900" fill="url(#titleG)" letter-spacing="-2">Aave v4</text>
  <text x="68" y="248" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#e6edf3" letter-spacing="-1.2">Hub &amp; Spoke</text>
  <text x="68" y="295" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#e6edf3" letter-spacing="-1.2">Rewrites DeFi Lending</text>

