  <text x="152" y="413" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#a78bfa" text-anchor="middle" letter-spacing="-0.8">$20B+</text>

  <!-- Markets badge -->
  <rect x="250" y="368" width="168" height="56" rx="12" fill="rgba(6,182,212,0.07)" stroke="rgba(6,182,212,0.18)" stroke-width="1.5"/>
  <text x="334" y="390" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#06b6d4" text-anchor="middle" letter-spacing="1">CHAINS</text>
  <text x="334" y="413" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#06b6d4" text-anchor="middle" letter-spacing="-0.8">30+</text>

  <!-- GHO badge -->
  <rect x="432" y="368" width="168" height="56" rx="12" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.18)" stroke-width="1.5"/>
