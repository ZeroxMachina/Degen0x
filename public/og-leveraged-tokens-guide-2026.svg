<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad1)"/>
  <rect width="1200" height="8" fill="url(#gradAccent1)"/>

  <!-- decorative circles -->
  <circle cx="180" cy="160" r="50" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.25"/>
  <circle cx="1080" cy="530" r="55" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.2"/>
  <circle cx="1100" cy="140" r="35" fill="none" stroke="#0891b2" stroke-width="1" opacity="0.15"/>

  <!-- decorative leverage symbols (upward arrows and multiplier x) -->
  <g opacity="0.3">
    <!-- upward arrow 1 -->
    <line x1="950" y1="500" x2="950" y2="380" stroke="#4f46e5" stroke-width="2.5"/>
    <polygon points="950,370 945,385 955,385" fill="#4f46e5"/>
    <!-- upward arrow 2 -->
    <line x1="1000" y1="530" x2="1000" y2="400" stroke="#0891b2" stroke-width="2.5"/>
    <polygon points="1000,390 995,405 1005,405" fill="#0891b2"/>
    <!-- multiplier symbol x -->
    <text x="1050" y="480" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#d97706" opacity="0.4">×</text>
  </g>

  <!-- badge -->
  <text x="80" y="120" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#06b6d4" opacity="0.9">DeFi TRADING</text>

  <!-- title -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Leveraged Tokens</text>
  <text x="80" y="310" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Guide 2026</text>

  <!-- subtitle -->
  <text x="80" y="370" font-family="Inter, sans-serif" font-size="17" fill="#8b949e">How 2x and 3x leveraged crypto tokens work, risks &amp; strategies</text>

  <!-- degen0x branding -->
  <text x="1120" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end" opacity="0.8">degen0x.com</text>

  <!-- bottom gradient line -->
  <rect y="622" width="1200" height="8" fill="url(#gradAccent1)" opacity="0.5"/>
</svg>