<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flameShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-opacity="0.6" flood-color="#d97706"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Decorative gradient shapes -->
  <ellipse cx="150" cy="150" rx="240" ry="200" fill="url(#accentGrad)" opacity="0.06"/>
  <ellipse cx="1050" cy="500" rx="260" ry="240" fill="url(#accentGrad)" opacity="0.05"/>

  <!-- Glass-morphism panel -->
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="#ffffff" opacity="0.04" stroke="url(#accentGrad)" stroke-width="1" opacity-stroke="0.2"/>

  <!-- Large flame icon (left side) -->
  <g transform="translate(150, 180)" filter="url(#flameShadow)">
    <!-- Flame outer -->
    <path d="M 25 80 Q 10 60 10 40 Q 10 20 25 10 Q 35 0 40 10 Q 50 20 50 40 Q 50 60 35 80 Q 30 85 25 80 Z" fill="url(#flameGrad)" filter="url(#glow)"/>
    <!-- Flame inner highlight -->
    <path d="M 25 70 Q 18 55 18 40 Q 18 28 25 20 Q 30 15 33 20 Q 40 28 40 40 Q 40 55 33 70 Q 30 75 25 70 Z" fill="#fbbf24" opacity="0.8" filter="url(#glow)"/>
  </g>

  <!-- Streak counter visualization (center-bottom area) -->
  <g transform="translate(350, 280)">
    <!-- Ascending bars showing progression -->
    <!-- Bar 1 -->
    <rect x="0" y="60" width="40" height="20" rx="4" fill="url(#accentGrad)" opacity="0.6"/>
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Day 1</text>

    <!-- Bar 2 -->
    <rect x="60" y="50" width="40" height="30" rx="4" fill="url(#accentGrad)" opacity="0.7" filter="url(#glow)"/>
    <text x="80" y="105" font-family="Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Day 2</text>

    <!-- Bar 3 -->
    <rect x="120" y="35" width="40" height="45" rx="4" fill="url(#accentGrad)" opacity="0.8" filter="url(#glow)"/>
    <text x="140" y="105" font-family="Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Day 3</text>

    <!-- Bar 4 -->
    <rect x="180" y="15" width="40" height="65" rx="4" fill="url(#flameGrad)" filter="url(#glow)"/>
    <text x="200" y="105" font-family="Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Day 4</text>

    <!-- Star on top of current -->
    <polygon points="200,0 206,-12 218,-12 209,-5 213,-18 200,-10 187,-18 191,-5 182,-12 194,-12" fill="#fbbf24" filter="url(#glow)"/>
  </g>

  <!-- Streak counter badge -->
  <g transform="translate(750, 250)">
    <rect x="0" y="0" width="280" height="100" rx="15" fill="#ffffff" opacity="0.06" stroke="url(#accentGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="140" y="35" font-family="Arial, sans-serif" font-size="28" fill="#fbbf24" text-anchor="middle" font-weight="bold">🔥 Current Streak</text>
    <text x="140" y="70" font-family="Arial, sans-serif" font-size="48" fill="url(#flameGrad)" text-anchor="middle" font-weight="bold">42</text>
  </g>

  <!-- Main title -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    Streak Tracker
  </text>

  <!-- Subtitle -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" fill="#8b949e" text-anchor="middle">
    Build your daily streak. Never break the chain.
  </text>

  <!-- degen0x.com text -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle" opacity="0.8">
    degen0x.com
  </text>

  <!-- Accent line -->
  <line x1="250" y1="350" x2="950" y2="350" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
</svg>