<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" fill="none">
  <defs>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- The icon: "0" with "x" inside, scaled to 56x56 centered at y=40 -->
  <!-- The "0" oval ring -->
  <ellipse cx="40" cy="40" rx="27" ry="32"
    stroke="url(#strokeGrad)" stroke-width="5.5"
    fill="none" filter="url(#glow)"/>

  <!-- The "x" inside -->
  <line x1="22" y1="22" x2="58" y2="58"
    stroke="url(#xGrad)" stroke-width="4.5"
    stroke-linecap="round" filter="url(#glow)"/>
  <line x1="58" y1="22" x2="22" y2="58"
    stroke="url(#xGrad)" stroke-width="4.5"
    stroke-linecap="round" filter="url(#glow)"/>

  <!-- Center dot -->
  <circle cx="40" cy="40" r="2.5" fill="#e0e7ff"/>

  <!-- "degen" text -->
  <text x="90" y="54"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="42" font-weight="800" letter-spacing="-1.5"
    fill="url(#textGrad)" filter="url(#glow)">degen</text>

  <!-- "0x" suffix in accent color — slightly smaller, tight kerning -->
  <text x="307" y="54"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="42" font-weight="800" letter-spacing="-1"
    fill="#6366f1" filter="url(#glow)">0x</text>
</svg>
