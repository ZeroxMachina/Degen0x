<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="barAave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="barMorpho" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="barCompound" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="barFluid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="barSpark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="180" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1080" cy="420" r="120" fill="#06b6d4" opacity="0.05" filter="url(#glow)"/>
  <circle cx="120" cy="520" r="100" fill="#22c55e" opacity="0.04" filter="url(#glow)"/>

  <!-- Logo area -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="95" width="80" height="26" rx="13" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="100" y="113" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#6366f1" text-anchor="middle">DeFi</text>

  <rect x="150" y="95" width="100" height="26" rx="13" fill="#06b6d420" stroke="#06b6d440" stroke-width="1"/>
  <text x="200" y="113" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#06b6d4" text-anchor="middle">Lending</text>

  <rect x="260" y="95" width="120" height="26" rx="13" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
  <text x="320" y="113" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">Comparison</text>

  <!-- Main title -->
  <text x="60" y="185" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="url(#titleGrad)" letter-spacing="-0.02em">DeFi Lending Comparison 2026</text>
  <text x="60" y="235" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#8b949e" letter-spacing="-0.01em">Aave V4 vs Morpho vs Compound vs Fluid</text>

  <!-- Subtitle -->
  <text x="60" y="280" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#6e7681">Rates, architecture, risks, TVL, and strategic guidance</text>

  <!-- Protocol TVL bars -->
  <!-- Aave -->
  <rect x="60" y="316" width="650" height="38" rx="7" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="62" y="318" width="580" height="34" rx="5" fill="url(#barAave)" opacity="0.85"/>
  <text x="78" y="341" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white">Aave V4 — $40B+ TVL</text>

  <!-- Morpho -->
  <rect x="60" y="362" width="650" height="38" rx="7" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="62" y="364" width="84" height="34" rx="5" fill="url(#barMorpho)" opacity="0.85"/>
  <text x="158" y="387" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#06b6d4">Morpho Blue — $5.8B TVL</text>

  <!-- Compound -->
  <rect x="60" y="408" width="650" height="38" rx="7" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="62" y="410" width="44" height="34" rx="5" fill="url(#barCompound)" opacity="0.85"/>
  <text x="118" y="433" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e">Compound V3 — $3B+ TVL</text>

  <!-- Fluid -->
  <rect x="60" y="454" width="650" height="38" rx="7" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="62" y="456" width="28" height="34" rx="5" fill="url(#barFluid)" opacity="0.85"/>
  <text x="102" y="479" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">Fluid — $1.9B TVL</text>

  <!-- Right side stats card -->
  <rect x="760" y="316" width="380" height="176" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="780" y="348" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">TOTAL DeFi LENDING</text>
  <text x="780" y="390" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="900" fill="#e6edf3">$45B+</text>
  <text x="780" y="418" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">across 5 major protocols</text>
  <text x="780" y="450" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e" font-weight="600">$1T+ cumulative loans</text>
  <text x="780" y="475" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Supply rates: 2-8% stablecoins</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="560" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="602" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="602" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">12 min read · Updated March 2026</text>
</svg>