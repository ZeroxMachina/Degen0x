<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Decorative Blink-inspired elements -->
  <rect x="120" y="120" width="100" height="100" fill="none" stroke="#4f46e5" stroke-width="2" rx="10" opacity="0.3"/>
  <rect x="140" y="140" width="60" height="60" fill="none" stroke="#4f46e5" stroke-width="1" rx="5" opacity="0.2"/>

  <!-- Action flow visualization -->
  <line x1="280" y1="170" x2="380" y2="170" stroke="#0891b2" stroke-width="2" opacity="0.5"/>
  <polygon points="380,170 395,165 395,175" fill="#0891b2" opacity="0.5"/>

  <circle cx="950" cy="450" r="65" fill="none" stroke="#d97706" stroke-width="2" opacity="0.3"/>
  <circle cx="950" cy="450" r="40" fill="none" stroke="#d97706" stroke-width="1" opacity="0.15"/>

  <!-- Title -->
  <text x="600" y="280" font-family="Inter, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">
    Solana Blinks & Actions
  </text>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" fill="#8b949e">
    Interactive Web3 Transactions and Governance
  </text>

  <!-- Footer branding -->
  <text x="1150" y="600" font-family="Inter, sans-serif" font-size="16" text-anchor="end" fill="#6e7681">
    degen0x.com
  </text>

  <!-- Small decorative elements -->
  <circle cx="250" cy="500" r="4" fill="#4f46e5" opacity="0.6"/>
  <circle cx="900" cy="150" r="4" fill="#0891b2" opacity="0.5"/>
  <circle cx="500" cy="550" r="4" fill="#d97706" opacity="0.5"/>
  <rect x="1050" y="280" width="50" height="50" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.2" rx="5"/>
</svg>