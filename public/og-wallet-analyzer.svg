<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#080d1c"/>
  <rect y="0" width="1200" height="4" fill="url(#grad1)"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="500" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="950" cy="300" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <circle cx="80" cy="60" r="20" fill="#6366f1" opacity="0.8"/>
  <text x="108" y="68" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">degen0x</text>
  <rect x="60" y="180" width="80" height="30" rx="8" fill="#f59e0b" opacity="0.2"/>
  <text x="72" y="200" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">TOOLS</text>
  <text x="60" y="260" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-1">Wallet Analyzer</text>
  <text x="60" y="310" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="22">Analyze any wallet's holdings, PnL, and on-chain activity</text>
