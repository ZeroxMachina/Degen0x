  <circle cx="980" cy="280" r="80" fill="none" stroke="#6366f1" stroke-width="20" stroke-dasharray="125 378" stroke-dashoffset="0"/>
  <circle cx="980" cy="280" r="80" fill="none" stroke="#06b6d4" stroke-width="20" stroke-dasharray="100 403" stroke-dashoffset="-125"/>
  <circle cx="980" cy="280" r="80" fill="none" stroke="#f59e0b" stroke-width="20" stroke-dasharray="80 423" stroke-dashoffset="-225"/>
  <circle cx="980" cy="280" r="80" fill="none" stroke="#22c55e" stroke-width="20" stroke-dasharray="198 305" stroke-dashoffset="-305"/>
  <!-- Labels -->
  <circle cx="860" y="395" r="5" fill="#6366f1"/><text x="872" y="400" fill="#8b949e" font-size="12" font-family="Inter, sans-serif">ETH 25%</text>
  <circle cx="940" cy="395" r="5" fill="#06b6d4"/><text x="952" y="400" fill="#8b949e" font-size="12" font-family="Inter, sans-serif">BTC 20%</text>
