<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="pie1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="pie2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="pie3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="pie4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative glow circles -->
  <circle cx="900" cy="300" r="200" fill="#6366f1" opacity="0.04"/>
  <circle cx="1000" cy="250" r="120" fill="#06b6d4" opacity="0.05"/>

  <!-- Logo area -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.3"/>
    <text x="16" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#818cf8">0x</text>
    <text x="42" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e">degen0x</text>
  </g>

  <!-- Category badge -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="65" height="26" rx="13" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
    <text x="32" y="17" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#818cf8">GUIDE</text>
  </g>

  <!-- Title -->
  <text x="60" y="175" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#e6edf3">
    Crypto Portfolio
  </text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#e6edf3">
    Rebalancing Guide 2026
  </text>

  <!-- Subtitle -->
  <text x="60" y="270" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">
    Strategies, tools, and frameworks for optimal portfolio allocation
  </text>

  <!-- Pie chart visualization -->
  <g transform="translate(870, 180)">
    <!-- BTC slice (40%) -->
    <path d="M0,0 L0,-110 A110,110 0 0,1 84.2,-70.6 Z" fill="url(#pie1)" opacity="0.9"/>
    <!-- ETH slice (25%) -->
    <path d="M0,0 L84.2,-70.6 A110,110 0 0,1 107.1,23.5 Z" fill="url(#pie2)" opacity="0.9"/>
    <!-- Alts slice (20%) -->
    <path d="M0,0 L107.1,23.5 A110,110 0 0,1 34,104.6 Z" fill="url(#pie3)" opacity="0.9"/>
    <!-- DeFi slice (15%) -->
    <path d="M0,0 L34,104.6 A110,110 0 0,1 0,-110 Z" fill="url(#pie4)" opacity="0.9"/>

    <!-- Labels -->
    <text x="25" y="-55" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#fff">BTC</text>
    <text x="25" y="-40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7">40%</text>
    <text x="80" y="-10" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#fff">ETH</text>
    <text x="80" y="5" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7">25%</text>
    <text x="55" y="65" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#fff">Alts</text>
    <text x="55" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7">20%</text>
    <text x="-30" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#fff">DeFi</text>
    <text x="-30" y="45" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7">15%</text>
  </g>

  <!-- Rebalance arrows -->
  <g transform="translate(820, 360)">
    <path d="M0,20 C20,0 40,0 60,20" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M55,15 L60,20 L55,25" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>
    <text x="30" y="45" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Rebalance</text>
  </g>

  <!-- Topic pills -->
  <g transform="translate(60, 320)">
    <rect x="0" y="0" width="130" height="34" rx="17" fill="#22c55e15" stroke="#22c55e30" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e">Time-Based</text>

    <rect x="145" y="0" width="140" height="34" rx="17" fill="#06b6d415" stroke="#06b6d430" stroke-width="1"/>
    <text x="215" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4">Threshold-Based</text>

    <rect x="300" y="0" width="115" height="34" rx="17" fill="#f59e0b15" stroke="#f59e0b30" stroke-width="1"/>
    <text x="357" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">Hybrid</text>

    <rect x="430" y="0" width="130" height="34" rx="17" fill="#8b5cf615" stroke="#8b5cf630" stroke-width="1"/>
    <text x="495" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">AI-Powered</text>
  </g>

  <!-- Stats badges -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="170" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="85" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#22c55e">15% Threshold</text>
    <text x="85" y="43" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Optimal Sweet Spot</text>

    <rect x="185" y="0" width="160" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="265" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#06b6d4">+1-3% APR</text>
    <text x="265" y="43" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Risk-Adjusted Gain</text>

    <rect x="360" y="0" width="130" height="55" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="425" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#f59e0b">4 Strategies</text>
    <text x="425" y="43" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Compared</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Free Tools &amp; Guides</text>
</svg>