<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="#4f46e5" opacity="0.04"/>
  <circle cx="1050" cy="400" r="150" fill="#0891b2" opacity="0.04"/>
  <circle cx="200" cy="500" r="180" fill="#d97706" opacity="0.03"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.05em">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="85" width="52" height="24" rx="6" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-opacity="0.3" stroke-width="1"/>
  <text x="86" y="101" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#58a6ff" text-anchor="middle">DeFi</text>

  <rect x="122" y="85" width="72" height="24" rx="6" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-opacity="0.3" stroke-width="1"/>
  <text x="158" y="101" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#58a6ff" text-anchor="middle">Earning</text>

  <rect x="204" y="85" width="76" height="24" rx="6" fill="#d9a024" fill-opacity="0.15" stroke="#d9a024" stroke-opacity="0.3" stroke-width="1"/>
  <text x="242" y="101" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">Beginner</text>

  <!-- Title -->
  <text x="60" y="175" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Crypto Passive Income</text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="270" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Staking · Yield Farming · Lending · Liquid Staking · Restaking</text>

  <!-- Yield chart (decorative) -->
  <g transform="translate(700, 80)">
    <rect width="440" height="200" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e">Passive Income Methods — APY Range</text>

    <!-- Bar chart -->
    <rect x="30" y="55" width="80" height="18" rx="4" fill="#22c55e" opacity="0.8"/>
    <text x="120" y="68" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#c9d1d9">ETH Staking 3.3%</text>

    <rect x="30" y="82" width="90" height="18" rx="4" fill="#3fb950" opacity="0.8"/>
    <text x="130" y="95" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#c9d1d9">Liquid Staking 3-3.4%</text>

    <rect x="30" y="109" width="150" height="18" rx="4" fill="#0891b2" opacity="0.8"/>
    <text x="190" y="122" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#c9d1d9">Restaking 3.8-6%</text>

    <rect x="30" y="136" width="180" height="18" rx="4" fill="#6366f1" opacity="0.8"/>
    <text x="220" y="149" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#c9d1d9">Lending 4-7%</text>

    <rect x="30" y="163" width="350" height="18" rx="4" fill="#d97706" opacity="0.8"/>
    <text x="390" y="176" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#c9d1d9">Yield Farming 4-14%</text>
  </g>

  <!-- Stats boxes -->
  <g transform="translate(60, 320)">
    <rect width="170" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">ETH Staking APY</text>
    <text x="20" y="58" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#22c55e">3.3%</text>
  </g>

  <g transform="translate(250, 320)">
    <rect width="170" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">EigenLayer TVL</text>
    <text x="20" y="58" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#6366f1">$17.5B</text>
  </g>

  <g transform="translate(440, 320)">
    <rect width="170" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Stablecoin Yield</text>
    <text x="20" y="58" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#0891b2">4-6%</text>
  </g>

  <g transform="translate(630, 320)">
    <rect width="170" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Pendle TVL</text>
    <text x="20" y="58" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#d97706">$8.27B</text>
  </g>

  <!-- Protocol names -->
  <g transform="translate(60, 440)">
    <rect width="80" height="28" rx="8" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <text x="40" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#818cf8" text-anchor="middle">Lido</text>

    <rect x="90" width="80" height="28" rx="8" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
    <text x="130" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3fb950" text-anchor="middle">Aave</text>

    <rect x="180" width="100" height="28" rx="8" fill="rgba(8,145,178,0.12)" stroke="rgba(8,145,178,0.25)" stroke-width="1"/>
    <text x="230" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#06b6d4" text-anchor="middle">EigenLayer</text>

    <rect x="290" width="80" height="28" rx="8" fill="rgba(217,151,36,0.12)" stroke="rgba(217,151,36,0.25)" stroke-width="1"/>
    <text x="330" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d29922" text-anchor="middle">Pendle</text>

    <rect x="380" width="80" height="28" rx="8" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <text x="420" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6" text-anchor="middle">Morpho</text>

    <rect x="470" width="80" height="28" rx="8" fill="rgba(63,185,80,0.12)" stroke="rgba(63,185,80,0.25)" stroke-width="1"/>
    <text x="510" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3fb950" text-anchor="middle">Curve</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">Updated March 2026</text>
</svg>