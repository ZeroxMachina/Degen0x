<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Decorative tech elements -->
  <g opacity="0.3">
    <rect x="100" y="140" width="80" height="80" fill="none" stroke="#0891b2" stroke-width="2" rx="8"/>
    <line x1="140" y1="140" x2="140" y2="220" stroke="#0891b2" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="180" x2="180" y2="180" stroke="#0891b2" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Extension flow -->
  <line x1="250" y1="180" x2="350" y2="180" stroke="#4f46e5" stroke-width="2" opacity="0.4"/>
  <line x1="350" y1="180" x2="450" y2="150" stroke="#d97706" stroke-width="2" opacity="0.4"/>

  <!-- Right side decorative circles -->
  <circle cx="1050" cy="500" r="60" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.3"/>
  <circle cx="1050" cy="500" r="35" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.15"/>

  <!-- Title -->
  <text x="600" y="280" font-family="Inter, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">
    Solana Token Extensions
  </text>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" fill="#8b949e">
    Advanced Token Features and Programmability
  </text>

  <!-- Footer branding -->
  <text x="1150" y="600" font-family="Inter, sans-serif" font-size="16" text-anchor="end" fill="#6e7681">
    degen0x.com
  </text>

  <!-- Decorative dots -->
  <circle cx="80" cy="420" r="4" fill="#d97706" opacity="0.6"/>
  <circle cx="750" cy="100" r="4" fill="#0891b2" opacity="0.5"/>
  <circle cx="1100" cy="250" r="4" fill="#4f46e5" opacity="0.5"/>
  <circle cx="300" cy="550" r="3" fill="#d97706" opacity="0.4"/>
</svg>