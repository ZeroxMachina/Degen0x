<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative glow orbs -->
  <circle cx="150" cy="315" r="120" fill="#06b6d4" opacity="0.08"/>
  <circle cx="1050" cy="315" r="120" fill="#8b5cf6" opacity="0.08"/>
  <circle cx="600" cy="200" r="80" fill="#f472b6" opacity="0.06"/>

  <!-- Chain nodes -->
  <!-- Left chain cluster -->
  <circle cx="120" cy="260" r="36" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
  <circle cx="120" cy="260" r="16" fill="#06b6d4" opacity="0.4"/>
  <text x="120" y="265" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">ETH</text>

  <circle cx="120" cy="370" r="36" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
  <circle cx="120" cy="370" r="16" fill="#06b6d4" opacity="0.4"/>
  <text x="120" y="375" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">SOL</text>

  <!-- Right chain cluster -->
  <circle cx="1080" cy="260" r="36" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
  <circle cx="1080" cy="260" r="16" fill="#8b5cf6" opacity="0.4"/>
  <text x="1080" y="265" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">ARB</text>

  <circle cx="1080" cy="370" r="36" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
  <circle cx="1080" cy="370" r="16" fill="#8b5cf6" opacity="0.4"/>
  <text x="1080" y="375" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">AVAX</text>

  <!-- Connection lines (animated dashes) -->
  <line x1="156" y1="260" x2="240" y2="295" stroke="url(#accent1)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <line x1="156" y1="370" x2="240" y2="335" stroke="url(#accent1)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <line x1="960" y1="295" x2="1044" y2="260" stroke="url(#accent2)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <line x1="960" y1="335" x2="1044" y2="370" stroke="url(#accent2)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Protocol boxes (center) -->
  <!-- LayerZero -->
  <rect x="240" y="180" rx="10" ry="10" width="200" height="70" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="340" y="210" font-family="system-ui, sans-serif" font-size="16" fill="#06b6d4" text-anchor="middle" font-weight="bold">LayerZero</text>
  <text x="340" y="235" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Omnichain · 50+ Chains</text>

  <!-- Chainlink CCIP -->
  <rect x="500" y="180" rx="10" ry="10" width="200" height="70" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="210" font-family="system-ui, sans-serif" font-size="16" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Chainlink CCIP</text>
  <text x="600" y="235" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Institutional · Bank-Grade</text>

  <!-- Wormhole -->
  <rect x="760" y="180" rx="10" ry="10" width="200" height="70" fill="#f472b6" fill-opacity="0.12" stroke="#f472b6" stroke-width="1.5"/>
  <text x="860" y="210" font-family="system-ui, sans-serif" font-size="16" fill="#f472b6" text-anchor="middle" font-weight="bold">Wormhole</text>
  <text x="860" y="235" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Rebuilt · Multi-VM</text>

  <!-- Axelar -->
  <rect x="370" y="370" rx="10" ry="10" width="200" height="70" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="470" y="400" font-family="system-ui, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-weight="bold">Axelar</text>
  <text x="470" y="425" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">GMP Pioneer</text>

  <!-- ERC-7683 -->
  <rect x="630" y="370" rx="10" ry="10" width="200" height="70" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="730" y="400" font-family="system-ui, sans-serif" font-size="16" fill="#22d3ee" text-anchor="middle" font-weight="bold">ERC-7683</text>
  <text x="730" y="425" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Intents Standard · Future</text>

  <!-- Connecting lines between protocol boxes -->
  <line x1="440" y1="215" x2="500" y2="215" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="700" y1="215" x2="760" y2="215" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="470" y1="370" x2="470" y2="250" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
  <line x1="730" y1="370" x2="730" y2="250" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="80" font-family="system-ui, sans-serif" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#glow)">Cross-Chain Interoperability</text>
  <text x="600" y="120" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">The Infrastructure Connecting Every Blockchain</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#000" fill-opacity="0.4"/>
  <text x="40" y="612" font-family="system-ui, sans-serif" font-size="14" fill="#06b6d4" font-weight="bold">degen0x.com/learn/cross-chain-interoperability-guide</text>

  <!-- Badge -->
  <rect x="920" y="590" rx="12" ry="12" width="240" height="28" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
  <text x="1040" y="609" font-family="system-ui, sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle" font-weight="bold">14 MIN READ · DEEP DIVE</text>

  <!-- Stat pills -->
  <rect x="240" y="290" rx="14" ry="14" width="120" height="28" fill="#06b6d4" fill-opacity="0.15"/>
  <text x="300" y="309" font-family="system-ui, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle" font-weight="bold">50+ CHAINS</text>

  <rect x="540" y="290" rx="14" ry="14" width="120" height="28" fill="#8b5cf6" fill-opacity="0.15"/>
  <text x="600" y="309" font-family="system-ui, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">4 PROTOCOLS</text>

  <rect x="840" y="290" rx="14" ry="14" width="120" height="28" fill="#f472b6" fill-opacity="0.15"/>
  <text x="900" y="309" font-family="system-ui, sans-serif" font-size="11" fill="#f472b6" text-anchor="middle" font-weight="bold">ERC-7683</text>

  <!-- Corner accent -->
  <rect x="0" y="0" width="4" height="630" fill="url(#accent1)"/>
</svg>