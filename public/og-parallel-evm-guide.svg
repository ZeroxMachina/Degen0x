<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="1050" cy="200" r="200" fill="#6366f1" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="200" cy="480" r="140" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="900" cy="500" r="120" fill="#8b5cf6" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Parallel Execution Visualization -->
  <!-- Sequential (Ethereum) lane -->
  <g transform="translate(830, 110)">
    <text x="0" y="0" fill="#f85149" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">SEQUENTIAL (ETH)</text>
    <rect x="0" y="10" width="320" height="30" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="4" y="14" width="40" height="22" rx="4" fill="#f8514930"/>
    <text x="24" y="30" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="9">TX1</text>
    <rect x="48" y="14" width="40" height="22" rx="4" fill="#f8514920"/>
    <text x="68" y="30" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="9">TX2</text>
    <rect x="92" y="14" width="40" height="22" rx="4" fill="#f8514915"/>
    <text x="112" y="30" text-anchor="middle" fill="#f8514980" font-family="monospace" font-size="9">TX3</text>
    <rect x="136" y="14" width="40" height="22" rx="4" fill="#f8514910"/>
    <text x="156" y="30" text-anchor="middle" fill="#f8514960" font-family="monospace" font-size="9">TX4</text>
    <!-- Waiting dots -->
    <text x="195" y="30" fill="#8b949e" font-family="monospace" font-size="10">waiting...</text>
    <text x="300" y="30" text-anchor="end" fill="#f85149" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">~15 TPS</text>
  </g>

  <!-- Parallel (new) lanes -->
  <g transform="translate(830, 170)">
    <text x="0" y="0" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">PARALLEL EXECUTION</text>
    <!-- Lane 1 -->
    <rect x="0" y="10" width="320" height="24" rx="5" fill="#161b22" stroke="#22c55e25" stroke-width="1"/>
    <rect x="4" y="13" width="74" height="18" rx="3" fill="#22c55e20"/>
    <text x="41" y="26" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">TX1</text>
    <rect x="82" y="13" width="74" height="18" rx="3" fill="#22c55e15"/>
    <text x="119" y="26" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">TX5</text>
    <rect x="160" y="13" width="74" height="18" rx="3" fill="#22c55e10"/>
    <text x="197" y="26" text-anchor="middle" fill="#4ade8080" font-family="monospace" font-size="9">TX9</text>

    <!-- Lane 2 -->
    <rect x="0" y="38" width="320" height="24" rx="5" fill="#161b22" stroke="#6366f125" stroke-width="1"/>
    <rect x="4" y="41" width="74" height="18" rx="3" fill="#6366f120"/>
    <text x="41" y="54" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="9">TX2</text>
    <rect x="82" y="41" width="74" height="18" rx="3" fill="#6366f115"/>
    <text x="119" y="54" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="9">TX6</text>
    <rect x="160" y="41" width="74" height="18" rx="3" fill="#6366f110"/>
    <text x="197" y="54" text-anchor="middle" fill="#818cf880" font-family="monospace" font-size="9">TX10</text>

    <!-- Lane 3 -->
    <rect x="0" y="66" width="320" height="24" rx="5" fill="#161b22" stroke="#06b6d425" stroke-width="1"/>
    <rect x="4" y="69" width="74" height="18" rx="3" fill="#06b6d420"/>
    <text x="41" y="82" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">TX3</text>
    <rect x="82" y="69" width="74" height="18" rx="3" fill="#06b6d415"/>
    <text x="119" y="82" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">TX7</text>
    <rect x="160" y="69" width="74" height="18" rx="3" fill="#06b6d410"/>
    <text x="197" y="82" text-anchor="middle" fill="#22d3ee80" font-family="monospace" font-size="9">TX11</text>

    <!-- Lane 4 -->
    <rect x="0" y="94" width="320" height="24" rx="5" fill="#161b22" stroke="#8b5cf625" stroke-width="1"/>
    <rect x="4" y="97" width="74" height="18" rx="3" fill="#8b5cf620"/>
    <text x="41" y="110" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">TX4</text>
    <rect x="82" y="97" width="74" height="18" rx="3" fill="#8b5cf615"/>
    <text x="119" y="110" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">TX8</text>
    <rect x="160" y="97" width="74" height="18" rx="3" fill="#8b5cf610"/>
    <text x="197" y="110" text-anchor="middle" fill="#a78bfa80" font-family="monospace" font-size="9">TX12</text>

    <text x="300" y="75" text-anchor="end" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800">10K-100K TPS</text>
  </g>

  <!-- Comparison cards -->
  <!-- Monad -->
  <rect x="830" y="320" width="110" height="90" rx="10" fill="#161b22" stroke="#6366f130" stroke-width="1.5"/>
  <text x="885" y="345" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">MONAD</text>
  <text x="885" y="372" text-anchor="middle" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">10K</text>
  <text x="885" y="388" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9">TPS • L1</text>
  <text x="885" y="403" text-anchor="middle" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="9">0.8s finality</text>

  <!-- Sei -->
  <rect x="950" y="320" width="110" height="90" rx="10" fill="#161b22" stroke="#06b6d430" stroke-width="1.5"/>
  <text x="1005" y="345" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">SEI</text>
  <text x="1005" y="372" text-anchor="middle" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">28.3K</text>
  <text x="1005" y="388" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9">TPS • L1</text>
  <text x="1005" y="403" text-anchor="middle" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="9">390ms finality</text>

  <!-- MegaETH -->
  <rect x="1070" y="320" width="110" height="90" rx="10" fill="#161b22" stroke="#8b5cf630" stroke-width="1.5"/>
  <text x="1125" y="345" text-anchor="middle" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">MEGAETH</text>
  <text x="1125" y="372" text-anchor="middle" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">100K+</text>
  <text x="1125" y="388" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="9">TPS • L2</text>
  <text x="1125" y="403" text-anchor="middle" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="9">10ms blocks</text>

  <!-- EVM Compatible badge -->
  <rect x="830" y="425" width="350" height="48" rx="10" fill="#22c55e08" stroke="#22c55e25" stroke-width="1"/>
  <text x="1005" y="446" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">100% EVM COMPATIBLE</text>
  <text x="1005" y="464" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="10">Existing contracts deploy without modification</text>

  <!-- Logo area -->
  <text x="60" y="62" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" letter-spacing="-0.02em">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="120" width="90" height="28" rx="6" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="105" y="139" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Blockchain</text>

  <rect x="160" y="120" width="95" height="28" rx="6" fill="#3b82f620" stroke="#3b82f640" stroke-width="1"/>
  <text x="207" y="139" text-anchor="middle" fill="#60a5fa" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Intermediate</text>

  <rect x="265" y="120" width="55" height="28" rx="6" fill="#0ea5e920" stroke="#0ea5e940" stroke-width="1"/>
  <text x="292" y="139" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Learn</text>

  <!-- Title -->
  <text x="60" y="215" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Parallel EVM</text>
  <text x="60" y="272" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="320" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">How Monad, Sei &amp; MegaETH execute transactions</text>
  <text x="60" y="348" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">concurrently to achieve 10K-100K+ TPS</text>

  <!-- Feature pills -->
  <rect x="60" y="385" width="140" height="32" rx="16" fill="#6366f115" stroke="#6366f135" stroke-width="1"/>
  <text x="130" y="406" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Parallel Execution</text>

  <rect x="215" y="385" width="130" height="32" rx="16" fill="#22c55e15" stroke="#22c55e35" stroke-width="1"/>
  <text x="280" y="406" text-anchor="middle" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">EVM Compatible</text>

  <rect x="360" y="385" width="100" height="32" rx="16" fill="#06b6d415" stroke="#06b6d435" stroke-width="1"/>
  <text x="410" y="406" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">100K TPS</text>

  <rect x="475" y="385" width="100" height="32" rx="16" fill="#8b5cf615" stroke="#8b5cf635" stroke-width="1"/>
  <text x="525" y="406" text-anchor="middle" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Sub-second</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0f1e"/>
  <rect x="0" y="590" width="1200" height="1" fill="#30363d"/>
  <text x="60" y="616" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">degen0x.com</text>
  <text x="1140" y="616" text-anchor="end" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400">Compare · Review · DYOR</text>
</svg>