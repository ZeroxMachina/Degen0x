<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow1" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Ambient glow circles -->
  <circle cx="270" cy="220" r="305" fill="#6366f1" opacity="0.06"/>
  <circle cx="910" cy="400" r="275" fill="#818cf8" opacity="0.05"/>
  <circle cx="600" cy="80" r="200" fill="#06b6d4" opacity="0.03"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.02" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo area -->
  <circle cx="100" cy="72" r="18" fill="#6366f1" opacity="0.15"/>
  <text x="100" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" fill="#818cf8" text-anchor="middle">0x</text>
  <text x="130" y="78" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badge -->
  <rect x="80" y="140" width="100" height="30" rx="15" fill="#6366f120" stroke="#6366f150" stroke-width="1"/>
  <text x="130" y="160" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="0.05em">LEARN</text>

  <!-- Title -->
  <text x="80" y="230" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-0.03em">Adaptive Crypto</text>
  <text x="80" y="295" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="url(#accent)" letter-spacing="-0.03em">Quiz Engine</text>

  <!-- Subtitle -->
  <text x="80" y="345" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">
    Test your knowledge · Earn XP · Track progress
  </text>

  <!-- Decorative quiz icons -->
  <!-- Card 1: Question marks -->
  <g transform="translate(700, 140)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Multiple question marks -->
    <text x="28" y="50" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="900" fill="#06b6d4" opacity="0.8">?</text>
    <text x="45" y="48" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#818cf8" opacity="0.6">?</text>
    <text x="58" y="50" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" fill="#f59e0b" opacity="0.7">?</text>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Questions</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">500+ total</text>
  </g>

  <!-- Card 2: Difficulty levels -->
  <g transform="translate(720, 235)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Difficulty bars -->
    <rect x="22" y="32" width="12" height="12" rx="2" fill="#14F195" opacity="0.8"/>
    <text x="28" y="39" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="700" fill="#080d1c" text-anchor="middle">E</text>
    <rect x="38" y="28" width="12" height="16" rx="2" fill="#06b6d4" opacity="0.8"/>
    <text x="44" y="37" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="700" fill="white" text-anchor="middle">M</text>
    <rect x="54" y="24" width="12" height="20" rx="2" fill="#f59e0b" opacity="0.8"/>
    <text x="60" y="36" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="700" fill="#080d1c" text-anchor="middle">H</text>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Difficulty</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">3 levels</text>
  </g>

  <!-- Card 3: Score card -->
  <g transform="translate(740, 330)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Score visualization -->
    <circle cx="35" cy="38" r="12" fill="none" stroke="#818cf8" stroke-width="2"/>
    <path d="M 35 28 A 10 10 0 0 1 45 38" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
    <text x="35" y="42" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="900" fill="#e6edf3" text-anchor="middle">92%</text>
    <!-- Target icon -->
    <circle cx="58" cy="35" r="5" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="58" cy="35" r="2" fill="#f59e0b" opacity="0.8"/>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Your Score</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Great progress</text>
  </g>

  <!-- Card 4: Progress tracker -->
  <g transform="translate(950, 180)">
    <rect width="160" height="70" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <!-- Progress steps -->
    <circle cx="28" cy="40" r="5" fill="#06b6d4" opacity="0.8"/>
    <text x="28" y="42" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">✓</text>
    <line x1="34" y1="40" x2="40" y2="40" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <circle cx="46" cy="40" r="5" fill="#06b6d4" opacity="0.8"/>
    <text x="46" y="42" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">✓</text>
    <line x1="52" y1="40" x2="58" y2="40" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
    <circle cx="64" cy="40" r="5" fill="#818cf8" opacity="0.5"/>
    <text x="64" y="42" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">3</text>
    <!-- Label -->
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Progress</text>
    <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">2/5 complete</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="white" fill-opacity="0.02"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="white" stroke-opacity="0.06"/>
  <text x="80" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1120" y="612" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Free · No signup · Open source</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>