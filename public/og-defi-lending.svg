    <circle cx="105" cy="35" r="22" fill="none" stroke="#06b6d4" stroke-width="3"/>
    <text x="105" y="43" font-family="Arial, sans-serif" font-size="20" fill="#06b6d4" text-anchor="middle" font-weight="bold">%</text>
    <path d="M55 30 L75 30 L70 22 M75 30 L70 38" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="white" text-anchor="middle">DeFi Lending</text>
