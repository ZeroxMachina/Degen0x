<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="60%" stop-color="#0a0f22"/>
      <stop offset="100%" stop-color="#06091a"/>
    </linearGradient>

    <!-- Brand accent gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Cyan glow -->
    <radialGradient id="cyanGlow" cx="75%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>

    <!-- Indigo glow -->
    <radialGradient id="indigoGlow" cx="20%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>

    <!-- Amber glow (top right danger) -->
    <radialGradient id="amberGlow" cx="90%" cy="15%" r="30%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass card filter -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Glow filter for stat highlight -->
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="indigoGlowFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip for card corners -->
    <clipPath id="cardClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#cyanGlow)"/>
  <rect width="1200" height="630" fill="url(#indigoGlow)"/>
  <rect width="1200" height="630" fill="url(#amberGlow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- ===== ACCENT BAR (top) ===== -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- ===== DECORATIVE ORBS ===== -->
  <!-- Large blur orb top-right -->
  <circle cx="980" cy="120" r="200" fill="#0891b2" opacity="0.05"/>
  <circle cx="980" cy="120" r="100" fill="#06b6d4" opacity="0.06"/>
  <!-- Bottom-left subtle orb -->
  <circle cx="100" cy="520" r="150" fill="#4f46e5" opacity="0.06"/>

  <!-- Quantum circuit decorative element (top right) -->
  <g opacity="0.12" stroke="#06b6d4" stroke-width="1.5" fill="none">
    <!-- Horizontal lines -->
    <line x1="850" y1="80" x2="1150" y2="80"/>
    <line x1="850" y1="130" x2="1150" y2="130"/>
    <line x1="850" y1="180" x2="1150" y2="180"/>
    <!-- Gate boxes -->
    <rect x="900" y="68" width="28" height="24" rx="4" fill="#06b6d4" fill-opacity="0.3" stroke="#06b6d4"/>
    <text x="914" y="84" text-anchor="middle" font-size="11" fill="#06b6d4" font-weight="700" opacity="1">H</text>
    <rect x="980" y="118" width="28" height="24" rx="4" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1"/>
    <text x="994" y="134" text-anchor="middle" font-size="10" fill="#818cf8" font-weight="700" opacity="1">QFT</text>
    <rect x="1060" y="168" width="28" height="24" rx="4" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b"/>
    <text x="1074" y="184" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="700" opacity="1">Rx</text>
    <!-- Control dots -->
    <circle cx="994" cy="80" r="4" fill="#6366f1" opacity="1"/>
    <line x1="994" y1="80" x2="994" y2="118" stroke="#6366f1" stroke-dasharray="3,3"/>
    <circle cx="1074" cy="130" r="4" fill="#f59e0b" opacity="1"/>
    <line x1="1074" y1="130" x2="1074" y2="168" stroke="#f59e0b" stroke-dasharray="3,3"/>
  </g>

  <!-- ===== LOGO AREA (top-left) ===== -->
  <!-- Logo circle -->
  <circle cx="56" cy="44" r="20" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
  <text x="56" y="50" text-anchor="middle" font-size="13" font-weight="900" fill="#818cf8" letter-spacing="-0.5">0x</text>
  <!-- Wordmark -->
  <text x="84" y="50" font-size="16" font-weight="800" fill="#e6edf3" letter-spacing="-0.5">degen<tspan fill="#6366f1">0x</tspan></text>

  <!-- Category pill -->
  <rect x="56" y="68" width="72" height="22" rx="11" fill="#4f46e5" fill-opacity="0.2" stroke="#6366f1" stroke-opacity="0.5" stroke-width="1"/>
  <text x="92" y="83" text-anchor="middle" font-size="11" font-weight="600" fill="#818cf8" letter-spacing="0.5">LEARN</text>

  <!-- ===== MAIN TITLE ===== -->
  <text x="56" y="200" font-size="58" font-weight="900" letter-spacing="-2" fill="url(#titleGrad)">Quantum-Resistant</text>
  <text x="56" y="268" font-size="58" font-weight="900" letter-spacing="-2" fill="#e6edf3">Crypto: 2026</text>

  <!-- Subtitle -->
  <text x="56" y="314" font-size="22" font-weight="400" fill="#8b949e">NIST post-quantum standards · vulnerable addresses · quantum-safe projects</text>

  <!-- ===== STAT CARDS ===== -->
  <!-- Card 1: BTC Exposed -->
  <rect x="56" y="360" width="220" height="110" rx="16" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.25)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="166" y="402" text-anchor="middle" font-size="38" font-weight="900" fill="#ef4444">25%</text>
  <text x="166" y="428" text-anchor="middle" font-size="12" font-weight="600" fill="#8b949e">BTC QUANTUM-EXPOSED</text>
  <text x="166" y="446" text-anchor="middle" font-size="11" fill="#6e7681">~4M BTC in exposed addrs</text>

  <!-- Card 2: Timeline -->
  <rect x="296" y="360" width="220" height="110" rx="16" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="406" y="402" text-anchor="middle" font-size="38" font-weight="900" fill="#f59e0b">5-7 yr</text>
  <text x="406" y="428" text-anchor="middle" font-size="12" font-weight="600" fill="#8b949e">AGGRESSIVE ESTIMATE</text>
  <text x="406" y="446" text-anchor="middle" font-size="11" fill="#6e7681">DARPA / NIST timeline</text>

  <!-- Card 3: Standards -->
  <rect x="536" y="360" width="220" height="110" rx="16" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="646" y="402" text-anchor="middle" font-size="38" font-weight="900" fill="#6366f1">3</text>
  <text x="646" y="428" text-anchor="middle" font-size="12" font-weight="600" fill="#8b949e">NIST PQ STANDARDS</text>
  <text x="646" y="446" text-anchor="middle" font-size="11" fill="#6e7681">ML-KEM · ML-DSA · SLH-DSA</text>

  <!-- ===== RIGHT PANEL — Algorithm vulnerability visual ===== -->
  <rect x="800" y="240" width="360" height="310" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="980" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#8b949e" letter-spacing="1">ALGORITHM RISK MATRIX</text>

  <!-- Algorithm rows -->
  <!-- ECDSA -->
  <rect x="820" y="296" width="320" height="38" rx="8" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="836" y="320" font-size="13" font-weight="700" fill="#e6edf3">ECDSA</text>
  <text x="836" y="333" font-size="10" fill="#8b949e">Bitcoin / Ethereum wallets</text>
  <rect x="1060" y="304" width="68" height="22" rx="11" fill="#ef4444" fill-opacity="0.25"/>
  <text x="1094" y="319" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">VULNERABLE</text>

  <!-- RSA -->
  <rect x="820" y="342" width="320" height="38" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="836" y="366" font-size="13" font-weight="700" fill="#e6edf3">RSA-2048</text>
  <text x="836" y="379" font-size="10" fill="#8b949e">TLS / web certificates</text>
  <rect x="1060" y="350" width="68" height="22" rx="11" fill="#ef4444" fill-opacity="0.25"/>
  <text x="1094" y="365" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">VULNERABLE</text>

  <!-- SHA-256 -->
  <rect x="820" y="388" width="320" height="38" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="836" y="412" font-size="13" font-weight="700" fill="#e6edf3">SHA-256</text>
  <text x="836" y="425" font-size="10" fill="#8b949e">Bitcoin PoW / hashing</text>
  <rect x="1054" y="396" width="80" height="22" rx="11" fill="#f59e0b" fill-opacity="0.25"/>
  <text x="1094" y="411" text-anchor="middle" font-size="10" font-weight="700" fill="#f59e0b">WEAKENED</text>

  <!-- ML-DSA (NIST) -->
  <rect x="820" y="434" width="320" height="38" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="836" y="458" font-size="13" font-weight="700" fill="#e6edf3">ML-DSA (NIST)</text>
  <text x="836" y="471" font-size="10" fill="#8b949e">Lattice-based signatures</text>
  <rect x="1054" y="442" width="80" height="22" rx="11" fill="#22c55e" fill-opacity="0.25"/>
  <text x="1094" y="457" text-anchor="middle" font-size="10" font-weight="700" fill="#22c55e">SAFE ✓</text>

  <!-- SLH-DSA -->
  <rect x="820" y="480" width="320" height="38" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="836" y="504" font-size="13" font-weight="700" fill="#e6edf3">SLH-DSA (NIST)</text>
  <text x="836" y="517" font-size="10" fill="#8b949e">Hash-based signatures</text>
  <rect x="1054" y="488" width="80" height="22" rx="11" fill="#22c55e" fill-opacity="0.25"/>
  <text x="1094" y="503" text-anchor="middle" font-size="10" font-weight="700" fill="#22c55e">SAFE ✓</text>

  <!-- ===== BOTTOM BAR ===== -->
  <rect x="0" y="594" width="1200" height="36" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0" stroke-dasharray="0"/>
  <line x1="0" y1="594" x2="1200" y2="594" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- URL -->
  <text x="56" y="617" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="200" y="617" font-size="14" fill="#3d4450">/</text>
  <text x="212" y="617" font-size="14" fill="#4a5060">learn/quantum-resistant-crypto-guide</text>

  <!-- Right side tag -->
  <text x="1144" y="617" text-anchor="end" font-size="12" font-weight="500" fill="#6e7681">2026 Guide</text>

  <!-- ===== SMALL SHIELD ICON (decorative) ===== -->
  <g transform="translate(750, 355)" opacity="0.15">
    <path d="M20 4L4 10v10c0 8.3 6.9 16.1 16 18 9.1-1.9 16-9.7 16-18V10L20 4z" fill="#6366f1" stroke="#6366f1" stroke-width="1.5"/>
    <text x="20" y="26" text-anchor="middle" font-size="14" fill="white" font-weight="700">🔐</text>
  </g>

</svg>
