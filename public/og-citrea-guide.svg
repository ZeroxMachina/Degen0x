<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#facc15;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Decorative glowing circles -->
  <circle cx="150" cy="100" r="80" fill="#f97316" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1050" cy="550" r="120" fill="#facc15" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1100" cy="80" r="60" fill="#facc15" opacity="0.06" filter="url(#glow)"/>

  <!-- Logo text (degen0x) -->
  <text x="50" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="1">degen0x</text>

  <!-- Category badges -->
  <g>
    <!-- Badge 1: Bitcoin -->
    <rect x="50" y="90" width="95" height="32" rx="16" fill="rgba(249, 115, 22, 0.2)" stroke="#f97316" stroke-width="1"/>
    <text x="97.5" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f97316" text-anchor="middle">Bitcoin</text>

    <!-- Badge 2: ZK Rollup -->
    <rect x="165" y="90" width="110" height="32" rx="16" fill="rgba(250, 204, 21, 0.2)" stroke="#facc15" stroke-width="1"/>
    <text x="220" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#facc15" text-anchor="middle">ZK Rollup</text>

    <!-- Badge 3: 2026 -->
    <rect x="295" y="90" width="80" height="32" rx="16" fill="rgba(249, 115, 22, 0.2)" stroke="#f97316" stroke-width="1"/>
    <text x="335" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f97316" text-anchor="middle">2026</text>
  </g>

  <!-- Title -->
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff">Citrea: Bitcoin's First</text>
  <text x="50" y="280" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#facc15">ZK Rollup Guide 2026</text>

  <!-- Subtitle -->
  <text x="50" y="330" font-family="Arial, sans-serif" font-size="20" fill="#9ca3af">$96M TVL · 30+ dApps · BitVM Bridge · cBTC & ctUSD</text>

  <!-- Stats cards -->
  <g>
    <!-- Card 1: TVL -->
    <rect x="50" y="380" width="260" height="140" rx="12" fill="rgba(249, 115, 22, 0.1)" stroke="rgba(249, 115, 22, 0.3)" stroke-width="1"/>
    <text x="70" y="410" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">TVL</text>
    <text x="70" y="450" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#f97316">$96M</text>

    <!-- Card 2: dApps -->
    <rect x="340" y="380" width="260" height="140" rx="12" fill="rgba(250, 204, 21, 0.1)" stroke="rgba(250, 204, 21, 0.3)" stroke-width="1"/>
    <text x="360" y="410" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">dApps</text>
    <text x="360" y="450" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#facc15">30+</text>

    <!-- Card 3: Asset -->
    <rect x="630" y="380" width="260" height="140" rx="12" fill="rgba(249, 115, 22, 0.1)" stroke="rgba(249, 115, 22, 0.3)" stroke-width="1"/>
    <text x="650" y="410" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Asset</text>
    <text x="650" y="450" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#f97316">cBTC</text>

    <!-- Card 4: Stablecoin -->
    <rect x="920" y="380" width="230" height="140" rx="12" fill="rgba(250, 204, 21, 0.1)" stroke="rgba(250, 204, 21, 0.3)" stroke-width="1"/>
    <text x="940" y="410" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Stablecoin</text>
    <text x="940" y="450" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#facc15">ctUSD</text>
  </g>

  <!-- Footer -->
  <text x="1150" y="610" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#6b7280" text-anchor="end">degen0x.com</text>
</svg>
