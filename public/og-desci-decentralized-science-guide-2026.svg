<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="220" r="180" fill="#d946ef" opacity="0.06"/>
  <circle cx="1050" cy="380" r="120" fill="#34d399" opacity="0.05"/>
  <circle cx="150" cy="520" r="100" fill="#06b6d4" opacity="0.04"/>

  <!-- DNA Helix Icon (right side, decorative) -->
  <g opacity="0.12" transform="translate(1020, 200)">
    <!-- DNA double helix strands -->
    <path d="M-20,-80 C30,-60 -30,-20 20,0 C-30,20 30,60 -20,80" stroke="#d946ef" stroke-width="3" fill="none"/>
    <path d="M20,-80 C-30,-60 30,-20 -20,0 C30,20 -30,60 20,80" stroke="#34d399" stroke-width="3" fill="none"/>
    <!-- Rungs -->
    <line x1="-10" y1="-60" x2="10" y2="-60" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
    <line x1="-15" y1="-30" x2="15" y2="-30" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
    <line x1="-15" y1="30" x2="15" y2="30" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
    <line x1="-10" y1="60" x2="10" y2="60" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Atom/Science icon -->
  <g opacity="0.10" transform="translate(900, 350)">
    <circle cx="0" cy="0" r="6" fill="#d946ef"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" stroke="#d946ef" stroke-width="1.5" fill="none" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" stroke="#34d399" stroke-width="1.5" fill="none" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" stroke="#06b6d4" stroke-width="1.5" fill="none" transform="rotate(120)"/>
  </g>

  <!-- Category badge -->
  <rect x="60" y="160" width="180" height="32" rx="16" fill="#d946ef" opacity="0.15"/>
  <text x="150" y="181" fill="#d946ef" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Blockchain Science</text>

  <!-- Title -->
  <text x="60" y="260" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">DeSci: Decentralized</text>
  <text x="60" y="315" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Science Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="375" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="20">Research DAOs, IP-NFTs, tokenized funding &amp; open peer review</text>

  <!-- Stats row -->
  <g transform="translate(60, 420)">
    <rect x="0" y="0" width="130" height="44" rx="10" fill="#d946ef" opacity="0.1"/>
    <text x="65" y="18" fill="#d946ef" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">50+ Projects</text>
    <text x="65" y="36" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Active DeSci</text>

    <rect x="145" y="0" width="130" height="44" rx="10" fill="#34d399" opacity="0.1"/>
    <text x="210" y="18" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">$60M+</text>
    <text x="210" y="36" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Funding Deployed</text>

    <rect x="290" y="0" width="130" height="44" rx="10" fill="#06b6d4" opacity="0.1"/>
    <text x="355" y="18" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">VitaDAO</text>
    <text x="355" y="36" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Bio Protocol &amp; more</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="#0a0f1e" opacity="0.8"/>
  <text x="60" y="598" fill="#6366f1" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">degen0x</text>
  <text x="170" y="598" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16">degen0x.com</text>
  <text x="1060" y="598" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14">2026 Guide</text>
</svg>