  <rect x="890" y="275" width="250" height="215" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="915" y="310" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BTC ETF INFLOWS (MAR)</text>
  <text x="915" y="365" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="#06b6d4">$700M</text>
  <text x="915" y="400" font-family="Inter, sans-serif" font-size="14" fill="#8b949e">Institutions buying the fear</text>

  <!-- Strategy target -->
  <rect x="915" y="425" width="200" height="45" rx="10" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.2"/>
  <text x="935" y="445" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">Strategy target:</text>
  <text x="935" y="462" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#a5b4fc">1,000,000 BTC</text>

