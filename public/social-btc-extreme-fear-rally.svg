  <rect x="285" y="465" width="68" height="22" rx="6" fill="#22c55e" fill-opacity="0.15"/>
  <text x="319" y="481" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">+3.5%</text>

