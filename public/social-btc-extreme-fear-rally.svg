  <text x="85" y="425" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#e6edf3">$2,182</text>
  <rect x="260" y="405" width="68" height="26" rx="8" fill="#22c55e" fill-opacity="0.15"/>
  <text x="294" y="423" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">+4.5%</text>

