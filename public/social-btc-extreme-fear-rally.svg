  <rect x="60" y="275" width="520" height="215" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>

  <!-- BTC price -->
  <text x="85" y="310" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BITCOIN</text>
  <text x="85" y="352" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#e6edf3">$73,882</text>
