  <text x="265" y="555" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">ETH +7.6%</text>

  <rect x="320" y="536" width="95" height="28" rx="8" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.15"/>
  <text x="367" y="555" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">SOL +6.1%</text>

  <rect x="425" y="536" width="95" height="28" rx="8" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.15"/>
  <text x="472" y="555" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">ZEC +8.2%</text>

  <rect x="530" y="536" width="95" height="28" rx="8" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.15"/>
  <text x="577" y="555" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">XRP +4.5%</text>

  <rect x="635" y="536" width="100" height="28" rx="8" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.15"/>
  <text x="685" y="555" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">ZRO +9.8%</text>

  <!-- CTA -->
  <text x="60" y="600" font-family="Inter, sans-serif" font-size="14" fill="#06b6d4">degen0x.com/tools/dca-calculator</text>

  <!-- Quote -->
  <text x="600" y="600" font-family="Inter, sans-serif" font-size="13" fill="#6e7681" font-style="italic">"Be greedy when others are fearful."</text>

  <!-- Brand bar -->
  <text x="1090" y="600" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="url(#brand2)" text-anchor="end">degen0x.com</text>
</svg>