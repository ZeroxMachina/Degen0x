<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="brand2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="23%" style="stop-color:#ef4444"/>
      <stop offset="24%" style="stop-color:#30363d"/>
      <stop offset="100%" style="stop-color:#30363d"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="smGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#greenGrad)"/>

  <!-- Decorative orbs -->
  <circle cx="1000" cy="150" r="130" fill="#22c55e" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="150" cy="480" r="100" fill="#06b6d4" opacity="0.04" filter="url(#glow2)"/>

  <!-- Badge -->
  <rect x="60" y="50" width="180" height="36" rx="18" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="82" cy="68" r="5" fill="#22c55e" filter="url(#smGlow)"/>
  <text x="96" y="74" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#22c55e" letter-spacing="0.05em">MARKET RALLY</text>

  <!-- degen0x logo text -->
  <text x="1090" y="74" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="url(#brand2)" text-anchor="end">degen0x</text>

