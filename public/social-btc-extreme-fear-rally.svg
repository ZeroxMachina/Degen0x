  <text x="635" y="310" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">FEAR &amp; GREED INDEX</text>
  <text x="635" y="365" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ef4444">23</text>
