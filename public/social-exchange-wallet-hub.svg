<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1530;stop-opacity:1" />
    </linearGradient>
    <!-- Brand gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- Card glow -->
    <filter id="cardGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft glow for accent bar -->
    <filter id="accentGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Indigo card gradient -->
    <linearGradient id="cardIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.06" />
    </linearGradient>
    <!-- Cyan card gradient -->
    <linearGradient id="cardCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.06" />
    </linearGradient>
    <!-- Amber card gradient -->
    <linearGradient id="cardAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.06" />
    </linearGradient>
    <!-- Decorative glow orbs -->
    <radialGradient id="orbLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="orbRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative glow orbs -->
  <ellipse cx="120" cy="280" rx="200" ry="200" fill="url(#orbLeft)" opacity="0.7"/>
  <ellipse cx="1100" cy="400" rx="180" ry="180" fill="url(#orbRight)" opacity="0.6"/>

  <!-- Top accent gradient bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#titleGrad)" filter="url(#accentGlow)"/>

