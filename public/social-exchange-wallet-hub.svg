  <text x="830" y="396" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Kraken</text>
  <rect x="1050" y="381" width="44" height="20" rx="10" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
