  <text x="830" y="438" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e">OKX</text>
  <rect x="1044" y="423" width="50" height="20" rx="10" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="1069" y="437" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#fbbf24" text-anchor="middle">#2</text>

  <rect x="810" y="457" width="299" height="36" rx="8" fill="rgba(255,255,255,0.03)"/>
  <text x="830" y="480" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e">Bybit</text>
  <rect x="1044" y="465" width="50" height="20" rx="10" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.18)" stroke-width="1"/>
  <text x="1069" y="479" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f59e0b" text-anchor="middle">#3</text>

