<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#mainGradient)"/>

  <!-- Decorative gradient circles -->
  <circle cx="100" cy="80" r="80" fill="url(#accentGradient1)"/>
  <circle cx="1100" cy="520" r="120" fill="url(#accentGradient1)"/>

  <!-- Glass morphism card background -->
  <rect x="60" y="100" width="1080" height="430" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" rx="12"/>

  <!-- Category badge -->
  <g>
    <rect x="80" y="120" width="120" height="40" fill="rgba(79,70,229,0.2)" stroke="rgba(79,70,229,0.5)" stroke-width="1" rx="6"/>
    <text x="140" y="147" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#4f46e5" text-anchor="middle">LEARN</text>
  </g>

  <!-- Title -->
  <text x="600" y="220" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" text-anchor="middle" dominant-baseline="middle">
    <tspan x="600" dy="0">DeFi Points & Airdrop</tspan>
    <tspan x="600" dy="65">Farming Guide 2026</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="380" font-family="Inter, sans-serif" font-size="24" fill="#8b949e" text-anchor="middle" dominant-baseline="middle">
    Master strategies for farming airdrops across DeFi protocols
  </text>

  <!-- Decorative dots -->
  <circle cx="300" cy="480" r="4" fill="#4f46e5" opacity="0.6"/>
  <circle cx="340" cy="500" r="3" fill="#0891b2" opacity="0.6"/>
  <circle cx="900" cy="470" r="4" fill="#d97706" opacity="0.6"/>
  <circle cx="940" cy="510" r="3" fill="#4f46e5" opacity="0.6"/>

  <!-- Footer branding -->
  <text x="600" y="580" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#8b949e" text-anchor="middle">degen0x.com</text>
</svg>