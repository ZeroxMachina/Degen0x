  <text x="80" y="590" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">degen0x.com</text>
  <text x="1120" y="590" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Learn Guide · SOL, XRP &amp; ETH ETFs · Updated March 2026</text>

