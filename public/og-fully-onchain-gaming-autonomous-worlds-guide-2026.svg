<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gaming" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent-gaming" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gaming-purple-green" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow-gaming">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-gaming)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-gaming)"/>

  <!-- Background decorative circles -->
  <circle cx="1000" cy="80" r="130" fill="#8b5cf6" opacity="0.03"/>
  <circle cx="1080" cy="200" r="90" fill="#22c55e" opacity="0.025"/>
  <circle cx="1050" cy="500" r="110" fill="#8b5cf6" opacity="0.035"/>

  <!-- Game controller / world nodes visualization -->
  <g opacity="0.7" filter="url(#glow-gaming)">
    <!-- Central node -->
    <circle cx="1050" cy="200" r="12" fill="#22c55e"/>

    <!-- Connected nodes (network visualization) -->
    <circle cx="980" cy="160" r="8" fill="#8b5cf6"/>
    <circle cx="1020" cy="140" r="8" fill="#22c55e"/>
    <circle cx="1100" cy="160" r="8" fill="#8b5cf6"/>
    <circle cx="1000" cy="260" r="8" fill="#22c55e"/>
    <circle cx="1100" cy="260" r="8" fill="#8b5cf6"/>

    <!-- Connection lines -->
    <line x1="1050" y1="200" x2="980" y2="160" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="1050" y1="200" x2="1020" y2="140" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <line x1="1050" y1="200" x2="1100" y2="160" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="1050" y1="200" x2="1000" y2="260" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <line x1="1050" y1="200" x2="1100" y2="260" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Game controller buttons on right side -->
  <g opacity="0.5" filter="url(#glow-gaming)">
    <!-- D-pad -->
    <rect x="1000" y="380" width="15" height="15" rx="2" fill="#8b5cf6"/>
    <rect x="1020" y="380" width="15" height="15" rx="2" fill="#8b5cf6"/>
    <rect x="1040" y="380" width="15" height="15" rx="2" fill="#22c55e"/>

    <!-- Action buttons -->
    <circle cx="1000" cy="430" r="8" fill="#22c55e"/>
    <circle cx="1025" cy="430" r="8" fill="#8b5cf6"/>
    <circle cx="1050" cy="430" r="8" fill="#22c55e"/>
  </g>

  <!-- Logo: degen0x top-left -->
  <g>
    <circle cx="60" cy="45" r="30" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <text x="60" y="52" fill="#0891b2" font-family="Inter, sans-serif" font-size="24" font-weight="700" text-anchor="middle">0x</text>
    <text x="110" y="52" fill="#ffffff" font-family="Inter, sans-serif" font-size="16" font-weight="700">degen0x</text>
  </g>

  <!-- Category badges -->
  <g>
    <!-- Gaming badge -->
    <rect x="60" y="100" width="90" height="32" rx="6" fill="rgba(139, 92, 246, 0.2)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="105" y="122" fill="#d8b4fe" font-family="Inter, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Gaming</text>

    <!-- Web3 badge -->
    <rect x="170" y="100" width="90" height="32" rx="6" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="1"/>
    <text x="215" y="122" fill="#86efac" font-family="Inter, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Web3</text>
  </g>

  <!-- Main title -->
  <text x="60" y="220" fill="#ffffff" font-family="Inter, sans-serif" font-size="52" font-weight="700">Onchain Gaming &amp;</text>
  <text x="60" y="280" fill="#ffffff" font-family="Inter, sans-serif" font-size="52" font-weight="700">Autonomous Worlds</text>

  <!-- Subtitle -->
  <text x="60" y="330" fill="#8b949e" font-family="Inter, sans-serif" font-size="18" font-weight="400">Fully Onchain Games Guide 2026</text>

  <!-- Stats cards -->
  <g>
    <!-- Card 1: $2B+ Market -->
    <rect x="60" y="380" width="140" height="90" rx="8" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="130" y="410" fill="#d8b4fe" font-family="Inter, sans-serif" font-size="22" font-weight="700" text-anchor="middle">$2B+</text>
    <text x="130" y="435" fill="#8b949e" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Market Size</text>

    <!-- Card 2: 100+ Games -->
    <rect x="220" y="380" width="140" height="90" rx="8" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="1"/>
    <text x="290" y="410" fill="#86efac" font-family="Inter, sans-serif" font-size="22" font-weight="700" text-anchor="middle">100+</text>
    <text x="290" y="435" fill="#8b949e" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Games</text>

    <!-- Card 3: MUD & Dojo -->
    <rect x="380" y="380" width="140" height="90" rx="8" fill="rgba(79, 70, 229, 0.1)" stroke="#4f46e5" stroke-width="1"/>
    <text x="450" y="405" fill="#a8b5ff" font-family="Inter, sans-serif" font-size="16" font-weight="700" text-anchor="middle">MUD &amp;</text>
    <text x="450" y="430" fill="#a8b5ff" font-family="Inter, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Dojo</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500">degen0x.com</text>
</svg>