<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="suiGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6fbcf0"/>
      <stop offset="100%" stop-color="#4da2e0"/>
    </linearGradient>
    <linearGradient id="tvlBar" x1="0" y1="0" x2="350" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="50"/>
    </filter>
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accent2)"/>

  <!-- Ambient glow orbs — Sui blue tint -->
  <circle cx="350" cy="300" r="250" fill="#4da2e0" opacity="0.04" filter="url(#glow3)"/>
  <circle cx="950" cy="400" r="200" fill="#6366f1" opacity="0.04" filter="url(#glow3)"/>

  <!-- Sui droplet logo (simplified) -->
  <g transform="translate(80, 130)">
    <path d="M50 0 C50 0 100 50 100 80 C100 108 78 130 50 130 C22 130 0 108 0 80 C0 50 50 0 50 0Z" fill="url(#suiGrad)" opacity="0.15"/>
    <path d="M50 0 C50 0 100 50 100 80 C100 108 78 130 50 130 C22 130 0 108 0 80 C0 50 50 0 50 0Z" stroke="#6fbcf0" stroke-width="2" fill="none" opacity="0.4"/>
    <text x="50" y="82" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#6fbcf0" text-anchor="middle" opacity="0.8">S</text>
  </g>

  <!-- degen0x logo -->
  <g transform="translate(80, 55)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.2"/>
    <text x="16" y="21" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#818cf8" text-anchor="middle">0x</text>
  </g>
  <text x="120" y="75" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">degen0x.com</text>

  <!-- Hero title -->
  <text x="210" y="190" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Sui Blockchain</text>
  <text x="210" y="230" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#6fbcf0">The Move-based L1 hitting $1B+ TVL</text>

  <!-- Feature pills row -->
  <g transform="translate(210, 260)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="155" height="32" rx="16" fill="#6fbcf0" fill-opacity="0.1" stroke="#6fbcf0" stroke-opacity="0.25" stroke-width="1"/>
    <text x="78" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6fbcf0" text-anchor="middle">Object-Centric</text>
    <!-- Pill 2 -->
    <rect x="168" y="0" width="160" height="32" rx="16" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
    <text x="248" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle">Parallel Execution</text>
    <!-- Pill 3 -->
    <rect x="342" y="0" width="170" height="32" rx="16" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>
    <text x="427" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4" text-anchor="middle">Sub-Second Finality</text>
    <!-- Pill 4 -->
    <rect x="526" y="0" width="108" height="32" rx="16" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.25" stroke-width="1"/>
    <text x="580" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">zkLogin</text>
  </g>

  <!-- Ecosystem glass card -->
  <rect x="80" y="320" width="520" height="250" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>

  <text x="112" y="356" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Ecosystem Highlights</text>

  <!-- Protocol rows -->
  <g transform="translate(112, 375)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6fbcf0">DeepBook</text>
    <text x="120" y="0" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">On-chain CLOB order book</text>
  </g>
  <g transform="translate(112, 400)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#818cf8">Cetus / Turbos</text>
    <text x="120" y="0" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Concentrated liquidity DEXs</text>
  </g>
  <g transform="translate(112, 425)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">Scallop / NAVI</text>
    <text x="120" y="0" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Lending & borrowing protocols</text>
  </g>
  <g transform="translate(112, 450)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">Walrus</text>
    <text x="120" y="0" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Decentralized blob storage</text>
  </g>
  <g transform="translate(112, 475)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">SuiNS</text>
    <text x="120" y="0" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Name service (.sui domains)</text>
  </g>

  <!-- Divider in card -->
  <line x1="112" y1="495" x2="568" y2="495" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <text x="112" y="518" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Move language · Built by Mysten Labs (ex-Meta Diem team)</text>

  <!-- Right side: TVL & stats panel -->
  <rect x="640" y="320" width="480" height="250" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>

  <text x="672" y="356" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Network Stats</text>

  <!-- TVL metric -->
  <text x="672" y="390" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e">Total Value Locked</text>
  <text x="672" y="420" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#22c55e">$1.2B+</text>
  <!-- TVL bar -->
  <rect x="672" y="435" width="380" height="8" rx="4" fill="white" fill-opacity="0.06"/>
  <rect x="672" y="435" width="350" height="8" rx="4" fill="url(#tvlBar)"/>

  <!-- Stats grid -->
  <g transform="translate(672, 470)">
    <!-- Finality -->
    <rect x="0" y="0" width="118" height="60" rx="10" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
    <text x="59" y="24" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#06b6d4" text-anchor="middle">&lt;0.5s</text>
    <text x="59" y="42" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Finality</text>
  </g>
  <g transform="translate(802, 470)">
    <!-- TPS -->
    <rect x="0" y="0" width="118" height="60" rx="10" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
    <text x="59" y="24" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#818cf8" text-anchor="middle">297K</text>
    <text x="59" y="42" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Peak TPS</text>
  </g>
  <g transform="translate(932, 470)">
    <!-- Staking -->
    <rect x="0" y="0" width="118" height="60" rx="10" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
    <text x="59" y="24" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">~3.5%</text>
    <text x="59" y="42" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Staking APY</text>
  </g>

  <!-- Bottom bar -->
  <rect y="610" width="1200" height="20" fill="#060a16"/>
  <rect y="610" width="1200" height="2" fill="url(#accent2)" opacity="0.3"/>
  <text x="600" y="625" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">degen0x.com/learn/sui-blockchain-guide</text>
</svg>