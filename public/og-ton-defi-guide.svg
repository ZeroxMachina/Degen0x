<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="tonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0088CC"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="180" r="180" fill="#0088CC" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="400" r="120" fill="#58a6ff" opacity="0.05" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="100" fill="#0891b2" opacity="0.04" filter="url(#glow)"/>

  <!-- Category Badge -->
  <rect x="60" y="480" width="120" height="32" rx="16" fill="#0088CC" opacity="0.2" stroke="#0088CC" stroke-width="1.5"/>
  <text x="120" y="502" font-size="13" fill="#0088CC" text-anchor="middle" font-family="Inter" font-weight="600">DEFI</text>

  <!-- Main Title -->
  <text x="70" y="560" font-size="48" font-weight="bold" fill="url(#tonGrad)" font-family="Inter">TON Blockchain DeFi Guide 2026</text>

  <!-- Subtitle -->
  <text x="70" y="600" font-size="18" fill="#8b949e" font-family="Inter">Telegram's 1B+ User DeFi Ecosystem</text>

  <!-- TON protocol squares -->
  <g opacity="0.6">
    <!-- STON.fi -->
    <rect x="150" y="180" width="140" height="140" rx="12" fill="none" stroke="#0088CC" stroke-width="2"/>
    <text x="220" y="235" font-size="16" font-weight="bold" fill="#0088CC" text-anchor="middle" font-family="Inter">STON.fi</text>
    <text x="220" y="260" font-size="12" fill="#8b949e" text-anchor="middle" font-family="Inter">DEX</text>
  </g>

  <!-- DeDust -->
  <g opacity="0.6">
    <rect x="380" y="200" width="140" height="140" rx="12" fill="none" stroke="#58a6ff" stroke-width="2.5"/>
    <text x="450" y="255" font-size="16" font-weight="bold" fill="#58a6ff" text-anchor="middle" font-family="Inter">DeDust</text>
    <text x="450" y="280" font-size="12" fill="#8b949e" text-anchor="middle" font-family="Inter">AMM</text>
  </g>

  <!-- EVAA -->
  <g opacity="0.6">
    <rect x="610" y="180" width="140" height="140" rx="12" fill="none" stroke="#0891b2" stroke-width="2"/>
    <text x="680" y="235" font-size="16" font-weight="bold" fill="#0891b2" text-anchor="middle" font-family="Inter">EVAA</text>
    <text x="680" y="260" font-size="12" fill="#8b949e" text-anchor="middle" font-family="Inter">Lending</text>
  </g>

  <!-- Telegram integration -->
  <g opacity="0.5">
    <circle cx="880" cy="250" r="50" fill="none" stroke="#0088CC" stroke-width="2"/>
    <text x="880" y="260" font-size="32" fill="#0088CC" text-anchor="middle" font-family="Inter">📱</text>
  </g>

  <!-- degen0x branding -->
  <text x="1100" y="600" font-size="14" fill="#8b949e" text-anchor="end" font-family="Inter" font-weight="600">degen0x</text>
</svg>