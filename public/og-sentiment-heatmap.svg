<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e6ed;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Decorative glow circles -->
  <circle cx="150" cy="100" r="80" fill="#8b5cf6" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1050" cy="500" r="120" fill="#8b5cf6" opacity="0.06" filter="url(#glow)"/>
  <circle cx="900" cy="120" r="60" fill="#d97706" opacity="0.07" filter="url(#glow)"/>

  <!-- Category badge -->
  <rect x="60" y="60" width="200" height="40" rx="20" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="2"/>
  <text x="160" y="87" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#8b5cf6" text-anchor="middle">SENTIMENT</text>

  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="url(#titleGradient)">Sentiment Heatmap</text>

  <!-- Subtitle -->
  <text x="60" y="210" font-family="system-ui, sans-serif" font-size="20" fill="#8b949e">Real-time fear &amp; greed across 50+ tokens</text>

  <!-- Visualization: Heatmap grid -->
  <g>
    <!-- Heatmap background -->
    <rect x="750" y="80" width="400" height="400" rx="12" fill="#0a1427" opacity="0.5" stroke="#1e293b" stroke-width="1"/>

    <!-- Heatmap grid of squares - Row 1 -->
    <rect x="770" y="100" width="28" height="28" fill="#22c55e" opacity="0.9"/>
    <rect x="805" y="100" width="28" height="28" fill="#22c55e" opacity="0.85"/>
    <rect x="840" y="100" width="28" height="28" fill="#16a34a" opacity="0.9"/>
    <rect x="875" y="100" width="28" height="28" fill="#f59e0b" opacity="0.85"/>
    <rect x="910" y="100" width="28" height="28" fill="#ef4444" opacity="0.8"/>
    <rect x="945" y="100" width="28" height="28" fill="#dc2626" opacity="0.9"/>

    <!-- Row 2 -->
    <rect x="770" y="135" width="28" height="28" fill="#16a34a" opacity="0.9"/>
    <rect x="805" y="135" width="28" height="28" fill="#22c55e" opacity="0.8"/>
    <rect x="840" y="135" width="28" height="28" fill="#f59e0b" opacity="0.85"/>
    <rect x="875" y="135" width="28" height="28" fill="#fbbf24" opacity="0.8"/>
    <rect x="910" y="135" width="28" height="28" fill="#f59e0b" opacity="0.9"/>
    <rect x="945" y="135" width="28" height="28" fill="#ef4444" opacity="0.8"/>

    <!-- Row 3 -->
    <rect x="770" y="170" width="28" height="28" fill="#22c55e" opacity="0.85"/>
    <rect x="805" y="170" width="28" height="28" fill="#16a34a" opacity="0.8"/>
    <rect x="840" y="170" width="28" height="28" fill="#22c55e" opacity="0.9"/>
    <rect x="875" y="170" width="28" height="28" fill="#f59e0b" opacity="0.8"/>
    <rect x="910" y="170" width="28" height="28" fill="#dc2626" opacity="0.85"/>
    <rect x="945" y="170" width="28" height="28" fill="#b91c1c" opacity="0.9"/>

    <!-- Row 4 -->
    <rect x="770" y="205" width="28" height="28" fill="#fbbf24" opacity="0.8"/>
    <rect x="805" y="205" width="28" height="28" fill="#f59e0b" opacity="0.9"/>
    <rect x="840" y="205" width="28" height="28" fill="#fbbf24" opacity="0.85"/>
    <rect x="875" y="205" width="28" height="28" fill="#ef4444" opacity="0.8"/>
    <rect x="910" y="205" width="28" height="28" fill="#dc2626" opacity="0.9"/>
    <rect x="945" y="205" width="28" height="28" fill="#ef4444" opacity="0.85"/>

    <!-- Row 5 -->
    <rect x="770" y="240" width="28" height="28" fill="#22c55e" opacity="0.8"/>
    <rect x="805" y="240" width="28" height="28" fill="#16a34a" opacity="0.9"/>
    <rect x="840" y="240" width="28" height="28" fill="#f59e0b" opacity="0.85"/>
    <rect x="875" y="240" width="28" height="28" fill="#fbbf24" opacity="0.9"/>
    <rect x="910" y="240" width="28" height="28" fill="#f59e0b" opacity="0.8"/>
    <rect x="945" y="240" width="28" height="28" fill="#ef4444" opacity="0.8"/>

    <!-- Scale legend -->
    <text x="770" y="295" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Fear</text>
    <rect x="820" y="283" width="12" height="12" fill="#ef4444" opacity="0.8"/>
    <rect x="840" y="283" width="12" height="12" fill="#f59e0b" opacity="0.8"/>
    <rect x="860" y="283" width="12" height="12" fill="#fbbf24" opacity="0.8"/>
    <rect x="880" y="283" width="12" height="12" fill="#22c55e" opacity="0.9"/>
    <text x="900" y="295" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Greed</text>

    <!-- Average sentiment score -->
    <text x="900" y="340" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Neutral</text>
    <text x="900" y="365" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">50 tokens tracked</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0a1427" opacity="0.6"/>
  <circle cx="60" cy="615" r="10" fill="#6366f1"/>
  <text x="75" y="621" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">degen0x.com</text>

  <!-- Decorative accent elements -->
  <circle cx="1180" cy="615" r="8" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="1150" cy="615" r="6" fill="#4f46e5" opacity="0.25"/>
</svg>
