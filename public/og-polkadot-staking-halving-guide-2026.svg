<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6007A;stop-opacity:0.15;stop-color-interpolation-method:sRGB" />
      <stop offset="100%" style="stop-color:#E6007A;stop-opacity:0.05;stop-color-interpolation-method:sRGB" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Top gradient accent bar -->
  <rect width="1200" height="8" fill="url(#topGradient)"/>

  <!-- Decorative circle elements with Polkadot pink -->
  <circle cx="150" cy="150" r="80" fill="#E6007A" opacity="0.08"/>
  <circle cx="1050" cy="500" r="120" fill="#E6007A" opacity="0.06"/>

  <!-- Badge background with Polkadot pink accent -->
  <rect x="100" y="480" width="280" height="90" rx="12" fill="url(#badgeGradient)" stroke="#E6007A" stroke-width="2" opacity="0.9"/>

  <!-- Badge content -->
  <text x="240" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#E6007A" text-anchor="middle">Polkadot Staking</text>
  <text x="240" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Mainnet Event 2026</text>
  <text x="240" y="552" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">53.6% Issuance Cut</text>

  <!-- degen0x logo at top-left -->
  <text x="40" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#6366f1">degen0x</text>

  <!-- Main title -->
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">
    Polkadot Staking
  </text>
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">
    &amp; Halving Guide 2026
  </text>

  <!-- Subtitle -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#8b949e" text-anchor="middle">
    53.6% Issuance Cut · 24-48hr Unbonding · New Reward Model
  </text>

  <!-- degen0x.com at bottom right -->
  <text x="1160" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" text-anchor="end">degen0x.com</text>

  <!-- Decorative accent line -->
  <line x1="200" y1="405" x2="1000" y2="405" stroke="#E6007A" stroke-width="2" opacity="0.3"/>
</svg>