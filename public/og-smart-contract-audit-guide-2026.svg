<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />

  <!-- Accent Bar -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGradient)" />

  <!-- Decorative circles -->
  <circle cx="150" cy="120" r="80" fill="#ef4444" opacity="0.08" />
  <circle cx="1050" cy="480" r="120" fill="#10b981" opacity="0.06" />
  <circle cx="900" cy="130" r="60" fill="#f59e0b" opacity="0.05" />

  <!-- Shield icon -->
  <g opacity="0.5" transform="translate(150, 180)">
    <path d="M 100 0 L 200 40 L 200 120 C 200 180 100 220 100 220 C 100 220 0 180 0 120 L 0 40 Z" fill="none" stroke="#ef4444" stroke-width="3"/>
    <!-- Checkmark inside shield -->
    <path d="M 60 120 L 90 150 L 150 90" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bug/vulnerability icon -->
  <g opacity="0.35" transform="translate(480, 200)">
    <circle cx="50" cy="50" r="30" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="50" y="58" font-size="28" fill="#f59e0b" text-anchor="middle" font-family="monospace">!</text>
    <!-- Magnifying glass -->
    <circle cx="120" cy="50" r="25" fill="none" stroke="#8b949e" stroke-width="2"/>
    <line x1="140" y1="70" x2="160" y2="90" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- OWASP Top 10 mini-list -->
  <g opacity="0.3" transform="translate(700, 180)">
    <rect x="0" y="0" width="280" height="200" rx="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
    <text x="20" y="30" font-size="12" fill="#8b949e" font-family="monospace">OWASP TOP 10</text>
    <line x1="20" y1="40" x2="260" y2="40" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="62" font-size="11" fill="#ef4444" font-family="monospace">1. Access Control  $953M</text>
    <text x="20" y="82" font-size="11" fill="#f59e0b" font-family="monospace">2. Input Validation  34.6%</text>
    <text x="20" y="102" font-size="11" fill="#f59e0b" font-family="monospace">3. Reentrancy</text>
    <text x="20" y="122" font-size="11" fill="#8b949e" font-family="monospace">4. Oracle Manipulation</text>
    <text x="20" y="142" font-size="11" fill="#8b949e" font-family="monospace">5. Flash Loan Attacks</text>
    <text x="20" y="168" font-size="10" fill="#30363d" font-family="monospace">... 5 more</text>
  </g>

  <!-- $17B stat -->
  <g opacity="0.4">
    <text x="160" y="460" font-size="42" font-weight="bold" fill="#ef4444" text-anchor="middle" font-family="Inter">$17B</text>
    <text x="160" y="482" font-size="12" fill="#8b949e" text-anchor="middle" font-family="Inter">Lost to Hacks (2025)</text>
  </g>

  <!-- Category Badge -->
  <rect x="60" y="480" width="120" height="32" rx="16" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="502" font-size="13" fill="#ef4444" text-anchor="middle" font-family="Inter" font-weight="600">SECURITY</text>

  <!-- Main Title -->
  <text x="70" y="555" font-size="44" font-weight="bold" fill="url(#titleGradient)" font-family="Inter">Smart Contract Security Audits</text>

  <!-- Subtitle -->
  <text x="70" y="595" font-size="20" fill="#8b949e" font-family="Inter">Complete Guide 2026 — OWASP Top 10, Costs &amp; Best Practices</text>

  <!-- degen0x branding -->
  <text x="1100" y="600" font-size="14" fill="#8b949e" text-anchor="end" font-family="Inter" font-weight="600">degen0x</text>
</svg>