<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="vaultGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="yieldGrad" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Vault diagram (right side) -->
  <g transform="translate(780, 80)">
    <!-- Main vault container -->
    <rect x="20" y="20" width="320" height="200" rx="20" fill="rgba(99,102,241,0.06)" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
    <text x="180" y="52" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#818cf8" text-anchor="middle">VAULT</text>

    <!-- Deposit arrows flowing in -->
    <g opacity="0.5">
      <line x1="0" y1="80" x2="20" y2="80" stroke="#06b6d4" stroke-width="2"/>
      <polygon points="17,76 24,80 17,84" fill="#06b6d4"/>
      <line x1="0" y1="120" x2="20" y2="120" stroke="#06b6d4" stroke-width="2"/>
      <polygon points="17,116 24,120 17,124" fill="#06b6d4"/>
      <line x1="0" y1="160" x2="20" y2="160" stroke="#06b6d4" stroke-width="2"/>
      <polygon points="17,156 24,160 17,164" fill="#06b6d4"/>
    </g>

    <!-- Inner strategy blocks -->
    <rect x="45" y="70" width="120" height="50" rx="10" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1"/>
    <text x="105" y="92" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#67e8f9" text-anchor="middle">Lending</text>
    <text x="105" y="107" font-family="Inter, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Morpho / Aave</text>

    <rect x="195" y="70" width="120" height="50" rx="10" fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="255" y="92" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#a78bfa" text-anchor="middle">Yield Token</text>
    <text x="255" y="107" font-family="Inter, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Pendle PT/YT</text>

    <rect x="45" y="135" width="120" height="50" rx="10" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1"/>
    <text x="105" y="157" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#fbbf24" text-anchor="middle">Options</text>
    <text x="105" y="172" font-family="Inter, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Covered Calls</text>

    <rect x="195" y="135" width="120" height="50" rx="10" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1"/>
    <text x="255" y="157" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#4ade80" text-anchor="middle">Liquidity</text>
    <text x="255" y="172" font-family="Inter, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Kamino CLP</text>

    <!-- Yield output arrows -->
    <g opacity="0.5">
      <line x1="340" y1="100" x2="370" y2="100" stroke="#22c55e" stroke-width="2"/>
      <polygon points="367,96 374,100 367,104" fill="#22c55e"/>
      <line x1="340" y1="140" x2="370" y2="140" stroke="#22c55e" stroke-width="2"/>
      <polygon points="367,136 374,140 367,144" fill="#22c55e"/>
    </g>

    <!-- Yield label -->
    <text x="383" y="125" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#4ade80" transform="rotate(-90, 383, 125)">YIELD</text>
  </g>

  <!-- Yield chart (right side, lower) -->
  <g transform="translate(800, 350)">
    <rect x="0" y="0" width="320" height="100" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Mini area chart showing yield growth -->
    <path d="M20 80 L60 70 L100 65 L140 55 L180 45 L220 40 L260 30 L300 25" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M20 80 L60 70 L100 65 L140 55 L180 45 L220 40 L260 30 L300 25 L300 80 L20 80 Z" fill="url(#yieldGrad)" opacity="0.2"/>
    <text x="160" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">Auto-Compounding Returns</text>
  </g>

  <!-- Stats pills -->
  <g transform="translate(800, 480)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="50" y="21" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#818cf8" text-anchor="middle">$12B+ TVL</text>

    <rect x="110" y="0" width="110" height="32" rx="16" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
    <text x="165" y="21" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#67e8f9" text-anchor="middle">6 Vault Types</text>

    <rect x="230" y="0" width="120" height="32" rx="16" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    <text x="290" y="21" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#4ade80" text-anchor="middle">3-25% APY</text>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 40)">
    <circle cx="16" cy="16" r="16" fill="#6366f1" opacity="0.9"/>
    <text x="16" y="21" font-family="Inter, monospace" font-size="13" font-weight="800" fill="white" text-anchor="middle">0x</text>
    <text x="42" y="22" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#8b949e">degen0x</text>
  </g>

  <!-- Category badge -->
  <rect x="60" y="120" width="50" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1"/>
  <text x="85" y="137" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#818cf8" text-anchor="middle">DeFi</text>

  <!-- Title -->
  <text x="60" y="210" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">DeFi Vaults</text>
  <text x="60" y="270" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="320" font-family="Inter, sans-serif" font-size="18" fill="#8b949e">Automated yield strategies across</text>
  <text x="60" y="348" font-family="Inter, sans-serif" font-size="18" fill="#8b949e">Morpho, Pendle, Yearn &amp; more</text>

  <!-- Protocol tags -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="70" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="35" y="17" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Morpho</text>

    <rect x="78" y="0" width="65" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="111" y="17" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Pendle</text>

    <rect x="151" y="0" width="65" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="184" y="17" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Yearn</text>

    <rect x="224" y="0" width="70" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="259" y="17" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Kamino</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="606" width="1200" height="24" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="622" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1140" y="622" font-family="Inter, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>