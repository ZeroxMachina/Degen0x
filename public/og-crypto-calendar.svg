<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Accent bar -->
  <rect width="1200" height="6" fill="url(#accentGradient)"/>

  <!-- Decorative gradient circles background -->
  <circle cx="200" cy="250" r="110" fill="#4f46e5" opacity="0.08"/>
  <circle cx="1000" cy="350" r="130" fill="#0891b2" opacity="0.08"/>
  <circle cx="100" cy="100" r="90" fill="#d97706" opacity="0.06"/>

  <!-- Glass-morphism container -->
  <rect x="50" y="60" width="1100" height="520" rx="16" fill="url(#glassGradient)"
        stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- degen0x logo text -->
  <text x="80" y="115" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#8b949e" letter-spacing="2">
    degen0x
  </text>

  <!-- Title -->
  <text x="80" y="220" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    Crypto Events
  </text>
  <text x="80" y="280" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">
    Calendar
  </text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8b949e">
    Track launches, unlocks, upgrades & more
  </text>

  <!-- Decorative calendar grid -->
  <g filter="url(#glow)">
    <!-- Calendar frame -->
    <rect x="750" y="360" width="280" height="180" rx="8" fill="rgba(79, 70, 229, 0.1)" stroke="url(#accentGradient)" stroke-width="1"/>

    <!-- Calendar header -->
    <text x="765" y="385" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0891b2">
      April 2024
    </text>

    <!-- Day headers -->
    <text x="770" y="410" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8b949e">Mo Tu We Th Fr Sa Su</text>

    <!-- Calendar grid days -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#8b949e">
      <!-- Week 1 -->
      <text x="770" y="430">1  2  3  4  5  6  7</text>
      <!-- Week 2 -->
      <text x="770" y="450">8  9 10 11 12 13 14</text>
      <!-- Week 3 -->
      <text x="770" y="470">15 16 17 18 19 20 21</text>
      <!-- Week 4 -->
      <text x="770" y="490">22 23 24 25 26 27 28</text>
    </g>

    <!-- Event markers on calendar -->
    <circle cx="805" cy="428" r="3.5" fill="#4f46e5"/>
    <circle cx="875" cy="448" r="3.5" fill="#10b981"/>
    <circle cx="920" cy="468" r="3.5" fill="#d97706"/>
    <circle cx="770" cy="488" r="3.5" fill="#0891b2"/>

    <!-- Event indicator dots -->
    <circle cx="910" cy="380" r="4" fill="#4f46e5" opacity="0.8"/>
    <circle cx="940" cy="385" r="4" fill="#10b981" opacity="0.8"/>
    <circle cx="970" cy="378" r="4" fill="#d97706" opacity="0.8"/>
  </g>

  <!-- Vertical accent lines -->
  <line x1="700" y1="60" x2="700" y2="580" stroke="rgba(79, 70, 229, 0.1)" stroke-width="1"/>

  <!-- Footer -->
  <text x="80" y="595" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#475569">
    degen0x.com
  </text>
</svg>