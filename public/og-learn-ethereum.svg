<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How to Buy Ethereum — Beginner Guide">
  <defs>
    <linearGradient id="bgGradEth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0418"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="gradAccentEth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="titleGradEth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="diamondTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="diamondBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradEth)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#gradAccentEth)"/>

  <!-- Right-third topical motif: stylized Ξ diamond + 4 step-onboarding chips -->
  <g opacity="0.55">
    <text x="970" y="125" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e9d5ff" text-anchor="middle" letter-spacing="2.5">ONBOARDING PATH</text>

    <!-- Diamond (generic geometric, NOT a trademarked logo — 4-sided rhombus with horizontal mid-line) -->
    <g transform="translate(970, 270)">
      <!-- Top half -->
      <polygon points="0,-110 -65,5 0,-15 65,5" fill="url(#diamondTop)" stroke="#a855f7" stroke-width="1.5"/>
      <!-- Bottom half -->
      <polygon points="0,135 -65,15 0,-5 65,15" fill="url(#diamondBot)" stroke="#22d3ee" stroke-width="1.5"/>
      <!-- Center separator highlight -->
      <line x1="-65" y1="5" x2="65" y2="5" stroke="#f0abfc" stroke-width="1.5" opacity="0.85"/>

      <!-- Ξ uppercase Greek Xi glyph as inline text — public typography character, not a trademark -->
      <text x="0" y="-30" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#fdf4ff" text-anchor="middle">Ξ</text>
    </g>

    <!-- 4 step-chips around the diamond -->
    <g font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#cbd5e1" letter-spacing="1.5" text-anchor="middle">
      <g transform="translate(820, 165)">
        <rect x="-40" y="-14" width="80" height="22" rx="3" fill="none" stroke="#d946ef" stroke-width="0.8" opacity="0.7"/>
        <text x="0" y="2">1 · WALLET</text>
      </g>
      <g transform="translate(1120, 165)">
        <rect x="-40" y="-14" width="80" height="22" rx="3" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.7"/>
        <text x="0" y="2">2 · BUY</text>
      </g>
      <g transform="translate(820, 395)">
        <rect x="-45" y="-14" width="90" height="22" rx="3" fill="none" stroke="#7e22ce" stroke-width="0.8" opacity="0.7"/>
        <text x="0" y="2">3 · TRANSFER</text>
      </g>
      <g transform="translate(1120, 395)">
        <rect x="-45" y="-14" width="90" height="22" rx="3" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.7"/>
        <text x="0" y="2">4 · CUSTODY</text>
      </g>
    </g>

    <!-- Connector arrows (curved hints from chips toward the diamond) -->
    <g stroke="#a855f7" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.5" fill="none">
      <path d="M 860,170 Q 900,210 920,235"/>
      <path d="M 1080,170 Q 1040,210 1020,235"/>
      <path d="M 870,395 Q 900,360 920,310"/>
      <path d="M 1075,395 Q 1040,360 1020,310"/>
    </g>
  </g>

  <!-- Cluster signal badge -->
  <g transform="translate(70, 80)">
    <rect width="230" height="28" rx="4" fill="none" stroke="#d946ef" stroke-width="1" opacity="0.7"/>
    <text x="115" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#f0abfc" text-anchor="middle" letter-spacing="2.5">GUIDE · ETHEREUM · BEGINNER</text>
  </g>

  <!-- Title -->
  <text x="70" y="220" font-family="Inter, system-ui, Helvetica, sans-serif" font-size="62" font-weight="800" fill="url(#titleGradEth)" letter-spacing="-1.5">How to Buy Ethereum</text>
  <text x="70" y="290" font-family="Inter, system-ui, Helvetica, sans-serif" font-size="62" font-weight="800" fill="#e9d5ff" letter-spacing="-1.5">A Beginner&apos;s Guide</text>

  <!-- Subtitle -->
  <text x="70" y="350" font-family="Inter, sans-serif" font-size="28" font-weight="500" fill="#cbd5e1">From wallet setup to your first ETH purchase.</text>

  <!-- Detail strip -->
  <text x="70" y="425" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#a855f7" letter-spacing="0.5">Wallet  ·  Exchange  ·  Send  ·  Self-custody</text>

  <!-- Tagline -->
  <text x="70" y="475" font-family="Georgia, Times, serif" font-size="15" font-style="italic" fill="#94a3b8">A 2026 step-by-step path from zero to your first transaction.</text>

  <!-- Bottom row -->
  <text x="70" y="585" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#d946ef" opacity="0.9" letter-spacing="0.5">degen0x.com</text>
  <g transform="translate(1080, 565)">
    <rect width="50" height="28" rx="4" fill="#d946ef"/>
    <text x="25" y="19" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0a0418" text-anchor="middle">2026</text>
  </g>
</svg>
