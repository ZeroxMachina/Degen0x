<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="200" r="180" fill="#f472b6" opacity="0.06"/>
  <circle cx="1060" cy="400" r="130" fill="#a78bfa" opacity="0.05"/>
  <circle cx="120" cy="530" r="90" fill="#06b6d4" opacity="0.04"/>

  <!-- Dice Icon (right side, decorative) -->
  <g opacity="0.12" transform="translate(1000, 230) rotate(15)">
    <!-- Dice body -->
    <rect x="-40" y="-40" width="80" height="80" rx="12" stroke="#f472b6" stroke-width="2.5" fill="none"/>
    <!-- Dice dots (showing 5) -->
    <circle cx="-18" cy="-18" r="6" fill="#f472b6"/>
    <circle cx="18" cy="-18" r="6" fill="#f472b6"/>
    <circle cx="0" cy="0" r="6" fill="#a78bfa"/>
    <circle cx="-18" cy="18" r="6" fill="#f472b6"/>
    <circle cx="18" cy="18" r="6" fill="#f472b6"/>
  </g>

  <!-- Chart bars icon (representing betting markets) -->
  <g opacity="0.10" transform="translate(900, 380)">
    <rect x="-30" y="-10" width="12" height="50" rx="3" fill="#a78bfa"/>
    <rect x="-10" y="-30" width="12" height="70" rx="3" fill="#f472b6"/>
    <rect x="10" y="-20" width="12" height="60" rx="3" fill="#06b6d4"/>
    <rect x="30" y="-40" width="12" height="80" rx="3" fill="#a78bfa"/>
  </g>

  <!-- Category badge -->
  <rect x="60" y="160" width="110" height="32" rx="16" fill="#f472b6" opacity="0.15"/>
  <text x="115" y="181" fill="#f472b6" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">GambleFi</text>

  <!-- Title -->
  <text x="60" y="260" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">GambleFi: Onchain</text>
  <text x="60" y="315" fill="url(#titleGrad)" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">Betting Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="375" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="20">Smart contract betting, liquidity pools &amp; DeFi gambling</text>

  <!-- Stats row -->
  <g transform="translate(60, 420)">
    <rect x="0" y="0" width="140" height="44" rx="10" fill="#f472b6" opacity="0.1"/>
    <text x="70" y="18" fill="#f472b6" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">17% of iGaming</text>
    <text x="70" y="36" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Crypto Share</text>

    <rect x="155" y="0" width="120" height="44" rx="10" fill="#a78bfa" opacity="0.1"/>
    <text x="215" y="18" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">$81B Revenue</text>
    <text x="215" y="36" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Annual Market</text>

    <rect x="290" y="0" width="120" height="44" rx="10" fill="#06b6d4" opacity="0.1"/>
    <text x="350" y="18" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">42+ dApps</text>
    <text x="350" y="36" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Azuro Ecosystem</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="#0a0f1e" opacity="0.8"/>
  <text x="60" y="598" fill="#6366f1" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">degen0x</text>
  <text x="170" y="598" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16">degen0x.com</text>
  <text x="1060" y="598" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14">2026 Guide</text>
</svg>