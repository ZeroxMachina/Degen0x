<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="chartGreen" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Subtle decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#6366f1" opacity="0.04"/>
  <circle cx="150" cy="500" r="140" fill="#06b6d4" opacity="0.03"/>
  <circle cx="900" cy="450" r="120" fill="#d97706" opacity="0.03"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>
  <text x="60" y="80" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">degen0x.com</text>

  <!-- Category badges -->
  <rect x="60" y="110" width="82" height="26" rx="6" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="101" y="128" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle">Investing</text>
  <rect x="152" y="110" width="80" height="26" rx="6" fill="#d2992220" stroke="#d2992240" stroke-width="1"/>
  <text x="192" y="128" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#d29922" text-anchor="middle">Beginner</text>

  <!-- Title -->
