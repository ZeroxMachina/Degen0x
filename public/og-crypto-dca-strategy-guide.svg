  <text x="60" y="242" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="url(#titleGrad)">Guide 2026</text>

  <!-- Subtitle -->
  <text x="60" y="285" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Dollar-cost average Bitcoin &amp; altcoins with backtested data</text>

  <!-- Stats cards row -->
  <!-- Card 1: Returns -->
  <rect x="60" y="320" width="220" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="352" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">BTC DCA Return (2019-2024)</text>
  <text x="80" y="392" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#3fb950">+202%</text>

  <!-- Card 2: Monday Effect -->
  <rect x="300" y="320" width="220" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="320" y="352" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Monday DCA Advantage</text>
  <text x="320" y="392" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#06b6d4">+14.4%</text>

  <!-- Card 3: Fear-Based -->
  <rect x="540" y="320" width="220" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="560" y="352" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">Fear-Based DCA Return</text>
  <text x="560" y="392" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#f59e0b">1,145%</text>

