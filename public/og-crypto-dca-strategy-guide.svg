  <rect x="810" y="320" width="340" height="200" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="830" y="348" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">DCA ACCUMULATION OVER TIME</text>

  <!-- Chart grid lines -->
  <line x1="830" y1="370" x2="1130" y2="370" stroke="#30363d" stroke-width="0.5"/>
  <line x1="830" y1="410" x2="1130" y2="410" stroke="#30363d" stroke-width="0.5"/>
  <line x1="830" y1="450" x2="1130" y2="450" stroke="#30363d" stroke-width="0.5"/>
  <line x1="830" y1="490" x2="1130" y2="490" stroke="#30363d" stroke-width="0.5"/>

  <!-- Area fill under chart -->
  <path d="M830,490 L860,485 L890,475 L920,478 L950,460 L980,440 L1010,445 L1040,420 L1070,395 L1100,380 L1130,370 L1130,500 L830,500 Z" fill="url(#chartGreen)"/>

  <!-- Chart line (upward trend with dips) -->
  <path d="M830,490 L860,485 L890,475 L920,478 L950,460 L980,440 L1010,445 L1040,420 L1070,395 L1100,380 L1130,370" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- DCA buy markers -->
  <circle cx="860" cy="485" r="3" fill="#6366f1"/>
  <circle cx="920" cy="478" r="3" fill="#6366f1"/>
  <circle cx="980" cy="440" r="3" fill="#6366f1"/>
  <circle cx="1040" cy="420" r="3" fill="#6366f1"/>
  <circle cx="1100" cy="380" r="3" fill="#6366f1"/>

  <!-- Chart legend -->
  <circle cx="840" cy="508" r="3" fill="#22c55e"/>
  <text x="850" y="512" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Portfolio value</text>
  <circle cx="960" cy="508" r="3" fill="#6366f1"/>
  <text x="970" y="512" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">DCA buy points</text>

  <!-- Bottom bar -->
  <rect x="60" y="460" width="700" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Covers: Optimal frequency · DCA vs lump sum · Fear-based DCA · Portfolio allocation · Platform comparison</text>
  <text x="80" y="520" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#58a6ff">+ Free DCA Calculator with 50+ tokens →</text>

  <!-- Bottom branding -->
  <rect x="0" y="586" width="1200" height="44" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="614" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8">degen0x.com</text>
  <text x="1140" y="614" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Updated March 2026</text>
