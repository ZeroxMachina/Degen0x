<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="180" r="220" fill="#10b981" opacity="0.04" filter="url(#glow)"/>
  <circle cx="1050" cy="420" r="160" fill="#3b82f6" opacity="0.04" filter="url(#glow)"/>
  <circle cx="150" cy="480" r="150" fill="#8b5cf6" opacity="0.03" filter="url(#glow)"/>

  <!-- Logo -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Badges -->
  <rect x="60" y="90" width="130" height="28" rx="14" fill="#10b981" opacity="0.15"/>
  <text x="125" y="109" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#10b981" text-anchor="middle">Privacy &amp; DeFi</text>

  <rect x="205" y="90" width="110" height="28" rx="14" fill="#3b82f6" opacity="0.15"/>
  <text x="260" y="109" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3b82f6" text-anchor="middle">Intermediate</text>

  <rect x="330" y="90" width="80" height="28" rx="14" fill="#22c55e" opacity="0.15"/>
  <text x="370" y="109" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">2026</text>

  <!-- Title -->
  <text x="60" y="185" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Railgun &amp; Privacy DeFi</text>
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#8b949e">Private Transactions in DeFi</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#6e7681">zk-SNARKs · Shielded Wallets · Proofs of Innocence · 4 Chains</text>

  <!-- Stats cards row -->
  <g transform="translate(60, 330)">
    <!-- Card 1: TVL -->
    <rect x="0" y="0" width="195" height="100" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="35" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Railgun TVL</text>
    <text x="20" y="70" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#10b981">$108M+</text>

    <!-- Card 2: Volume -->
    <rect x="215" y="0" width="195" height="100" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="235" y="35" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Cumulative Volume</text>
    <text x="235" y="70" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#3b82f6">$4.5B+</text>

    <!-- Card 3: Growth -->
    <rect x="430" y="0" width="195" height="100" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="450" y="35" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">YoY Growth</text>
    <text x="450" y="70" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#22c55e">2x</text>

    <!-- Card 4: Chains -->
    <rect x="645" y="0" width="195" height="100" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="665" y="35" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Supported Chains</text>
    <text x="665" y="70" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#8b5cf6">4</text>
  </g>

  <!-- Privacy shield visualization -->
  <g transform="translate(900, 320)">
    <rect x="0" y="10" width="240" height="120" rx="20" fill="url(#cardGrad)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="120" y="50" font-family="Inter, system-ui, sans-serif" font-size="28" text-anchor="middle" fill="#10b981">🔐</text>
    <text x="120" y="80" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#e6edf3">zk-SNARK Verified</text>
    <text x="120" y="100" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#10b981">● Private &amp; Compliant</text>
  </g>

  <!-- Supported chains -->
  <g transform="translate(60, 470)">
    <text x="0" y="15" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" font-weight="600">SUPPORTED CHAINS</text>
    <rect x="0" y="30" width="100" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="50" y="50" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">Ethereum</text>
    <rect x="115" y="30" width="95" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="162" y="50" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">Arbitrum</text>
    <rect x="225" y="30" width="90" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="270" y="50" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">Polygon</text>
    <rect x="330" y="30" width="100" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="380" y="50" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">BNB Chain</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com · Railgun &amp; Privacy DeFi Guide 2026</text>
  <text x="1140" y="620" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>