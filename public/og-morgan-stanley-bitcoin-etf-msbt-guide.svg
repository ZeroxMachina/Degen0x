<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glow1" cx="0.3" cy="0.3" r="0.5" fx="0.3" fy="0.3" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="0.7" cy="0.7" r="0.4" fx="0.7" fy="0.7" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <ellipse cx="300" cy="200" rx="350" ry="250" fill="#4f46e5" opacity="0.06"/>
  <ellipse cx="900" cy="450" rx="300" ry="200" fill="#d97706" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo area -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#818cf8" letter-spacing="0.05em">degen0x</text>

  <!-- Category badges -->
  <rect x="60" y="160" width="95" height="32" rx="6" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="1"/>
  <text x="107" y="181" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">Investing</text>

  <rect x="168" y="160" width="65" height="32" rx="6" fill="#58a6ff20" stroke="#58a6ff" stroke-width="1"/>
  <text x="200" y="181" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#58a6ff" text-anchor="middle">ETFs</text>

  <rect x="246" y="160" width="55" height="32" rx="6" fill="#3fb95020" stroke="#3fb950" stroke-width="1"/>
  <text x="273" y="181" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#3fb950" text-anchor="middle">New</text>

  <!-- Main title -->
  <text x="60" y="260" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Morgan Stanley</text>
  <text x="60" y="320" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Bitcoin ETF (MSBT)</text>

  <!-- Subtitle -->
  <text x="60" y="370" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">First major US bank to launch a spot Bitcoin ETF</text>

  <!-- Info box -->
  <rect x="60" y="420" width="500" height="120" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="455" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Custodian</text>
  <text x="85" y="478" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#e6edf3">Coinbase</text>
  <text x="250" y="455" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Administrator</text>
  <text x="250" y="478" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#e6edf3">BNY Mellon</text>
  <text x="430" y="455" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Exchange</text>
  <text x="430" y="478" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#e6edf3">NYSE Arca</text>
  <text x="85" y="520" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Seed Capital: $1M · Creation Unit: 10,000 shares</text>

  <!-- Bitcoin icon decorative element -->
  <circle cx="950" cy="300" r="120" fill="none" stroke="#d97706" stroke-width="2" opacity="0.3"/>
  <circle cx="950" cy="300" r="90" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.2"/>
  <text x="950" y="320" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="800" fill="#d97706" opacity="0.4" text-anchor="middle">₿</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>
</svg>