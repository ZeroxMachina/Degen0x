<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#gradAccent)"/>

  <!-- Comparison chart visualization -->
  <!-- Left column -->
  <rect x="100" y="130" width="70" height="150" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.4" rx="4"/>
  <line x1="100" y1="220" x2="170" y2="220" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>

  <!-- Middle column -->
  <rect x="300" y="110" width="70" height="170" fill="none" stroke="#0891b2" stroke-width="2" opacity="0.4" rx="4"/>
  <line x1="300" y1="220" x2="370" y2="220" stroke="#0891b2" stroke-width="1" opacity="0.3"/>

  <!-- Right column -->
  <rect x="500" y="100" width="70" height="180" fill="none" stroke="#d97706" stroke-width="2" opacity="0.4" rx="4"/>
  <line x1="500" y1="220" x2="570" y2="220" stroke="#d97706" stroke-width="1" opacity="0.3"/>

  <!-- Right side decorative elements -->
  <circle cx="1000" cy="180" r="45" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.3"/>
  <circle cx="1000" cy="180" r="25" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.15"/>

  <circle cx="1100" cy="480" r="60" fill="none" stroke="#0891b2" stroke-width="2" opacity="0.25"/>
  <circle cx="1100" cy="480" r="35" fill="none" stroke="#0891b2" stroke-width="1" opacity="0.1"/>

  <!-- Title -->
  <text x="600" y="340" font-family="Inter, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">
    Best Perpetual DEX Comparison
  </text>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" fill="#8b949e">
    Derivatives Exchanges and Leverage Trading
  </text>

  <!-- Footer branding -->
  <text x="1150" y="600" font-family="Inter, sans-serif" font-size="16" text-anchor="end" fill="#6e7681">
    degen0x.com
  </text>

  <!-- Decorative dots -->
  <circle cx="120" cy="520" r="4" fill="#0891b2" opacity="0.6"/>
  <circle cx="750" cy="100" r="4" fill="#d97706" opacity="0.5"/>
  <circle cx="950" cy="380" r="4" fill="#4f46e5" opacity="0.5"/>
  <circle cx="250" cy="460" r="3" fill="#d97706" opacity="0.4"/>
</svg>