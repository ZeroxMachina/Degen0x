<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glowing circles -->
  <circle cx="980" cy="200" r="140" fill="#06b6d4" opacity="0.04" filter="url(#glow)"/>
  <circle cx="850" cy="450" r="90" fill="#8b5cf6" opacity="0.05" filter="url(#glow)"/>
  <circle cx="150" cy="520" r="80" fill="#d97706" opacity="0.03" filter="url(#glow)"/>

  <!-- Privacy shield icon -->
  <path d="M960 160 L960 100 L1040 100 L1040 160 Q1000 220 960 160Z" fill="url(#shieldGrad)" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
  <text x="1000" y="155" text-anchor="middle" fill="#06b6d4" font-family="system-ui, sans-serif" font-size="28" opacity="0.8">🔒</text>

  <!-- ZK proof visualization -->
  <rect x="870" y="280" width="220" height="100" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="980" y="310" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="12" opacity="0.7">ZK-SNARK Proof</text>
  <text x="980" y="335" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="11">✓ valid balance</text>
  <text x="980" y="355" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="11">✓ authorized signer</text>
  <text x="980" y="375" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11">✓ compliant</text>

  <!-- Seal framework box -->
  <rect x="870" y="410" width="220" height="70" rx="12" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="980" y="440" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Seal Framework</text>
  <text x="980" y="465" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="11">Threshold Encryption · Move</text>

  <!-- Logo area -->
  <text x="60" y="60" fill="#8b949e" font-family="system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="0.5">degen0x</text>

  <!-- Category badge -->
  <rect x="60" y="140" width="70" height="26" rx="13" fill="#6366f1"/>
  <text x="95" y="157" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Layer 1</text>

  <rect x="140" y="140" width="70" height="26" rx="13" fill="#06b6d4"/>
  <text x="175" y="157" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Privacy</text>

  <!-- Title -->
  <text x="60" y="225" fill="url(#titleGrad)" font-family="system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.5">Sui Private</text>
  <text x="60" y="280" fill="url(#titleGrad)" font-family="system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.5">Transactions</text>

  <!-- Subtitle -->
  <text x="60" y="330" fill="#8b949e" font-family="system-ui, sans-serif" font-size="22">&amp; Seal Framework</text>

  <!-- Description -->
  <text x="60" y="380" fill="#6e7681" font-family="system-ui, sans-serif" font-size="15">Protocol-level compliant privacy with ZK proofs</text>
  <text x="60" y="400" fill="#6e7681" font-family="system-ui, sans-serif" font-size="15">and threshold encryption on Sui Network</text>

  <!-- Stats -->
  <text x="60" y="460" fill="#22c55e" font-family="system-ui, sans-serif" font-size="28" font-weight="700">866 TPS</text>
  <text x="230" y="460" fill="#6e7681" font-family="system-ui, sans-serif" font-size="14">with privacy enabled</text>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" fill="#6e7681" font-family="system-ui, sans-serif" font-size="13">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="system-ui, sans-serif" font-size="13">2026 Guide</text>
</svg>
