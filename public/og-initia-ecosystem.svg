<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="8" fill="url(#mainGradient)"/>

  <!-- Decorative hexagons and circles -->
  <g fill="none" stroke="url(#accentGradient3)" stroke-width="2" opacity="0.4">
    <circle cx="150" cy="150" r="60"/>
    <circle cx="150" cy="150" r="80"/>
  </g>

  <g fill="none" stroke="url(#accentGradient3)" stroke-width="2" opacity="0.4">
    <circle cx="1050" cy="480" r="70"/>
    <circle cx="1050" cy="480" r="95"/>
  </g>

  <!-- Glass morphism card background -->
  <rect x="60" y="100" width="1080" height="430" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" rx="12"/>

  <!-- Category badge -->
  <g>
    <rect x="80" y="120" width="140" height="40" fill="rgba(217,119,6,0.2)" stroke="rgba(217,119,6,0.5)" stroke-width="1" rx="6"/>
    <text x="150" y="147" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#d97706" text-anchor="middle">ECOSYSTEM</text>
  </g>

  <!-- Title -->
  <text x="600" y="220" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" text-anchor="middle" dominant-baseline="middle">
    <tspan x="600" dy="0">Initia</tspan>
    <tspan x="600" dy="65">Ecosystem Guide</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="380" font-family="Inter, sans-serif" font-size="24" fill="#8b949e" text-anchor="middle" dominant-baseline="middle">
    Multi-chain rollup architecture with unified liquidity
  </text>

  <!-- Decorative connected nodes -->
  <g stroke="rgba(217,119,6,0.3)" stroke-width="2">
    <line x1="280" y1="480" x2="340" y2="510"/>
    <line x1="340" y1="510" x2="380" y2="490"/>
    <line x1="280" y1="480" x2="320" y2="520"/>
  </g>

  <circle cx="280" cy="480" r="5" fill="#d97706" opacity="0.8"/>
  <circle cx="340" cy="510" r="5" fill="#d97706" opacity="0.8"/>
  <circle cx="380" cy="490" r="5" fill="#d97706" opacity="0.8"/>

  <!-- Footer branding -->
  <text x="600" y="580" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#8b949e" text-anchor="middle">degen0x.com</text>
</svg>