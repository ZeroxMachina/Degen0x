<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>degen0x ops — live dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #080d1c;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow-x: hidden;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes pulsering { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(2.5); opacity: 0; } }
  @keyframes scanline { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes glow { 0%, 100% { box-shadow: 0 0 15px var(--glow, rgba(99,102,241,0.15)); } 50% { box-shadow: 0 0 30px var(--glow, rgba(99,102,241,0.25)); } }

  .app { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

  /* Top bar */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-radius: 16px;
    background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(6,182,212,0.08), rgba(245,158,11,0.08));
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease;
  }
  .topbar h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; }
  .topbar h1 span {
    background: linear-gradient(135deg, #4f46e5, #0891b2, #d97706);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .topbar .date { font-size: 12px; color: rgba(255,255,255,0.4); font-family: monospace; }
  .load-btn {
    padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
    background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
    color: #818cf8; cursor: pointer; transition: all 0.2s;
  }
  .load-btn:hover { background: rgba(99,102,241,0.25); }

  /* Stats row */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; animation: fadeUp 0.5s ease 0.1s both; }
  .stat {
    padding: 14px 12px; border-radius: 12px; text-align: center;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
  }
  .stat-val { font-size: 22px; font-weight: 800; font-family: monospace; }
  .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 12px; }

  /* Block card */
  .block {
    border-radius: 16px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.4s ease;
    animation: fadeUp 0.5s ease both;
  }
  .block-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; cursor: pointer; user-select: none;
    transition: background 0.3s ease;
  }
  .block-header:hover { background: rgba(255,255,255,0.02); }
  .block-left { display: flex; align-items: center; gap: 12px; }
  .block-icon { font-size: 20px; }
  .block-info h3 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .block-info .time-label { font-size: 11px; font-family: monospace; margin-top: 1px; }
  .block-right { display: flex; align-items: center; gap: 10px; }
  .block-status {
    font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .block-chevron { font-size: 14px; color: rgba(255,255,255,0.3); transition: transform 0.3s ease; }
  .block.expanded .block-chevron { transform: rotate(180deg); }

  /* Status styles */
  .status-completed { background: rgba(74,222,128,0.12); color: #4ade80; }
  .status-active { background: rgba(99,102,241,0.15); color: #818cf8; }
  .status-upcoming { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.35); }
  .status-nodata { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.2); }

  /* Block body (report content) */
  .block-body {
    max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
    background: rgba(0,0,0,0.2);
  }
  .block.expanded .block-body { max-height: 2000px; }
  .block-content { padding: 0 20px 20px; }

  /* Report sections */
  .report-section {
    padding: 14px 16px; border-radius: 10px; margin-top: 10px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
    animation: slideIn 0.3s ease both;
  }
  .report-section h4 {
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .report-section p, .report-section li {
    font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.6;
  }
  .report-section ul { padding-left: 16px; }
  .report-section li { margin-bottom: 4px; }

  /* Skill chips in report */
  .skill-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500;
    margin: 2px 2px;
  }

  /* Metric bars */
  .metric-row {
    display: flex; align-items: center; gap: 10px; margin: 6px 0;
  }
  .metric-label { font-size: 12px; color: rgba(255,255,255,0.5); min-width: 100px; }
  .metric-bar-bg {
    flex: 1; height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.06); overflow: hidden;
  }
  .metric-bar-fill {
    height: 100%; border-radius: 3px; transition: width 0.8s ease;
  }
  .metric-value { font-size: 12px; font-family: monospace; min-width: 40px; text-align: right; }

  /* Page items */
  .page-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px; margin: 4px 0;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
  }
  .page-item .page-slug { font-size: 12px; font-family: monospace; color: rgba(255,255,255,0.7); }
  .page-item .page-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .pass { background: rgba(74,222,128,0.12); color: #4ade80; }
  .fail { background: rgba(239,68,68,0.12); color: #ef4444; }
  .warn { background: rgba(251,191,36,0.12); color: #fbbf24; }

  /* Drop zone */
  .dropzone {
    border: 2px dashed rgba(255,255,255,0.1); border-radius: 16px;
    padding: 40px 20px; text-align: center; margin: 20px 0;
    transition: all 0.3s ease; animation: fadeUp 0.5s ease 0.3s both;
  }
  .dropzone.dragover { border-color: #6366f1; background: rgba(99,102,241,0.05); }
  .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
  .dropzone-text { font-size: 13px; color: rgba(255,255,255,0.4); }
  .dropzone-sub { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 4px; }

  /* No data state */
  .no-data {
    padding: 20px; text-align: center;
    font-size: 12px; color: rgba(255,255,255,0.25);
    font-style: italic;
  }

  /* Active block glow */
  .block.is-active {
    border-color: var(--accent-color, rgba(99,102,241,0.3));
    --glow: var(--accent-color, rgba(99,102,241,0.15));
    animation: fadeUp 0.5s ease both, glow 3s ease-in-out infinite;
  }
  .block.is-active .block-header { background: var(--accent-bg, rgba(99,102,241,0.05)); }

  /* Skill grid */
  .skills-footer {
    margin-top: 20px; padding: 16px 20px; border-radius: 16px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
    animation: fadeUp 0.5s ease 0.5s both;
  }
  .skills-footer-title { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .skills-mini-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-mini {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 10px; font-size: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.4); transition: all 0.4s ease;
  }
  .skill-mini.active { border-color: var(--skill-color); color: var(--skill-color); background: var(--skill-bg); }

  .footer-bar { text-align: center; padding: 16px; font-size: 10px; color: rgba(255,255,255,0.15); margin-top: 12px; }

  input[type="file"] { display: none; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .topbar { flex-direction: column; gap: 10px; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ─── Data model ───
const BLOCKS_META = [
  { id: "standup", name: "Morning Standup", time: "9:00 AM", hour: 9, icon: "\u2615", accent: "#f59e0b", skills: ["pm","ceo","analytics"] },
  { id: "publish", name: "Publish & Deploy", time: "10:00 AM", hour: 10, icon: "\u{1F680}", accent: "#10b981", skills: ["dataEngineer","publishQueue","qa","devops"] },

const SKILLS = {

  devops: { name: "DevOps", icon: "\u2699\uFE0F", color: "#6366f1" },
  dataEngineer: { name: "Data Eng", icon: "\u{1F50C}", color: "#14b8a6" },
  researcher: { name: "Research", icon: "\u{1F50D}", color: "#a78bfa" },
  contentWriter: { name: "Writer", icon: "\u270D\uFE0F", color: "#f472b6" },
  seo: { name: "SEO", icon: "\u{1F3AF}", color: "#22d3ee" },
  pageScaffold: { name: "Scaffold", icon: "\u{1F3D7}\uFE0F", color: "#fb923c" },
  programmer: { name: "Coder", icon: "\u{1F4BB}", color: "#4ade80" },
  uxDesigner: { name: "UX", icon: "\u{1F3A8}", color: "#c084fc" },
  graphicDesigner: { name: "Design", icon: "\u{1F5BC}\uFE0F", color: "#f43f5e" },
  communityManager: { name: "Community", icon: "\u{1F4E3}", color: "#fbbf24" },
};

// Reports store: { "2026-03-15": { standup: {...}, build: {...}, ... } }
let reports = {};
let expandedBlocks = {};
let selectedDate = null;

// ─── Sample data (so it looks good immediately) ───
const today = new Date().toISOString().slice(0, 10);
reports[today] = {
  standup: {
    status: "completed",
    summary: "Reviewed overnight metrics. Organic traffic up 12% WoW. Top priority today: publish 4 DeFi lending pages, scaffold new options calculator.",
    sections: [
      { title: "Priorities Set", items: ["Publish DeFi lending comparison pages (4 pages)", "Scaffold options profit calculator tool", "Fix stale CoinGecko cache on /tools/converter"] },
      { title: "Blockers", items: ["DefiLlama TVL endpoint returning 429s intermittently", "OG images needed for 3 unpublished learn guides"] },
      { title: "Metrics", metrics: [
        { label: "Organic Traffic", value: "2,847", pct: 72, color: "#4ade80" },
        { label: "Pages Indexed", value: "318/326", pct: 97, color: "#06b6d4" },
        { label: "Avg Position", value: "24.3", pct: 55, color: "#f59e0b" },
      ]},
    ],
    skills_used: ["pm", "ceo", "analytics"],
  },
  publish: {
    status: "completed",
    summary: "Promoted 4 pages from queue. All passed QA. Deployed to production successfully.",
    sections: [
      { title: "Pages Published", pages: [
        { slug: "/compare/defi-lending-platforms", status: "pass" },
        { slug: "/compare/liquid-staking-providers", status: "pass" },
        { slug: "/learn/what-is-restaking", status: "pass" },
        { slug: "/tools/impermanent-loss-calculator", status: "pass" },
      ]},
      { title: "QA Results", metrics: [
        { label: "Pages Tested", value: "4/4", pct: 100, color: "#4ade80" },
        { label: "SEO Valid", value: "4/4", pct: 100, color: "#22d3ee" },
        { label: "Mobile OK", value: "4/4", pct: 100, color: "#c084fc" },
      ]},
      { title: "Data Pipeline", metrics: [
        { label: "CoinGecko", value: "Healthy", pct: 95, color: "#4ade80" },
        { label: "DefiLlama", value: "Degraded", pct: 60, color: "#fbbf24" },
        { label: "Cache Hit", value: "89%", pct: 89, color: "#06b6d4" },
      ]},
    ],
    skills_used: ["dataEngineer", "publishQueue", "qa", "devops"],
  },
  build: {
    status: "completed",
    summary: "Researched options trading in crypto. Wrote full guide + scaffolded calculator page. Added to publish queue.",
    sections: [
      { title: "Research Brief", items: ["Crypto options market $1.2B daily volume (Deribit dominates 85%)", "Key topics: calls/puts, Greeks, strategies, DeFi options protocols", "Competitor gap: no good free options profit calculator exists"] },
      { title: "Content Created", items: ["Learn guide: 'Crypto Options Trading for Beginners' (2,400 words)", "Tool page: Options Profit Calculator with P&L visualization", "FAQ section: 8 questions with structured data"] },
      { title: "Pages Scaffolded", pages: [
        { slug: "/learn/crypto-options-trading-guide", status: "pass" },
        { slug: "/tools/options-profit-calculator", status: "pass" },
      ]},
      { title: "SEO Optimization", items: ["Title: 'Crypto Options Profit Calculator | Free P&L Tool'", "Target keyword: 'crypto options calculator' (1.2K monthly)", "Added JSON-LD WebApplication + FAQPage schemas", "Internal links to /learn/perpetual-futures-guide and /tools/converter"] },
    ],
    skills_used: ["researcher", "contentWriter", "seo", "pageScaffold", "programmer"],
  },
  design: {
    status: "completed",
    summary: "UX audit on new options calculator. Created OG images for 3 learn guides. Refined chart interaction patterns.",
    sections: [
      { title: "UX Improvements", items: ["Added input validation with real-time feedback on strike price", "Improved P&L chart: added breakeven line + hover tooltips", "Mobile: stacked layout below 640px with swipeable chart"] },
      { title: "Visuals Created", items: ["OG image: options-trading-guide (1200x630)", "OG image: restaking-guide (1200x630)", "OG image: impermanent-loss-calculator (1200x630)", "Updated chart color scheme to match glass-morphism system"] },
    ],
    skills_used: ["uxDesigner", "graphicDesigner", "programmer"],
  },
  community: {
    status: "completed",
    summary: "Drafted 3 tweets + newsletter section. Top performer: DCA calculator page (+340% traffic this week).",
    sections: [
      { title: "Social Content Drafted", items: ["Twitter thread: 'Why DCA beats lump sum in crypto (with data)'", "Tweet: Options calculator launch announcement", "Newsletter section: Weekly tool spotlight on impermanent loss calc"] },
      { title: "Top Performing Content", metrics: [
        { label: "DCA Calculator", value: "+340%", pct: 95, color: "#4ade80" },
        { label: "Gas Tracker", value: "+52%", pct: 65, color: "#06b6d4" },
        { label: "ETH Staking Guide", value: "+28%", pct: 50, color: "#f59e0b" },
      ]},
    ],
    skills_used: ["communityManager", "analytics", "graphicDesigner"],
  },
  eod: {
    status: "completed",
    summary: "All tests passing. 326 pages indexed. 2 carry-over items for tomorrow. Clean deploy.",
    sections: [
      { title: "Test Results", metrics: [
        { label: "Playwright", value: "47/47", pct: 100, color: "#4ade80" },
        { label: "Build", value: "Clean", pct: 100, color: "#4ade80" },
        { label: "Lighthouse", value: "94", pct: 94, color: "#06b6d4" },
      ]},
      { title: "Daily Scorecard", metrics: [
        { label: "Pages Built", value: "2", pct: 40, color: "#a78bfa" },
        { label: "Pages Published", value: "4", pct: 80, color: "#10b981" },
        { label: "Tests Passing", value: "100%", pct: 100, color: "#4ade80" },
        { label: "Visuals Made", value: "4", pct: 65, color: "#f43f5e" },
      ]},
      { title: "Carry-Over", items: ["DefiLlama rate limiting — Data Engineer to investigate fallback", "3 OG images still needed for unpublished compare pages"] },
    ],
    skills_used: ["qa", "dataEngineer", "devops", "pm"],
  },
};

// ─── Render helpers ───
function renderMetrics(metrics) {
  return metrics.map(m => `
    <div class="metric-row">
      <span class="metric-label">${m.label}</span>
      <div class="metric-bar-bg"><div class="metric-bar-fill" style="width:${m.pct}%;background:${m.color}"></div></div>
      <span class="metric-value" style="color:${m.color}">${m.value}</span>
    </div>
  `).join("");
}

function renderPages(pages) {
  return pages.map(p => `
    <div class="page-item">
      <span class="page-slug">${p.slug}</span>
      <span class="page-status ${p.status}">${p.status === 'pass' ? '\u2713 Pass' : p.status === 'fail' ? '\u2717 Fail' : '\u26A0 Warn'}</span>
    </div>
  `).join("");
}

function renderItems(items) {
  return `<ul>${items.map(i => `<li>${i}</li>`).join("")}</ul>`;
}

function renderSection(sec) {
  let inner = "";
  if (sec.metrics) inner = renderMetrics(sec.metrics);
  else if (sec.pages) inner = renderPages(sec.pages);
  else if (sec.items) inner = renderItems(sec.items);
  return `<div class="report-section"><h4>${sec.title}</h4>${inner}</div>`;
}

function renderSkillTags(skillKeys) {
  return skillKeys.map(k => {
    const s = SKILLS[k];
    if (!s) return "";
    return `<span class="skill-tag" style="background:${s.color}15;border:1px solid ${s.color}33;color:${s.color}">${s.icon} ${s.name}</span>`;
  }).join("");
}

function getActiveDate() {
  const dates = Object.keys(reports).sort().reverse();
  return selectedDate && reports[selectedDate] ? selectedDate : (dates[0] || today);
}

function render() {
  const date = getActiveDate();
  const dayReports = reports[date] || {};
  const dates = Object.keys(reports).sort().reverse();
  const now = new Date();
  const currentHour = now.getHours() + now.getMinutes() / 60;

  // Stats
  const completedCount = BLOCKS_META.filter(b => dayReports[b.id]?.status === "completed").length;
  const totalPages = Object.values(dayReports).reduce((sum, r) => {
    return sum + (r.sections || []).reduce((s2, sec) => s2 + (sec.pages ? sec.pages.length : 0), 0);
  }, 0);
  const allSkillsUsed = new Set();
  Object.values(dayReports).forEach(r => (r.skills_used || []).forEach(s => allSkillsUsed.add(s)));
  const passCount = Object.values(dayReports).reduce((sum, r) => {
    return sum + (r.sections || []).reduce((s2, sec) => s2 + (sec.pages ? sec.pages.filter(p => p.status === "pass").length : 0), 0);
  }, 0);

  let html = `
    <div class="topbar">
      <div>
        <h1><span>degen0x</span> ops</h1>
        <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">
          ${completedCount === 6 ? '\u2705 All blocks completed' : completedCount > 0 ? `${completedCount}/6 blocks completed` : 'Waiting for first block'}
        </div>
      </div>
      <div class="topbar-right">
        ${dates.length > 1 ? `
          <select onchange="selectDate(this.value)" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;font-family:monospace;">
            ${dates.map(d => `<option value="${d}" ${d === date ? 'selected' : ''}>${d}</option>`).join("")}
          </select>
        ` : `<span class="date">${date}</span>`}
        <label class="load-btn" for="fileInput">\u{1F4C2} Load Reports</label>
        <input type="file" id="fileInput" accept=".json" multiple onchange="handleFiles(this.files)">
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val" style="color:#6366f1">${completedCount}/6</div><div class="stat-lbl">Blocks</div></div>
      <div class="stat"><div class="stat-val" style="color:#4ade80">${allSkillsUsed.size}/15</div><div class="stat-lbl">Skills Used</div></div>
      <div class="stat"><div class="stat-val" style="color:#06b6d4">${totalPages}</div><div class="stat-lbl">Pages</div></div>
      <div class="stat"><div class="stat-val" style="color:#10b981">${passCount}</div><div class="stat-lbl">QA Pass</div></div>
      <div class="stat"><div class="stat-val" style="color:#f59e0b">${dates.length}</div><div class="stat-lbl">Days</div></div>
    </div>

    <div class="timeline">
      ${BLOCKS_META.map((block, i) => {
        const report = dayReports[block.id];
        const hasData = !!report;
        const isExpanded = expandedBlocks[block.id];
        const isToday = date === today;
        const isBlockActive = isToday && currentHour >= block.hour && currentHour < block.hour + 1;
        const statusClass = report?.status === "completed" ? "status-completed"
          : isBlockActive ? "status-active"
          : hasData ? "status-active"
          : "status-nodata";
        const statusText = report?.status === "completed" ? "Done"
          : isBlockActive ? "Running"
          : hasData ? report.status || "Done"
          : "No data";

        const activeClass = isBlockActive ? "is-active" : "";
        const accentBg = `${block.accent}08`;

        return `
          <div class="block ${isExpanded ? 'expanded' : ''} ${activeClass}"
               style="animation-delay:${i * 0.06}s; --accent-color:${block.accent}30; --accent-bg:${accentBg}"
               id="block-${block.id}">
            <div class="block-header" onclick="toggleBlock('${block.id}')">
              <div class="block-left">
                <span class="block-icon">${block.icon}</span>
                <div class="block-info">
                  <h3>${block.name}</h3>
                  <div class="time-label" style="color:${hasData ? block.accent : 'rgba(255,255,255,0.25)'}">
                    ${block.time} ${hasData ? '\u2022 ' + report.summary.slice(0, 60) + (report.summary.length > 60 ? '...' : '') : ''}
                  </div>
                </div>
              </div>
              <div class="block-right">
                <span class="block-status ${statusClass}">${statusText}</span>
                ${hasData ? `<span class="block-chevron">\u25BC</span>` : ''}
              </div>
            </div>
            ${hasData ? `
              <div class="block-body">
                <div class="block-content">
                  <div style="margin-bottom:10px;font-size:13px;color:rgba(255,255,255,0.6);line-height:1.5">${report.summary}</div>
                  <div style="margin-bottom:8px">${renderSkillTags(report.skills_used || block.skills)}</div>
                  ${(report.sections || []).map(sec => renderSection(sec)).join("")}
                </div>
              </div>
            ` : `
              <div class="block-body">
                <div class="block-content">
                  <div class="no-data">${isToday && currentHour < block.hour ? `Scheduled for ${block.time}` : 'No report data yet'}</div>
                </div>
              </div>
            `}
          </div>
        `;
      }).join("")}
    </div>

    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">\u{1F4C4}</div>
      <div class="dropzone-text">Drop report JSON files here to load them</div>
      <div class="dropzone-sub">Each scheduled task writes a .json file to your reports/ folder</div>
    </div>

    <div class="skills-footer">
      <div class="skills-footer-title">Skill Activity (${date})</div>
      <div class="skills-mini-grid">
        ${Object.entries(SKILLS).map(([key, skill]) => {
          const isUsed = allSkillsUsed.has(key);
          const style = isUsed ? `--skill-color:${skill.color};--skill-bg:${skill.color}12` : '';
          return `<span class="skill-mini ${isUsed ? 'active' : ''}" style="${style}">${skill.icon} ${skill.name}</span>`;
        }).join("")}
      </div>
    </div>

    <div class="footer-bar">degen0x ops dashboard \u2014 ${dates.length} day${dates.length !== 1 ? 's' : ''} of data \u2014 15 skills, 6 blocks</div>
  `;

  document.getElementById("app").innerHTML = html;
  setupDropzone();
}

function toggleBlock(id) {
  expandedBlocks[id] = !expandedBlocks[id];
  render();
}

function selectDate(d) {
  selectedDate = d;
  render();
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.date && data.block && data.report) {
          if (!reports[data.date]) reports[data.date] = {};
          reports[data.date][data.block] = data.report;
        } else if (typeof data === "object") {
          Object.entries(data).forEach(([date, blocks]) => {
            if (!reports[date]) reports[date] = {};
            Object.assign(reports[date], blocks);
          });
        }
        render();
      } catch(err) { console.error("Failed to parse report:", err); }
    };
    reader.readAsText(file);
  });
}

function setupDropzone() {
  const dz = document.getElementById("dropzone");
  if (!dz) return;
  dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("dragover"); });
  dz.addEventListener("dragleave", () => { dz.classList.remove("dragover"); });
  dz.addEventListener("drop", (e) => {
    e.preventDefault(); dz.classList.remove("dragover");
    handleFiles(e.dataTransfer.files);
  });
}

render();
setInterval(render, 60000);
</script>
</body>
</html>
