<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1528;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative animated-style elements -->
  <circle cx="150" cy="120" r="90" fill="#6366f1" opacity="0.06"/>
  <circle cx="1050" cy="500" r="110" fill="#06b6d4" opacity="0.06"/>
  <polygon points="900,50 950,80 920,130" fill="#f59e0b" opacity="0.05"/>

  <!-- Animated divider -->
  <line x1="0" y1="300" x2="1200" y2="300" stroke="url(#accentGradient)" stroke-width="1" opacity="0.15"/>

  <!-- Main glass panel -->
  <rect x="50" y="40" width="1100" height="550" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Title section -->
  <g>
    <!-- Main title -->
    <text x="100" y="130" font-size="64" font-weight="800" fill="#e6edf3" letter-spacing="-2">
      degen0x Weekly
    </text>

    <!-- Date badge -->
    <rect x="100" y="155" width="280" height="48" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="140" y="190" font-size="24" font-weight="700" fill="#6366f1">April 4, 2026</text>
  </g>

  <!-- Subtitle -->
  <text x="100" y="260" font-size="32" font-weight="600" fill="#8b949e">
    Your weekly dose of alpha
  </text>

  <!-- Content cards section -->
  <g>
    <!-- Card 1: Guides -->
    <rect x="100" y="310" width="320" height="220" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>

    <!-- Icon container -->
    <circle cx="160" cy="360" r="32" fill="rgba(99,102,241,0.25)" stroke="rgba(99,102,241,0.4)" stroke-width="2"/>

    <!-- Book/guide icon -->
    <path d="M 150 350 L 150 370 M 160 350 L 160 370 M 170 350 L 170 370 M 150 360 L 170 360" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Text -->
    <text x="215" y="360" font-size="16" font-weight="700" fill="#e6edf3">6 New Guides</text>
    <text x="215" y="385" font-size="14" font-weight="400" fill="#8b949e">DeFi • Protocols • Trading</text>

    <!-- Bottom accent -->
    <line x1="120" y1="510" x2="400" y2="510" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
  </g>

  <g>
    <!-- Card 2: Market Pulse -->
    <rect x="460" y="310" width="320" height="220" rx="16" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>

    <!-- Icon container -->
    <circle cx="520" cy="360" r="32" fill="rgba(6,182,212,0.25)" stroke="rgba(6,182,212,0.4)" stroke-width="2"/>

    <!-- Chart icon -->
    <g transform="translate(520, 360)">
      <line x1="-12" y1="8" x2="-12" y2="0" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
      <line x1="-4" y1="8" x2="-4" y2="-8" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="8" x2="4" y2="-4" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="8" x2="12" y2="-10" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Text -->
    <text x="575" y="360" font-size="16" font-weight="700" fill="#e6edf3">Market Pulse</text>
    <text x="575" y="385" font-size="14" font-weight="400" fill="#8b949e">BTC • ETH • Altcoins</text>

    <!-- Bottom accent -->
    <line x1="480" y1="510" x2="760" y2="510" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
  </g>

  <g>
    <!-- Card 3: Alpha Inside -->
    <rect x="820" y="310" width="320" height="220" rx="16" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>

    <!-- Icon container -->
    <circle cx="880" cy="360" r="32" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.4)" stroke-width="2"/>

    <!-- Lightbulb/alpha icon -->
    <g transform="translate(880, 360)">
      <circle cx="0" cy="-4" r="6" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <path d="M -4 2 L -3 8 L 3 8 L 4 2" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="-2" y1="8" x2="2" y2="8" stroke="#f59e0b" stroke-width="2"/>
    </g>

    <!-- Text -->
    <text x="935" y="360" font-size="16" font-weight="700" fill="#e6edf3">Alpha Inside</text>
    <text x="935" y="385" font-size="14" font-weight="400" fill="#8b949e">Takes • Insights • Calls</text>

    <!-- Bottom accent -->
    <line x1="840" y1="510" x2="1120" y2="510" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- CTA Section -->
  <g>
    <rect x="100" y="560" width="880" height="1" fill="rgba(255,255,255,0.1)"/>

    <!-- Subscribe text -->
    <text x="100" y="595" font-size="18" font-weight="600" fill="#22c55e">
      Subscribe today → Stay ahead of the market
    </text>

    <!-- Branding -->
    <text x="1000" y="595" font-size="16" font-weight="700" fill="#e6edf3" text-anchor="end">
      degen0x.com
    </text>
  </g>

  <!-- Decorative corner accent -->
  <circle cx="1100" cy="80" r="2" fill="#06b6d4" opacity="0.8"/>
  <circle cx="1090" cy="80" r="2" fill="#06b6d4" opacity="0.5"/>
  <circle cx="1110" cy="80" r="2" fill="#6366f1" opacity="0.5"/>
</svg>
