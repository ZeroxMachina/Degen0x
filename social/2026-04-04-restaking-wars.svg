<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1528;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eigenlayer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="symbiotic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="karak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative geometric elements -->
  <polygon points="50,0 150,0 100,100" fill="#6366f1" opacity="0.05"/>
  <circle cx="1100" cy="100" r="120" fill="#06b6d4" opacity="0.04"/>
  <rect x="0" y="350" width="1200" height="1" fill="url(#accentGradient)" opacity="0.2"/>

  <!-- Glass-morphism panel -->
  <rect x="60" y="60" width="1080" height="510" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Title -->
  <text x="100" y="130" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-1">
    The Restaking Wars:
  </text>
  <text x="100" y="195" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-1">
    EigenLayer vs Symbiotic vs Karak
  </text>

  <!-- Subtitle -->
  <text x="100" y="255" font-size="26" font-weight="400" fill="#8b949e">
    $19.7B TVL — who's winning and why it matters
  </text>

  <!-- Three competing protocol visualizations -->
  <g>
    <!-- EigenLayer -->
    <rect x="100" y="320" width="280" height="200" rx="16" fill="rgba(99,102,241,0.12)" stroke="url(#eigenlayer)" stroke-width="2"/>

    <!-- Protocol circle -->
    <circle cx="240" cy="360" r="35" fill="url(#eigenlayer)" opacity="0.3"/>
    <circle cx="240" cy="360" r="28" fill="none" stroke="url(#eigenlayer)" stroke-width="2"/>
    <text x="240" y="370" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">EL</text>

    <!-- Protocol name -->
    <text x="240" y="430" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">EigenLayer</text>

    <!-- TVL bar -->
    <rect x="120" y="450" width="240" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="120" y="450" width="216" height="8" rx="4" fill="url(#eigenlayer)"/>

    <!-- TVL text -->
    <text x="240" y="485" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">$9.2B</text>
    <text x="240" y="505" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">47% of total</text>
  </g>

  <g>
    <!-- Symbiotic -->
    <rect x="460" y="320" width="280" height="200" rx="16" fill="rgba(6,182,212,0.12)" stroke="url(#symbiotic)" stroke-width="2"/>

    <!-- Protocol circle -->
    <circle cx="600" cy="360" r="35" fill="url(#symbiotic)" opacity="0.3"/>
    <circle cx="600" cy="360" r="28" fill="none" stroke="url(#symbiotic)" stroke-width="2"/>
    <text x="600" y="370" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">SYM</text>

    <!-- Protocol name -->
    <text x="600" y="430" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">Symbiotic</text>

    <!-- TVL bar -->
    <rect x="480" y="450" width="240" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="480" y="450" width="120" height="8" rx="4" fill="url(#symbiotic)"/>

    <!-- TVL text -->
    <text x="600" y="485" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">$6.1B</text>
    <text x="600" y="505" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">31% of total</text>
  </g>

  <g>
    <!-- Karak -->
    <rect x="820" y="320" width="280" height="200" rx="16" fill="rgba(245,158,11,0.12)" stroke="url(#karak)" stroke-width="2"/>

    <!-- Protocol circle -->
    <circle cx="960" cy="360" r="35" fill="url(#karak)" opacity="0.3"/>
    <circle cx="960" cy="360" r="28" fill="none" stroke="url(#karak)" stroke-width="2"/>
    <text x="960" y="370" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">KRK</text>

    <!-- Protocol name -->
    <text x="960" y="430" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">Karak</text>

    <!-- TVL bar -->
    <rect x="840" y="450" width="240" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="840" y="450" width="72" height="8" rx="4" fill="url(#karak)"/>

    <!-- TVL text -->
    <text x="960" y="485" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">$4.4B</text>
    <text x="960" y="505" font-size="12" font-weight="500" fill="#8b949e" text-anchor="middle">22% of total</text>
  </g>

  <!-- Key metrics line -->
  <line x1="100" y1="540" x2="1100" y2="540" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Bottom insight -->
  <text x="100" y="575" font-size="16" font-weight="600" fill="#e6edf3">
    Deep dive: Strategy comparison, yields, risks &amp; which to stake your ETH in →
  </text>

  <!-- Branding -->
  <text x="100" y="610" font-size="16" font-weight="700" fill="#e6edf3">degen0x.com/learn</text>

  <!-- Accent line -->
  <line x1="100" y1="595" x2="250" y2="595" stroke="url(#accentGradient)" stroke-width="3"/>
</svg>
