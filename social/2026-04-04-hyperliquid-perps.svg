<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1528;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative geometric elements -->
  <circle cx="100" cy="50" r="80" fill="#6366f1" opacity="0.05"/>
  <circle cx="1100" cy="550" r="100" fill="#06b6d4" opacity="0.05"/>
  <rect x="0" y="350" width="1200" height="1" fill="url(#accentGradient)" opacity="0.2"/>

  <!-- Glass-morphism panel -->
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Title -->
  <text x="100" y="150" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-1">
    Hyperliquid: The Perp DEX
  </text>
  <text x="100" y="215" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-1">
    That Owns 44% of Volume
  </text>

  <!-- Subtitle -->
  <text x="100" y="280" font-size="28" font-weight="400" fill="#8b949e">
    Complete trading guide — from basics to advanced strategies
  </text>

  <!-- Chart visualization -->
  <g opacity="0.8">
    <!-- Chart background -->
    <rect x="850" y="140" width="180" height="140" rx="12" fill="rgba(99,102,241,0.1)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>

    <!-- Candlestick chart -->
    <line x1="870" y1="255" x2="870" y2="215" stroke="#22c55e" stroke-width="2"/>
    <rect x="860" y="225" width="20" height="20" fill="#22c55e" opacity="0.6"/>

    <line x1="900" y1="260" x2="900" y2="210" stroke="#22c55e" stroke-width="2"/>
    <rect x="890" y="230" width="20" height="18" fill="#22c55e" opacity="0.8"/>

    <line x1="930" y1="265" x2="930" y2="200" stroke="#22c55e" stroke-width="2"/>
    <rect x="920" y="220" width="20" height="25" fill="#22c55e"/>

    <line x1="960" y1="250" x2="960" y2="220" stroke="#06b6d4" stroke-width="2"/>
    <rect x="950" y="230" width="20" height="15" fill="#06b6d4" opacity="0.7"/>
  </g>

  <!-- Stats boxes -->
  <g>
    <!-- Volume stat -->
    <rect x="100" y="340" width="240" height="80" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="120" y="365" font-size="14" font-weight="600" fill="#8b949e">24H VOLUME</text>
    <text x="120" y="400" font-size="24" font-weight="800" fill="#22c55e">$4.2B+</text>
  </g>

  <g>
    <!-- Leverage stat -->
    <rect x="380" y="340" width="240" height="80" rx="12" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
    <text x="400" y="365" font-size="14" font-weight="600" fill="#8b949e">MAX LEVERAGE</text>
    <text x="400" y="400" font-size="24" font-weight="800" fill="#06b6d4">100x</text>
  </g>

  <g>
    <!-- Chains stat -->
    <rect x="660" y="340" width="240" height="80" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="680" y="365" font-size="14" font-weight="600" fill="#8b949e">SUPPORTED CHAINS</text>
    <text x="680" y="400" font-size="24" font-weight="800" fill="#f59e0b">7+</text>
  </g>

  <!-- CTA Button area -->
  <rect x="100" y="480" width="880" height="50" rx="12" fill="url(#accentGradient)" opacity="0.2" stroke="url(#accentGradient)" stroke-width="2"/>
  <text x="600" y="515" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">
    Read the complete guide
  </text>

  <!-- Branding -->
  <text x="100" y="605" font-size="16" font-weight="700" fill="#e6edf3">degen0x.com/learn</text>

  <!-- Accent line -->
  <line x1="100" y1="590" x2="250" y2="590" stroke="url(#accentGradient)" stroke-width="3"/>
</svg>
