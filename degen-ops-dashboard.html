<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>degen0x ops dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #080d1c;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px 20px;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes pulsering { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(2.5); opacity: 0; } }
  @keyframes scanline { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  input[type="range"] { -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg, #4f46e5, #0891b2); cursor: pointer; border: 2px solid #fff; }
  .container { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }

  /* Header */
  .header {
    padding: 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(6,182,212,0.1), rgba(245,158,11,0.1));
    border: 1px solid rgba(255,255,255,0.08);
    animation: fadeIn 0.6s ease;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
  .header .subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .counter { font-size: 28px; font-weight: 800; font-family: monospace; text-align: right; }
  .counter-label { font-size: 11px; color: rgba(255,255,255,0.4); text-align: right; }

  /* Progress bar */
  .progress-track { position: relative; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .progress-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; background: linear-gradient(90deg, #4f46e5, #0891b2, #d97706); transition: width 0.8s ease; }
  .progress-tick { position: absolute; top: -3px; width: 2px; height: 12px; border-radius: 1px; transition: background 0.5s ease; }
  .progress-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: rgba(255,255,255,0.3); font-family: monospace; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; animation: fadeIn 0.6s ease 0.1s both; }
  .stat-card { padding: 16px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); text-align: center; }
  .stat-value { font-size: 24px; font-weight: 800; font-family: monospace; }
  .stat-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .stat-sub { font-size: 10px; color: rgba(255,255,255,0.3); }

  /* Sim controls */
  .sim-bar {
    padding: 12px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.6s ease 0.2s both;
  }
  .sim-btn {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
  }
  .sim-btn.off { border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.5); }
  .sim-btn.on { border: 1px solid #6366f1; background: rgba(99,102,241,0.15); color: #6366f1; }
  .sim-time { font-family: monospace; font-size: 13px; color: rgba(255,255,255,0.6); min-width: 65px; text-align: right; }

  /* Timeline blocks */
  .blocks { display: flex; flex-direction: column; gap: 10px; }
  .block {
    position: relative;
    padding: 20px;
    border-radius: 16px;
    transition: all 0.6s ease;
    overflow: hidden;
  }
  .block.upcoming { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
  .block.completed { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); opacity: 0.6; }
  .block.active { border-width: 1px; border-style: solid; }
  .block-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .block-left { display: flex; align-items: center; gap: 10px; }
  .block-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .block-desc { font-size: 12px; margin-top: 2px; }
  .block-time { font-size: 13px; font-weight: 600; font-family: monospace; padding: 4px 10px; border-radius: 8px; }
  .block.upcoming .block-name { color: rgba(255,255,255,0.7); }
  .block.upcoming .block-desc { color: rgba(255,255,255,0.3); }
  .block.upcoming .block-time { color: rgba(255,255,255,0.3); }
  .block.completed .block-name { color: rgba(255,255,255,0.5); }
  .block.completed .block-desc { color: rgba(255,255,255,0.3); }
  .block.completed .block-time { color: rgba(255,255,255,0.3); }
  .block.active .block-name { color: #fff; }
  .block.active .block-desc { color: rgba(255,255,255,0.6); }

  /* Status indicators */
  .dot-upcoming { width: 10px; height: 10px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; }
  .dot-completed { font-size: 14px; color: #4ade80; flex-shrink: 0; }
  .dot-active { position: relative; width: 10px; height: 10px; flex-shrink: 0; }
  .dot-active .core { position: absolute; width: 10px; height: 10px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
  .dot-active .ring { position: absolute; width: 10px; height: 10px; border-radius: 50%; opacity: 0.4; animation: pulsering 2s ease-in-out infinite; }

  /* Skill chips */
  .skills-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 8px; }
  .skill-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.5s ease;
  }
  .skill-chip.inactive { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
  .handoff-arrow { padding: 0 2px; font-size: 14px; transition: color 0.5s ease; }
  .handoff-arrow.inactive { color: rgba(255,255,255,0.15); }
  .handoff-arrow.active { color: rgba(255,255,255,0.6); }

  /* Scanline */
  .scanline { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; border-radius: 0 0 16px 16px; overflow: hidden; }
  .scanline-inner { height: 100%; width: 40%; animation: scanline 2s linear infinite; }

  /* Skill grid */
  .skill-grid-container {
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    animation: fadeIn 0.6s ease 0.4s both;
  }
  .skill-grid-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 14px; letter-spacing: 0.05em; text-transform: uppercase; }
  .skill-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .skill-grid-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    transition: all 0.5s ease;
  }
  .skill-grid-item.inactive { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); }
  .skill-grid-item .icon { font-size: 16px; }
  .skill-grid-item .name { font-size: 11px; }
  .skill-grid-item.inactive .name { color: rgba(255,255,255,0.4); font-weight: 400; }
  .skill-grid-item .active-dot { margin-left: auto; }

  .footer { text-align: center; padding: 12px 0; font-size: 11px; color: rgba(255,255,255,0.2); }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .skill-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 20px; }
    .counter { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const SKILLS = {
  ceo: { name: "CEO", icon: "\u{1F451}", color: "#f59e0b" },
  pm: { name: "Project Manager", icon: "\u{1F4CB}", color: "#8b5cf6" },
  analytics: { name: "Analytics", icon: "\u{1F4CA}", color: "#06b6d4" },
  publishQueue: { name: "Publish Queue", icon: "\u{1F680}", color: "#10b981" },
  qa: { name: "QA Tester", icon: "\u{1F9EA}", color: "#ef4444" },
  devops: { name: "DevOps", icon: "\u2699\uFE0F", color: "#6366f1" },
  dataEngineer: { name: "Data Engineer", icon: "\u{1F50C}", color: "#14b8a6" },
  researcher: { name: "Researcher", icon: "\u{1F50D}", color: "#a78bfa" },
  contentWriter: { name: "Content Writer", icon: "\u270D\uFE0F", color: "#f472b6" },
  seo: { name: "SEO Content", icon: "\u{1F3AF}", color: "#22d3ee" },
  pageScaffold: { name: "Page Scaffold", icon: "\u{1F3D7}\uFE0F", color: "#fb923c" },
  programmer: { name: "Programmer", icon: "\u{1F4BB}", color: "#4ade80" },
  uxDesigner: { name: "UX Designer", icon: "\u{1F3A8}", color: "#c084fc" },
  graphicDesigner: { name: "Graphic Designer", icon: "\u{1F5BC}\uFE0F", color: "#f43f5e" },
  communityManager: { name: "Community Mgr", icon: "\u{1F4E3}", color: "#fbbf24" },
};

const BLOCKS = [
  { id: "standup", name: "Morning Standup", time: "9:00 AM", hour: 9, skills: ["pm", "ceo", "analytics"], description: "Review overnight metrics, set daily priorities, identify blockers", gradient: "linear-gradient(135deg, #f59e0b33, #8b5cf633)", accent: "#f59e0b" },
  { id: "publish", name: "Publish & Deploy", time: "10:00 AM", hour: 10, skills: ["dataEngineer", "publishQueue", "qa", "devops"], description: "Verify data pipelines \u2192 promote pages \u2192 QA check \u2192 deploy to prod", gradient: "linear-gradient(135deg, #10b98133, #6366f133)", accent: "#10b981" },
  { id: "build", name: "Build Cycle", time: "11:00 AM", hour: 11, skills: ["researcher", "contentWriter", "seo", "pageScaffold", "programmer"], description: "Research \u2192 write \u2192 optimize SEO \u2192 scaffold page \u2192 build components", gradient: "linear-gradient(135deg, #a78bfa33, #22d3ee33)", accent: "#a78bfa" },
  { id: "design", name: "Design & Polish", time: "2:00 PM", hour: 14, skills: ["uxDesigner", "graphicDesigner", "programmer"], description: "UX audit new pages \u2192 create visuals \u2192 implement refinements", gradient: "linear-gradient(135deg, #c084fc33, #f43f5e33)", accent: "#c084fc" },
  { id: "community", name: "Community & Growth", time: "3:00 PM", hour: 15, skills: ["communityManager", "analytics", "graphicDesigner"], description: "Identify top content \u2192 draft social posts \u2192 create social visuals", gradient: "linear-gradient(135deg, #fbbf2433, #f43f5e33)", accent: "#fbbf24" },
  { id: "eod", name: "QA & Close-of-Day", time: "5:00 PM", hour: 17, skills: ["qa", "dataEngineer", "devops", "pm"], description: "Full test sweep \u2192 data health \u2192 deploy verify \u2192 daily scorecard", gradient: "linear-gradient(135deg, #ef444433, #6366f133)", accent: "#ef4444" },
];

let simMode = false;
let simHour = 9;

function getCurrentHour() {
  if (simMode) return simHour;
  const now = new Date();
  return now.getHours() + now.getMinutes() / 60;
}

function getBlockStatus(block, h) {
  const end = block.hour + 1;
  if (h >= end) return "completed";
  if (h >= block.hour && h < end) return "active";
  return "upcoming";
}

function formatSimTime(h) {
  const hr = Math.floor(h);
  const min = String(Math.round((h % 1) * 60)).padStart(2, "0");
  const ampm = h < 12 ? "AM" : "PM";
  const display = hr > 12 ? hr - 12 : hr;
  return `${display}:${min} ${ampm}`;
}

function render() {
  const h = getCurrentHour();
  const dayStart = 9, dayEnd = 18;
  const progress = Math.max(0, Math.min(1, (h - dayStart) / (dayEnd - dayStart)));
  const completedBlocks = BLOCKS.filter(b => getBlockStatus(b, h) === "completed").length;
  const activeBlock = BLOCKS.find(b => getBlockStatus(b, h) === "active");
  const activeSkillKeys = activeBlock ? activeBlock.skills : [];

  let statusText = "Between blocks";
  if (activeBlock) statusText = `${activeBlock.name} in progress`;
  else if (h >= 18) statusText = "Day complete \u2014 see you tomorrow";
  else if (h < 9) statusText = "Waiting for 9 AM kickoff";

  let html = `
    <div class="header glass">
      <div class="header-top">
        <div>
          <h1>degen0x ops</h1>
          <div class="subtitle">${statusText}</div>
        </div>
        <div>
          <div class="counter">${completedBlocks}/${BLOCKS.length}</div>
          <div class="counter-label">blocks done</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progress * 100}%"></div>
        ${BLOCKS.map(b => {
          const pos = ((b.hour - dayStart) / (dayEnd - dayStart)) * 100;
          const isCurrent = getBlockStatus(b, h) === "active";
          return `<div class="progress-tick" style="left:${pos}%;background:${isCurrent ? b.accent : 'rgba(255,255,255,0.15)'}"></div>`;
        }).join("")}
      </div>
      <div class="progress-labels"><span>9 AM</span><span>6 PM</span></div>
    </div>

    <div class="stats">
      ${[
        { label: "Skills", value: "15", sub: "active", color: "#6366f1" },
        { label: "Daily Blocks", value: "6", sub: "scheduled", color: "#06b6d4" },
        { label: "Handoffs", value: "22", sub: "per day", color: "#f59e0b" },
        { label: "Cadence", value: "M\u2013F", sub: "weekdays", color: "#10b981" },
      ].map(s => `
        <div class="stat-card">
          <div class="stat-value" style="color:${s.color}">${s.value}</div>
          <div class="stat-label">${s.label}</div>
          <div class="stat-sub">${s.sub}</div>
        </div>
      `).join("")}
    </div>

    <div class="sim-bar">
      <button class="sim-btn ${simMode ? 'on' : 'off'}" onclick="toggleSim()">${simMode ? '\u23F1 Simulating' : '\u23F1 Simulate'}</button>
      ${simMode ? `
        <input type="range" min="7" max="19" step="0.25" value="${simHour}" oninput="updateSim(this.value)" style="flex:1">
        <span class="sim-time">${formatSimTime(simHour)}</span>
      ` : ''}
    </div>

    <div class="blocks">
      ${BLOCKS.map((block, i) => {
        const status = getBlockStatus(block, h);
        const isActive = status === "active";
        const isCompleted = status === "completed";

        let dotHtml = '';
        if (isActive) dotHtml = `<div class="dot-active"><div class="core" style="background:${block.accent}"></div><div class="ring" style="background:${block.accent}"></div></div>`;
        else if (isCompleted) dotHtml = `<span class="dot-completed">\u2713</span>`;
        else dotHtml = `<div class="dot-upcoming"></div>`;

        const chipClass = isActive ? '' : 'inactive';
        const arrowClass = isActive ? 'active' : 'inactive';

        const skillsHtml = block.skills.map((sk, j) => {
          const s = SKILLS[sk];
          const chipStyle = isActive
            ? `background:${s.color}22;border:1px solid ${s.color}66;color:${s.color};transform:scale(1.05)`
            : '';
          return `<span class="skill-chip ${chipClass}" style="${chipStyle}"><span>${s.icon}</span><span>${s.name}</span></span>${j < block.skills.length - 1 ? `<span class="handoff-arrow ${arrowClass}">\u2192</span>` : ''}`;
        }).join("");

        const blockStyle = isActive
          ? `background:${block.gradient};border-color:${block.accent}44;`
          : '';
        const timeStyle = isActive
          ? `color:${block.accent};background:${block.accent}15`
          : '';

        const scanlineHtml = isActive
          ? `<div class="scanline"><div class="scanline-inner" style="background:linear-gradient(90deg,transparent,${block.accent},transparent)"></div></div>`
          : '';

        return `
          <div class="block ${status} glass" style="${blockStyle};animation-delay:${i * 0.08}s">
            <div class="block-top">
              <div class="block-left">
                ${dotHtml}
                <div>
                  <div class="block-name">${block.name}</div>
                  <div class="block-desc">${block.description}</div>
                </div>
              </div>
              <div class="block-time" style="${timeStyle}">${block.time}</div>
            </div>
            <div class="skills-row">${skillsHtml}</div>
            ${scanlineHtml}
          </div>
        `;
      }).join("")}
    </div>

    <div class="skill-grid-container glass">
      <div class="skill-grid-title">All 15 Skills</div>
      <div class="skill-grid">
        ${Object.entries(SKILLS).map(([key, skill]) => {
          const isActive = activeSkillKeys.includes(key);
          const itemStyle = isActive
            ? `background:${skill.color}15;border:1px solid ${skill.color}44`
            : '';
          const nameStyle = isActive
            ? `color:${skill.color};font-weight:600`
            : '';
          const dotHtml = isActive
            ? `<span class="active-dot"><span style="position:relative;display:inline-block;width:8px;height:8px"><span style="position:absolute;width:8px;height:8px;border-radius:50%;background:${skill.color};animation:pulse 2s ease-in-out infinite"></span><span style="position:absolute;width:8px;height:8px;border-radius:50%;background:${skill.color};opacity:0.4;animation:pulsering 2s ease-in-out infinite"></span></span></span>`
            : '';
          return `
            <div class="skill-grid-item ${isActive ? '' : 'inactive'}" style="${itemStyle}">
              <span class="icon">${skill.icon}</span>
              <span class="name" style="${nameStyle}">${skill.name}</span>
              ${dotHtml}
            </div>
          `;
        }).join("")}
      </div>
    </div>

    <div class="footer">degen0x ops dashboard \u2014 15 skills, 6 blocks, 22 handoffs/day</div>
  `;

  document.getElementById("app").innerHTML = html;
}

function toggleSim() {
  simMode = !simMode;
  render();
}

function updateSim(val) {
  simHour = parseFloat(val);
  render();
}

render();
setInterval(() => { if (!simMode) render(); }, 30000);
</script>
</body>
</html>
