<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#4f46e5" opacity="0.04"/>
  <circle cx="150" cy="500" r="140" fill="#0891b2" opacity="0.03"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">DEGEN0X</text>

  <!-- Title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">CLARITY Act:</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#accent)" letter-spacing="-0.02em">Two Weeks Left</text>

  <!-- Subtitle -->
  <text x="60" y="245" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Senate Banking Committee must advance before May — or crypto regulation dies before midterms</text>

  <!-- Data Cards Row -->
  <!-- Card 1: Timeline -->
  <rect x="60" y="285" width="250" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-transform="uppercase" letter-spacing="0.08em">MARKUP WINDOW</text>
  <text x="85" y="365" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#f59e0b">2 Weeks</text>
  <text x="85" y="395" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Apr 13 &amp; Apr 20 sessions</text>

  <!-- Card 2: Stablecoin Deal -->
  <rect x="330" y="285" width="250" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="355" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.08em">STABLECOIN YIELD</text>
  <text x="355" y="365" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#ef4444">Banned</text>
  <text x="355" y="395" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">On exchanges (Tillis deal)</text>

  <!-- Card 3: Four-way deadlock -->
  <rect x="600" y="285" width="250" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="625" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.08em">DEADLOCK STATUS</text>
  <text x="625" y="365" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#f59e0b">4-Way</text>
  <text x="625" y="395" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Senate compromise stalled</text>

  <!-- Card 4: Impact -->
  <rect x="870" y="285" width="270" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="895" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.08em">IF PASSED</text>
  <text x="895" y="365" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#22c55e">1st US</text>
  <text x="895" y="395" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Crypto regulatory framework</text>

  <!-- Insight panel -->
  <rect x="60" y="450" width="1080" height="70" rx="12" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="85" y="490" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">
    <tspan font-weight="700" fill="#6366f1">Key insight: </tspan>
    <tspan>Failure to advance before May means no crypto law before Nov 2026 midterms — regulatory limbo continues into 2027</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="545" width="1200" height="85" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="590" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">degen0x.com/learn/crypto-regulations-guide-2026</text>
  <text x="1140" y="590" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681" text-anchor="end">Apr 2026</text>
</svg>