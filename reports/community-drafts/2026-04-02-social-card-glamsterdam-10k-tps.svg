<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a1228"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ethGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#627eea"/>
      <stop offset="100%" stop-color="#3b4cb0"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative ETH diamond glow -->
  <circle cx="1020" cy="200" r="120" fill="#627eea" opacity="0.05"/>
  <circle cx="1020" cy="200" r="60" fill="#627eea" opacity="0.08"/>

  <!-- ETH diamond shape -->
  <g transform="translate(1020, 200)" opacity="0.15">
    <polygon points="0,-50 30,0 0,20 -30,0" fill="#627eea"/>
    <polygon points="0,20 30,0 0,50 -30,0" fill="#3b4cb0"/>
  </g>

  <!-- Logo -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">DEGEN0X</text>

  <!-- Title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Glamsterdam:</text>
  <text x="60" y="198" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#accent2)" letter-spacing="-0.02em">Ethereum's Biggest Upgrade</text>
  <text x="60" y="245" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Now on Devnet-5 — targeting June 2026. The most significant overhaul since the Merge.</text>

  <!-- Stats Row -->
  <!-- Card 1: TPS -->
  <rect x="60" y="280" width="250" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="312" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.08em">THROUGHPUT</text>
  <text x="85" y="358" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#22c55e" filter="url(#glow2)">10K TPS</text>
  <text x="85" y="385" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">10x current capacity</text>

  <!-- Card 2: Gas -->
  <rect x="330" y="280" width="250" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="355" y="312" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.08em">GAS REDUCTION</text>
  <text x="355" y="358" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#06b6d4">-78.6%</text>
  <text x="355" y="385" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Transfers &amp; smart contracts</text>

  <!-- Card 3: Gas Limit -->
  <rect x="600" y="280" width="250" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="625" y="312" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.08em">GAS LIMIT</text>
  <text x="625" y="358" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#f59e0b">200M</text>
  <text x="625" y="385" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Up from 60M per block</text>

  <!-- Card 4: ETH Price -->
  <rect x="870" y="280" width="270" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="895" y="312" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.08em">ETH PRICE</text>
  <text x="895" y="358" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3">$1,950</text>
  <text x="895" y="385" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444">At 2022 levels pre-upgrade</text>

  <!-- Key EIPs pills -->
  <rect x="60" y="435" width="220" height="40" rx="20" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="170" y="460" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">EIP-7732 ePBS</text>

  <rect x="300" y="435" width="280" height="40" rx="20" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="440" y="460" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22d3ee" text-anchor="middle">EIP-7928 Block Access Lists</text>

  <rect x="600" y="435" width="280" height="40" rx="20" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="740" y="460" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">Parallel Transaction Processing</text>

  <rect x="900" y="435" width="200" height="40" rx="20" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="1000" y="460" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#4ade80" text-anchor="middle">MEV Mitigation</text>

  <!-- Insight -->
  <rect x="60" y="495" width="1080" height="50" rx="10" fill="rgba(98,126,234,0.08)" stroke="rgba(98,126,234,0.15)" stroke-width="1"/>
  <text x="85" y="526" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">
    <tspan font-weight="700" fill="#627eea">Narrative shift: </tspan>
    <tspan>L1 becomes competitive with L2s — DeFi composability improves, MEV extraction drops</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="600" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">degen0x.com/learn/ethereum-pectra-upgrade-guide-2026</text>
  <text x="1140" y="600" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681" text-anchor="end">Apr 2026</text>
</svg>