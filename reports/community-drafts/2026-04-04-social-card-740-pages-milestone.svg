<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="numberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.06" fill="#818cf8">
    <circle cx="100" cy="100" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="180" cy="100" r="2"/><circle cx="220" cy="100" r="2"/>
    <circle cx="100" cy="140" r="2"/><circle cx="140" cy="140" r="2"/><circle cx="180" cy="140" r="2"/><circle cx="220" cy="140" r="2"/>
    <circle cx="100" cy="180" r="2"/><circle cx="140" cy="180" r="2"/><circle cx="180" cy="180" r="2"/><circle cx="220" cy="180" r="2"/>
    <circle cx="900" cy="400" r="2"/><circle cx="940" cy="400" r="2"/><circle cx="980" cy="400" r="2"/><circle cx="1020" cy="400" r="2"/>
    <circle cx="900" cy="440" r="2"/><circle cx="940" cy="440" r="2"/><circle cx="980" cy="440" r="2"/><circle cx="1020" cy="440" r="2"/>
    <circle cx="900" cy="480" r="2"/><circle cx="940" cy="480" r="2"/><circle cx="980" cy="480" r="2"/><circle cx="1020" cy="480" r="2"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="900" cy="200" r="250" fill="#4f46e5" opacity="0.03"/>
  <circle cx="300" cy="450" r="200" fill="#0891b2" opacity="0.03"/>

  <!-- degen0x logo -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#818cf8" filter="url(#glow2)">degen0x</text>

  <!-- Big number -->
  <text x="600" y="280" font-family="Inter, system-ui, sans-serif" font-size="180" font-weight="900" fill="url(#numberGrad)" text-anchor="middle" letter-spacing="-0.03em" filter="url(#glow2)">740</text>

  <!-- Subtitle -->
  <text x="600" y="335" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#e6edf3" text-anchor="middle">Pages Published</text>
  <text x="600" y="375" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Free crypto tools, guides &amp; research — no signup, no ads</text>

  <!-- Category breakdown cards -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" width="175" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#6366f1">92+</text>
    <text x="20" y="50" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Tools &amp; Calculators</text>
  </g>
  <g transform="translate(280, 420)">
    <rect x="0" y="0" width="175" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4">300+</text>
    <text x="20" y="50" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Learn Guides</text>
  </g>
  <g transform="translate(480, 420)">
    <rect x="0" y="0" width="175" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#f59e0b">60+</text>
    <text x="20" y="50" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Reviews</text>
  </g>
  <g transform="translate(680, 420)">
    <rect x="0" y="0" width="175" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#8b5cf6">6</text>
    <text x="20" y="50" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Full Courses</text>
  </g>
  <g transform="translate(880, 420)">
    <rect x="0" y="0" width="175" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">8</text>
    <text x="20" y="50" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Languages</text>
  </g>

  <!-- Bottom context -->
  <rect x="60" y="510" width="1080" height="36" rx="10" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="85" y="534" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#818cf8">Built through 3 weeks of extreme fear — building &gt; panicking</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="621" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
  <text x="1030" y="621" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Apr 4, 2026</text>
</svg>