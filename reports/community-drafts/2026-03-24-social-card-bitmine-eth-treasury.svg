<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="ethGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#627eea"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#627eea"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#627eea" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="1200" y2="500" stroke="#627eea" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="1200" y2="250" stroke="#627eea" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="630" stroke="#627eea" stroke-width="0.5"/>
  </g>

  <!-- Top badge -->
  <rect x="40" y="30" width="280" height="36" rx="18" fill="url(#ethGrad)" opacity="0.9"/>
  <text x="180" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">BITMINE ETH TREASURY</text>

  <!-- Main headline -->
  <text x="60" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white">3.86% of All Ethereum.</text>
  <text x="60" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white">One Company.</text>

  <!-- Subheadline -->
  <text x="60" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">65,341 ETH purchased this week — $138M — largest buy of 2026</text>

  <!-- Accent line -->
  <rect x="60" y="240" width="500" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Stats cards row 1 -->
  <g>
    <!-- Total Holdings -->
    <rect x="60" y="270" width="250" height="100" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="80" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" letter-spacing="1">TOTAL HOLDINGS</text>
    <text x="80" y="340" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#627eea" filter="url(#glow)">4.66M ETH</text>

    <!-- Total Assets -->
    <rect x="330" y="270" width="250" height="100" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="350" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" letter-spacing="1">TOTAL ASSETS</text>
    <text x="350" y="340" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#22c55e" filter="url(#glow)">$11 Billion</text>

    <!-- Staked -->
    <rect x="600" y="270" width="250" height="100" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="620" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" letter-spacing="1">ETH STAKED</text>
    <text x="620" y="340" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#f59e0b" filter="url(#glow)">67%</text>

    <!-- Staking Revenue -->
    <rect x="870" y="270" width="280" height="100" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="890" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" letter-spacing="1">ANNUAL STAKING REVENUE</text>
    <text x="890" y="340" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#06b6d4" filter="url(#glow)">$184M/yr</text>
  </g>

  <!-- Supply ownership bar -->
  <g>
    <text x="60" y="420" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="1">ETH SUPPLY OWNERSHIP</text>
    <rect x="60" y="435" width="1090" height="20" rx="10" fill="#1e293b"/>
    <rect x="60" y="435" width="42" height="20" rx="10" fill="url(#ethGrad)"/>
    <text x="115" y="450" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">3.86%</text>
    <text x="500" y="450" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Target: 5% of total ETH supply</text>
  </g>

  <!-- Tom Lee quote -->
  <rect x="60" y="480" width="700" height="60" rx="12" fill="#111827" stroke="#627eea" stroke-width="1" opacity="0.8"/>
  <text x="80" y="510" font-family="system-ui, sans-serif" font-size="16" fill="#e2e8f0" font-style="italic">"ETH is in the final stages of a mini-crypto winter."</text>
  <text x="80" y="530" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">— Tom Lee, Chairman, Bitmine Immersion Technologies</text>

  <!-- Market context box -->
  <rect x="790" y="480" width="360" height="60" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
  <text x="810" y="505" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444" font-weight="700">FEAR & GREED: 8 (EXTREME FEAR)</text>
  <text x="810" y="525" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Day 47 — Bitmine buying while retail panics</text>

  <!-- Bottom branding -->
  <rect x="60" y="570" width="1090" height="1" fill="#1e293b"/>
  <text x="60" y="600" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#627eea">degen0x.com</text>
  <text x="60" y="618" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Free crypto research • No signup • No paywall</text>
  <text x="1150" y="610" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="end">March 24, 2026</text>
</svg>
