<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#0a1128"/>
      <stop offset="100%" style="stop-color:#080d1c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="whaleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="180" fill="#ef4444" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="250" cy="500" r="200" fill="#22c55e" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Grid lines (subtle) -->
  <line x1="80" y1="280" x2="1120" y2="280" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,8"/>
  <line x1="80" y1="340" x2="1120" y2="340" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,8"/>
  <line x1="80" y1="400" x2="1120" y2="400" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,8"/>

  <!-- Logo area -->
  <circle cx="80" cy="48" r="16" fill="#4f46e5" opacity="0.8"/>
  <text x="80" y="54" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#e6edf3" text-anchor="middle">0x</text>
  <text x="106" y="53" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#8b949e">degen0x</text>

  <!-- Main Title -->
  <text x="80" y="130" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">The Biggest Divergence</text>
  <text x="80" y="178" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">in Crypto History</text>

  <!-- Subtitle -->
  <text x="80" y="215" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">Retail sentiment vs whale accumulation — March 2026</text>

  <!-- FEAR card (left) -->
  <rect x="80" y="255" width="500" height="175" rx="16" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="105" y="290" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ef4444" letter-spacing="0.1em">RETAIL SENTIMENT</text>
  <!-- Fear gauge -->
  <rect x="105" y="305" width="300" height="8" rx="4" fill="rgba(239,68,68,0.15)"/>
  <rect x="105" y="305" width="30" height="8" rx="4" fill="#ef4444"/>
  <text x="105" y="340" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#ef4444">10</text>
  <text x="185" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#ef4444" opacity="0.8">Extreme Fear</text>
  <text x="105" y="365" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">47 consecutive days below 25</text>
  <text x="105" y="390" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">$100B market cap shed in 24h</text>
  <text x="105" y="415" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444" opacity="0.7">RSI: 27 (Deeply Oversold)</text>

  <!-- WHALE card (right) -->
  <rect x="620" y="255" width="500" height="175" rx="16" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="645" y="290" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" letter-spacing="0.1em">WHALE ACCUMULATION</text>
  <!-- Accumulation gauge -->
  <rect x="645" y="305" width="300" height="8" rx="4" fill="rgba(34,197,94,0.15)"/>
  <rect x="645" y="305" width="288" height="8" rx="4" fill="#22c55e"/>
  <text x="645" y="340" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#22c55e">270K</text>
  <text x="845" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#22c55e" opacity="0.8">BTC</text>
  <text x="645" y="365" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">$23 billion accumulated in 30 days</text>
  <text x="645" y="390" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">13-year accumulation high</text>
  <text x="645" y="415" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e" opacity="0.7">Exchange supply: 2.7M BTC (6yr low)</text>

  <!-- VS divider -->
  <circle cx="600" cy="342" r="22" fill="#080d1c" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="600" y="349" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#e6edf3" text-anchor="middle">VS</text>

  <!-- Historical pattern callout -->
  <rect x="80" y="455" width="1040" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="110" y="480" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" letter-spacing="0.05em">HISTORICAL PATTERN</text>
  <text x="110" y="502" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Every time this divergence appeared (2018, 2020, 2022), BTC rallied</text>
  <text x="762" y="502" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">150–400%</text>
  <text x="860" y="502" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">within 12 months</text>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="575" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Track whale movements and market sentiment in real time</text>
  <text x="80" y="600" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">degen0x.com/tools/whale-tracker</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- BTC price tag -->
  <rect x="980" y="555" width="140" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1000" y="578" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">BTC</text>
  <text x="1030" y="578" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">$68,014</text>
</svg>