<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f0a1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>
  <!-- Decorative glow circles -->
  <circle cx="950" cy="150" r="120" fill="#ef4444" opacity="0.06" filter="url(#glow)"/>
  <circle cx="200" cy="500" r="80" fill="#f59e0b" opacity="0.04" filter="url(#glow)"/>
  <!-- Logo area -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>
  <!-- Big number -->
  <text x="60" y="220" font-family="Inter, system-ui, sans-serif" font-size="160" font-weight="900" fill="url(#barGrad)" letter-spacing="-0.04em">48</text>
  <!-- Title -->
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">CONSECUTIVE DAYS OF</text>
  <text x="60" y="345" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#ef4444" letter-spacing="-0.02em">EXTREME FEAR</text>
  <!-- Subtitle -->
  <text x="60" y="395" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">The longest streak in modern crypto history. FTX record (42 days) broken.</text>
  <!-- Data points -->
  <rect x="60" y="440" width="320" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">FEAR &amp; GREED INDEX</text>
  <text x="80" y="502" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ef4444">8</text>
  <text x="115" y="502" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">/ 100</text>

  <rect x="410" y="440" width="320" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="430" y="470" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">BTC ETF MARCH INFLOWS</text>
  <text x="430" y="502" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#22c55e">$2.5B</text>

  <rect x="760" y="440" width="380" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="780" y="470" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">MORGAN STANLEY</text>
  <text x="780" y="502" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#06b6d4">Filed BTC ETF</text>

  <!-- Fear bar visualization -->
  <rect x="60" y="545" width="1080" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="60" y="545" width="86" height="8" rx="4" fill="url(#barGrad)"/>
  <text x="60" y="575" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">0 — Extreme Fear</text>
  <text x="1060" y="575" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-anchor="end">100 — Extreme Greed</text>

  <!-- Bottom bar -->
  <rect y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="1140" y="624" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">degen0x.com</text>
</svg>
