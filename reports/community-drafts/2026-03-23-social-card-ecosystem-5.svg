<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gradient accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="350" r="250" fill="#6366f1" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="1000" cy="250" r="200" fill="#06b6d4" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="600" cy="500" r="180" fill="#d97706" opacity="0.02" filter="url(#softGlow)"/>

  <!-- degen0x logo text -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="url(#brandGrad)">degen0x</text>

  <!-- Badge -->
  <rect x="170" y="46" width="170" height="28" rx="14" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="255" y="65" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">ECOSYSTEM UPDATE</text>

  <!-- Title -->
  <text x="60" y="150" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">5 New Ecosystem</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Deep-Dives</text>

  <!-- Protocol cards - Row 1 -->
  <!-- Chainlink -->
  <rect x="60" y="240" width="210" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="165" y="280" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#6366f1" text-anchor="middle" filter="url(#glow)">Chainlink</text>
  <text x="165" y="305" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e" text-anchor="middle">$LINK</text>
  <text x="165" y="340" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6e7681" text-anchor="middle">1,900+ integrations</text>

  <!-- dYdX -->
  <rect x="290" y="240" width="210" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="395" y="280" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#8b5cf6" text-anchor="middle" filter="url(#glow)">dYdX</text>
  <text x="395" y="305" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e" text-anchor="middle">$DYDX</text>
  <text x="395" y="340" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6e7681" text-anchor="middle">$1B+ daily volume</text>

  <!-- GMX -->
  <rect x="520" y="240" width="210" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="625" y="280" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#06b6d4" text-anchor="middle" filter="url(#glow)">GMX</text>
  <text x="625" y="305" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e" text-anchor="middle">$GMX</text>
  <text x="625" y="340" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6e7681" text-anchor="middle">Real yield perps</text>

  <!-- Row 2 -->
  <!-- Ethena -->
  <rect x="175" y="380" width="210" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="280" y="420" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f59e0b" text-anchor="middle" filter="url(#glow)">Ethena</text>
  <text x="280" y="445" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e" text-anchor="middle">$ENA</text>
  <text x="280" y="480" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6e7681" text-anchor="middle">$5B+ TVL synthetic USD</text>

  <!-- Jupiter -->
  <rect x="405" y="380" width="210" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="510" y="420" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#22c55e" text-anchor="middle" filter="url(#glow)">Jupiter</text>
  <text x="510" y="445" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e" text-anchor="middle">$JUP</text>
  <text x="510" y="480" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6e7681" text-anchor="middle">50%+ Solana DEX vol</text>

  <!-- Right side: total page count -->
  <rect x="800" y="280" width="340" height="180" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="970" y="340" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#8b949e" text-anchor="middle">TOTAL ECOSYSTEM PAGES</text>
  <text x="970" y="400" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#brandGrad)" text-anchor="middle" filter="url(#glow)">15</text>
  <text x="970" y="435" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6e7681" text-anchor="middle">protocols covered</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="570" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="607" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#6e7681">degen0x.com — DeFi protocol deep-dives</text>
  <text x="1140" y="607" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6e7681" text-anchor="end">Free. No signup.</text>

  <!-- Bottom gradient -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brandGrad)"/>
</svg>
