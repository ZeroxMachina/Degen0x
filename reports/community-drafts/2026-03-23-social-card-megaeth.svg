<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1a2d"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="megaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="speedGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gradient accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Decorative speed lines -->
  <line x1="800" y1="150" x2="1150" y2="150" stroke="#06b6d4" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="850" y1="200" x2="1180" y2="200" stroke="#06b6d4" stroke-opacity="0.1" stroke-width="1.5"/>
  <line x1="820" y1="250" x2="1160" y2="250" stroke="#06b6d4" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="870" y1="300" x2="1190" y2="300" stroke="#8b5cf6" stroke-opacity="0.1" stroke-width="1.5"/>
  <line x1="840" y1="350" x2="1170" y2="350" stroke="#8b5cf6" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Decorative glow circles -->
  <circle cx="1050" cy="200" r="120" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="950" cy="400" r="80" fill="#8b5cf6" opacity="0.03" filter="url(#softGlow)"/>

  <!-- degen0x logo text -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="url(#brandGrad)">degen0x</text>

  <!-- Badge: NEW GUIDE -->
  <rect x="170" y="46" width="110" height="28" rx="14" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1"/>
  <text x="225" y="65" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4" text-anchor="middle">NEW GUIDE</text>

  <!-- Main title -->
  <text x="60" y="170" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">MegaETH</text>
  <text x="60" y="230" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600" fill="#8b949e" letter-spacing="-0.01em">The Real-Time Ethereum L2</text>

  <!-- Stats boxes -->
  <!-- TPS -->
  <rect x="60" y="280" width="230" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="175" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e" text-anchor="middle">THROUGHPUT</text>
  <text x="175" y="358" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#06b6d4" text-anchor="middle" filter="url(#glow)">100K+ TPS</text>

  <!-- Day 1 Txns -->
  <rect x="310" y="280" width="230" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="425" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e" text-anchor="middle">DAY 1 TRANSACTIONS</text>
  <text x="425" y="358" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#22c55e" text-anchor="middle" filter="url(#glow)">39M</text>

  <!-- Backers -->
  <rect x="560" y="280" width="230" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="675" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e" text-anchor="middle">BACKED BY</text>
  <text x="675" y="358" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#8b5cf6" text-anchor="middle">Paradigm + Vitalik</text>

  <!-- Key features -->
  <text x="60" y="440" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#06b6d4">→</text>
  <text x="85" y="440" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#e6edf3">Streaming EVM — continuous transaction processing</text>

  <text x="60" y="475" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#06b6d4">→</text>
  <text x="85" y="475" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#e6edf3">SALT Architecture — entire state in RAM</text>

  <text x="60" y="510" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#06b6d4">→</text>
  <text x="85" y="510" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#e6edf3">50+ apps deployed at launch (Aave, GMX via Chainlink)</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="570" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="607" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#6e7681">degen0x.com/learn/megaeth-guide-2026</text>
  <text x="1140" y="607" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6e7681" text-anchor="end">Free. No signup.</text>

  <!-- Bottom gradient accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brandGrad)"/>
</svg>
