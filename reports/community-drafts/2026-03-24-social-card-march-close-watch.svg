<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Decorative: 6 red monthly candles visualization -->
  <g opacity="0.15">
    <rect x="200" y="280" width="40" height="120" rx="4" fill="#ef4444"/>
    <rect x="260" y="260" width="40" height="140" rx="4" fill="#ef4444"/>
    <rect x="320" y="300" width="40" height="100" rx="4" fill="#ef4444"/>
    <rect x="380" y="240" width="40" height="160" rx="4" fill="#ef4444"/>
    <rect x="440" y="270" width="40" height="130" rx="4" fill="#ef4444"/>
    <!-- 6th candle - in play -->
    <rect x="500" y="290" width="40" height="110" rx="4" fill="#ef4444" opacity="0.5"/>
    <rect x="500" y="290" width="40" height="110" rx="4" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="120" fill="#4f46e5" opacity="0.06"/>
  <circle cx="1050" cy="400" r="80" fill="#0891b2" opacity="0.05"/>

  <!-- Glass card background -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Badge -->
  <rect x="80" y="80" width="160" height="32" rx="16" fill="#ef4444" opacity="0.2"/>
  <text x="160" y="101" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1">MARKET ALERT</text>

  <!-- Logo text -->
  <text x="1060" y="101" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#6366f1" text-anchor="end">degen0x</text>

  <!-- Main title -->
  <text x="80" y="190" font-family="Inter, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Bitcoin's Historic</text>
  <text x="80" y="250" font-family="Inter, sans-serif" font-size="52" font-weight="900" fill="url(#redGrad)" letter-spacing="-0.02em">6-Month Red Streak</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Inter, sans-serif" font-size="20" fill="#8b949e">7 days to match the 2018 bear market record — but the setup is different</text>

  <!-- Stat boxes -->
  <g>
    <!-- Box 1 -->
    <rect x="80" y="340" width="300" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="230" y="375" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#ef4444" text-anchor="middle">6 Red Months</text>
    <text x="230" y="410" font-family="Inter, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Matches 2018 Record If March Closes Red</text>

    <!-- Box 2 -->
    <rect x="400" y="340" width="300" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="550" y="375" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#22c55e" text-anchor="middle">$312B</text>
    <text x="550" y="410" font-family="Inter, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Stablecoin Supply ATH — Dry Powder</text>

    <!-- Box 3 -->
    <rect x="720" y="340" width="300" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="870" y="375" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#f59e0b" text-anchor="middle">F&amp;G: 8 → 33</text>
    <text x="870" y="410" font-family="Inter, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">48-Day Extreme Fear Streak Broken</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="575" font-family="Inter, sans-serif" font-size="16" fill="#6e7681" text-anchor="middle">degen0x.com/tools/fear-greed-timeline</text>
</svg>
