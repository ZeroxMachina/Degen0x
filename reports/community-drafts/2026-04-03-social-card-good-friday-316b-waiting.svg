  <text x="237" y="554" font-family="Inter,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">Good Friday</text>

  <rect x="314" y="535" width="148" height="28" rx="14" fill="rgba(99,102,241,0.15)"/>
  <text x="388" y="554" font-family="Inter,sans-serif" font-size="11" fill="#818cf8" text-anchor="middle">CLARITY Act</text>

  <rect x="474" y="535" width="160" height="28" rx="14" fill="rgba(34,211,238,0.15)"/>
  <text x="554" y="554" font-family="Inter,sans-serif" font-size="11" fill="#22d3ee" text-anchor="middle">Wormhole Unlock</text>

  <rect x="646" y="535" width="140" height="28" rx="14" fill="rgba(34,197,94,0.15)"/>
  <text x="716" y="554" font-family="Inter,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">$316B Stables</text>

