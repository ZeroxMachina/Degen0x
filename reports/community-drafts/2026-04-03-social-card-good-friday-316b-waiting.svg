  <text x="855" y="418" font-family="Inter,sans-serif" font-size="12" fill="#818cf8" letter-spacing="0.5">SIGNAL</text>
  <text x="855" y="444" font-family="Inter,sans-serif" font-size="14" fill="#e6edf3">Retail is terrified.</text>
  <text x="855" y="465" font-family="Inter,sans-serif" font-size="14" fill="#e6edf3">Institutions loaded $8.4B</text>
  <text x="855" y="486" font-family="Inter,sans-serif" font-size="14" fill="#e6edf3">in Q1 via IBIT alone.</text>
  <text x="855" y="500" font-family="Inter,sans-serif" font-size="11" fill="#8b949e">Capital isn't leaving — it's waiting.</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="url(#accent)">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter,sans-serif" font-size="12" fill="#6e7681" text-anchor="end">April 3, 2026 — Weekly Digest</text>
