  <!-- Card 1: BTC Price -->
  <rect x="60" y="265" width="250" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="296" font-family="Inter,sans-serif" font-size="12" fill="#8b949e" letter-spacing="0.5">BTC PRICE</text>
  <text x="80" y="332" font-family="Inter,sans-serif" font-size="32" font-weight="800" fill="#e6edf3">$66,868</text>
