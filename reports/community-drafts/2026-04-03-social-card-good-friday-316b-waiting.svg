  <text x="400" y="480" font-family="Inter,sans-serif" font-size="22" font-weight="800" fill="#22c55e" text-anchor="middle">+72%</text>

  <rect x="520" y="435" width="200" height="55" rx="12" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
