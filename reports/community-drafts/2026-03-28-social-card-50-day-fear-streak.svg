<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Decorative ambient glow circles -->
  <circle cx="200" cy="500" r="200" fill="#ef4444" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="1000" cy="150" r="180" fill="#22c55e" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Logo area -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#818cf8" letter-spacing="0.05em">DEGEN0X</text>

  <!-- Record badge -->
  <rect x="920" y="30" width="220" height="32" rx="16" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <circle cx="940" cy="46" r="4" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="955" y="51" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ef4444" letter-spacing="0.05em">ALL-TIME RECORD</text>

  <!-- Main title -->
  <text x="60" y="130" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="url(#fearGrad)" letter-spacing="-0.02em">50 DAYS</text>
  <text x="60" y="175" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#e6edf3">of Extreme Fear</text>
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">The longest Fear &amp; Greed streak ever recorded. What happens next?</text>

  <!-- Fear meter visualization -->
  <rect x="60" y="240" width="500" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="60" y="240" width="60" height="8" rx="4" fill="url(#fearGrad)"/>
  <text x="60" y="268" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ef4444" font-weight="700">12/100</text>
  <text x="115" y="268" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Extreme Fear</text>

  <!-- Historical comparison cards -->
  <!-- Card 1: Post-FTX -->
  <rect x="60" y="295" width="340" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="325" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" font-weight="600" letter-spacing="0.05em">POST-FTX (NOV 2022)</text>
  <text x="80" y="348" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">38-day streak below 25</text>
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#22c55e" font-weight="700">+94% in 6 months</text>

  <!-- Card 2: COVID -->
  <rect x="60" y="392" width="340" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="422" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" font-weight="600" letter-spacing="0.05em">COVID CRASH (MAR 2020)</text>
  <text x="80" y="445" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">28-day streak below 25</text>
  <text x="80" y="467" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#22c55e" font-weight="700">+1,180% in 13 months</text>

  <!-- Card 3: Crypto Winter -->
  <rect x="60" y="489" width="340" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="519" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" font-weight="600" letter-spacing="0.05em">CRYPTO WINTER (DEC 2018)</text>
  <text x="80" y="542" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">42-day streak below 25</text>
  <text x="80" y="564" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#22c55e" font-weight="700">+306% in 6 months</text>

  <!-- Right side: Current market data panel -->
  <rect x="620" y="120" width="520" height="280" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="650" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" font-weight="600" letter-spacing="0.05em">CURRENT MARKET</text>

  <!-- BTC -->
  <text x="650" y="190" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#f59e0b" font-weight="600">BTC</text>
  <text x="750" y="190" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3" font-weight="700">$66,008</text>
  <text x="880" y="190" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444">-48% from ATH</text>

  <!-- ETH -->
  <text x="650" y="220" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#818cf8" font-weight="600">ETH</text>
  <text x="750" y="220" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3" font-weight="700">$1,985</text>
  <text x="880" y="220" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444">-60% from high</text>

  <!-- Divider -->
  <line x1="650" y1="240" x2="1110" y2="240" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Whale signal -->
  <text x="650" y="270" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#22c55e" font-weight="600" letter-spacing="0.05em">INSTITUTIONAL SIGNAL</text>

  <text x="650" y="298" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Whale accumulation (30d)</text>
  <text x="950" y="298" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#22c55e" font-weight="700">270K BTC</text>

  <text x="650" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Exchange reserves</text>
  <text x="950" y="325" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#22c55e" font-weight="700">7-year low</text>

  <text x="650" y="352" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Supply on exchanges</text>
  <text x="950" y="352" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#22c55e" font-weight="700">5.88%</text>

  <text x="650" y="379" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">24h Liquidations</text>
  <text x="950" y="379" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#ef4444" font-weight="700">$450M</text>

  <!-- Insight callout -->
  <rect x="620" y="420" width="520" height="70" rx="12" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="650" y="450" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#a78bfa" font-weight="600">Every extended fear period (28+ days)</text>
  <text x="650" y="475" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#a78bfa" font-weight="600">was followed by a major rally. 3 for 3.</text>

  <!-- Options expiry note -->
  <rect x="620" y="505" width="520" height="48" rx="10" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="650" y="535" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f59e0b">$8.7B quarterly options expired today — post-expiry relief rally possible</text>

  <!-- Footer -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com</text>
  <text x="350" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">592 pages live</text>
  <text x="570" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">fear-greed-timeline</text>
  <text x="780" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">whale-tracker</text>
  <text x="960" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">March 28, 2026</text>
</svg>