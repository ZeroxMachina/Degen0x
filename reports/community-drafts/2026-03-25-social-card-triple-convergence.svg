<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="fearRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bullGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="950" cy="150" r="180" fill="#4f46e5" opacity="0.06"/>
  <circle cx="200" cy="500" r="140" fill="#0891b2" opacity="0.05"/>
  <circle cx="1050" cy="480" r="100" fill="#d97706" opacity="0.04"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="473" x2="1200" y2="473" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- degen0x logo area -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>
  <text x="160" y="55" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">.com</text>

  <!-- Date badge -->
  <rect x="1010" y="35" width="140" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1080" y="54" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">MAR 27, 2026</text>

  <!-- Main title -->
  <text x="60" y="145" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="url(#brand)" letter-spacing="-0.02em">TRIPLE CONVERGENCE</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">THURSDAY</text>

  <!-- Subtitle -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">Three catalysts colliding in 24 hours — the most important day for crypto in 2026</text>

  <!-- Three catalyst cards -->
  <!-- Card 1: Options Expiry -->
  <rect x="60" y="275" width="340" height="165" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="310" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="0.1em">CATALYST 1</text>
  <text x="85" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3">$13.5B Options Expiry</text>
  <text x="85" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Largest quarterly settlement of 2026</text>
  <text x="85" y="400" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Max Pain:</text>
  <text x="165" y="400" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e">$85K–$86K</text>
  <text x="85" y="422" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">BTC Now:</text>
  <text x="155" y="422" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">$71.3K</text>
  <text x="225" y="422" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ef4444">↑ $14K gap</text>

  <!-- Card 2: SEC ETF Ruling -->
  <rect x="430" y="275" width="340" height="165" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="455" y="310" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0891b2" letter-spacing="0.1em">CATALYST 2</text>
  <text x="455" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3">91 ETF Applications</text>
  <text x="455" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">SEC deadline across 24 tokens</text>
  <text x="455" y="400" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">16 cryptos classified as commodities</text>
  <text x="455" y="422" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">SOL · XRP · ADA · LINK · AVAX · DOT</text>

  <!-- Card 3: Options Limits Removed -->
  <rect x="800" y="275" width="340" height="165" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="825" y="310" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d97706" letter-spacing="0.1em">CATALYST 3</text>
  <text x="825" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3">Options Limits Lifted</text>
  <text x="825" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">NYSE · Nasdaq · Cboe</text>
  <text x="825" y="400" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">11 crypto ETF funds uncapped</text>
  <text x="825" y="422" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Institutional-scale positioning enabled</text>

  <!-- Fear & Greed bar -->
  <rect x="60" y="470" width="540" height="80" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="85" y="500" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ef4444" letter-spacing="0.08em">FEAR &amp; GREED INDEX</text>
  <text x="85" y="533" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="url(#fearRed)">8</text>
  <text x="125" y="533" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">/ 100</text>
  <text x="200" y="525" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">46-day Extreme Fear streak</text>
  <text x="200" y="543" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Longest since FTX collapse (Nov 2022)</text>
  <!-- Mini fear bar -->
  <rect x="440" y="505" width="140" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="440" y="505" width="11" height="8" rx="4" fill="url(#fearRed)"/>
  <text x="440" y="530" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">0</text>
  <text x="570" y="530" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">100</text>

  <!-- Stablecoins stat -->
  <rect x="630" y="470" width="250" height="80" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="655" y="500" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" letter-spacing="0.08em">STABLECOINS</text>
  <text x="655" y="535" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="url(#bullGreen)">$313B ATH</text>

  <!-- Historical stat -->
  <rect x="910" y="470" width="230" height="80" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="935" y="500" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#d97706" letter-spacing="0.08em">BUY F&amp;G &lt;15</text>
  <text x="935" y="535" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#f59e0b">+38.4%</text>
  <text x="1065" y="535" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">90d median</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="200" y="612" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Track all three catalysts live — options, fear index, ETF guide</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brand)"/>
</svg>
