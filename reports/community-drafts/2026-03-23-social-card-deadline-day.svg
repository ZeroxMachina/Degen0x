<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="urgentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="brandGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Top accent bar (urgent red) -->
  <rect width="1200" height="5" fill="url(#urgentGrad)"/>

  <!-- Decorative danger glow -->
  <circle cx="600" cy="200" r="300" fill="#ef4444" opacity="0.03" filter="url(#softGlow2)"/>
  <circle cx="100" cy="500" r="150" fill="#f59e0b" opacity="0.02" filter="url(#softGlow2)"/>

  <!-- Glass card -->
  <rect x="60" y="70" width="1080" height="490" rx="20" ry="20" fill="rgba(255,255,255,0.03)" stroke="rgba(239,68,68,0.12)" stroke-width="1"/>

  <!-- degen0x logo -->
  <text x="100" y="120" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#brandGrad2)" letter-spacing="0.05em">degen0x</text>

  <!-- DEADLINE badge -->
  <rect x="200" y="100" width="140" height="30" rx="15" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
  <text x="270" y="120" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="0.1em">DEADLINE DAY</text>

  <!-- Main headline -->
  <text x="100" y="195" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Iran Ultimatum</text>
  <text x="100" y="255" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="url(#urgentGrad)" letter-spacing="-0.02em">Expires Tonight</text>

  <!-- Subtitle -->
  <text x="100" y="295" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">Trump: "reopen the Strait of Hormuz or face strikes on power plants"</text>

  <!-- Stats row -->
  <!-- BTC Price -->
  <rect x="100" y="330" width="230" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="120" y="360" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.05em">BTC PRICE</text>
  <text x="120" y="400" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3">$69,000</text>

  <!-- Liquidations -->
  <rect x="350" y="330" width="230" height="90" rx="12" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="370" y="360" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.05em">LIQUIDATIONS (48H)</text>
  <text x="370" y="400" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ef4444">$1B+</text>

  <!-- Fear & Greed -->
  <rect x="600" y="330" width="230" height="90" rx="12" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="620" y="360" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.05em">FEAR &amp; GREED</text>
  <text x="620" y="400" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ef4444">10</text>
  <text x="670" y="400" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444"> Extreme</text>

  <!-- Brent Crude -->
  <rect x="850" y="330" width="230" height="90" rx="12" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="870" y="360" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.05em">BRENT CRUDE</text>
  <text x="870" y="400" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#f59e0b">$112</text>
  <text x="945" y="400" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#f59e0b">/bbl</text>

  <!-- Key tokens -->
  <text x="100" y="470" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">
    <tspan fill="#8b949e">ETH</tspan> $2,114
    <tspan dx="20" fill="#8b949e">SOL</tspan> $88.55
    <tspan dx="20" fill="#8b949e">XRP</tspan> $1.41
    <tspan dx="20" fill="#8b949e">DOGE</tspan> $0.092
  </text>

  <!-- Longs wiped bar -->
  <text x="100" y="510" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Longs wiped:</text>
  <rect x="210" y="497" width="400" height="18" rx="4" fill="rgba(255,255,255,0.04)"/>
  <rect x="210" y="497" width="392" height="18" rx="4" fill="rgba(239,68,68,0.3)"/>
  <text x="415" y="511" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e6edf3" text-anchor="middle">~$980M longs (98%)</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.4)"/>
  <text x="100" y="611" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Track sentiment live → degen0x.com/tools/fear-greed-timeline</text>
  <text x="1100" y="611" font-family="Inter, system-ui, sans-serif" font-size="14" fill="url(#brandGrad2)" text-anchor="end" font-weight="600">degen0x.com</text>
</svg>