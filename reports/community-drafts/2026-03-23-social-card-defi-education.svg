    <text x="540" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">FREE TOOLS</text>

    <line x1="660" y1="12" x2="660" y2="48" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="780" y="36" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#f59e0b" text-anchor="middle">174+</text>
    <text x="780" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">LEARN GUIDES</text>

    <line x1="900" y1="12" x2="900" y2="48" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="1000" y="36" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#ef4444" text-anchor="middle">$0</text>
    <text x="1000" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">COST TO USE</text>
