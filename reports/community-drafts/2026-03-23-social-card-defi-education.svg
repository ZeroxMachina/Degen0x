  <circle cx="1000" cy="350" r="180" fill="#0891b2" opacity="0.05" filter="url(#softglow)"/>
  <circle cx="600" cy="500" r="150" fill="#d97706" opacity="0.04" filter="url(#softglow)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.03">
