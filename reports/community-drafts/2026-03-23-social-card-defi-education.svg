  <text x="60" y="582" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">degen0x.com/ecosystem</text>
  <text x="60" y="606" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Free crypto tools, guides, and protocol deep dives. No signup required.</text>

