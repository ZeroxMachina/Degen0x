<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080d1c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#080d1c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="url(#redGlow)"/>
  <circle cx="150" cy="500" r="200" fill="url(#greenGlow)"/>

  <!-- Logo area -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>
  <text x="145" y="55" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">MARKET ALERT</text>

  <!-- Date badge -->
  <rect x="960" y="35" width="200" height="30" rx="15" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="1060" y="55" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">THU MAR 27, 2026</text>

  <!-- Main title -->
  <text x="60" y="130" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">DOUBLE CATALYST DAY</text>
  <text x="60" y="170" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Two massive events collide on the same day</text>

  <!-- Panel 1: Options Expiry -->
  <rect x="60" y="200" width="520" height="220" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="235" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" letter-spacing="0.08em">CATALYST 1 — DERIVATIVES</text>
  <text x="85" y="280" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#e6edf3">$13.5B</text>
  <text x="85" y="310" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">BTC + ETH options expire on Deribit</text>
  <text x="85" y="345" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Max Pain: $70K — BTC sitting right on it</text>
  <text x="85" y="370" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Biggest quarterly expiry of Q1 2026</text>
  <text x="85" y="400" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">Short squeeze potential if BTC holds above $70K</text>

  <!-- Panel 2: SEC ETFs -->
  <rect x="620" y="200" width="520" height="220" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="645" y="235" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1" letter-spacing="0.08em">CATALYST 2 — REGULATION</text>
  <text x="645" y="280" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#e6edf3">91 ETFs</text>
  <text x="645" y="310" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">SEC deadline for crypto ETF decisions</text>
  <text x="645" y="345" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">XRP · SOL · LTC · DOGE spot ETFs in batch</text>
  <text x="645" y="370" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">16 assets already classified as commodities</text>
  <text x="645" y="400" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">Approval wave could unlock billions in inflows</text>

  <!-- Bottom stat bar -->
  <rect x="60" y="450" width="1080" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Stat: BTC Price -->
  <text x="120" y="483" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">BTC</text>
  <text x="120" y="510" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">$70,600</text>

  <!-- Stat: F&G -->
  <text x="290" y="483" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">FEAR &amp; GREED</text>
  <text x="290" y="510" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444">14</text>
  <text x="318" y="510" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">(rebounded from 8)</text>

  <!-- Stat: ETF Inflows -->
  <text x="530" y="483" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">MAR ETF INFLOWS</text>
  <text x="530" y="510" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#22c55e">$2.5B</text>

  <!-- Stat: Fear Streak -->
  <text x="720" y="483" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">FEAR STREAK</text>
  <text x="720" y="510" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444">46+ days</text>

  <!-- Stat: Stablecoins -->
  <text x="910" y="483" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">STABLECOINS</text>
  <text x="910" y="510" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#4ade80">$304B ATH</text>

  <!-- Tagline -->
  <text x="600" y="575" font-family="Inter, system-ui, sans-serif" font-size="15" font-style="italic" fill="#8b949e" text-anchor="middle">Last time derivatives + regulation collided: BTC ETF approval Jan 2024. +85% in 60 days.</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(255,255,255,0.02)"/>
  <text x="600" y="624" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">degen0x.com — Free crypto tools, data, and research</text>
</svg>