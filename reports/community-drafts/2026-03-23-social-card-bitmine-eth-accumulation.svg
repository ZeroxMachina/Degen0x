<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="ethGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative -->
  <circle cx="1000" cy="300" r="250" fill="#8b5cf6" opacity="0.03"/>
  <circle cx="200" cy="100" r="100" fill="#06b6d4" opacity="0.03"/>

  <!-- Logo -->
  <text x="60" y="55" fill="#8b949e" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="0.05em">DEGEN0X</text>

  <!-- Main title -->
  <text x="60" y="130" fill="#e6edf3" font-family="Inter, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">Bitmine Buys $138M in ETH</text>

  <!-- Subtitle -->
  <text x="60" y="170" fill="#8b949e" font-family="Inter, sans-serif" font-size="20">Tom Lee's treasury firm bets the crypto slump is ending</text>

  <!-- Purchase timeline (3 weeks) -->
  <g transform="translate(60, 210)">
    <text x="0" y="0" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500" letter-spacing="0.05em">3 CONSECUTIVE WEEKLY PURCHASES</text>

    <!-- Week 1 bar -->
    <rect x="0" y="20" width="180" height="60" rx="12" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
    <text x="15" y="45" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Week 1</text>
    <rect x="15" y="55" width="100" height="8" rx="4" fill="url(#ethGrad)" opacity="0.6"/>

    <!-- Week 2 bar -->
    <rect x="200" y="20" width="180" height="60" rx="12" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <text x="215" y="45" fill="#8b949e" font-family="Inter, sans-serif" font-size="11">Week 2</text>
    <rect x="215" y="55" width="120" height="8" rx="4" fill="url(#ethGrad)" opacity="0.75"/>

    <!-- Week 3 bar (current, largest) -->
    <rect x="400" y="20" width="200" height="60" rx="12" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.35)" stroke-width="1"/>
    <text x="415" y="42" fill="#e6edf3" font-family="Inter, sans-serif" font-size="11" font-weight="600">Week 3 (This Week)</text>
    <rect x="415" y="55" width="160" height="8" rx="4" fill="url(#ethGrad)"/>
    <text x="415" y="72" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="10" font-weight="600">65,341 ETH · $138M</text>
  </g>

  <!-- Key stats row -->
  <g transform="translate(60, 340)">
    <!-- ETH Price -->
    <rect x="0" y="0" width="200" height="80" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="30" fill="#6e7681" font-family="Inter, sans-serif" font-size="11">ETH PRICE</text>
    <text x="20" y="58" fill="#e6edf3" font-family="Inter, sans-serif" font-size="28" font-weight="700">$2,100</text>

    <!-- Total ETH -->
    <rect x="220" y="0" width="200" height="80" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="240" y="30" fill="#6e7681" font-family="Inter, sans-serif" font-size="11">ETH PURCHASED</text>
    <text x="240" y="58" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="28" font-weight="700">65,341</text>

    <!-- USD Value -->
    <rect x="440" y="0" width="200" height="80" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="460" y="30" fill="#6e7681" font-family="Inter, sans-serif" font-size="11">USD VALUE</text>
    <text x="460" y="58" fill="#22c55e" font-family="Inter, sans-serif" font-size="28" font-weight="700">$138M</text>
  </g>

  <!-- ETH thesis points -->
  <g transform="translate(60, 460)">
    <text x="0" y="0" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500" letter-spacing="0.05em">THE ETH THESIS</text>
    <text x="0" y="28" fill="#e6edf3" font-family="Inter, sans-serif" font-size="14">⚡ Pectra upgrade landing — scaling + staking improvements</text>
    <text x="0" y="52" fill="#e6edf3" font-family="Inter, sans-serif" font-size="14">🔗 L2 ecosystem exploding — Base, Arbitrum, zkSync</text>
    <text x="0" y="76" fill="#e6edf3" font-family="Inter, sans-serif" font-size="14">📊 ETH/BTC ratio near cycle lows — mean reversion play</text>
  </g>

  <!-- Right side: Large ETH diamond icon -->
  <g transform="translate(900, 300)">
    <polygon points="0,-100 80,0 0,40 -80,0" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)" stroke-width="1.5"/>
    <polygon points="0,40 80,0 0,120 -80,0" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="0" y="160" text-anchor="middle" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="16" font-weight="700" filter="url(#glow2)">ETH</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(255,255,255,0.02)"/>
  <text x="60" y="620" fill="#6e7681" font-family="Inter, sans-serif" font-size="13">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="13">March 23, 2026</text>
</svg>