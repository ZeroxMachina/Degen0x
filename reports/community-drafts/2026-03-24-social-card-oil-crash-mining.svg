<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="oilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="btcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Decorative orbs -->
  <circle cx="950" cy="120" r="180" fill="#22c55e" opacity="0.04"/>
  <circle cx="200" cy="500" r="140" fill="#ef4444" opacity="0.04"/>

  <!-- Badge -->
  <rect x="60" y="50" width="200" height="36" rx="18" fill="#22c55e" opacity="0.15"/>
  <text x="160" y="74" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1.5">MINING UPDATE</text>

  <!-- Main headline -->
  <text x="60" y="145" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Oil Crashed 11%.</text>
  <text x="60" y="205" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Mining Math Just Changed.</text>

  <!-- Subtitle -->
  <text x="60" y="252" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="20">Energy costs are 60-80% of mining — this crash is a miner lifeline</text>

  <!-- Oil price drop visualization -->
  <rect x="60" y="290" width="320" height="160" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="325" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="1">OIL (WTI)</text>
  <!-- Oil bars dropping -->
  <rect x="100" y="345" width="40" height="80" rx="4" fill="url(#oilGrad)" opacity="0.8"/>
  <rect x="155" y="365" width="40" height="60" rx="4" fill="url(#oilGrad)" opacity="0.6"/>
  <rect x="210" y="385" width="40" height="40" rx="4" fill="url(#oilGrad)" opacity="0.4"/>
  <text x="290" y="380" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" filter="url(#glow)">-11%</text>
  <text x="290" y="405" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14">Single day</text>

  <!-- BTC holding visualization -->
  <rect x="420" y="290" width="320" height="160" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="440" y="325" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="1">BITCOIN</text>
  <!-- BTC bars holding steady -->
  <rect x="460" y="365" width="40" height="60" rx="4" fill="url(#btcGrad)" opacity="0.6"/>
  <rect x="515" y="355" width="40" height="70" rx="4" fill="url(#btcGrad)" opacity="0.7"/>
  <rect x="570" y="345" width="40" height="80" rx="4" fill="url(#btcGrad)" opacity="0.9"/>
  <text x="650" y="380" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" filter="url(#glow)">$70.5K</text>
  <text x="650" y="405" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14">Holding strong</text>

  <!-- Stat boxes row -->
  <rect x="60" y="480" width="250" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="510" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="1">HASH RIBBONS</text>
  <text x="80" y="540" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">Crossed (Capitulating)</text>

  <rect x="340" y="480" width="250" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="360" y="510" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="1">FEAR &amp; GREED</text>
  <text x="360" y="540" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">11 → 27 (Recovering)</text>

  <rect x="620" y="480" width="250" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="640" y="510" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="1">STABLECOIN SUPPLY</text>
  <text x="640" y="540" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">$312B ATH</text>

  <!-- Logo area -->
  <rect x="900" y="480" width="240" height="80" rx="12" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="1020" y="515" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" text-anchor="middle">degen0x</text>
  <text x="1020" y="540" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">degen0x.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)"/>
</svg>
