  <text x="250" y="535" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e">→ +156%</text>

  <text x="420" y="535" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">2020 Q1 (COVID)</text>
  <text x="600" y="535" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e">→ +1,180%</text>

  <text x="770" y="535" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">2018 Q1 (-50%)</text>
  <text x="940" y="535" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e">→ +306%</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">Free crypto tools &amp; research</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>