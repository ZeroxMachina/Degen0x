<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedBg">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" clip-path="url(#roundedBg)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="950" cy="120" r="200" fill="#4f46e5" opacity="0.06"/>
  <circle cx="200" cy="500" r="150" fill="#0891b2" opacity="0.05"/>
  <circle cx="1100" cy="550" r="120" fill="#d97706" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Main title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Q2 2026: The Setup</text>
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">Worst Q1 since 2022. But look what's underneath.</text>

  <!-- Glass card: Q1 Scorecard -->
  <rect x="60" y="230" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="268" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="0.06em">Q1 SCORECARD</text>

  <text x="85" y="305" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">$BTC</text>
  <text x="280" y="305" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="end">-24.6%</text>

  <text x="85" y="340" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">$ETH</text>
  <text x="280" y="340" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="end">-60.0%</text>

  <text x="85" y="375" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">$SOL</text>
  <text x="280" y="375" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="end">-72.0%</text>

  <text x="85" y="415" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Fear &amp; Greed: </text>
  <text x="185" y="415" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ef4444">8/100</text>
  <text x="238" y="415" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">(54-day streak)</text>

  <!-- Glass card: Under the Surface -->
  <rect x="430" y="230" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="455" y="268" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="0.06em">UNDER THE SURFACE</text>

  <text x="455" y="305" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Whale accumulation</text>
  <text x="740" y="305" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="end">270K BTC</text>

  <text x="455" y="340" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Exchange supply</text>
  <text x="740" y="340" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="end">5.88% ATL</text>

  <text x="455" y="375" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Pending ETF filings</text>
  <text x="740" y="375" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#06b6d4" text-anchor="end">126</text>

  <text x="455" y="410" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Companies holding BTC</text>
  <text x="740" y="410" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#06b6d4" text-anchor="end">172+</text>

  <!-- Glass card: Q2 Catalysts -->
  <rect x="800" y="230" width="340" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="825" y="268" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="0.06em">Q2 CATALYSTS</text>

  <circle cx="835" cy="302" r="4" fill="#f59e0b"/>
  <text x="848" y="307" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">CLARITY Act vote</text>

  <circle cx="835" cy="335" r="4" fill="#f59e0b"/>
  <text x="848" y="340" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">SEC token taxonomy live</text>

  <circle cx="835" cy="368" r="4" fill="#f59e0b"/>
  <text x="848" y="373" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">401(k) crypto guidance</text>

  <circle cx="835" cy="401" r="4" fill="#f59e0b"/>
  <text x="848" y="406" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">CA Digital Assets Law (Jul)</text>

  <!-- Historical pattern bar -->
  <rect x="60" y="460" width="1080" height="100" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="85" y="495" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.05em">HISTORICAL PATTERN: BAD Q1 → BIG RECOVERY</text>

