<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1510;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4c86f;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#backgroundGradient)"/>

  <!-- Accent bar (left side) -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGradient)"/>

  <!-- Decorative amber circles (top-right) -->
  <circle cx="1100" cy="80" r="120" fill="#d4a574" opacity="0.08"/>
  <circle cx="1150" cy="120" r="80" fill="#f4c86f" opacity="0.06"/>

  <!-- Countdown timer circle (center-right) -->
  <circle cx="950" cy="200" r="90" fill="none" stroke="#d4a574" stroke-width="4" opacity="0.4"/>
  <circle cx="950" cy="200" r="75" fill="#1a1510" opacity="0.6"/>
  <text x="950" y="195" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="#f4c86f" text-anchor="middle">
    21
  </text>
  <text x="950" y="235" font-family="Arial, sans-serif" font-size="28" font-weight="300" fill="#d4a574" text-anchor="middle">
    DAYS
  </text>

  <!-- Main title -->
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    Tax Deadline
  </text>
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    Countdown
  </text>

  <!-- Subtitle -->
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="42" font-weight="300" fill="#d4a574">
    April 15 — Are You Ready?
  </text>

  <!-- Divider line -->
  <line x1="80" y1="290" x2="900" y2="290" stroke="url(#accentGradient)" stroke-width="3" opacity="0.6"/>

  <!-- Calendar icon (stylized) -->
  <rect x="80" y="310" width="60" height="60" rx="4" fill="none" stroke="#f4c86f" stroke-width="3"/>
  <line x1="80" y1="335" x2="140" y2="335" stroke="#f4c86f" stroke-width="2"/>
  <circle cx="95" cy="320" r="4" fill="#f4c86f"/>
  <circle cx="125" cy="320" r="4" fill="#f4c86f"/>

  <!-- Key features section -->
  <g>
    <!-- Feature 1 -->
    <circle cx="170" cy="335" r="8" fill="#f4c86f"/>
    <text x="195" y="345" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#ffffff">
      Free Tax Calculator
    </text>

    <!-- Feature 2 -->
    <circle cx="170" cy="410" r="8" fill="#f4c86f"/>
    <text x="195" y="420" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#ffffff">
      Regional Tax Guides (US, UK, Canada, etc.)
    </text>

    <!-- Feature 3 -->
    <circle cx="170" cy="485" r="8" fill="#f4c86f"/>
    <text x="195" y="495" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#ffffff">
      Crypto-Specific Filing Tips & Deductions
    </text>

    <!-- Feature 4 -->
    <circle cx="170" cy="560" r="8" fill="#f4c86f"/>
    <text x="195" y="570" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#ffffff">
      DeFi & Staking Deduction Strategies
    </text>
  </g>

  <!-- Right side: Emphasis box -->
  <g>
    <rect x="650" y="320" width="520" height="230" rx="8" fill="#1a1510" stroke="#d4a574" stroke-width="2" opacity="0.5"/>

    <text x="680" y="360" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#f4c86f">
      Don't Panic—We've Got You
    </text>

    <text x="680" y="405" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#ffffff">
      Tax season stress is real. Our crypto-specific tools
    </text>
    <text x="680" y="440" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#ffffff">
      make filing simple. Whether you're a hodler, trader,
    </text>
    <text x="680" y="475" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#ffffff">
      or DeFi power user, we have your deductions covered.
    </text>

    <text x="680" y="525" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#d4a574">
      Get organized now. Stay ahead of the deadline.
    </text>
  </g>

  <!-- CTA Button -->
  <rect x="200" y="540" width="420" height="70" rx="8" fill="url(#accentGradient)" opacity="0.25" stroke="#f4c86f" stroke-width="2"/>
  <text x="410" y="585" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#f4c86f" text-anchor="middle">
    Get Free Tax Tools — degen0x.com/taxes
  </text>

  <!-- degen0x branding (bottom-right) -->
  <text x="1080" y="600" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#d4a574" text-anchor="end">
    degen0x.com
  </text>
  <circle cx="1120" cy="615" r="6" fill="#f4c86f"/>
</svg>
