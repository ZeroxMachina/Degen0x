  <text x="670" y="592" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#4ade80">942</text>

  <text x="800" y="572" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">TWEETS DRAFTED</text>
  <text x="800" y="592" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366f1">238</text>

  <!-- degen0x branding -->
