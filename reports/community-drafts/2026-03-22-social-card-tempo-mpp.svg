<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad2)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="100" r="200" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="200" cy="550" r="150" fill="#0891b2" opacity="0.04"/>
  <circle cx="800" cy="500" r="120" fill="#d97706" opacity="0.03"/>

  <!-- Logo -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Badge -->
  <rect x="60" y="80" width="140" height="32" rx="16" fill="#8b5cf6" opacity="0.15"/>
  <text x="82" y="101" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">NEW LAUNCH</text>

  <!-- Main title -->
  <text x="60" y="170" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Stripe Just Launched</text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="url(#accentGrad2)" letter-spacing="-0.02em">A Payments Blockchain</text>

  <!-- Subtitle -->
  <text x="60" y="270" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Tempo mainnet + Machine Payments Protocol (MPP) · March 18, 2026</text>

  <!-- Two-column comparison cards -->
  <!-- Left card: Tempo -->
  <rect x="60" y="300" width="520" height="195" rx="16" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="85" y="335" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#a78bfa">Tempo Blockchain</text>
  <text x="85" y="365" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Stripe + Paradigm payments L1</text>

  <text x="85" y="400" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Valuation</text>
  <text x="85" y="420" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">$5B</text>

  <text x="220" y="400" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Raised</text>
  <text x="220" y="420" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">$500M</text>

  <text x="350" y="400" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Fees</text>
  <text x="350" y="420" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#22c55e">&lt;$0.001</text>

  <text x="85" y="460" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Sub-second finality · Stablecoin-native · 100+ integrations</text>

  <!-- Right card: MPP -->
  <rect x="620" y="300" width="520" height="195" rx="16" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="645" y="335" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#06b6d4">Machine Payments Protocol</text>
  <text x="645" y="365" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">"OAuth for money" — AI agents pay autonomously</text>

  <text x="645" y="400" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Partners</text>
  <text x="645" y="420" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Visa · Mastercard · OpenAI · Anthropic</text>

  <text x="645" y="455" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Key concepts</text>
  <text x="645" y="475" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Sessions · Shared Payment Tokens · Limits</text>

  <!-- Bottom bar -->
  <rect x="0" y="520" width="1200" height="110" fill="white" opacity="0.02"/>
  <text x="60" y="575" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1">degen0x.com/learn/tempo-blockchain-machine-payments-guide</text>
  <text x="1140" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad2)"/>
</svg>
