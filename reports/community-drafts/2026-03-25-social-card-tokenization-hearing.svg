  <rect x="215" y="436" width="100" height="32" rx="16" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="265" y="457" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#67e8f9" text-anchor="middle">Equities</text>

  <rect x="330" y="436" width="120" height="32" rx="16" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="390" y="457" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">Real Estate</text>

  <rect x="465" y="436" width="130" height="32" rx="16" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="530" y="457" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d" text-anchor="middle">Private Credit</text>

  <rect x="610" y="436" width="130" height="32" rx="16" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="675" y="457" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc" text-anchor="middle">Commodities</text>

  <!-- Key participants -->
  <text x="60" y="510" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681" letter-spacing="0.06em">MARKET LEADERS</text>

  <rect x="60" y="526" width="140" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="130" y="547" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">BlackRock BUIDL</text>

  <rect x="215" y="526" width="180" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="305" y="547" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">Franklin Templeton</text>

  <rect x="410" y="526" width="170" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="495" y="547" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">Nasdaq Tokenized</text>

  <rect x="595" y="526" width="170" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="680" y="547" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">Blockchain Assoc.</text>

  <!-- CTA -->
  <rect x="60" y="578" width="320" height="36" rx="18" fill="url(#purpleGrad)" opacity="0.9"/>
  <text x="220" y="601" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">degen0x.com/learn/tokenized-real-world-assets-guide</text>

  <!-- Logo -->
  <text x="1080" y="600" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="url(#brand)" text-anchor="middle">degen0x</text>
</svg>