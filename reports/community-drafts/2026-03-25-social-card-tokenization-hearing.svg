  <!-- Card 1: RWA Market -->
  <rect x="60" y="268" width="255" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="298" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="0.06em">RWA ON-CHAIN</text>
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e" filter="url(#glow)">$26.48B</text>
  <text x="80" y="364" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#4ade80">+5.25% in 30 days</text>

  <!-- Card 2: Bills Introduced -->
  <rect x="335" y="268" width="255" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="355" y="298" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="0.06em">BILLS INTRODUCED</text>
  <text x="355" y="340" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#6366f1" filter="url(#glow)">2</text>
  <text x="355" y="364" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#a5b4fc">SEC/CFTC + Blockchain Rules</text>

  <!-- Card 3: Stablecoin Supply -->
  <rect x="610" y="268" width="255" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="630" y="298" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="0.06em">STABLECOIN SUPPLY</text>
  <text x="630" y="340" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#06b6d4" filter="url(#glow)">$304B</text>
  <text x="630" y="364" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#67e8f9">ATH — CLARITY Act 99% done</text>

  <!-- Card 4: Fear & Greed -->
  <rect x="885" y="268" width="255" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="905" y="298" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6e7681" letter-spacing="0.06em">FEAR &amp; GREED</text>
  <text x="905" y="340" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#ef4444" filter="url(#glow)">8</text>
  <text x="905" y="364" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#fca5a5">Day 48 Extreme Fear Record</text>

