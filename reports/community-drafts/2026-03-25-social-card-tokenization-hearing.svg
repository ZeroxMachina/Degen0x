<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0c1229"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(500,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(700,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(800,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(1000,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(1100,0)"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="300" cy="300" r="250" fill="#4f46e5" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="900" cy="350" r="200" fill="#0891b2" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Badge: LIVE HEARING -->
  <rect x="60" y="40" width="180" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <circle cx="80" cy="58" r="5" fill="#22c55e" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="95" y="64" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#a5b4fc" letter-spacing="0.08em">TOKENIZATION</text>

  <!-- Date badge -->
  <rect x="260" y="40" width="160" height="36" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="340" y="64" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e" text-anchor="middle">MARCH 25, 2026</text>

  <!-- Main title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="url(#brand)" letter-spacing="-0.02em">Congress Holds Most Important</text>
  <text x="60" y="188" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="url(#brand)" letter-spacing="-0.02em">Tokenization Hearing to Date</text>

  <!-- Subtitle -->
