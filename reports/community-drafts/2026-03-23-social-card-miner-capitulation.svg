<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="hashRibbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand)"/>

  <!-- Decorative gradient orbs -->
  <circle cx="950" cy="150" r="200" fill="#ef4444" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="150" fill="#4f46e5" opacity="0.06" filter="url(#softGlow)"/>

  <!-- Glass card background -->
  <rect x="60" y="50" width="1080" height="530" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Logo area -->
  <circle cx="110" cy="100" r="20" fill="#4f46e5" opacity="0.8"/>
  <text x="110" y="106" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#e6edf3" text-anchor="middle">0x</text>
  <text x="145" y="106" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">degen0x</text>

  <!-- Warning badge -->
  <rect x="880" y="82" width="220" height="36" rx="18" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <circle cx="902" cy="100" r="6" fill="#ef4444" filter="url(#glow)"/>
  <text x="918" y="106" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">CAPITULATION ACTIVE</text>

  <!-- Main title -->
  <text x="90" y="190" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Bitcoin Miner</text>
  <text x="90" y="252" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="url(#brand)" letter-spacing="-0.02em">Capitulation Phase</text>

  <!-- Subtitle -->
  <text x="90" y="295" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Hash Ribbons crossed — historically signals major bottoms</text>

  <!-- Stat boxes row -->
  <!-- Box 1: BTC Price -->
  <rect x="90" y="330" width="230" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="110" y="362" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">BTC Price</text>
  <text x="110" y="396" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">$68,302</text>

  <!-- Box 2: Fear & Greed -->
  <rect x="340" y="330" width="230" height="90" rx="16" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="360" y="362" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Fear &amp; Greed</text>
  <text x="360" y="396" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#ef4444">8</text>
  <text x="400" y="396" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#ef4444"> Extreme Fear</text>

  <!-- Box 3: Liquidations -->
  <rect x="590" y="330" width="230" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="610" y="362" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">24h Liquidations</text>
  <text x="610" y="396" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#f59e0b">$400M+</text>

  <!-- Box 4: Oil Price -->
  <rect x="840" y="330" width="230" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="860" y="362" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Oil (Energy Cost)</text>
  <text x="860" y="396" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#ef4444">$112</text>

  <!-- Hash Ribbon visualization -->
  <text x="90" y="470" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">HASH RIBBON SIGNAL</text>

  <!-- Simplified hash ribbon chart line -->
  <line x1="90" y1="510" x2="1100" y2="510" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- 30-day MA line (dropping) -->
  <polyline points="90,490 200,488 350,492 500,496 600,502 700,510 800,518 900,525 1000,530 1050,532" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.9"/>

  <!-- 60-day MA line (still high) -->
  <polyline points="90,485 200,486 350,487 500,489 600,491 700,493 800,495 900,497 1000,499 1050,500" fill="none" stroke="#22c55e" stroke-width="2.5" opacity="0.9"/>

  <!-- Cross point indicator -->
  <circle cx="700" cy="510" r="8" fill="none" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
  <text x="720" y="505" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f59e0b">Cross →</text>

  <!-- Legend -->
  <line x1="90" y1="560" x2="110" y2="560" stroke="#ef4444" stroke-width="2"/>
  <text x="118" y="564" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">30d MA (dropping)</text>
  <line x1="280" y1="560" x2="300" y2="560" stroke="#22c55e" stroke-width="2"/>
  <text x="308" y="564" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e">60d MA (stable)</text>

  <!-- Bottom bar -->
  <text x="1100" y="564" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end">degen0x.com</text>

  <!-- Bottom gradient accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brand)"/>
</svg>
