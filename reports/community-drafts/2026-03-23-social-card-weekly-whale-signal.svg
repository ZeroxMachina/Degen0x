<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="180" fill="#4f46e5" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="120" fill="#0891b2" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="1050" cy="450" r="100" fill="#22c55e" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Glass card -->
  <rect x="60" y="60" width="1080" height="510" rx="20" ry="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Logo area -->
  <text x="100" y="115" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="0.1em">DEGEN0X</text>
  <text x="215" y="115" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">WEEKLY WRAP</text>

  <!-- Main title -->
  <text x="100" y="195" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">The Whale Signal</text>
  <text x="100" y="245" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#8b949e">Week of March 17–23, 2026</text>

  <!-- Stats row -->
  <!-- Stat 1: Whale accumulation -->
  <rect x="100" y="290" width="280" height="100" rx="12" ry="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="120" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-transform="uppercase" letter-spacing="0.05em">WHALE ACCUMULATION</text>
  <text x="120" y="368" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e" filter="url(#glow)">270K BTC</text>

  <!-- Stat 2: Exchange supply -->
  <rect x="410" y="290" width="280" height="100" rx="12" ry="12" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="430" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.05em">EXCHANGE SUPPLY</text>
  <text x="430" y="368" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#06b6d4" filter="url(#glow)">2.7M BTC</text>

  <!-- Stat 3: Fear & Greed -->
  <rect x="720" y="290" width="280" height="100" rx="12" ry="12" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="740" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="0.05em">FEAR &amp; GREED INDEX</text>
  <text x="740" y="368" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#ef4444" filter="url(#glow)">8</text>
  <text x="790" y="368" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e"> / 100 — Day 47</text>

  <!-- Sub-labels -->
  <text x="290" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">30d / $23B</text>
  <text x="600" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">6-year low</text>

  <!-- Key insight -->
  <text x="100" y="440" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#e6edf3">
    <tspan font-weight="700" fill="#f59e0b">BTC $71K</tspan>
    <tspan fill="#6e7681"> · </tspan>
    <tspan>Morgan Stanley ETF update</tspan>
    <tspan fill="#6e7681"> · </tspan>
    <tspan>Bitmine $138M ETH buy</tspan>
  </text>
  <text x="100" y="470" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">Extreme fear + institutional accumulation + shrinking supply = historical setup</text>

  <!-- Bottom bar -->
  <rect x="60" y="520" width="1080" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="100" y="550" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1040" y="550" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">Tools · Guides · Data</text>

  <!-- Bottom accent -->
  <rect y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
