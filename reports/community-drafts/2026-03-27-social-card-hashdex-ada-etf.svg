<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cardano" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0033AD"/>
      <stop offset="100%" stop-color="#006BB8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="900" cy="200" r="180" fill="#4f46e5" opacity="0.06" filter="url(#softglow)"/>
  <circle cx="300" cy="450" r="140" fill="#0891b2" opacity="0.05" filter="url(#softglow)"/>

  <!-- Badge: ETF UPDATE -->
  <rect x="60" y="50" width="160" height="32" rx="16" fill="#22c55e" opacity="0.15"/>
  <text x="140" y="72" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="1.5">ETF UPDATE</text>

  <!-- degen0x logo text -->
  <text x="1140" y="72" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366f1" text-anchor="end" opacity="0.8">degen0x</text>

  <!-- Main headline -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Cardano Joins Hashdex</text>
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Nasdaq Crypto Index ETF</text>

  <!-- Subtitle -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">ADA joins BTC and XRP in the regulated Nasdaq-listed fund</text>

  <!-- Stat Cards Row -->
  <!-- Card 1: ADA -->
  <rect x="60" y="280" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="500">CARDANO (ADA)</text>
  <text x="80" y="350" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#0033AD">IN INDEX</text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e">✓ SEC commodity classified</text>

  <!-- Card 2: BTC -->
  <rect x="330" y="280" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="350" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="500">BITCOIN (BTC)</text>
  <text x="350" y="350" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#f59e0b">$67,900</text>
  <text x="350" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444">▼ -4.0% (24h)</text>

  <!-- Card 3: ETH -->
  <rect x="600" y="280" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="620" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="500">ETHEREUM (ETH)</text>
  <text x="620" y="350" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#06b6d4">$2,047</text>
  <text x="620" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444">▼ -4.0% (24h)</text>

  <!-- Card 4: F&G -->
  <rect x="870" y="280" width="270" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="890" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="500">FEAR &amp; GREED INDEX</text>
  <text x="890" y="350" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ef4444">13</text>
  <text x="935" y="350" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#ef4444" font-weight="500">Extreme Fear</text>
  <text x="890" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">48-day streak</text>

  <!-- Context section -->
  <rect x="60" y="430" width="520" height="130" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="465" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">What This Means</text>
  <text x="80" y="495" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">• ADA is now in a regulated US ETF alongside BTC &amp; XRP</text>
  <text x="80" y="520" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">• 16 cryptos SEC-classified as commodities (Mar 17)</text>
  <text x="80" y="545" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">• Institutional pipeline building through extreme fear</text>

  <!-- Fear gauge bar -->
  <rect x="620" y="440" width="520" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="620" y="440" width="68" height="8" rx="4" fill="#ef4444"/>
  <text x="620" y="470" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ef4444">EXTREME FEAR</text>
  <text x="1140" y="470" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e" text-anchor="end">EXTREME GREED</text>

  <!-- CTA -->
  <text x="620" y="510" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6366f1" font-weight="600">Full ETF Guide →</text>
  <text x="620" y="535" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">degen0x.com/learn/crypto-etfs-complete-guide</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Mar 27, 2026 • Free crypto tools, guides &amp; reviews</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
