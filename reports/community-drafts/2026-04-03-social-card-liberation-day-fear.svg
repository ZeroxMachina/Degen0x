<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="gaugeClip">
      <path d="M 280 340 A 120 120 0 0 1 520 340"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(500,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,100)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,200)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,400)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,500)"/>
  </g>

  <!-- Left Panel: Liberation Day Anniversary -->
  <g transform="translate(40, 40)">
    <!-- Section label -->
    <text x="20" y="32" fill="#f59e0b" font-family="Inter, sans-serif" font-size="13" font-weight="700" letter-spacing="2">LIBERATION DAY +1 YEAR</text>

    <!-- Title -->
    <text x="20" y="80" fill="url(#brandGrad)" font-family="Inter, sans-serif" font-size="36" font-weight="900" letter-spacing="-0.5">Tariffs vs Crypto</text>
    <text x="20" y="115" fill="#e6edf3" font-family="Inter, sans-serif" font-size="22" font-weight="600">One Year Later</text>

    <!-- Fear Gauge Arc -->
    <g transform="translate(120, 200)">
      <!-- Background arc -->
      <path d="M -90 0 A 90 90 0 0 1 90 0" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="18" stroke-linecap="round"/>
      <!-- Fear arc (9/100 = ~9% of semicircle) -->
      <path d="M -90 0 A 90 90 0 0 1 -83 -28" fill="none" stroke="url(#fearGrad)" stroke-width="18" stroke-linecap="round" filter="url(#glow)"/>
      <!-- Center text -->
      <text x="0" y="-20" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="48" font-weight="900">9</text>
      <text x="0" y="5" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="14" font-weight="600">EXTREME FEAR</text>
    </g>

    <!-- Key stats -->
    <g transform="translate(280, 165)">
      <!-- Glass card -->
      <rect x="0" y="0" width="240" height="55" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="15" y="22" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600">BTC PRICE</text>
      <text x="15" y="43" fill="#e6edf3" font-family="Inter, sans-serif" font-size="20" font-weight="800">$66,868</text>
      <text x="165" y="43" fill="#ef4444" font-family="Inter, sans-serif" font-size="14" font-weight="600">-0.82%</text>
    </g>
    <g transform="translate(280, 230)">
      <rect x="0" y="0" width="240" height="55" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="15" y="22" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600">MARKET CAP</text>
      <text x="15" y="43" fill="#e6edf3" font-family="Inter, sans-serif" font-size="20" font-weight="800">$2.38T</text>
      <text x="165" y="43" fill="#ef4444" font-family="Inter, sans-serif" font-size="14" font-weight="600">-2.4%</text>
    </g>
    <g transform="translate(280, 295)">
      <rect x="0" y="0" width="240" height="55" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="15" y="22" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" font-weight="600">STABLECOINS</text>
      <text x="15" y="43" fill="#22c55e" font-family="Inter, sans-serif" font-size="20" font-weight="800">$316B ATH</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="580" y1="60" x2="580" y2="570" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Right Panel: Historical Returns -->
  <g transform="translate(620, 40)">
    <text x="20" y="32" fill="#4ade80" font-family="Inter, sans-serif" font-size="13" font-weight="700" letter-spacing="2">SUB-15 F&amp;G HISTORICAL RETURNS</text>
    <text x="20" y="70" fill="#e6edf3" font-family="Inter, sans-serif" font-size="24" font-weight="800">Fear Always Fades</text>
    <text x="20" y="95" fill="#8b949e" font-family="Inter, sans-serif" font-size="14">Median returns after sustained extreme fear since 2018</text>

    <!-- Return cards -->
    <g transform="translate(20, 120)">
      <rect x="0" y="0" width="160" height="100" rx="16" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
      <text x="80" y="30" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="12" font-weight="600">30-DAY</text>
      <text x="80" y="65" text-anchor="middle" fill="#4ade80" font-family="Inter, sans-serif" font-size="36" font-weight="900">+18%</text>
      <text x="80" y="88" text-anchor="middle" fill="#6e7681" font-family="Inter, sans-serif" font-size="11">median return</text>
    </g>
    <g transform="translate(195, 120)">
      <rect x="0" y="0" width="160" height="100" rx="16" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
      <text x="80" y="30" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="12" font-weight="600">90-DAY</text>
      <text x="80" y="65" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="36" font-weight="900">+72%</text>
      <text x="80" y="88" text-anchor="middle" fill="#6e7681" font-family="Inter, sans-serif" font-size="11">median return</text>
    </g>
    <g transform="translate(370, 120)">
      <rect x="0" y="0" width="160" height="100" rx="16" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
      <text x="80" y="30" text-anchor="middle" fill="#8b949e" font-family="Inter, sans-serif" font-size="12" font-weight="600">180-DAY</text>
      <text x="80" y="65" text-anchor="middle" fill="#16a34a" font-family="Inter, sans-serif" font-size="36" font-weight="900">+114%</text>
      <text x="80" y="88" text-anchor="middle" fill="#6e7681" font-family="Inter, sans-serif" font-size="11">median return</text>
    </g>

    <!-- Context pills -->
    <g transform="translate(20, 250)">
      <rect x="0" y="0" width="120" height="30" rx="15" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
      <text x="60" y="20" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="11" font-weight="600">F&amp;G: 9/100</text>
    </g>
    <g transform="translate(130, 250)">
      <rect x="0" y="0" width="155" height="30" rx="15" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
      <text x="78" y="20" text-anchor="middle" fill="#f59e0b" font-family="Inter, sans-serif" font-size="11" font-weight="600">Liberation Day +1yr</text>
    </g>
    <g transform="translate(295, 250)">
      <rect x="0" y="0" width="130" height="30" rx="15" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-size="11" font-weight="600">IBIT $8.4B Q1</text>
    </g>
    <g transform="translate(435, 250)">
      <rect x="0" y="0" width="120" height="30" rx="15" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
      <text x="60" y="20" text-anchor="middle" fill="#8b5cf6" font-family="Inter, sans-serif" font-size="11" font-weight="600">CLARITY Act</text>
    </g>

    <!-- Insight box -->
    <g transform="translate(20, 300)">
      <rect x="0" y="0" width="530" height="75" rx="14" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
      <text x="20" y="25" fill="#a5b4fc" font-family="Inter, sans-serif" font-size="12" font-weight="700">INSIGHT</text>
      <text x="20" y="46" fill="#c4b5fd" font-family="Inter, sans-serif" font-size="13">Every sustained sub-15 F&amp;G window since 2018 preceded significant</text>
      <text x="20" y="64" fill="#c4b5fd" font-family="Inter, sans-serif" font-size="13">recovery. $316B stablecoin ATH = dry powder waiting on the sidelines.</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="40" y="616" fill="url(#brandGrad)" font-family="Inter, sans-serif" font-size="16" font-weight="800">degen0x</text>
  <text x="125" y="616" fill="#6e7681" font-family="Inter, sans-serif" font-size="13">degen0x.com/tools/fear-greed-index</text>
  <text x="1160" y="616" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="12">April 3, 2026</text>
</svg>
