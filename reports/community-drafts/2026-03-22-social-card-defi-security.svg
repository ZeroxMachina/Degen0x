<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="40" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative glow -->
  <circle cx="900" cy="300" r="250" fill="#ef4444" opacity="0.04" filter="url(#softGlow2)"/>
  <circle cx="300" cy="200" r="200" fill="#6366f1" opacity="0.05" filter="url(#softGlow2)"/>

  <!-- Glass card -->
  <rect x="60" y="80" width="1080" height="470" rx="24" ry="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Logo -->
  <circle cx="120" cy="140" r="24" fill="#4f46e5" opacity="0.8"/>
  <text x="118" y="147" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#e6edf3" text-anchor="middle">0x</text>
  <text x="158" y="147" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Category badge -->
  <rect x="100" y="180" width="80" height="28" rx="14" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="140" y="199" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">GUIDE</text>

  <!-- Shield icon (right side) -->
  <g transform="translate(900, 180)" filter="url(#glow2)">
    <path d="M50 0 L100 25 L100 65 C100 100 75 125 50 140 C25 125 0 100 0 65 L0 25 Z" fill="url(#shieldGrad)" opacity="0.3"/>
    <path d="M50 10 L90 30 L90 62 C90 90 70 112 50 125 C30 112 10 90 10 62 L10 30 Z" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
    <!-- Checkmark inside shield -->
    <path d="M35 65 L48 78 L70 50" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="100" y="260" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#e6edf3">DeFi Security:</text>
  <text x="100" y="320" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#e6edf3">Protect Your Crypto</text>
  <text x="100" y="370" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#8b949e">in 2026</text>

  <!-- Key topics row -->
  <g transform="translate(100, 410)">
    <rect x="0" y="0" width="200" height="44" rx="10" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
    <text x="100" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Smart Contract Audits</text>

    <rect x="216" y="0" width="200" height="44" rx="10" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <text x="316" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1" text-anchor="middle">Hardware Wallets</text>

    <rect x="432" y="0" width="200" height="44" rx="10" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
    <text x="532" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" text-anchor="middle">Phishing Defense</text>

    <rect x="648" y="0" width="200" height="44" rx="10" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
    <text x="748" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Multi-Sig Setup</text>
  </g>

  <!-- Stat callout -->
  <text x="100" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6e7681">$1.7B lost to DeFi exploits in 2025 — don't be next.</text>

  <!-- Bottom URL bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="578" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="600" y="610" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1" text-anchor="middle">degen0x.com/blog/defi-security-protect-crypto-2026</text>
</svg>
