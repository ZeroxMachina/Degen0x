<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative -->
  <circle cx="600" cy="280" r="300" fill="#ef4444" opacity="0.03"/>
  <circle cx="600" cy="280" r="180" fill="#ef4444" opacity="0.04"/>

  <!-- Logo -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#818cf8">degen0x</text>

  <!-- Big number -->
  <text x="600" y="230" font-family="Inter, system-ui, sans-serif" font-size="180" font-weight="900" fill="url(#fearGrad)" text-anchor="middle" opacity="0.9">8</text>
  <text x="600" y="280" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#ef4444" text-anchor="middle" letter-spacing="0.15em">EXTREME FEAR</text>
  <text x="600" y="320" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Day 47 of the streak. Longest since June 2022.</text>

  <!-- Historical comparison boxes -->
  <rect x="120" y="380" width="440" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="140" y="412" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">LAST COMPARABLE PERIOD</text>
  <text x="140" y="442" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#e6edf3">Jan 2019 — BTC at $3,400</text>
  <text x="140" y="462" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#22c55e">Rally followed: +300% in 12 months</text>

  <rect x="640" y="380" width="440" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="660" y="412" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">PREVIOUS COMPARABLE</text>
  <text x="660" y="442" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#e6edf3">Jun 2022 — BTC at $17,600</text>
  <text x="660" y="462" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#22c55e">Rally followed: +350% in 18 months</text>

  <!-- Tagline -->
  <text x="600" y="530" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#6e7681" text-anchor="middle">History doesn't repeat, but it rhymes with a vengeance.</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="560" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="602" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#818cf8">degen0x.com/tools/fear-greed-timeline</text>
  <text x="1140" y="602" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681" text-anchor="end">March 23, 2026</text>
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent2)"/>
</svg>