<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0c1225"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Decorative orbs -->
  <circle cx="900" cy="200" r="250" fill="url(#purpleGlow)"/>
  <circle cx="300" cy="400" r="180" fill="url(#cyanGlow)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Logo -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Badge -->
  <rect x="60" y="90" width="120" height="30" rx="15" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="120" y="110" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">NEW GUIDE</text>

  <!-- Title -->
  <text x="60" y="180" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Know Your Agent (KYA)</text>
  <text x="60" y="230" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#8b949e">The identity standard for AI agents on-chain</text>

  <!-- KYA Architecture visual — 5 layer stack -->
  <rect x="60" y="280" width="520" height="280" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="85" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.06em">KYA 5-LAYER ARCHITECTURE</text>

  <!-- Layer bars -->
  <rect x="85" y="335" width="470" height="36" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="100" y="358" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8">Agent Identity</text>
  <text x="540" y="358" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="end">Digital Agent Passport (DAP)</text>

  <rect x="85" y="380" width="470" height="36" rx="8" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="100" y="403" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22d3ee">Authority Binding</text>
  <text x="540" y="403" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="end">Scope &amp; permission verification</text>

  <rect x="85" y="425" width="470" height="36" rx="8" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="100" y="448" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24">Runtime Controls</text>
  <text x="540" y="448" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="end">Transaction limits &amp; guardrails</text>

  <rect x="85" y="470" width="470" height="36" rx="8" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="100" y="493" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#4ade80">Audit Trail</text>
  <text x="540" y="493" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="end">Tamper-evident logging</text>

  <rect x="85" y="515" width="470" height="36" rx="8" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="100" y="538" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f87171">Revocation</text>
  <text x="540" y="538" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="end">Kill switch &amp; key rotation</text>

  <!-- Right side: Key stats -->
  <rect x="620" y="280" width="520" height="130" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="645" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.06em">WHY IT MATTERS IN 2026</text>

  <text x="645" y="355" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#06b6d4">40%</text>
  <text x="760" y="355" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">of enterprise apps will</text>
  <text x="760" y="378" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">embed AI agents (Gartner)</text>

  <!-- Key players card -->
  <rect x="620" y="430" width="520" height="130" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="645" y="465" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.06em">KEY PLAYERS</text>

  <text x="645" y="500" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">a16z crypto  ·  Crossmint  ·  Coinbase</text>
  <text x="645" y="525" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">Sumsub  ·  Skyfire  ·  Visa/Mastercard</text>
  <text x="645" y="548" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Identity verification for AI agents managing crypto wallets</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="616" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#6366f1">degen0x.com/learn/know-your-agent-kya-guide-2026</text>
  <text x="1140" y="616" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">Free crypto research</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent2)"/>
</svg>