    <linearGradient id="cardGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(34,197,94,0.15)"/>
      <stop offset="100%" stop-color="rgba(34,197,94,0.05)"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
