<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#0d1a2e"/>
      <stop offset="100%" style="stop-color:#080d1c"/>
    </linearGradient>
    <linearGradient id="defai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="ai-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Decorative glow orbs -->
  <circle cx="250" cy="200" r="200" fill="#6366f1" opacity="0.06" filter="url(#glow2)"/>
  <circle cx="950" cy="400" r="180" fill="#06b6d4" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="600" cy="100" r="150" fill="#f59e0b" opacity="0.03" filter="url(#glow2)"/>

  <!-- Network nodes pattern -->
  <g stroke="rgba(99,102,241,0.08)" stroke-width="1">
    <line x1="800" y1="80" x2="950" y2="150"/>
    <line x1="950" y1="150" x2="1050" y2="100"/>
    <line x1="950" y1="150" x2="900" y2="250"/>
    <line x1="900" y1="250" x2="1050" y2="280"/>
    <line x1="1050" y1="100" x2="1100" y2="200"/>
    <line x1="1100" y1="200" x2="1050" y2="280"/>
    <circle cx="800" cy="80" r="4" fill="rgba(99,102,241,0.2)"/>
    <circle cx="950" cy="150" r="5" fill="rgba(6,182,212,0.3)"/>
    <circle cx="1050" cy="100" r="4" fill="rgba(99,102,241,0.2)"/>
    <circle cx="900" cy="250" r="4" fill="rgba(245,158,11,0.2)"/>
    <circle cx="1050" cy="280" r="5" fill="rgba(6,182,212,0.2)"/>
    <circle cx="1100" cy="200" r="4" fill="rgba(99,102,241,0.15)"/>
  </g>

  <!-- Top bar accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#defai)"/>

  <!-- Badge -->
  <rect x="60" y="50" width="160" height="32" rx="16" fill="url(#ai-accent)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="140" y="71" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" text-anchor="middle" letter-spacing="1.5">GUIDE · 2026</text>

  <!-- Main title -->
  <text x="60" y="148" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">DefAI</text>
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="700" fill="url(#defai)" letter-spacing="-0.5">AI-Powered DeFi</text>
  <text x="60" y="258" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="700" fill="url(#defai)" letter-spacing="-0.5">Automation</text>

  <!-- Subtitle -->
  <text x="60" y="305" font-family="Inter, system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.55)" font-weight="400">Autonomous yield management, AI agents, and the agentic DeFi stack</text>

  <!-- Feature cards -->
  <g>
    <rect x="60" y="345" width="320" height="80" rx="10" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    <text x="85" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(99,102,241,0.8)" font-weight="600" letter-spacing="1">PANCAKESWAP</text>
    <text x="85" y="405" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.8)">AI Skills</text>
    <text x="230" y="405" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">Auto LP mgmt</text>
  </g>
  <g>
    <rect x="400" y="345" width="320" height="80" rx="10" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
    <text x="425" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(6,182,212,0.8)" font-weight="600" letter-spacing="1">UNISWAP</text>
    <text x="425" y="405" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.8)">Agent Tools</text>
    <text x="575" y="405" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">Intent swaps</text>
  </g>
  <g>
    <rect x="740" y="345" width="320" height="80" rx="10" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
    <text x="765" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(245,158,11,0.8)" font-weight="600" letter-spacing="1">AUTONOMOUS</text>
    <text x="765" y="405" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.8)">Yield Agents</text>
    <text x="915" y="405" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">Cross-chain</text>
  </g>

  <!-- Stats row -->
  <text x="60" y="480" font-family="Inter, system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.4)">
    <tspan>40% enterprise apps embed AI agents by 2026</tspan>
    <tspan dx="30" fill="rgba(255,255,255,0.15)">·</tspan>
    <tspan dx="30">3,500 words</tspan>
    <tspan dx="30" fill="rgba(255,255,255,0.15)">·</tspan>
    <tspan dx="30">14 min read</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="100" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="500" letter-spacing="0.5">degen0x.com</text>
  <text x="60" y="600" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.25)">/learn/defai-ai-powered-defi-automation-guide-2026</text>

  <!-- Market context -->
  <text x="1140" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="end">$ETH $2,133 · F&amp;G 8</text>
  <text x="1140" y="600" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.2)" text-anchor="end">April 2026</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#defai)"/>
</svg>
