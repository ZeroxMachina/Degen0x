<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="brandGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#goldGrad)"/>
  <!-- Decorative -->
  <circle cx="1050" cy="300" r="200" fill="#f59e0b" opacity="0.03" filter="url(#glow3)"/>
  <!-- Logo -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>
  <!-- Big number -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="130" font-weight="900" fill="url(#goldGrad)" letter-spacing="-0.04em">20,000,000</text>
  <!-- Title -->
  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Bitcoin in Circulation</text>
  <!-- Subtitle -->
  <text x="60" y="350" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">Only ~1,000,000 BTC left to mine. Over the next 114 years.</text>
  <!-- Supply bar -->
  <rect x="60" y="400" width="1080" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
  <rect x="60" y="400" width="1029" height="24" rx="12" fill="url(#goldGrad)" opacity="0.8"/>
  <text x="1060" y="418" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3" text-anchor="end">95.24%</text>
  <text x="80" y="418" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#080d1c">MINED</text>
  <!-- Stats row -->
  <rect x="60" y="455" width="340" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="485" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">MICROSTRATEGY HOLDS</text>
  <text x="80" y="517" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#f59e0b">762,099 BTC (3.6%)</text>

  <rect x="430" y="455" width="340" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="450" y="485" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">BTC ETF TOTAL AUM</text>
  <text x="450" y="517" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#22c55e">$128 Billion</text>

  <rect x="800" y="455" width="340" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="820" y="485" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">NEXT HALVING BLOCK REWARD</text>
  <text x="820" y="517" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#06b6d4">1.5625 BTC</text>

  <!-- Bottom -->
  <rect y="610" width="1200" height="20" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="580" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">21M hard cap. No exceptions. No changes. Ever.</text>
  <text x="1140" y="624" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">degen0x.com</text>
</svg>
