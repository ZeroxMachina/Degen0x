<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="150" r="180" fill="#ef4444" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="120" fill="#f59e0b" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Glass card background -->
  <rect x="60" y="80" width="1080" height="470" rx="20" ry="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- degen0x logo text -->
  <text x="100" y="130" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#brandGrad)" letter-spacing="0.05em">degen0x</text>

  <!-- FEAR & GREED GAUGE -->
  <!-- Gauge background arc -->
  <g transform="translate(920, 280)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
    <!-- Fear arc (red portion ~90% of circle for score 10) -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#fearGrad)" stroke-width="12" stroke-dasharray="565.5 628" stroke-dashoffset="0" transform="rotate(-90)" opacity="0.8"/>
    <!-- Score -->
    <text x="0" y="-10" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="#ef4444" text-anchor="middle" filter="url(#glow)">10</text>
    <text x="0" y="25" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle" letter-spacing="0.15em" text-transform="uppercase">EXTREME FEAR</text>
    <text x="0" y="50" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">Fear &amp; Greed Index</text>
  </g>

  <!-- Main title -->
  <text x="100" y="200" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">
    <tspan>Extreme Fear Has Been</tspan>
  </text>
  <text x="100" y="260" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="url(#fearGrad)" letter-spacing="-0.02em">
    <tspan>The Best Buy Signal</tspan>
  </text>

  <!-- Subtitle -->
  <text x="100" y="305" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Every sub-15 reading this cycle preceded a major rally within 2-4 weeks</text>

  <!-- Historical data points -->
  <!-- Data row 1 -->
  <rect x="100" y="340" width="680" height="40" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="120" y="366" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Jun 2025</text>
  <text x="230" y="366" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">$58K</text>
  <text x="300" y="366" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="330" y="366" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">$89K</text>
  <text x="680" y="366" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="end">+53%</text>
  <!-- Green bar fill -->
  <rect x="500" y="352" width="120" height="16" rx="4" fill="rgba(34,197,94,0.2)"/>
  <rect x="500" y="352" width="106" height="16" rx="4" fill="#22c55e" opacity="0.6"/>

  <!-- Data row 2 -->
  <rect x="100" y="390" width="680" height="40" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="120" y="416" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Sep 2025</text>
  <text x="230" y="416" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">$72K</text>
  <text x="300" y="416" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="330" y="416" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">$126K ATH</text>
  <text x="680" y="416" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="end">+75%</text>
  <rect x="500" y="402" width="120" height="16" rx="4" fill="rgba(34,197,94,0.2)"/>
  <rect x="500" y="402" width="120" height="16" rx="4" fill="#22c55e" opacity="0.6"/>

  <!-- Data row 3 -->
  <rect x="100" y="440" width="680" height="40" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="120" y="466" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Jan 2026</text>
  <text x="230" y="466" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">$64K</text>
  <text x="300" y="466" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="330" y="466" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">$76K</text>
  <text x="680" y="466" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="end">+19%</text>
  <rect x="500" y="452" width="120" height="16" rx="4" fill="rgba(34,197,94,0.2)"/>
  <rect x="500" y="452" width="38" height="16" rx="4" fill="#22c55e" opacity="0.6"/>

  <!-- NOW indicator -->
  <rect x="100" y="495" width="680" height="40" rx="8" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width="1.5"/>
  <text x="120" y="521" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444">NOW</text>
  <text x="230" y="521" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">$69K</text>
  <text x="300" y="521" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="330" y="521" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#f59e0b">???</text>
  <text x="680" y="521" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="end">F&amp;G: 10</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="100" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">degen0x.com/tools/fear-greed-timeline</text>
  <text x="1100" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">degen0x.com</text>
</svg>