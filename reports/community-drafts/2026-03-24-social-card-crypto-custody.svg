    <path d="M-8 0 L-8 -10 C-8 -18 8 -18 8 -10 L8 0" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="0" cy="10" r="3" fill="#6366f1"/>
  </g>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#6366f1" stroke-width="0.5"/>
