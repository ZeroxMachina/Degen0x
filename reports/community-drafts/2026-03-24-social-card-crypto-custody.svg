  <!-- Box 1: Market Size -->
  <rect x="60" y="300" width="230" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="175" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#6366f1" text-anchor="middle" filter="url(#glow)">$3.69B</text>
  <text x="175" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Custody Market 2026</text>

  <!-- Box 2: Top Providers -->
  <rect x="310" y="300" width="230" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="425" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4" text-anchor="middle" filter="url(#glow)">5 Providers</text>
  <text x="425" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Head-to-Head Compared</text>

  <!-- Box 3: Strategy -->
  <rect x="560" y="300" width="230" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="675" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#f59e0b" text-anchor="middle" filter="url(#glow)">3-Tier</text>
  <text x="675" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Custody Strategy Builder</text>

  <!-- Comparison visual: MPC / Multisig / Cold -->
  <g transform="translate(60, 420)">
    <rect width="170" height="50" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="85" y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#818cf8" text-anchor="middle">MPC Wallets</text>
  </g>
  <g transform="translate(250, 420)">
    <rect width="170" height="50" rx="8" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
    <text x="85" y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22d3ee" text-anchor="middle">Multisig</text>
  </g>
  <g transform="translate(440, 420)">
    <rect width="170" height="50" rx="8" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="85" y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">Cold Storage</text>
  </g>

  <!-- Connecting lines -->
  <line x1="230" y1="445" x2="250" y2="445" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="420" y1="445" x2="440" y2="445" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="560" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- degen0x branding -->
  <text x="60" y="602" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#6366f1" letter-spacing="-0.02em">degen</text>
  <text x="138" y="602" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#8b949e" letter-spacing="-0.02em">0x</text>
  <text x="170" y="602" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681">.com</text>

  <!-- URL -->
  <text x="1140" y="600" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">degen0x.com/learn/crypto-custody-guide-2026</text>
