<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Decorative background elements -->
  <circle cx="950" cy="200" r="180" fill="#6366f1" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="120" fill="#06b6d4" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Shield pattern background -->
  <path d="M900 80 L960 110 L960 170 C960 220 930 260 900 280 C870 260 840 220 840 170 L840 110 Z" fill="url(#shieldGrad)" stroke="rgba(99,102,241,0.2)" stroke-width="1.5"/>
  <path d="M1020 180 L1060 200 L1060 240 C1060 270 1040 295 1020 310 C1000 295 980 270 980 240 L980 200 Z" fill="url(#shieldGrad)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
  <path d="M850 350 L880 365 L880 395 C880 415 865 435 850 445 C835 435 820 415 820 395 L820 365 Z" fill="url(#shieldGrad)" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>

