<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a1a1a"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="solGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="50%" stop-color="#14F195"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent3)"/>

  <!-- Solana glow -->
  <circle cx="900" cy="180" r="200" fill="#9945FF" opacity="0.04" filter="url(#glow3)"/>
  <circle cx="300" cy="400" r="180" fill="#14F195" opacity="0.03" filter="url(#glow3)"/>

  <!-- Logo -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="0.1em">DEGEN0X</text>
  <text x="160" y="60" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">NETWORK MILESTONE</text>

  <!-- Main Title -->
  <text x="60" y="150" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Solana: 10.1 Billion</text>
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#solGrad)" letter-spacing="-0.02em">Q1 Transactions</text>
  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">First blockchain to cross 10B transactions in a single quarter</text>

  <!-- Stat Cards -->
  <!-- Q1 Transactions -->
  <rect x="60" y="290" width="260" height="120" rx="16" fill="rgba(20,241,149,0.08)" stroke="rgba(20,241,149,0.2)" stroke-width="1"/>
  <text x="85" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#14F195" font-weight="600">Q1 2026 TRANSACTIONS</text>
  <text x="85" y="380" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#14F195">10.1B</text>

  <!-- Active Users -->
  <rect x="350" y="290" width="260" height="120" rx="16" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="375" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#06b6d4" font-weight="600">ACTIVE USERS</text>
  <text x="375" y="380" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#06b6d4">2.4M</text>

  <!-- SOL Price Impact -->
  <rect x="640" y="290" width="260" height="120" rx="16" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="665" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ef4444" font-weight="600">SOL WEEKLY (DRIFT)</text>
  <text x="665" y="380" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#ef4444">-13%</text>

  <!-- Narrative -->
  <rect x="930" y="290" width="220" height="120" rx="16" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="955" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f59e0b" font-weight="600">THE STORY</text>
  <text x="955" y="360" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f59e0b">Usage ≠ Price</text>
  <text x="955" y="390" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">At least not yet</text>

  <!-- Usage vs Price Divergence Visual -->
  <rect x="60" y="440" width="1090" height="120" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="85" y="475" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" font-weight="600">Q1 2026 HIGHLIGHTS</text>

  <!-- Highlight items -->
  <circle cx="100" cy="510" r="6" fill="#14F195"/>
  <text x="115" y="515" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Record DeFi volume across Jupiter, Raydium, Orca</text>

  <circle cx="100" cy="540" r="6" fill="#06b6d4"/>
  <text x="115" y="545" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">BitGo institutional lending platform launched on Solana</text>

  <circle cx="600" cy="510" r="6" fill="#ef4444"/>
  <text x="615" y="515" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Drift exploit: $270M — largest Solana DeFi hack ever</text>

  <circle cx="600" cy="540" r="6" fill="#9945FF"/>
  <text x="615" y="545" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Firedancer validator client gaining mainnet traction</text>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">degen0x.com/learn/solana-defi-ecosystem-guide-2026</text>
  <text x="1060" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" font-weight="600">degen0x</text>
</svg>