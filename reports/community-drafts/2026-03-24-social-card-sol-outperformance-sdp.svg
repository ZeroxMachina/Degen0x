<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f0a20"/>
    </linearGradient>
    <linearGradient id="solGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="50%" style="stop-color:#14F195"/>
      <stop offset="100%" style="stop-color:#00C2FF"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#solGrad)"/>

  <!-- Decorative -->
  <circle cx="1000" cy="150" r="200" fill="rgba(153,69,255,0.06)" />
  <circle cx="200" cy="480" r="160" fill="rgba(20,241,149,0.04)" />

  <!-- Badge -->
  <rect x="60" y="50" width="260" height="32" rx="16" fill="rgba(153,69,255,0.15)" stroke="rgba(153,69,255,0.3)" stroke-width="1"/>
  <text x="190" y="71" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#14F195" text-anchor="middle" letter-spacing="0.08em">SOLANA DEVELOPER PLATFORM</text>

  <!-- Main title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">SOL +6.48% — Best of Top 10.</text>
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">SDP Launch Day.</text>

  <!-- Subtitle -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Mastercard. Western Union. Worldpay. Building on Solana — production, not pilots.</text>

  <!-- Partner cards row -->
  <rect x="60" y="270" width="340" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(153,69,255,0.2)" stroke-width="1"/>
  <text x="230" y="302" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">Mastercard</text>
  <text x="230" y="330" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Stablecoin Settlement</text>

  <rect x="420" y="270" width="340" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(20,241,149,0.2)" stroke-width="1"/>
  <text x="590" y="302" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">Western Union</text>
  <text x="590" y="330" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Cross-Border Payments</text>

  <rect x="780" y="270" width="340" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(0,194,255,0.2)" stroke-width="1"/>
  <text x="950" y="302" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">Worldpay</text>
  <text x="950" y="330" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Merchant Settlement</text>

  <!-- Stats row -->
  <rect x="60" y="375" width="215" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="167" y="405" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">SOL STABLECOIN</text>
  <text x="167" y="440" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#14F195" text-anchor="middle">$15.7B ATH</text>

  <rect x="295" y="375" width="215" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="402" y="405" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">MONTHLY TX VOL</text>
  <text x="402" y="440" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#e6edf3" text-anchor="middle">$650B</text>

  <rect x="530" y="375" width="215" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="637" y="405" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">INFRA PARTNERS</text>
  <text x="637" y="440" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#e6edf3" text-anchor="middle">20+</text>

  <rect x="765" y="375" width="215" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="872" y="405" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">SEC STATUS</text>
  <text x="872" y="440" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#22c55e" text-anchor="middle">Commodity</text>

  <rect x="1000" y="375" width="140" height="85" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1070" y="405" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">SOL PRICE</text>
  <text x="1070" y="440" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#14F195" text-anchor="middle">~$90</text>

  <!-- Modules panel -->
  <rect x="60" y="485" width="1080" height="55" rx="12" fill="rgba(153,69,255,0.08)" stroke="rgba(153,69,255,0.2)" stroke-width="1"/>
  <text x="600" y="518" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3" text-anchor="middle">SDP Modules: Issuance (live) • Payments (live) • Trading (Q4 2026) | AI: Claude Code + Codex integrated</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="607" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.6)">degen0x.com</text>
  <text x="1140" y="607" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="end">March 24, 2026</text>
