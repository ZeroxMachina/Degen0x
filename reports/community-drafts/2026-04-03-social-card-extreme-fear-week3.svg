<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="fearMeter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="9%" style="stop-color:#ef4444"/>
      <stop offset="9%" style="stop-color:#30363d"/>
      <stop offset="100%" style="stop-color:#30363d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent3)"/>

  <!-- Red glow for fear theme -->
  <circle cx="600" cy="300" r="350" fill="url(#redGlow)"/>

  <!-- Glass card -->
  <rect x="60" y="80" width="1080" height="460" rx="20" ry="20"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Logo -->
  <text x="100" y="130" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.1em">DEGEN0X</text>

  <!-- Badge -->
  <rect x="100" y="150" width="180" height="32" rx="16" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="190" y="172" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">EXTREME FEAR</text>

  <!-- Giant F&G number -->
  <text x="900" y="280" font-family="Inter, system-ui, sans-serif" font-size="180" font-weight="900" fill="rgba(239,68,68,0.15)" text-anchor="middle">9</text>
  <text x="900" y="280" font-family="Inter, system-ui, sans-serif" font-size="180" font-weight="900" fill="#ef4444" text-anchor="middle" opacity="0.6">9</text>

  <!-- Main title -->
  <text x="100" y="230" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Extreme Fear</text>
  <text x="100" y="290" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#ef4444" letter-spacing="-0.02em">Week 3</text>

  <!-- Subtitle -->
  <text x="100" y="335" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Longest sub-10 F&amp;G stretch since Terra-Luna (June 2022)</text>

  <!-- Fear & Greed meter bar -->
  <rect x="100" y="370" width="700" height="12" rx="6" fill="#30363d"/>
  <rect x="100" y="370" width="63" height="12" rx="6" fill="#ef4444"/>
  <circle cx="163" cy="376" r="8" fill="#ef4444" stroke="#080d1c" stroke-width="2"/>

  <!-- Market data row -->
  <rect x="100" y="410" width="220" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="120" y="440" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">BITCOIN</text>
  <text x="120" y="470" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#e6edf3">$66,650</text>
  <text x="280" y="470" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">-0.82%</text>

  <rect x="340" y="410" width="220" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="360" y="440" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">ETHEREUM</text>
  <text x="360" y="470" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#e6edf3">$2,057</text>
  <text x="500" y="470" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">-3.8%</text>

  <rect x="580" y="410" width="220" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="600" y="440" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">STABLECOINS</text>
  <text x="600" y="470" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#22c55e">$316B</text>
  <text x="730" y="470" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">ATH</text>

  <!-- Bullish callout -->
  <rect x="820" y="410" width="280" height="80" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="840" y="440" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">DEGEN0X PAGES LIVE</text>
  <text x="840" y="470" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#22c55e">652</text>
  <text x="910" y="470" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">+5 this cycle</text>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="rgba(0,0,0,0.3)"/>
  <text x="100" y="598" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#8b949e">degen0x.com/tools/fear-greed-index</text>
  <text x="1100" y="598" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">Free tools. No signup. Just alpha.</text>
</svg>
