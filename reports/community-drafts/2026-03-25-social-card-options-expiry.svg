<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#110d1c"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="amber-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative -->
  <circle cx="1000" cy="200" r="200" fill="url(#amber-glow)"/>
  <circle cx="200" cy="450" r="150" fill="url(#red-glow)"/>

  <!-- Logo -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#818cf8" letter-spacing="0.05em">DEGEN0X</text>

  <!-- Alert badge -->
  <rect x="60" y="75" width="180" height="32" rx="16" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="80" y="96" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">VOLATILITY ALERT</text>

  <!-- Main title -->
  <text x="60" y="170" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="#f59e0b" letter-spacing="-0.02em">$13.5B</text>
  <text x="60" y="230" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Options Expiry</text>
  <text x="60" y="270" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">Quarterly settlement on Deribit — Thursday March 27</text>

  <!-- What's expiring panel -->
  <rect x="60" y="300" width="520" height="180" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="332" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#8b949e" letter-spacing="0.05em">WHAT'S EXPIRING</text>

  <text x="85" y="365" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">BTC Futures + Options</text>
  <text x="440" y="365" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="end">~$9.2B</text>

  <line x1="85" y1="380" x2="530" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="85" y="405" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">ETH Futures + Options</text>
  <text x="440" y="405" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#0891b2" text-anchor="end">~$4.3B</text>

  <line x1="85" y1="420" x2="530" y2="420" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="85" y="445" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Total Notional</text>
  <text x="440" y="445" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#ef4444" text-anchor="end">$13.5B</text>

  <text x="85" y="470" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Quadruple witching: simultaneous futures + options settlement</text>

  <!-- Historical context panel -->
  <rect x="620" y="300" width="520" height="180" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="650" y="332" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#8b949e" letter-spacing="0.05em">POST-EXPIRY MOVES (LAST 3)</text>

  <text x="650" y="368" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Dec 2025 quarterly:</text>
  <text x="1000" y="368" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#22c55e" text-anchor="end">+12% in 48h</text>

  <text x="650" y="398" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Sep 2025 quarterly:</text>
  <text x="1000" y="398" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ef4444" text-anchor="end">-8% in 48h</text>

  <text x="650" y="428" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Jun 2025 quarterly:</text>
  <text x="1000" y="428" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#22c55e" text-anchor="end">+15% in 72h</text>

  <text x="650" y="465" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f59e0b">Avg post-expiry swing: 8–15%</text>

  <!-- Current conditions -->
  <rect x="60" y="500" width="350" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="528" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#e6edf3">BTC ~$70K</text>
  <text x="85" y="550" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Range-bound, pre-expiry compression</text>

  <rect x="430" y="500" width="350" height="65" rx="12" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="455" y="528" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#ef4444">F&amp;G: 11</text>
  <text x="455" y="550" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Day 51 Extreme Fear (all-time record)</text>

  <rect x="800" y="500" width="340" height="65" rx="12" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="825" y="528" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#f59e0b">2 DAYS</text>
  <text x="825" y="550" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Until settlement — Thu Mar 27</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="607" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#818cf8">degen0x.com</text>
  <text x="1140" y="607" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 25, 2026</text>
</svg>