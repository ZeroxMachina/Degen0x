<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="1200" y2="420" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="1200" y2="210" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="800" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="400" y2="630" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" />

  <!-- SEC badge -->
  <rect x="60" y="40" width="120" height="36" rx="18" fill="#ef4444" opacity="0.15" />
  <text x="120" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="2">BREAKING</text>

  <!-- Date -->
  <text x="200" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="1">MARCH 27, 2026</text>

  <!-- Main headline -->
  <text x="60" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">SEC ETF Mega-Ruling Day</text>

  <!-- Sub-headline numbers -->
  <text x="60" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" fill="#94a3b8">
    <tspan fill="url(#accent)" font-weight="700">91</tspan> Applications
    <tspan dx="20" fill="#4b5563">|</tspan>
    <tspan dx="20" fill="url(#accent)" font-weight="700">24</tspan> Tokens
    <tspan dx="20" fill="#4b5563">|</tspan>
    <tspan dx="20" fill="url(#accent)" font-weight="700">1</tspan> Deadline
  </text>

  <!-- Divider -->
  <rect x="60" y="220" width="200" height="2" fill="url(#accent)" opacity="0.5" />

  <!-- Token grid - Row 1 (pre-classified as commodities) -->
  <text x="60" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6366f1" font-weight="600" letter-spacing="2">PRE-CLASSIFIED AS COMMODITIES (MAR 17)</text>

  <!-- Token chips row 1 -->
  <g transform="translate(60, 280)">
    <rect x="0" y="0" width="64" height="30" rx="6" fill="#f59e0b" opacity="0.12" />
    <text x="32" y="20" font-family="monospace" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="700">BTC</text>

    <rect x="74" y="0" width="56" height="30" rx="6" fill="#627eea" opacity="0.12" />
    <text x="102" y="20" font-family="monospace" font-size="13" fill="#627eea" text-anchor="middle" font-weight="700">ETH</text>

    <rect x="140" y="0" width="56" height="30" rx="6" fill="#9945ff" opacity="0.12" />
    <text x="168" y="20" font-family="monospace" font-size="13" fill="#9945ff" text-anchor="middle" font-weight="700">SOL</text>

    <rect x="206" y="0" width="56" height="30" rx="6" fill="#00aaee" opacity="0.12" />
    <text x="234" y="20" font-family="monospace" font-size="13" fill="#00aaee" text-anchor="middle" font-weight="700">XRP</text>

    <rect x="272" y="0" width="52" height="30" rx="6" fill="#bfbbbb" opacity="0.12" />
    <text x="298" y="20" font-family="monospace" font-size="13" fill="#bfbbbb" text-anchor="middle" font-weight="700">LTC</text>

    <rect x="334" y="0" width="64" height="30" rx="6" fill="#c2a633" opacity="0.12" />
    <text x="366" y="20" font-family="monospace" font-size="13" fill="#c2a633" text-anchor="middle" font-weight="700">DOGE</text>

    <rect x="408" y="0" width="56" height="30" rx="6" fill="#0033ad" opacity="0.12" />
    <text x="436" y="20" font-family="monospace" font-size="13" fill="#3366ee" text-anchor="middle" font-weight="700">ADA</text>

    <rect x="474" y="0" width="60" height="30" rx="6" fill="#2a5ada" opacity="0.12" />
    <text x="504" y="20" font-family="monospace" font-size="13" fill="#2a5ada" text-anchor="middle" font-weight="700">LINK</text>

    <rect x="544" y="0" width="64" height="30" rx="6" fill="#e84142" opacity="0.12" />
    <text x="576" y="20" font-family="monospace" font-size="13" fill="#e84142" text-anchor="middle" font-weight="700">AVAX</text>

    <rect x="618" y="0" width="56" height="30" rx="6" fill="#e6007a" opacity="0.12" />
    <text x="646" y="20" font-family="monospace" font-size="13" fill="#e6007a" text-anchor="middle" font-weight="700">DOT</text>

    <rect x="684" y="0" width="60" height="30" rx="6" fill="#00aaff" opacity="0.12" />
    <text x="714" y="20" font-family="monospace" font-size="13" fill="#00aaff" text-anchor="middle" font-weight="700">HBAR</text>

    <rect x="754" y="0" width="56" height="30" rx="6" fill="#ffa409" opacity="0.12" />
    <text x="782" y="20" font-family="monospace" font-size="13" fill="#ffa409" text-anchor="middle" font-weight="700">SHIB</text>

    <text x="830" y="20" font-family="monospace" font-size="13" fill="#64748b">+4 more</text>
  </g>

  <!-- Stat cards row -->
  <g transform="translate(60, 340)">
    <!-- Card 1: BTC Price -->
    <rect x="0" y="0" width="250" height="100" rx="12" fill="#1e1e3f" stroke="#2d2d5e" stroke-width="1" />
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-weight="600" letter-spacing="1">BTC PRICE</text>
    <text x="20" y="62" font-family="system-ui, sans-serif" font-size="28" fill="#ffffff" font-weight="700">$66,587</text>
    <text x="20" y="84" font-family="system-ui, sans-serif" font-size="14" fill="#ef4444" font-weight="600">-4.1% today</text>

    <!-- Card 2: Fear & Greed -->
