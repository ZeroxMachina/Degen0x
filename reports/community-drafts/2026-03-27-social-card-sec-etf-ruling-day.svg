    <text x="290" y="30" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-weight="600" letter-spacing="1">FEAR &amp; GREED</text>
    <text x="290" y="62" font-family="system-ui, sans-serif" font-size="28" fill="#ef4444" font-weight="700">10</text>
    <text x="330" y="62" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" font-weight="400"> Extreme Fear</text>
    <text x="290" y="84" font-family="system-ui, sans-serif" font-size="14" fill="#f59e0b" font-weight="600">48-day streak</text>

    <!-- Card 3: XRP ETF Inflows -->
    <rect x="540" y="0" width="250" height="100" rx="12" fill="#1e1e3f" stroke="#2d2d5e" stroke-width="1" />
    <text x="560" y="30" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-weight="600" letter-spacing="1">XRP ETF PRE-INFLOWS</text>
    <text x="560" y="62" font-family="system-ui, sans-serif" font-size="28" fill="#22c55e" font-weight="700">$1.44B</text>
    <text x="560" y="84" font-family="system-ui, sans-serif" font-size="14" fill="#06b6d4" font-weight="600">Before decision</text>

    <!-- Card 4: Options Expired -->
    <rect x="810" y="0" width="250" height="100" rx="12" fill="#1e1e3f" stroke="#2d2d5e" stroke-width="1" />
    <text x="830" y="30" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-weight="600" letter-spacing="1">OPTIONS EXPIRED</text>
    <text x="830" y="62" font-family="system-ui, sans-serif" font-size="28" fill="#f59e0b" font-weight="700">$14.16B</text>
    <text x="830" y="84" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" font-weight="600">Largest Q1 2026</text>
  </g>

  <!-- Bottom section -->
  <rect x="60" y="470" width="1080" height="60" rx="10" fill="#22c55e" opacity="0.08" />
  <text x="100" y="506" font-family="system-ui, sans-serif" font-size="16" fill="#22c55e" font-weight="600">Full ETF Guide</text>
  <text x="260" y="506" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">degen0x.com/learn/crypto-etfs-complete-guide</text>

  <!-- Brand footer -->
  <text x="60" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff" opacity="0.9">degen0x</text>
  <text x="168" y="590" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">.com</text>

  <!-- Page count badge -->
  <rect x="1010" y="570" width="130" height="32" rx="16" fill="url(#greenAccent)" opacity="0.15" />
  <text x="1075" y="592" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="600">556 pages live</text>
</svg>
