<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative -->
  <circle cx="1000" cy="150" r="200" fill="rgba(34,197,94,0.03)"/>

  <!-- Logo -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.1em">DEGEN0X</text>

  <!-- Badge -->
  <rect x="160" y="38" width="160" height="24" rx="12" fill="rgba(34,197,94,0.15)"/>
  <text x="240" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">INSTITUTIONAL FLOW</text>

  <!-- Headline -->
  <text x="60" y="130" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">$2.5 Billion in ETF Inflows</text>
  <text x="60" y="185" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#22c55e" letter-spacing="-0.01em" filter="url(#glow2)">Longest Weekly Streak of 2026</text>

  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Wall Street is buying the fear. Here's the data.</text>

  <!-- Inflow visualization bars -->
  <text x="60" y="280" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">7-DAY INFLOW STREAK</text>

  <!-- Day bars -->
  <rect x="60" y="295" width="140" height="24" rx="4" fill="url(#greenBar)" opacity="0.6"/>
  <text x="70" y="312" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Day 1: $142M</text>

  <rect x="60" y="325" width="170" height="24" rx="4" fill="url(#greenBar)" opacity="0.7"/>
  <text x="70" y="342" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Day 2: $178M</text>

  <rect x="60" y="355" width="195" height="24" rx="4" fill="url(#greenBar)" opacity="0.75"/>
  <text x="70" y="372" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Day 3: $199M</text>

  <rect x="60" y="385" width="160" height="24" rx="4" fill="url(#greenBar)" opacity="0.7"/>
  <text x="70" y="402" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Day 4: $165M</text>

  <rect x="60" y="415" width="185" height="24" rx="4" fill="url(#greenBar)" opacity="0.75"/>
  <text x="70" y="432" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Day 5: $189M</text>

  <rect x="60" y="445" width="210" height="24" rx="4" fill="url(#greenBar)" opacity="0.8"/>
  <text x="70" y="462" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Day 6: $215M</text>

  <rect x="60" y="475" width="230" height="24" rx="4" fill="url(#greenBar)" opacity="0.9"/>
  <text x="70" y="492" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Day 7: $237M</text>

  <!-- Right side: Key stats cards -->
  <rect x="620" y="270" width="530" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="650" y="305" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">KEY PLAYERS</text>
  <text x="650" y="335" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Morgan Stanley filed MSBT — first bank spot BTC ETF</text>
  <text x="650" y="360" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">BlackRock IBIT — continued growth leader</text>

  <rect x="620" y="400" width="530" height="110" rx="16" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.12)" stroke-width="1"/>
  <text x="650" y="435" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">YTD REVERSAL</text>
  <text x="650" y="470" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e" filter="url(#glow2)">+$210M net positive</text>
  <text x="650" y="495" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Flipped from outflows to accumulation in March</text>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="598" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#accent2)">degen0x.com</text>
  <text x="340" y="598" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Free crypto tools & research — no signup required</text>
  <rect x="1020" y="570" width="130" height="36" rx="18" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="1085" y="594" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">$2.5B March</text>
</svg>
