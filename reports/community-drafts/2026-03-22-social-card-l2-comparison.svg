<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="softGlow3">
      <feGaussianBlur stdDeviation="40" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent3)"/>

  <!-- Glow effects -->
  <circle cx="250" cy="350" r="200" fill="#2563eb" opacity="0.05" filter="url(#softGlow3)"/>
  <circle cx="600" cy="350" r="200" fill="#6366f1" opacity="0.05" filter="url(#softGlow3)"/>
  <circle cx="950" cy="350" r="200" fill="#8b5cf6" opacity="0.05" filter="url(#softGlow3)"/>

  <!-- Glass card -->
  <rect x="60" y="80" width="1080" height="470" rx="24" ry="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Logo -->
  <circle cx="120" cy="140" r="24" fill="#4f46e5" opacity="0.8"/>
  <text x="118" y="147" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#e6edf3" text-anchor="middle">0x</text>
  <text x="158" y="147" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Title -->
  <text x="600" y="180" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#e6edf3" text-anchor="middle">Layer 2 Showdown</text>
  <text x="600" y="220" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#8b949e" text-anchor="middle">Which L2 should you use in 2026?</text>

  <!-- Three columns: Base, Arbitrum, zkSync -->
  <!-- Base -->
  <g transform="translate(100, 260)">
    <rect x="0" y="0" width="300" height="230" rx="16" fill="rgba(37,99,235,0.08)" stroke="rgba(37,99,235,0.25)" stroke-width="1"/>
    <circle cx="150" cy="45" r="24" fill="#2563eb" opacity="0.3"/>
    <text x="150" y="52" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#60a5fa" text-anchor="middle">B</text>
    <text x="150" y="90" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#60a5fa" text-anchor="middle">Base</text>
    <text x="150" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">by Coinbase</text>
    <text x="150" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">~$0.01 / tx</text>
    <text x="150" y="180" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Best retail onramp</text>
    <text x="150" y="205" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Social + memecoins</text>
  </g>

  <!-- Arbitrum -->
  <g transform="translate(440, 260)">
    <rect x="0" y="0" width="300" height="230" rx="16" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <circle cx="150" cy="45" r="24" fill="#6366f1" opacity="0.3"/>
    <text x="150" y="52" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#818cf8" text-anchor="middle">A</text>
    <text x="150" y="90" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#818cf8" text-anchor="middle">Arbitrum</text>
    <text x="150" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Nitro Stack</text>
    <text x="150" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">$18B+ TVL</text>
    <text x="150" y="180" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Most DeFi protocols</text>
    <text x="150" y="205" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Yield farming hub</text>
  </g>

  <!-- zkSync -->
  <g transform="translate(780, 260)">
    <rect x="0" y="0" width="300" height="230" rx="16" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <circle cx="150" cy="45" r="24" fill="#8b5cf6" opacity="0.3"/>
    <text x="150" y="52" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#a78bfa" text-anchor="middle">zk</text>
    <text x="150" y="90" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#a78bfa" text-anchor="middle">zkSync</text>
    <text x="150" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">ZK Proofs</text>
    <text x="150" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Native AA</text>
    <text x="150" y="180" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Privacy-focused</text>
    <text x="150" y="205" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Growing ecosystem</text>
  </g>

  <!-- VS separators -->
  <text x="390" y="385" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#30363d" text-anchor="middle">vs</text>
  <text x="730" y="385" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#30363d" text-anchor="middle">vs</text>

  <!-- Bottom -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="578" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="600" y="610" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1" text-anchor="middle">degen0x.com/blog/layer-2-comparison-base-arbitrum-zksync</text>
</svg>
