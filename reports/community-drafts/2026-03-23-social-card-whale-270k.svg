<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="200" r="180" fill="url(#greenGlow)" filter="url(#softGlow)" opacity="0.4"/>
  <circle cx="150" cy="500" r="120" fill="#4f46e5" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Logo area -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="0.05em">degen0x</text>

  <!-- Whale emoji icon -->
  <text x="60" y="160" font-size="64">🐋</text>

  <!-- Main headline -->
  <text x="140" y="150" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">270,000 BTC</text>
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#8b949e">Accumulated by whale wallets in 30 days</text>

  <!-- Value highlight -->
  <rect x="60" y="240" width="340" height="70" rx="16" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="80" y="268" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e" letter-spacing="0.05em">TOTAL VALUE</text>
  <text x="80" y="296" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e" filter="url(#glow)">$23 BILLION</text>

  <!-- 13-year high badge -->
  <rect x="420" y="240" width="260" height="70" rx="16" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="440" y="268" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8" letter-spacing="0.05em">RECORD</text>
  <text x="440" y="296" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#818cf8">13-Year High</text>

  <!-- Key signals row -->
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6e7681" letter-spacing="0.08em">CONVERGENCE SIGNALS</text>

  <!-- Signal boxes -->
  <!-- F&G -->
  <rect x="60" y="380" width="250" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="408" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681">FEAR &amp; GREED</text>
  <text x="80" y="440" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ef4444">10</text>
  <text x="130" y="440" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">46 days extreme</text>

  <!-- Exchange Supply -->
  <rect x="330" y="380" width="250" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="350" y="408" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681">EXCHANGE SUPPLY</text>
  <text x="350" y="440" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#06b6d4">2.7M</text>
  <text x="430" y="440" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">Lowest since 2018</text>

  <!-- RSI -->
  <rect x="600" y="380" width="250" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="620" y="408" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6e7681">BTC RSI</text>
  <text x="620" y="440" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#f59e0b">27</text>
  <text x="670" y="440" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">Deeply oversold</text>

  <!-- Historical outcomes row -->
  <text x="60" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6e7681" letter-spacing="0.08em">PREVIOUS CONVERGENCES</text>

  <rect x="60" y="525" width="170" height="50" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="78" y="548" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Q1 2019</text>
  <text x="150" y="548" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#22c55e">+340%</text>

  <rect x="250" y="525" width="170" height="50" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="268" y="548" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Q2 2020</text>
  <text x="340" y="548" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#22c55e">+1,400%</text>

  <rect x="440" y="525" width="170" height="50" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="458" y="548" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Q4 2022</text>
  <text x="530" y="548" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#22c55e">+300%</text>

  <!-- BTC Price -->
  <text x="900" y="560" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">BTC</text>
  <text x="900" y="585" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">$68,014</text>

  <!-- Bottom bar -->
  <rect y="618" width="1200" height="12" fill="url(#accent)" opacity="0.6"/>
  <text x="1060" y="604" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com</text>
</svg>