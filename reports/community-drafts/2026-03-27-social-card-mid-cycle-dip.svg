<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1524"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="cycleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundCard1">
      <rect x="60" y="310" width="255" height="130" rx="16"/>
    </clipPath>
    <clipPath id="roundCard2">
      <rect x="335" y="310" width="255" height="130" rx="16"/>
    </clipPath>
    <clipPath id="roundCard3">
      <rect x="610" y="310" width="255" height="130" rx="16"/>
    </clipPath>
    <clipPath id="roundCard4">
      <rect x="885" y="310" width="255" height="130" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top gradient accent bar -->
  <rect width="1200" height="4" fill="url(#brand)"/>

  <!-- Decorative background circles -->
  <circle cx="150" cy="500" r="200" fill="#6366f1" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="1050" cy="150" r="250" fill="#06b6d4" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="600" cy="300" r="180" fill="#ef4444" opacity="0.02" filter="url(#softGlow)"/>

  <!-- Alert badge -->
  <rect x="60" y="40" width="190" height="36" rx="18" fill="#ef4444" opacity="0.15"/>
  <rect x="60" y="40" width="190" height="36" rx="18" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <circle cx="82" cy="58" r="5" fill="#ef4444" filter="url(#glow)"/>
  <text x="96" y="63" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.05em">MID-CYCLE DIP ZONE</text>

  <!-- Logo area -->
  <text x="1090" y="63" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="end">degen0x.com</text>

  <!-- Main headline -->
  <text x="60" y="130" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" letter-spacing="-0.02em">Bitcoin Enters The</text>
  <text x="60" y="185" fill="url(#redGrad)" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" letter-spacing="-0.02em">Mid-Cycle Correction</text>

  <!-- Subtitle -->
  <text x="60" y="225" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Day 703 of the halving cycle — historical bottoms form around day 777</text>

  <!-- Cycle progress bar -->
  <rect x="60" y="260" width="1080" height="24" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Fill to 703/777 = ~90.5% -->
  <rect x="60" y="260" width="977" height="24" rx="12" fill="url(#cycleGrad)" opacity="0.6"/>
  <!-- Day markers -->
  <text x="65" y="252" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">HALVING</text>
  <text x="1000" y="252" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">DAY 703</text>
  <text x="1100" y="252" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">~DAY 777</text>
  <!-- Current position marker -->
  <circle cx="1037" cy="272" r="6" fill="#ef4444" filter="url(#glow)"/>

  <!-- Stat cards row -->
  <!-- Card 1: BTC Price -->
  <rect x="60" y="310" width="255" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="342" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.05em">BTC PRICE</text>
  <text x="80" y="380" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">$66,257</text>
  <text x="80" y="420" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">-47% from ATH · -24% YTD</text>

  <!-- Card 2: Fear Index -->
  <rect x="335" y="310" width="255" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="355" y="342" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.05em">FEAR &amp; GREED</text>
  <text x="355" y="380" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" filter="url(#glow)">10</text>
  <text x="400" y="380" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600"> Extreme Fear</text>
  <text x="355" y="420" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">46-day streak · FTX-level</text>

  <!-- Card 3: Historical Dips -->
  <rect x="610" y="310" width="255" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="630" y="342" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.05em">PAST MID-CYCLE DIPS</text>
  <text x="630" y="372" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">2016: -38% → then 20x</text>
  <text x="630" y="396" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">2020: -53% → then new ATH</text>
  <text x="630" y="420" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">2026: -47% → ???</text>

  <!-- Card 4: Liquidations -->
  <rect x="885" y="310" width="255" height="130" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="905" y="342" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.05em">24H LIQUIDATIONS</text>
  <text x="905" y="380" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">$450M</text>
  <text x="905" y="420" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">89% longs · $258M in 4h</text>

  <!-- Bottom context panel -->
  <rect x="60" y="465" width="1080" height="55" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="498" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">
    Iran Day 28 · Rising Oil · $14B Options Expired · Hegota Fork Reshuffled · HASH -25% · Market Cap $2.43T
  </text>

  <!-- CTA -->
  <rect x="60" y="545" width="340" height="44" rx="22" fill="url(#cycleGrad)" opacity="0.8"/>
  <text x="100" y="573" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">Backtest your strategy → degen0x.com</text>

  <!-- Bottom bar -->
  <rect y="622" width="1200" height="8" fill="url(#brand)" opacity="0.6"/>
</svg>
