<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f0a2e"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ethGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative ETH diamond shapes -->
  <polygon points="1000,80 1060,180 1000,240 940,180" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <polygon points="1000,110 1040,170 1000,210 960,170" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="1000" cy="170" r="120" fill="#8b5cf6" opacity="0.03" filter="url(#softGlow2)"/>
  <circle cx="150" cy="500" r="80" fill="#06b6d4" opacity="0.03" filter="url(#softGlow2)"/>

  <!-- Glass card -->
  <rect x="60" y="60" width="1080" height="510" rx="20" ry="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Logo + label -->
  <text x="100" y="115" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="0.1em">DEGEN0X</text>
  <text x="215" y="115" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b5cf6">LEARN GUIDE</text>

  <!-- Category badge -->
  <rect x="100" y="140" width="120" height="28" rx="14" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="160" y="159" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" text-anchor="middle">ETHEREUM</text>

  <!-- Main title -->
  <text x="100" y="230" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Fusaka &amp; Glamsterdam</text>
  <text x="100" y="280" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Upgrade Guide 2026</text>

  <!-- Subtitle -->
  <text x="100" y="325" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">All 12 EIPs explained — from PeerDAS to full danksharding</text>

  <!-- Feature pills -->
  <rect x="100" y="360" width="160" height="36" rx="18" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="180" y="383" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">PeerDAS EIP-7594</text>

  <rect x="280" y="360" width="140" height="36" rx="18" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="350" y="383" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#06b6d4" text-anchor="middle">12 EIPs Total</text>

  <rect x="440" y="360" width="160" height="36" rx="18" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="520" y="383" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">L2 Fees -90%+</text>

  <rect x="620" y="360" width="160" height="36" rx="18" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="700" y="383" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">Danksharding</text>

  <!-- Key insight -->
  <text x="100" y="450" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8b949e">The biggest Ethereum upgrade since The Merge — and almost nobody is talking about it.</text>

  <!-- Bottom bar -->
  <rect x="60" y="500" width="1080" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="100" y="540" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1">degen0x.com/learn/ethereum-fusaka-glamsterdam-guide-2026</text>
  <text x="1040" y="540" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">Free · No Signup · Open Data</text>

  <!-- Bottom accent -->
  <rect y="626" width="1200" height="4" fill="url(#accent2)"/>
</svg>
