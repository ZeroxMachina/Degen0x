<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative glow circles -->
  <circle cx="200" cy="300" r="200" fill="#4f46e5" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="1000" cy="400" r="250" fill="#0891b2" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="600" cy="100" r="150" fill="#d97706" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Glass card background -->
  <rect x="60" y="80" width="1080" height="470" rx="24" ry="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Logo area -->
  <circle cx="120" cy="140" r="24" fill="#4f46e5" opacity="0.8"/>
  <text x="118" y="147" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" fill="#e6edf3" text-anchor="middle">0x</text>
  <text x="158" y="147" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Big number -->
  <text x="600" y="280" font-family="Inter, system-ui, sans-serif" font-size="140" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)">414</text>

  <!-- Subtitle -->
  <text x="600" y="330" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#e6edf3" text-anchor="middle">Pages Live. Zero Queue.</text>

  <!-- Stats row -->
  <g transform="translate(120, 390)">
    <!-- Tools -->
    <rect x="0" y="0" width="220" height="70" rx="12" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="110" y="30" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#6366f1" text-anchor="middle">114</text>
    <text x="110" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e" text-anchor="middle">Crypto Tools</text>

    <!-- Guides -->
    <rect x="240" y="0" width="220" height="70" rx="12" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
    <text x="350" y="30" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#06b6d4" text-anchor="middle">200+</text>
    <text x="350" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e" text-anchor="middle">Learn Guides</text>

    <!-- Reviews -->
    <rect x="480" y="0" width="220" height="70" rx="12" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="590" y="30" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#f59e0b" text-anchor="middle">38</text>
    <text x="590" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e" text-anchor="middle">Reviews</text>

    <!-- Languages -->
    <rect x="720" y="0" width="220" height="70" rx="12" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="830" y="30" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#22c55e" text-anchor="middle">8</text>
    <text x="830" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e" text-anchor="middle">Languages</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="520" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#6e7681" text-anchor="middle">Free. No signup. No paywall.</text>

  <!-- Bottom URL bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="578" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="600" y="610" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1" text-anchor="middle">degen0x.com</text>
</svg>
