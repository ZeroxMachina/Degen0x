<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad2)"/>

  <!-- Decorative: rising stablecoin chart bars -->
  <g opacity="0.1">
    <rect x="700" y="400" width="30" height="60" rx="4" fill="#22c55e"/>
    <rect x="740" y="380" width="30" height="80" rx="4" fill="#22c55e"/>
    <rect x="780" y="350" width="30" height="110" rx="4" fill="#22c55e"/>
    <rect x="820" y="320" width="30" height="140" rx="4" fill="#22c55e"/>
    <rect x="860" y="280" width="30" height="180" rx="4" fill="#22c55e"/>
    <rect x="900" y="240" width="30" height="220" rx="4" fill="#22c55e"/>
    <rect x="940" y="200" width="30" height="260" rx="4" fill="#22c55e"/>
    <rect x="980" y="160" width="30" height="300" rx="4" fill="#06b6d4"/>
    <text x="995" y="150" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">ATH</text>
  </g>

  <!-- Decorative circles -->
  <circle cx="150" cy="500" r="100" fill="#22c55e" opacity="0.04"/>
  <circle cx="1100" cy="100" r="60" fill="#0891b2" opacity="0.05"/>

  <!-- Glass card -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Badge -->
  <rect x="80" y="80" width="140" height="32" rx="16" fill="#22c55e" opacity="0.2"/>
  <text x="150" y="101" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="1">BULL SIGNAL</text>

  <!-- Logo -->
  <text x="1060" y="101" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#6366f1" text-anchor="end">degen0x</text>

  <!-- Big number -->
  <text x="80" y="230" font-family="Inter, sans-serif" font-size="96" font-weight="900" fill="url(#greenGrad)" letter-spacing="-0.03em">$312B</text>

  <!-- Title -->
  <text x="80" y="280" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Stablecoin Supply Hits All-Time High</text>

  <!-- Subtitle -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="20" fill="#8b949e">Record dry powder + extreme fear recovery = historically bullish setup</text>

  <!-- Stat boxes -->
  <g>
    <rect x="80" y="360" width="310" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="235" y="395" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#f59e0b" text-anchor="middle">F&amp;G: 8 → 33</text>
    <text x="235" y="430" font-family="Inter, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Recovering From 48-Day Extreme Fear</text>

    <rect x="410" y="360" width="310" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="565" y="395" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#06b6d4" text-anchor="middle">6-Day ETF Inflow</text>
    <text x="565" y="430" font-family="Inter, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">Spot BTC ETF Consecutive Buying</text>

    <rect x="740" y="360" width="310" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="895" y="395" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#8b5cf6" text-anchor="middle">16 Commodities</text>
    <text x="895" y="430" font-family="Inter, sans-serif" font-size="14" fill="#6e7681" text-anchor="middle">SEC/CFTC Joint Classification</text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="540" font-family="Inter, sans-serif" font-size="16" fill="#6e7681" text-anchor="middle">degen0x.com/tools/fear-greed-timeline</text>
</svg>
