<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1529"/>
    </linearGradient>
    <linearGradient id="brandGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Top accent bar (green = regulatory progress) -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#greenGrad)"/>

  <!-- Decorative glow -->
  <circle cx="900" cy="300" r="200" fill="#22c55e" opacity="0.03" filter="url(#softGlow2)"/>
  <circle cx="300" cy="500" r="150" fill="#6366f1" opacity="0.03" filter="url(#softGlow2)"/>

  <!-- degen0x logo -->
  <text x="60" y="60" fill="url(#brandGrad2)" font-family="Inter, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.5">degen0x</text>

  <!-- Legislative badge -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="200" height="32" rx="16" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="100" y="21" fill="#22c55e" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">REGULATORY UPDATE</text>
  </g>

  <!-- Main title -->
  <text x="60" y="185" fill="#e6edf3" font-family="Inter, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5">CLARITY Act</text>
  <text x="60" y="245" fill="#e6edf3" font-family="Inter, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5">Clears Biggest Hurdle</text>

  <!-- Subtitle -->
  <text x="60" y="295" fill="#8b949e" font-family="Inter, sans-serif" font-size="20" font-weight="400">Stablecoin yield deal reached. Comprehensive crypto</text>
  <text x="60" y="323" fill="#8b949e" font-family="Inter, sans-serif" font-size="20" font-weight="400">regulation closer than ever to becoming law.</text>

  <!-- Two-column comparison -->
  <!-- BANNED column -->
  <g transform="translate(60, 365)">
    <rect x="0" y="0" width="340" height="170" rx="16" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
    <text x="20" y="35" fill="#ef4444" font-family="Inter, sans-serif" font-size="14" font-weight="700">BANNED</text>
    <text x="20" y="65" fill="#e6edf3" font-family="Inter, sans-serif" font-size="17" font-weight="600">Passive Stablecoin Yield</text>
    <text x="20" y="95" fill="#8b949e" font-family="Inter, sans-serif" font-size="14">Earn APY just for holding USDC?</text>
    <text x="20" y="115" fill="#8b949e" font-family="Inter, sans-serif" font-size="14">That competes with bank deposits.</text>
    <text x="20" y="150" fill="#ef4444" font-family="Inter, sans-serif" font-size="28" font-weight="800">✗</text>
  </g>

  <!-- ALLOWED column -->
  <g transform="translate(420, 365)">
    <rect x="0" y="0" width="340" height="170" rx="16" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
    <text x="20" y="35" fill="#22c55e" font-family="Inter, sans-serif" font-size="14" font-weight="700">ALLOWED</text>
    <text x="20" y="65" fill="#e6edf3" font-family="Inter, sans-serif" font-size="17" font-weight="600">Activity-Based Rewards</text>
    <text x="20" y="95" fill="#8b949e" font-family="Inter, sans-serif" font-size="14">Earn rewards for payments,</text>
    <text x="20" y="115" fill="#8b949e" font-family="Inter, sans-serif" font-size="14">transfers, and platform usage.</text>
    <text x="20" y="150" fill="#22c55e" font-family="Inter, sans-serif" font-size="28" font-weight="800">✓</text>
  </g>

  <!-- Timeline panel -->
  <g transform="translate(790, 365)">
    <rect x="0" y="0" width="350" height="170" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="35" fill="#8b949e" font-family="Inter, sans-serif" font-size="13" font-weight="600">TIMELINE</text>

    <!-- Timeline dots -->
    <circle cx="30" cy="65" r="6" fill="#22c55e"/>
    <text x="48" y="70" fill="#e6edf3" font-family="Inter, sans-serif" font-size="14" font-weight="600">Mar 20 — Deal reached</text>

    <line x1="30" y1="75" x2="30" y2="95" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="30" cy="100" r="6" fill="#f59e0b" stroke="rgba(245,158,11,0.4)" stroke-width="2"/>
    <text x="48" y="105" fill="#e6edf3" font-family="Inter, sans-serif" font-size="14" font-weight="500">Late Apr — Senate hearing</text>

    <line x1="30" y1="110" x2="30" y2="130" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="30" cy="135" r="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <text x="48" y="140" fill="#8b949e" font-family="Inter, sans-serif" font-size="14">May–Jun — Floor vote</text>

    <text x="20" y="165" fill="#6366f1" font-family="Inter, sans-serif" font-size="13" font-weight="600">Polymarket: 69% odds of signing</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(255,255,255,0.02)"/>
  <text x="60" y="616" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500">degen0x.com — Crypto tools, data, and education</text>
  <text x="1140" y="616" fill="#6e7681" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="end">March 23, 2026</text>
</svg>
