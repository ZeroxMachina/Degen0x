<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0c1229"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="60" y1="180" x2="900" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative glow circles -->
  <circle cx="200" cy="150" r="180" fill="#4f46e5" opacity="0.06" filter="url(#glow2)"/>
  <circle cx="1000" cy="480" r="200" fill="#0891b2" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="600" cy="300" r="250" fill="#22c55e" opacity="0.03" filter="url(#glow2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Badge: BREAKING -->
  <rect x="60" y="50" rx="16" ry="16" width="160" height="36" fill="url(#badgeGrad)" opacity="0.9"/>
  <text x="140" y="74" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.08em">BREAKING</text>

  <!-- Main title -->
  <text x="60" y="145" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">SEC Classifies 16 Crypto Assets</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">as Digital Commodities</text>

  <!-- Subtitle -->
  <text x="60" y="248" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Joint SEC/CFTC interpretation — staking, mining, airdrops outside securities law</text>

  <!-- Asset chips row 1 -->
  <rect x="60" y="285" rx="12" ry="12" width="90" height="38" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="105" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle">$BTC</text>

  <rect x="162" y="285" rx="12" ry="12" width="85" height="38" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="205" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#8b5cf6" text-anchor="middle">$ETH</text>

  <rect x="259" y="285" rx="12" ry="12" width="85" height="38" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="302" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#06b6d4" text-anchor="middle">$SOL</text>

  <rect x="356" y="285" rx="12" ry="12" width="85" height="38" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="399" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3" text-anchor="middle">$XRP</text>

  <rect x="453" y="285" rx="12" ry="12" width="95" height="38" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="501" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3" text-anchor="middle">$DOGE</text>

  <rect x="560" y="285" rx="12" ry="12" width="85" height="38" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="603" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3" text-anchor="middle">$ADA</text>

  <rect x="657" y="285" rx="12" ry="12" width="95" height="38" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="705" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ef4444" text-anchor="middle">$AVAX</text>

  <rect x="764" y="285" rx="12" ry="12" width="90" height="38" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="809" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#4f6ef7" text-anchor="middle">$LINK</text>

  <rect x="866" y="285" rx="12" ry="12" width="120" height="38" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="926" y="310" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#8b949e" text-anchor="middle">+8 more</text>

  <!-- Stat boxes -->
  <rect x="60" y="355" rx="16" ry="16" width="340" height="110" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="230" y="395" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Assets Classified</text>
  <text x="230" y="440" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#22c55e" text-anchor="middle">16</text>

  <rect x="430" y="355" rx="16" ry="16" width="340" height="110" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="600" y="395" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Spot ETF Inflows</text>
  <text x="600" y="440" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#6366f1" text-anchor="middle">$201M</text>

  <rect x="800" y="355" rx="16" ry="16" width="340" height="110" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="970" y="395" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Page Interpretation</text>
  <text x="970" y="440" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#0891b2" text-anchor="middle">68pg</text>

  <!-- Bottom bar -->
  <rect x="0" y="500" width="1200" height="130" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="500" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Logo placeholder -->
  <circle cx="90" cy="560" r="22" fill="#4f46e5" opacity="0.8"/>
  <text x="90" y="567" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">0x</text>
  <text x="125" y="567" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3">degen0x.com</text>

  <text x="1140" y="567" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6e7681" text-anchor="end">SEC/CFTC Joint Interpretation · March 17, 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)"/>
</svg>