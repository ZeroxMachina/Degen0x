<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a0a1e"/>
    </linearGradient>
    <linearGradient id="fear" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="greed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Badge -->
  <rect x="40" y="30" width="290" height="32" rx="16" fill="#ef4444" opacity="0.9"/>
  <text x="185" y="51" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">MARCH 2026 DIVERGENCE</text>

  <!-- Title -->
  <text x="40" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white">Retail Panic vs Institutional</text>
  <text x="40" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white">Accumulation</text>

  <!-- Divider line -->
  <line x1="598" y1="195" x2="598" y2="530" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- RETAIL SIDE (Left) -->
  <text x="40" y="215" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444" letter-spacing="2">RETAIL</text>

  <rect x="40" y="235" width="530" height="55" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <text x="60" y="260" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Fear &amp; Greed Index</text>
  <text x="60" y="280" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444">8 — Day 50 Record Streak</text>
  <!-- Fear bar -->
  <rect x="350" y="250" width="200" height="20" rx="4" fill="#1e293b"/>
  <rect x="350" y="250" width="16" height="20" rx="4" fill="url(#fear)"/>
  <text x="560" y="265" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#ef4444">8</text>

  <rect x="40" y="300" width="530" height="55" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <text x="60" y="325" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">CT Sentiment</text>
  <text x="60" y="345" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444">Lowest since FTX collapse</text>

  <rect x="40" y="365" width="530" height="55" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <text x="60" y="390" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">"Sell Bitcoin" Google Trends</text>
  <text x="60" y="410" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444">12-month high</text>

  <!-- INSTITUTIONAL SIDE (Right) -->
  <text x="625" y="215" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4ade80" letter-spacing="2">INSTITUTIONS</text>

  <rect x="625" y="235" width="540" height="45" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <text x="645" y="263" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Morgan Stanley filed <tspan font-weight="700" fill="#4ade80">MSBT</tspan> — first bank spot BTC ETF</text>

  <rect x="625" y="290" width="540" height="45" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <text x="645" y="318" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">BTC ETFs: <tspan font-weight="700" fill="#4ade80">$2.5B</tspan> March inflows</text>

  <rect x="625" y="345" width="540" height="45" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <text x="645" y="373" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">MicroStrategy: <tspan font-weight="700" fill="#4ade80">762,099 BTC</tspan> ($57.69B)</text>

  <rect x="625" y="400" width="540" height="45" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <text x="645" y="428" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Bitmine: <tspan font-weight="700" fill="#4ade80">$138M ETH</tspan> accumulation</text>

  <rect x="625" y="455" width="540" height="45" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <text x="645" y="483" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Congress: <tspan font-weight="700" fill="#4ade80">2 tokenization bills</tspan> introduced</text>

  <rect x="625" y="510" width="540" height="45" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <text x="645" y="538" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Stablecoins: <tspan font-weight="700" fill="#4ade80">$304B</tspan> all-time high</text>

  <!-- Bottom callout -->
  <rect x="40" y="450" width="530" height="80" rx="10" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1.5" opacity="0.85"/>
  <text x="60" y="480" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#fcd34d">The divergence has never been wider.</text>
  <text x="60" y="510" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">One side is panicking. The other is building.</text>

  <!-- Footer -->
  <rect x="0" y="580" width="1200" height="50" fill="#0a0a1a" opacity="0.8"/>
  <text x="40" y="610" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white">degen0x</text>
  <text x="120" y="610" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">degen0x.com/tools/fear-greed-timeline</text>
  <text x="1160" y="610" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="end">March 2026</text>
</svg>