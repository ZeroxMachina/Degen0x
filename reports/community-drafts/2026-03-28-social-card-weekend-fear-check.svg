<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="fearBarBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="25%" style="stop-color:#84cc16"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="75%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#ef4444" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="150" cy="500" r="140" fill="#4f46e5" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- EXTREME FEAR badge -->
  <rect x="60" y="40" rx="20" ry="20" width="220" height="40" fill="#ef4444" opacity="0.15"/>
  <rect x="60" y="40" rx="20" ry="20" width="220" height="40" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <circle cx="82" cy="60" r="5" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="96" y="66" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ef4444" letter-spacing="0.1em">EXTREME FEAR</text>

  <!-- degen0x logo text -->
  <text x="1140" y="66" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="url(#brandGrad)" text-anchor="end">degen0x</text>

  <!-- Main Title -->
  <text x="60" y="140" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Weekend Fear Check</text>
  <text x="60" y="180" font-family="Inter, sans-serif" font-size="22" fill="#8b949e">Saturday, March 28, 2026 — Day 47 of Extreme Fear</text>

  <!-- Fear & Greed Score - Big number -->
  <rect x="60" y="210" rx="20" ry="20" width="280" height="160" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="200" y="285" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#ef4444" text-anchor="middle" filter="url(#glow)">12</text>
  <text x="200" y="320" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="0.1em">FEAR &amp; GREED INDEX</text>
  <text x="200" y="350" font-family="Inter, sans-serif" font-size="13" fill="#6e7681" text-anchor="middle">Lowest since Oct 2023</text>

  <!-- Fear bar visualization -->
  <rect x="60" y="390" rx="6" ry="6" width="280" height="12" fill="rgba(255,255,255,0.06)"/>
  <rect x="60" y="390" rx="6" ry="6" width="280" height="12" fill="url(#fearBarBg)" opacity="0.3"/>
  <!-- Indicator at position 12/100 -->
  <rect x="91" y="386" rx="3" ry="3" width="6" height="20" fill="#ef4444" filter="url(#glow)"/>
  <text x="60" y="425" font-family="Inter, sans-serif" font-size="11" fill="#6e7681">0 — Extreme Fear</text>
  <text x="340" y="425" font-family="Inter, sans-serif" font-size="11" fill="#6e7681" text-anchor="end">100 — Extreme Greed</text>

  <!-- Price Cards -->
  <!-- BTC -->
  <rect x="400" y="210" rx="16" ry="16" width="230" height="105" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="420" y="242" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8b949e">BTC</text>
  <text x="420" y="275" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">$66,194</text>
  <text x="420" y="300" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ef4444">−2.28% · −48% ATH</text>

  <!-- ETH -->
  <rect x="650" y="210" rx="16" ry="16" width="230" height="105" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="670" y="242" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8b949e">ETH</text>
  <text x="670" y="275" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">$1,985</text>
  <text x="670" y="300" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ef4444">−4.05% · below $2K</text>

  <!-- SOL -->
  <rect x="900" y="210" rx="16" ry="16" width="240" height="105" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="920" y="242" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8b949e">SOL</text>
  <text x="920" y="275" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">$83</text>
  <text x="920" y="300" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ef4444">−4.5% · −8% weekly</text>

  <!-- Market Cap -->
  <rect x="400" y="335" rx="16" ry="16" width="350" height="90" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="420" y="365" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8b949e">TOTAL MARKET CAP</text>
  <text x="420" y="400" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#e6edf3">$2.37T</text>
  <text x="600" y="400" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ef4444">−3.1%</text>

  <!-- SUDO highlight -->
  <rect x="770" y="335" rx="16" ry="16" width="370" height="90" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="790" y="365" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#8b949e">SUDO (SUDOSWAP)</text>
  <text x="790" y="400" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#22c55e">+225%</text>
  <text x="920" y="400" font-family="Inter, sans-serif" font-size="13" fill="#6e7681">DAO rage-quit proposal</text>

  <!-- Historical context bar -->
  <rect x="60" y="460" rx="16" ry="16" width="1080" height="80" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="490" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" letter-spacing="0.05em">HISTORICAL CONTEXT</text>
  <text x="80" y="520" font-family="Inter, sans-serif" font-size="15" fill="#8b949e">Last time fear stayed this low for 47+ days → FTX collapse aftermath (Nov 2022) → Turned out to be one of the best accumulation zones of the cycle</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="600" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Track the fear → degen0x.com/tools/fear-greed-timeline</text>
  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">577 pages live · degen0x.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brandGrad)"/>
</svg>
