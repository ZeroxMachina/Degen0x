<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1428"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Badge -->
  <rect x="40" y="30" width="220" height="32" rx="16" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
  <circle cx="58" cy="46" r="5" fill="#6366f1" filter="url(#glow)"/>
  <text x="72" y="51" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#a5b4fc" letter-spacing="1">CONGRESS RECAP</text>

  <!-- Logo area -->
  <text x="1100" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end">degen0x.com</text>

  <!-- Title -->
  <text x="40" y="105" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#e6edf3" letter-spacing="-0.5">Congress Takes On Tokenization</text>
  <text x="40" y="140" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">House Financial Services Committee • March 25, 2026</text>

  <!-- Two bill cards -->
  <!-- Bill 1 -->
  <rect x="40" y="170" width="545" height="150" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="60" y="198" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="1">BILL 1</text>
  <text x="60" y="222" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Modernizing Markets Through</text>
  <text x="60" y="244" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Tokenization Act</text>
  <text x="60" y="272" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">→ SEC/CFTC joint study on tokenized securities</text>
  <text x="60" y="292" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">→ Framework for on-chain equity, bonds, funds</text>

  <!-- Bill 2 -->
  <rect x="615" y="170" width="545" height="150" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(8,145,178,0.3)" stroke-width="1"/>
  <text x="635" y="198" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#06b6d4" letter-spacing="1">BILL 2</text>
  <text x="635" y="222" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Capital Markets Technology</text>
  <text x="635" y="244" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Modernization Act</text>
  <text x="635" y="272" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">→ Blockchain record-keeping for broker-dealers</text>
  <text x="635" y="292" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">→ Real-time settlement infrastructure</text>

  <!-- Milestone row -->
  <rect x="40" y="345" width="1120" height="90" rx="16" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="60" y="375" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22c55e" letter-spacing="1">MILESTONES THIS WEEK</text>

  <!-- Milestone chips -->
  <rect x="60" y="390" width="200" height="30" rx="12" fill="rgba(34,197,94,0.12)"/>
  <text x="72" y="410" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4ade80">Nasdaq Tokenized Trading ✓</text>

  <rect x="275" y="390" width="220" height="30" rx="12" fill="rgba(34,197,94,0.12)"/>
  <text x="287" y="410" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4ade80">CLARITY Act "In Principle" ✓</text>

  <rect x="510" y="390" width="230" height="30" rx="12" fill="rgba(34,197,94,0.12)"/>
  <text x="522" y="410" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4ade80">SEC 16 Crypto Commodities ✓</text>

  <rect x="755" y="390" width="200" height="30" rx="12" fill="rgba(245,158,11,0.12)"/>
  <text x="767" y="410" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fbbf24">91 ETF Rulings — Thu 27</text>

  <!-- Bottom stats bar -->
  <rect x="40" y="460" width="1120" height="80" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Stat 1 -->
  <text x="80" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="url(#greenGrad)">$26.48B</text>
  <text x="80" y="510" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">RWA On-Chain</text>

  <!-- Stat 2 -->
  <text x="270" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#f59e0b">$14.16B</text>
  <text x="270" y="510" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Options Expiry Fri</text>

  <!-- Stat 3 -->
  <text x="470" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="url(#purpleGrad)">91</text>
  <text x="470" y="510" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">SEC ETF Apps</text>

  <!-- Stat 4 -->
  <text x="600" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#06b6d4">16</text>
  <text x="600" y="510" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Classified Commodities</text>

  <!-- Stat 5 -->
  <text x="790" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#ef4444">14</text>
  <text x="790" y="510" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">F&amp;G (Extreme Fear)</text>

  <!-- Stat 6 -->
  <text x="950" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#e6edf3">$70,600</text>
  <text x="950" y="510" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">BTC Price</text>

  <!-- Bottom tagline -->
  <text x="600" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle">Tokenization isn't the future. Congress is legislating it as the present.</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
