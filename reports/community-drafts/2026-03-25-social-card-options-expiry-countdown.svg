<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0d1225"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="130" x2="1200" y2="130"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
  </g>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="200" r="180" fill="url(#redGlow)" opacity="0.4"/>
  <circle cx="250" cy="450" r="150" fill="url(#greenGlow)" opacity="0.3"/>

  <!-- Logo area -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.05em">DEGEN0X</text>
  <text x="155" y="55" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">MARKET ALERT</text>

  <!-- Main headline -->
  <text x="60" y="130" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">$13.5B Options Expire Tomorrow</text>
  <text x="60" y="175" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">Deribit Quarterly Expiry — Thu Mar 27 | Max Pain ~$70K</text>

  <!-- F&G rebound panel -->
  <rect x="60" y="210" width="340" height="180" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="248" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.05em">FEAR &amp; GREED</text>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="#ef4444" filter="url(#glow)">8</text>
  <text x="145" y="305" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#6e7681">→</text>
  <text x="180" y="320" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="#f59e0b" filter="url(#glow)">14</text>
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444">Extreme Fear — 46+ days below 25</text>

  <!-- Options expiry panel -->
  <rect x="430" y="210" width="340" height="180" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="450" y="248" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.05em">OPTIONS EXPIRY</text>
  <text x="450" y="320" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="#f59e0b" filter="url(#glow)">$13.5B</text>
  <text x="450" y="355" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Quarterly expiry on Deribit</text>
  <text x="450" y="378" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Largest Q1 2026 volatility catalyst</text>

  <!-- BTC price panel -->
  <rect x="800" y="210" width="340" height="180" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="820" y="248" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BITCOIN</text>
  <text x="820" y="320" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="#22c55e" filter="url(#glow)">$70.6K</text>
  <text x="820" y="355" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Holding above max pain</text>
  <text x="820" y="378" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e">Short squeeze potential if held</text>

  <!-- Bottom stat row -->
  <rect x="60" y="420" width="1080" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="120" y="455" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.05em">ETF INFLOWS</text>
  <text x="120" y="480" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e">$2.5B</text>

  <line x1="280" y1="435" x2="280" y2="490" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="330" y="455" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.05em">MINER P&amp;L</text>
  <text x="330" y="480" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ef4444">-$17.4K</text>

  <line x1="490" y1="435" x2="490" y2="490" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="540" y="455" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.05em">STABLECOINS</text>
  <text x="540" y="480" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#4ade80">$304B ATH</text>

  <line x1="710" y1="435" x2="710" y2="490" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="760" y="455" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.05em">SEC COMMODITIES</text>
  <text x="760" y="480" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#6366f1">16 Assets</text>

  <line x1="920" y1="435" x2="920" y2="490" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="970" y="455" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.05em">F&amp;G STREAK</text>
  <text x="970" y="480" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ef4444">46+ Days</text>

  <!-- Tagline -->
  <text x="60" y="548" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="600" fill="#e6edf3" opacity="0.9">Biggest Q1 volatility catalyst meets the longest fear streak since FTX.</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#8b949e">degen0x.com/tools/fear-greed-timeline</text>
  <text x="1060" y="612" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Mar 25, 2026</text>
</svg>
