<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="btcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7931a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="ethGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#627eea"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top badge -->
  <rect x="40" y="30" width="320" height="36" rx="18" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="200" y="54" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">INSTITUTIONAL ACCUMULATION</text>

  <!-- Main headline -->
  <text x="60" y="120" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="white">Two Companies. Two Bets.</text>
  <text x="60" y="165" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="white">Both Buying the Dip.</text>

  <!-- Divider -->
  <rect x="60" y="185" width="400" height="3" rx="1.5" fill="url(#divGrad)" opacity="0.6"/>

  <!-- MicroStrategy Card -->
  <rect x="60" y="215" width="520" height="170" rx="16" fill="#111827" stroke="#f7931a" stroke-width="1.5"/>
  <rect x="60" y="215" width="520" height="45" rx="16" fill="#f7931a" opacity="0.1"/>
  <rect x="60" y="245" width="520" height="1" fill="#f7931a" opacity="0.2"/>
  <text x="80" y="245" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#f7931a">MICROSTRATEGY — BTC</text>
  <text x="80" y="290" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="1">TOTAL HOLDINGS</text>
  <text x="80" y="320" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#f7931a" filter="url(#glow2)">762,099 BTC</text>
  <text x="80" y="350" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">~3.6% of all BTC that will ever exist</text>
  <text x="80" y="375" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Latest buy: 1,031 BTC at $74,326</text>

  <!-- Bitmine Card -->
  <rect x="620" y="215" width="520" height="170" rx="16" fill="#111827" stroke="#627eea" stroke-width="1.5"/>
  <rect x="620" y="215" width="520" height="45" rx="16" fill="#627eea" opacity="0.1"/>
  <rect x="620" y="245" width="520" height="1" fill="#627eea" opacity="0.2"/>
  <text x="640" y="245" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#627eea">BITMINE — ETH</text>
  <text x="640" y="290" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="1">TOTAL HOLDINGS</text>
  <text x="640" y="320" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#627eea" filter="url(#glow2)">4,660,903 ETH</text>
  <text x="640" y="350" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">3.86% of Ethereum's circulating supply</text>
  <text x="640" y="375" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Latest buy: 65,341 ETH ($138M) — largest of 2026</text>

  <!-- Bottom stats row -->
  <g>
    <rect x="60" y="410" width="220" height="80" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="80" y="438" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" letter-spacing="1">BTC ETF MARCH INFLOWS</text>
    <text x="80" y="470" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#22c55e">$2.5B</text>

    <rect x="300" y="410" width="220" height="80" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="320" y="438" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" letter-spacing="1">BLACKROCK ETHB</text>
    <text x="320" y="470" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#22c55e">+20%</text>

    <rect x="540" y="410" width="220" height="80" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="560" y="438" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" letter-spacing="1">STABLECOIN SUPPLY</text>
    <text x="560" y="470" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#06b6d4">$304B ATH</text>

    <rect x="780" y="410" width="360" height="80" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1"/>
    <text x="800" y="438" font-family="system-ui, sans-serif" font-size="11" fill="#ef4444" letter-spacing="1">FEAR & GREED INDEX — DAY 47</text>
    <!-- Fear gauge bar -->
    <rect x="800" y="455" width="320" height="12" rx="6" fill="#1e293b"/>
    <rect x="800" y="455" width="35" height="12" rx="6" fill="#ef4444"/>
    <text x="845" y="466" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ef4444">8</text>
    <text x="1000" y="480" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Extreme Fear</text>
  </g>

  <!-- Callout -->
  <text x="60" y="535" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0">Institutions are accumulating. The index says fear.</text>
  <text x="60" y="560" font-family="system-ui, sans-serif" font-size="15" fill="#64748b">The money disagrees with the sentiment.</text>

  <!-- Bottom branding -->
  <rect x="60" y="585" width="1090" height="1" fill="#1e293b"/>
  <text x="60" y="612" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#f59e0b">degen0x.com</text>
  <text x="60" y="625" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Free crypto research • No signup • No paywall</text>
  <text x="1150" y="618" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="end">March 24, 2026</text>
</svg>
