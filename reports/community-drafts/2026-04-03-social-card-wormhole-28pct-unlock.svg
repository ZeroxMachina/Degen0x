<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="accentBar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="brandGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="unlockProgress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accentBar2)"/>

  <!-- Decorative glow -->
  <circle cx="1000" cy="180" r="160" fill="url(#amberGlow)" opacity="0.5"/>
  <circle cx="200" cy="480" r="100" fill="url(#amberGlow)" opacity="0.3"/>

  <!-- Lock icon -->
  <g transform="translate(60, 48)">
    <rect x="8" y="14" width="24" height="18" rx="3" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <path d="M12 14V10a8 8 0 0 1 16 0v4" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <!-- unlock indicator -->
    <line x1="32" y1="10" x2="36" y2="6" stroke="#ef4444" stroke-width="2"/>
  </g>

  <!-- degen0x logo text -->
  <text x="106" y="70" fill="url(#brandGrad2)" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="0.05em">degen0x</text>

  <!-- Category tag -->
  <rect x="60" y="95" width="140" height="28" rx="14" fill="rgba(245, 158, 11, 0.15)" stroke="rgba(245, 158, 11, 0.3)" stroke-width="1"/>
  <text x="130" y="114" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="0.08em">TOKEN UNLOCK</text>

  <!-- Main title -->
  <text x="60" y="185" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Wormhole ($W)</text>
  <text x="60" y="240" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">1.28B Token Cliff Unlock</text>

  <!-- Subtitle -->
  <text x="60" y="280" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">28% of total supply unlocked in a single day — April 3, 2026</text>

  <!-- Data cards row -->
  <!-- Card 1: Tokens Unlocked -->
  <rect x="60" y="320" width="255" height="100" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <text x="80" y="352" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">TOKENS UNLOCKED</text>
  <text x="80" y="395" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">1.28B W</text>

  <!-- Card 2: Supply Impact -->
  <rect x="335" y="320" width="255" height="100" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <text x="355" y="352" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">SUPPLY UNLOCKED</text>
  <text x="355" y="395" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">28%</text>

  <!-- Card 3: Price -->
  <rect x="610" y="320" width="255" height="100" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <text x="630" y="352" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">CURRENT PRICE</text>
  <text x="630" y="395" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">$0.01</text>

  <!-- Card 4: New Circulating -->
  <rect x="885" y="320" width="255" height="100" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <text x="905" y="352" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">NEW CIRCULATING</text>
  <text x="905" y="395" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">~84%</text>

  <!-- Supply bar visualization -->
  <rect x="60" y="450" width="1080" height="8" rx="4" fill="rgba(255, 255, 255, 0.06)"/>
  <!-- Previously unlocked (56%) -->
  <rect x="60" y="450" width="605" height="8" rx="4" fill="#06b6d4" opacity="0.6"/>
  <!-- Newly unlocked (28%) -->
  <rect x="665" y="450" width="302" height="8" rx="4" fill="url(#unlockProgress)"/>
  <!-- Labels -->
  <text x="362" y="480" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Previously Circulating (56%)</text>
  <text x="816" y="480" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">New Unlock (28%)</text>
  <text x="1050" y="480" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Locked (16%)</text>

  <!-- Insight panel -->
  <rect x="60" y="500" width="1080" height="40" rx="12" fill="rgba(245, 158, 11, 0.06)" stroke="rgba(245, 158, 11, 0.15)" stroke-width="1"/>
  <text x="80" y="525" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400">Cliff unlock to core contributors. Historically, unlocks of this magnitude create significant sell pressure.</text>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="rgba(0, 0, 0, 0.3)"/>
  <text x="60" y="595" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">degen0x.com/learn/crypto-tokenomics-guide-2026</text>
  <text x="1140" y="595" fill="url(#brandGrad2)" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="end">degen0x</text>
</svg>
