<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#22c55e" opacity="0.04"/>
  <circle cx="150" cy="500" r="120" fill="#ef4444" opacity="0.03"/>

  <!-- Price chart area (simplified) -->
  <g transform="translate(680, 180)">
    <!-- Chart background -->
    <rect x="0" y="0" width="440" height="280" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="40" y1="40" x2="400" y2="40" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="40" y1="100" x2="400" y2="100" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="40" y1="160" x2="400" y2="160" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="40" y1="220" x2="400" y2="220" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- Price labels -->
    <text x="30" y="44" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="10">$72K</text>
    <text x="30" y="104" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="10">$71K</text>
    <text x="30" y="164" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="10">$70K</text>
    <text x="30" y="224" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="10">$68K</text>

    <!-- Price line: drop then recovery -->
    <polyline points="40,100 80,110 120,140 160,200 200,220 220,200 260,140 300,100 340,80 380,70 400,60"
      fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Green fill under recovery -->
    <polygon points="200,220 220,200 260,140 300,100 340,80 380,70 400,60 400,240 200,240"
      fill="url(#greenGlow)"/>

    <!-- Red fill under drop -->
    <polygon points="40,100 80,110 120,140 160,200 200,220 200,240 40,240"
      fill="url(#redGlow)"/>

    <!-- Annotation: dip -->
    <circle cx="200" cy="220" r="4" fill="#ef4444" filter="url(#glow)"/>
    <text x="200" y="250" text-anchor="middle" fill="#ef4444" font-family="Inter, sans-serif" font-size="11" font-weight="600">$68K LOW</text>

    <!-- Annotation: recovery -->
    <circle cx="400" cy="60" r="4" fill="#22c55e" filter="url(#glow)"/>
    <text x="380" y="50" text-anchor="end" fill="#22c55e" font-family="Inter, sans-serif" font-size="11" font-weight="600">$71K</text>

    <!-- Time labels -->
    <text x="40" y="268" fill="#6e7681" font-family="Inter, sans-serif" font-size="10">Sat</text>
    <text x="200" y="268" fill="#6e7681" font-family="Inter, sans-serif" font-size="10">Sun PM</text>
    <text x="400" y="268" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="10">Mon PM</text>
  </g>

  <!-- Logo area -->
  <text x="60" y="55" fill="#8b949e" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="0.05em">DEGEN0X</text>

  <!-- Main title -->
  <text x="60" y="140" fill="#e6edf3" font-family="Inter, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">BTC Surges to $71K</text>

  <!-- Subtitle -->
  <text x="60" y="180" fill="#8b949e" font-family="Inter, sans-serif" font-size="20">Trump postpones Iran strikes → instant relief rally</text>

  <!-- Stats cards -->
  <g transform="translate(60, 220)">
    <!-- Stat 1: +5% -->
    <rect x="0" y="0" width="160" height="70" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="20" y="30" fill="#22c55e" font-family="Inter, sans-serif" font-size="28" font-weight="700">+5%</text>
    <text x="20" y="52" fill="#8b949e" font-family="Inter, sans-serif" font-size="12">Intraday Rally</text>

    <!-- Stat 2: $400M liq -->
    <rect x="180" y="0" width="160" height="70" rx="12" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="200" y="30" fill="#ef4444" font-family="Inter, sans-serif" font-size="28" font-weight="700">$400M</text>
    <text x="200" y="52" fill="#8b949e" font-family="Inter, sans-serif" font-size="12">Liquidations (24h)</text>

    <!-- Stat 3: F&G 8 -->
    <rect x="360" y="0" width="160" height="70" rx="12" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
    <text x="380" y="30" fill="#f59e0b" font-family="Inter, sans-serif" font-size="28" font-weight="700">F&amp;G: 8</text>
    <text x="380" y="52" fill="#8b949e" font-family="Inter, sans-serif" font-size="12">Extreme Fear (Day 47)</text>
  </g>

  <!-- Whale + institutional context -->
  <g transform="translate(60, 340)">
    <text x="0" y="0" fill="#6e7681" font-family="Inter, sans-serif" font-size="13" font-weight="500">WHILE RETAIL PANICS:</text>
    <text x="0" y="28" fill="#e6edf3" font-family="Inter, sans-serif" font-size="15">🐋 Whales: 270K BTC accumulated (30d, 13-year high)</text>
    <text x="0" y="52" fill="#e6edf3" font-family="Inter, sans-serif" font-size="15">🏦 Morgan Stanley: Updated Bitcoin ETF application</text>
    <text x="0" y="76" fill="#e6edf3" font-family="Inter, sans-serif" font-size="15">💰 Bitmine: $138M ETH purchase (3rd straight week)</text>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(255,255,255,0.02)"/>
  <text x="60" y="620" fill="#6e7681" font-family="Inter, sans-serif" font-size="13">degen0x.com</text>
  <text x="1140" y="620" text-anchor="end" fill="#6e7681" font-family="Inter, sans-serif" font-size="13">March 23, 2026</text>
</svg>