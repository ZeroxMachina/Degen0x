<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f1629"/>
    </linearGradient>
    <linearGradient id="brandGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad2)"/>

  <!-- Decorative background elements -->
  <circle cx="1050" cy="120" r="180" fill="#4f46e5" opacity="0.04" filter="url(#bgGlow)"/>
  <circle cx="150" cy="520" r="120" fill="#0891b2" opacity="0.05" filter="url(#bgGlow)"/>
  <circle cx="700" cy="350" r="250" fill="#d97706" opacity="0.02" filter="url(#bgGlow)"/>

  <!-- Logo -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#8b949e">degen0x</text>

  <!-- Big number badge -->
  <rect x="880" y="40" width="260" height="120" rx="20" fill="rgba(79,70,229,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="1010" y="100" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="#6366f1" text-anchor="middle" filter="url(#glow2)">30+</text>
  <text x="1010" y="140" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#818cf8" text-anchor="middle">NEW GUIDES</text>

  <!-- Main title -->
  <text x="60" y="180" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Biggest Content</text>
  <text x="60" y="245" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Drop Ever</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Free crypto education. No signup. Just signal.</text>

  <!-- Topic pills row 1 -->
  <rect x="60" y="325" width="200" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="160" y="351" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">Flash Loans</text>

  <rect x="280" y="325" width="240" height="40" rx="20" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="400" y="351" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22d3ee" text-anchor="middle">Ethereum Fusaka</text>

  <rect x="540" y="325" width="250" height="40" rx="20" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="665" y="351" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">Solana Firedancer</text>

  <!-- Topic pills row 2 -->
  <rect x="60" y="380" width="120" height="40" rx="20" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="120" y="406" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">zkML</text>

  <rect x="200" y="380" width="220" height="40" rx="20" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="310" y="406" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#4ade80" text-anchor="middle">Bitcoin Covenants</text>

  <rect x="440" y="380" width="220" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="550" y="406" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">MiCA Regulation</text>

  <rect x="680" y="380" width="200" height="40" rx="20" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="780" y="406" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22d3ee" text-anchor="middle">AI Agent Wallets</text>

  <!-- Topic pills row 3 -->
  <rect x="60" y="435" width="180" height="40" rx="20" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="150" y="461" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">DeFi Vaults</text>

  <rect x="260" y="435" width="200" height="40" rx="20" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="360" y="461" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">Real Yield DeFi</text>

  <rect x="480" y="435" width="220" height="40" rx="20" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="590" y="461" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#4ade80" text-anchor="middle">DCA Strategy Guide</text>

  <rect x="720" y="435" width="180" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="810" y="461" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">DVT Guide</text>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="100" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="582" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#6e7681">degen0x.com/learn</text>

  <!-- Bottom gradient bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brandGrad2)"/>
</svg>
