<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="fear-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="red-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent3)"/>

  <!-- Red atmosphere -->
  <circle cx="600" cy="300" r="350" fill="url(#red-bg)"/>

  <!-- Logo -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#818cf8" letter-spacing="0.05em">DEGEN0X</text>

  <!-- Record badge -->
  <rect x="60" y="75" width="200" height="32" rx="16" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="80" y="96" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ef4444">ALL-TIME RECORD</text>

  <!-- Giant number -->
  <text x="600" y="220" font-family="Inter, system-ui, sans-serif" font-size="140" font-weight="900" fill="url(#fear-gradient)" text-anchor="middle" letter-spacing="-0.03em">DAY 51</text>
  <text x="600" y="265" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ef4444" text-anchor="middle">EXTREME FEAR</text>
  <text x="600" y="295" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Longest sustained fear reading in crypto history</text>

  <!-- Comparison cards -->
  <rect x="60" y="330" width="340" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="358" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e" letter-spacing="0.05em">MARCH 2020 — COVID</text>
  <text x="85" y="390" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3">28 days</text>
  <text x="85" y="415" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">Then:</text>
  <text x="125" y="415" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#22c55e">+130% in 90 days</text>
  <text x="85" y="438" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">BTC $5K → $11.5K</text>

  <rect x="430" y="330" width="340" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="455" y="358" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e" letter-spacing="0.05em">JUNE 2022 — LUNA/3AC</text>
  <text x="455" y="390" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3">41 days</text>
  <text x="455" y="415" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">Then:</text>
  <text x="495" y="415" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#22c55e">+45% in 90 days</text>
  <text x="455" y="438" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">BTC $17.5K → $25.2K</text>

  <rect x="800" y="330" width="340" height="120" rx="16" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="825" y="358" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" letter-spacing="0.05em">MARCH 2026 — NOW</text>
  <text x="825" y="390" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" fill="#ef4444">51 days</text>
  <text x="825" y="415" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">Score:</text>
  <text x="875" y="415" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f59e0b">8–11 (single digits)</text>
  <text x="825" y="438" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">BTC ~$70K — institutions accumulating</text>

  <!-- Glassnode stat -->
  <rect x="60" y="475" width="1080" height="60" rx="12" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="600" y="510" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#e6edf3" text-anchor="middle">
    <tspan fill="#8b949e">Glassnode:</tspan> Entries below F&amp;G 25 → <tspan font-weight="800" fill="#22c55e">+18% avg 30-day return</tspan>
    <tspan fill="#8b949e"> vs +2.3% during greed</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="607" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#818cf8">degen0x.com/tools/fear-greed-timeline</text>
  <text x="1140" y="607" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 25, 2026</text>
</svg>