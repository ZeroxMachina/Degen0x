<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6f3dd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d4edd;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#backgroundGradient)"/>

  <!-- Accent bar (left side) -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGradient)"/>

  <!-- Decorative gradient circles (top-right) -->
  <circle cx="1100" cy="80" r="120" fill="#6f3dd4" opacity="0.1"/>
  <circle cx="1150" cy="120" r="80" fill="#9d4edd" opacity="0.08"/>

  <!-- Main title -->
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    Grayscale Files
  </text>
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    DeFi ETF
  </text>

  <!-- Subtitle -->
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="42" font-weight="300" fill="#b0b0d9">
    HYPE — First DeFi-Focused ETF
  </text>

  <!-- Divider line -->
  <line x1="80" y1="290" x2="1000" y2="290" stroke="url(#accentGradient)" stroke-width="3" opacity="0.6"/>

  <!-- Key data points section -->
  <g>
    <!-- Point 1: DeFi tokens -->
    <circle cx="95" cy="360" r="8" fill="#9d4edd"/>
    <text x="120" y="370" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff">
      Tracks DeFi Tokens
    </text>
    <text x="120" y="400" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#b0b0d9">
      UNI, AAVE, MKR, LDO, and more
    </text>

    <!-- Point 2: Grayscale lineup -->
    <circle cx="95" cy="480" r="8" fill="#9d4edd"/>
    <text x="120" y="490" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff">
      Grayscale's Growing ETF Lineup
    </text>
    <text x="120" y="520" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#b0b0d9">
      Institutional crypto adoption accelerates
    </text>
  </g>

  <!-- Right side DeFi context -->
  <g>
    <text x="650" y="360" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#9d4edd">
      DeFi TVL Context
    </text>
    <rect x="650" y="375" width="500" height="120" fill="#1a0a2e" stroke="#6f3dd4" stroke-width="2" opacity="0.3"/>
    <text x="670" y="410" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#ffffff">
      • Grayscale enters DeFi token space with institutional credibility
    </text>
    <text x="670" y="450" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#ffffff">
      • Major validation for protocol tokens (UNI, AAVE, MKR, LDO)
    </text>
    <text x="670" y="490" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#ffffff">
      • Opens ETF access to retail and institutional investors
    </text>
  </g>

  <!-- CTA -->
  <rect x="80" y="540" width="500" height="70" rx="8" fill="url(#accentGradient)" opacity="0.2" stroke="#9d4edd" stroke-width="2"/>
  <text x="300" y="580" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#9d4edd" text-anchor="middle">
    Read the Full DeFi Guide
  </text>

  <!-- degen0x branding (bottom-right) -->
  <text x="1080" y="600" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#6f3dd4" text-anchor="end">
    degen0x.com
  </text>
  <circle cx="1120" cy="615" r="6" fill="#9d4edd"/>
</svg>
