<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accentBar)"/>

  <!-- Decorative red glow circle -->
  <circle cx="950" cy="200" r="180" fill="url(#redGlow)" opacity="0.5"/>
  <circle cx="150" cy="500" r="120" fill="url(#redGlow)" opacity="0.3"/>

  <!-- Warning icon -->
  <g transform="translate(60, 50)">
    <circle cx="20" cy="20" r="16" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
    <text x="20" y="26" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">!</text>
  </g>

  <!-- degen0x logo text -->
  <text x="100" y="70" fill="url(#brandGrad)" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="0.05em">degen0x</text>

  <!-- Category tag -->
  <rect x="60" y="95" width="140" height="28" rx="14" fill="rgba(239, 68, 68, 0.15)" stroke="rgba(239, 68, 68, 0.3)" stroke-width="1"/>
  <text x="130" y="114" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="0.08em">SECURITY ALERT</text>

  <!-- Main title -->
  <text x="60" y="185" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">Drift Protocol</text>
  <text x="60" y="240" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.02em">$285M Hack Analysis</text>

  <!-- Subtitle -->
  <text x="60" y="280" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Largest DeFi exploit of 2026 — Oracle manipulation + admin key compromise</text>

  <!-- Data cards row -->
  <!-- Card 1: Attack Duration -->
  <rect x="60" y="320" width="245" height="100" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <text x="80" y="352" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">ATTACK DURATION</text>
  <text x="80" y="395" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700">12 min</text>

  <!-- Card 2: Withdrawals -->
  <rect x="325" y="320" width="245" height="100" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <text x="345" y="352" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">RAPID WITHDRAWALS</text>
  <text x="345" y="395" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700">31 txns</text>

  <!-- Card 3: Multisig -->
  <rect x="590" y="320" width="245" height="100" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <text x="610" y="352" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">WEAKENED MULTISIG</text>
  <text x="610" y="395" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700">2 of 5</text>

  <!-- Card 4: Attribution -->
  <rect x="855" y="320" width="280" height="100" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <text x="875" y="352" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">ATTRIBUTION</text>
  <text x="875" y="395" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700">DPRK/Lazarus</text>

  <!-- Insight panel -->
  <rect x="60" y="445" width="1080" height="70" rx="16" fill="rgba(239, 68, 68, 0.06)" stroke="rgba(239, 68, 68, 0.15)" stroke-width="1"/>
  <text x="80" y="475" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">Not a smart contract bug.</text>
  <text x="80" y="498" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400">Admin key compromise via durable nonces + oracle manipulation. Funds bridged to ETH via CCTP. 12+ Solana protocols affected.</text>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="rgba(0, 0, 0, 0.3)"/>
  <text x="60" y="590" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">degen0x.com/learn/drift-protocol-285m-hack-analysis-2026</text>
  <text x="1140" y="590" fill="url(#brandGrad)" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="end">degen0x</text>
</svg>
