  <text x="60" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#94a3b8">Covers JPMorgan, BlackRock, Goldman Sachs, Citi — what they're building and why.</text>
  <text x="60" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="url(#accent2)">degen0x.com/learn/tradfi-defi-convergence-guide-2026</text>

