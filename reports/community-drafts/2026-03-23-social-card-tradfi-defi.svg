  <!-- JPMorgan -->
  <rect x="60" y="240" width="260" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">JPMorgan Onyx</text>
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#06b6d4" filter="url(#glow2)">$1B/day</text>
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Tokenized payments</text>

