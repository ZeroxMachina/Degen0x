  <rect x="480" y="385" width="200" height="40" rx="20" fill="#22c55e" opacity="0.15"/>
  <text x="580" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4ade80" text-anchor="middle">Institutional Custody</text>

  <rect x="700" y="385" width="200" height="40" rx="20" fill="#f59e0b" opacity="0.15"/>
  <text x="800" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">Regulatory Clarity</text>

  <rect x="920" y="385" width="220" height="40" rx="20" fill="#ef4444" opacity="0.15"/>
  <text x="1030" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#f87171" text-anchor="middle">$500B+ Inst. Crypto</text>

