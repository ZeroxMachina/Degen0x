  <rect x="340" y="240" width="260" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="360" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">BlackRock BUIDL</text>
  <text x="360" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#8b5cf6" filter="url(#glow2)">$1.3B</text>
