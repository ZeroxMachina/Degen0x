    <line x1="200" y1="0" x2="830" y2="630" stroke="#a78bfa" stroke-width="1"/>
    <line x1="400" y1="0" x2="1030" y2="630" stroke="#a78bfa" stroke-width="1"/>
    <line x1="600" y1="0" x2="1200" y2="600" stroke="#a78bfa" stroke-width="1"/>
