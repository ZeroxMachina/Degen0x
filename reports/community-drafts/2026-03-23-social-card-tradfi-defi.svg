  <text x="60" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f8fafc" letter-spacing="-0.5">TradFi-DeFi Convergence</text>
  <text x="60" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f8fafc" letter-spacing="-0.5">2026</text>

