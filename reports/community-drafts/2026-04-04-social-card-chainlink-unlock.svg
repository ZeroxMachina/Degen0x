<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#375bd2"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#375bd2" opacity="0.06"/>
  <circle cx="150" cy="500" r="120" fill="#0891b2" opacity="0.04"/>

  <!-- Badge: TOKEN UNLOCK -->
  <rect x="60" y="40" width="170" height="32" rx="16" fill="#375bd2" opacity="0.25"/>
  <text x="145" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#6d9fff" text-anchor="middle" letter-spacing="1.5">TOKEN UNLOCK</text>

  <!-- Badge: APRIL 2026 -->
  <rect x="245" y="40" width="140" height="32" rx="16" fill="#d97706" opacity="0.2"/>
  <text x="315" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="1.5">APRIL 2026</text>

  <!-- Logo text -->
  <text x="1090" y="62" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#6366f1" text-anchor="end" letter-spacing="-0.5">degen0x</text>

  <!-- Main title -->
  <text x="60" y="135" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="#e6edf3" letter-spacing="-1.5">Chainlink Unlocks 19M LINK</text>
  <text x="60" y="185" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#8b949e" letter-spacing="-0.5">$165M Quarterly Supply Release</text>

  <!-- Stat cards row -->
  <!-- Card 1: 19M LINK -->
  <rect x="60" y="225" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="265" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="1">TOKENS UNLOCKED</text>
  <text x="85" y="310" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#6d9fff">19M</text>
  <text x="205" y="310" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">LINK</text>

  <!-- Card 2: $125M to Binance -->
  <rect x="330" y="225" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="355" y="265" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="1">SENT TO BINANCE</text>
  <text x="355" y="310" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#f59e0b">$125M</text>
  <text x="478" y="310" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">14.37M</text>

  <!-- Card 3: $40M Multisig -->
  <rect x="600" y="225" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="625" y="265" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="1">STAKING REWARDS</text>
  <text x="625" y="310" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#22c55e">$40M</text>
  <text x="730" y="310" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">4.62M</text>

  <!-- Card 4: April Total -->
  <rect x="870" y="225" width="270" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="895" y="265" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="1">APRIL TOTAL UNLOCKS</text>
  <text x="895" y="310" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#ef4444">$600M+</text>

  <!-- Context section -->
  <rect x="60" y="375" width="1080" height="130" rx="16" fill="rgba(55,91,210,0.08)" stroke="rgba(55,91,210,0.15)" stroke-width="1"/>
  <text x="85" y="410" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#6d9fff" letter-spacing="1">APRIL TOKEN UNLOCK WAVE</text>

  <!-- Unlock items -->
  <circle cx="100" cy="440" r="5" fill="#6d9fff"/>
  <text x="115" y="445" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">ARB $180M</text>

  <circle cx="280" cy="440" r="5" fill="#8b5cf6"/>
  <text x="295" y="445" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">APT $120M</text>

  <circle cx="450" cy="440" r="5" fill="#f59e0b"/>
  <text x="465" y="445" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">OP $95M</text>

  <circle cx="600" cy="440" r="5" fill="#22c55e"/>
  <text x="615" y="445" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">SUI $85M</text>

  <circle cx="750" cy="440" r="5" fill="#375bd2"/>
  <text x="765" y="445" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">LINK $165M</text>

  <text x="85" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Historical pattern: 5-15% dip before unlock, 3-10% bounce 2 weeks after. Supply pressure ≠ permanent selling.</text>

  <!-- Market context bar -->
  <rect x="60" y="530" width="1080" height="55" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="85" y="563" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">BTC $66,855</text>
  <text x="260" y="563" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">ETH $2,058 (+4.8% wk)</text>
  <text x="490" y="563" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">F&G: 11 Extreme Fear</text>
  <text x="720" y="563" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">Stablecoins: $316B ATH</text>
  <text x="970" y="563" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#6366f1">degen0x.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
