<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Decorative elements -->
  <circle cx="1000" cy="150" r="200" fill="#ef4444" opacity="0.04" filter="url(#glow2)"/>
  <circle cx="150" cy="450" r="150" fill="#22c55e" opacity="0.04" filter="url(#glow2)"/>

  <!-- Top badge -->
  <rect x="40" y="30" width="320" height="36" rx="18" fill="url(#fearGrad)" opacity="0.85"/>
  <text x="200" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1.5">DAY 47 — EXTREME FEAR</text>

  <!-- Main headline -->
  <text x="60" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#ffffff">47 Days of Extreme Fear.</text>
  <text x="60" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#ffffff">BTC Holds $71,000.</text>

  <!-- Subheadline -->
  <text x="60" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8">Widest sentiment-price divergence since November 2022</text>

  <!-- Fear gauge visualization -->
  <rect x="60" y="250" width="520" height="140" rx="12" fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ef4444" letter-spacing="1">FEAR &amp; GREED INDEX</text>
  <!-- Gauge bar background -->
  <rect x="80" y="300" width="480" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
  <!-- Gauge bar fill (11/100) -->
  <rect x="80" y="300" width="53" height="16" rx="8" fill="url(#fearGrad)"/>
  <!-- Gauge marker -->
  <circle cx="133" cy="308" r="10" fill="#ef4444" stroke="#fff" stroke-width="2"/>
  <text x="133" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">11</text>
  <!-- Labels -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ef4444">EXTREME FEAR</text>
  <text x="560" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e" text-anchor="end">EXTREME GREED</text>
  <!-- Streak counter -->
  <text x="80" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#f97316" font-weight="600">47 consecutive days</text>
  <text x="290" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">— longest since post-FTX (late 2022)</text>

  <!-- Price panel -->
  <rect x="620" y="250" width="520" height="140" rx="12" fill="rgba(34,197,94,0.06)" stroke="#22c55e" stroke-opacity="0.2" stroke-width="1"/>
  <text x="640" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#22c55e" letter-spacing="1">PRICE ACTION</text>
  <text x="640" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">$71,043</text>
  <text x="640" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#22c55e">+4% from $68,302 support</text>
  <text x="640" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">BTC dominance ~56.6% | ETH +5.16%</text>

  <!-- Stats row -->
  <rect x="60" y="415" width="270" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">SPOT BTC ETF (MARCH)</text>
  <text x="80" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#22c55e">$1.3B inflows</text>

  <rect x="350" y="415" width="270" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="370" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">TOTAL ETF AUM</text>
  <text x="370" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#06b6d4">$128B</text>

  <rect x="640" y="415" width="270" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="660" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">STABLECOIN SUPPLY</text>
  <text x="660" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#f59e0b">$304B ATH</text>

  <!-- Signal box -->
  <rect x="60" y="515" width="1080" height="50" rx="10" fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
  <text x="80" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f97316" font-weight="600">HISTORICAL PATTERN:</text>
  <text x="280" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">Extreme fear + price strength above key support has preceded 15-20% rallies within 30 days, every cycle since 2019.</text>

  <!-- Bottom bar -->
  <rect x="0" y="575" width="1200" height="55" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="608" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#fearGrad)">degen0x.com</text>
  <text x="1140" y="608" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="end">March 24, 2026</text>
</svg>