  <text x="90" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="110" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">Any URL triggers onchain transactions</text>
  <text x="90" y="350" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="110" y="350" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">Dialect ecosystem + 10 providers</text>
  <text x="90" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="110" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">6 use cases: payments, NFTs, DeFi, governance</text>
  <text x="90" y="410" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="110" y="410" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">Developer quick start (4 steps)</text>

  <!-- Stats badges -->
  <rect x="90" y="440" width="120" height="34" rx="17" fill="rgba(153,69,255,0.12)"/>
  <text x="150" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#9945FF" text-anchor="middle">~3000 words</text>
  <rect x="225" y="440" width="120" height="34" rx="17" fill="rgba(20,241,149,0.12)"/>
  <text x="285" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#14F195" text-anchor="middle">9 sections</text>
  <rect x="360" y="440" width="100" height="34" rx="17" fill="rgba(255,255,255,0.06)"/>
  <text x="410" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" text-anchor="middle">6 FAQs</text>

