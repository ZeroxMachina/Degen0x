  <text x="120" y="268" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#9945FF">🔗</text>

  <text x="165" y="252" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="url(#solanaGrad)">Solana Blinks &amp; Actions</text>
  <text x="165" y="278" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">Shareable blockchain links explained</text>

