  <text x="725" y="278" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">Lending, fractionalization &amp; yield</text>

  <!-- NFTFi features -->
  <text x="650" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="670" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">Blend (Blur): 93% market share, zero fees</text>
  <text x="650" y="350" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="670" y="350" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">3 lending models: P2P, P2Pool, CDP</text>
  <text x="650" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="670" y="380" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">Fractionalization via NFTX vaults</text>
  <text x="650" y="410" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">→</text>
  <text x="670" y="410" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#e6edf3">4 yield strategies + 5 risk categories</text>

  <!-- Stats badges -->
  <rect x="650" y="440" width="120" height="34" rx="17" fill="rgba(139,92,246,0.12)"/>
  <text x="710" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">~3500 words</text>
  <rect x="785" y="440" width="120" height="34" rx="17" fill="rgba(6,182,212,0.12)"/>
  <text x="845" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4" text-anchor="middle">9 sections</text>
  <rect x="920" y="440" width="100" height="34" rx="17" fill="rgba(255,255,255,0.06)"/>
  <text x="970" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" text-anchor="middle">6 FAQs</text>

  <!-- Bottom bar -->
