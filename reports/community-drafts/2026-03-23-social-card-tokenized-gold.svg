<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1425"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Decorative gold circles -->
  <circle cx="950" cy="150" r="180" fill="#f59e0b" opacity="0.04"/>
  <circle cx="1020" cy="200" r="120" fill="#fbbf24" opacity="0.06"/>
  <circle cx="200" cy="500" r="100" fill="#d97706" opacity="0.03"/>

  <!-- Gold coin icon -->
  <circle cx="1000" cy="280" r="70" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="1000" cy="280" r="55" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.2"/>
  <text x="1000" y="295" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#f59e0b" text-anchor="middle" opacity="0.4">Au</text>

