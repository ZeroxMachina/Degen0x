  <text x="60" y="602" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="url(#brandGrad)">degen0x.com/learn/tokenized-gold-guide-2026</text>
  <text x="1140" y="602" font-family="Inter, Arial, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">Free · No signup · Just alpha</text>
