<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a1025"/>
    </linearGradient>
    <linearGradient id="accentBar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Accent bar top -->
  <rect width="1200" height="4" fill="url(#accentBar2)"/>

  <!-- Decorative glow circles -->
  <circle cx="200" cy="400" r="250" fill="#6366f1" opacity="0.03" filter="url(#softGlow2)"/>
  <circle cx="1000" cy="200" r="200" fill="#f59e0b" opacity="0.03" filter="url(#softGlow2)"/>

  <!-- degen0x logo text -->
  <text x="60" y="60" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="0.05em">degen0x</text>

