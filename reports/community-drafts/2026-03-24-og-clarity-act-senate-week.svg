  <rect x="905" y="135" width="220" height="36" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="925" y="158" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">✓  Activity Rewards OK</text>

  <text x="665" y="198" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="13">Balance rewards restricted • Staking/lending/LP rewards preserved</text>

  <!-- Stat boxes -->
  <rect x="640" y="240" width="240" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="665" y="270" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">STABLECOIN SUPPLY</text>
  <text x="665" y="308" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800">$304B</text>
  <text x="828" y="308" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">ATH</text>

  <rect x="910" y="240" width="240" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="935" y="270" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">BTC PRICE</text>
  <text x="935" y="308" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800">$71,043</text>

  <rect x="640" y="365" width="240" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="665" y="395" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">SPOT ETF INFLOWS (MAR)</text>
  <text x="665" y="433" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800">$1.4B</text>

  <rect x="910" y="365" width="240" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="935" y="395" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="0.05em">FEAR &amp; GREED</text>
  <text x="935" y="433" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800">11</text>
  <text x="995" y="433" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500">Extreme Fear</text>

  <!-- Bottom signal -->
  <rect x="640" y="490" width="510" height="45" rx="12" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <circle cx="670" cy="512" r="5" fill="#818cf8"/>
  <text x="690" y="518" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">SEC classified 16 tokens as digital commodities (Mar 17) — regulatory clarity accelerating</text>

  <!-- Bottom bar -->
  <rect y="595" width="1200" height="35" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="618" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">degen0x.com/learn/crypto-regulations-2026</text>
  <text x="1140" y="618" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" text-anchor="end">Mar 24, 2026</text>
</svg>