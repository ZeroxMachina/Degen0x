  <line x1="105" y1="453" x2="105" y2="478" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="105" cy="492" r="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="130" y="489" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Committee Markup — Late April</text>
  <text x="130" y="505" fill="#6e7681" font-family="Inter, system-ui, sans-serif" font-size="12">Must pass by May or dies this session</text>

