  <!-- Timeline steps -->
  <!-- Step 1: Done -->
  <circle cx="105" cy="385" r="10" fill="#22c55e"/>
  <text x="105" y="389" fill="#080d1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" text-anchor="middle">✓</text>
  <text x="130" y="382" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Bipartisan Deal Reached</text>
  <text x="130" y="400" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">Tillis (R) + Alsobrooks (D) — Mar 21</text>

  <!-- Step 2: This week -->
  <line x1="105" y1="398" x2="105" y2="425" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="105" cy="440" r="10" fill="#f59e0b" filter="url(#glow2)"/>
  <text x="105" y="444" fill="#080d1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" text-anchor="middle">→</text>
  <text x="130" y="437" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Draft Language Review — THIS WEEK</text>
  <text x="130" y="455" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="12">Crypto firms + banks + Senate Banking Committee</text>

