  <text x="60" y="280" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400">Crypto firms &amp; banks meeting with Senate to examine stablecoin yield framework.</text>

  <!-- Timeline panel -->
  <rect x="60" y="315" width="520" height="200" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
