<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="url(#green-glow)"/>
  <circle cx="150" cy="500" r="120" fill="url(#green-glow)"/>

  <!-- Logo area -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#818cf8" letter-spacing="0.05em">DEGEN0X</text>

  <!-- Status badge -->
  <rect x="60" y="75" width="200" height="32" rx="16" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <circle cx="80" cy="91" r="5" fill="#22c55e"/>
  <text x="92" y="96" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">LEGISLATIVE BREAKTHROUGH</text>

  <!-- Main title -->
  <text x="60" y="160" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">CLARITY Act:</text>
  <text x="60" y="215" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Stablecoin Yield Deal</text>

  <!-- Subtitle -->
  <text x="60" y="255" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Tillis-Alsobrooks bipartisan compromise — backed by the White House</text>

  <!-- Deal cards -->
  <!-- Passive yield - banned -->
  <rect x="60" y="290" width="520" height="65" rx="12" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="85" y="318" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444">BANNED</text>
  <text x="85" y="340" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Passive yield on stablecoin balances</text>

  <!-- Activity rewards - allowed -->
  <rect x="60" y="368" width="520" height="65" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="85" y="396" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e">ALLOWED</text>
  <text x="85" y="418" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Activity-based rewards (trading, lending, payments)</text>

  <!-- Timeline panel -->
  <rect x="620" y="290" width="520" height="143" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="650" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#8b949e" letter-spacing="0.05em">TIMELINE</text>

  <!-- Timeline items -->
  <circle cx="660" cy="350" r="4" fill="#f59e0b"/>
  <text x="675" y="355" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Banking Committee markup: <tspan font-weight="700" fill="#f59e0b">Late April</tspan></text>

  <circle cx="660" cy="380" r="4" fill="#0891b2"/>
  <text x="675" y="385" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Senate floor vote: <tspan font-weight="700" fill="#0891b2">May–June 2026</tspan></text>

  <circle cx="660" cy="410" r="4" fill="#6366f1"/>
  <text x="675" y="415" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Votes needed: <tspan font-weight="700" fill="#6366f1">60 Senators</tspan></text>

  <!-- Bottom stats row -->
  <rect x="60" y="460" width="260" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="492" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">$304B</text>
  <text x="85" y="520" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Stablecoins ATH</text>

  <rect x="340" y="460" width="260" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="365" y="492" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#6366f1">99%</text>
  <text x="365" y="520" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Yield Issue Resolved</text>

  <rect x="620" y="460" width="260" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="645" y="492" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#0891b2">FIT21+</text>
  <text x="645" y="520" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Clearest Path Since</text>

  <rect x="900" y="460" width="240" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="925" y="492" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#f59e0b">Bipartisan</text>
  <text x="925" y="520" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">White House Backed</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="607" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#818cf8">degen0x.com</text>
  <text x="1140" y="607" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 25, 2026</text>
</svg>