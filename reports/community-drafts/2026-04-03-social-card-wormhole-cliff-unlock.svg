<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#0c0a1f"/>
      <stop offset="100%" style="stop-color:#080d1c"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="redGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="50" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad2)"/>

  <!-- Ambient glow -->
  <circle cx="900" cy="200" r="250" fill="#8b5cf6" opacity="0.06" filter="url(#glow2)"/>
  <circle cx="300" cy="450" r="200" fill="#ef4444" opacity="0.04" filter="url(#glow2)"/>

  <!-- degen0x logo -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Badges -->
  <rect x="160" y="36" width="105" height="26" rx="13" fill="url(#purpleGrad)" opacity="0.9"/>
  <text x="213" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">TOKEN UNLOCK</text>

  <rect x="275" y="36" width="120" height="26" rx="13" fill="url(#redGrad2)" opacity="0.9"/>
  <text x="335" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">CLIFF EVENT</text>

  <!-- Main title -->
  <text x="60" y="125" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">Wormhole Unlocked</text>
  <text x="60" y="178" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="url(#accentGrad2)" letter-spacing="-0.02em">28% of Supply in One Day</text>

  <!-- Subtitle -->
  <text x="60" y="215" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">1.28 billion $W tokens released — the largest cliff unlock of 2026</text>

  <!-- 4 Stat Cards -->
  <!-- Card 1: Tokens Unlocked -->
  <rect x="60" y="250" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(139,92,246,0.2)" stroke-width="1" filter="url(#cardShadow2)"/>
  <text x="80" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">TOKENS UNLOCKED</text>
  <text x="80" y="332" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#8b5cf6">1.28B</text>
  <text x="80" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Core contributor vesting</text>

  <!-- Card 2: Supply Impact -->
  <rect x="330" y="250" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(239,68,68,0.2)" stroke-width="1" filter="url(#cardShadow2)"/>
  <text x="350" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">SUPPLY IMPACT</text>
  <text x="350" y="332" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#ef4444">28%</text>
  <text x="350" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">of total supply unlocked</text>

  <!-- Card 3: Token Price -->
  <rect x="600" y="250" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow2)"/>
  <text x="620" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">W TOKEN PRICE</text>
  <text x="620" y="332" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#e6edf3">$0.01</text>
  <text x="620" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ef4444">Down from $0.15 peak</text>

  <!-- Card 4: New Circulating -->
  <rect x="870" y="250" width="270" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(245,158,11,0.2)" stroke-width="1" filter="url(#cardShadow2)"/>
  <text x="890" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">CIRCULATING SUPPLY</text>
  <text x="890" y="332" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#f59e0b">~84%</text>
  <text x="890" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Up from 56% pre-unlock</text>

  <!-- Dilution visualization bar -->
  <text x="60" y="415" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.05em">SUPPLY DILUTION IMPACT</text>

  <!-- Supply bar — before -->
  <rect x="60" y="432" width="1080" height="36" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Previously circulating (56%) -->
  <rect x="62" y="434" width="600" height="32" rx="16" fill="rgba(99,102,241,0.4)"/>
  <text x="362" y="455" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">Previously Circulating: 56%</text>
  <!-- New unlock (28%) -->
  <rect x="662" y="434" width="300" height="32" rx="0" fill="rgba(239,68,68,0.4)"/>
  <text x="812" y="455" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f87171" text-anchor="middle">New Unlock: 28%</text>
  <!-- Remaining locked (16%) -->
  <text x="990" y="455" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681" text-anchor="middle">Locked: 16%</text>

  <!-- Key takeaway -->
  <rect x="60" y="490" width="540" height="56" rx="16" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="80" y="515" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f87171">⚠ Check vesting schedules before buying any token.</text>
  <text x="80" y="535" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Cliff unlocks can destroy token value overnight.</text>

  <!-- CTA -->
  <rect x="640" y="490" width="500" height="56" rx="28" fill="url(#accentGrad2)" opacity="0.9"/>
  <text x="890" y="524" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Tokenomics Guide → degen0x.com</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="610" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1140" y="610" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">April 3, 2026 • Wormhole Cliff Unlock</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad2)"/>
</svg>