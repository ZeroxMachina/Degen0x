  <text x="940" y="505" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">FIT21+</text>
  <text x="940" y="518" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">In Progress</text>

