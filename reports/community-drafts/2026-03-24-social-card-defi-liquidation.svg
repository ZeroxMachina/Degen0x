  <text x="130" y="76" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">NEW GUIDE</text>

  <!-- Title -->
  <text x="60" y="148" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">DeFi Liquidation</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Protection Guide</text>

  <!-- Subtitle -->
  <text x="60" y="245" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#8b949e" font-weight="400">Smart vaults, AI agents, and the tools that saved $7.7M in one wave</text>

  <!-- Stat boxes -->
  <!-- Box 1: Savings -->
  <rect x="60" y="285" width="230" height="90" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="175" y="325" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e" text-anchor="middle" filter="url(#glow2)">$7.7M</text>
  <text x="175" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Saved in Feb 2026 Wave</text>

  <!-- Box 2: Users Protected -->
  <rect x="310" y="285" width="230" height="90" rx="12" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="425" y="325" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4" text-anchor="middle" filter="url(#glow2)">382 Users</text>
  <text x="425" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Protected by DeFi Saver</text>

  <!-- Box 3: Savings Rate -->
  <rect x="560" y="285" width="230" height="90" rx="12" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="675" y="325" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#6366f1" text-anchor="middle" filter="url(#glow2)">91.6%</text>
  <text x="675" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Savings Rate</text>

  <!-- Platform comparison chips -->
  <g transform="translate(60, 410)">
    <rect width="200" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="100" y="24" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3" text-anchor="middle" dominant-baseline="central">Morpho</text>
    <text x="100" y="42" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">$5.8B TVL</text>
  </g>
  <g transform="translate(280, 410)">
    <rect width="200" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="100" y="24" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3" text-anchor="middle" dominant-baseline="central">Kamino</text>
    <text x="100" y="42" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle">$2.36B TVL</text>
  </g>
  <g transform="translate(500, 410)">
    <rect width="200" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="100" y="24" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3" text-anchor="middle" dominant-baseline="central">Pendle</text>
