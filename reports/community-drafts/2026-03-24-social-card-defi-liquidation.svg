<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="badgeGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="saverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="25" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad2)"/>

  <!-- Decorative background: liquidation price line visualization -->
  <circle cx="1000" cy="150" r="200" fill="#ef4444" opacity="0.03" filter="url(#softGlow2)"/>
  <circle cx="150" cy="480" r="140" fill="#22c55e" opacity="0.03" filter="url(#softGlow2)"/>

  <!-- Descending price line (representing liquidation risk) -->
  <polyline points="60,180 200,170 350,200 500,190 650,250 750,300 830,340 900,380 1000,430 1100,470"
    fill="none" stroke="#ef4444" stroke-width="2" opacity="0.15"/>
  <!-- Protection line (saved by DeFi Saver) -->
  <polyline points="650,250 700,245 750,240 800,250 850,260 900,255 950,250 1000,255 1100,260"
    fill="none" stroke="#22c55e" stroke-width="2" opacity="0.2" stroke-dasharray="6,4"/>

  <!-- Liquidation threshold horizontal line -->
  <line x1="60" y1="430" x2="1140" y2="430" stroke="#ef4444" stroke-width="1" opacity="0.1" stroke-dasharray="8,8"/>
  <text x="1140" y="425" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ef4444" opacity="0.3" text-anchor="end">LIQUIDATION THRESHOLD</text>

  <!-- Grid pattern -->
  <g opacity="0.025">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#ef4444" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#ef4444" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#ef4444" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#ef4444" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#ef4444" stroke-width="0.5"/>
  </g>

  <!-- NEW GUIDE badge (red/amber for urgency) -->
