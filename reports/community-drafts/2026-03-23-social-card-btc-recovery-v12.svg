<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0a1128"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="recoveryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="40%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad2)"/>

  <!-- Ambient glows -->
  <circle cx="300" cy="400" r="200" fill="#22c55e" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="900" cy="200" r="250" fill="#0891b2" opacity="0.04" filter="url(#glow2)"/>

  <!-- Logo -->
  <circle cx="80" cy="50" r="18" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.8"/>
  <text x="67" y="56" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#818cf8">0x</text>
  <text x="108" y="55" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b949e">degen0x</text>

  <!-- Recovery chart visualization -->
  <g transform="translate(680, 80)">
    <!-- Chart background -->
    <rect x="0" y="0" width="440" height="240" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="40" y1="40" x2="420" y2="40" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="40" y1="100" x2="420" y2="100" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="40" y1="160" x2="420" y2="160" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- Y axis labels -->
    <text x="30" y="44" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$76K</text>
    <text x="30" y="104" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$71K</text>
    <text x="30" y="164" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="end">$66K</text>

    <!-- Price line (drop then recovery) -->
    <polyline points="50,50 100,48 150,55 200,80 230,140 260,170 290,155 320,130 360,105 400,95" fill="none" stroke="url(#recoveryGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Recovery area fill -->
    <polyline points="260,170 290,155 320,130 360,105 400,95 400,200 260,200" fill="rgba(34,197,94,0.08)"/>

    <!-- Drop annotation -->
    <circle cx="260" cy="170" r="4" fill="#ef4444"/>
    <text x="260" y="195" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">$68K low</text>

    <!-- Recovery annotation -->
    <circle cx="400" cy="95" r="4" fill="#22c55e"/>
    <text x="400" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">$70.6K</text>

    <!-- X axis labels -->
    <text x="50" y="225" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Tue</text>
    <text x="150" y="225" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Wed</text>
    <text x="260" y="225" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Fri</text>
    <text x="400" y="225" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6e7681">Mon</text>
  </g>

  <!-- Main content left side -->
  <text x="80" y="140" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#22c55e" font-weight="600">+3.8% RECOVERY</text>

  <text x="80" y="200" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="#e6edf3" letter-spacing="-2">$70,600</text>

  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">BTC reclaims $70K after Monday low</text>

  <!-- Data points -->
  <g transform="translate(80, 280)">
    <rect x="0" y="0" width="520" height="44" rx="10" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e" font-weight="600">Morgan Stanley ETF</text>
    <text x="260" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Updated BTC ETF application filed with SEC</text>
  </g>

  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="520" height="44" rx="10" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#06b6d4" font-weight="600">Whale Accumulation</text>
    <text x="260" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">270K BTC in 30 days — 13-year high</text>
  </g>

  <g transform="translate(80, 400)">
    <rect x="0" y="0" width="520" height="44" rx="10" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#f59e0b" font-weight="600">Exchange Supply</text>
    <text x="260" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">2.7M BTC — 6-year low</text>
  </g>

  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="520" height="44" rx="10" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
    <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444" font-weight="600">Fear &amp; Greed</text>
    <text x="260" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Index at 10 — Extreme Fear, Day 47+</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="80" y="580" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#6e7681" font-weight="600">The market punishes patience — until it doesn't.</text>
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="616" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6e7681">degen0x.com</text>
  <text x="1120" y="616" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">March 23, 2026</text>
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad2)"/>
</svg>
