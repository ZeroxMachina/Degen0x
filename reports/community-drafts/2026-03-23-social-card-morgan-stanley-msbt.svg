<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="#4f46e5" opacity="0.06" filter="url(#softGlow)"/>
  <circle cx="200" cy="500" r="150" fill="#f59e0b" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Logo area -->
  <text x="60" y="70" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Badge: INSTITUTIONAL -->
  <rect x="170" y="52" width="140" height="26" rx="13" fill="#f59e0b" opacity="0.15"/>
  <text x="240" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle" letter-spacing="0.08em">INSTITUTIONAL</text>

  <!-- Main title -->
  <text x="60" y="160" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Morgan Stanley Files for</text>
  <text x="60" y="220" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#goldGrad)" letter-spacing="-0.02em">Spot Bitcoin ETF</text>

  <!-- Subtitle -->
  <text x="60" y="265" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8b949e">First major US bank to issue a spot BTC ETF under its own name</text>

  <!-- Stats cards row -->
  <!-- Card 1: Ticker -->
  <rect x="60" y="310" width="240" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="180" y="348" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle" letter-spacing="0.05em">TICKER</text>
  <text x="180" y="400" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#f59e0b" text-anchor="middle">MSBT</text>

  <!-- Card 2: AUM -->
  <rect x="320" y="310" width="240" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="440" y="348" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle" letter-spacing="0.05em">MS TOTAL AUM</text>
  <text x="440" y="400" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#06b6d4" text-anchor="middle">$8T</text>

  <!-- Card 3: Potential Demand -->
  <rect x="580" y="310" width="280" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="720" y="348" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle" letter-spacing="0.05em">POTENTIAL DEMAND (2%)</text>
  <text x="720" y="400" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#22c55e" text-anchor="middle">$160B</text>

  <!-- Card 4: vs IBIT -->
  <rect x="880" y="310" width="260" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1010" y="348" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle" letter-spacing="0.05em">vs BLACKROCK IBIT</text>
  <text x="1010" y="400" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#8b5cf6" text-anchor="middle">3x</text>

  <!-- Infrastructure row -->
  <rect x="60" y="460" width="1080" height="70" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="120" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6e7681">Admin:</text>
  <text x="180" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">BNY Mellon</text>
  <text x="380" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6e7681">Custodian:</text>
  <text x="466" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Coinbase</text>
  <text x="640" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6e7681">Venue:</text>
  <text x="700" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">NYSE Arca</text>
  <text x="870" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6e7681">Seed:</text>
  <text x="915" y="500" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">$1M (50,000 shares)</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="600" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1140" y="600" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">March 23, 2026</text>
</svg>