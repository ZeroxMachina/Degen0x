  <rect x="60" y="470" width="1080" height="60" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1"/>
  <text x="100" y="508" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600">Compare all protocols →</text>
  <text x="700" y="508" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="16">degen0x.com/crypto-loans/reviews</text>
  <text x="60" y="580" fill="#22c55e" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700">degen0x</text>
  <text x="60" y="608" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14">The leading crypto comparison and review platform</text>
  <text x="1060" y="608" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14">April 2026</text>
