  <text x="90" y="300" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">→ Flash loans</text>
  <text x="90" y="325" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">→ GHO stablecoin</text>
  <text x="90" y="350" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">→ 12+ chains supported</text>
  <text x="90" y="410" fill="#a855f7" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">Read Review →</text>
  <!-- Compound Card -->
  <rect x="425" y="190" width="350" height="240" rx="16" fill="url(#blueGlow)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="455" y="230" fill="#3b82f6" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="2">COMPOUND</text>
  <text x="455" y="270" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600">Governance-Minimal</text>
  <text x="455" y="300" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">→ COMP rewards</text>
  <text x="455" y="325" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">→ Algorithmic rates</text>
  <text x="455" y="350" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">→ Battle-tested since 2020</text>
  <text x="455" y="410" fill="#3b82f6" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">Read Review →</text>
  <!-- MakerDAO Card -->
  <rect x="790" y="190" width="350" height="240" rx="16" fill="url(#blueGlow)" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="820" y="230" fill="#22c55e" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="2">MAKERDAO</text>
  <text x="820" y="270" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600">CDP Pioneer</text>
  <text x="820" y="300" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">→ DAI stability</text>
  <text x="820" y="325" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">→ Sky rebrand</text>
  <text x="820" y="350" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">→ RWA collateral expansion</text>
  <text x="820" y="410" fill="#22c55e" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">Read Review →</text>
