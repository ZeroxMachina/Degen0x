  <text x="60" y="125" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700">DeFi Lending: The Big 3 Compared</text>
  <text x="60" y="158" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="18">In-depth reviews of the protocols managing billions in crypto loans</text>
  <!-- Aave Card -->
  <rect x="60" y="190" width="350" height="240" rx="16" fill="url(#blueGlow)" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
