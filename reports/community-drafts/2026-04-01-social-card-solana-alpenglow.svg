<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#14082e"/>
      <stop offset="100%" style="stop-color:#080d1c"/>
    </linearGradient>
    <linearGradient id="solana" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="50%" style="stop-color:#14F195"/>
      <stop offset="100%" style="stop-color:#00C2FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#14F195;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glow orbs -->
  <circle cx="200" cy="150" r="180" fill="#9945FF" opacity="0.06" filter="url(#softglow)"/>
  <circle cx="1000" cy="480" r="200" fill="#14F195" opacity="0.05" filter="url(#softglow)"/>
  <circle cx="600" cy="315" r="120" fill="#00C2FF" opacity="0.04" filter="url(#softglow)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Top bar accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#solana)"/>

  <!-- Badge -->
  <rect x="60" y="50" width="140" height="32" rx="16" fill="url(#accent)" stroke="rgba(153,69,255,0.4)" stroke-width="1"/>
  <text x="130" y="71" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#14F195" text-anchor="middle" letter-spacing="1.5">DEEP DIVE</text>

  <!-- Main title -->
  <text x="60" y="145" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">Solana Alpenglow</text>
  <text x="60" y="205" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#solana)" letter-spacing="-1">150ms Finality</text>

  <!-- Subtitle -->
  <text x="60" y="260" font-family="Inter, system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" font-weight="400">Votor + Rotor replace Tower BFT — 100× faster consensus</text>

  <!-- Metric boxes -->
  <g>
    <!-- Before -->
    <rect x="60" y="310" width="240" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="80" y="345" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" font-weight="500" letter-spacing="1.5">TOWER BFT</text>
    <text x="80" y="388" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="rgba(255,255,255,0.5)">12.8s</text>
  </g>
  <g>
    <!-- Arrow -->
    <text x="330" y="370" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#14F195">→</text>
  </g>
  <g>
    <!-- After -->
    <rect x="370" y="310" width="240" height="100" rx="12" fill="rgba(20,241,149,0.08)" stroke="rgba(20,241,149,0.25)" stroke-width="1"/>
    <text x="390" y="345" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#14F195" font-weight="500" letter-spacing="1.5">ALPENGLOW</text>
    <text x="390" y="388" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#14F195">~150ms</text>
  </g>
  <g>
    <!-- Block prop -->
    <rect x="660" y="310" width="240" height="100" rx="12" fill="rgba(0,194,255,0.06)" stroke="rgba(0,194,255,0.2)" stroke-width="1"/>
    <text x="680" y="345" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#00C2FF" font-weight="500" letter-spacing="1.5">BLOCK PROPAGATION</text>
    <text x="680" y="388" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#00C2FF">~18ms</text>
  </g>

  <!-- Key features -->
  <text x="60" y="470" font-family="Inter, system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">
    <tspan>Votor lightweight voting</tspan>
    <tspan dx="20" fill="rgba(255,255,255,0.2)">·</tspan>
    <tspan dx="20">Rotor staked-weight propagation</tspan>
    <tspan dx="20" fill="rgba(255,255,255,0.2)">·</tspan>
    <tspan dx="20">98.27% community approval</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="100" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="500" letter-spacing="0.5">degen0x.com</text>
  <text x="60" y="600" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.25)">/learn/solana-alpenglow-consensus-upgrade-guide-2026</text>

  <!-- SOL price context -->
  <text x="1140" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="end">$SOL $83.86 · F&amp;G 8</text>
  <text x="1140" y="600" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.2)" text-anchor="end">April 2026</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#solana)"/>
</svg>
