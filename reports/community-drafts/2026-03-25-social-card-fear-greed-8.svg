<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="brand2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="fearGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand2)"/>

  <!-- Red glow behind the number -->
  <circle cx="600" cy="280" r="250" fill="url(#fearGlow)"/>

  <!-- Logo -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>
  <text x="160" y="55" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">.com</text>

  <!-- Label -->
  <text x="600" y="120" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444" letter-spacing="0.15em" text-anchor="middle">CRYPTO FEAR &amp; GREED INDEX</text>

  <!-- Giant number -->
  <text x="600" y="320" font-family="Inter, system-ui, sans-serif" font-size="200" font-weight="900" fill="url(#fearGrad)" text-anchor="middle" letter-spacing="-0.05em">8</text>

  <!-- Subtitle -->
  <text x="600" y="370" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#e6edf3" text-anchor="middle">EXTREME FEAR</text>
  <text x="600" y="400" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">46-day streak — longest since FTX collapse (November 2022)</text>

  <!-- Fear bar visualization -->
  <rect x="250" y="430" width="700" height="12" rx="6" fill="rgba(255,255,255,0.06)"/>
  <rect x="250" y="430" width="56" height="12" rx="6" fill="url(#fearGrad)"/>
  <!-- Marker -->
  <circle cx="306" cy="436" r="8" fill="#ef4444" stroke="#080d1c" stroke-width="3"/>
  <text x="250" y="460" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">0 — Extreme Fear</text>
  <text x="950" y="460" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" text-anchor="end">100 — Extreme Greed</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="120" y="485" width="280" height="65" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="145" y="510" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" letter-spacing="0.08em">GLASSNODE: BUY F&amp;G &lt;15</text>
  <text x="145" y="537" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#22c55e">+38.4%</text>
  <text x="268" y="537" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">median 90d return</text>

  <!-- Stat 2 -->
  <rect x="460" y="485" width="280" height="65" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="485" y="510" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" letter-spacing="0.08em">STABLECOINS</text>
  <text x="485" y="537" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="url(#greenGrad)">$313B ATH</text>

  <!-- Stat 3 -->
  <rect x="800" y="485" width="280" height="65" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="825" y="510" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681" letter-spacing="0.08em">BTC PRICE</text>
  <text x="825" y="537" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#e6edf3">$71,299</text>
  <text x="948" y="537" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e">+0.4%</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1">degen0x.com/tools/fear-greed-timeline</text>
  <text x="1140" y="612" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">Track the streak live</text>
  <rect x="0" y="626" width="1200" height="4" fill="url(#brand2)"/>
</svg>
