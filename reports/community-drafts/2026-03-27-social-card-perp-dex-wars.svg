  <!-- Hyperliquid bar -->
  <rect x="60" y="515" width="407" height="18" rx="4" fill="rgba(99,102,241,0.4)" stroke="rgba(99,102,241,0.3)" stroke-width="0.5"/>
  <text x="475" y="530" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#818cf8">$40.7B</text>
