<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#12081c"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Decorative -->
  <circle cx="1100" cy="100" r="200" fill="#f59e0b" opacity="0.03"/>
  <circle cx="100" cy="550" r="150" fill="#ef4444" opacity="0.03"/>

  <!-- Badge: WALLET ALERT -->
  <rect x="60" y="40" width="155" height="32" rx="16" fill="#ef4444" opacity="0.2"/>
  <text x="137" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1.5">WALLET ALERT</text>

  <!-- Badge: COSMOS -->
  <rect x="230" y="40" width="110" height="32" rx="16" fill="#8b5cf6" opacity="0.2"/>
  <text x="285" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#8b5cf6" text-anchor="middle" letter-spacing="1.5">COSMOS</text>

  <!-- Badge: MAY 28 -->
  <rect x="355" y="40" width="110" height="32" rx="16" fill="#f59e0b" opacity="0.2"/>
  <text x="410" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="1.5">MAY 28</text>

  <!-- Logo -->
  <text x="1090" y="62" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#6366f1" text-anchor="end" letter-spacing="-0.5">degen0x</text>

  <!-- Title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="#e6edf3" letter-spacing="-1.5">Leap Wallet Shutting Down</text>
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700" fill="#8b949e" letter-spacing="-0.5">All Products Sunsetting May 28, 2026</text>

  <!-- What's shutting down cards -->
  <rect x="60" y="225" width="170" height="100" rx="14" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="145" y="262" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1">BROWSER</text>
  <text x="145" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1">EXTENSION</text>
  <text x="145" y="310" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#ef4444" text-anchor="middle">&#x2717;</text>

  <rect x="245" y="225" width="170" height="100" rx="14" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="330" y="268" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1">MOBILE APPS</text>
  <text x="330" y="310" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#ef4444" text-anchor="middle">&#x2717;</text>

  <rect x="430" y="225" width="170" height="100" rx="14" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="515" y="268" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1">COMPASS WALLET</text>
  <text x="515" y="310" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#ef4444" text-anchor="middle">&#x2717;</text>

  <rect x="615" y="225" width="170" height="100" rx="14" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="700" y="268" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1">SWAPFAST</text>
  <text x="700" y="310" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#ef4444" text-anchor="middle">&#x2717;</text>

  <rect x="800" y="225" width="170" height="100" rx="14" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="885" y="262" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1">COSMOS HUB</text>
  <text x="885" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1">VALIDATOR</text>
  <text x="885" y="310" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#ef4444" text-anchor="middle">&#x2717;</text>

  <!-- Migration section -->
  <rect x="60" y="350" width="1080" height="145" rx="16" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  <text x="85" y="385" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e" letter-spacing="1">MIGRATE YOUR FUNDS — YOUR KEYS ARE SAFE</text>

  <!-- Migration steps -->
  <circle cx="100" cy="420" r="12" fill="rgba(34,197,94,0.2)"/>
  <text x="100" y="425" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">1</text>
  <text x="125" y="425" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Export your recovery phrase from Leap</text>

  <circle cx="100" cy="455" r="12" fill="rgba(34,197,94,0.2)"/>
  <text x="100" y="460" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">2</text>
  <text x="125" y="460" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Import into Keplr, MetaMask, Phantom, or Rabby</text>

  <circle cx="630" cy="420" r="12" fill="rgba(34,197,94,0.2)"/>
  <text x="630" y="425" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">3</text>
  <text x="655" y="425" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Redelegate ATOM from Leap's validator</text>

  <circle cx="630" cy="455" r="12" fill="rgba(34,197,94,0.2)"/>
  <text x="630" y="460" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">4</text>
  <text x="655" y="460" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3">Verify all balances in new wallet before May 28</text>

  <!-- Stats bar -->
  <rect x="60" y="520" width="250" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="85" y="548" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="1">NETWORKS SUPPORTED</text>
  <text x="85" y="572" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#e6edf3">100+</text>

  <rect x="330" y="520" width="250" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="355" y="548" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="1">YEARS ACTIVE</text>
  <text x="355" y="572" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#e6edf3">4 Years</text>

  <rect x="600" y="520" width="250" height="65" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="625" y="548" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" letter-spacing="1">DAYS REMAINING</text>
  <text x="625" y="572" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#f59e0b">54</text>

  <rect x="870" y="520" width="270" height="65" rx="12" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="895" y="548" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#6366f1" letter-spacing="1">SECURITY GUIDE</text>
  <text x="895" y="572" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366f1">degen0x.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent2)"/>
</svg>
