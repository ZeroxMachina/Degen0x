<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1425"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="rgba(79,70,229,0.06)" />
  <circle cx="150" cy="500" r="140" fill="rgba(8,145,178,0.05)" />

  <!-- Badge -->
  <rect x="60" y="50" width="180" height="32" rx="16" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="150" y="71" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="0.08em">BITCOIN ETF UPDATE</text>

  <!-- Main title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">$2.5 Billion.</text>
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">March Inflows Alone.</text>

  <!-- Subtitle -->
  <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">YTD outflows down to $210M — one session from flipping green for 2026</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="60" y="290" width="250" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="185" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">TOTAL ETF AUM</text>
  <text x="185" y="365" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#22c55e" text-anchor="middle">$128B</text>

  <!-- Stat 2 -->
  <rect x="330" y="290" width="250" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="455" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">BTC PRICE</text>
  <text x="455" y="365" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#e6edf3" text-anchor="middle">$71,043</text>

  <!-- Stat 3 -->
  <rect x="600" y="290" width="250" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="725" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">FEAR &amp; GREED</text>
  <text x="725" y="365" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#ef4444" text-anchor="middle">8–11</text>

  <!-- Stat 4 -->
  <rect x="870" y="290" width="270" height="100" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1005" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">YTD OUTFLOWS LEFT</text>
  <text x="1005" y="365" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#f59e0b" text-anchor="middle">$210M</text>

  <!-- Inflow bar visualization -->
  <rect x="60" y="420" width="1080" height="50" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="64" y="424" width="970" height="42" rx="10" fill="url(#greenGlow)" opacity="0.25"/>
  <rect x="64" y="424" width="970" height="42" rx="10" fill="none" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
  <text x="549" y="452" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e6edf3" text-anchor="middle">March 2026: $2.5B of $2.71B YTD recovered — 92% recovery</text>

  <!-- Signal box -->
  <rect x="60" y="490" width="1080" height="60" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="600" y="525" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#22c55e" text-anchor="middle" filter="url(#glow)">Institutions buying through extreme fear. Retail selling. This pattern preceded every major rally since 2020.</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="607" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.6)">degen0x.com</text>
  <text x="1140" y="607" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="end">March 24, 2026</text>
</svg>