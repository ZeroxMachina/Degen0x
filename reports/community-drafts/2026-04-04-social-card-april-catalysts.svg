  <text x="750" y="498" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e6edf3">Stablecoins: <tspan fill="#22c55e" font-weight="700">$316B ATH</tspan></text>
  <text x="750" y="520" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Goldman flagging April recovery window</text>

