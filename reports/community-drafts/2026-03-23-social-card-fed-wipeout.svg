<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)" />

  <!-- Decorative glow circles -->
  <circle cx="950" cy="120" r="180" fill="#ef4444" opacity="0.04" filter="url(#softGlow)" />
  <circle cx="200" cy="500" r="150" fill="#22c55e" opacity="0.04" filter="url(#softGlow)" />

  <!-- Logo area -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Main headline -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">$100B Wipeout.</text>
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Whales Still Buying.</text>

  <!-- Subtitle -->
  <text x="60" y="240" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Fed holds rates at 3.5%–3.75% — market panics, smart money accumulates</text>

  <!-- Three data cards -->
  <!-- Card 1: Market Drop -->
  <rect x="60" y="280" width="340" height="160" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="85" y="318" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444" letter-spacing="0.05em">MARKET WIPEOUT</text>
  <text x="85" y="370" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#ef4444" filter="url(#glow)">-$100B</text>
  <text x="85" y="400" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">24-hour market cap loss</text>
  <text x="85" y="422" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">BTC ~$68K · ETH -5% · SOL -6%</text>

  <!-- Card 2: Fear & Greed -->
  <rect x="430" y="280" width="340" height="160" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="455" y="318" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" letter-spacing="0.05em">FEAR &amp; GREED INDEX</text>
  <text x="455" y="370" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#f59e0b" filter="url(#glow)">10</text>
  <text x="530" y="370" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#f59e0b">/100</text>
  <text x="455" y="400" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Extreme Fear — Day 47</text>
  <text x="455" y="422" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Longest streak since 2022 bear</text>

  <!-- Card 3: Whale Accumulation -->
  <rect x="800" y="280" width="340" height="160" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="825" y="318" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e" letter-spacing="0.05em">WHALE ACCUMULATION</text>
  <text x="825" y="370" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#22c55e" filter="url(#glow)">270K</text>
  <text x="975" y="370" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#22c55e">BTC</text>
  <text x="825" y="400" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">$23B accumulated in 30 days</text>
  <text x="825" y="422" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">13-year high · Exchange supply 6yr low</text>

  <!-- Platform stats bar -->
  <rect x="60" y="475" width="1080" height="50" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <text x="110" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1">422 PAGES</text>
  <text x="260" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">·</text>
  <text x="290" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">110+ TOOLS</text>
  <text x="420" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">·</text>
  <text x="450" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6">174+ GUIDES</text>
  <text x="590" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">·</text>
  <text x="620" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">86 PROTOCOLS</text>
  <text x="770" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">·</text>
  <text x="800" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">8 LANGUAGES</text>
  <text x="950" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">·</text>
  <text x="980" y="505" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3">$0 COST</text>

  <!-- Bottom bar -->
  <rect x="0" y="555" width="1200" height="75" fill="rgba(0,0,0,0.3)" />
  <text x="60" y="598" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e6edf3">degen0x.com</text>
  <text x="230" y="598" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Free crypto tools, guides &amp; data — no signup required</text>
  <text x="1050" y="598" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Mar 23, 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)" />
</svg>
