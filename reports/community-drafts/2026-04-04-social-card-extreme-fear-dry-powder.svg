<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1a2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="dryPowderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#ef4444" opacity="0.04"/>
  <circle cx="150" cy="500" r="200" fill="#22c55e" opacity="0.04"/>
  <circle cx="600" cy="315" r="250" fill="#4f46e5" opacity="0.03"/>

  <!-- degen0x logo text -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#818cf8" filter="url(#glow)">degen0x</text>

  <!-- Main title -->
  <text x="60" y="160" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">The Fear vs. Liquidity</text>
  <text x="60" y="220" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Divergence</text>

  <!-- Subtitle -->
  <text x="60" y="265" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Extreme Fear meets record dry powder — April 4, 2026</text>

  <!-- Fear & Greed Card -->
  <rect x="60" y="305" width="500" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="90" y="345" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="0.05em">FEAR &amp; GREED INDEX</text>
  <text x="90" y="410" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#fearGrad)">9</text>
  <text x="155" y="410" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#ef4444">EXTREME FEAR</text>
  <text x="90" y="432" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">3rd consecutive day sub-10 — historic territory</text>

  <!-- Fear gauge bar -->
  <rect x="360" y="365" width="180" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="360" y="365" width="16" height="8" rx="4" fill="url(#fearGrad)"/>
  <text x="360" y="395" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">0</text>
  <text x="530" y="395" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">100</text>

  <!-- Stablecoin Dry Powder Card -->
  <rect x="590" y="305" width="550" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="620" y="345" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="0.05em">STABLECOIN DRY POWDER</text>
  <text x="620" y="410" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#dryPowderGrad)">$316B</text>
  <text x="870" y="410" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#22c55e">ALL-TIME HIGH</text>
  <text x="620" y="432" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Record capital waiting on the sidelines</text>

  <!-- Stablecoin bar -->
  <rect x="905" y="365" width="180" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="905" y="365" width="175" height="8" rx="4" fill="url(#dryPowderGrad)"/>

  <!-- Bottom data row -->
  <text x="60" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">BTC</text>
  <text x="100" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">$66,911</text>
  <text x="200" y="510" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e">+0.5%</text>

  <text x="280" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">ETH</text>
  <text x="320" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">$2,054</text>
  <text x="410" y="510" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ef4444">-0.17%</text>

  <text x="500" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">Market Cap</text>
  <text x="600" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">$2.38T</text>

  <text x="710" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">BTC Dom</text>
  <text x="800" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">56.2%</text>

  <!-- Historical context callout -->
  <rect x="60" y="540" width="1080" height="40" rx="10" fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.2)" stroke-width="1"/>
  <text x="85" y="566" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#f59e0b">⚡ Every F&amp;G sub-10 streak in history preceded 40-60% gains within 12 months</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="621" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">degen0x.com — Free crypto tools &amp; research</text>
  <text x="1030" y="621" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Apr 4, 2026</text>
</svg>