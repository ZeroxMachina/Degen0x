<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Red alert accent -->
  <rect x="0" y="0" width="1200" height="4" fill="#ef4444" opacity="0.9"/>
  <rect x="0" y="626" width="1200" height="4" fill="#ef4444" opacity="0.5"/>
  <!-- Glass cards -->
  <rect x="60" y="180" width="340" height="140" rx="16" fill="url(#redGlow)" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="430" y="180" width="340" height="140" rx="16" fill="url(#redGlow)" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="800" y="180" width="340" height="140" rx="16" fill="url(#redGlow)" stroke="#eab308" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Header -->
  <text x="60" y="80" fill="#ef4444" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" letter-spacing="3">⚠️ SECURITY ALERT</text>
  <text x="60" y="130" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700">DRIFT Protocol Exploited</text>
  <text x="60" y="160" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="18">Flash loan attack drains protocol — cascading liquidations follow</text>
  <!-- Card 1: Price Drop -->
  <text x="90" y="220" fill="#ef4444" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="2">TOKEN PRICE</text>
  <text x="90" y="270" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" filter="url(#glow)">-40%</text>
  <text x="90" y="300" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">in 24 hours</text>
  <!-- Card 2: Funding Rate -->
  <text x="460" y="220" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="2">FUNDING RATE</text>
  <text x="460" y="270" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" filter="url(#glow)">6,000%+</text>
  <text x="460" y="300" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">shorts subsidizing longs</text>
  <!-- Card 3: Attack Vector -->
  <text x="830" y="220" fill="#eab308" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="2">ATTACK VECTOR</text>
  <text x="830" y="268" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700">Flash Loan</text>
  <text x="830" y="300" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15">price manipulation → drain</text>
  <!-- Bottom CTA -->
  <rect x="60" y="380" width="1080" height="80" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
  <text x="100" y="428" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">Protect yourself → Read the security guide</text>
  <text x="800" y="428" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="16">degen0x.com/learn</text>
  <!-- Footer -->
  <text x="60" y="560" fill="#22c55e" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700">degen0x</text>
  <text x="60" y="590" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14">The leading crypto comparison and review platform</text>
  <text x="1060" y="590" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14">April 2026</text>
</svg>
