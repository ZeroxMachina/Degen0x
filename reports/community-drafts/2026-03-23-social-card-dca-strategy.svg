  <text x="60" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8">7 years of backtested data. One clear winner.</text>

  <!-- Three stat cards -->
  <!-- Card 1: Standard DCA -->
  <rect x="60" y="250" width="340" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1">WEEKLY DCA</text>
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#06b6d4" filter="url(#glow)">+202%</text>
  <text x="80" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">$10/week since Jan 2019</text>

  <!-- Card 2: Fear-Based DCA -->
  <rect x="420" y="250" width="340" height="140" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="440" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#22c55e" letter-spacing="1">FEAR-BASED DCA ★</text>
  <text x="440" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#22c55e" filter="url(#glow)">+1,145%</text>
  <text x="440" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">Buy only when F&amp;G &lt; 25</text>

  <!-- Card 3: Current F&G -->
  <rect x="780" y="250" width="360" height="140" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="800" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ef4444" letter-spacing="1">FEAR &amp; GREED NOW</text>
  <text x="800" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ef4444" filter="url(#glow)">10</text>
  <text x="870" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#f87171">Extreme Fear</text>
  <text x="800" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">Historically optimal accumulation zone</text>

  <!-- Monday effect callout -->
  <rect x="60" y="415" width="520" height="50" rx="8" fill="#f59e0b" opacity="0.1"/>
  <text x="80" y="446" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f59e0b">Monday Effect: Monday buys accumulate 14.36% more BTC vs other days</text>

  <!-- Historical parallels -->
