  <rect x="0" y="500" width="1200" height="130" fill="#0f172a" opacity="0.7"/>
  <rect x="0" y="500" width="1200" height="1" fill="#334155"/>

  <!-- Bottom left: CTA -->
  <text x="60" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">Full guide + live DCA calculator inside</text>
  <text x="60" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="url(#accent)">degen0x.com/learn/crypto-dca-strategy-guide-2026</text>

  <!-- Bottom right: Logo -->
  <text x="1080" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#f8fafc" text-anchor="middle">degen0x</text>
  <text x="1080" y="585" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">FREE CRYPTO TOOLS &amp; GUIDES</text>

