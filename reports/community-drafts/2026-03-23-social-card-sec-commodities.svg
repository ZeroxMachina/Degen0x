  <text x="580" y="337" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#22c55e" text-anchor="middle">ADA</text>

  <rect x="640" y="310" width="100" height="42" rx="12" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
