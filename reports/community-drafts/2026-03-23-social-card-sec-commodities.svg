  <rect x="90" y="310" width="100" height="42" rx="12" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="140" y="337" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle">BTC</text>

