  <text x="690" y="392" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#06b6d4" text-anchor="middle">XTZ</text>

  <rect x="750" y="365" width="100" height="42" rx="12" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="800" y="392" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#8b5cf6" text-anchor="middle">APT</text>

  <rect x="860" y="365" width="100" height="42" rx="12" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="910" y="392" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#22c55e" text-anchor="middle">ALGO</text>

  <!-- Impact boxes -->
  <rect x="90" y="435" width="310" height="100" rx="16" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.12)" stroke-width="1"/>
  <text x="110" y="465" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">COMMODITY STATUS</text>
  <text x="110" y="490" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">CFTC jurisdiction — lighter</text>
  <text x="110" y="512" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">regulatory treatment</text>

  <rect x="420" y="435" width="310" height="100" rx="16" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>
  <text x="440" y="465" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1">ETF PATHWAY</text>
  <text x="440" y="490" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Clears path for SOL, XRP,</text>
  <text x="440" y="512" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">ADA ETF products</text>

  <rect x="750" y="435" width="310" height="100" rx="16" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>
  <text x="770" y="465" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">PENDING LAW</text>
  <text x="770" y="490" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">CLARITY Act must pass</text>
