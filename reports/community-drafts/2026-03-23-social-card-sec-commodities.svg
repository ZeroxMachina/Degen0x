  <text x="910" y="337" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#8b5cf6" text-anchor="middle">DOT</text>

  <!-- Token grid — Row 2 -->
  <rect x="90" y="365" width="100" height="42" rx="12" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="140" y="392" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#06b6d4" text-anchor="middle">XLM</text>

  <rect x="200" y="365" width="100" height="42" rx="12" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="250" y="392" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#22c55e" text-anchor="middle">HBAR</text>

  <rect x="310" y="365" width="100" height="42" rx="12" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="360" y="392" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle">LTC</text>

  <rect x="420" y="365" width="100" height="42" rx="12" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="470" y="392" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle">DOGE</text>

