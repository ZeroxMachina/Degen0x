  <circle cx="852" cy="100" r="6" fill="#22c55e" filter="url(#glow2)"/>
  <text x="868" y="106" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">REGULATORY MILESTONE</text>

  <!-- Main title -->
  <text x="90" y="185" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">SEC Classifies</text>
  <text x="90" y="242" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900" fill="url(#greenGrad)" letter-spacing="-0.02em">16 Digital Commodities</text>

