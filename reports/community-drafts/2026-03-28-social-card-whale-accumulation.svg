<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0a1128"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="whaleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundCard1">
      <rect x="40" y="340" width="265" height="120" rx="16"/>
    </clipPath>
    <clipPath id="roundCard2">
      <rect x="320" y="340" width="265" height="120" rx="16"/>
    </clipPath>
    <clipPath id="roundCard3">
      <rect x="600" y="340" width="265" height="120" rx="16"/>
    </clipPath>
    <clipPath id="roundCard4">
      <rect x="880" y="340" width="280" height="120" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative ambient circles -->
  <circle cx="150" cy="500" r="200" fill="#6366f1" opacity="0.04"/>
  <circle cx="1050" cy="150" r="250" fill="#06b6d4" opacity="0.03"/>
  <circle cx="600" cy="300" r="300" fill="#4f46e5" opacity="0.02"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Logo area -->
  <circle cx="72" cy="46" r="18" fill="none" stroke="url(#whaleGrad)" stroke-width="2" opacity="0.9"/>
  <text x="62" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="url(#whaleGrad)">0x</text>
  <text x="98" y="52" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.05em">degen0x</text>

  <!-- Badge: WHALE ALERT -->
  <rect x="880" y="30" width="280" height="34" rx="17" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <circle cx="902" cy="47" r="5" fill="#6366f1">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="918" y="52" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#a5b4fc" letter-spacing="0.08em">WHALE ACCUMULATION ALERT</text>

  <!-- Main headline -->
  <text x="40" y="130" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">270,000 BTC</text>
  <text x="40" y="180" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#8b949e">accumulated by whales in 30 days</text>
  <text x="40" y="218" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#6e7681">Largest buying spree since 2013 — while Fear &amp; Greed sits at 12</text>

  <!-- Whale accumulation visualization bar -->
  <rect x="40" y="250" width="1120" height="60" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Bar fill showing accumulation progress -->
  <rect x="44" y="254" width="0" height="52" rx="10" fill="url(#whaleGrad)" opacity="0.25">
    <animate attributeName="width" from="0" to="1000" dur="2s" fill="freeze"/>
  </rect>
  <rect x="44" y="254" width="0" height="52" rx="10" fill="url(#whaleGrad)" opacity="0.6">
    <animate attributeName="width" from="0" to="890" dur="2s" fill="freeze"/>
  </rect>

  <!-- Bar labels -->
  <text x="60" y="286" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#e6edf3">270K BTC</text>
  <text x="210" y="286" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.7)">20,000+ whale wallets at record high</text>

  <!-- Right side label -->
  <text x="1000" y="286" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e" text-anchor="end">ACCUMULATING</text>
  <circle cx="1015" cy="281" r="4" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Metric cards row -->

  <!-- Card 1: BTC Price -->
  <rect x="40" y="340" width="265" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="60" y="372" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BITCOIN</text>
  <text x="60" y="405" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#e6edf3">$66,348</text>
  <text x="60" y="432" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">-3.33% (24h)</text>
  <text x="60" y="450" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">-48% from $126K ATH</text>

  <!-- Card 2: ETH -->
  <rect x="320" y="340" width="265" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="340" y="372" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">ETHEREUM</text>
  <text x="340" y="405" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#e6edf3">$1,997</text>
  <text x="340" y="432" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">-4.05% (24h)</text>
  <text x="340" y="450" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">$253M whale accumulation</text>

  <!-- Card 3: ETF Flows -->
  <rect x="600" y="340" width="265" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="620" y="372" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BTC ETF FLOWS</text>
  <text x="620" y="405" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#22c55e">+$458M</text>
  <text x="620" y="432" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">single-day inflow</text>
  <text x="620" y="450" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">Reversal from $1.8B Q1 outflow</text>

  <!-- Card 4: Fear & Greed -->
  <rect x="880" y="340" width="280" height="120" rx="16" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="900" y="372" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">FEAR &amp; GREED INDEX</text>
  <text x="900" y="408" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#ef4444" filter="url(#glow)">12</text>
  <text x="948" y="408" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444">EXTREME FEAR</text>
  <text x="900" y="432" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f59e0b">Day 47 streak</text>
  <text x="900" y="450" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">Sub-15 median 90d return: +38.4%</text>

  <!-- Historical context bar -->
  <rect x="40" y="480" width="1120" height="44" rx="10" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.12)" stroke-width="1"/>
  <text x="60" y="507" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">HISTORICAL PARALLEL</text>
  <text x="240" y="507" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Last 47+ day extreme fear streak → FTX zone (Nov 2022) → BTC $16K → 12mo later: $42K (+162%)</text>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="540" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- CTA -->
  <text x="40" y="575" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Track whale activity →</text>
  <text x="250" y="575" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#whaleGrad)">degen0x.com/tools/whale-tracker</text>

  <!-- Date stamp -->
  <text x="40" y="605" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6e7681">March 28, 2026 • Saturday Evening Update</text>

  <!-- Brand URL -->
  <text x="1160" y="575" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="url(#brandGrad)" text-anchor="end">degen0x.com</text>
  <text x="1160" y="605" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6e7681" text-anchor="end">Free crypto tools &amp; research</text>

  <!-- Bottom gradient accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brandGrad)"/>
</svg>
