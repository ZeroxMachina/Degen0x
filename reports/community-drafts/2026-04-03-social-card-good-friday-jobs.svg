<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#0a1128"/>
      <stop offset="100%" style="stop-color:#080d1c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="150" r="200" fill="#4f46e5" opacity="0.06" filter="url(#glow1)"/>
  <circle cx="1000" cy="480" r="180" fill="#0891b2" opacity="0.05" filter="url(#glow1)"/>
  <circle cx="600" cy="300" r="150" fill="#d97706" opacity="0.03" filter="url(#glow1)"/>

  <!-- degen0x logo text -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="0.05em">degen0x</text>

  <!-- Badges -->
  <rect x="160" y="36" width="70" height="26" rx="13" fill="url(#amberGrad)" opacity="0.9"/>
  <text x="195" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#080d1c" text-anchor="middle">MACRO</text>

  <rect x="240" y="36" width="110" height="26" rx="13" fill="url(#redGrad)" opacity="0.9"/>
  <text x="295" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">GOOD FRIDAY</text>

  <!-- Main title -->
  <text x="60" y="120" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">March Jobs Report:</text>
  <text x="60" y="172" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="900" fill="url(#accentGrad)" letter-spacing="-0.02em">Crypto Reacted Alone</text>

  <!-- Subtitle -->
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">+57K nonfarm payrolls released while every stock exchange was closed</text>

  <!-- 4 Stat Cards -->
  <!-- Card 1: Payrolls -->
  <rect x="60" y="250" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="80" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">NONFARM PAYROLLS</text>
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="900" fill="#f59e0b">+57K</text>
  <text x="80" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">vs -92K in February</text>

  <!-- Card 2: Unemployment -->
  <rect x="330" y="250" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="350" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">UNEMPLOYMENT</text>
  <text x="350" y="330" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="900" fill="#e6edf3">4.4%</text>
  <text x="350" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">Steady — no change</text>

  <!-- Card 3: BTC Price -->
  <rect x="600" y="250" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="620" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">BITCOIN</text>
  <text x="620" y="330" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="900" fill="#06b6d4">$66,503</text>
  <text x="620" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ef4444">-3.6% 7d | -46% from ATH</text>

  <!-- Card 4: Fear & Greed -->
  <rect x="870" y="250" width="270" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="890" y="285" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="0.05em">FEAR &amp; GREED INDEX</text>
  <text x="890" y="330" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="900" fill="#ef4444">8</text>
  <text x="935" y="330" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#6e7681">/100</text>
  <text x="890" y="355" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ef4444">60+ days extreme fear</text>

  <!-- Catalyst timeline -->
  <text x="60" y="415" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="0.05em">UPCOMING CATALYSTS</text>

  <!-- Timeline pills -->
  <rect x="60" y="430" width="155" height="32" rx="16" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="138" y="451" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle">Tariffs Apr 5</text>

  <rect x="230" y="430" width="185" height="32" rx="16" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="322" y="451" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f87171" text-anchor="middle">Reciprocal Rates Apr 9</text>

  <rect x="430" y="430" width="175" height="32" rx="16" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="518" y="451" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22d3ee" text-anchor="middle">Fed Minutes Apr 8</text>

  <rect x="620" y="430" width="195" height="32" rx="16" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="718" y="451" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">Senate Returns Apr 13</text>

  <rect x="830" y="430" width="190" height="32" rx="16" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="925" y="451" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">FOMC Apr 28-29</text>

  <!-- CTA -->
  <rect x="60" y="500" width="320" height="48" rx="24" fill="url(#accentGrad)" opacity="0.9"/>
  <text x="220" y="530" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Run the DCA Math → degen0x.com</text>

  <!-- Stablecoin stat callout -->
  <text x="440" y="520" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Stablecoin supply:</text>
  <text x="570" y="520" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e">$316B ATH</text>
  <text x="660" y="520" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">| BTC dominance:</text>
  <text x="800" y="520" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#06b6d4">58.16%</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="610" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1">degen0x.com</text>
  <text x="1140" y="610" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">April 3, 2026 • Good Friday Edition</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)"/>
</svg>