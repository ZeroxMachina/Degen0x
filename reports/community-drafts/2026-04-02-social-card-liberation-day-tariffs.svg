<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="amberAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="0.5" />
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="0.5" />
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="0.5" />
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="0.5" />
  </g>

  <!-- Top badge -->
  <rect x="60" y="40" width="200" height="32" rx="16" fill="#ef4444" opacity="0.15" />
  <text x="160" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="600" letter-spacing="1.5">LIBERATION DAY</text>

  <!-- Main headline -->
  <text x="60" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="#ffffff" font-weight="700">Tariff Shock Hits</text>
  <text x="60" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="#ffffff" font-weight="700">Global Markets</text>

  <!-- Subheadline -->
  <text x="60" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8">April 2, 2026 — Trump announces 10-50% tariffs on 50+ countries</text>

  <!-- Data cards row -->
  <!-- Card 1: S&P 500 -->
  <rect x="60" y="255" width="250" height="120" rx="12" fill="#ffffff" opacity="0.05" />
  <rect x="60" y="255" width="250" height="4" rx="2" fill="#ef4444" />
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" font-weight="500">S&amp;P 500</text>
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#ef4444" font-weight="700" filter="url(#glow)">-$5T+</text>
  <text x="80" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">Largest single-event drop on record</text>

  <!-- Card 2: BTC -->
  <rect x="340" y="255" width="250" height="120" rx="12" fill="#ffffff" opacity="0.05" />
  <rect x="340" y="255" width="250" height="4" rx="2" fill="#ef4444" />
  <text x="360" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" font-weight="500">Bitcoin</text>
  <text x="360" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#ef4444" font-weight="700">$66,246</text>
  <text x="360" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ef4444">-3.0% in 24h</text>

  <!-- Card 3: ETH -->
  <rect x="620" y="255" width="250" height="120" rx="12" fill="#ffffff" opacity="0.05" />
  <rect x="620" y="255" width="250" height="4" rx="2" fill="#ef4444" />
  <text x="640" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" font-weight="500">Ethereum</text>
  <text x="640" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#ef4444" font-weight="700">~$1,950</text>
  <text x="640" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ef4444">-4.4% in 24h</text>

  <!-- Card 4: Fear & Greed -->
  <rect x="900" y="255" width="250" height="120" rx="12" fill="#ffffff" opacity="0.05" />
  <rect x="900" y="255" width="250" height="4" rx="2" fill="#f59e0b" />
  <text x="920" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" font-weight="500">Fear &amp; Greed</text>
  <text x="920" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#f59e0b" font-weight="700" filter="url(#glow)">8/100</text>
  <text x="920" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#f59e0b">60+ days extreme fear</text>

  <!-- Bottom insight section -->
  <rect x="60" y="410" width="1080" height="90" rx="12" fill="#ffffff" opacity="0.03" />
  <rect x="60" y="410" width="4" height="90" rx="2" fill="#22d3ee" />

  <!-- Stablecoin signal -->
  <text x="85" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22d3ee" font-weight="600">THE STABLECOIN SIGNAL</text>
  <text x="85" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">Stablecoin volume: $91.5B — 85% of all crypto volume</text>
  <text x="85" y="487" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">That's not exit liquidity — that's dry powder waiting for direction</text>

  <!-- Tariff pills -->
  <rect x="60" y="530" width="140" height="28" rx="14" fill="#ef4444" opacity="0.12" />
  <text x="130" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="500">10% Baseline</text>

  <rect x="215" y="530" width="160" height="28" rx="14" fill="#ef4444" opacity="0.12" />
  <text x="295" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="500">Up to 50% Reciprocal</text>

  <rect x="390" y="530" width="140" height="28" rx="14" fill="#f59e0b" opacity="0.12" />
  <text x="460" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="500">50+ Countries</text>

  <rect x="545" y="530" width="180" height="28" rx="14" fill="#22d3ee" opacity="0.12" />
  <text x="635" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="500">Nansen: 70% bottom by Jun</text>

  <!-- degen0x branding -->
  <text x="1140" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff" text-anchor="end" font-weight="700" opacity="0.7">degen0x</text>
  <text x="1140" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="end">degen0x.com</text>

  <!-- Date -->
  <text x="60" y="612" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">April 2, 2026</text>
</svg>
