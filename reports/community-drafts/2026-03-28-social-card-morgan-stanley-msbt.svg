<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#0a1128"/>
      <stop offset="100%" style="stop-color:#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="msGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundCard1"><rect x="60" y="340" width="250" height="120" rx="16"/></clipPath>
    <clipPath id="roundCard2"><rect x="330" y="340" width="250" height="120" rx="16"/></clipPath>
    <clipPath id="roundCard3"><rect x="600" y="340" width="250" height="120" rx="16"/></clipPath>
    <clipPath id="roundCard4"><rect x="870" y="340" width="270" height="120" rx="16"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="200" fill="#4f46e5" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="1050" cy="500" r="180" fill="#0891b2" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="600" cy="315" r="250" fill="#d97706" opacity="0.02" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- BREAKING badge -->
  <rect x="60" y="30" width="180" height="32" rx="16" fill="#4f46e5" opacity="0.2"/>
  <rect x="60" y="30" width="180" height="32" rx="16" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <circle cx="78" cy="46" r="4" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="92" y="51" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#a5b4fc" letter-spacing="1.5">FIRST EVER</text>

  <!-- degen0x logo area -->
  <text x="1060" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">degen0x.com</text>

  <!-- Main headline -->
  <text x="60" y="115" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#8b949e">Morgan Stanley Bitcoin Trust</text>
  <text x="60" y="175" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="url(#msGrad)" letter-spacing="-2">$MSBT</text>
  <text x="60" y="220" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#e6edf3" letter-spacing="-1">First Bank-Issued Spot BTC ETF</text>

  <!-- Fee highlight -->
  <rect x="60" y="245" width="320" height="60" rx="14" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="80" y="283" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" fill="#22c55e">0.14% FEE</text>
  <text x="268" y="283" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#86efac">LOWEST</text>

  <!-- VS comparison -->
  <text x="410" y="275" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6e7681">vs BlackRock 0.25% | Grayscale Mini 0.15%</text>

  <!-- Metric cards row -->
  <!-- Card 1: Advisors -->
  <rect x="60" y="340" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="372" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="1">FINANCIAL ADVISORS</text>
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#e6edf3">16,000</text>
  <text x="80" y="440" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Distribution network</text>

  <!-- Card 2: AUM -->
  <rect x="330" y="340" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="350" y="372" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="1">ASSETS UNDER MGMT</text>
  <text x="350" y="410" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#06b6d4">$6.2T</text>
  <text x="350" y="440" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Wealth management</text>

  <!-- Card 3: BTC Price -->
  <rect x="600" y="340" width="250" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="620" y="372" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="1">BTC PRICE</text>
  <text x="620" y="410" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="900" fill="#ef4444">$66,008</text>
  <text x="620" y="440" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">-48% from ATH | F&amp;G: 12</text>

  <!-- Card 4: Custody -->
  <rect x="870" y="340" width="270" height="120" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="890" y="372" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b949e" letter-spacing="1">INFRASTRUCTURE</text>
  <text x="890" y="405" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f59e0b">Coinbase Custody</text>
  <text x="890" y="435" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#a78bfa">BNY Mellon Admin</text>
  <text x="890" y="455" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">NYSE Arca listing</text>

  <!-- Fear gauge bar -->
  <rect x="60" y="485" width="1080" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="60" y="485" width="130" height="8" rx="4" fill="#ef4444"/>
  <text x="60" y="512" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444">EXTREME FEAR</text>
  <text x="200" y="512" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">F&amp;G: 12 — Day 48 (longest since FTX collapse)</text>

  <!-- Context strip -->
  <rect x="0" y="535" width="1200" height="50" fill="rgba(255,255,255,0.02)"/>
  <text x="60" y="565" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">
    SEC classifies 16 tokens as digital commodities  ·  Franklin Templeton $1.7T → Ondo 24/7 DeFi  ·  ETH below $2K  ·  $14B options expiry  ·  577 pages on degen0x
  </text>

  <!-- CTA -->
  <rect x="60" y="585" width="280" height="32" rx="8" fill="#4f46e5" opacity="0.3"/>
  <text x="75" y="606" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#a5b4fc">Compare ETFs → degen0x.com/learn/crypto-etfs</text>

  <!-- Bottom brand bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brandGrad)"/>
</svg>
