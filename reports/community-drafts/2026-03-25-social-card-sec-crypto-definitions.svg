<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent3)"/>

  <!-- Decorative -->
  <circle cx="1050" cy="200" r="220" fill="rgba(99,102,241,0.03)"/>
  <circle cx="100" cy="450" r="150" fill="rgba(6,182,212,0.03)"/>

  <!-- Logo -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.1em">DEGEN0X</text>

  <!-- Badge -->
  <rect x="160" y="38" width="170" height="24" rx="12" fill="rgba(99,102,241,0.15)"/>
  <text x="245" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#818cf8" text-anchor="middle">REGULATORY CLARITY</text>

  <!-- Headline -->
  <text x="60" y="135" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">SEC Formally Defines</text>
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#818cf8" letter-spacing="-0.02em" filter="url(#glow3)">Crypto Securities</text>

  <text x="60" y="235" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">First-ever compliance benchmarks for token issuers — March 2026</text>

  <!-- Three milestone cards -->
  <!-- Card 1 -->
  <rect x="60" y="275" width="340" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <circle cx="90" cy="310" r="14" fill="rgba(99,102,241,0.2)"/>
  <text x="90" y="316" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#818cf8" text-anchor="middle">1</text>
  <text x="115" y="316" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">SEC Securities Definition</text>
  <text x="85" y="345" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Formal characteristics that make</text>
  <text x="85" y="365" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">a crypto asset a "security"</text>
  <rect x="85" y="385" width="60" height="18" rx="9" fill="rgba(34,197,94,0.15)"/>
  <text x="115" y="398" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#22c55e" text-anchor="middle">DONE</text>

  <!-- Card 2 -->
  <rect x="430" y="275" width="340" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
  <circle cx="460" cy="310" r="14" fill="rgba(6,182,212,0.2)"/>
  <text x="460" y="316" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#06b6d4" text-anchor="middle">2</text>
  <text x="485" y="316" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">CLARITY Act</text>
  <text x="455" y="345" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Stablecoin yield framework —</text>
  <text x="455" y="365" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">bipartisan deal reached</text>
  <rect x="455" y="385" width="90" height="18" rx="9" fill="rgba(245,158,11,0.15)"/>
  <text x="500" y="398" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f59e0b" text-anchor="middle">APR MARKUP</text>

  <!-- Card 3 -->
  <rect x="800" y="275" width="340" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <circle cx="830" cy="310" r="14" fill="rgba(245,158,11,0.2)"/>
  <text x="830" y="316" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">3</text>
  <text x="855" y="316" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf3">FIT21+ Market Structure</text>
  <text x="825" y="345" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">Comprehensive crypto market</text>
  <text x="825" y="365" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e">structure legislation</text>
  <rect x="825" y="385" width="80" height="18" rx="9" fill="rgba(139,92,246,0.15)"/>
  <text x="865" y="398" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" text-anchor="middle">IN PROGRESS</text>

  <!-- Summary bar -->
  <rect x="60" y="445" width="1080" height="75" rx="16" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>
  <text x="85" y="478" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818cf8" letter-spacing="0.05em">2026: THE REGULATION YEAR</text>
  <text x="85" y="503" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">SEC definitions + CLARITY Act + FIT21+ = clearest crypto regulatory framework since Bitcoin's creation</text>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="598" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#accent3)">degen0x.com</text>
  <text x="340" y="598" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">Free crypto tools & research — no signup required</text>
  <rect x="980" y="570" width="170" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="1065" y="594" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle">Regulations Guide</text>
</svg>
