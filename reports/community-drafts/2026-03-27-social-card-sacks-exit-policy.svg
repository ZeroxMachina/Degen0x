<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0d1529"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Subtle decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#4f46e5" opacity="0.04"/>
  <circle cx="150" cy="500" r="140" fill="#0891b2" opacity="0.03"/>

  <!-- Logo area -->
  <text x="60" y="55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" filter="url(#glow)">degen0x</text>
  <text x="142" y="55" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">.com</text>

  <!-- BREAKING badge -->
  <rect x="60" y="75" width="130" height="28" rx="6" fill="#ef4444" opacity="0.15"/>
  <rect x="60" y="75" width="130" height="28" rx="6" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <text x="125" y="94" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1.5">POLICY SHIFT</text>

  <!-- Main headline -->
  <text x="60" y="150" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#e6edf3" letter-spacing="-0.5">White House Crypto Czar</text>
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#e6edf3" letter-spacing="-0.5">Steps Down</text>
  <text x="60" y="235" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">David Sacks hits 130-day limit — CLARITY Act stablecoin rules continue</text>

  <!-- Stat cards row -->
  <!-- Card 1: BTC Price -->
  <rect x="60" y="270" width="250" height="100" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="80" y="300" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.5">BTC</text>
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#e6edf3">$66,587</text>
  <text x="80" y="355" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">-4.1%</text>

  <!-- Card 2: ETH Price -->
  <rect x="330" y="270" width="250" height="100" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="350" y="300" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.5">ETH</text>
  <text x="350" y="330" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#e6edf3">$1,989</text>
  <text x="350" y="355" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">Below $2K</text>

  <!-- Card 3: Fear & Greed -->
  <rect x="600" y="270" width="250" height="100" rx="14" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="620" y="300" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.5">FEAR &amp; GREED</text>
  <text x="620" y="330" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#ef4444">13</text>
  <text x="663" y="330" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">/ 100</text>
  <text x="620" y="355" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f59e0b">48-day streak</text>

  <!-- Card 4: Stablecoin Market -->
  <rect x="870" y="270" width="270" height="100" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="890" y="300" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" letter-spacing="0.5">STABLECOIN MKTCAP</text>
  <text x="890" y="330" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#e6edf3">$311B</text>
  <text x="890" y="355" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">12.7% of market</text>

  <!-- Key points section -->
  <text x="60" y="415" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1" letter-spacing="0.5">WHAT SACKS GOT DONE</text>

  <text x="80" y="445" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Pro-crypto regulatory framework</text>
  <circle cx="70" cy="441" r="3" fill="#4f46e5"/>

  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Stablecoin legislation (CLARITY Act)</text>
  <circle cx="70" cy="466" r="3" fill="#0891b2"/>

  <text x="80" y="495" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">SEC commodity classifications for 16 tokens</text>
  <circle cx="70" cy="491" r="3" fill="#d97706"/>

  <!-- What's next section -->
  <text x="550" y="415" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e" letter-spacing="0.5">WHAT'S NEXT</text>

  <text x="570" y="445" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">CLARITY Act stablecoin yield rules advancing</text>
  <circle cx="560" cy="441" r="3" fill="#22c55e"/>

  <text x="570" y="470" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Bipartisan "agreement in principle" reached</text>
  <circle cx="560" cy="466" r="3" fill="#22c55e"/>

  <text x="570" y="495" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">BlackRock ETHB staked trust now live</text>
  <circle cx="560" cy="491" r="3" fill="#22c55e"/>

  <!-- Fear gauge bar -->
  <rect x="60" y="530" width="1080" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="60" y="530" width="140" height="8" rx="4" fill="url(#fearGrad)"/>
  <text x="210" y="538" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Extreme Fear</text>

  <!-- CTA -->
  <text x="60" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6366f1" font-weight="600">Full analysis → degen0x.com/learn/crypto-regulations-2026</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(255,255,255,0.02)"/>
  <text x="60" y="620" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">degen0x.com — 560 pages · 92 tools · All free</text>
  <text x="1140" y="620" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Mar 27, 2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brandGrad)"/>
</svg>
