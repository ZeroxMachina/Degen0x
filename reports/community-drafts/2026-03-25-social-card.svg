<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0b1e"/>
      <stop offset="50%" style="stop-color:#1a1145"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glow orbs -->
  <circle cx="200" cy="150" r="200" fill="#6366f1" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1000" cy="480" r="180" fill="#06b6d4" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="600" cy="300" r="250" fill="#f59e0b" opacity="0.03" filter="url(#blur1)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glass card background -->
  <rect x="60" y="60" width="1080" height="510" rx="24" ry="24" fill="#ffffff" opacity="0.03" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="60" y="60" width="1080" height="4" rx="2" fill="url(#accent)"/>

  <!-- Logo / Brand -->
  <text x="100" y="130" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    degen<tspan fill="url(#accent)">0x</tspan>
  </text>

  <!-- Big number -->
  <text x="100" y="260" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="120" font-weight="800" fill="url(#accent)" letter-spacing="-4">
    845
  </text>
  <text x="100" y="310" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="32" font-weight="600" fill="#ffffff" opacity="0.9" letter-spacing="-0.5">
    Pages Live &amp; Indexed
  </text>

  <!-- Stats row -->
  <g transform="translate(100, 370)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="220" height="90" rx="12" fill="#ffffff" opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="20" y="35" font-family="Inter, sans-serif" font-size="14" fill="#06b6d4" font-weight="600" letter-spacing="1">TOOLS</text>
    <text x="20" y="70" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#ffffff">92+</text>

    <!-- Stat 2 -->
    <rect x="240" y="0" width="220" height="90" rx="12" fill="#ffffff" opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="260" y="35" font-family="Inter, sans-serif" font-size="14" fill="#f59e0b" font-weight="600" letter-spacing="1">LEARN GUIDES</text>
    <text x="260" y="70" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#ffffff">500+</text>

    <!-- Stat 3 -->
    <rect x="480" y="0" width="220" height="90" rx="12" fill="#ffffff" opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="500" y="35" font-family="Inter, sans-serif" font-size="14" fill="#6366f1" font-weight="600" letter-spacing="1">ECOSYSTEMS</text>
    <text x="500" y="70" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#ffffff">20+</text>

    <!-- Stat 4 -->
    <rect x="720" y="0" width="220" height="90" rx="12" fill="#ffffff" opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="740" y="35" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" font-weight="600" letter-spacing="1">QUEUE</text>
    <text x="740" y="70" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#4ade80">Drained ✓</text>
  </g>

  <!-- Tagline -->
  <text x="100" y="530" font-family="Inter, sans-serif" font-size="18" fill="#ffffff" opacity="0.5" letter-spacing="0.5">
    Free crypto tools, guides &amp; research — degen0x.com
  </text>

  <!-- Corner decorative element -->
  <circle cx="1060" cy="180" r="60" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
  <circle cx="1060" cy="180" r="40" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.1"/>
  <circle cx="1060" cy="180" r="20" fill="url(#accent)" opacity="0.1"/>
</svg>
