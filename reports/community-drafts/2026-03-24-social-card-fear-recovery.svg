<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0c1229"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="fearLine" x1="100" y1="400" x2="1100" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glowR" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Decorative glow -->
  <circle cx="300" cy="400" r="200" fill="#ef4444" opacity="0.04" filter="url(#glowR)"/>
  <circle cx="900" cy="250" r="220" fill="#22c55e" opacity="0.05" filter="url(#glowR)"/>

  <!-- Top accent bar (fear to greed gradient) -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad2)"/>

  <!-- Badge -->
  <rect x="60" y="50" rx="16" ry="16" width="180" height="36" fill="#f59e0b" opacity="0.2"/>
  <rect x="60" y="50" rx="16" ry="16" width="180" height="36" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="150" y="74" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="0.08em">SENTIMENT SHIFT</text>

  <!-- Main title -->
  <text x="60" y="145" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">48-Day Extreme Fear Streak</text>
  <text x="60" y="205" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">Just Ended</text>

  <!-- Subtitle -->
  <text x="60" y="252" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Fear &amp; Greed recovered from 10 to 33 — longest extreme fear since FTX collapse</text>

  <!-- Fear gauge visualization -->
  <!-- Gauge background -->
  <rect x="60" y="290" rx="12" ry="12" width="520" height="180" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- F&G scale bar -->
  <rect x="90" y="340" rx="8" ry="8" width="460" height="16" fill="#1a1f2e"/>
  <!-- Gradient fill showing range -->
  <rect x="90" y="340" rx="8" ry="8" width="460" height="16" fill="url(#accentGrad2)" opacity="0.3"/>
  <!-- Marker for value 10 (old) -->
  <rect x="136" y="332" width="3" height="32" rx="1" fill="#ef4444" opacity="0.5"/>
  <text x="138" y="382" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">10</text>
  <!-- Marker for value 33 (current) -->
  <rect x="242" y="328" width="4" height="40" rx="2" fill="#f59e0b"/>
  <circle cx="244" cy="348" r="8" fill="#f59e0b"/>
  <text x="244" y="390" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">33</text>

  <!-- Scale labels -->
  <text x="90" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">0</text>
  <text x="205" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ef4444">Extreme Fear</text>
  <text x="320" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f59e0b">Fear</text>
  <text x="410" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Neutral</text>
  <text x="500" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e">Greed</text>
  <text x="540" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">100</text>

  <!-- Arrow showing movement -->
  <text x="175" y="318" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#f59e0b">→</text>

  <!-- Stat boxes on right side -->
  <rect x="620" y="290" rx="16" ry="16" width="260" height="80" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="750" y="322" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Historical 90-Day Returns</text>
  <text x="750" y="356" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#22c55e" text-anchor="middle">+42%</text>

  <rect x="620" y="390" rx="16" ry="16" width="260" height="80" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="750" y="422" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Stablecoin Supply ATH</text>
  <text x="750" y="456" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#6366f1" text-anchor="middle">$312B</text>

  <rect x="920" y="290" rx="16" ry="16" width="220" height="80" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1030" y="322" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">BTC ETF Inflow Streak</text>
  <text x="1030" y="356" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#0891b2" text-anchor="middle">6 Days</text>

  <rect x="920" y="390" rx="16" ry="16" width="220" height="80" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1030" y="422" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">BTC Price</text>
  <text x="1030" y="456" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#e6edf3" text-anchor="middle">$70,599</text>

  <!-- Bottom bar -->
  <rect x="0" y="500" width="1200" height="130" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="500" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Logo -->
  <circle cx="90" cy="560" r="22" fill="#4f46e5" opacity="0.8"/>
  <text x="90" y="567" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">0x</text>
  <text x="125" y="567" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e6edf3">degen0x.com</text>

  <text x="1140" y="555" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681" text-anchor="end">Track the full timeline:</text>
  <text x="1140" y="575" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6366f1" text-anchor="end">degen0x.com/tools/fear-greed-timeline</text>

  <!-- Bottom accent bar -->
