<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="#4f46e5" opacity="0.04"/>
  <circle cx="1050" cy="400" r="150" fill="#0891b2" opacity="0.05"/>
  <circle cx="200" cy="500" r="120" fill="#d97706" opacity="0.03"/>

  <!-- Logo placeholder text -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#818cf8">degen0x</text>

  <!-- Price chart line (simplified uptrend) -->
  <g opacity="0.6">
    <polyline points="700,420 750,430 800,445 830,440 870,435 900,420 930,380 960,350 1000,320 1030,290 1060,260 1090,240 1120,220" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="700,420 750,430 800,445 830,440 870,435 900,420 930,380 960,350 1000,320 1030,290 1060,260 1090,240 1120,220 1120,450 700,450" fill="url(#greenGrad)"/>
  </g>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#fff" stroke-width="1">
    <line x1="700" y1="220" x2="1140" y2="220"/>
    <line x1="700" y1="300" x2="1140" y2="300"/>
    <line x1="700" y1="380" x2="1140" y2="380"/>
  </g>

  <!-- Main headline -->
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="#e6edf3" letter-spacing="-0.02em">BTC Surges to $71K</text>

  <!-- Subheadline -->
  <text x="60" y="260" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#8b949e">Trump postpones Iran strikes. Markets rip 5% intraday.</text>

  <!-- Key stats -->
  <!-- Stat 1 -->
  <rect x="60" y="310" width="180" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="150" y="343" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle">INTRADAY</text>
  <text x="150" y="375" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e" text-anchor="middle">+5%</text>

  <!-- Stat 2 -->
  <rect x="260" y="310" width="180" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="350" y="343" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle">FEAR &amp; GREED</text>
  <text x="350" y="375" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#ef4444" text-anchor="middle">8</text>

  <!-- Stat 3 -->
  <rect x="460" y="310" width="180" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="550" y="343" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle">WHALE 30D</text>
  <text x="550" y="375" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#06b6d4" text-anchor="middle">270K BTC</text>

  <!-- Context line -->
  <text x="60" y="450" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#6e7681">$400M liquidated before recovery. Whales accumulated $23B in 30 days (13yr high).</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="560" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="602" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#818cf8">degen0x.com/tools/fear-greed-timeline</text>
  <text x="1140" y="602" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e7681" text-anchor="end">March 23, 2026</text>

  <!-- Accent bar bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>