<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1428"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Badge -->
  <rect x="40" y="30" width="250" height="32" rx="16" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="58" cy="46" r="5" fill="#f59e0b" filter="url(#glow2)"/>
  <text x="72" y="51" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fbbf24" letter-spacing="1">EARNINGS PREVIEW</text>

  <!-- Logo -->
  <text x="1100" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-anchor="end">degen0x.com</text>

  <!-- Title -->
  <text x="40" y="108" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#e6edf3" letter-spacing="-0.5">BitGo: First Crypto Custody IPO</text>
  <text x="40" y="140" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b949e">Q4 + FY2025 Earnings Report • March 26, 2026</text>

  <!-- IPO details card -->
  <rect x="40" y="168" width="540" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="60" y="198" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="1">IPO DETAILS</text>

  <text x="60" y="232" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">Ticker</text>
  <text x="220" y="232" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="url(#amberGrad)">$BTGO (NYSE)</text>

  <text x="60" y="262" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">IPO Date</text>
  <text x="220" y="262" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Jan 22, 2026</text>

  <text x="60" y="292" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">Raised</text>
  <text x="220" y="292" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">$212.8M @ $18/share</text>

  <text x="60" y="322" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">Valuation</text>
  <text x="220" y="322" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">$2.08B</text>

  <text x="60" y="352" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">Clients</text>
  <text x="220" y="352" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">1,500+ Institutional</text>

  <!-- Financial performance card -->
  <rect x="620" y="168" width="540" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="640" y="198" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#06b6d4" letter-spacing="1">FY2024 FINANCIALS</text>

  <text x="640" y="248" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="url(#cyanGrad)">$308M</text>
  <text x="640" y="272" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Annual Revenue</text>

  <text x="640" y="318" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#22c55e">$15.66M</text>
  <text x="640" y="342" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Net Profit (Profitable at IPO)</text>

  <!-- Why it matters -->
  <rect x="40" y="393" width="1120" height="80" rx="16" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="60" y="420" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="1">WHY IT MATTERS</text>
  <text x="60" y="450" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">BitGo's earnings are a proxy for institutional crypto adoption health. Positive results ahead of</text>
  <text x="60" y="468" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e6edf3">Thursday's SEC 91 ETF rulings could signal a bullish inflection for the custody/infrastructure stack.</text>

  <!-- Bottom stats -->
  <rect x="40" y="498" width="1120" height="60" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="100" y="535" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#e6edf3">BTC $70.6K</text>
  <text x="310" y="535" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#ef4444">F&amp;G 14</text>
  <text x="470" y="535" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#f59e0b">$14B Options Fri</text>
  <text x="720" y="535" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#6366f1">91 SEC ETFs Thu</text>
  <text x="960" y="535" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#22c55e">$2.5B ETF Inflows</text>

  <!-- Tagline -->
  <text x="600" y="590" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle">The first crypto custody IPO reports earnings. Institutional adoption gets its report card.</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent2)"/>
</svg>
