<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1a2a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent2)"/>

  <!-- Subtle glow -->
  <circle cx="600" cy="300" r="300" fill="#6366f1" opacity="0.03" filter="url(#glow2)"/>

  <!-- Logo -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b949e" letter-spacing="0.1em">DEGEN0X</text>
  <text x="160" y="60" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">REGULATION TRACKER</text>

  <!-- Main Title -->
  <text x="60" y="140" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3" letter-spacing="-0.02em">CLARITY Act: Four-Way</text>
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#f59e0b" letter-spacing="-0.02em">Senate Deadlock</text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">Stablecoin yield fight stalls the biggest US crypto bill in history</text>

  <!-- Status Cards -->
  <!-- House: PASSED -->
  <rect x="60" y="260" width="260" height="130" rx="16" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="85" y="300" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e" font-weight="600">HOUSE VOTE</text>
  <text x="85" y="340" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e">PASSED</text>
  <text x="85" y="370" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">294-134</text>

  <!-- Senate: DEADLOCKED -->
  <rect x="350" y="260" width="260" height="130" rx="16" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="375" y="300" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ef4444" font-weight="600">SENATE</text>
  <text x="375" y="340" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#ef4444">DEADLOCKED</text>
  <text x="375" y="370" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">4-way impasse</text>

  <!-- Prediction Markets -->
  <rect x="640" y="260" width="260" height="130" rx="16" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="665" y="300" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#06b6d4" font-weight="600">PREDICTION MARKETS</text>
  <text x="665" y="340" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#06b6d4">82%</text>
  <text x="665" y="370" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">Passes in 2026</text>

  <!-- SEC Roundtable -->
  <rect x="930" y="260" width="220" height="130" rx="16" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="955" y="300" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b5cf6" font-weight="600">SEC ROUNDTABLE</text>
  <text x="955" y="340" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#8b5cf6">Apr 16</text>
  <text x="955" y="370" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">Scheduled</text>

  <!-- The Four Factions -->
  <rect x="60" y="420" width="1090" height="140" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="85" y="455" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e" font-weight="600">THE FOUR-WAY DEADLOCK</text>

  <rect x="85" y="470" width="240" height="70" rx="10" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="110" y="497" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6366f1" font-weight="700">Banks</text>
  <text x="110" y="520" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Ban stablecoin yield entirely</text>

  <rect x="350" y="470" width="240" height="70" rx="10" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
  <text x="375" y="497" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#06b6d4" font-weight="700">Crypto Industry</text>
  <text x="375" y="520" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Allow yield-bearing stablecoins</text>

  <rect x="615" y="470" width="240" height="70" rx="10" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="640" y="497" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#f59e0b" font-weight="700">Tillis-Alsobrooks</text>
  <text x="640" y="520" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Activity-based incentives only</text>

  <rect x="880" y="470" width="240" height="70" rx="10" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <text x="905" y="497" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b5cf6" font-weight="700">White House</text>
  <text x="905" y="520" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Startup exemption w/ collateral</text>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681">degen0x.com/learn/clarity-act-stablecoin-yield-regulation-guide-2026</text>
  <text x="1060" y="620" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" font-weight="600">degen0x</text>
</svg>