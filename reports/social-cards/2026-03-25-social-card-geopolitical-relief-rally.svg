<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1c"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Badge -->
  <rect x="60" y="40" width="160" height="32" rx="16" fill="#ef444420" stroke="#ef4444" stroke-width="1"/>
  <text x="140" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="1.5">FEAR PARADOX</text>

  <!-- Main headline -->
  <text x="60" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#f8fafc" letter-spacing="-1">The Market Is Terrified.</text>
  <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#greenGrad)" letter-spacing="-1">The Money Isn't.</text>

  <!-- Subheadline -->
  <text x="60" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8">BTC bounced 5% from $68K to $71.7K on geopolitical relief — while Fear &amp; Greed hit 8</text>

  <!-- Stat boxes row -->
  <!-- Box 1: F&G -->
  <rect x="60" y="270" width="250" height="120" rx="12" fill="#ffffff08" stroke="#ffffff10" stroke-width="1"/>
  <text x="185" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="1">FEAR &amp; GREED</text>
  <text x="185" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#redGrad)" text-anchor="middle" filter="url(#glow)">8</text>

  <!-- Box 2: ETF Inflows -->
  <rect x="330" y="270" width="250" height="120" rx="12" fill="#ffffff08" stroke="#ffffff10" stroke-width="1"/>
  <text x="455" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="1">SPOT ETF INFLOWS</text>
  <text x="455" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#greenGrad)" text-anchor="middle">+$180M</text>

  <!-- Box 3: Exchange Outflows -->
  <rect x="600" y="270" width="250" height="120" rx="12" fill="#ffffff08" stroke="#ffffff10" stroke-width="1"/>
  <text x="725" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="1">EXCHANGE OUTFLOWS</text>
  <text x="725" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#greenGrad)" text-anchor="middle">-$420M</text>

  <!-- Box 4: Stablecoins -->
  <rect x="870" y="270" width="270" height="120" rx="12" fill="#ffffff08" stroke="#ffffff10" stroke-width="1"/>
  <text x="1005" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="1">STABLECOINS ATH</text>
  <text x="1005" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#f59e0b" text-anchor="middle">$313B</text>

  <!-- Divergence visual: arrow up and arrow down -->
  <text x="60" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b">RETAIL SENTIMENT</text>
  <rect x="230" y="430" width="200" height="20" rx="10" fill="#1e293b"/>
  <rect x="230" y="430" width="16" height="20" rx="10" fill="url(#redGrad)"/>
  <text x="450" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ef4444" font-weight="600">8/100</text>

  <text x="60" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b">INSTITUTIONAL FLOW</text>
  <rect x="230" y="470" width="200" height="20" rx="10" fill="#1e293b"/>
  <rect x="230" y="470" width="180" height="20" rx="10" fill="url(#greenGrad)"/>
  <text x="450" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4ade80" font-weight="600">90/100</text>

  <!-- Convergence countdown callout -->
  <rect x="550" y="420" width="590" height="80" rx="12" fill="#6366f110" stroke="#6366f140" stroke-width="1"/>
  <text x="570" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a5b4fc" font-weight="600" letter-spacing="1">CONVERGENCE THURSDAY — T-32 HOURS</text>
  <text x="570" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#94a3b8">$13.5B options expiry · SEC 91 ETF rulings · Uncapped ETF options live</text>

  <!-- CTA -->
  <text x="60" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#06b6d4">Track the divergence live →</text>
  <text x="310" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#f8fafc" font-weight="600">degen0x.com/tools/fear-greed-timeline</text>

  <!-- Branding -->
  <text x="60" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#accent)">degen0x</text>
  <text x="168" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569">.com — Free Crypto Intelligence</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
