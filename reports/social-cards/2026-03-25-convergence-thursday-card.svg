<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#111133;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="200" x2="800" y2="630"/>
    <line x1="0" y1="400" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="1200" y2="300"/>
    <line x1="800" y1="0" x2="1200" y2="200"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- degen0x logo text -->
  <text x="60" y="52" font-family="monospace, 'Courier New'" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="2">degen0x</text>

  <!-- Date badge -->
  <rect x="1000" y="28" width="150" height="30" rx="15" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="1075" y="48" font-family="monospace, 'Courier New'" font-size="13" fill="#f59e0b" text-anchor="middle" opacity="0.8">MAR 27, 2026</text>

  <!-- Lightning bolt icon -->
  <g transform="translate(60, 85)" filter="url(#glow)">
    <polygon points="20,0 8,22 18,22 12,40 30,16 20,16 26,0" fill="#f59e0b" opacity="0.9"/>
  </g>

  <!-- Main title -->
  <text x="100" y="115" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="#ffffff" letter-spacing="-1">CONVERGENCE THURSDAY</text>

  <!-- Subtitle -->
  <text x="60" y="155" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8">The most catalyst-dense day in weeks — all hitting at once</text>

  <!-- Divider -->
  <rect x="60" y="175" width="200" height="2" fill="url(#accent)" rx="1"/>

  <!-- Three columns of data -->
  <!-- Column 1: Options Expiry -->
  <g transform="translate(60, 210)">
    <rect width="340" height="160" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
    <text x="24" y="36" font-family="monospace" font-size="12" fill="#f59e0b" letter-spacing="1" text-transform="uppercase">OPTIONS EXPIRY</text>
    <text x="24" y="72" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#ffffff">$13.5B</text>
    <text x="24" y="100" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8">Deribit quarterly expiry</text>
    <text x="24" y="125" font-family="monospace" font-size="13" fill="#4ade80">BTC max pain: $75K–$86K</text>
    <text x="24" y="145" font-family="monospace" font-size="13" fill="#ef4444">BTC current: ~$70.5K</text>
  </g>

  <!-- Column 2: SEC Ruling -->
  <g transform="translate(430, 210)">
    <rect width="340" height="160" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
    <text x="24" y="36" font-family="monospace" font-size="12" fill="#6366f1" letter-spacing="1">SEC ETF DEADLINE</text>
    <text x="24" y="72" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#ffffff">91 Apps</text>
    <text x="24" y="100" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8">Across 24 different tokens</text>
    <text x="24" y="125" font-family="monospace" font-size="13" fill="#06b6d4">16 cryptos classified as commodities</text>
    <text x="24" y="145" font-family="monospace" font-size="13" fill="#06b6d4">Final ruling deadline: Mar 27</text>
  </g>

  <!-- Column 3: Options Uncapped -->
  <g transform="translate(800, 210)">
    <rect width="340" height="160" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#4ade80" stroke-width="1" stroke-opacity="0.3"/>
    <text x="24" y="36" font-family="monospace" font-size="12" fill="#4ade80" letter-spacing="1">ETF OPTIONS UNCAPPED</text>
    <text x="24" y="72" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#ffffff">11 Funds</text>
    <text x="24" y="100" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8">NYSE / Nasdaq / Cboe</text>
    <text x="24" y="125" font-family="monospace" font-size="13" fill="#4ade80">$IBIT, $FBTC, $ETHA + 8 more</text>
    <text x="24" y="145" font-family="monospace" font-size="13" fill="#4ade80">Position limits: REMOVED</text>
  </g>

  <!-- Bottom section: Sentiment bar -->
  <g transform="translate(60, 400)">
    <text x="0" y="20" font-family="monospace" font-size="12" fill="#64748b" letter-spacing="1">FEAR &amp; GREED</text>
    <rect x="140" y="6" width="400" height="18" rx="9" fill="#1e1e3a"/>
    <rect x="140" y="6" width="52" height="18" rx="9" fill="#ef4444"/>
    <text x="152" y="20" font-family="monospace" font-size="11" fill="#ffffff" font-weight="700">13</text>
    <text x="550" y="20" font-family="monospace" font-size="11" fill="#ef4444">EXTREME FEAR — 46 DAYS</text>
  </g>

  <g transform="translate(60, 435)">
    <text x="0" y="20" font-family="monospace" font-size="12" fill="#64748b" letter-spacing="1">STABLECOINS</text>
    <rect x="140" y="6" width="400" height="18" rx="9" fill="#1e1e3a"/>
    <rect x="140" y="6" width="388" height="18" rx="9" fill="url(#greenAccent)"/>
    <text x="152" y="20" font-family="monospace" font-size="11" fill="#0a0a1a" font-weight="700">$313B ATH</text>
    <text x="550" y="20" font-family="monospace" font-size="11" fill="#4ade80">DRY POWDER AT RECORD</text>
  </g>

  <g transform="translate(60, 470)">
    <text x="0" y="20" font-family="monospace" font-size="12" fill="#64748b" letter-spacing="1">ETF INFLOWS</text>
    <rect x="140" y="6" width="400" height="18" rx="9" fill="#1e1e3a"/>
    <rect x="140" y="6" width="108" height="18" rx="9" fill="#f59e0b"/>
    <text x="152" y="20" font-family="monospace" font-size="11" fill="#0a0a1a" font-weight="700">$890M</text>
    <text x="550" y="20" font-family="monospace" font-size="11" fill="#f59e0b">MAR (DOWN 73% FROM FEB)</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="100" fill="#000000" fill-opacity="0.4"/>
  <text x="60" y="572" font-family="monospace, 'Courier New'" font-size="16" fill="#6366f1" font-weight="700">degen0x.com</text>
  <text x="60" y="598" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Free crypto tools, guides, and data — 539 pages live</text>

  <!-- CTA -->
  <rect x="880" y="548" width="270" height="44" rx="22" fill="url(#accent)"/>
  <text x="1015" y="576" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0a0a1a" text-anchor="middle">Track it live →</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
