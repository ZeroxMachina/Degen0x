<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
      * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>

    <!-- Gradient definitions -->
    <linearGradient id="signatureGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="amberGlowFilter">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar (top) -->
  <rect width="1200" height="3" fill="url(#signatureGradient)"/>

  <!-- Glow background (amber accent) -->
  <circle cx="150" cy="200" r="300" fill="url(#amberGlow)" opacity="0.7"/>
  <circle cx="1100" cy="450" r="250" fill="url(#amberGlow)" opacity="0.5"/>

  <!-- Large number background -->
  <rect x="80" y="100" width="380" height="400" rx="20" fill="#1a1f2e" opacity="0.7" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Large "21" number with glow -->
  <g filter="url(#softGlow)">
    <text x="270" y="420" font-size="280" font-weight="800" text-anchor="middle" fill="#f59e0b" letter-spacing="-8">
      21
    </text>
  </g>

  <!-- "Days Until" text -->
  <text x="270" y="470" font-size="24" font-weight="600" text-anchor="middle" fill="#e6edf3">
    Days Until
  </text>

  <!-- Right side content -->
  <!-- Subtitle -->
  <text x="600" y="140" font-size="48" font-weight="800" text-anchor="start" fill="#e6edf3" letter-spacing="-0.5">
    Crypto Tax
  </text>
  <text x="600" y="200" font-size="48" font-weight="800" text-anchor="start" fill="#e6edf3" letter-spacing="-0.5">
    Deadline
  </text>

  <!-- Date emphasis -->
  <rect x="520" y="230" width="620" height="80" rx="12" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.4"/>
  <text x="830" y="290" font-size="52" font-weight="800" text-anchor="middle" fill="#f59e0b">
    April 15, 2026
  </text>

  <!-- Clock icon -->
  <g transform="translate(630, 360)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="6" fill="#f59e0b" opacity="0.8"/>
    <!-- Hour hand -->
    <line x1="0" y1="0" x2="0" y2="-25" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Minute hand -->
    <line x1="0" y1="0" x2="28" y2="-8" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Tools and resources section -->
  <rect x="520" y="430" width="620" height="130" rx="12" fill="#1a1f2e" opacity="0.6" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Section title -->
  <text x="545" y="460" font-size="16" font-weight="700" fill="#8b949e" text-anchor="start">
    Tax Tools & Guides
  </text>

  <!-- Tool items -->
  <text x="545" y="495" font-size="15" font-weight="600" fill="#e6edf3" text-anchor="start">
    ✓ Free Tax Calculator
  </text>
  <text x="545" y="525" font-size="15" font-weight="600" fill="#e6edf3" text-anchor="start">
    ✓ US / UK / Canada / Australia / Germany Guides
  </text>

  <!-- CTA -->
  <rect x="900" y="440" width="210" height="50" rx="10" fill="#f59e0b" opacity="0.85"/>
  <text x="1005" y="475" font-size="16" font-weight="700" text-anchor="middle" fill="#080d1c">
    degen0x.com/taxes
  </text>

  <!-- Bottom branding bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#signatureGradient)"/>

  <!-- degen0x branding (bottom right corner) -->
  <text x="1140" y="45" font-size="14" font-weight="700" text-anchor="end" fill="#f59e0b">
    degen0x.com
  </text>
</svg>