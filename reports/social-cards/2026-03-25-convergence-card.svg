<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
      * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>

    <!-- Gradient definitions -->
    <linearGradient id="signatureGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1c"/>

  <!-- Gradient accent bar (top) -->
  <rect width="1200" height="3" fill="url(#signatureGradient)"/>

  <!-- Background glow elements -->
  <circle cx="200" cy="150" r="200" fill="url(#cyanGlow)" opacity="0.6"/>
  <circle cx="1000" cy="500" r="250" fill="url(#amberGlow)" opacity="0.5"/>

  <!-- Main heading background (glass effect) -->
  <rect x="40" y="80" width="1120" height="180" rx="16" fill="#1a1f2e" opacity="0.7" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Main headline -->
  <text x="600" y="150" font-size="72" font-weight="800" text-anchor="middle" fill="#e6edf3" letter-spacing="-1">
    $14B OPTIONS EXPIRY
  </text>
  <text x="600" y="230" font-size="72" font-weight="800" text-anchor="middle" fill="#e6edf3" letter-spacing="-1">
    + 91 ETF RULINGS
  </text>

  <!-- Subtitle -->
  <text x="600" y="290" font-size="28" font-weight="600" text-anchor="middle" fill="#8b949e">
    Thursday March 27 — The Biggest Day in Crypto This Year
  </text>

  <!-- Left arrow (Options side) -->
  <g filter="url(#softGlow)">
    <!-- Arrow path -->
    <path d="M 250 380 L 500 380" stroke="#06b6d4" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 480 360 L 500 380 L 480 400" stroke="#06b6d4" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Label -->
    <text x="250" y="350" font-size="18" font-weight="700" fill="#06b6d4" text-anchor="middle">OPTIONS</text>
  </g>

  <!-- Right arrow (ETFs side) -->
  <g filter="url(#softGlow)">
    <!-- Arrow path -->
    <path d="M 950 380 L 700 380" stroke="#f59e0b" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 720 360 L 700 380 L 720 400" stroke="#f59e0b" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Label -->
    <text x="950" y="350" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">ETFs</text>
  </g>

  <!-- Center convergence circle -->
  <circle cx="600" cy="380" r="30" fill="none" stroke="url(#signatureGradient)" stroke-width="3"/>
  <circle cx="600" cy="380" r="15" fill="#6366f1" opacity="0.8"/>

  <!-- Data points section -->
  <rect x="60" y="450" width="1080" height="140" rx="12" fill="#1a1f2e" opacity="0.6" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Data grid -->
  <!-- $14B Deribit expiry -->
  <text x="150" y="480" font-size="14" font-weight="600" fill="#8b949e" text-anchor="start">
    Deribit Expiry
  </text>
  <text x="150" y="510" font-size="32" font-weight="800" fill="#06b6d4" text-anchor="start">
    $14B
  </text>

  <!-- 91 ETF applications -->
  <text x="420" y="480" font-size="14" font-weight="600" fill="#8b949e" text-anchor="start">
    ETF Applications
  </text>
  <text x="420" y="510" font-size="32" font-weight="800" fill="#f59e0b" text-anchor="start">
    91
  </text>

  <!-- 24 tokens -->
  <text x="700" y="480" font-size="14" font-weight="600" fill="#8b949e" text-anchor="start">
    Tokens Affected
  </text>
  <text x="700" y="510" font-size="32" font-weight="800" fill="#22c55e" text-anchor="start">
    24
  </text>

  <!-- BTC max pain -->
  <text x="950" y="480" font-size="14" font-weight="600" fill="#8b949e" text-anchor="start">
    BTC Max Pain
  </text>
  <text x="950" y="510" font-size="28" font-weight="800" fill="#6366f1" text-anchor="start">
    $75K–$86K
  </text>

  <!-- Bottom branding bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#signatureGradient)"/>

  <!-- degen0x branding (bottom right) -->
  <text x="1140" y="45" font-size="14" font-weight="700" text-anchor="end" fill="#6366f1">
    degen0x.com
  </text>
</svg>