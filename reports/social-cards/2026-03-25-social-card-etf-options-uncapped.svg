<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0d1428"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.15)"/>
      <stop offset="100%" stop-color="rgba(99,102,241,0.03)"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.15)"/>
      <stop offset="100%" stop-color="rgba(34,197,94,0.03)"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative glow circles -->
  <circle cx="200" cy="500" r="180" fill="#4f46e5" opacity="0.06" filter="url(#glow2)"/>
  <circle cx="1000" cy="150" r="200" fill="#0891b2" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="600" cy="300" r="120" fill="#d97706" opacity="0.03" filter="url(#glow2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Logo area -->
  <text x="60" y="65" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#6366f1" letter-spacing="-0.02em">degen0x</text>
  <text x="157" y="65" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e7681">.com</text>

  <!-- Date badge -->
  <rect x="1010" y="42" width="140" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1080" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Mar 25, 2026</text>

  <!-- Main headline -->
  <text x="60" y="160" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" letter-spacing="-0.03em">ETF Options Limits</text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-0.03em">
    <tspan fill="#22c55e">Removed</tspan>
    <tspan fill="#e6edf3"> — Effective Now</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="272" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8b949e">NYSE, Nasdaq, Cboe scrap 25,000-contract caps on 11 crypto ETFs. SEC waived review.</text>

  <!-- Glass cards row -->
  <!-- Card 1: Funds Affected -->
  <rect x="60" y="310" width="340" height="200" rx="16" fill="url(#cardGrad1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="90" y="352" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366f1" text-transform="uppercase" letter-spacing="0.05em">FUNDS UNCAPPED</text>
  <text x="90" y="400" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3">11</text>
  <text x="90" y="430" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">$IBIT · $FBTC · $ETHA</text>
  <text x="90" y="455" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">$GBTC · $ARKB + 6 more</text>
  <text x="90" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6366f1">No position ceiling</text>

  <!-- Card 2: Options Expiry Thu -->
  <rect x="430" y="310" width="340" height="200" rx="16" fill="url(#cardGrad2)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="460" y="352" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-transform="uppercase" letter-spacing="0.05em">THU OPTIONS EXPIRY</text>
  <text x="460" y="400" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3">$13.5B</text>
  <text x="460" y="430" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">BTC: $10.2B · ETH: $3.3B</text>
  <text x="460" y="455" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">Largest Q1 2026 settlement</text>
  <text x="460" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e">Max pain BTC: $68K</text>

  <!-- Card 3: SEC ETF Rulings -->
  <rect x="800" y="310" width="340" height="200" rx="16" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="830" y="352" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" text-transform="uppercase" letter-spacing="0.05em">SEC ETF RULINGS THU</text>
  <text x="830" y="400" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e6edf3">91</text>
  <text x="830" y="430" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">Applications · 24 tokens</text>
  <text x="830" y="455" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">Incl. $XRP spot ETF deadline</text>
  <text x="830" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f59e0b">Biggest ETF day of 2026</text>

  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="550" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Bottom left: BTC price -->
  <text x="60" y="598" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b949e">BTC</text>
  <text x="100" y="598" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">$71,300</text>
  <text x="190" y="598" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#22c55e">+0.36%</text>

  <!-- Bottom center: Fear & Greed -->
  <text x="500" y="598" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Fear &amp; Greed</text>
  <text x="600" y="598" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ef4444">11</text>
  <text x="622" y="598" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ef4444">EXTREME FEAR</text>

  <!-- Bottom right: degen0x -->
  <text x="1140" y="598" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#brandGrad)" text-anchor="end">degen0x.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brandGrad)"/>
</svg>
