<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="50%" stop-color="#0a1128"/>
      <stop offset="100%" stop-color="#080d1c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="aiGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="rwaGlow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand)"/>

  <!-- Decorative glow circles -->
  <circle cx="200" cy="250" r="200" fill="url(#aiGlow)" filter="url(#blur1)"/>
  <circle cx="1000" cy="400" r="180" fill="url(#rwaGlow)" filter="url(#blur1)"/>
  <circle cx="600" cy="315" r="120" fill="#8b5cf6" opacity="0.06" filter="url(#blur2)"/>

  <!-- Glass card left (AI Agents) -->
  <rect x="60" y="180" width="520" height="280" rx="20" ry="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- AI icon -->
  <circle cx="100" cy="220" r="18" fill="none" stroke="#6366f1" stroke-width="2"/>
  <circle cx="100" cy="220" r="6" fill="#6366f1"/>
  <line x1="100" y1="202" x2="100" y2="193" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="115" y1="208" x2="122" y2="202" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="118" y1="220" x2="126" y2="220" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="115" y1="232" x2="122" y2="238" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="238" x2="100" y2="247" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="232" x2="78" y2="238" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="220" x2="74" y2="220" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="208" x2="78" y2="202" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>

  <text x="130" y="226" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6366f1" font-weight="600">AI AGENTS</text>

  <text x="90" y="270" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#e6edf3" font-weight="800" letter-spacing="-0.02em">Framework</text>
  <text x="90" y="305" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#e6edf3" font-weight="800" letter-spacing="-0.02em">Comparison 2026</text>

  <text x="90" y="345" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Autonolas · Fetch.ai · Virtuals</text>
  <text x="90" y="365" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">CreatorBid · ElizaOS + more</text>

  <!-- Stats pill -->
  <rect x="90" y="390" width="100" height="32" rx="16" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="110" y="411" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#818cf8" font-weight="600">8 Platforms</text>

  <rect x="200" y="390" width="110" height="32" rx="16" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="215" y="411" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#06b6d4" font-weight="600">ERC-8183</text>

  <!-- VS divider -->
  <text x="588" y="330" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#6e7681" font-weight="700" text-anchor="middle">×</text>

  <!-- Glass card right (RWA Platforms) -->
  <rect x="620" y="180" width="520" height="280" rx="20" ry="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- RWA icon (building) -->
  <rect x="660" y="205" width="20" height="30" rx="2" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <rect x="665" y="210" width="4" height="4" rx="1" fill="#f59e0b"/>
  <rect x="671" y="210" width="4" height="4" rx="1" fill="#f59e0b"/>
  <rect x="665" y="218" width="4" height="4" rx="1" fill="#f59e0b"/>
  <rect x="671" y="218" width="4" height="4" rx="1" fill="#f59e0b"/>
  <rect x="667" y="226" width="6" height="9" rx="1" fill="#f59e0b"/>

  <text x="692" y="226" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#f59e0b" font-weight="600">RWA PLATFORMS</text>

  <text x="650" y="270" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#e6edf3" font-weight="800" letter-spacing="-0.02em">Platform</text>
  <text x="650" y="305" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#e6edf3" font-weight="800" letter-spacing="-0.02em">Comparison 2026</text>

  <text x="650" y="345" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Ondo · Centrifuge · Maple</text>
  <text x="650" y="365" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">Goldfinch · MakerDAO + more</text>

  <!-- Stats pills -->
  <rect x="650" y="390" width="90" height="32" rx="16" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="662" y="411" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f59e0b" font-weight="600">$15B TVL</text>

  <rect x="750" y="390" width="120" height="32" rx="16" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="765" y="411" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22c55e" font-weight="600">3-12% Yield</text>

  <!-- Logo and brand -->
  <circle cx="60" cy="60" r="24" fill="url(#logoGrad)" opacity="0.9"/>
  <text x="60" y="66" font-family="Inter, monospace" font-size="14" fill="#ffffff" font-weight="800" text-anchor="middle">0x</text>
  <text x="96" y="66" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#e6edf3" font-weight="700" letter-spacing="-0.02em">degen0x</text>

  <!-- Headline above cards -->
  <text x="600" y="140" font-family="Inter, system-ui, sans-serif" font-size="38" fill="url(#brand)" font-weight="900" text-anchor="middle" letter-spacing="-0.03em">Two Narratives. One Week.</text>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="100" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="530" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="60" y="575" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8b949e">degen0x.com</text>
  <text x="60" y="600" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Free crypto tools, guides, and data — no signup required</text>

  <!-- Bottom right date -->
  <text x="1140" y="575" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6e7681" text-anchor="end">March 25, 2026</text>
  <text x="1140" y="600" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="end">Weekly Community Cycle</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brand)"/>
</svg>
