  <!-- Median stat highlight -->
  <rect x="50" y="345" width="500" height="70" rx="20" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="80" y="388" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#22c55e">MEDIAN: +38.4%</text>
  <text x="360" y="388" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#8b949e">over 90 days</text>

  <!-- Context signals -->
  <rect x="580" y="345" width="570" height="70" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="605" y="374" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">Stablecoins $313B ATH</text>
  <text x="790" y="374" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">Exchange -$420M 48h</text>
  <text x="990" y="374" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">ETFs +4 wks</text>
  <text x="605" y="400" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6e7681">Dry powder loaded. Outflows accelerating. Smart money accumulating.</text>

  <!-- Fear gauge bar -->
  <rect x="50" y="445" width="1100" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="50" y="445" width="88" height="8" rx="4" fill="url(#fearGrad)"/>
