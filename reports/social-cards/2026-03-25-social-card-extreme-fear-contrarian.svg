<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#0d1529"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="fearGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top gradient bar -->
  <rect width="1200" height="4" fill="url(#brand)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#ef4444" opacity="0.04"/>
  <circle cx="150" cy="500" r="180" fill="#22c55e" opacity="0.03"/>

  <!-- Logo area -->
  <text x="50" y="52" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b949e" letter-spacing="0.1em">DEGEN0X.COM</text>

  <!-- Badge -->
  <rect x="1000" y="28" width="155" height="30" rx="15" fill="#ef4444" opacity="0.15"/>
  <circle cx="1016" cy="43" r="4" fill="#ef4444"/>
  <text x="1028" y="49" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">EXTREME FEAR</text>

  <!-- Main title -->
  <text x="50" y="130" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="url(#brand)" letter-spacing="-0.02em">Fear &amp; Greed = 8</text>
  <text x="50" y="175" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#8b949e">What happens after historic extreme fear readings?</text>

  <!-- Historical Returns Cards -->
  <!-- Card 1 -->
  <rect x="50" y="210" width="200" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="70" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Feb 2022</text>
  <text x="70" y="278" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e">+38%</text>
  <text x="70" y="303" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">90-day return</text>

  <!-- Card 2 -->
  <rect x="270" y="210" width="200" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="290" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Jun 2022</text>
  <text x="290" y="278" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e">+22%</text>
  <text x="290" y="303" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">90-day return</text>

  <!-- Card 3 -->
  <rect x="490" y="210" width="200" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="510" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Nov 2022</text>
  <text x="510" y="278" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e">+54%</text>
  <text x="510" y="303" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">90-day return</text>

  <!-- Card 4 -->
  <rect x="710" y="210" width="200" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="730" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Sep 2023</text>
  <text x="730" y="278" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e">+47%</text>
  <text x="730" y="303" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">90-day return</text>

  <!-- Card 5 -->
  <rect x="930" y="210" width="220" height="110" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="950" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Aug 2024</text>
  <text x="950" y="278" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#22c55e">+31%</text>
