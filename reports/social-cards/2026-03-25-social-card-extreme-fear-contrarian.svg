  <text x="80" y="531" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f59e0b">BTC $71,300</text>
  <text x="260" y="531" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">F&amp;G: 8</text>
  <text x="380" y="531" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">46-Day Streak</text>
  <text x="560" y="531" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#06b6d4">Thu: $13.5B Expiry</text>
  <text x="790" y="531" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f59e0b">91 SEC Rulings</text>
  <text x="990" y="531" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">Options Uncapped</text>

  <!-- Bottom bar -->
  <rect y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="50" y="610" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e">degen0x.com/tools/fear-greed-timeline</text>
  <text x="1000" y="610" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6e7681">Mar 25, 2026</text>

  <!-- Bottom gradient bar -->
  <rect y="626" width="1200" height="4" fill="url(#brand)"/>
</svg>
